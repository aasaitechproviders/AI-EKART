<!DOCTYPE html>
<html lang="en" style="background:#080910">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKart — Manage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">
<style>
/* ─── RESET & BASE ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── TAB SYSTEM ─────────────────────────────────────────────── */
.tab-shell {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 22px;
  width: fit-content;
}
.tab-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 18px;
  border: none; background: none;
  border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--text3);
  cursor: pointer;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
  letter-spacing: .01em;
}
.tab-btn:hover { color: var(--text2); background: rgba(255,255,255,.04); }
.tab-btn.active {
  background: rgba(108,99,255,.15);
  color: #a89bff;
  box-shadow: 0 0 0 1px rgba(108,99,255,.25);
}
.tab-btn .tab-icon { font-size: 14px; }
.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: rgba(255,255,255,.08);
  border-radius: 20px;
  font-size: 10px; font-weight: 800; color: var(--text3);
  transition: all .2s;
}
.tab-btn.active .tab-badge {
  background: rgba(108,99,255,.3);
  color: #c4b9ff;
}

/* ─── SECTION PANELS ─────────────────────────────────────────── */
.tab-panel { display: none; animation: fadeSlideIn .2s ease; }
.tab-panel.active { display: block; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── STATS ROW ──────────────────────────────────────────────── */
.stats-row {
  display: grid;
  gap: 12px;
  margin-bottom: 20px;
}
.stats-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
.stats-row.cols-4 { grid-template-columns: repeat(4, 1fr); }
.stat-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, transform .2s;
}
.stat-tile:hover { border-color: rgba(108,99,255,.25); transform: translateY(-1px); }
.stat-tile::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(108,99,255,.04) 0%, transparent 60%);
  pointer-events: none;
}
.stat-label {
  font-size: 10.5px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--text3); margin-bottom: 8px;
}
.stat-value {
  font-size: 26px; font-weight: 900;
  font-family: 'DM Mono', monospace;
  letter-spacing: -.03em;
  line-height: 1;
}
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 5px; }

/* ─── TOOLBAR ────────────────────────────────────────────────── */
.toolbar-row {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; margin-bottom: 14px;
}
.search-input {
  flex: 1; min-width: 180px;
  padding: 9px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px;
  outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: rgba(108,99,255,.5); }
.search-input::placeholder { color: var(--text3); }
.filter-pill {
  padding: 8px 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 10px;
  font-size: 12.5px; font-weight: 700;
  cursor: pointer; font-family: 'Outfit', sans-serif;
  color: var(--text2); transition: all .15s;
}
.filter-pill:hover { border-color: rgba(108,99,255,.4); color: #a89bff; }
.filter-pill.active {
  border-color: rgba(108,99,255,.4);
  color: #a89bff;
  background: rgba(108,99,255,.08);
}
.filter-pill.warn.active { border-color: rgba(251,191,36,.4); color: var(--yellow); background: rgba(251,191,36,.07); }
.filter-pill.danger.active { border-color: rgba(248,113,113,.4); color: var(--red); background: rgba(248,113,113,.07); }

/* ─── DATA TABLE ─────────────────────────────────────────────── */
.data-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.data-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  gap: 10px; flex-wrap: wrap;
}
.data-card-title {
  font-size: 14px; font-weight: 800;
  display: flex; align-items: center; gap: 8px;
}
.data-card-title .count {
  font-size: 12px; font-weight: 600; color: var(--text3);
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  padding: 10px 14px;
  text-align: left;
  font-size: 10.5px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 11px 14px; font-size: 13.5px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.015); }

/* ─── PRODUCTS ───────────────────────────────────────────────── */
.product-thumb {
  width: 36px; height: 36px;
  border-radius: 8px; object-fit: cover;
  background: var(--surface2); flex-shrink: 0;
}
.product-ph {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em;
}
.badge-active  { background: rgba(52,211,153,.12); color: #34d399; }
.badge-draft   { background: rgba(255,255,255,.07); color: var(--text2); }
.badge-archived{ background: rgba(248,113,113,.1); color: #f87171; }
.low-stock-chip {
  display: inline-block; padding: 2px 6px;
  background: rgba(251,191,36,.15); color: var(--yellow);
  border-radius: 5px; font-size: 9.5px; font-weight: 800; letter-spacing: .04em;
  margin-left: 4px; text-transform: uppercase;
}
.low-stock-row td { background: rgba(251,191,36,.025) !important; }

/* ─── BULK BAR ───────────────────────────────────────────────── */
.bulk-bar {
  display: none; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: rgba(108,99,255,.1);
  border: 1px solid rgba(108,99,255,.25);
  border-radius: 12px; margin-bottom: 14px;
  flex-wrap: wrap;
}
.bulk-bar.visible { display: flex; }
.bulk-label { font-size: 13px; font-weight: 800; color: #a89bff; flex: 1; }

/* ─── CATEGORIES GRID ────────────────────────────────────────── */
.cats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 12px; margin-top: 16px;
}
.cat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 18px;
  display: flex; align-items: center; justify-content: space-between;
  transition: all .2s;
}
.cat-card:hover {
  border-color: rgba(108,99,255,.3);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
}
.cat-name { font-size: 13.5px; font-weight: 800; }
.cat-slug { font-size: 10.5px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 3px; }
.cat-del {
  background: none; border: none;
  color: var(--text3); cursor: pointer;
  padding: 5px 8px; border-radius: 7px;
  font-size: 13px; transition: all .15s;
  flex-shrink: 0; line-height: 1;
}
.cat-del:hover { color: var(--red); background: rgba(248,113,113,.1); }
.cat-add-card {
  background: none;
  border: 1.5px dashed var(--border2);
  border-radius: 14px; padding: 16px 18px;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  color: var(--text3); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .15s; font-family: 'Outfit', sans-serif;
  width: 100%;
}
.cat-add-card:hover {
  border-color: rgba(108,99,255,.5); color: #a89bff;
  background: rgba(108,99,255,.04);
}

/* ─── COUPON ─────────────────────────────────────────────────── */
.coupon-code-chip {
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 700;
  background: var(--surface2);
  border: 1px solid var(--border2);
  padding: 3px 10px; border-radius: 7px;
  letter-spacing: .07em; cursor: pointer;
  transition: all .15s; display: inline-block;
}
.coupon-code-chip:hover { border-color: rgba(108,99,255,.5); color: #a89bff; }
.toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute; cursor: pointer; inset: 0;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; transition: .25s;
}
.toggle-track::before {
  content: ''; position: absolute;
  height: 12px; width: 12px;
  left: 3px; bottom: 3px;
  background: var(--text3); border-radius: 50%; transition: .25s;
}
input:checked + .toggle-track { background: rgba(108,99,255,.7); border-color: rgba(108,99,255,.5); }
input:checked + .toggle-track::before { transform: translateX(16px); background: #fff; }

/* ─── INVENTORY ──────────────────────────────────────────────── */
.stock-input {
  width: 70px; padding: 6px 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 13px;
  text-align: center; outline: none; transition: border-color .2s;
}
.stock-input:focus { border-color: rgba(108,99,255,.5); }
.stock-input.changed { border-color: rgba(108,99,255,.6); background: rgba(108,99,255,.08); }
.note-input {
  width: 130px; padding: 6px 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 12px;
  outline: none; transition: border-color .2s;
}
.note-input:focus { border-color: rgba(108,99,255,.5); }

.save-sticky {
  display: none; position: sticky; bottom: 16px; z-index: 50;
  background: var(--surface);
  border: 1px solid rgba(108,99,255,.3);
  border-radius: 14px;
  padding: 12px 20px;
  align-items: center; justify-content: space-between; gap: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(108,99,255,.15);
  margin-top: 10px; flex-wrap: wrap;
}
.save-sticky.visible { display: flex; }
.save-sticky-label { font-size: 13px; font-weight: 800; color: #a89bff; }

/* ─── THRESHOLD ROW ──────────────────────────────────────────── */
.threshold-wrap {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--text2); font-weight: 600;
}
.threshold-wrap input {
  width: 52px; padding: 6px 9px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 13px;
  text-align: center; outline: none;
}

/* ─── BUTTONS ────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 10px;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; border: none; transition: all .15s; line-height: 1;
}
.btn-primary {
  background: rgba(108,99,255,.85); color: #fff;
  box-shadow: 0 2px 10px rgba(108,99,255,.25);
}
.btn-primary:hover:not(:disabled) { background: #7b74ff; box-shadow: 0 4px 16px rgba(108,99,255,.35); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary {
  background: transparent; border: 1px solid var(--border);
  color: var(--text2);
}
.btn-secondary:hover { border-color: var(--text2); color: var(--text); }
.btn-danger {
  background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.2);
  color: #f87171;
}
.btn-danger:hover { background: rgba(248,113,113,.18); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.btn-ghost {
  background: none; border: none; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700;
  color: var(--text3); padding: 4px 8px; border-radius: 7px; transition: all .15s;
}
.btn-ghost:hover { color: var(--text); background: rgba(255,255,255,.06); }

/* ─── MODAL ──────────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
  z-index: 1000; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 28px;
  width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,.6);
  animation: modalIn .2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal h2 {
  font-size: 18px; font-weight: 900;
  margin-bottom: 20px; color: var(--text);
  letter-spacing: -.02em;
}
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 11.5px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--text3); margin-bottom: 7px;
}
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 14px;
  outline: none; transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: rgba(108,99,255,.6);
}
.field textarea { min-height: 80px; resize: vertical; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-hint { font-size: 11px; color: var(--text3); margin-top: 5px; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 10px;
  margin-top: 22px; padding-top: 18px;
  border-top: 1px solid var(--border);
}

/* ─── ADD CATEGORY INLINE ────────────────────────────────────── */
.cat-add-row {
  display: flex; gap: 10px; margin-bottom: 6px;
}
.cat-add-row input {
  flex: 1; padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 14px;
  outline: none; transition: border-color .15s;
}
.cat-add-row input:focus { border-color: rgba(108,99,255,.6); }

/* ─── EMPTY STATE ────────────────────────────────────────────── */
.empty-state {
  padding: 56px 20px; text-align: center; color: var(--text2);
}
.empty-icon { font-size: 40px; margin-bottom: 14px; opacity: .6; }
.empty-state h3 { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

/* ─── AI BOX ─────────────────────────────────────────────────── */
.ai-box {
  background: linear-gradient(135deg, rgba(108,99,255,.08), rgba(167,139,250,.03));
  border: 1px solid rgba(108,99,255,.2); border-radius: 14px;
  padding: 16px; margin-top: 12px;
}
.ai-box-title {
  font-size: 10.5px; font-weight: 900; color: #a89bff;
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 12px;
}
.ai-field-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
.ai-field-label { font-size: 11px; font-weight: 800; color: var(--text3); width: 72px; flex-shrink: 0; padding-top: 2px; }
.ai-field-val { font-size: 13px; color: var(--text); flex: 1; line-height: 1.5; }
.ai-tag {
  display: inline-block; padding: 2px 8px;
  background: rgba(108,99,255,.12); color: #a89bff;
  border-radius: 5px; font-size: 11px; font-weight: 700; margin: 2px;
}
.ai-highlight {
  padding: 4px 0 4px 10px; border-left: 2px solid rgba(108,99,255,.5);
  color: var(--text2); font-size: 13px; margin-bottom: 5px; line-height: 1.5;
}

/* ─── VARIANTS ───────────────────────────────────────────────── */
.variant-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.variant-row input {
  flex: 1; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 9px; padding: 8px 12px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 13px; outline: none;
}
.variant-row .rem-btn {
  background: none; border: 1px solid var(--border2);
  border-radius: 7px; color: var(--red); padding: 6px 10px;
  cursor: pointer; font-size: 13px; transition: all .15s;
}
.variant-row .rem-btn:hover { background: rgba(248,113,113,.1); }

/* ─── IMAGE PREVIEW ──────────────────────────────────────────── */
.img-previews { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.img-previews img {
  width: 58px; height: 58px; border-radius: 9px;
  object-fit: cover; border: 1px solid var(--border2);
}

/* ─── CHECKBOX ───────────────────────────────────────────────── */
.cb { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }

/* ─── LOW STOCK WARNING ──────────────────────────────────────── */
.low-stock-alert {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: rgba(251,191,36,.07); border: 1px solid rgba(251,191,36,.2);
  border-radius: 12px; margin-bottom: 16px; font-size: 13px;
}

/* ─── RESPONSIVE ─────────────────────────────────────────────── */
@media (max-width: 900px) {
  .stats-row.cols-4 { grid-template-columns: repeat(2, 1fr); }
  .stats-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 600px) {
  .tab-btn span.tab-text { display: none; }
  .stats-row { grid-template-columns: repeat(2, 1fr) !important; }
  .field-row { grid-template-columns: 1fr; }
}

/* ─── SPINNER ────────────────────────────────────────────────── */
.spinner-center {
  display: flex; align-items: center; justify-content: center;
  padding: 60px 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin .7s linear infinite; display: inline-block; }
</style>
<script src="api.js"></script>
<script src="nav.js"></script>
</head>

<!-- ╔══════════════════════════════╗ -->
<!-- ║  PAGE SKELETON               ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="page-skeleton">
  <div class="skel-sidebar">
    <div class="skel" style="height:22px;width:68px;border-radius:5px;margin-bottom:20px;"></div>
    <div style="display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px;">
      <div class="skel" style="width:32px;height:32px;border-radius:50%;flex-shrink:0;"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:5px;">
        <div class="skel" style="height:10px;width:80px;border-radius:4px;"></div>
        <div class="skel" style="height:9px;width:110px;border-radius:4px;"></div>
      </div>
    </div>
    <div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div>
    <div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.65;"></div>
    <div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div>
    <div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div>
  </div>
  <div class="skel-main">
    <div class="skel-topbar">
      <div class="skel" style="height:16px;width:120px;border-radius:5px;"></div>
      <div class="skel" style="height:32px;width:150px;border-radius:8px;"></div>
    </div>
    <div class="skel-body">
      <div class="skel" style="height:46px;width:420px;border-radius:12px;margin-bottom:18px;"></div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;">
        <div class="skel" style="height:76px;border-radius:13px;"></div>
        <div class="skel" style="height:76px;border-radius:13px;"></div>
        <div class="skel" style="height:76px;border-radius:13px;"></div>
        <div class="skel" style="height:76px;border-radius:13px;"></div>
      </div>
      <div class="skel" style="height:40px;border-radius:9px;margin-bottom:10px;"></div>
      <div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;"></div>

<!-- ║  JAVASCRIPT                                             ║ -->
<!-- ╚══════════════════════════════════════════════════════════╝ -->
<script>
/* ─── STATE ──────────────────────────────────────────────────── */
let currentStoreId = ''
let storeCurrency  = 'INR'
let activeTab      = 'products'

// Data stores
let allProducts    = []
let allCategories  = []
let catMap         = {}
let allCoupons     = []
let invProducts    = []
let invChanges     = {}
let activeInvFilter = 'all'

/* ─── INIT ───────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('manage', (id) => {
    currentStoreId = id
    loadAll()
  })
  if (!nav) return
  currentStoreId = nav.currentStoreId
  setTopbarActions(getTopbarBtn())
  if (currentStoreId) await loadAll()
  else renderNoStore()

  // AI prefill from ai-assistant
  const prefill = sessionStorage.getItem('ai_product_prefill')
  if (prefill) {
    try {
      const d = JSON.parse(prefill)
      sessionStorage.removeItem('ai_product_prefill')
      switchTab('products')
      openCreateProduct()
      if (d.title) document.getElementById('productName').value = d.title
      if (d.desc)  document.getElementById('productDesc').value = d.desc
      if (d.tags)  document.getElementById('productTags').value = d.tags
      toast('AI content pre-filled!', 'success')
    } catch {}
  }
})

function getTopbarBtn() {
  const btns = {
    products:   `<button class="btn btn-primary" onclick="openCreateProduct()">+ Add Product</button>`,
    categories: '',
    coupons:    `<button class="btn btn-primary" onclick="openCreateCoupon()">+ Create Coupon</button>`,
    inventory:  ''
  }
  return btns[activeTab] || ''
}

async function loadAll() {
  if (!currentStoreId) return
  document.getElementById('page-content').style.display = 'block'
  document.getElementById('page-skeleton').style.display = 'none'
  await Promise.all([loadProducts(), loadCategories(), loadCoupons(), loadInventory()])
}

function renderNoStore() {
  document.getElementById('page-content').style.display = 'block'
  document.getElementById('page-skeleton').style.display = 'none'
  ;['products','categories','coupons','inventory'].forEach(t => {
    document.getElementById(`${t}-content`).innerHTML =
      `<div class="empty-state"><div class="empty-icon">🏪</div><h3>No store selected</h3><p>Select a store from the top bar</p></div>`
  })
}

/* ─── TAB SWITCHING ──────────────────────────────────────────── */
function switchTab(tab) {
  activeTab = tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab))
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`))
  setTopbarActions(getTopbarBtn())
}

/* ═══════════════════════════════════════════════════════════════
   PRODUCTS
═══════════════════════════════════════════════════════════════ */
async function loadProducts() {
  try {
    ;[allProducts, allCategories] = await Promise.all([
      apiFetch(`/stores/${currentStoreId}/products`),
      apiFetch(`/stores/${currentStoreId}/categories`)
    ])
    catMap = {}; allCategories.forEach(c => catMap[c._id] = c.name)
    document.getElementById('badge-products').textContent = allProducts.length
    renderProductsPanel()
  } catch (e) {
    document.getElementById('products-content').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>${e.message}</h3></div>`
  }
}

function renderProductsPanel() {
  const lowStock = allProducts.filter(p => p.track_inventory && p.stock_qty <= 5).length
  const cur = getCur()
  document.getElementById('products-content').innerHTML = `
    ${lowStock > 0 ? `<div class="low-stock-alert">
      <span style="font-size:16px;">⚠️</span>
      <strong style="color:var(--yellow);">${lowStock} product${lowStock>1?'s':''} low on stock</strong>
      <span style="color:var(--text2);font-size:12px;">— stock ≤ 5 units</span>
    </div>` : ''}
    <div id="bulkBar" class="bulk-bar">
      <span class="bulk-label" id="bulkCount">0 selected</span>
      <button class="btn btn-secondary btn-sm" onclick="bulkAction('active')">✅ Active</button>
      <button class="btn btn-secondary btn-sm" onclick="bulkAction('draft')">📝 Draft</button>
      <button class="btn btn-secondary btn-sm" onclick="bulkAction('archived')">📦 Archive</button>
      <button class="btn btn-danger btn-sm" onclick="bulkAction('delete')">🗑 Delete</button>
      <button class="btn btn-ghost btn-sm" onclick="clearSelection()">✕ Clear</button>
    </div>
    <div class="toolbar-row">
      <input class="search-input" id="productSearch" placeholder="Search products…" oninput="filterProducts()">
      <select class="filter-pill" id="productCatFilter" onchange="filterProducts()" style="cursor:pointer;">
        <option value="">All Categories</option>
        ${allCategories.map(c => `<option value="${c._id}">${c.name}</option>`).join('')}
      </select>
      <select class="filter-pill" id="productStatusFilter" onchange="filterProducts()" style="cursor:pointer;">
        <option value="">All Status</option>
        <option value="active">Active</option>
        <option value="draft">Draft</option>
        <option value="archived">Archived</option>
      </select>
    </div>
    <div class="data-card">
      <div class="data-card-header">
        <span class="data-card-title">Products <span class="count" id="prodCount">(${allProducts.length})</span></span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th><input type="checkbox" class="cb" id="cbAll" onchange="toggleSelectAll(this)"></th>
            <th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody id="productsBody"></tbody>
        </table>
      </div>
    </div>`
  renderProductsTable(allProducts)
  // Update category dropdown in modal
  const catSel = document.getElementById('productCategory')
  if (catSel) catSel.innerHTML = '<option value="">No Category</option>' + allCategories.map(c => `<option value="${c._id}">${c.name}</option>`).join('')
}

function filterProducts() {
  const q   = document.getElementById('productSearch')?.value.toLowerCase() || ''
  const cat = document.getElementById('productCatFilter')?.value || ''
  const st  = document.getElementById('productStatusFilter')?.value || ''
  let f = allProducts
  if (q)   f = f.filter(p => p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q))
  if (cat) f = f.filter(p => String(p.category_id) === cat || (p.category_id?.$oid === cat))
  if (st)  f = f.filter(p => p.status === st)
  renderProductsTable(f)
  const el = document.getElementById('prodCount')
  if (el) el.textContent = `(${f.length})`
}

function renderProductsTable(products) {
  const body = document.getElementById('productsBody'); if (!body) return
  const cur = getCur()
  if (!products.length) {
    body.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📦</div><h3>No products found</h3></div></td></tr>`
    return
  }
  body.innerHTML = products.map(p => {
    const thumb = p.images?.[0]
      ? `<img class="product-thumb" src="${p.images[0]}" alt="">`
      : `<div class="product-ph">📦</div>`
    const catName = catMap[p.category_id] || catMap[p.category_id?.$oid] || '—'
    const isLow = p.track_inventory && p.stock_qty <= 5
    const statusClass = { active:'badge-active', draft:'badge-draft', archived:'badge-archived' }[p.status] || 'badge-draft'
    return `<tr class="${isLow ? 'low-stock-row' : ''}">
      <td><input type="checkbox" class="cb prod-cb" data-id="${p._id}" onchange="updateBulkBar()"></td>
      <td><div style="display:flex;align-items:center;gap:10px;">${thumb}
        <div>
          <div style="font-weight:800;font-size:13px;">${p.name}</div>
          <div style="font-size:10.5px;color:var(--text3);font-family:'DM Mono',monospace;">${p.sku || '—'}</div>
        </div>
      </div></td>
      <td style="color:var(--text2);font-size:12.5px;">${catName}</td>
      <td>
        <strong style="font-family:'DM Mono',monospace;">${cur}${p.price.toFixed(2)}</strong>
        ${p.compare_at_price ? `<div style="font-size:11px;color:var(--text3);text-decoration:line-through;">${cur}${p.compare_at_price.toFixed(2)}</div>` : ''}
      </td>
      <td style="color:${isLow?'var(--yellow)':'var(--text2)'};font-family:'DM Mono',monospace;">
        ${p.track_inventory ? p.stock_qty : '∞'}
        ${isLow ? '<span class="low-stock-chip">LOW</span>' : ''}
      </td>
      <td><span class="status-badge ${statusClass}">${p.status}</span></td>
      <td><div style="display:flex;gap:6px;">
        <button class="btn btn-secondary btn-sm" onclick="openEditProduct('${p._id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p._id}','${p.name.replace(/'/g,"\\'")}')" >🗑</button>
      </div></td>
    </tr>`
  }).join('')
}

function getSelectedIds() {
  return Array.from(document.querySelectorAll('.prod-cb:checked')).map(cb => cb.dataset.id)
}
function updateBulkBar() {
  const ids = getSelectedIds()
  const bar = document.getElementById('bulkBar')
  if (bar) bar.classList.toggle('visible', ids.length > 0)
  const el = document.getElementById('bulkCount')
  if (el) el.textContent = `${ids.length} selected`
  const cbAll = document.getElementById('cbAll')
  if (cbAll) cbAll.checked = ids.length > 0 && ids.length === document.querySelectorAll('.prod-cb').length
}
function toggleSelectAll(cb) {
  document.querySelectorAll('.prod-cb').forEach(el => el.checked = cb.checked)
  updateBulkBar()
}
function clearSelection() {
  document.querySelectorAll('.prod-cb').forEach(el => el.checked = false)
  updateBulkBar()
}
async function bulkAction(action) {
  const ids = getSelectedIds(); if (!ids.length) return
  if (action === 'delete') {
    if (!confirm(`Delete ${ids.length} product(s)?`)) return
    try {
      await Promise.all(ids.map(id => apiFetch(`/stores/${currentStoreId}/products/${id}`, { method:'DELETE', body:'{}' })))
      toast(`${ids.length} deleted`, 'success')
    } catch (e) { toast(e.message, 'error') }
  } else {
    try {
      await Promise.all(ids.map(id => apiFetch(`/stores/${currentStoreId}/products/${id}`, { method:'PUT', body: JSON.stringify({ status: action }) })))
      toast(`${ids.length} updated to ${action}`, 'success')
    } catch (e) { toast(e.message, 'error') }
  }
  await loadProducts()
}

function openCreateProduct() {
  if (!currentStoreId) return toast('Select a store first', 'error')
  document.getElementById('productModalTitle').textContent = 'Add Product'
  document.getElementById('productEditId').value = ''
  ;['productName','productDesc','productPrice','productCompare','productSku','productTags'].forEach(id => document.getElementById(id).value = '')
  document.getElementById('productStock').value = ''
  document.getElementById('productImageFiles').value = ''
  document.getElementById('productImagesPreview').innerHTML = ''
  document.getElementById('existingImagesWrap').innerHTML = ''
  document.getElementById('productStatus').value = 'active'
  document.getElementById('variantsList').innerHTML = ''
  document.getElementById('aiProductResult').style.display = 'none'
  const catSel = document.getElementById('productCategory')
  catSel.innerHTML = '<option value="">No Category</option>' + allCategories.map(c => `<option value="${c._id}">${c.name}</option>`).join('')
  openModal('productModal')
}

function openEditProduct(id) {
  const p = allProducts.find(x => x._id === id); if (!p) return
  document.getElementById('productModalTitle').textContent = 'Edit Product'
  document.getElementById('productEditId').value = id
  document.getElementById('productName').value = p.name
  document.getElementById('productDesc').value = p.description || ''
  document.getElementById('productPrice').value = p.price
  document.getElementById('productCompare').value = p.compare_at_price || ''
  document.getElementById('productSku').value = p.sku || ''
  document.getElementById('productStock').value = p.stock_qty || ''
  document.getElementById('productTags').value = (p.tags||[]).join(', ')
  document.getElementById('productImageFiles').value = ''
  document.getElementById('productImagesPreview').innerHTML = ''
  document.getElementById('existingImagesWrap').innerHTML = (p.images||[]).map(img =>
    `<img src="${img}" style="width:56px;height:56px;border-radius:9px;object-fit:cover;border:1px solid var(--border2);">`).join('')
  document.getElementById('productStatus').value = p.status || 'active'
  document.getElementById('aiProductResult').style.display = 'none'
  const catId = p.category_id?.$oid || p.category_id || ''
  const catSel = document.getElementById('productCategory')
  catSel.innerHTML = '<option value="">No Category</option>' + allCategories.map(c => `<option value="${c._id}" ${c._id===catId?'selected':''}>${c.name}</option>`).join('')
  document.getElementById('variantsList').innerHTML = ''
  ;(p.variants||[]).forEach(v => addVariantRow(v.label, v.options))
  openModal('productModal')
}

async function saveProduct() {
  const id = document.getElementById('productEditId').value
  const name = document.getElementById('productName').value.trim()
  const price = document.getElementById('productPrice').value
  if (!name || !price) return toast('Name and price required', 'error')
  const variantRows = document.querySelectorAll('.variant-row')
  const variants = Array.from(variantRows).map(row => ({
    label: row.querySelector('.var-label').value.trim(),
    options: row.querySelector('.var-options').value.trim()
  })).filter(v => v.label)
  const fd = new FormData()
  fd.append('name', name)
  fd.append('description', document.getElementById('productDesc').value.trim())
  fd.append('price', price)
  fd.append('compare_at_price', document.getElementById('productCompare').value || '')
  fd.append('sku', document.getElementById('productSku').value.trim())
  fd.append('stock_qty', document.getElementById('productStock').value || 0)
  fd.append('track_inventory', !!document.getElementById('productStock').value)
  fd.append('category_id', document.getElementById('productCategory').value || '')
  fd.append('tags', document.getElementById('productTags').value)
  fd.append('status', document.getElementById('productStatus').value)
  fd.append('variants', JSON.stringify(variants))
  const imageFiles = document.getElementById('productImageFiles').files
  if (imageFiles.length > 0) Array.from(imageFiles).forEach(f => fd.append('images', f))
  else {
    const existingImgs = Array.from(document.querySelectorAll('#existingImagesWrap img')).map(i => i.src)
    fd.append('images', JSON.stringify(existingImgs))
  }
  try {
    const url = id ? `${API}/stores/${currentStoreId}/products/${id}` : `${API}/stores/${currentStoreId}/products`
    const res = await fetch(url, { method: id ? 'PUT' : 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: fd })
    if (!res.ok) { const e = await res.json(); throw new Error(e.error) }
    closeModal('productModal')
    await loadProducts()
    toast(id ? 'Product updated!' : 'Product added!', 'success')
  } catch (e) { toast(e.message, 'error') }
}

async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"?`)) return
  try {
    await apiFetch(`/stores/${currentStoreId}/products/${id}`, { method:'DELETE', body:'{}' })
    await loadProducts()
    toast('Product deleted')
  } catch (e) { toast(e.message, 'error') }
}

function addVariantRow(label = '', options = '') {
  const div = document.createElement('div'); div.className = 'variant-row'
  div.innerHTML = `
    <input class="var-label" type="text" placeholder="Label (e.g. Size)" value="${label}">
    <input class="var-options" type="text" placeholder="Options (e.g. S, M, L)" value="${options}">
    <button class="rem-btn" onclick="this.parentElement.remove()">✕</button>`
  document.getElementById('variantsList').appendChild(div)
}

function previewProductImages(input) {
  const wrap = document.getElementById('productImagesPreview'); wrap.innerHTML = ''
  Array.from(input.files).forEach(f => {
    const r = new FileReader(); r.onload = e => {
      const img = document.createElement('img'); img.src = e.target.result
      img.style = 'width:56px;height:56px;border-radius:9px;object-fit:cover;border:1px solid var(--border2);'
      wrap.appendChild(img)
    }; r.readAsDataURL(f)
  })
}

async function aiGenerateProduct() {
  const name = document.getElementById('productName').value.trim()
  if (!name) return toast('Enter a product name first', 'error')
  const btn = document.getElementById('aiGenBtn')
  btn.disabled = true; btn.textContent = '⏳'
  const box = document.getElementById('aiProductResult'); box.style.display = 'none'
  try {
    const cat = document.getElementById('productCategory')
    const catName = cat?.options[cat.selectedIndex]?.text || ''
    const r = await apiFetch('/ai/generate-product-content', {
      method: 'POST',
      body: JSON.stringify({ product_name: name, category: catName, currency: 'INR' })
    })
    const d = r.content
    box.innerHTML = `<div class="ai-box">
      <div class="ai-box-title">✨ AI Generated</div>
      <div class="ai-field-row"><span class="ai-field-label">Title</span><span class="ai-field-val" style="font-weight:800;">${d.title}</span></div>
      <div class="ai-field-row"><span class="ai-field-label">Desc</span><span class="ai-field-val">${d.description}</span></div>
      <div style="margin:8px 0;">${(d.highlights||[]).map(h=>`<div class="ai-highlight">${h}</div>`).join('')}</div>
      <div>${(d.tags||[]).map(t=>`<span class="ai-tag">${t}</span>`).join('')}</div>
      <button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="applyAIContent(${JSON.stringify(d).replace(/"/g,'&quot;')})">✅ Apply</button>
    </div>`
    box.style.display = 'block'
  } catch (e) { toast('AI failed: ' + e.message, 'error') }
  btn.disabled = false; btn.textContent = '✨ AI'
}

function applyAIContent(d) {
  if (d.title) document.getElementById('productName').value = d.title
  if (d.description) document.getElementById('productDesc').value = d.description
  if (d.tags) document.getElementById('productTags').value = d.tags.join(', ')
  document.getElementById('aiProductResult').style.display = 'none'
  toast('AI content applied!', 'success')
}

/* ═══════════════════════════════════════════════════════════════
   CATEGORIES
═══════════════════════════════════════════════════════════════ */
async function loadCategories() {
  try {
    allCategories = await apiFetch(`/stores/${currentStoreId}/categories`)
    catMap = {}; allCategories.forEach(c => catMap[c._id] = c.name)
    document.getElementById('badge-categories').textContent = allCategories.length
    renderCategoriesPanel()
  } catch (e) {
    document.getElementById('categories-content').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>${e.message}</h3></div>`
  }
}

function renderCategoriesPanel() {
  document.getElementById('categories-content').innerHTML = `
    <div class="data-card" style="padding:20px;margin-bottom:0;">
      <div style="margin-bottom:16px;">
        <div class="cat-add-row">
          <input type="text" id="catNewName" placeholder="New category name…" onkeydown="if(event.key==='Enter')createCategory()">
          <button class="btn btn-primary" onclick="createCategory()">+ Add</button>
        </div>
        <div class="field-hint">Press Enter or click Add</div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:16px;">
        <div style="font-size:13px;font-weight:800;color:var(--text2);margin-bottom:12px;">
          ${allCategories.length} Categor${allCategories.length === 1 ? 'y' : 'ies'}
        </div>
        <div class="cats-grid" id="catsGrid"></div>
      </div>
    </div>`
  renderCatsGrid()
}

function renderCatsGrid() {
  const grid = document.getElementById('catsGrid'); if (!grid) return
  if (!allCategories.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;padding:30px 0;"><div class="empty-icon">🗂️</div><h3>No categories yet</h3><p>Add categories to organize your products</p></div>`
    return
  }
  grid.innerHTML = allCategories.map(c => `
    <div class="cat-card">
      <div>
        <div class="cat-name">🗂️ ${c.name}</div>
        <div class="cat-slug">${c.slug}</div>
      </div>
      <button class="cat-del" onclick="deleteCategory('${c._id}','${c.name.replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('')
}

async function createCategory() {
  if (!currentStoreId) return toast('Select a store first', 'error')
  const input = document.getElementById('catNewName')
  const name = input.value.trim()
  if (!name) return toast('Enter a category name', 'error')
  try {
    await apiFetch(`/stores/${currentStoreId}/categories`, { method:'POST', body: JSON.stringify({ name }) })
    input.value = ''
    await loadCategories()
    toast('Category added!', 'success')
  } catch (e) { toast(e.message, 'error') }
}

async function deleteCategory(id, name) {
  if (!confirm(`Delete category "${name}"?`)) return
  try {
    await apiFetch(`/stores/${currentStoreId}/categories/${id}`, { method:'DELETE', body:'{}' })
    await loadCategories()
    toast('Category deleted')
  } catch (e) { toast(e.message, 'error') }
}

/* ═══════════════════════════════════════════════════════════════
   COUPONS
═══════════════════════════════════════════════════════════════ */
async function loadCoupons() {
  try {
    allCoupons = await apiFetch(`/stores/${currentStoreId}/coupons`)
    document.getElementById('badge-coupons').textContent = allCoupons.length
    renderCouponsPanel()
  } catch (e) {
    document.getElementById('coupons-content').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>${e.message}</h3></div>`
  }
}

function renderCouponsPanel() {
  const active = allCoupons.filter(c => c.active).length
  const totalUses = allCoupons.reduce((s,c) => s + (c.uses||0), 0)
  const cur = getCur()
  document.getElementById('coupons-content').innerHTML = `
    <div class="stats-row cols-3">
      <div class="stat-tile">
        <div class="stat-label">Total Coupons</div>
        <div class="stat-value">${allCoupons.length}</div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Active</div>
        <div class="stat-value" style="color:var(--green);">${active}</div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Total Uses</div>
        <div class="stat-value" style="color:#a89bff;">${totalUses}</div>
      </div>
    </div>
    <div class="data-card">
      <div class="data-card-header">
        <span class="data-card-title">Coupons <span class="count">(${allCoupons.length})</span></span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Code</th><th>Type</th><th>Value</th><th>Min Order</th><th>Uses</th><th>Expires</th><th>Active</th><th>Actions</th>
          </tr></thead>
          <tbody id="couponsBody"></tbody>
        </table>
      </div>
    </div>`
  renderCouponsTable()
}

function renderCouponsTable() {
  const body = document.getElementById('couponsBody'); if (!body) return
  const cur = getCur()
  if (!allCoupons.length) {
    body.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🎟️</div><h3>No coupons yet</h3><p>Create a coupon to offer discounts</p></div></td></tr>`
    return
  }
  body.innerHTML = allCoupons.map(c => `<tr>
    <td><span class="coupon-code-chip" onclick="copyCode('${c.code}')" title="Click to copy">${c.code}</span></td>
    <td style="color:var(--text2);font-size:12.5px;">${c.type === 'percent' ? 'Percentage' : 'Flat'}</td>
    <td><strong style="font-family:'DM Mono',monospace;">${c.type === 'percent' ? c.value+'%' : cur+c.value}</strong></td>
    <td style="color:var(--text2);font-family:'DM Mono',monospace;font-size:12.5px;">${c.min_order > 0 ? cur+c.min_order : '—'}</td>
    <td style="font-family:'DM Mono',monospace;">${c.uses}${c.max_uses?' / '+c.max_uses:''}</td>
    <td style="font-size:12px;color:var(--text3);">${c.expires_at ? new Date(c.expires_at).toLocaleDateString('en-IN') : 'Never'}</td>
    <td><label class="toggle-switch">
      <input type="checkbox" ${c.active?'checked':''} onchange="toggleCoupon('${c._id}',this.checked)">
      <span class="toggle-track"></span>
    </label></td>
    <td><button class="btn btn-danger btn-sm" onclick="deleteCoupon('${c._id}','${c.code}')">🗑</button></td>
  </tr>`).join('')
}

function openCreateCoupon() {
  if (!currentStoreId) return toast('Select a store first', 'error')
  ;['couponCode','couponValue','couponMinOrder','couponMaxUses','couponExpiry'].forEach(id => document.getElementById(id).value = '')
  document.getElementById('couponType').value = 'percent'
  openModal('couponModal')
}

async function saveCoupon() {
  const body = {
    code: document.getElementById('couponCode').value.trim(),
    type: document.getElementById('couponType').value,
    value: document.getElementById('couponValue').value,
    min_order: document.getElementById('couponMinOrder').value || 0,
    max_uses: document.getElementById('couponMaxUses').value || null,
    expires_at: document.getElementById('couponExpiry').value || null
  }
  if (!body.code || !body.value) return toast('Code and value required', 'error')
  try {
    await apiFetch(`/stores/${currentStoreId}/coupons`, { method:'POST', body: JSON.stringify(body) })
    closeModal('couponModal')
    await loadCoupons()
    toast('Coupon created!', 'success')
  } catch (e) { toast(e.message, 'error') }
}

async function toggleCoupon(id, active) {
  try {
    await apiFetch(`/stores/${currentStoreId}/coupons/${id}`, { method:'PUT', body: JSON.stringify({ active }) })
    toast(active ? 'Coupon activated' : 'Coupon deactivated', 'success')
  } catch (e) { toast(e.message, 'error'); await loadCoupons() }
}

async function deleteCoupon(id, code) {
  if (!confirm(`Delete coupon "${code}"?`)) return
  try {
    await apiFetch(`/stores/${currentStoreId}/coupons/${id}`, { method:'DELETE', body:'{}' })
    await loadCoupons()
    toast('Coupon deleted')
  } catch (e) { toast(e.message, 'error') }
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => toast(`Copied "${code}"!`, 'info'))
}

/* ═══════════════════════════════════════════════════════════════
   INVENTORY
═══════════════════════════════════════════════════════════════ */
async function loadInventory() {
  const threshold = parseInt(document.getElementById('invThreshold')?.value) || 5
  try {
    const [data, alerts] = await Promise.all([
      apiFetch(`/stores/${currentStoreId}/inventory?threshold=${threshold}${activeInvFilter==='low'?'&low_stock=true':activeInvFilter==='out'?'&out_of_stock=true':''}`),
      apiFetch(`/stores/${currentStoreId}/inventory/alerts/low-stock?threshold=${threshold}`)
    ])
    invProducts = data.products || []
    const outCnt  = (alerts.out_of_stock || []).length
    const lowCnt  = (alerts.low_stock    || []).length
    const total   = data.total || invProducts.length
    document.getElementById('badge-inventory').textContent = total

    // Update stats if already rendered
    const els = {
      statTotal: total, statLow: lowCnt, statOut: outCnt,
      statHealthy: Math.max(0, total - lowCnt - outCnt)
    }
    Object.entries(els).forEach(([id, val]) => {
      const el = document.getElementById(id); if (el) el.textContent = val
    })
    const sub = document.getElementById('statLowSub')
    if (sub) sub.textContent = `Below ${threshold} units`

    invChanges = {}
    updateInvSaveBar()
    if (!document.getElementById('invBody')) {
      renderInventoryPanel(total, lowCnt, outCnt, threshold)
    } else {
      renderInvTable(invProducts)
    }
  } catch (e) {
    document.getElementById('inventory-content').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>${e.message}</h3></div>`
  }
}

function renderInventoryPanel(total, lowCnt, outCnt, threshold) {
  document.getElementById('inventory-content').innerHTML = `
    <div class="stats-row cols-4">
      <div class="stat-tile">
        <div class="stat-label">Total Products</div>
        <div class="stat-value" id="statTotal">${total}</div>
        <div class="stat-sub">Tracked + untracked</div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Low Stock</div>
        <div class="stat-value" id="statLow" style="color:var(--yellow);">${lowCnt}</div>
        <div class="stat-sub" id="statLowSub">Below ${threshold} units</div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Out of Stock</div>
        <div class="stat-value" id="statOut" style="color:var(--red);">${outCnt}</div>
        <div class="stat-sub">Stock qty = 0</div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Healthy</div>
        <div class="stat-value" id="statHealthy" style="color:var(--green);">${Math.max(0, total - lowCnt - outCnt)}</div>
        <div class="stat-sub">Well stocked</div>
      </div>
    </div>

    <div class="toolbar-row">
      <input class="search-input" id="invSearch" placeholder="Search by name or SKU…" oninput="applyInvSearch()">
      <div class="threshold-wrap">
        <span>Low stock ≤</span>
        <input type="number" id="invThreshold" value="${threshold}" min="1" max="100" onchange="loadInventory()">
      </div>
      <button class="filter-pill ${activeInvFilter==='all'?'active':''}" id="fAll" onclick="setInvFilter('all')">All</button>
      <button class="filter-pill warn ${activeInvFilter==='low'?'active':''}" id="fLow" onclick="setInvFilter('low')">⚠️ Low</button>
      <button class="filter-pill danger ${activeInvFilter==='out'?'active':''}" id="fOut" onclick="setInvFilter('out')">❌ Out</button>
      <button class="btn btn-secondary btn-sm" onclick="exportInvCSV()">⬇ CSV</button>
    </div>

    <div class="data-card">
      <div class="data-card-header">
        <span class="data-card-title">Stock Levels</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:var(--text2);">Edit qty cells, then save</span>
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Product</th><th>SKU</th><th>Status</th><th>Tracking</th>
            <th>Current</th><th>New Stock</th><th>Note</th>
          </tr></thead>
          <tbody id="invBody"></tbody>
        </table>
      </div>
    </div>

    <div class="save-sticky" id="invSaveBar">
      <span class="save-sticky-label" id="invChangesCount">0 changes pending</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="discardInvChanges()">✕ Discard</button>
        <button class="btn btn-primary" onclick="saveInvChanges()" id="btnInvSave">💾 Save Changes</button>
      </div>
    </div>`
  renderInvTable(invProducts)
}

function renderInvTable(products) {
  const body = document.getElementById('invBody'); if (!body) return
  if (!products.length) {
    body.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📦</div><h3>No products found</h3></div></td></tr>`
    return
  }
  body.innerHTML = products.map(p => {
    const thumb = p.images?.[0]
      ? `<img class="product-thumb" src="${p.images[0]}" alt="">`
      : `<div class="product-ph">📦</div>`
    const stockClass = p.is_out_of_stock ? 'badge-archived' : p.is_low_stock ? '' : 'badge-active'
    const stockLabel = p.is_out_of_stock ? 'Out of Stock' : p.is_low_stock ? 'Low Stock' : 'In Stock'
    const stockColor = p.is_out_of_stock ? '#f87171' : p.is_low_stock ? 'var(--yellow)' : ''
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px;">${thumb}
        <div>
          <div style="font-weight:800;font-size:13px;">${p.name}</div>
          ${p.status !== 'active' ? `<span style="font-size:10px;color:var(--text3);text-transform:uppercase;">${p.status}</span>` : ''}
        </div>
      </div></td>
      <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);">${p.sku || '—'}</td>
      <td>
        ${stockColor
          ? `<span class="status-badge" style="background:${p.is_out_of_stock?'rgba(248,113,113,.12)':'rgba(251,191,36,.12)'};color:${stockColor};">${stockLabel}</span>`
          : `<span class="status-badge badge-active">${stockLabel}</span>`}
      </td>
      <td style="color:var(--text2);">${p.track_inventory ? '✅' : '—'}</td>
      <td style="font-family:'DM Mono',monospace;font-weight:800;color:${p.is_out_of_stock?'var(--red)':p.is_low_stock?'var(--yellow)':'var(--text)'};">
        ${p.track_inventory ? p.stock_qty : '∞'}
      </td>
      <td>${p.track_inventory
        ? `<input class="stock-input" type="number" min="0" data-id="${p._id}" data-orig="${p.stock_qty}" value="${p.stock_qty}" onchange="onStockChange(this)" oninput="onStockChange(this)">`
        : `<span style="font-size:12px;color:var(--text3);">Not tracked</span>`}
      </td>
      <td>${p.track_inventory
        ? `<input class="note-input" type="text" data-note="${p._id}" placeholder="Reason…" oninput="onNoteChange('${p._id}', this.value)">`
        : '—'}
      </td>
    </tr>`
  }).join('')
}

function onStockChange(el) {
  const id = el.dataset.id, orig = parseInt(el.dataset.orig), newVal = parseInt(el.value)
  el.classList.toggle('changed', newVal !== orig)
  if (newVal !== orig) {
    invChanges[id] = { qty: newVal, note: invChanges[id]?.note || '' }
  } else {
    delete invChanges[id]
    const noteEl = document.querySelector(`[data-note="${id}"]`)
    if (noteEl?.value) invChanges[id] = { qty: newVal, note: noteEl.value }
  }
  updateInvSaveBar()
}
function onNoteChange(id, val) {
  if (invChanges[id]) invChanges[id].note = val
}
function updateInvSaveBar() {
  const count = Object.keys(invChanges).length
  const bar = document.getElementById('invSaveBar')
  if (bar) bar.classList.toggle('visible', count > 0)
  const el = document.getElementById('invChangesCount')
  if (el) el.textContent = `${count} change${count !== 1 ? 's' : ''} pending`
}
async function saveInvChanges() {
  const pending = Object.entries(invChanges); if (!pending.length) return
  const btn = document.getElementById('btnInvSave')
  btn.disabled = true; btn.innerHTML = '<span class="spin">⏳</span> Saving…'
  try {
    const updates = pending.map(([id, { qty, note }]) => ({ product_id: id, stock_qty: qty, note: note || 'Manual adjustment' }))
    const result = await apiFetch(`/stores/${currentStoreId}/inventory/bulk`, { method:'POST', body: JSON.stringify({ updates }) })
    toast(`✅ Updated ${result.updated} product${result.updated !== 1 ? 's' : ''}`, 'success')
    if (result.errors?.length) toast(`⚠️ ${result.errors.length} errors`, 'error')
    await loadInventory()
  } catch (e) { toast(e.message || 'Save failed', 'error') }
  finally { btn.disabled = false; btn.innerHTML = '💾 Save Changes' }
}
function discardInvChanges() { invChanges = {}; loadInventory() }
function setInvFilter(f) {
  activeInvFilter = f
  ;['all','low','out'].forEach(k => {
    const el = document.getElementById('f'+k.charAt(0).toUpperCase()+k.slice(1))
    if (el) el.classList.toggle('active', k === f)
  })
  loadInventory()
}
function applyInvSearch() {
  const q = document.getElementById('invSearch')?.value.toLowerCase() || ''
  if (!q) { renderInvTable(invProducts); return }
  renderInvTable(invProducts.filter(p => p.name.toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q)))
}
function exportInvCSV() {
  if (!invProducts.length) return toast('No data to export', 'error')
  const rows = [['Product','SKU','Stock','Tracked','Status','Low Stock','Out of Stock']]
  invProducts.forEach(p => rows.push([p.name, p.sku||'', p.track_inventory ? p.stock_qty : '∞', p.track_inventory ? 'Yes' : 'No', p.status, p.is_low_stock ? 'Yes' : 'No', p.is_out_of_stock ? 'Yes' : 'No']))
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n')
  const a = document.createElement('a')
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv)
  a.download = `inventory-${new Date().toISOString().slice(0,10)}.csv`
  a.click(); toast('CSV downloaded!', 'success')
}

/* ─── HELPERS ────────────────────────────────────────────────── */
function getCur() {
  return storeCurrency === 'USD' ? '$' : storeCurrency === 'EUR' ? '€' : '₹'
}

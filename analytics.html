<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKart — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
/* ─────────────────────────────────────────────────
   DESIGN TOKENS
───────────────────────────────────────────────── */
:root {
  --bg:          #0a0b0f;
  --bg2:         #0f1117;
  --surface:     #13151d;
  --surface2:    #191c27;
  --surface3:    #1f2333;
  --border:      rgba(255,255,255,0.06);
  --border2:     rgba(255,255,255,0.10);
  --border3:     rgba(255,255,255,0.15);
  --text:        #f1f2f6;
  --text2:       #a0a8c0;
  --text3:       #5a6282;
  --accent:      #7c6fff;
  --accent-dim:  rgba(124,111,255,0.12);
  --accent-glow: rgba(124,111,255,0.25);
  --green:       #34d399;
  --green-dim:   rgba(52,211,153,0.12);
  --red:         #f87171;
  --red-dim:     rgba(248,113,113,0.12);
  --amber:       #fbbf24;
  --amber-dim:   rgba(251,191,36,0.12);
  --blue:        #60a5fa;
  --blue-dim:    rgba(96,165,250,0.12);
  --sidebar-w:   240px;
  --topbar-h:    60px;
  --radius:      14px;
  --radius-sm:   8px;
  --radius-lg:   18px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:   0 12px 48px rgba(0,0,0,0.5);
  --transition:  all 0.18s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="light"] {
  --bg:          #f4f5fa;
  --bg2:         #eceef5;
  --surface:     #ffffff;
  --surface2:    #f8f9fc;
  --surface3:    #f0f1f8;
  --border:      rgba(0,0,0,0.07);
  --border2:     rgba(0,0,0,0.10);
  --border3:     rgba(0,0,0,0.15);
  --text:        #0f1117;
  --text2:       #4a5270;
  --text3:       #9ba3c0;
  --accent:      #6c5fff;
  --accent-dim:  rgba(108,95,255,0.08);
  --accent-glow: rgba(108,95,255,0.18);
  --shadow:      0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg:   0 12px 48px rgba(0,0,0,0.12);
}

/* ─────────────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ─────────────────────────────────────────────────
   LAYOUT SHELL
───────────────────────────────────────────────── */
.app-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ─────────────────────────────────────────────────
   SIDEBAR OVERLAY (mobile backdrop)
───────────────────────────────────────────────── */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 99;
  opacity: 0;
  transition: opacity 0.25s ease;
}
.sidebar-overlay.visible { opacity: 1; }

/* ─────────────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
}
.sidebar::-webkit-scrollbar { display: none; }

/* Sidebar top gradient accent */
.sidebar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.6;
}

/* ── Logo ── */
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 20px 16px 18px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-mark {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: white;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(124,111,255,0.35);
}
.logo-text {
  font-size: 16px; font-weight: 800;
  color: var(--text); letter-spacing: -0.03em;
}
.logo-text span { color: var(--accent); }

/* ── Store Selector ── */
.store-selector-wrap {
  margin: 0 12px 8px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  cursor: pointer;
  transition: var(--transition);
}
.store-selector-wrap:hover {
  border-color: var(--border3);
  background: var(--surface3);
}
.store-selector-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 4px; }
.store-selector-inner { display: flex; align-items: center; gap: 8px; }
.store-icon { width: 22px; height: 22px; border-radius: 5px; background: linear-gradient(135deg, var(--accent-dim), rgba(124,111,255,0.2)); display: flex; align-items: center; justify-content: center; font-size: 11px; }
.store-selector-inner select {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px; font-weight: 600; color: var(--text);
  cursor: pointer; min-width: 0;
}
.store-selector-inner select option { background: var(--surface2); color: var(--text); }
.store-chevron { color: var(--text3); font-size: 10px; flex-shrink: 0; }

/* ── Nav ── */
.nav-section { padding: 0 8px 4px; }
.nav-section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text3);
  padding: 14px 8px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 500;
  color: var(--text2);
  text-decoration: none;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
  margin-bottom: 1px;
  white-space: nowrap;
}
.nav-item:hover {
  background: var(--surface2);
  color: var(--text);
}
.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 2.5px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
  box-shadow: 0 0 8px var(--accent-glow);
}
.nav-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  background: var(--surface2);
  flex-shrink: 0;
  transition: var(--transition);
}
.nav-item.active .nav-icon { background: var(--accent-dim); }
.nav-item:hover .nav-icon { background: var(--surface3); }

/* ── Sidebar User ── */
.sidebar-user {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
}
.sidebar-user-inner {
  display: flex; align-items: center; gap: 10px;
  padding: 10px;
  border-radius: var(--radius-sm);
  transition: var(--transition);
  cursor: pointer;
}
.sidebar-user-inner:hover { background: var(--surface2); }
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: white;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 12.5px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-email { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btn-logout {
  background: none; border: none;
  color: var(--text3); font-size: 16px;
  cursor: pointer; padding: 4px;
  transition: var(--transition); border-radius: 5px; flex-shrink: 0;
}
.btn-logout:hover { color: var(--red); background: var(--red-dim); }

/* ─────────────────────────────────────────────────
   MAIN AREA
───────────────────────────────────────────────── */
.main-wrap {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

/* ─────────────────────────────────────────────────
   TOPBAR
───────────────────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.topbar-hamburger {
  display: none;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--surface2);
  border: 1px solid var(--border2);
  align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: var(--transition);
}
.topbar-hamburger:hover { background: var(--surface3); border-color: var(--border3); }
.hamburger-icon { display: flex; flex-direction: column; gap: 4px; }
.hamburger-icon span { display: block; width: 16px; height: 1.5px; background: var(--text2); border-radius: 2px; transition: var(--transition); }

.topbar-title {
  font-size: 15px; font-weight: 700;
  color: var(--text); letter-spacing: -0.02em;
  flex: 1;
}

.topbar-breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px;
}
.topbar-breadcrumb span { color: var(--text3); }
.topbar-breadcrumb strong { color: var(--text); font-weight: 700; }

.topbar-actions { display: flex; align-items: center; gap: 8px; }

.topbar-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; color: var(--text2);
}
.topbar-badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px rgba(52,211,153,0.5);
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.85); }
}

.btn-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--surface2);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
  transition: var(--transition);
  flex-shrink: 0;
}
.btn-icon:hover { background: var(--surface3); border-color: var(--border3); transform: scale(1.04); }

/* ─────────────────────────────────────────────────
   CONTENT SCROLL AREA
───────────────────────────────────────────────── */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* ─────────────────────────────────────────────────
   SKELETON LOADING
───────────────────────────────────────────────── */
@keyframes shimmer {
  0%   { background-position: -800px 0; }
  100% { background-position:  800px 0; }
}
.skel {
  border-radius: 10px;
  background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.6s infinite linear;
}

#page-skeleton {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; background: var(--bg);
  transition: opacity 0.25s ease;
}
#page-skeleton.skel-hidden { opacity: 0; pointer-events: none; }

.skel-sidebar-inner { width: var(--sidebar-w); flex-shrink: 0; height: 100%; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 12px; display: flex; flex-direction: column; gap: 10px; }
.skel-main-inner { flex: 1; display: flex; flex-direction: column; }
.skel-topbar { height: var(--topbar-h); background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.skel-body { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

/* ─────────────────────────────────────────────────
   CONTROLS ROW
───────────────────────────────────────────────── */
.controls-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.controls-left  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.controls-right { display: flex; align-items: center; gap: 8px; }

/* ── Period Pills ── */
.period-tabs {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}
.period-tab {
  padding: 6px 14px;
  border-radius: 7px;
  font-size: 12.5px; font-weight: 700;
  cursor: pointer; border: none;
  background: none; color: var(--text3);
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: var(--transition); white-space: nowrap;
}
.period-tab:hover { color: var(--text2); }
.period-tab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow);
  border: 1px solid var(--border2);
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 9px;
  font-size: 13px; font-weight: 600;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer; border: none;
  transition: var(--transition);
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 0 0 var(--accent-glow);
}
.btn-primary:hover {
  background: #6b5eee;
  box-shadow: 0 4px 16px var(--accent-glow), 0 0 0 0 transparent;
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
}
.btn-secondary:hover {
  background: var(--surface3);
  border-color: var(--border3);
  color: var(--text);
}

.btn-ghost {
  background: var(--accent-dim);
  border: 1px solid rgba(124,111,255,0.2);
  color: var(--accent);
}
.btn-ghost:hover {
  background: rgba(124,111,255,0.18);
  border-color: rgba(124,111,255,0.35);
  transform: translateY(-1px);
}
.btn-ghost:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

/* ─────────────────────────────────────────────────
   KPI GRID
───────────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: var(--transition);
  cursor: default;
}
.kpi-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.025) 0%, transparent 60%);
  pointer-events: none;
}
.kpi-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  border-color: var(--border2);
}
.kpi-card.kpi-accent {
  border-color: rgba(124,111,255,0.2);
  background: linear-gradient(135deg, var(--surface) 0%, rgba(124,111,255,0.04) 100%);
}
.kpi-card.kpi-accent .kpi-icon-wrap { background: var(--accent-dim); border-color: rgba(124,111,255,0.15); }

.kpi-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.kpi-icon-wrap {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.kpi-delta-pill {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.kpi-delta-pill.up   { background: var(--green-dim); color: var(--green); }
.kpi-delta-pill.down { background: var(--red-dim);   color: var(--red); }
.kpi-delta-pill.neutral { background: var(--surface2); color: var(--text3); }

.kpi-label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--text3); margin-bottom: 6px;
}
.kpi-value {
  font-size: 26px; font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -0.04em;
  color: var(--text);
  line-height: 1;
}
.kpi-sub { font-size: 11.5px; color: var(--text3); margin-top: 5px; }

/* Subtle glow line at bottom of accent card */
.kpi-card.kpi-accent .kpi-glow-line {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

/* ─────────────────────────────────────────────────
   CHART SECTION LAYOUT
───────────────────────────────────────────────── */
.charts-row-main { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 12px; }
.charts-row-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

/* ─────────────────────────────────────────────────
   CHART CARD
───────────────────────────────────────────────── */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.chart-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.015) 0%, transparent 60%);
  pointer-events: none;
}
.chart-card:hover { border-color: var(--border2); }

.chart-header {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px; gap: 12px;
}
.chart-title-wrap { display: flex; flex-direction: column; gap: 3px; }
.chart-title { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
.chart-sub { font-size: 11.5px; color: var(--text3); }
.chart-total-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(124,111,255,0.15);
  padding: 4px 10px; border-radius: 7px;
  white-space: nowrap;
}

/* ─────────────────────────────────────────────────
   TOP PRODUCTS
───────────────────────────────────────────────── */
.tp-list { display: flex; flex-direction: column; gap: 0; }
.tp-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
}
.tp-row:last-child { border-bottom: none; padding-bottom: 0; }
.tp-row:first-child { padding-top: 0; }
.tp-row:hover { padding-left: 4px; }

.tp-rank {
  font-size: 10px; font-weight: 800;
  color: var(--text3); width: 16px; text-align: center;
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.tp-thumb {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; overflow: hidden;
}
.tp-thumb img { width: 100%; height: 100%; object-fit: cover; }
.tp-name {
  flex: 1; font-size: 12.5px; font-weight: 600;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tp-bar-wrap {
  width: 60px; height: 4px;
  background: var(--surface2);
  border-radius: 2px; overflow: hidden; flex-shrink: 0;
}
.tp-bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), #a78bfa);
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}
.tp-rev {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px; font-weight: 600;
  color: var(--text2); width: 58px; text-align: right; flex-shrink: 0;
}

/* ─────────────────────────────────────────────────
   STATUS DONUT
───────────────────────────────────────────────── */
.status-wrap {
  display: flex; align-items: center; gap: 20px;
}
.status-canvas-wrap { flex-shrink: 0; }
.status-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.status-row { display: flex; align-items: center; gap: 8px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-name { flex: 1; font-size: 12.5px; font-weight: 500; color: var(--text2); text-transform: capitalize; }
.status-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600; color: var(--text3);
}

/* ─────────────────────────────────────────────────
   DRILLDOWN PANEL
───────────────────────────────────────────────── */
.drilldown {
  background: var(--surface);
  border: 1px solid rgba(124,111,255,0.25);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 12px;
  box-shadow: 0 0 0 1px var(--accent-glow), var(--shadow-lg);
  animation: slideDown 0.22s cubic-bezier(0.4,0,0.2,1) both;
  position: relative; overflow: hidden;
}
.drilldown::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), #a78bfa, transparent);
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.drilldown-header {
  display: flex; align-items: flex-start; gap: 16px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.drilldown-title { font-size: 14px; font-weight: 800; color: var(--text); flex: 1; }
.drilldown-title code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; color: var(--accent);
  background: var(--accent-dim); padding: 2px 7px; border-radius: 5px;
}
.drilldown-kpis { display: flex; gap: 20px; }
.dd-kpi { text-align: center; }
.dd-kpi-val {
  font-size: 20px; font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text); display: block; line-height: 1;
}
.dd-kpi-lbl {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text3); margin-top: 4px; display: block;
}
.drilldown-charts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* ─────────────────────────────────────────────────
   AI INSIGHTS
───────────────────────────────────────────────── */
.insights-panel { margin-bottom: 12px; }
.insight-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 10px;
  transition: var(--transition);
}
.insight-card:hover { border-color: var(--border2); }
.insight-heading {
  font-size: 13px; font-weight: 800; color: var(--text);
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
}
.insight-body { font-size: 13.5px; color: var(--text2); line-height: 1.75; }
.insight-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--text2); line-height: 1.6;
}
.insight-item:last-child { border-bottom: none; padding-bottom: 0; }
.priority-badge {
  font-size: 9.5px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 3px 7px; border-radius: 5px;
  flex-shrink: 0; margin-top: 1px;
}
.ph { background: var(--red-dim); color: var(--red); }
.pm { background: var(--amber-dim); color: var(--amber); }
.pl { background: var(--green-dim); color: var(--green); }

.insights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

/* ─────────────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────────────── */
.empty-state {

.empty-icon { font-size: 44px; opacity: 0.35; margin-bottom: 8px; }

/* ─────────────────────────────────────────────────
   TOAST
───────────────────────────────────────────────── */
#toast-container {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 9999; pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;

  border: 1px solid var(--border2);
  border-radius: 12px;
  font-size: 13.5px; font-weight: 600; color: var(--text);
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(12px);

  pointer-events: auto;

}
.toast.success { border-color: rgba(52,211,153,0.3); }

.toast-icon { font-size: 16px; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(16px) scale(0.96); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateX(0) scale(1); }
  to   { opacity: 0; transform: translateX(16px) scale(0.95); }
}
.toast.closing { animation: toastOut 0.18s ease both; }

───────────────────────────────────────────────── */

<script>
/* ═══════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════ */
let _isDark = localStorage.getItem('ekart_theme') !== 'light'

;(function(){
  if (!_isDark) {
    document.documentElement.setAttribute('data-theme','light')
    document.body.style.background = '#f4f5fa'
  }
})()

function applyTheme(dark) {
  _isDark = dark
  const root = document.documentElement
  if (dark) {
    root.removeAttribute('data-theme')
    document.body.style.background = '#0a0b0f'
  } else {
    root.setAttribute('data-theme','light')
    document.body.style.background = '#f4f5fa'
  }
  const btn = document.getElementById('themeToggleBtn')
  if (btn) btn.textContent = dark ? '🌙' : '☀️'
  localStorage.setItem('ekart_theme', dark ? 'dark' : 'light')
}
function toggleTheme() {
  applyTheme(!_isDark)
  if (currentStoreId) loadAnalyticsWithTransition()
}
applyTheme(_isDark)

/* ═══════════════════════════════════════════════
   SIDEBAR MOBILE CONTROLS
═══════════════════════════════════════════════ */
function openSidebar() {
  const sidebar  = document.getElementById('sidebar')
  const overlay  = document.getElementById('sidebarOverlay')
  sidebar.classList.add('open')
  overlay.classList.add('visible')
  document.body.style.overflow = 'hidden'
}
function closeSidebar() {
  const sidebar  = document.getElementById('sidebar')
  const overlay  = document.getElementById('sidebarOverlay')
  sidebar.classList.remove('open')
  overlay.classList.remove('visible')
  document.body.style.overflow = ''
}

/* Close sidebar when a nav link is clicked on mobile */
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    if (window.innerWidth < 768) closeSidebar()
  })
})

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container')
  const icons = { success: '✅', error: '❌', info: 'ℹ️' }
  const el = document.createElement('div')
  el.className = `toast ${type}`
  el.innerHTML = `<span class="toast-icon">${icons[type] || 'ℹ️'}</span><span>${msg}</span>`
  container.appendChild(el)
  setTimeout(() => {
    el.classList.add('closing')
    setTimeout(() => el.remove(), 200)
  }, 3400)
}

/* ═══════════════════════════════════════════════
   SKELETON
═══════════════════════════════════════════════ */
function hideSkeleton() {
  const skel = document.getElementById('page-skeleton')
  if (!skel) return
  skel.classList.add('skel-hidden')
  setTimeout(() => skel.remove(), 280)
}

const FADE = 160
function fadeOut(el) {
  return new Promise(resolve => {
    el.style.transition    = `opacity ${FADE}ms ease, transform ${FADE}ms ease`
    el.style.opacity       = '0'
    el.style.transform     = 'translateY(-5px)'
    el.style.pointerEvents = 'none'
    setTimeout(resolve, FADE)
  })
}
function fadeIn(el) {
  el.style.transition    = 'none'
  el.style.opacity       = '0'
  el.style.transform     = 'translateY(6px)'
  el.style.display       = ''
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.transition    = `opacity ${FADE + 40}ms ease, transform ${FADE + 40}ms ease`
    el.style.opacity       = '1'
    el.style.transform     = 'translateY(0)'
    el.style.pointerEvents = ''
  }))
}

function inlineSkeletonHTML() {
  return `
    <div class="skel" style="height:48px;border-radius:12px;margin-bottom:20px;"></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
      <div class="skel" style="height:96px;border-radius:16px;"></div>
      <div class="skel" style="height:96px;border-radius:16px;opacity:.8;"></div>
      <div class="skel" style="height:96px;border-radius:16px;opacity:.6;"></div>
      <div class="skel" style="height:96px;border-radius:16px;opacity:.4;"></div>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px;">
      <div class="skel" style="height:200px;border-radius:16px;"></div>
      <div class="skel" style="height:200px;border-radius:16px;opacity:.7;"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="skel" style="height:180px;border-radius:16px;opacity:.55;"></div>
      <div class="skel" style="height:180px;border-radius:16px;opacity:.38;"></div>
    </div>`
}

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let currentStoreId = ''
let analyticsDays  = 7
let _loadToken     = 0
let _chartRev    = null, _chartOrd = null, _chartStatus = null
let _ddHourly    = null, _ddBar    = null, _ddPie       = null

function destroyAllCharts() {
  [
    [() => _chartRev,    v => _chartRev    = v],
    [() => _chartOrd,    v => _chartOrd    = v],
    [() => _chartStatus, v => _chartStatus = v],
    [() => _ddHourly,    v => _ddHourly    = v],
    [() => _ddBar,       v => _ddBar       = v],
    [() => _ddPie,       v => _ddPie       = v],
  ].forEach(([get, set]) => {
    const c = get(); if (c) { try { c.destroy() } catch(_) {} set(null) }
  })
}

function setStoreLoading(on) {
  const wrap = document.getElementById('store-select-wrap')
  if (wrap) on ? wrap.classList.add('loading') : wrap.classList.remove('loading')
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('analytics', (id) => {
    currentStoreId = id
    loadAnalyticsWithTransition()
  })
  if (!nav) { hideSkeleton(); return }
  currentStoreId = nav.currentStoreId
  applyTheme(_isDark)
  renderShell()
  if (currentStoreId) await loadAnalyticsFirstLoad()
  else hideSkeleton()
})

/* ═══════════════════════════════════════════════
   FIRST LOAD
═══════════════════════════════════════════════ */
async function loadAnalyticsFirstLoad() {
  const token   = ++_loadToken
  const content = document.getElementById('page-content')
  setStoreLoading(true)
  try {
    const data = await apiFetch(`/stores/${currentStoreId}/analytics?days=${analyticsDays}`)
    if (token !== _loadToken) return
    renderShell()
    await renderAnalyticsData(data, token)
    if (token !== _loadToken) return
    content.style.display = ''
    requestAnimationFrame(() => hideSkeleton())
  } catch(e) {
    if (token !== _loadToken) return
    hideSkeleton()
    content.innerHTML = errorHTML(e.message)
    content.style.display = ''
    toast('Analytics error: ' + e.message, 'error')
  } finally {
    if (token === _loadToken) setStoreLoading(false)
  }
}

/* ═══════════════════════════════════════════════
   STORE SWITCH TRANSITION
═══════════════════════════════════════════════ */
async function loadAnalyticsWithTransition() {
  const token   = ++_loadToken
  const content = document.getElementById('page-content')
  const isFirst = content.style.display === 'none'
  if (isFirst) { await loadAnalyticsFirstLoad(); return }
  setStoreLoading(true)
  destroyAllCharts()
  await fadeOut(content)
  if (token !== _loadToken) return
  content.innerHTML = inlineSkeletonHTML()
  fadeIn(content)
  try {
    const data = await apiFetch(`/stores/${currentStoreId}/analytics?days=${analyticsDays}`)
    if (token !== _loadToken) return
    await fadeOut(content)
    if (token !== _loadToken) return
    renderShell()
    await renderAnalyticsData(data, token)
    if (token !== _loadToken) return
    fadeIn(content)
  } catch(e) {
    if (token !== _loadToken) return
    content.innerHTML = errorHTML(e.message)
    fadeIn(content)
    toast('Analytics error: ' + e.message, 'error')
  } finally {
    if (token === _loadToken) setStoreLoading(false)
  }
}

function errorHTML(msg) {
  return `<div class="empty-state">
    <div class="empty-icon">⚠️</div>
    <div class="empty-title">Failed to load analytics</div>
    <div class="empty-sub">${msg}</div>
  </div>`
}

/* ═══════════════════════════════════════════════
   RENDER DATA
═══════════════════════════════════════════════ */
async function renderAnalyticsData(data, token) {
  const { gridColor, tickColor } = chartDefaults()
  const CUR    = '₹'
  const ACCENT = '#7c6fff'

  if (!document.getElementById('revenueChart')) return

  /* ── KPIs ── */
  const kpis     = document.querySelectorAll('.kpi-card')
  const revDelta = (data.today_revenue || 0) - (data.yesterday_revenue || 0)
  const ordDelta = (data.today_orders  || 0) - (data.yesterday_orders  || 0)

  function deltaHTML(val, prefix = '') {
    const cls = val > 0 ? 'up' : val < 0 ? 'down' : 'neutral'
    const arrow = val >= 0 ? '↑' : '↓'
    return `<div class="kpi-delta-pill ${cls}">${arrow} ${prefix}${Math.abs(val).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>`
  }

  if (kpis[0]) kpis[0].innerHTML = `
    <div class="kpi-header"><div class="kpi-icon-wrap">💰</div>${deltaHTML(revDelta, CUR)}</div>
    <div class="kpi-label">Total Revenue</div>
    <div class="kpi-value">${CUR}${(data.total_revenue||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
    <div class="kpi-sub">vs yesterday</div>
    <div class="kpi-glow-line"></div>`

  if (kpis[1]) kpis[1].innerHTML = `
    <div class="kpi-header"><div class="kpi-icon-wrap">📦</div>${deltaHTML(ordDelta)}</div>
    <div class="kpi-label">Total Orders</div>
    <div class="kpi-value">${(data.total_orders||0).toLocaleString()}</div>
    <div class="kpi-sub">vs yesterday</div>`

  if (kpis[2]) kpis[2].innerHTML = `
    <div class="kpi-header"><div class="kpi-icon-wrap">🕐</div><div class="kpi-delta-pill neutral">Today</div></div>
    <div class="kpi-label">Today's Orders</div>
    <div class="kpi-value">${data.today_orders||0}</div>
    <div class="kpi-sub">Since midnight</div>`

  if (kpis[3]) kpis[3].innerHTML = `
    <div class="kpi-header"><div class="kpi-icon-wrap">🛍️</div><div class="kpi-delta-pill neutral">Catalog</div></div>
    <div class="kpi-label">Active Products</div>
    <div class="kpi-value">${data.product_count||0}</div>
    <div class="kpi-sub">Listed items</div>`

  /* ── Make first card accent ── */
  kpis[0]?.classList.add('kpi-accent')

  /* ── Daily series ── */
  const filled = []
  const today  = new Date()
  for (let i = analyticsDays - 1; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i)
    const key = d.toISOString().slice(0,10)
    const f = (data.daily_stats||[]).find(s => s._id === key)
    filled.push({ date: key, label: key.slice(5), revenue: f?.revenue||0, orders: f?.orders||0 })
  }
  const labels  = filled.map(d => d.label)
  const revVals = filled.map(d => d.revenue)
  const ordVals = filled.map(d => d.orders)

  document.getElementById('revTotal').textContent = CUR + revVals.reduce((a,b)=>a+b,0).toLocaleString('en-IN',{maximumFractionDigits:0})
  document.getElementById('ordTotal').textContent = ordVals.reduce((a,b)=>a+b,0) + ' orders'

  if (token !== undefined && token !== _loadToken) return

  /* ── Revenue Chart ── */
  if (_chartRev) { _chartRev.destroy(); _chartRev = null }
  _chartRev = new Chart(document.getElementById('revenueChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: revVals,
        borderColor: ACCENT,
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height)
          g.addColorStop(0, ACCENT + '28'); g.addColorStop(1, ACCENT + '00')
          return g
        },
        borderWidth: 2.5, pointBackgroundColor: ACCENT, pointBorderColor: 'var(--surface)',
        pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 7,
        fill: true, tension: 0.42
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d2e', borderColor: 'rgba(124,111,255,0.2)', borderWidth: 1,
          padding: 10, titleFont: { family:'Plus Jakarta Sans', weight:'700', size:12 },
          bodyFont: { family:'JetBrains Mono', size:13 },
          callbacks: {
            label: ctx => ` ${CUR}${ctx.parsed.y.toLocaleString('en-IN',{maximumFractionDigits:0})}`,
            afterLabel: () => '  Click to drill down'
          }
        }
      },
      scales: {
        x: { grid:{color:gridColor,drawBorder:false}, ticks:{font:{family:'JetBrains Mono',size:10},color:tickColor,maxTicksLimit:7} },
        y: { grid:{color:gridColor,drawBorder:false}, ticks:{font:{family:'JetBrains Mono',size:10},color:tickColor,callback:v=>CUR+(v>=1000?(v/1000).toFixed(1)+'k':v)} }
      },
      onClick: (evt, els) => { if (els.length) loadDayDrilldown(filled[els[0].index].date, CUR) }
    }
  })

  /* ── Orders Chart ── */
  if (_chartOrd) { _chartOrd.destroy(); _chartOrd = null }
  _chartOrd = new Chart(document.getElementById('ordersChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: ordVals,
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height)
          g.addColorStop(0,'#60a5fa'); g.addColorStop(1,'#60a5fa50')
          return g
        },
        hoverBackgroundColor: '#3b82f6',
        borderRadius: 7, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d2e', borderColor: 'rgba(96,165,250,0.2)', borderWidth: 1,
          padding: 10, titleFont: { family:'Plus Jakarta Sans', weight:'700', size:12 },
          bodyFont: { family:'JetBrains Mono', size:13 },
          callbacks: {
            label: ctx => ` ${ctx.parsed.y} orders`,
            afterLabel: () => '  Click to drill down'
          }
        }
      },
      scales: {
        x: { grid:{color:gridColor,drawBorder:false}, ticks:{font:{family:'JetBrains Mono',size:10},color:tickColor,maxTicksLimit:7} },
        y: { grid:{color:gridColor,drawBorder:false}, beginAtZero:true, ticks:{font:{family:'JetBrains Mono',size:10},color:tickColor,stepSize:1} }
      },
      onClick: (evt, els) => { if (els.length) loadDayDrilldown(filled[els[0].index].date, CUR) }
    }
  })

  /* ── Top Products ── */
  const tops   = data.top_products || []
  const maxRev = Math.max(...tops.map(p=>p.revenue), 1)
  const tpWrap = document.getElementById('topProdsChart')
  tpWrap.className = 'tp-list'
  tpWrap.innerHTML = tops.length
    ? tops.map((p, i) => `
        <div class="tp-row">
          <div class="tp-rank">#${i+1}</div>
          <div class="tp-thumb">${p.image ? `<img src="${p.image}" alt="">` : '📦'}</div>
          <div class="tp-name" title="${p.name}">${p.name}</div>
          <div class="tp-bar-wrap"><div class="tp-bar-fill" style="width:${Math.max((p.revenue/maxRev)*100,4)}%"></div></div>
          <div class="tp-rev">${CUR}${p.revenue.toFixed(0)}</div>
        </div>`).join('')
    : '<div class="empty-state" style="padding:32px 0;"><div class="empty-icon" style="font-size:32px;">📦</div><div class="empty-sub">No orders in this period</div></div>'

  /* ── Status Donut ── */
  const STATUS_COLORS = { pending:'#fbbf24', confirmed:'#a78bfa', processing:'#60a5fa', shipped:'#38bdf8', delivered:'#34d399', cancelled:'#f87171' }
  const breakdown = data.status_breakdown || []
  if (_chartStatus) { _chartStatus.destroy(); _chartStatus = null }
  if (breakdown.length) {
    _chartStatus = new Chart(document.getElementById('statusChart'), {
      type: 'doughnut',
      data: {
        labels: breakdown.map(s=>s._id),
        datasets:[{
          data: breakdown.map(s=>s.count),
          backgroundColor: breakdown.map(s=>STATUS_COLORS[s._id]||'#94a3b8'),
          borderWidth: 0, hoverOffset: 8,
          borderRadius: 3
        }]
      },
      options: {
        responsive: false, cutout: '68%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1d2e', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
            padding: 10, bodyFont: { family:'Plus Jakarta Sans', size:13 },
            callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed}` }
          }
        }
      }
    })
    document.getElementById('statusLegend').innerHTML = breakdown.map(s=>`
      <div class="status-row">
        <div class="status-dot" style="background:${STATUS_COLORS[s._id]||'#94a3b8'};"></div>
        <span class="status-name">${s._id}</span>
        <span class="status-count">${s.count}</span>
      </div>`).join('')
  } else {
    document.getElementById('statusLegend').innerHTML = '<div style="color:var(--text3);font-size:13px;">No orders yet</div>'
  }
}

/* ═══════════════════════════════════════════════
   DRILLDOWN
═══════════════════════════════════════════════ */
async function loadDayDrilldown(date, cur = '₹') {
  if (!currentStoreId) return
  const panel = document.getElementById('drilldownPanel')
  panel.style.display = 'block'
  panel.innerHTML = `<div class="drilldown"><div class="loading-card"><div class="loader-ring"></div> Loading ${date}…</div></div>`
  panel.scrollIntoView({ behavior:'smooth', block:'nearest' })
  try {
    const data = await apiFetch(`/stores/${currentStoreId}/analytics/day?date=${date}`)
    const { gridColor, tickColor } = chartDefaults()
    const ACCENT = '#7c6fff'
    const BARS   = ['#7c6fff','#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#38bdf8','#fb923c']

    panel.innerHTML = `<div class="drilldown">
      <div class="drilldown-header">
        <div class="drilldown-title">🔎 Daily Breakdown — <code>${date}</code></div>
        <div class="drilldown-kpis">
          <div class="dd-kpi"><span class="dd-kpi-val">${cur}${(data.total_revenue||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</span><span class="dd-kpi-lbl">Revenue</span></div>
          <div class="dd-kpi"><span class="dd-kpi-val">${data.total_orders||0}</span><span class="dd-kpi-lbl">Orders</span></div>
          <div class="dd-kpi"><span class="dd-kpi-val">${data.total_qty||0}</span><span class="dd-kpi-lbl">Items</span></div>
        </div>
        <button class="btn btn-secondary btn-close-drill" onclick="closeDrilldown()">✕ Close</button>
      </div>
      <div class="drilldown-charts">
        <div class="chart-card"><div class="chart-title" style="margin-bottom:14px;">🕐 Hourly Activity</div><canvas id="ddHourly" height="130"></canvas></div>
        <div class="chart-card"><div class="chart-title" style="margin-bottom:14px;">📦 Products Sold</div><canvas id="ddBar" height="130"></canvas></div>
        <div class="chart-card"><div class="chart-title" style="margin-bottom:14px;">💰 Revenue Split</div>
          <div style="display:flex;align-items:center;gap:14px;">
            <canvas id="ddPie" width="140" height="140" style="flex-shrink:0;"></canvas>
            <div id="ddPieLegend" style="flex:1;overflow:hidden;"></div>
          </div>
        </div>
      </div>
    </div>`

    const hours   = Array.from({length:24},(_,i)=>i)
    const hOrders = hours.map(h=>(data.hourly_stats||[]).find(x=>x._id===h)?.orders||0)
    const hRev    = hours.map(h=>(data.hourly_stats||[]).find(x=>x._id===h)?.revenue||0)
    const hLabels = hours.map(h=>h===0?'12a':h<12?h+'a':h===12?'12p':(h-12)+'p')

    if (_ddHourly) { _ddHourly.destroy(); _ddHourly = null }
    _ddHourly = new Chart(document.getElementById('ddHourly'), {
      type:'bar',
      data:{ labels:hLabels, datasets:[
        {type:'bar',label:'Orders',data:hOrders,backgroundColor:'#60a5fa55',borderRadius:3,borderSkipped:false,yAxisID:'yO'},
        {type:'line',label:'Revenue',data:hRev,borderColor:ACCENT,backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:0.4,yAxisID:'yR'}
      ]},
      options:{
        responsive:true, maintainAspectRatio:true,
        plugins:{
          legend:{position:'top',labels:{font:{family:'Plus Jakarta Sans',size:11},boxWidth:10,color:'var(--text2)'}},
          tooltip:{backgroundColor:'#1a1d2e',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,
            callbacks:{label:ctx=>ctx.dataset.label==='Revenue'?` ${cur}${ctx.parsed.y.toFixed(0)}`:`${ctx.parsed.y} orders`}}
        },
        scales:{
          x:{grid:{color:gridColor,drawBorder:false},ticks:{font:{family:'JetBrains Mono',size:9},color:tickColor,maxTicksLimit:12}},
          yO:{position:'left',beginAtZero:true,grid:{color:gridColor,drawBorder:false},ticks:{font:{family:'JetBrains Mono',size:9},color:tickColor,stepSize:1}},
          yR:{position:'right',beginAtZero:true,grid:{display:false},ticks:{font:{family:'JetBrains Mono',size:9},color:tickColor,callback:v=>cur+(v>=1000?(v/1000).toFixed(1)+'k':v)}}
        }
      }
    })

    const prods = (data.products_sold||[]).slice(0,8)
    if (_ddBar) { _ddBar.destroy(); _ddBar = null }
    _ddBar = new Chart(document.getElementById('ddBar'), {
      type:'bar',
      data:{labels:prods.map(p=>p.name.length>13?p.name.slice(0,12)+'…':p.name),datasets:[{label:'Qty',data:prods.map(p=>p.qty),backgroundColor:BARS,borderRadius:5,borderSkipped:false}]},
      options:{
        responsive:true,maintainAspectRatio:true,indexAxis:'y',
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d2e',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,callbacks:{label:ctx=>` ${ctx.parsed.x} units`}}},
        scales:{
          x:{grid:{color:gridColor,drawBorder:false},beginAtZero:true,ticks:{font:{family:'JetBrains Mono',size:9},color:tickColor,stepSize:1}},
          y:{grid:{display:false},ticks:{font:{family:'Plus Jakarta Sans',size:10},color:'#6b7a9e'}}
        }
      }
    })

    const pieProds = (data.products_sold||[]).slice(0,6)
    if (_ddPie) { _ddPie.destroy(); _ddPie = null }
    if (pieProds.length) {
      _ddPie = new Chart(document.getElementById('ddPie'), {
        type:'doughnut',
        data:{labels:pieProds.map(p=>p.name),datasets:[{data:pieProds.map(p=>p.revenue),backgroundColor:BARS,borderWidth:0,hoverOffset:6,borderRadius:3}]},
        options:{responsive:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d2e',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,callbacks:{label:ctx=>` ${cur}${ctx.parsed.toFixed(0)}`}}}}
      })
      document.getElementById('ddPieLegend').innerHTML = pieProds.map((p,i)=>`
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px;font-size:11.5px;">
          <div style="width:7px;height:7px;border-radius:50%;background:${BARS[i]};flex-shrink:0;"></div>
          <span style="flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.name}">${p.name}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);">${cur}${p.revenue.toFixed(0)}</span>
        </div>`).join('')
    }
  } catch(e) { toast('Drill-down error: ' + e.message, 'error') }
}

function closeDrilldown() {
  [_ddHourly,_ddBar,_ddPie].forEach(c => { if(c){try{c.destroy()}catch(_){}}} )
  _ddHourly = _ddBar = _ddPie = null
  const panel = document.getElementById('drilldownPanel')
  if (panel) panel.style.display = 'none'
}

    const r = await apiFetch('/ai/sales-insights', {
      method:'POST',
      body: JSON.stringify({ analytics, store_name: store?.name||'Store', currency: store?.currency||'INR' })
    })
    const d  = r.insights
    const pc = p => p==='high'?'ph':p==='medium'?'pm':'pl'

    panel.innerHTML = `

      <div class="insights-grid">
        <div class="insight-card">
          <div class="insight-heading">✅ What's Working</div>
          ${(d.wins||[]).map(w=>`<div class="insight-item"><span>🟢</span><span>${w}</span></div>`).join('')}
        </div>
        <div class="insight-card">
          <div class="insight-heading">🔧 Areas to Improve</div>
          ${(d.improvements||[]).map(i=>`<div class="insight-item"><span>🔸</span><span>${i}</span></div>`).join('')}
        </div>
      </div>
      <div class="insight-card">
        <div class="insight-heading">🎯 Recommended Actions</div>
        ${(d.actions||[]).map(a=>`
          <div class="insight-item">
            <span class="priority-badge ${pc(a.priority)}">${a.priority}</span>
            <div>
              <div style="font-weight:700;font-size:13px;margin-bottom:3px;color:var(--text);">${a.action}</div>
              <div style="font-size:12px;color:var(--text3);">${a.reason}</div>
            </div>
          </div>`).join('')}
      </div>`
    panel.style.display = 'block'
    panel.scrollIntoView({ behavior:'smooth', block:'start' })
  } catch(e) { toast('Insights failed: ' + e.message, 'error') }
  btn.disabled = false
  btn.innerHTML = '🧠 AI Insights'
}

/* ═══════════════════════════════════════════════
   EXPORT CSV
═══════════════════════════════════════════════ */
function exportAnalyticsCSV() {
  if (!_chartRev || !_chartOrd) { toast('Load analytics first','error'); return }
  const today = new Date(), dates = []
  for (let i = analyticsDays - 1; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i)
    dates.push(d.toISOString().slice(0,10))
  }
  const revData = _chartRev.data.datasets[0].data
  const ordData = _chartOrd.data.datasets[0].data
  const rows    = [['Date','Revenue (₹)','Orders']]
  dates.forEach((date, i) => rows.push([date, (revData[i]||0).toFixed(2), ordData[i]||0]))
  const csv = rows.map(r=>r.join(',')).join('\n')
  const a   = Object.assign(document.createElement('a'), {
    href: 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv),
    download: `analytics-${analyticsDays}d-${new Date().toISOString().slice(0,10)}.csv`
  })
  a.click()
  toast('CSV downloaded!','success')
}
</script>

<!DOCTYPE html>
<html lang="en" style="background:#080910">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKart — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">

<script>
(function(){
  if (localStorage.getItem('ekart_theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light')
    document.documentElement.style.background = '#f0f0f5'
  }
})()
</script>

<style>
/* ══════════════════════════════════════════════
   SKELETON — mirrors sidebar + topbar + content
   exactly so there is zero layout shift on load
══════════════════════════════════════════════ */
@keyframes skel-shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position:  600px 0; }
}
.skel {
  border-radius: 6px;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0.04) 25%,
    rgba(255,255,255,0.09) 50%,
    rgba(255,255,255,0.04) 75%
  );
  background-size: 600px 100%;
  animation: skel-shimmer 1.4s infinite linear;
}
[data-theme="light"] .skel {
  background: linear-gradient(
    90deg,
    rgba(0,0,0,0.06) 25%,
    rgba(0,0,0,0.11) 50%,
    rgba(0,0,0,0.06) 75%
  );
  background-size: 600px 100%;
  animation: skel-shimmer 1.4s infinite linear;
}

#page-skeleton {
  position: fixed;
  inset: 0;
  display: flex;
  z-index: 9999;
  background: inherit;
  transition: opacity .25s ease;
}
#page-skeleton.skel-hidden {
  opacity: 0;
  pointer-events: none;
}

/* Sidebar replica */
.skel-sidebar {
  width: 240px;
  flex-shrink: 0;
  height: 100%;
  background: #0d0e18;
  border-right: 1px solid rgba(255,255,255,0.06);
  padding: 20px 14px;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
}
[data-theme="light"] .skel-sidebar {
  background: #fff;
  border-right-color: rgba(0,0,0,0.09);
}

/* Main area replica */
.skel-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Topbar replica */
.skel-topbar {
  height: 60px;
  flex-shrink: 0;
  background: #0d0e18;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  box-sizing: border-box;
}
[data-theme="light"] .skel-topbar {
  background: #fff;
  border-bottom-color: rgba(0,0,0,0.09);
}

/* Content body */
.skel-body {
  flex: 1;
  padding: 24px;
  overflow: hidden;
  box-sizing: border-box;
}

/* Sidebar internal helpers */
.skel-sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 14px;
}
[data-theme="light"] .skel-sidebar-user { border-bottom-color: rgba(0,0,0,0.08); }
.skel-sidebar-user-text { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.skel-nav-rows { display: flex; flex-direction: column; gap: 4px; }

/* ══════════════════════════════════════════════
   LIGHT THEME OVERRIDES
══════════════════════════════════════════════ */
[data-theme="light"] {
  --surface:  #ffffff;
  --surface2: #f3f4f6;
  --surface3: #e9eaf0;
  --border:   rgba(0,0,0,0.10);
  --border2:  rgba(0,0,0,0.14);
  --text:     #111827;
  --text2:    #374151;
  --text3:    #9ca3af;
  --accent:   #6c63ff;
  --accent2:  #5b52e0;
  --green:    #16a34a;
  --red:      #dc2626;
  --yellow:   #ca8a04;
  background: #f0f0f5 !important;
}
[data-theme="light"] body { background: #f0f0f5 !important; }
[data-theme="light"] .sidebar { background: #fff !important; border-right-color: rgba(0,0,0,0.09) !important; }
[data-theme="light"] .main-wrap { background: #f0f0f5 !important; }
[data-theme="light"] .topbar { background: #fff !important; border-bottom-color: rgba(0,0,0,0.09) !important; }
[data-theme="light"] .topbar-title { color: #111827 !important; }
[data-theme="light"] .content { background: #f0f0f5 !important; }
[data-theme="light"] .nav-item { color: #374151 !important; }
[data-theme="light"] .nav-item:hover,
[data-theme="light"] .nav-item.active { background: rgba(108,99,255,0.08) !important; color: #5b52e0 !important; }
[data-theme="light"] .sidebar-logo { color: #111827 !important; }
[data-theme="light"] .sidebar-user-name { color: #111827 !important; }
[data-theme="light"] .sidebar-user-email { color: #9ca3af !important; }
[data-theme="light"] .nav-section-label { color: #9ca3af !important; }
[data-theme="light"] .btn-logout { color: #374151 !important; }
[data-theme="light"] .store-select-wrap { background: #f3f4f6 !important; border-color: rgba(0,0,0,0.12) !important; }
[data-theme="light"] .store-selector { color: #111827 !important; background: transparent !important; }
[data-theme="light"] .store-select-label { color: #9ca3af !important; }
[data-theme="light"] .kpi-card { background: #fff !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .kpi-label { color: #9ca3af !important; }
[data-theme="light"] .kpi-value { color: #111827 !important; }
[data-theme="light"] .kpi-delta.neutral { color: #9ca3af !important; }
[data-theme="light"] .chart-card { background: #fff !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .chart-title { color: #374151 !important; }
[data-theme="light"] .tp-name { color: #111827 !important; }
[data-theme="light"] .tp-bar-wrap { background: #e9eaf0 !important; }
[data-theme="light"] .tp-val { color: #374151 !important; }
[data-theme="light"] .status-leg-name { color: #374151 !important; }
[data-theme="light"] .day-tab { color: #6b7280 !important; border-color: rgba(0,0,0,0.12) !important; }
[data-theme="light"] .day-tab.active { background: #6c63ff !important; color: #fff !important; border-color: #6c63ff !important; }
[data-theme="light"] .controls-row { background: #fff !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .drilldown { background: #fff !important; border-color: #6c63ff !important; }
[data-theme="light"] .drilldown-title { color: #111827 !important; }
[data-theme="light"] .insight-card { background: #fff !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .insight-title { color: #111827 !important; }
[data-theme="light"] .insight-item { border-color: rgba(0,0,0,0.06) !important; color: #374151 !important; }
[data-theme="light"] .btn-ai-sm { background: rgba(108,99,255,0.1) !important; color: #5b52e0 !important; border-color: rgba(108,99,255,0.25) !important; }

/* ── THEME TOGGLE ── */
.theme-toggle {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; flex-shrink: 0;
  transition: all .2s;
}
.theme-toggle:hover {
  border-color: rgba(108,99,255,0.4);
  background: rgba(108,99,255,0.08);
  transform: rotate(12deg) scale(1.05);
}
[data-theme="light"] .theme-toggle {
  background: #f3f4f6; border-color: rgba(0,0,0,0.12); color: #374151;
}

/* ══════════════════════════════════════════════
   PAGE CONTENT TRANSITIONS
══════════════════════════════════════════════ */
#page-content {
  will-change: opacity, transform;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page-enter { animation: pageIn .3s ease both; }

/* ── STORE SELECTOR LOADING INDICATOR ── */
.store-loading { position: relative; }
.store-loading::after {
  content: '';
  position: absolute;
  right: -20px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(108,99,255,0.25);
  border-top-color: var(--accent, #6c63ff);
  animation: spin .65s linear infinite;
  pointer-events: none;
}

/* ══════════════════════════════════════════════
   ANALYTICS — PRODUCTION GRADE
══════════════════════════════════════════════ */

/* ── CONTROLS ROW ── */
.controls-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 16px;
}
.controls-left  { display: flex; align-items: center; gap: 8px; }
.controls-right { display: flex; align-items: center; gap: 8px; }

/* ── DAY TABS ── */
.day-tabs { display: flex; gap: 4px; }
.day-tab {
  padding: 6px 14px; border-radius: 8px;
  font-size: 12.5px; font-weight: 700;
  cursor: pointer; border: 1.5px solid var(--border2);
  background: none; color: var(--text3);
  font-family: 'Outfit', sans-serif;
  transition: all .15s;
}
.day-tab:hover { color: var(--text2); border-color: rgba(108,99,255,0.3); }
.day-tab.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 2px 10px rgba(108,99,255,0.3); }

/* ── AI INSIGHTS BUTTON ── */
.btn-ai-sm {
  padding: 7px 14px; border-radius: 9px;
  background: rgba(108,99,255,0.1);
  border: 1.5px solid rgba(108,99,255,0.25);
  color: var(--accent2); font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Outfit', sans-serif;
  transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-ai-sm:hover:not(:disabled) { background: rgba(108,99,255,0.18); transform: translateY(-1px); }
.btn-ai-sm:disabled { opacity: .6; cursor: not-allowed; }

.btn-export {
  padding: 7px 14px; border-radius: 9px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  color: var(--text2); font-size: 12.5px; font-weight: 700;
  cursor: pointer; font-family: 'Outfit', sans-serif;
  transition: all .2s;
}
.btn-export:hover { border-color: rgba(108,99,255,0.3); color: var(--accent); }

/* ── KPI GRID ── */
.kpi-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin-bottom: 20px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px;
  display: flex; align-items: center; gap: 14px;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  position: relative; overflow: hidden;
}
.kpi-card.accent { border-color: rgba(108,99,255,0.2); background: linear-gradient(135deg,rgba(108,99,255,0.06),rgba(108,99,255,0.02)); }
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.14); }
.kpi-icon { font-size: 28px; flex-shrink: 0; }
.kpi-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 5px; }
.kpi-value { font-size: 23px; font-weight: 900; font-family: 'DM Mono', monospace; letter-spacing: -0.04em; color: var(--text); }
.kpi-delta { font-size: 11.5px; font-weight: 600; margin-top: 3px; display: flex; align-items: center; gap: 3px; }
.kpi-delta.up      { color: #34d399; }
.kpi-delta.down    { color: #f87171; }
.kpi-delta.neutral { color: var(--text3); }

/* ── CHART LAYOUT ── */
.charts-main   { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 14px; }
.charts-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }

/* ── CHART CARD ── */
.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px;
  transition: border-color .2s;
}
.chart-card:hover { border-color: rgba(108,99,255,0.2); }
.chart-title {
  font-size: 12.5px; font-weight: 700; color: var(--text2);
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.chart-total { font-size: 12px; font-weight: 700; color: var(--accent2); font-family: 'DM Mono', monospace; }

/* ── TOP PRODUCTS ── */
.tp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.tp-row:last-child { margin-bottom: 0; }
.tp-rank { font-size: 10.5px; font-weight: 800; color: var(--text3); width: 18px; text-align: center; }
.tp-img {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; overflow: hidden; border: 1px solid var(--border);
}
.tp-img img { width: 100%; height: 100%; object-fit: cover; }
.tp-name { flex: 1; font-size: 12.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tp-bar-wrap { width: 72px; height: 6px; background: var(--surface2); border-radius: 3px; flex-shrink: 0; overflow: hidden; }
.tp-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #a259ff); transition: width .6s; }
.tp-val { font-size: 11.5px; font-weight: 700; color: var(--text2); font-family: 'DM Mono', monospace; width: 64px; text-align: right; }

/* ── STATUS DONUT ── */
.status-donut-wrap { display: flex; align-items: center; gap: 16px; }
.status-donut-wrap canvas { flex-shrink: 0; }
.status-legend { display: flex; flex-direction: column; gap: 9px; flex: 1; }
.status-leg-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.status-leg-name { flex: 1; color: var(--text2); font-weight: 600; text-transform: capitalize; }
.status-leg-val  { font-family: 'DM Mono', monospace; font-size: 11.5px; color: var(--text3); font-weight: 700; }

/* ── DRILLDOWN ── */
.drilldown {
  background: var(--surface);
  border: 2px solid var(--accent);
  border-radius: 18px; padding: 22px;
  margin-bottom: 14px;
  animation: slideDown .25s ease;
  box-shadow: 0 8px 32px rgba(108,99,255,0.15);
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.drilldown-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.drilldown-title {
  font-size: 15px; font-weight: 800; flex: 1; color: var(--text);
}
.drilldown-title strong { color: var(--accent2); font-family: 'DM Mono', monospace; }
.drilldown-kpis { display: flex; gap: 22px; }
.dd-kpi { text-align: center; }
.dd-kpi span  { display: block; font-size: 18px; font-weight: 900; font-family: 'DM Mono', monospace; color: var(--text); }
.dd-kpi small { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); }
.drilldown-charts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.btn-close-drill {
  padding: 7px 14px; border-radius: 8px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  color: var(--text2); font-size: 12.5px; font-weight: 700;
  cursor: pointer; font-family: 'Outfit', sans-serif;
  transition: all .15s;
}
.btn-close-drill:hover { border-color: var(--accent); color: var(--accent); }

/* ── AI INSIGHTS PANEL ── */
.ai-insights-panel { margin-bottom: 20px; }
.insight-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 18px;
  margin-bottom: 12px;
}
.insight-title {
  font-size: 13px; font-weight: 800; color: var(--text);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.insight-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
  font-size: 13.5px; color: var(--text2); line-height: 1.5;
}
.insight-item:last-child { border-bottom: none; }
.priority-badge {
  font-size: 10px; font-weight: 800;
  padding: 2px 7px; border-radius: 5px; flex-shrink: 0;
  text-transform: uppercase;
}
.ph { background: rgba(248,113,113,.15); color: #f87171; }
.pm { background: rgba(251,191,36,.15);  color: #fbbf24; }
.pl { background: rgba(52,211,153,.15);  color: #34d399; }

/* ── SPINNER ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinning { animation: spin .7s linear infinite; display: inline-block; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .charts-main, .charts-bottom, .drilldown-charts { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .controls-row { flex-direction: column; align-items: stretch; }
}
@media (max-width: 560px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .day-tabs { flex-wrap: wrap; }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="api.js"></script>
<script src="nav.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════
  SKELETON — perfectly mirrors the real layout:
    skel-sidebar  → .sidebar
    skel-topbar   → .topbar
    skel-body     → .content

  Analytics-specific body shape:
    controls row + 4-col KPIs + 2/1 chart row + 1/1 chart row
══════════════════════════════════════════ -->
<div id="page-skeleton" aria-hidden="true">

  <!-- LEFT: sidebar replica -->
  <div class="skel-sidebar">
    <!-- Logo -->
    <div style="margin-bottom:22px;">
      <div class="skel" style="height:20px;width:72px;border-radius:5px;"></div>
    </div>

    <!-- User row -->
    <div class="skel-sidebar-user">
      <div class="skel" style="width:32px;height:32px;border-radius:50%;flex-shrink:0;"></div>
      <div class="skel-sidebar-user-text">
        <div class="skel" style="height:10px;width:90px;border-radius:4px;"></div>
        <div class="skel" style="height:9px;width:120px;border-radius:4px;"></div>
      </div>
    </div>

    <!-- Section label -->
    <div class="skel" style="height:8px;width:56px;border-radius:4px;margin-bottom:8px;opacity:.45;"></div>

    <!-- Nav items — "Analytics" (5th) is active -->
    <div class="skel-nav-rows">
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
      <div class="skel" style="height:34px;border-radius:9px;opacity:.78;"></div><!-- active -->
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
    </div>

    <div class="skel" style="height:8px;width:64px;border-radius:4px;margin:16px 0 8px;opacity:.45;"></div>
    <div class="skel-nav-rows">
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
    </div>

    <div class="skel" style="height:8px;width:52px;border-radius:4px;margin:16px 0 8px;opacity:.45;"></div>
    <div class="skel-nav-rows">
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
    </div>
  </div>

  <!-- RIGHT: main area replica -->
  <div class="skel-main">

    <!-- Topbar -->
    <div class="skel-topbar">
      <div class="skel" style="height:16px;width:82px;border-radius:5px;"></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="skel" style="height:34px;width:160px;border-radius:9px;opacity:.7;"></div>
        <div class="skel" style="height:34px;width:34px;border-radius:9px;opacity:.5;"></div>
      </div>
    </div>

    <!-- Content body -->
    <div class="skel-body">

      <!-- Controls row -->
      <div class="skel" style="height:52px;border-radius:14px;margin-bottom:20px;opacity:.9;"></div>

      <!-- KPI cards -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;">
        <div class="skel" style="height:88px;border-radius:16px;"></div>
        <div class="skel" style="height:88px;border-radius:16px;opacity:.82;"></div>
        <div class="skel" style="height:88px;border-radius:16px;opacity:.64;"></div>
        <div class="skel" style="height:88px;border-radius:16px;opacity:.46;"></div>
      </div>

      <!-- Main charts row: 2fr + 1fr -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px;">
        <div class="skel" style="height:196px;border-radius:16px;opacity:.9;"></div>
        <div class="skel" style="height:196px;border-radius:16px;opacity:.72;"></div>
      </div>

      <!-- Bottom charts row: 1fr + 1fr -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">

<script>
/* ══════════════════════════════════════════════
   SKELETON DISMISSAL
══════════════════════════════════════════════ */
function hideSkeleton() {
  const skel = document.getElementById('page-skeleton')
  if (!skel) return
  skel.classList.add('skel-hidden')
  setTimeout(() => skel.remove(), 280)
}

/* ══════════════════════════════════════════════
   SMOOTH TRANSITION HELPERS
══════════════════════════════════════════════ */
const FADE_MS = 180

function fadeOut(el) {
  return new Promise(resolve => {
    el.style.transition    = `opacity ${FADE_MS}ms ease, transform ${FADE_MS}ms ease`
    el.style.opacity       = '0'
    el.style.transform     = 'translateY(-6px)'
    el.style.pointerEvents = 'none'
    setTimeout(resolve, FADE_MS)
  })
}

function fadeIn(el) {
  el.style.transition    = 'none'
  el.style.opacity       = '0'
  el.style.transform     = 'translateY(8px)'
  el.style.display       = ''
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.transition    = `opacity ${FADE_MS + 40}ms ease, transform ${FADE_MS + 40}ms ease`
      el.style.opacity       = '1'
      el.style.transform     = 'translateY(0)'
      el.style.pointerEvents = ''
    })
  })
}

/* ══════════════════════════════════════════════
   INLINE SKELETON for store-switch
   Mirrors the analytics layout: controls + KPIs
   + main charts (2fr/1fr) + bottom charts (1/1)
══════════════════════════════════════════════ */
function inlineSkeletonHTML() {
  return `
    <div class="skel" style="height:52px;border-radius:14px;margin-bottom:20px;"></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;">
      <div class="skel" style="height:88px;border-radius:16px;"></div>
      <div class="skel" style="height:88px;border-radius:16px;opacity:.82;"></div>
      <div class="skel" style="height:88px;border-radius:16px;opacity:.64;"></div>
      <div class="skel" style="height:88px;border-radius:16px;opacity:.46;"></div>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px;">
      <div class="skel" style="height:196px;border-radius:16px;opacity:.9;"></div>
      <div class="skel" style="height:196px;border-radius:16px;opacity:.72;"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="skel" style="height:176px;border-radius:16px;opacity:.58;"></div>
      <div class="skel" style="height:176px;border-radius:16px;opacity:.42;"></div>
    </div>`
}

/* ══════════════════════════════════════════════
   STORE SELECTOR BUSY INDICATOR
══════════════════════════════════════════════ */
function setStoreLoading(on) {
  const wrap = document.getElementById('store-select-wrap')
  if (!wrap) return
  on ? wrap.classList.add('store-loading') : wrap.classList.remove('store-loading')
}

/* ══════════════════════════════════════════════
   THEME SYSTEM
══════════════════════════════════════════════ */
let _isDark = localStorage.getItem('ekart_theme') !== 'light'

function applyTheme(dark) {
  _isDark = dark
  const root = document.documentElement
  if (dark) {
    root.removeAttribute('data-theme')
    root.style.background = '#080910'
  } else {
    root.setAttribute('data-theme', 'light')
    root.style.background = '#f0f0f5'
  }
  const btn = document.getElementById('themeToggleBtn')
  if (btn) btn.textContent = dark ? '🌙' : '☀️'
  localStorage.setItem('ekart_theme', dark ? 'dark' : 'light')
}
function toggleTheme() {
  applyTheme(!_isDark)
  // Re-render charts with new colors
  if (currentStoreId) loadAnalytics()
}
applyTheme(_isDark)

/* ══════════════════════════════════════════════
   STATE
   _loadToken: incremented on every loadAnalytics.
   Stale responses are silently dropped when the
   token doesn't match (rapid store switching).
══════════════════════════════════════════════ */
let currentStoreId = ''
let analyticsDays  = 7
let _loadToken     = 0

/* Chart instances — tracked so we can destroy
   before creating new ones (prevents memory leaks
   and "canvas already in use" Chart.js errors) */
let _chartRev    = null
let _chartOrd    = null
let _chartStatus = null
let _ddHourly    = null
let _ddBar       = null
let _ddPie       = null

/* ══════════════════════════════════════════════
   DESTROY ALL CHART INSTANCES
   Must be called before innerHTML is wiped,
   otherwise Chart.js holds stale canvas refs.
══════════════════════════════════════════════ */
function destroyAllCharts() {
  ;[
    ['_chartRev',    v => _chartRev    = v],
    ['_chartOrd',    v => _chartOrd    = v],
    ['_chartStatus', v => _chartStatus = v],
    ['_ddHourly',    v => _ddHourly    = v],
    ['_ddBar',       v => _ddBar       = v],
    ['_ddPie',       v => _ddPie       = v],
  ].forEach(([key, setter]) => {
    const chart = { _chartRev, _chartOrd, _chartStatus, _ddHourly, _ddBar, _ddPie }[key]
    if (chart) { try { chart.destroy() } catch (_) {} setter(null) }
  })
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('analytics', (id) => {
    currentStoreId = id
    loadAnalyticsWithTransition()
  })
  if (!nav) { hideSkeleton(); return }
  currentStoreId = nav.currentStoreId

  // Theme toggle button
  const topbarRight = document.querySelector('.topbar-right')
  if (topbarRight && !document.getElementById('themeToggleBtn')) {
    const btn       = document.createElement('button')
    btn.className   = 'theme-toggle'
    btn.id          = 'themeToggleBtn'
    btn.title       = 'Toggle day / night mode'
    btn.onclick     = toggleTheme
    btn.textContent = _isDark ? '🌙' : '☀️'
    topbarRight.insertBefore(btn, topbarRight.firstChild)
  }
  applyTheme(_isDark)

  renderShell()
  if (currentStoreId) await loadAnalyticsFirstLoad()
  else hideSkeleton()
})

/* ══════════════════════════════════════════════
   FIRST LOAD
   Skeleton is visible → fetch → reveal content
   → dismiss skeleton.
══════════════════════════════════════════════ */
async function loadAnalyticsFirstLoad() {
  const token   = ++_loadToken
  const content = document.getElementById('page-content')
  setStoreLoading(true)

  try {
    // Fetch while skeleton is showing
    const data = await apiFetch(`/stores/${currentStoreId}/analytics?days=${analyticsDays}`)
    if (token !== _loadToken) return

    renderShell()
    await renderAnalyticsData(data, token)
    if (token !== _loadToken) return

    content.style.display = ''
    requestAnimationFrame(() => hideSkeleton())
  } catch (e) {
    if (token !== _loadToken) return
    hideSkeleton()
    content.innerHTML = errorHTML(e.message)
    content.style.display = ''
    toast('Analytics error: ' + e.message, 'error')
  } finally {
    if (token === _loadToken) setStoreLoading(false)
  }
}

/* ══════════════════════════════════════════════
   STORE SWITCH — 3-phase transition
   Phase 1 → fade out current content + charts
   Phase 2 → inline shimmer skeleton
   Phase 3 → fetch → fade in real content
══════════════════════════════════════════════ */
async function loadAnalyticsWithTransition() {
  const token   = ++_loadToken
  const content = document.getElementById('page-content')
  const isFirst = content.style.display === 'none'

  if (isFirst) { await loadAnalyticsFirstLoad(); return }

  setStoreLoading(true)

  // Phase 1: destroy charts, fade out
  destroyAllCharts()
  await fadeOut(content)
  if (token !== _loadToken) return

  // Phase 2: show inline skeleton
  content.innerHTML = inlineSkeletonHTML()
  fadeIn(content)

  try {
    const data = await apiFetch(`/stores/${currentStoreId}/analytics?days=${analyticsDays}`)
    if (token !== _loadToken) return

    // Phase 3: fade out skeleton, render real content, fade in
    await fadeOut(content)
    if (token !== _loadToken) return

    renderShell()
    await renderAnalyticsData(data, token)
    if (token !== _loadToken) return

    fadeIn(content)
  } catch (e) {
    if (token !== _loadToken) return
    content.innerHTML = errorHTML(e.message)
    fadeIn(content)
    toast('Analytics error: ' + e.message, 'error')
  } finally {
    if (token === _loadToken) setStoreLoading(false)
  }
}

function errorHTML(msg) {
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:10px;">
    <span style="font-size:40px;opacity:0.4;">⚠️</span>
    <h3 style="font-size:16px;font-weight:800;color:var(--text);">Failed to load analytics</h3>
    <p style="font-size:13px;color:var(--text3);">${msg}</p>
  </div>`
}

/* ══════════════════════════════════════════════
   SHELL — static HTML frame injected once.
   Charts are then rendered into the canvas els.
══════════════════════════════════════════════ */
function renderShell() {
  document.getElementById('page-content').innerHTML = `
    <div class="controls-row">
      <div class="controls-left">
        <div class="day-tabs">
          <button class="day-tab ${analyticsDays===7?'active':''}"  onclick="setDays(7,this)">7 Days</button>
          <button class="day-tab ${analyticsDays===14?'active':''}" onclick="setDays(14,this)">14 Days</button>
          <button class="day-tab ${analyticsDays===30?'active':''}" onclick="setDays(30,this)">30 Days</button>
        </div>
      </div>
      <div class="controls-right">
        <button class="btn-ai-sm" onclick="loadInsights()" id="insightsBtn">🧠 AI Insights</button>
        <button class="btn-export" onclick="exportAnalyticsCSV()">⬇ Export CSV</button>
      </div>
    </div>

    <div id="insightsPanel" style="display:none;" class="ai-insights-panel"></div>

    <div class="kpi-grid" id="kpiGrid">
      ${['💰 Revenue','📦 Orders','🕐 Today','🛍️ Products'].map(k => `
        <div class="kpi-card">
          <span class="kpi-icon">${k.split(' ')[0]}</span>
          <div>
            <div class="kpi-label">${k.slice(2)}</div>
            <div class="kpi-value" style="color:var(--text3);">—</div>
          </div>
        </div>`).join('')}
    </div>

    <div class="charts-main">
      <div class="chart-card">
        <div class="chart-title">
          <span>📈 Daily Revenue</span>
          <span class="chart-total" id="revTotal"></span>
        </div>
        <canvas id="revenueChart" height="110"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">
          <span>📦 Daily Orders</span>
          <span class="chart-total" id="ordTotal"></span>
        </div>
        <canvas id="ordersChart" height="110"></canvas>
      </div>
    </div>

    <div class="charts-bottom">
      <div class="chart-card">
        <div class="chart-title"><span>🏆 Top Products</span></div>
        <div id="topProdsChart"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title"><span>🔄 Order Status</span></div>
        <div class="status-donut-wrap">
          <canvas id="statusChart" width="160" height="160"></canvas>
          <div class="status-legend" id="statusLegend"></div>
        </div>
      </div>
    </div>

    <div id="drilldownPanel" style="display:none;"></div>`
}

/* ══════════════════════════════════════════════
   CONTROLS
══════════════════════════════════════════════ */
function setDays(d, el) {
  analyticsDays = d
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  closeDrilldown()
  loadAnalyticsWithTransition()
}

/* ══════════════════════════════════════════════
   CHART DEFAULTS — respects current theme
══════════════════════════════════════════════ */
function chartDefaults() {
  return {
    gridColor: _isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)',
    tickColor: _isDark ? '#4a5568' : '#9ca3af',
  }
}

/* ══════════════════════════════════════════════
   RENDER ANALYTICS DATA
   Returns a Promise so callers can await it.
   Accepts a token so stale renders can be aborted.
══════════════════════════════════════════════ */
async function renderAnalyticsData(data, token) {
  const { gridColor, tickColor } = chartDefaults()
  const cur    = '₹'
  const accent = '#6c63ff'

  // Guard: if the DOM was replaced by another store switch, bail
  if (!document.getElementById('revenueChart')) return

  /* ── KPIs ── */
  const kpis    = document.querySelectorAll('.kpi-card')
  const revDelta = (data.today_revenue || 0) - (data.yesterday_revenue || 0)
  const ordDelta = (data.today_orders  || 0) - (data.yesterday_orders  || 0)

  if (kpis[0]) kpis[0].innerHTML = `<span class="kpi-icon">💰</span><div>
    <div class="kpi-label">Total Revenue</div>
    <div class="kpi-value">${cur}${(data.total_revenue||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
    <div class="kpi-delta ${revDelta>0?'up':revDelta<0?'down':'neutral'}">${revDelta>=0?'↑':'↓'} ${cur}${Math.abs(revDelta).toFixed(0)} vs yesterday</div>
  </div>`

  if (kpis[1]) kpis[1].innerHTML = `<span class="kpi-icon">📦</span><div>
    <div class="kpi-label">Total Orders</div>
    <div class="kpi-value">${(data.total_orders||0).toLocaleString()}</div>
    <div class="kpi-delta ${ordDelta>0?'up':ordDelta<0?'down':'neutral'}">${ordDelta>=0?'↑':'↓'} ${Math.abs(ordDelta)} vs yesterday</div>
  </div>`

  if (kpis[2]) kpis[2].innerHTML = `<span class="kpi-icon">🕐</span><div>
    <div class="kpi-label">Today's Orders</div>
    <div class="kpi-value">${data.today_orders||0}</div>
    <div class="kpi-delta neutral">Since midnight</div>
  </div>`

  if (kpis[3]) kpis[3].innerHTML = `<span class="kpi-icon">🛍️</span><div>
    <div class="kpi-label">Active Products</div>
    <div class="kpi-value">${data.product_count||0}</div>
    <div class="kpi-delta neutral">In catalog</div>
  </div>`

  /* ── Build daily series ── */
  const filled = []
  const today  = new Date()
  for (let i = analyticsDays - 1; i >= 0; i--) {
    const d   = new Date(today); d.setDate(d.getDate() - i)
    const key = d.toISOString().slice(0, 10)
    const f   = (data.daily_stats||[]).find(s => s._id === key)
    filled.push({ date: key, label: key.slice(5), revenue: f?.revenue||0, orders: f?.orders||0 })
  }
  const labels  = filled.map(d => d.label)
  const revVals = filled.map(d => d.revenue)
  const ordVals = filled.map(d => d.orders)

  document.getElementById('revTotal').textContent = cur + revVals.reduce((a,b)=>a+b,0).toLocaleString('en-IN',{maximumFractionDigits:0})
  document.getElementById('ordTotal').textContent = ordVals.reduce((a,b)=>a+b,0) + ' orders'

  if (token !== undefined && token !== _loadToken) return

  /* ── Revenue Chart ── */
  if (_chartRev) { _chartRev.destroy(); _chartRev = null }
  _chartRev = new Chart(document.getElementById('revenueChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: revVals,
        borderColor: accent, backgroundColor: accent + '18',
        borderWidth: 2.5, pointBackgroundColor: accent,
        pointRadius: 4, pointHoverRadius: 7,
        fill: true, tension: 0.4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          label: ctx => ` ${cur}${ctx.parsed.y.toLocaleString('en-IN',{maximumFractionDigits:0})}`,
          afterLabel: () => '  Click to drill down'
        }}
      },
      scales: {
        x: { grid:{color:gridColor}, ticks:{font:{family:'DM Mono',size:10},color:tickColor,maxTicksLimit:7} },
        y: { grid:{color:gridColor}, ticks:{font:{family:'DM Mono',size:10},color:tickColor,callback:v=>cur+(v>=1000?(v/1000).toFixed(1)+'k':v)} }
      },
      onClick: (evt, els) => { if (els.length) loadDayDrilldown(filled[els[0].index].date, cur) }
    }
  })

  /* ── Orders Chart ── */
  if (_chartOrd) { _chartOrd.destroy(); _chartOrd = null }
  _chartOrd = new Chart(document.getElementById('ordersChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: ordVals,
        backgroundColor: '#60a5fa', hoverBackgroundColor: '#3b82f6',
        borderRadius: 6, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          label: ctx => ` ${ctx.parsed.y} orders`,
          afterLabel: () => '  Click to drill down'
        }}
      },
      scales: {
        x: { grid:{color:gridColor}, ticks:{font:{family:'DM Mono',size:10},color:tickColor,maxTicksLimit:7} },
        y: { grid:{color:gridColor}, beginAtZero:true, ticks:{font:{family:'DM Mono',size:10},color:tickColor,stepSize:1} }
      },
      onClick: (evt, els) => { if (els.length) loadDayDrilldown(filled[els[0].index].date, cur) }
    }
  })

  /* ── Top Products ── */
  const topProds = data.top_products || []
  const maxRev   = Math.max(...topProds.map(p => p.revenue), 1)
  document.getElementById('topProdsChart').innerHTML = topProds.length
    ? topProds.map((p, i) => `<div class="tp-row">
        <div class="tp-rank">#${i+1}</div>
        <div class="tp-img">${p.image ? `<img src="${p.image}" alt="">` : '📦'}</div>
        <div class="tp-name" title="${p.name}">${p.name}</div>
        <div class="tp-bar-wrap"><div class="tp-bar-fill" style="width:${Math.max((p.revenue/maxRev)*100,4)}%"></div></div>
        <div class="tp-val">${cur}${p.revenue.toFixed(0)}</div>
      </div>`).join('')
    : '<p style="color:var(--text3);font-size:13px;padding:16px 0;">No orders yet</p>'

  /* ── Status Donut ── */
  const statusColors = { pending:'#fbbf24', confirmed:'#a78bfa', processing:'#60a5fa', shipped:'#38bdf8', delivered:'#34d399', cancelled:'#f87171' }
  const breakdown    = data.status_breakdown || []
  if (_chartStatus) { _chartStatus.destroy(); _chartStatus = null }
  if (breakdown.length) {
    _chartStatus = new Chart(document.getElementById('statusChart'), {
      type: 'doughnut',
      data: {
        labels: breakdown.map(s => s._id),
        datasets: [{
          data: breakdown.map(s => s.count),
          backgroundColor: breakdown.map(s => statusColors[s._id] || '#94a3b8'),
          borderWidth: 0, hoverOffset: 6
        }]
      },
      options: {
        responsive: false, cutout: '66%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed}` } }
        }
      }
    })
    document.getElementById('statusLegend').innerHTML = breakdown.map(s => `
      <div class="status-leg-row">
        <div class="status-dot" style="background:${statusColors[s._id]||'#94a3b8'}"></div>
        <span class="status-leg-name">${s._id}</span>
        <span class="status-leg-val">${s.count}</span>
      </div>`).join('')
  } else {
    document.getElementById('statusLegend').innerHTML = '<div style="color:var(--text3);font-size:13px;">No orders yet</div>'
  }
}

/* ══════════════════════════════════════════════
   PUBLIC loadAnalytics — called by day-tab
   buttons and the export function.
   Uses the transition flow for subsequent loads.
══════════════════════════════════════════════ */
async function loadAnalytics() {
  const content = document.getElementById('page-content')
  const isFirst = content.style.display === 'none'
  if (isFirst) await loadAnalyticsFirstLoad()
  else await loadAnalyticsWithTransition()
}

/* ══════════════════════════════════════════════
   DRILLDOWN
══════════════════════════════════════════════ */
async function loadDayDrilldown(date, cur = '₹') {
  if (!currentStoreId) return
  const panel = document.getElementById('drilldownPanel')
  panel.style.display = 'block'
  panel.innerHTML = `<div class="drilldown"><div style="text-align:center;padding:24px;color:var(--text3);">Loading drill-down for <strong>${date}</strong>…</div></div>`
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' })

  try {
    const data = await apiFetch(`/stores/${currentStoreId}/analytics/day?date=${date}`)
    const { gridColor, tickColor } = chartDefaults()
    const accent     = '#6c63ff'
    const barColors  = ['#6c63ff','#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#38bdf8','#fb923c']

    panel.innerHTML = `<div class="drilldown">
      <div class="drilldown-header">
        <div class="drilldown-title">🔎 Breakdown — <strong>${date}</strong></div>
        <div class="drilldown-kpis">
          <div class="dd-kpi"><span>${cur}${(data.total_revenue||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</span><small>Revenue</small></div>
          <div class="dd-kpi"><span>${data.total_orders||0}</span><small>Orders</small></div>
          <div class="dd-kpi"><span>${data.total_qty||0}</span><small>Items Sold</small></div>
        </div>
        <button class="btn-close-drill" onclick="closeDrilldown()">✕ Close</button>
      </div>
      <div class="drilldown-charts">
        <div class="chart-card"><div class="chart-title"><span>🕐 Hourly Activity</span></div><canvas id="ddHourly" height="130"></canvas></div>
        <div class="chart-card"><div class="chart-title"><span>📦 Products Sold</span></div><canvas id="ddBar" height="130"></canvas></div>
        <div class="chart-card"><div class="chart-title"><span>💰 Revenue Split</span></div>
          <div style="display:flex;align-items:center;gap:14px;">
            <canvas id="ddPie" width="150" height="150" style="flex-shrink:0;"></canvas>
            <div id="ddPieLegend" style="flex:1;overflow:hidden;"></div>
          </div>
        </div>
      </div>
    </div>`

    const hours      = Array.from({length:24}, (_, i) => i)
    const hOrders    = hours.map(h => (data.hourly_stats||[]).find(x => x._id === h)?.orders  || 0)
    const hRev       = hours.map(h => (data.hourly_stats||[]).find(x => x._id === h)?.revenue || 0)
    const hourLabels = hours.map(h => h===0?'12a':h<12?h+'a':h===12?'12p':(h-12)+'p')

    if (_ddHourly) { _ddHourly.destroy(); _ddHourly = null }
    _ddHourly = new Chart(document.getElementById('ddHourly'), {
      type: 'bar',
      data: {
        labels: hourLabels,
        datasets: [
          { type:'bar',  label:'Orders',  data: hOrders, backgroundColor: '#60a5fa88', borderRadius:3, borderSkipped:false, yAxisID:'yO' },
          { type:'line', label:'Revenue', data: hRev,    borderColor:accent, backgroundColor:'transparent', borderWidth:2, pointRadius:2, tension:0.4, yAxisID:'yR' }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:true,
        plugins: {
          legend: { position:'top', labels:{font:{family:'Outfit',size:11},boxWidth:10} },
          tooltip: { callbacks:{ label: ctx => ctx.dataset.label==='Revenue' ? ` ${cur}${ctx.parsed.y.toFixed(0)}` : ` ${ctx.parsed.y} orders` } }
        },
        scales: {
          x:  { grid:{color:gridColor}, ticks:{font:{family:'DM Mono',size:9},color:tickColor,maxTicksLimit:12} },
          yO: { position:'left',  beginAtZero:true, grid:{color:gridColor}, ticks:{font:{family:'DM Mono',size:9},color:tickColor,stepSize:1} },
          yR: { position:'right', beginAtZero:true, grid:{display:false},   ticks:{font:{family:'DM Mono',size:9},color:tickColor,callback:v=>cur+(v>=1000?(v/1000).toFixed(1)+'k':v)} }
        }
      }
    })

    const prods = (data.products_sold||[]).slice(0,8)
    if (_ddBar) { _ddBar.destroy(); _ddBar = null }
    _ddBar = new Chart(document.getElementById('ddBar'), {
      type: 'bar',
      data: {
        labels: prods.map(p => p.name.length>13?p.name.slice(0,12)+'…':p.name),
        datasets: [{ label:'Qty', data:prods.map(p=>p.qty), backgroundColor:barColors, borderRadius:5, borderSkipped:false }]
      },
      options: {
        responsive:true, maintainAspectRatio:true, indexAxis:'y',
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.x} units`}} },
        scales: {
          x: { grid:{color:gridColor}, beginAtZero:true, ticks:{font:{family:'DM Mono',size:9},color:tickColor,stepSize:1} },
          y: { grid:{display:false},   ticks:{font:{family:'Outfit',size:10},color:'#8892a4'} }
        }
      }
    })

    const pieProds = (data.products_sold||[]).slice(0,6)
    if (_ddPie) { _ddPie.destroy(); _ddPie = null }
    if (pieProds.length) {
      _ddPie = new Chart(document.getElementById('ddPie'), {
        type: 'doughnut',
        data: {
          labels: pieProds.map(p => p.name),
          datasets: [{ data:pieProds.map(p=>p.revenue), backgroundColor:barColors, borderWidth:0, hoverOffset:6 }]
        },
        options: {
          responsive:false, cutout:'58%',
          plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${cur}${ctx.parsed.toFixed(0)}`}} }
        }
      })
      document.getElementById('ddPieLegend').innerHTML = pieProds.map((p,i) => `
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:11.5px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${barColors[i]};flex-shrink:0;"></div>
          <span style="flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.name}">${p.name}</span>
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);">${cur}${p.revenue.toFixed(0)}</span>
        </div>`).join('')
    }
  } catch (e) { toast('Drill-down error: ' + e.message, 'error') }
}

function closeDrilldown() {
  if (_ddHourly) { _ddHourly.destroy(); _ddHourly = null }
  if (_ddBar)    { _ddBar.destroy();    _ddBar    = null }
  if (_ddPie)    { _ddPie.destroy();    _ddPie    = null }
  const panel = document.getElementById('drilldownPanel')
  if (panel) panel.style.display = 'none'
}

/* ══════════════════════════════════════════════
   AI INSIGHTS
══════════════════════════════════════════════ */
async function loadInsights() {
  if (!currentStoreId) return toast('Select a store first', 'error')
  const btn   = document.getElementById('insightsBtn')
  const panel = document.getElementById('insightsPanel')
  btn.disabled = true; btn.innerHTML = '<span class="spinning">⏳</span> Analyzing…'
  panel.style.display = 'none'
  try {
    const analytics  = await apiFetch(`/stores/${currentStoreId}/analytics?days=30`)
    const storesList = await apiFetch('/stores')
    const store      = storesList.find(s => s._id === currentStoreId)
    const r = await apiFetch('/ai/sales-insights', {
      method: 'POST',
      body: JSON.stringify({ analytics, store_name: store?.name || 'Store', currency: store?.currency || 'INR' })
    })
    const d  = r.insights
    const pc = p => p === 'high' ? 'ph' : p === 'medium' ? 'pm' : 'pl'

    panel.innerHTML = `
      <div class="insight-card"><div class="insight-title">📊 Summary</div>
        <p style="font-size:13.5px;color:var(--text2);line-height:1.75;">${d.summary}</p>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div class="insight-card">
          <div class="insight-title">✅ What's Working</div>
          ${(d.wins||[]).map(w=>`<div class="insight-item"><span>🟢</span><span>${w}</span></div>`).join('')}
        </div>
        <div class="insight-card">
          <div class="insight-title">🔧 Areas to Improve</div>
          ${(d.improvements||[]).map(i=>`<div class="insight-item"><span>🔸</span><span>${i}</span></div>`).join('')}
        </div>
      </div>
      <div class="insight-card">
        <div class="insight-title">🎯 Recommended Actions</div>
        ${(d.actions||[]).map(a=>`
          <div class="insight-item">
            <span class="priority-badge ${pc(a.priority)}">${a.priority}</span>
            <div>
              <div style="font-weight:700;font-size:13.5px;margin-bottom:3px;color:var(--text);">${a.action}</div>
              <div style="font-size:12px;color:var(--text3);">${a.reason}</div>
            </div>
          </div>`).join('')}
      </div>`
    panel.style.display = 'block'
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' })
  } catch (e) { toast('Insights failed: ' + e.message, 'error') }
  btn.disabled = false; btn.innerHTML = '🧠 AI Insights'
}

/* ══════════════════════════════════════════════
   EXPORT CSV
══════════════════════════════════════════════ */
function exportAnalyticsCSV() {
  if (!_chartRev || !_chartOrd) { toast('Load analytics first', 'error'); return }
  const today  = new Date()
  const dates  = []
  for (let i = analyticsDays - 1; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i)
    dates.push(d.toISOString().slice(0,10))
  }
  const revData = _chartRev.data.datasets[0].data
  const ordData = _chartOrd.data.datasets[0].data
  const rows    = [['Date','Revenue (₹)','Orders']]
  dates.forEach((date, i) => rows.push([date, (revData[i]||0).toFixed(2), ordData[i]||0]))
  const csv = rows.map(r => r.join(',')).join('\n')
  const a   = document.createElement('a')
  a.href     = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv)
  a.download = `analytics-${analyticsDays}d-${new Date().toISOString().slice(0,10)}.csv`
  a.click()
  toast('CSV downloaded!', 'success')
}

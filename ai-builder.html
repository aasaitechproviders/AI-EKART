<!DOCTYPE html>
<html lang="en" style="background:#09090f">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eKart — AI Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- TOKEN: run synchronously before anything else -->
  <script>
    ;(function(){
      var p = new URLSearchParams(location.search), t = p.get('token')
      if (t) {
        localStorage.setItem('ekart_token', t)
        history.replaceState({}, '', '/ai-builder.html')
        console.log('[eKart] Token saved from URL param')
      }
    })()
  </script>

  <!-- apiFetch — same as website-builder -->
  <script>
    function apiFetch(path, opts) {
      opts = opts || {}
      var token = localStorage.getItem('ekart_token')
      var url = path.startsWith('http') ? path : ('https://apiv2.aasaitech.in' + path)
      return fetch(url, Object.assign({}, opts, {
        headers: Object.assign(
          { 'Content-Type': 'application/json' },
          token ? { 'Authorization': 'Bearer ' + token } : {},
          opts.headers || {}
        ),
        credentials: 'include'
      })).then(function(r) {
        return r.json().catch(function(){ return {} }).then(function(data) {
          if (!r.ok) throw new Error(data.error || data.message || 'HTTP ' + r.status)
          return data
        })
      })
    }
  </script>

  <style>
    :root{
      --bg:#09090f;--surface:#0e0e17;--surface2:#13131e;--surface3:#181826;
      --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.10);--border3:rgba(255,255,255,.18);
      --accent:#5b5cf6;--accent2:#818cf8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
      --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
      --topbar-h:52px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

    /* ── TOPBAR ── */
    #topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;z-index:200;position:relative}
    .tb-logo{font-family:'Outfit',sans-serif;font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.04em;text-decoration:none;padding-right:12px;border-right:1px solid var(--border2);margin-right:2px;flex-shrink:0}
    .tb-logo em{color:var(--accent2);font-style:normal}
    .tb-badge{background:linear-gradient(135deg,#5b5cf6,#818cf8);color:white;font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;letter-spacing:.04em;flex-shrink:0}
    .tb-spacer{flex:1}
    .tb-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0}
    .tb-btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
    .tb-btn-ghost:hover{border-color:var(--border3);color:var(--text)}
    .tb-btn-primary{background:var(--accent);color:white}
    .tb-btn-primary:hover{background:#4f4de0;box-shadow:0 4px 16px rgba(91,92,246,.4)}
    .tb-btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .tb-store-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:5px 10px 5px 8px;cursor:pointer;transition:all .15s;min-width:0;flex-shrink:0;max-width:160px}
    .tb-store-pill:hover{border-color:var(--accent)}
    .tb-store-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px rgba(34,197,94,.6)}
    .tb-store-dot.offline{background:var(--amber);box-shadow:0 0 6px rgba(245,158,11,.6)}
    .tb-store-name{font-size:12.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tb-store-chevron{color:var(--text3);font-size:10px;flex-shrink:0}
    .store-dropdown{position:absolute;top:calc(var(--topbar-h)+4px);left:100px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:6px;z-index:600;min-width:210px;box-shadow:0 12px 40px rgba(0,0,0,.5);display:none}
    .store-dropdown.open{display:block}
    .store-dropdown-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:background .12s;font-size:13px;font-weight:600;color:var(--text2)}
    .store-dropdown-item:hover{background:var(--surface3);color:var(--text)}
    .store-dropdown-item.active{color:var(--accent2)}
    .store-dropdown-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

    /* ── MAIN LAYOUT ── */
    #main-wrap{display:flex;flex:1;overflow:hidden}

    /* ── CHAT PANEL ── */
    #chat-panel{width:420px;min-width:380px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .chat-header{padding:12px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
    .chat-header-row{display:flex;align-items:center;gap:8px;margin-bottom:2px}
    .chat-header-title{font-size:13.5px;font-weight:800;color:var(--text)}
    .chat-header-sub{font-size:11px;color:var(--text3)}
    .ai-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.6);animation:pulse 2s infinite;flex-shrink:0}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* STEP BAR */
    .step-bar{padding:8px 14px 0;flex-shrink:0}
    .step-track{display:flex;gap:3px;margin-bottom:4px}
    .step-dot{height:3px;flex:1;border-radius:999px;background:var(--border2);transition:background .4s}
    .step-dot.done{background:var(--green)}
    .step-dot.active{background:var(--accent)}
    .step-names{display:flex;justify-content:space-between;padding:0 1px}
    .step-name{font-size:8.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;transition:color .3s}
    .step-name.active{color:var(--accent2)}
    .step-name.done{color:var(--green)}

    /* QUICK ACTIONS BAR */
    #quick-actions{padding:7px 10px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;background:var(--surface2)}
    .qa-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--surface3);border:1px solid var(--border2);border-radius:7px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .13s;white-space:nowrap}
    .qa-btn:hover{border-color:var(--accent);color:var(--accent2);background:rgba(91,92,246,.07)}

    /* MESSAGES */
    #chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth}
    #chat-messages::-webkit-scrollbar{width:3px}
    #chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .msg{display:flex;gap:8px;align-items:flex-end}
    .msg.user{flex-direction:row-reverse}
    .msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
    .msg.ai .msg-avatar{background:linear-gradient(135deg,#5b5cf6,#818cf8)}
    .msg.user .msg-avatar{background:var(--surface3);font-size:11px}
    .msg-body{display:flex;flex-direction:column;max-width:88%;min-width:0}
    .msg.user .msg-body{align-items:flex-end}
    .msg-bubble{padding:8px 12px;border-radius:13px;font-size:12.5px;line-height:1.6;word-break:break-word}
    .msg.ai .msg-bubble{background:var(--surface2);border:1px solid var(--border2);border-bottom-left-radius:3px;color:var(--text)}
    .msg.user .msg-bubble{background:var(--accent);color:white;border-bottom-right-radius:3px}
    .msg-time{font-size:8.5px;color:var(--text3);margin-top:2px;padding:0 2px}

    /* WIDGETS */
    .chat-widget{margin-top:9px}
    .widget-label{font-size:9.5px;font-weight:700;color:var(--text3);margin-bottom:7px;letter-spacing:.05em;text-transform:uppercase}
    .widget-chips{display:flex;flex-wrap:wrap;gap:5px}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:var(--surface3);border:1.5px solid var(--border2);border-radius:999px;font-size:11.5px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .13s;user-select:none}
    .chip:hover{border-color:var(--accent);color:var(--accent2);background:rgba(91,92,246,.08)}
    .chip.selected{border-color:var(--accent);background:rgba(91,92,246,.14);color:var(--accent2)}
    .widget-cards{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .wcard{background:var(--surface3);border:1.5px solid var(--border2);border-radius:9px;padding:9px;cursor:pointer;transition:all .13s;text-align:center}
    .wcard:hover{border-color:var(--accent);background:rgba(91,92,246,.07)}
    .wcard.selected{border-color:var(--accent);background:rgba(91,92,246,.12)}
    .wcard-icon{font-size:20px;margin-bottom:3px}
    .wcard-label{font-size:11.5px;font-weight:700;color:var(--text2)}

    /* QUICK REPLIES */
    #quick-replies{padding:7px 12px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0}
    #quick-replies:empty{padding:0;border-top:none}
    .qr{padding:5px 10px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:999px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .13s;white-space:nowrap}
    .qr:hover{border-color:var(--accent);color:var(--accent2)}

    /* INPUT */
    #chat-input-wrap{padding:9px 12px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:flex-end;flex-shrink:0}
    #chat-input{flex:1;background:var(--surface2);border:1.5px solid var(--border2);border-radius:11px;padding:8px 11px;font-size:12.5px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;outline:none;resize:none;min-height:38px;max-height:90px;line-height:1.5;transition:border-color .13s}
    #chat-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,92,246,.08)}
    #chat-input::placeholder{color:var(--text3)}
    .ibtn{width:34px;height:34px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .13s;flex-shrink:0}
    #send-btn{background:var(--accent);color:white}
    #send-btn:hover{background:#4f4de0}
    #send-btn:disabled{opacity:.4;cursor:not-allowed}

    /* PREVIEW PANEL */
    #preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#111118}
    .preview-topbar{height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
    .preview-url{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:5px;max-width:400px}
    .preview-device-btns{display:flex;gap:2px;margin-left:auto}
    .pdb{width:27px;height:27px;border-radius:6px;border:none;background:var(--surface2);color:var(--text3);cursor:pointer;font-size:13px;transition:all .12s;display:flex;align-items:center;justify-content:center}
    .pdb.active{background:var(--surface3);color:var(--accent2)}
    #built-bar{padding:5px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:none;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0}
    .built-pill{display:flex;align-items:center;gap:3px;background:rgba(91,92,246,.1);border:1px solid rgba(91,92,246,.2);border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--accent2)}
    .preview-canvas{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:16px;background:#111118}
    .preview-canvas::-webkit-scrollbar{width:4px;height:4px}
    .preview-canvas::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .device-shell{background:white;border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.06),0 20px 50px rgba(0,0,0,.5);flex-shrink:0;width:100%;transition:width .3s}
    .device-shell.desktop{max-width:960px}
    .device-shell.tablet{width:768px;max-width:768px}
    .device-shell.mobile{width:390px;max-width:390px}
    #preview-iframe{width:100%;border:none;display:block}
    .preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;color:var(--text3);text-align:center;padding:40px;height:100%}
    .preview-empty-icon{font-size:48px;opacity:.2}
    .preview-empty-title{font-size:14px;font-weight:700;color:var(--text2)}

    /* TOAST */
    .built-toast{position:fixed;top:calc(var(--topbar-h)+8px);left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(91,92,246,.97),rgba(129,140,248,.97));backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:8px 16px;font-size:12.5px;font-weight:700;color:white;display:flex;align-items:center;gap:7px;box-shadow:0 6px 24px rgba(91,92,246,.3);z-index:500;opacity:0;transition:opacity .25s;pointer-events:none}
    .built-toast.show{opacity:1}
    #toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:7px;z-index:1000}
    .toast{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:10px 14px;font-size:12.5px;font-weight:600;color:var(--text);box-shadow:0 8px 28px rgba(0,0,0,.4);opacity:0;transform:translateY(8px);transition:all .25s;max-width:300px}
    .toast.show{opacity:1;transform:translateY(0)}

    /* LOADING OVERLAY */
    #loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999;transition:opacity .4s}
    #loading-overlay.hidden{opacity:0;pointer-events:none}
    .loading-logo{font-family:'Outfit',sans-serif;font-size:26px;font-weight:900;color:var(--text);letter-spacing:-.04em}
    .loading-logo em{color:var(--accent2);font-style:normal}
    .loading-bar{width:160px;height:2px;background:var(--surface2);border-radius:2px;overflow:hidden}
    .loading-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s ease}
    .loading-text{font-size:11.5px;color:var(--text3);font-weight:600}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:340px;box-shadow:0 20px 50px rgba(0,0,0,.6)}
    .modal-title{font-size:15px;font-weight:800;margin-bottom:7px}
    .modal-sub{font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:18px}
    .modal-field{margin-bottom:12px}
    .modal-field label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px}
    .modal-input{width:100%;background:var(--surface3);border:1.5px solid var(--border2);border-radius:7px;padding:8px 10px;font-size:13px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .13s}
    .modal-input:focus{border-color:var(--accent)}
    .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
    .modal-btn{padding:8px 16px;border-radius:7px;font-size:12.5px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .13s}
    .modal-btn-cancel{background:var(--surface3);color:var(--text2)}
    .modal-btn-cancel:hover{color:var(--text)}
    .modal-btn-primary{background:var(--accent);color:white}
    .modal-btn-primary:hover{background:#4f4de0}
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="loading-logo">e<em>K</em>art</div>
  <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
  <div class="loading-text" id="loading-text">Initializing…</div>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <a class="tb-logo" href="home.html">e<em>K</em>art</a>
  <span class="tb-badge">✨ AI Builder</span>
  <div class="tb-store-pill" onclick="toggleStoreDropdown()" id="store-pill">
    <div class="tb-store-dot offline" id="store-dot"></div>
    <div class="tb-store-name" id="store-name-display">Loading…</div>
    <div class="tb-store-chevron">▾</div>
  </div>
  <div class="store-dropdown" id="store-dropdown"></div>
  <div class="tb-spacer"></div>
  <button class="tb-btn tb-btn-ghost" onclick="location.href='website-builder.html'">🎨 Classic</button>
  <button class="tb-btn tb-btn-primary" id="publish-btn" onclick="publishSite()" disabled>🚀 Publish</button>
</div>

<div id="main-wrap">

  <!-- CHAT -->
  <div id="chat-panel">
    <div class="chat-header">
      <div class="chat-header-row">
        <div class="ai-dot"></div>
        <div class="chat-header-title">eKart AI Builder</div>
      </div>
      <div class="chat-header-sub">Tap choices • Preview updates live →</div>
    </div>

    <!-- step progress -->
    <div class="step-bar">
      <div class="step-track" id="step-track">
        <div class="step-dot active" id="sp0"></div>
        <div class="step-dot" id="sp1"></div>
        <div class="step-dot" id="sp2"></div>
        <div class="step-dot" id="sp3"></div>
        <div class="step-dot" id="sp4"></div>
        <div class="step-dot" id="sp5"></div>
        <div class="step-dot" id="sp6"></div>
      </div>
      <div class="step-names">
        <span class="step-name active" id="sl0">Brand</span>
        <span class="step-name" id="sl1">Business</span>
        <span class="step-name" id="sl2">Hero</span>
        <span class="step-name" id="sl3">Layout</span>
        <span class="step-name" id="sl4">Theme</span>
        <span class="step-name" id="sl5">Extras</span>
        <span class="step-name" id="sl6">Done</span>
      </div>
    </div>

    <!-- quick action buttons -->
    <div id="quick-actions">
      <button class="qa-btn" onclick="showEditPanel('navbar')">✏️ Edit Nav</button>
      <button class="qa-btn" onclick="showEditPanel('hero')">🖼 Edit Hero</button>
      <button class="qa-btn" onclick="showThemeStep()">🎨 Theme</button>
      <button class="qa-btn" onclick="openModal('product')">➕ Product</button>
      <button class="qa-btn" onclick="openModal('category')">📂 Category</button>
      <button class="qa-btn" onclick="openModal('coupon')">🎫 Coupon</button>
    </div>

    <div id="chat-messages"></div>
    <div id="quick-replies"></div>

    <div id="chat-input-wrap">
      <textarea id="chat-input" placeholder="Type here or tap buttons above…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="ibtn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div id="preview-panel">
    <div class="preview-topbar">
      <div class="preview-url">
        <span>🔒</span><span id="preview-url-text">ekart.aasaitech.in/your-store</span>
      </div>
      <div class="preview-device-btns">
        <button class="pdb active" onclick="setDevice('desktop',this)">🖥</button>
        <button class="pdb" onclick="setDevice('tablet',this)">▭</button>
        <button class="pdb" onclick="setDevice('mobile',this)">📱</button>
      </div>
    </div>
    <div id="built-bar"></div>
    <div class="preview-canvas" id="preview-canvas">
      <div class="device-shell desktop" id="device-shell">
        <div class="preview-empty" id="preview-empty">
          <div class="preview-empty-icon">✨</div>
          <div class="preview-empty-title">Preview appears here</div>
          <div class="preview-empty-sub">Chat with the AI on the left — your store builds live.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title">Create Product</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn modal-btn-primary" id="modal-submit" onclick="submitModal()">Create</button>
    </div>
  </div>
</div>

<div class="built-toast" id="built-toast">✅ <span id="built-toast-msg">Section added!</span></div>
<div id="toast-container"></div>

<script>
/* ══════════════════════════════════════
   STATE — CRITICAL FOR STORE DATA
══════════════════════════════════════ */
let siteState = {
  storeName:'', storeSlug:'', businessType:'', description:'', logoEmoji:'🛍️', logoUrl:'',
  tagline:'', heroSubtext:'', ctaText:'Shop Now',
  theme:{

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function setLoading(text, pct){
  document.getElementById('loading-fill').style.width = pct+'%'
  document.getElementById('loading-text').textContent = text
}
function hideLoading(){ setTimeout(()=>document.getElementById('loading-overlay').classList.add('hidden'),400) }
function toast(msg,type){
  type=type||'success'
  var el=document.createElement('div')
  el.className='toast '+(type||'success')
  el.innerHTML='<span>'+(type==='success'?'✅':type==='info'?'ℹ️':'❌')+'</span> '+esc(msg)
  document.getElementById('toast-container').appendChild(el)
  requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('show')})})
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove()},400)},3000)
}

/* ══════════════════════════════════════
   LOAD STORE WEBSITE DATA (from backend)
══════════════════════════════════════ */
async function loadStoreData(storeId) {
  if (!storeId || storeId === 'demo') {
    // Reset to default demo state
    siteState = { ...defaultSiteState() }
    currentStep = 0
    renderPreview()
    updateBuiltBar()
    addMsg('ai', '✨ You are in demo mode. Start building your store!')
    return
  }

  setLoading('Loading store website…', 70)
  try {
    // Fetch store details (theme, sections) – adjust endpoints to match your backend
    // Example: GET /stores/{id}/website returns { theme, sections, storeName, etc. }
    const websiteData = await apiFetch('/stores/' + storeId + '/website')
    
    // Merge with default state
    siteState.storeName = websiteData.storeName || websiteData.name || ''
    siteState.storeSlug = websiteData.slug || siteState.storeName.toLowerCase().replace(/[^a-z0-9]+/g,'-')
    siteState.businessType = websiteData.businessType || ''
    siteState.tagline = websiteData.tagline || ''
    siteState.theme = { ...siteState.theme, ...(websiteData.theme || {}) }
    siteState.sections = websiteData.sections || []

    // Update preview and built bar
    renderPreview()
    updateBuiltBar()
    
    // Optionally reset chat and steps? For now just show a message.
    addMsg('ai', '✅ Loaded existing website for <strong>' + esc(siteState.storeName) + '</strong>. You can continue editing.')
    
    // Update step indicators based on existing sections? 
    // For simplicity we keep currentStep = 0, but you could set it to the last completed step.
    currentStep = 0
    updateSteps()

  } catch (e) {
    console.error('[eKart AI] Failed to load store data:', e)
    toast('Could not load store website: ' + e.message, 'error')
    // Reset to default
    siteState = defaultSiteState()
    renderPreview()
    updateBuiltBar()
  } finally {
    setLoading('Ready!', 100)
    hideLoading()
  }
}

function defaultSiteState() {
  return {
    storeName:'', storeSlug:'', businessType:'', description:'', logoEmoji:'🛍️', logoUrl:'',
    tagline:'', heroSubtext:'', ctaText:'Shop Now',
    theme:{
      primaryColor:'#5b5cf6', bgColor:'#09090f', textColor:'#f1f5f9',
      cardBg:'#13131e', navBg:'#0e0e17', font:'Outfit',
      cols:'3', radius:'12px', btnStyle:'rounded'
    },
    sections:[]
  }
}

/* ══════════════════════════════════════
   INIT — CRITICAL STORE LOADING FIX
══════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async function(){
  console.log('[eKart AI] Init starting…')
  setLoading('Authenticating…', 15)

  var authOk = false
  var hasToken = !!localStorage.getItem('ekart_token')
  console.log('[eKart AI] Token present:', hasToken)

  if(hasToken){
    try {
      setLoading('Loading user…', 30)
      currentUser = await apiFetch('/auth/me')
      authOk = true
      console.log('[eKart AI] Auth OK:', currentUser.email||currentUser.name)
    } catch(e){
      console.warn('[eKart AI] Auth failed:', e.message, '— running demo mode')
    }
  }

  if(authOk){
    try {
      setLoading('Fetching stores…', 55)
      var r = await apiFetch('/stores')
      allStores = Array.isArray(r)?r:(r&&r.stores?r.stores:[])
      console.log('[eKart AI] Stores loaded:', allStores.length)

      currentStoreId = sessionStorage.getItem('ekart_current_store')||localStorage.getItem('ekart_store_id')
      if(!currentStoreId||!allStores.find(function(s){return s._id===currentStoreId})){
        currentStoreId = allStores.length?allStores[0]._id:null
      }
      if(currentStoreId){
        sessionStorage.setItem('ekart_current_store',currentStoreId)
        localStorage.setItem('ekart_store_id',currentStoreId)
        console.log('[eKart AI] Selected store:', currentStoreId)
      }
      isDemo = false
    } catch(e){
      console.warn('[eKart AI] Stores failed:', e.message, '— using demo mode')
      allStores = [{_id:'demo',name:'Demo Store',slug:'demo-store'}]
      currentStoreId = 'demo'
      isDemo = true
    }
  } else {
    // No token or auth failed — run demo mode
    allStores = [{_id:'demo',name:'Demo Store',slug:'demo-store'}]
    currentStoreId = 'demo'
    isDemo = true
    console.log('[eKart AI] Demo mode — no auth token')
    toast('No login detected — running in preview mode. Some features require login.','error')
  }

  setLoading('Building UI…', 80)
  renderStorePill()
  renderStoreDropdown()

  // Load the selected store's website data
  await loadStoreData(currentStoreId)

  setLoading('Ready!', 100)
  hideLoading()

  // Start the builder flow only if no sections exist yet
  if (siteState.sections.length === 0) {
    setTimeout(function(){
      showBrandStep()
      console.log('[eKart AI] Flow started')
    }, 300)
  } else {
    // Already have data – maybe show a welcome back message
    addMsg('ai', '👋 Welcome back! Your store website is loaded. Use the chat or buttons to make changes.')
    setQR(['✏️ Edit nav','🖼 Edit hero','🎨 Change theme','🚀 Publish'])
  }
})

function addMsg(role, html){
  var msgs = document.getElementById('chat-messages')
  var wrap = document.createElement('div')
  wrap.className = 'msg ' + role
  var now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
  wrap.innerHTML = '<div class="msg-avatar">'+(role==='ai'?'🤖':'👤')+'</div>'
    +'<div class="msg-body">'
    +'<div class="msg-bubble">'+html+'</div>'
    +'<div class="msg-time">'+now+'</div>'
    +'</div>'
  msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
}

function addMsgWithWidget(role, html, widget){
  var msgs = document.getElementById('chat-messages')
  var wrap = document.createElement('div')
  wrap.className = 'msg ' + role
  var now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
  var widgetHTML = buildWidgetHTML(widget)
  wrap.innerHTML = '<div class="msg-avatar">'+(role==='ai'?'🤖':'👤')+'</div>'
    +'<div class="msg-body">'
    +'<div class="msg-bubble">'+html+widgetHTML+'</div>'
    +'<div class="msg-time">'+now+'</div>'
    +'</div>'
  msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
}

function buildWidgetHTML(w){
  if(!w||w.type==='none') return ''
  var h = '<div class="chat-widget">'
  if(w.label) h += '<div class="widget-label">'+w.label+'</div>'

  if(w.type==='chips'){
    h += '<div class="widget-chips">'
    ;(w.options||[]).forEach(function(o){
      var val = typeof o==='object'?o.value:o
      var lbl = typeof o==='object'?o.label:o
      h += '<div class="chip" onclick="chipClick(this,\''+esc(val)+'\')">'+ lbl +'</div>'
    })
    h += '</div>'
  } else if(w.type==='cards'){
    h += '<div class="widget-cards">'
    ;(w.options||[]).forEach(function(o){
      h += '<div class="wcard" onclick="chipClick(this,\''+esc(o.value||o.label)+'\')">'
        +'<div class="wcard-icon">'+(o.icon||'📦')+'</div>'
        +'<div class="wcard-label">'+o.label+'</div>'
        +'</div>'
    })
    h += '</div>'
  }

  return h + '</div>'
}

function setQR(replies){
  var qr = document.getElementById('quick-replies')
  qr.innerHTML = ''
  ;(replies||[]).forEach(function(r){
    var b = document.createElement('button')
    b.className='qr'
    b.textContent=r
    b.onclick = function(){ sendUserMsg(r) }
    qr.appendChild(b)
  })
}

function chipClick(el, value){
  var parent = el.closest('.widget-chips,.widget-cards')
  if(parent) parent.querySelectorAll('.chip,.wcard').forEach(function(c){c.classList.remove('selected')})
  el.classList.add('selected')
  console.log('[eKart AI] chip:', value)
  setTimeout(function(){ sendUserMsg(value) }, 220)
}

    else if(i===currentStep){ d.className='step-dot active'; if(l) l.className='step-name active' }

  }
}

/* ══════════════════════════════════════
   SEND / RECEIVE (unchanged)
══════════════════════════════════════ */
async function sendUserMsg(text){
  if(!text.trim()||isThinking) return
  document.getElementById('quick-replies').innerHTML=''
  addMsg('user', esc(text))
  document.getElementById('chat-input').value=''
  autoResize(document.getElementById('chat-input'))
  chatHistory.push({role:'user', content:text})
  console.log('[eKart AI] user:', text.slice(0,70))

  var handled = handleLocalFlow(text)
  if(handled){
    console.log('[eKart AI] local flow ok — step:', STEPS[currentStep])
    return
  }

  addMsg('ai', 'Got it! Let\'s continue…')
}

function sendMessage(){
  var v = document.getElementById('chat-input').value.trim()
  if(v) sendUserMsg(v)
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage() } }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px' }

function handleLocalFlow(userMsg){
  var msg = userMsg.trim()

  if(currentStep===0){
    siteState.storeName = msg
    siteState.storeSlug = msg.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')
    advanceStep(1)
    buildSection('announcement',{})
    buildSection('navbar',{})
    showBusinessStep(msg)
    return true
  }

  if(currentStep===1){
    siteState.businessType = msg
    advanceStep(2)
    buildSection('featured',{})
    buildSection('categories',{})
    showHeroStep()
    return true
  }

  if(currentStep===2){
    if(!siteState.tagline) siteState.tagline = msg
    advanceStep(3)
    buildSection('hero',{})
    showLayoutStep()
    return true
  }

  if(currentStep===3){
    if(msg.includes('4')) siteState.theme.cols='4'
    else if(msg.includes('2')) siteState.theme.cols='2'
    else siteState.theme.cols='3'
    advanceStep(4)
    renderPreview()
    showThemeStep()
    return true
  }

  if(currentStep===4){
    advanceStep(5)
    showExtrasStep()
    return true
  }

  if(currentStep===5){
    advanceStep(6)
    buildSection('newsletter',{})
    buildSection('footer',{})
    showDoneStep()
    return true
  }

  return false
}

══════════════════════════════════════ */
function buildSection(type, extracted){
  console.log('[eKart AI] building:', type)
  var id = 'sec_'+type+'_'+Date.now()
  var T = siteState.theme
  var data = {}

  switch(type){
    case 'announcement': data={text:'✨ Free shipping on orders over ₹999!',bgColor:T.primaryColor,textColor:'#ffffff'}; break
    case 'navbar': data={logoText:siteState.storeName||'My Store',logoEmoji:siteState.logoEmoji||'🛍️'}; break
    case 'hero': data={heading:siteState.tagline||'Welcome',subtext:siteState.description||'Great products.',ctaText:'Shop Now'}; break
    case 'featured': data={title:'Featured Products'}; break
    case 'categories': data={title:'Categories'}; break
    case 'newsletter': data={heading:'Stay Updated'}; break
    case 'footer': data={logoText:siteState.storeName||'My Store'}; break
  }

  var section={id:id,type:type,enabled:true,data:data}
  var existing=siteState.sections.findIndex(function(s){return s.type===type})
  
  if(existing>=0){
    siteState.sections[existing]=section
  } else {
    siteState.sections.push(section)
  }

  renderPreview()
  updateBuiltBar()
  showBuiltToast(type)
  return true
}

function updateBuiltBar(){
  var bar=document.getElementById('built-bar')
  if(!siteState.sections.length){bar.style.display='none';return}
  bar.style.display='flex'
  bar.innerHTML='<span style="font-size:9.5px;font-weight:700;color:var(--text3)">'+(siteState.sections.length)+' sections</span>'
    +siteState.sections.map(function(s){
      return '<div class="built-pill">'+s.type+'</div>'
    }).join('')
}

function showBuiltToast(type){
  document.getElementById('built-toast-msg').textContent=type+' added!'
  var t=document.getElementById('built-toast')
  t.classList.add('show')
  setTimeout(function(){t.classList.remove('show')},2000)
}

══════════════════════════════════════ */
function renderPreview(){
  var shell = document.getElementById('device-shell')
  var empty = document.getElementById('preview-empty')
  
  if(!siteState.sections.length){ 
    empty.style.display = 'flex'
    // Remove iframe if present
    var oldIframe = document.getElementById('preview-iframe')
    if(oldIframe) oldIframe.remove()
    return 
  }
  empty.style.display = 'none'

  // Create or reuse iframe
  var iframe = document.getElementById('preview-iframe')
  if(!iframe){
    iframe = document.createElement('iframe')
    iframe.id = 'preview-iframe'
    iframe.style.cssText = 'width:100%;border:none;display:block'
    shell.innerHTML = ''
    shell.appendChild(iframe)
  }

  // Generate full HTML from siteState
  var html = generatePreviewHTML(siteState)
  iframe.srcdoc = html
  iframe.height = '720' // adjust as needed
}

function generatePreviewHTML(state) {
  const T = state.theme
  const sections = state.sections.filter(s => s.enabled !== false)

  // Basic CSS reset and theme variables
  let style = `
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body {
        font-family: '${T.font}', sans-serif;
        background-color: ${T.bgColor};
        color: ${T.textColor};
        line-height:1.5;
      }
      .container { max-width:1200px; margin:0 auto; padding:0 20px; }
      .btn {
        background: ${T.primaryColor};
        color: white;
        padding: 10px 20px;
        border-radius: ${T.radius};
        border: none;
        cursor: pointer;
        font-weight:600;
      }
    </style>
  `

  // Build sections HTML
  let body = ''
  sections.forEach(sec => {
    switch(sec.type) {
      case 'announcement':
        body += `<div style="background:${T.primaryColor}; color:white; text-align:center; padding:8px;">${esc(sec.data.text || 'Free shipping!')}</div>`
        break
      case 'navbar':
        body += `
          <nav style="background:${T.navBg}; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1);">
            <div style="font-size:20px; font-weight:bold;">${esc(sec.data.logoEmoji || '🛍️')} ${esc(sec.data.logoText || 'Store')}</div>
            <div><a href="#" style="color:${T.textColor}; margin:0 10px;">Shop</a><a href="#" style="color:${T.textColor};">Contact</a></div>
          </nav>`
        break
      case 'hero':
        body += `
          <section style="background:${T.cardBg}; padding:60px 20px; text-align:center;">
            <h1 style="font-size:48px; margin-bottom:20px;">${esc(sec.data.heading || 'Welcome')}</h1>
            <p style="font-size:18px; margin-bottom:30px;">${esc(sec.data.subtext || 'Great products.')}</p>
            <button class="btn">${esc(sec.data.ctaText || 'Shop Now')}</button>
          </section>`
        break
      case 'featured':
        body += `
          <section style="padding:40px 20px;">
            <h2 style="text-align:center; margin-bottom:30px;">${esc(sec.data.title || 'Featured Products')}</h2>
            <div style="display:grid; grid-template-columns:repeat(${T.cols},1fr); gap:20px;">
              ${SAMPLE_PRODUCTS.map(p => `
                <div style="background:${T.cardBg}; border-radius:${T.radius}; padding:15px;">
                  <img src="${esc(p.img)}" style="width:100%; border-radius:8px;" alt="${esc(p.name)}">
                  <h3 style="margin:10px 0;">${esc(p.name)}</h3>
                  <p><strong>₹${p.price}</strong> <s style="color:#888;">₹${p.compare}</s></p>
                </div>
              `).join('')}
            </div>
          </section>`
        break
      // Add other section types as needed (categories, newsletter, footer)
      case 'footer':
        body += `
          <footer style="background:${T.navBg}; padding:30px 20px; text-align:center; border-top:1px solid rgba(255,255,255,0.1);">
            © ${new Date().getFullYear()} ${esc(sec.data.logoText || 'Store')}
          </footer>`
        break
      default:
        // fallback
        body += `<div style="padding:20px; background:${T.cardBg}; margin:10px;">[${sec.type} section]</div>`
    }
  })

  return `<html><head>${style}</head><body>${body}</body></html>`
}

/* ══════════════════════════════════════
   DEVICE & MODALS
══════════════════════════════════════ */
function setDevice(device, btn){
  currentDevice=device
  var shell = document.getElementById('device-shell')
  shell.className = 'device-shell ' + device
  document.querySelectorAll('.pdb').forEach(function(b){b.classList.remove('active')})
  btn.classList.add('active')
  // No need to re-render, iframe size will adjust via CSS
}

var _modalType = ''
function openModal(type){
  _modalType = type
  var title='', sub='', body=''

  if(type==='product'){
    title='➕ Add Product'
    sub='Add a product to your store'
    body='<div class="modal-field"><label>Product Name</label><input class="modal-input" id="m_name" placeholder="e.g. Nike Air Max 270"></div>'
      +'<div class="modal-field"><label>Price (₹)</label><input class="modal-input" id="m_price" type="number" placeholder="999"></div>'
  } else if(type==='category'){
    title='📂 Add Category'
    body='<div class="modal-field"><label>Category Name</label><input class="modal-input" id="m_name" placeholder="e.g. Fashion"></div>'
  } else if(type==='coupon'){
    title='🎫 Create Coupon'
    body='<div class="modal-field"><label>Coupon Code</label><input class="modal-input" id="m_code" placeholder="SAVE20"></div>'
      +'<div class="modal-field"><label>Discount %</label><input class="modal-input" id="m_value" type="number" placeholder="20"></div>'
  }

  document.getElementById('modal-title').textContent = title
  document.getElementById('modal-sub').textContent = sub
  document.getElementById('modal-body').innerHTML = body
  document.getElementById('modal-overlay').classList.add('open')
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open') }

function submitModal(){
  if(isDemo) { toast('Connect your store first','error'); closeModal(); return }
  // In a real implementation, you would call an API to create the product/category/coupon
  addMsg('ai', '✅ Item would be saved in production mode.')
  closeModal()
}

/* ══════════════════════════════════════
   PUBLISH — NOW SAVES SECTIONS AS WELL
══════════════════════════════════════ */
async function publishSite(){
  var btn=document.getElementById('publish-btn')
  if(!siteState.sections.length){ toast('Build at least one section first!','error'); return }
  if(!currentStoreId||isDemo){ toast('Please select a real store first','error'); return }
  btn.disabled=true; btn.textContent='⏳ Saving…'
  try {
    // Save theme settings (existing)
    await apiFetch('/stores/'+currentStoreId+'/theme/settings',{method:'PUT',body:JSON.stringify({
      primary_color:siteState.theme.primaryColor,
      secondary_color:siteState.theme.bgColor,
      // add other theme fields as needed
    })})
    // Save sections (adjust endpoint to match your backend)
    // Example: PUT /stores/{id}/sections
    await apiFetch('/stores/'+currentStoreId+'/sections',{method:'PUT',body:JSON.stringify({
      sections: siteState.sections
    })})
    
    toast('🚀 Published! Your store is live.','success')
    addMsg('ai','🚀 <strong>Your store is live!</strong>')
    btn.textContent='✅ Published!'
    setTimeout(function(){btn.textContent='🚀 Publish';btn.disabled=false},3000)
  } catch(e){
    console.error('[eKart AI] publish failed:', e)
    toast('Save failed: '+e.message,'error')
    btn.disabled=false; btn.textContent='🚀 Publish'
  }
}
</script>

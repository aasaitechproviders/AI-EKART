<style>
  /* ── STORE CARDS ── */
  .stores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 18px; }
  .store-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    transition: border-color .2s, transform .2s, box-shadow .2s;
  }
  .store-card:hover { border-color: rgba(108,99,255,0.35); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
  .store-banner {
    height: 76px;
    display: flex; align-items: center;
    padding: 0 20px;
    gap: 12px;
  }
  .store-banner-logo { height: 48px; width: 48px; border-radius: 12px; object-fit: contain; background: rgba(255,255,255,0.15); padding: 4px; }
  .store-banner-initials { font-size: 26px; font-weight: 900; color: white; letter-spacing: -0.04em; }
  .store-card-body { padding: 16px 18px; }
  .store-name { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
  .store-slug { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .store-badges { display: flex; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }
  .store-kpis {
    display: grid; grid-template-columns: repeat(3,1fr);
    border-top: 1px solid var(--border);
    margin: 0 -18px 14px;
  }
  .store-kpi { padding: 10px 8px; text-align: center; border-right: 1px solid var(--border); }
  .store-kpi:last-child { border-right: none; }
  .store-kpi-val { font-size: 14px; font-weight: 800; font-family: 'DM Mono', monospace; color: var(--text); line-height: 1; margin-bottom: 3px; }
  .store-kpi-val.loading { color: var(--border2); animation: shimmer 1.2s infinite; }
  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.3} }
  .store-kpi-val.rev { color: var(--green); }
  .store-kpi-val.today { color: var(--accent2); }
  .store-kpi-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); }
  .store-actions { display: flex; gap: 7px; flex-wrap: wrap; }

  /* ── DASH STATS ── */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .stat-icon { font-size: 26px; }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 900; letter-spacing: -0.04em; font-family: 'DM Mono', monospace; }

  /* Card style picker */
  .card-style-picker { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 4px; }
  .card-style-opt { border: 2px solid var(--border); border-radius: 10px; padding: 10px 6px 8px; cursor: pointer; text-align: center; transition: all .15s; }
  .card-style-opt:hover, .card-style-opt.active { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  .card-style-opt span { font-size: 11px; font-weight: 700; color: var(--text3); display: block; margin-top: 6px; }
  .card-style-opt.active span { color: var(--accent2); }
  .card-style-preview { height: 44px; display: flex; align-items: center; justify-content: center; }
  .cspr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; width: 40px; }
  .cspr-grid div { background: var(--border2); border-radius: 2px; height: 16px; }
  .card-style-opt.active .cspr-grid div { background: var(--accent); opacity: 0.5; }
  .cspr-list { display: flex; gap: 4px; align-items: center; width: 50px; margin-bottom: 3px; }
  .cspr-list-img { width: 16px; height: 16px; background: var(--border2); border-radius: 2px; flex-shrink: 0; }
  .cspr-list-lines { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .cspr-list-lines span { display: block; height: 3px; background: var(--border2); border-radius: 2px; }
  .card-style-opt.active .cspr-list-img, .card-style-opt.active .cspr-list-lines span { background: var(--accent); opacity: 0.5; }
  .cspr-minimal { position: relative; width: 40px; height: 40px; border-radius: 5px; overflow: hidden; }
  .cspr-min-img { position: absolute; inset: 0; background: var(--border2); }
  .cspr-min-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: rgba(0,0,0,0.3); }
  .card-style-opt.active .cspr-min-img { background: var(--accent); opacity: 0.4; }
  .cspr-magazine { display: flex; gap: 3px; width: 48px; height: 40px; }
  .cspr-mag-big { flex: 2; background: var(--border2); border-radius: 2px; }
  .cspr-mag-small { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .cspr-mag-small div { flex: 1; background: var(--border2); border-radius: 2px; }
  .card-style-opt.active .cspr-mag-big, .card-style-opt.active .cspr-mag-small div { background: var(--accent); opacity: 0.5; }

  /* ── CUSTOM DOMAIN WIDGET ── */
  @keyframes domain-pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(1.55); }
  }

  .domain-section {
    border-top: 1px solid var(--border);
    margin: 0 -18px 12px;
    padding: 10px 18px 0;
  }
  .domain-section-label {
    font-size: 9.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    margin-bottom: 7px;
  }
  .domain-status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .domain-status-row.pending {
    border: 1px solid rgba(245,158,11,0.3);
    background: rgba(245,158,11,0.07);
  }
  .domain-status-row.connected {
    border: 1px solid rgba(34,197,94,0.3);
    background: rgba(34,197,94,0.07);
  }
  .domain-dot {
    width: 8px; height: 8px;
    border-radius: 50%; flex-shrink: 0;
  }
  .domain-dot.pending   { background: #f59e0b; animation: domain-pulse 1.3s ease-in-out infinite; }
  .domain-dot.connected { background: #22c55e; }
  .domain-value {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .domain-value.pending   { color: #d97706; }
  .domain-value.connected { color: #16a34a; }
  .domain-badge { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; flex-shrink: 0; }
  .domain-badge.pending   { color: #b45309; }
  .domain-badge.connected { color: #15803d; }
  .domain-action-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 13px;
    padding: 0 2px; line-height: 1; flex-shrink: 0;
    transition: color .15s;
  }
  .domain-action-btn:hover        { color: var(--accent2); }
  .domain-action-btn.remove:hover { color: #ef4444; }

  /* Domain input row */
  .domain-input-row {
    display: flex; gap: 6px; margin-bottom: 6px;
  }
  .domain-input-row input {
    flex: 1; font-size: 11.5px;
    font-family: 'DM Mono', monospace;
    height: 32px; padding: 0 10px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg); color: var(--text);
    outline: none; transition: border-color .15s;
  }
  .domain-input-row input:focus { border-color: rgba(108,99,255,0.5); }
  .domain-save-btn {
    font-size: 11px; font-weight: 700;
    padding: 0 12px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text);
    cursor: pointer; white-space: nowrap;
    transition: border-color .15s, color .15s;
  }
  .domain-save-btn:hover { border-color: rgba(108,99,255,0.4); color: var(--accent2); }

  /* ── DNS GUIDE PANEL ── */
  .dns-guide {
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: 10px;
    background: rgba(108,99,255,0.05);
    overflow: hidden;
    margin-bottom: 6px;
  }
  .dns-guide-header {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 11px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .dns-guide-header:hover { background: rgba(108,99,255,0.08); }
  .dns-guide-title {
    font-size: 11px; font-weight: 700;
    color: var(--accent2); flex: 1;
  }
  .dns-guide-chevron {
    font-size: 10px; color: var(--text3);
    transition: transform .2s;
  }
  .dns-guide-chevron.open { transform: rotate(180deg); }
  .dns-guide-body {
    display: none;
    padding: 0 11px 10px;
    border-top: 1px solid rgba(108,99,255,0.15);
  }
  .dns-guide-body.open { display: block; }

  /* Registrar tabs */
  .reg-tabs {
    display: flex; gap: 4px;
    margin: 9px 0 10px; flex-wrap: wrap;
  }
  .reg-tab {
    font-size: 10px; font-weight: 700;
    padding: 3px 9px; border-radius: 6px;
    border: 1px solid var(--border2);
    background: none; color: var(--text3);
    cursor: pointer; transition: all .15s;
    letter-spacing: 0.03em;
  }
  .reg-tab:hover { border-color: rgba(108,99,255,0.4); color: var(--text); }
  .reg-tab.active {
    border-color: var(--accent);
    background: rgba(108,99,255,0.12);
    color: var(--accent2);
  }

  /* DNS steps */
  .dns-steps { display: flex; flex-direction: column; gap: 6px; }
  .dns-step {
    display: flex; gap: 8px; align-items: flex-start;
  }
  .dns-step-num {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(108,99,255,0.2);
    color: var(--accent2); font-size: 9px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .dns-step-text {
    font-size: 11px; color: var(--text2); line-height: 1.5; flex: 1;
  }
  .dns-step-text strong { color: var(--text); font-weight: 700; }

  /* DNS record box */
  .dns-record-box {
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
    margin: 8px 0 4px;
    font-family: 'DM Mono', monospace;
  }
  .dns-record-box-header {
    padding: 5px 10px;
    background: var(--surface2);
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text3);
  }
  .dns-record-row {
    display: flex; align-items: center;
    padding: 5px 10px; gap: 6px;
    border-top: 1px solid var(--border);
  }
  .dns-rec-key {
    font-size: 9.5px; font-weight: 700; color: var(--text3);
    width: 44px; flex-shrink: 0;
  }
  .dns-rec-val {
    font-size: 11px; color: var(--text); flex: 1;
  }
  .dns-rec-val.accent { color: var(--accent2); }
  .dns-copy-btn {
    background: none; border: 1px solid var(--border2);
    border-radius: 5px; cursor: pointer;
    color: var(--text3); font-size: 10px;
    padding: 2px 6px; line-height: 1.4;
    transition: all .15s; white-space: nowrap;
  }
  .dns-copy-btn:hover { border-color: var(--accent); color: var(--accent2); }

  /* Domain hint */
  .domain-hint {
    font-size: 10px; color: var(--text3); line-height: 1.5;
  }
  .domain-hint code {
    font-family: 'DM Mono', monospace; font-size: 10px;
    background: var(--surface2); padding: 1px 5px; border-radius: 4px;
  }

  /* Pending DNS steps hint */
  .dns-pending-hint {
    font-size: 10px; color: #92400e; line-height: 1.5;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 8px; padding: 7px 10px;
    margin-top: 6px;
  }
  .dns-pending-hint code {
    font-family: 'DM Mono', monospace; font-size: 10px;
    background: rgba(0,0,0,0.15); padding: 1px 5px; border-radius: 4px;
  }
</style>

const CNAME_TARGET = 'storefront.aasaitech.in'

const REGISTRAR_STEPS = {
  godaddy: {
    label: 'GoDaddy',
    steps: [
      'Log in to <strong>GoDaddy</strong> → My Products → find your domain → click <strong>DNS</strong>',
      'Click <strong>Add New Record</strong>',
      'Fill in the record exactly as shown below, then click <strong>Save</strong>',

    ]
  },
  namecheap: {
    label: 'Namecheap',
    steps: [
      'Log in to <strong>Namecheap</strong> → Domain List → click <strong>Manage</strong> next to your domain',
      'Go to the <strong>Advanced DNS</strong> tab',
      'Click <strong>Add New Record</strong> and fill in the values below, then click ✔',
      'DNS changes can take <strong>up to 48 hours</strong> — usually under 30 min'
    ]
  },
  cloudflare: {
    label: 'Cloudflare',
    steps: [
      'Log in to <strong>Cloudflare</strong> → select your domain → click <strong>DNS</strong>',
      'Click <strong>Add record</strong>',
      'Fill in the values below. Set <strong>Proxy status to DNS only</strong> (grey cloud 🌧)', 
      'Click <strong>Save</strong>. DNS propagates in seconds on Cloudflare'
    ]
  },
  bigrock: {
    label: 'BigRock',
    steps: [
      'Log in to <strong>BigRock</strong> → Domains → click your domain → <strong>DNS</strong>',
      'Under <strong>CNAME Records</strong> click <strong>Add CNAME Record</strong>',
      'Fill in the values below, then click <strong>Update</strong>',
      'DNS changes can take <strong>up to 48 hours</strong>'
    ]
  },
  other: {
    label: 'Other',
    steps: [

      'Navigate to <strong>DNS Settings / DNS Management / Zone Editor</strong>',
      'Add a new <strong>CNAME</strong> record with the values below',
      'Save / confirm. DNS changes can take <strong>up to 48 hours</strong>'
    ]
  }
}

// ── DNS GUIDE HTML BUILDER ────────────────────────────────────────────────────

function buildDnsGuideHtml(storeId) {
  const tabsHtml = Object.entries(REGISTRAR_STEPS).map(([key, r]) =>
    `<button class="reg-tab${key==='godaddy'?' active':''}" onclick="switchRegTab('${storeId}','${key}',this)">${r.label}</button>`
  ).join('')

  const allPanels = Object.entries(REGISTRAR_STEPS).map(([key, r]) => {
    const stepsHtml = r.steps.map((s,i) =>
      `<div class="dns-step">
        <div class="dns-step-num">${i+1}</div>
        <div class="dns-step-text">${s}</div>
      </div>`
    ).join('')

    // For Cloudflare the Name is just the subdomain prefix, others vary slightly in hint
    const nameHint = key === 'cloudflare' ? 'www <span style="font-size:9px;color:var(--text3)">(subdomain only)</span>' : 'www'

    return `<div class="reg-panel" data-reg="${key}" style="display:${key==='godaddy'?'block':'none'}">
      <div class="dns-steps">${stepsHtml}</div>
      <div class="dns-record-box">
        <div class="dns-record-box-header">DNS Record to Add</div>
        <div class="dns-record-row">
          <span class="dns-rec-key">Type</span>
          <span class="dns-rec-val accent">CNAME</span>
        </div>
        <div class="dns-record-row">
          <span class="dns-rec-key">Name</span>
          <span class="dns-rec-val">${nameHint}</span>
        </div>
        <div class="dns-record-row">
          <span class="dns-rec-key">Value</span>
          <span class="dns-rec-val accent" style="word-break:break-all;">${CNAME_TARGET}</span>
          <button class="dns-copy-btn" onclick="copyText('${CNAME_TARGET}','Copied!')">Copy</button>
        </div>
        <div class="dns-record-row">
          <span class="dns-rec-key">TTL</span>
          <span class="dns-rec-val">1 hour (3600)</span>
        </div>
      </div>
    </div>`
  }).join('')

  return `<div class="dns-guide" id="dns-guide-${storeId}">
    <div class="dns-guide-header" onclick="toggleDnsGuide('${storeId}')">
      <span style="font-size:14px;">📖</span>
      <span class="dns-guide-title">How to set up your domain →</span>
      <span class="dns-guide-chevron" id="dns-chevron-${storeId}">▼</span>
    </div>
    <div class="dns-guide-body" id="dns-body-${storeId}">
      <div class="reg-tabs" id="reg-tabs-${storeId}">${tabsHtml}</div>
      <div id="reg-panels-${storeId}">${allPanels}</div>
    </div>
  </div>`
}

function toggleDnsGuide(storeId) {
  const body = document.getElementById(`dns-body-${storeId}`)
  const chev = document.getElementById(`dns-chevron-${storeId}`)
  if (!body) return
  const open = body.classList.toggle('open')
  if (chev) chev.classList.toggle('open', open)
}

function switchRegTab(storeId, key, btn) {
  // Update tabs
  document.querySelectorAll(`#reg-tabs-${storeId} .reg-tab`).forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  // Update panels
  document.querySelectorAll(`#reg-panels-${storeId} .reg-panel`).forEach(p => {
    p.style.display = p.dataset.reg === key ? 'block' : 'none'
  })
}

function copyText(text, msg) {
  navigator.clipboard.writeText(text)
    .then(() => toast(msg || 'Copied!', 'success'))
    .catch(() => toast(text, 'info'))
}

// ── DOMAIN WIDGET RENDERER ────────────────────────────────────────────────────

function renderDomainWidget(s) {
  const domain = (s.custom_domain || '').trim()
  const status = s.domain_status || (domain ? 'pending' : '')

  // ── CONNECTED ──
  if (domain && status === 'connected') {
    return `
      <div class="domain-status-row connected">
        <div class="domain-dot connected"></div>
        <span class="domain-value connected" title="${domain}">${domain}</span>
        <span class="domain-badge connected">Connected ✓</span>
        <button class="domain-action-btn remove" onclick="clearDomain('${s._id}')" title="Remove domain">✕</button>
      </div>`
  }

  // ── PENDING / VERIFYING ──
  if (domain && status === 'pending') {
    return `
      <div class="domain-status-row pending">
        <div class="domain-dot pending"></div>
        <span class="domain-value pending" title="${domain}">${domain}</span>
        <span class="domain-badge pending">Verifying…</span>
        <button class="domain-action-btn" onclick="verifyDomain('${s._id}','${domain}')" title="Re-check now">↻</button>
        <button class="domain-action-btn remove" onclick="clearDomain('${s._id}')" title="Remove domain">✕</button>
      </div>
      <div class="dns-pending-hint">
        ⏳ Waiting for DNS. Make sure you've added a CNAME record pointing to
        <code>${CNAME_TARGET}</code> at your registrar, then click ↻ to recheck.
      </div>
      ${buildDnsGuideHtml(s._id)}`
  }

  // ── NO DOMAIN YET — show input + guide ──
  return `
    <div class="domain-input-row">
      <input type="text" id="domain-inp-${s._id}" placeholder="shop.yourbrand.com" value="${domain}">
      <button class="domain-save-btn" onclick="saveDomain('${s._id}')">Save</button>
    </div>
    ${buildDnsGuideHtml(s._id)}`
}

// ── STORE CARD RENDERER ──────────────────────────────────────────────────────

function renderStores() {
  const container = document.getElementById('page-content')
  container.querySelector('.stores-grid')?.remove()

  if (!allStores.length) {
    container.insertAdjacentHTML('beforeend', `
      <div class="empty-state">
        <div class="empty-icon">🏪</div>
        <h3>No stores yet</h3>
        <p>Create your first store to start selling</p>
        <button class="btn btn-primary" style="margin-top:16px;" onclick="openCreateStore()">+ Create Store</button>
      </div>`)
    return
  }

  const grid = document.createElement('div')
  grid.className = 'stores-grid'
  grid.innerHTML = allStores.map(s => {
    const bg = s.brand_color || '#6c63ff'
    const logo = s.logo_url
      ? `<img class="store-banner-logo" src="${s.logo_url}" alt="">`
      : `<span class="store-banner-initials">${s.name.slice(0,2).toUpperCase()}</span>`

    return `<div class="store-card">
      <div class="store-banner" style="background:linear-gradient(135deg,${bg}ee,${bg}88);">${logo}</div>
      <div class="store-card-body">
        <div class="store-name">${s.name}</div>
        <div class="store-slug">/${s.slug}
          <button onclick="copyStoreUrl('${s.slug}')" title="Copy store URL" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 4px;vertical-align:middle;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">📋</button>
        </div>

        <div class="domain-section">
          <div class="domain-section-label">Custom Domain</div>
          ${renderDomainWidget(s)}
        </div>

        <div class="store-badges">
          <span class="badge ${s.published ? 'badge-green' : 'badge-gray'}">${s.published ? '● Live' : '○ Draft'}</span>
          <span class="badge badge-gray">📦 ${s.product_count || 0}</span>
          <span class="badge badge-gray">📋 ${s.order_count || 0}</span>
        </div>
        <div class="store-kpis" style="padding: 0 18px;">
          <div class="store-kpi"><div class="store-kpi-val loading" id="kpi-rev-${s._id}">—</div><div class="store-kpi-label">Revenue</div></div>
          <div class="store-kpi"><div class="store-kpi-val loading" id="kpi-ord-${s._id}">—</div><div class="store-kpi-label">Orders</div></div>
          <div class="store-kpi"><div class="store-kpi-val loading" id="kpi-today-${s._id}">—</div><div class="store-kpi-label">Today</div></div>
        </div>
        <div class="store-actions">
          ${s.published ? `<a href="${s.published_url}" target="_blank" class="btn btn-secondary btn-sm">🌐 View</a>` : ''}
          <button class="btn btn-secondary btn-sm" onclick="publishStore('${s._id}')">🚀 ${s.published ? 'Republish' : 'Publish'}</button>
          <button class="btn btn-secondary btn-sm" onclick="openEditStore('${s._id}')">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteStore('${s._id}','${s.name.replace(/'/g,"\\'")}')">🗑</button>
        </div>
      </div>
    </div>`
  }).join('')
  container.appendChild(grid)
}

// ── PAGE INIT ────────────────────────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('stores')
  if (!nav) return
  currentUser = nav.user
  document.getElementById('storeEmail').value = currentUser.email || ''
  setTopbarActions(`<button class="btn btn-primary" onclick="openCreateStore()">+ New Store</button>`)
  await loadAll()
})

async function loadAll() {
  const pc = document.getElementById('page-content')
  pc.querySelector('.stats-row')?.remove()
  await Promise.all([loadStores(), loadDashStats()])
}

async function loadStores() {
  allStores = await apiFetch('/stores')
  renderStores()
  allStores.forEach(s => loadStoreKPIs(s))
}

async function loadDashStats() {
  try {
    const d = await apiFetch('/dashboard')
    document.getElementById('page-content')?.querySelector('.stats-row')?.remove()
    const statsHtml = `
      <div class="stats-row">
        <div class="stat-card"><span class="stat-icon">🏪</span><div><div class="stat-label">Total Stores</div><div class="stat-value">${d.stores_count}</div></div></div>
        <div class="stat-card"><span class="stat-icon">📦</span><div><div class="stat-label">Total Orders</div><div class="stat-value">${d.total_orders}</div></div></div>
        <div class="stat-card"><span class="stat-icon">🕐</span><div><div class="stat-label">Today\'s Orders</div><div class="stat-value">${d.today_orders}</div></div></div>
        <div class="stat-card"><span class="stat-icon">💰</span><div><div class="stat-label">Total Revenue</div><div class="stat-value">₹${(d.total_revenue||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</div></div></div>
      </div>`
    document.getElementById('page-content').insertAdjacentHTML('afterbegin', statsHtml)
  } catch {}
}

async function loadStoreKPIs(s) {
  try {
    const data = await apiFetch(`/stores/${s._id}/analytics?days=30`)
    const cur = s.currency === 'USD' ? '$' : s.currency === 'EUR' ? '€' : '₹'
    const rev = data.total_revenue || 0
    const revStr = rev >= 100000 ? cur + (rev/100000).toFixed(1)+'L' : rev >= 1000 ? cur + (rev/1000).toFixed(1)+'k' : cur + rev.toFixed(0)
    const revEl = document.getElementById(`kpi-rev-${s._id}`)
    const ordEl = document.getElementById(`kpi-ord-${s._id}`)
    const todEl = document.getElementById(`kpi-today-${s._id}`)
    if (revEl) { revEl.textContent = revStr; revEl.classList.remove('loading'); revEl.classList.add('rev') }
    if (ordEl) { ordEl.textContent = data.total_orders || 0; ordEl.classList.remove('loading') }
    if (todEl) { todEl.textContent = data.today_orders || 0; todEl.classList.remove('loading'); todEl.classList.add('today') }
  } catch {}
}

// ── DOMAIN ACTIONS ────────────────────────────────────────────────────────────

async function saveDomain(storeId) {
  const input = document.getElementById(`domain-inp-${storeId}`)
  const domain = (input?.value || '').trim()
  if (!domain) return toast('Enter a domain name', 'error')

  if (!/^[a-zA-Z0-9][a-zA-Z0-9\-\.]+\.[a-zA-Z]{2,}$/.test(domain)) {
    return toast('Enter a valid domain (e.g. shop.yourbrand.com)', 'error')
  }

  try {
    const fd = new FormData()
    fd.append('custom_domain', domain)
    const res = await fetch(API + `/stores/${storeId}`, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + getToken() },
      body: fd
    })
    if (!res.ok) { const e = await res.json(); throw new Error(e.error) }

    const s = allStores.find(x => x._id === storeId)
    if (s) { s.custom_domain = domain; s.domain_status = 'pending' }

    toast('Domain saved! Now add the CNAME record at your registrar.', 'info')
    renderStores()
    allStores.forEach(st => loadStoreKPIs(st))

    // Auto-verify after 8 seconds
    setTimeout(() => verifyDomain(storeId, domain), 8000)
  } catch (e) { toast(e.message, 'error') }
}

async function verifyDomain(storeId, domain) {
  try {
    const data = await apiFetch(`/stores/${storeId}/verify-domain`)
    const s = allStores.find(x => x._id === storeId)
    if (!s) return

    if (data.connected) {
      s.domain_status = 'connected'
      toast(`✓ ${domain} is connected!`, 'success')
    } else {
      s.domain_status = 'pending'
      toast('DNS not verified yet — check your CNAME record and try again shortly.', 'info')
    }
    renderStores()
    allStores.forEach(st => loadStoreKPIs(st))
  } catch (e) {
    toast('Could not verify domain right now. Try again shortly.', 'error')
  }
}

async function clearDomain(storeId) {
  if (!confirm('Remove custom domain from this store?')) return
  try {
    const fd = new FormData()
    fd.append('custom_domain', '')
    const res = await fetch(API + `/stores/${storeId}`, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + getToken() },
      body: fd
    })
    if (!res.ok) { const e = await res.json(); throw new Error(e.error) }

    const s = allStores.find(x => x._id === storeId)
    if (s) { s.custom_domain = ''; s.domain_status = '' }

    toast('Custom domain removed', 'info')
    renderStores()
    allStores.forEach(st => loadStoreKPIs(st))
  } catch (e) { toast(e.message, 'error') }
}

// ── STORE CRUD ────────────────────────────────────────────────────────────────

function openCreateStore() {
  document.getElementById('storeModalTitle').textContent = 'Create New Store'
  document.getElementById('storeEditId').value = ''
  document.getElementById('storeName').value = ''
  document.getElementById('storeTagline').value = ''
  document.getElementById('storeDesc').value = ''
  document.getElementById('storeEmail').value = currentUser?.email || ''
  document.getElementById('storePhone').value = ''
  document.getElementById('storeBrandColor').value = '#6c63ff'
  document.getElementById('storeLogoFile').value = ''
  document.getElementById('storeLogoExisting').value = ''
  document.getElementById('storeLogoPreview').style.display = 'none'
  document.getElementById('storeCustomDomain').value = ''
  selectCardStyle('grid', document.querySelector('[data-style="grid"]'))
  openModal('storeModal')
}

function openEditStore(id) {
  const s = allStores.find(x => x._id === id); if (!s) return
  document.getElementById('storeModalTitle').textContent = 'Edit Store'
  document.getElementById('storeEditId').value = id
  document.getElementById('storeName').value = s.name
  document.getElementById('storeTagline').value = s.tagline || ''
  document.getElementById('storeDesc').value = s.description || ''
  document.getElementById('storeEmail').value = s.contact_email || ''
  document.getElementById('storePhone').value = s.phone || ''
  document.getElementById('storeCurrency').value = s.currency || 'INR'
  document.getElementById('storeBrandColor').value = s.brand_color || '#6c63ff'
  const cs = s.card_style || 'grid'
  selectCardStyle(cs, document.querySelector(`[data-style="${cs}"]`))
  document.getElementById('storeLogoFile').value = ''
  document.getElementById('storeLogoExisting').value = s.logo_url || ''
  document.getElementById('storeCustomDomain').value = s.custom_domain || ''
  if (s.logo_url) {
    document.getElementById('storeLogoImg').src = s.logo_url
    document.getElementById('storeLogoPreview').style.display = 'block'
  } else {
    document.getElementById('storeLogoPreview').style.display = 'none'
  }
  openModal('storeModal')
}

async function saveStore() {
  const id   = document.getElementById('storeEditId').value
  const name = document.getElementById('storeName').value.trim()
  if (!name) return toast('Store name is required', 'error')

  const fd = new FormData()
  fd.append('name', name)
  fd.append('tagline', document.getElementById('storeTagline').value.trim())
  fd.append('description', document.getElementById('storeDesc').value.trim())
  fd.append('contact_email', document.getElementById('storeEmail').value.trim())
  fd.append('phone', document.getElementById('storePhone').value.trim())
  fd.append('currency', document.getElementById('storeCurrency').value)
  fd.append('brand_color', document.getElementById('storeBrandColor').value)
  fd.append('card_style', document.getElementById('storeCardStyle').value || 'grid')
  fd.append('custom_domain', document.getElementById('storeCustomDomain').value.trim())

  const logoFile = document.getElementById('storeLogoFile').files[0]
  if (logoFile) fd.append('logo', logoFile)
  else fd.append('logo_url', document.getElementById('storeLogoExisting').value || '')

  try {
    const url = id ? `/stores/${id}` : '/stores'
    const res = await fetch(API + url, {
      method: id ? 'PUT' : 'POST',
      headers: { 'Authorization': 'Bearer ' + getToken() },
      body: fd
    })
    if (!res.ok) { const e = await res.json(); throw new Error(e.error) }
    closeModal('storeModal')
    await loadStores()
    toast(id ? 'Store updated!' : 'Store created!', 'success')
  } catch (e) { toast(e.message, 'error') }
}

function copyStoreUrl(slug) {
  const url = `https://ekart.aasaitech.in/${slug}`
  navigator.clipboard.writeText(url)
    .then(() => toast('Store URL copied!', 'success'))
    .catch(() => toast(url, 'info'))
}

async function publishStore(id) {
  try {
    const r = await apiFetch(`/stores/${id}/publish`, { method: 'POST', body: '{}' })
    toast('Store published! URL copied.')
    navigator.clipboard.writeText(r.url).catch(() => {})
    await loadStores()
  } catch (e) { toast(e.message, 'error') }
}

async function deleteStore(id, name) {
  if (!confirm(`Delete "${name}" and all its data? This cannot be undone.`)) return
  try {
    await apiFetch(`/stores/${id}`, { method: 'DELETE', body: '{}' })
    await loadStores()
    toast('Store deleted')
  } catch (e) { toast(e.message, 'error') }
}

function selectCardStyle(style, el) {
  document.querySelectorAll('.card-style-opt').forEach(o => o.classList.remove('active'))
  if (el) el.classList.add('active')
  document.getElementById('storeCardStyle').value = style
}

function previewLogo(input) {
  if (!input.files[0]) return
  const r = new FileReader()
  r.onload = e => {
    document.getElementById('storeLogoImg').src = e.target.result
    document.getElementById('storeLogoPreview').style.display = 'block'
  }
  r.readAsDataURL(input.files[0])
}
</script>

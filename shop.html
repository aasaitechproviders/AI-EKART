<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#0f0f0f;--p2:#525252;--p3:#a3a3a3;
  --bg:#fafafa;--bg2:#f5f5f5;--bg3:#f0f0f0;
  --border:#e8e8e8;--accent:#0f0f0f;
  --primary:#111;--brand:#111;
  --radius:12px;--btn-r:8px;
  --font:'DM Sans',system-ui,sans-serif;
  --font-display:'DM Serif Display',serif;
  --cols:4;--navbar-h:64px;
  --sh0:0 1px 2px rgba(0,0,0,.04);
  --sh1:0 4px 16px rgba(0,0,0,.06);
  --sh2:0 16px 48px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
  --ease:cubic-bezier(.4,0,.2,1);
  --card-bg:#ffffff;
  --card-border:var(--border);
  --card-radius:16px;
  --card-aspect:4/5;
  --card-name-fs:13.5px;
  --card-price-fs:15px;
  --card-info-pad:13px 14px 5px;
  --card-btn-pad:7px 12px 12px;
  --card-btn-padding:11px 13px;
  --card-btn-fs:11.5px;
  --card-gap:20px;
  --card-cat-fs:9px;
}
body{font-family:var(--font);background:var(--bg);color:var(--p);-webkit-font-smoothing:antialiased;padding-bottom:80px}
img{display:block;max-width:100%}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .4s var(--ease)}
#loader.out{opacity:0;pointer-events:none}
.ld-ring{width:40px;height:40px;border:2.5px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:ldSpin .8s linear infinite}
.ld-text{font-size:13px;color:var(--p3);letter-spacing:.04em;font-weight:500}
@keyframes ldSpin{to{transform:rotate(360deg)}}
.announcement-bar{background:var(--p);color:#fff;text-align:center;padding:10px 16px;font-size:12.5px;font-weight:500;letter-spacing:.04em;position:relative;z-index:201;display:flex;align-items:center;justify-content:center;gap:12px}
.ann-close{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;flex-shrink:0}
.ann-close:hover{color:#fff}
.ann-link{color:rgba(255,255,255,.8);text-decoration:underline;font-size:12px}
#origHeader{background:rgba(250,250,250,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.hdr-inner{max-width:1440px;margin:0 auto;padding:0 48px;height:var(--navbar-h);display:flex;align-items:center;justify-content:space-between;gap:24px}
.hdr-logo{font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:-.01em;color:var(--p);white-space:nowrap;display:flex;align-items:center;gap:10px}
.hdr-logo img{height:32px;object-fit:contain;border-radius:6px}
.hdr-nav{display:flex;align-items:center;gap:32px}
.hdr-nav a{font-size:13.5px;font-weight:500;color:var(--p2);transition:color .15s;letter-spacing:.01em}
.hdr-nav a:hover{color:var(--p)}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-icon-btn{width:38px;height:38px;border-radius:10px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--p2);transition:background .15s,color .15s;font-size:15px}
.hdr-icon-btn:hover{background:var(--bg2);color:var(--p)}
.hdr-search-wrap{flex:1;max-width:360px;margin:0 16px;position:relative}
.hdr-search-wrap input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;outline:none;background:var(--bg2);color:var(--p);transition:.2s}
.hdr-search-wrap input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.hdr-search-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--p3);pointer-events:none;font-size:13px}
.hdr-cart-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;background:var(--p);color:#fff;border-radius:var(--btn-r);font-size:13.5px;font-weight:600;border:none;cursor:pointer;transition:.2s var(--ease);letter-spacing:.01em}
.hdr-cart-btn:hover{background:#333}
.cart-badge{background:#fff;color:var(--p);font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px}
.cart-badge.on{display:flex}
#payBadge{display:none;padding:5px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px;font-size:11.5px;font-weight:600;color:#16a34a;align-items:center;gap:4px}
#heroBanner{padding:80px 40px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border);display:none}
#heroBanner.visible{display:block}
#heroBanner h1{font-family:var(--font-display);font-size:clamp(32px,5vw,60px);font-weight:400;letter-spacing:-.02em;margin-bottom:14px;line-height:1.1}
#heroBanner p{font-size:16px;color:var(--p2);max-width:440px;margin:0 auto 32px;line-height:1.7}
.hero-cta{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:var(--p);color:#fff;border-radius:var(--btn-r);font-size:14px;font-weight:600;border:none;cursor:pointer;transition:.2s var(--ease)}
.hero-cta:hover{background:#333}
.products-grid{display:grid;grid-template-columns:repeat(var(--cols,4),1fr);gap:var(--card-gap,20px)}
.product-card{background:#fff;border-radius:var(--card-radius);overflow:hidden;color:var(--p);display:flex;flex-direction:column;position:relative;border:none;box-shadow:0 2px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);transition:box-shadow .28s var(--ease),transform .28s var(--ease);cursor:pointer}
.product-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),rgba(0,0,0,.25));z-index:5;opacity:0;transition:opacity .25s var(--ease)}
.product-card:hover::before{opacity:1}
.product-card:hover{box-shadow:0 18px 40px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.07);transform:translateY(-4px);z-index:2}
.card-link{text-decoration:none;color:inherit;display:flex;flex-direction:column;flex:1}
.product-img{position:relative;width:100%;aspect-ratio:var(--card-aspect,4/5);overflow:hidden;background:var(--bg2);flex-shrink:0}
.product-img img{width:100%;height:100%;object-fit:cover;transition:transform .42s var(--ease);display:block}
.product-card:hover .product-img img{transform:scale(1.06)}
.product-img.img-error img{display:none}
.img-fallback-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;opacity:.14;pointer-events:none}
.product-badge{position:absolute;top:10px;left:10px;z-index:3;font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.06em;text-transform:uppercase}
.badge-sale,.badge-discount{background:#ef4444;color:#fff}
.badge-new{background:#0ea5e9;color:#fff}
.badge-bestseller,.badge-hot{background:#f97316;color:#fff}
.badge-trending{background:#8b5cf6;color:#fff}
.badge-custom{background:var(--primary);color:#fff}
.wish-btn{position:absolute;top:8px;right:8px;z-index:3;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);border:none;box-shadow:0 2px 8px rgba(0,0,0,.14);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s var(--ease);opacity:0;transform:scale(.8) translateY(-3px)}
.product-card:hover .wish-btn{opacity:1;transform:scale(1) translateY(0)}
.wish-btn:hover{background:#fff;transform:scale(1.12)!important;box-shadow:0 4px 12px rgba(0,0,0,.18)}
.wish-btn.wished{color:#ef4444;opacity:1;transform:scale(1) translateY(0)}
.card-atc-overlay{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:0 10px 10px;transform:translateY(110%);transition:transform .25s var(--ease);pointer-events:none}
.product-card:hover .card-atc-overlay{transform:translateY(0);pointer-events:auto}
.product-card.in-cart .card-atc-overlay{display:none!important}
.card-atc-btn{width:100%;padding:10px 12px;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#fff;border:1px solid rgba(255,255,255,.16);border-radius:9px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:.08em;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:5px;box-shadow:0 4px 16px rgba(0,0,0,.25);text-transform:uppercase}
.card-atc-btn:hover{background:rgba(0,0,0,.94)}
.product-info{padding:var(--card-info-pad,13px 14px 5px);background:#fff;flex:1;display:flex;flex-direction:column;border-top:1px solid rgba(0,0,0,.05)}
.product-cat{font-size:var(--card-cat-fs,9px);color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;opacity:.65}
.product-name{font-size:var(--card-name-fs,13.5px);font-weight:600;line-height:1.4;color:var(--p);margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;letter-spacing:-.01em}
.product-price-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.product-price{font-size:var(--card-price-fs,15px);font-weight:800;color:var(--p);letter-spacing:-.03em}
.product-compare{font-size:11px;text-decoration:line-through;color:var(--p3)}
.product-discount{font-size:9px;font-weight:800;color:#16a34a;background:#f0fdf4;padding:2px 6px;border-radius:999px;letter-spacing:.04em;border:1px solid #bbf7d0}
.out-of-stock-label{font-size:11px;color:var(--p3);font-style:italic}
.cart-controls-wrap{padding:var(--card-btn-pad,7px 12px 12px);background:#fff}
.cart-qty-row{display:flex;align-items:center;width:100%;height:40px;border-radius:10px;border:1.5px solid var(--border);overflow:hidden;background:#f8f8f8;transition:border-color .18s,box-shadow .18s}
.cart-qty-row:hover{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.qty-btn{flex:1;height:100%;border:none;background:transparent;color:var(--p);font-size:17px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;-webkit-user-select:none;user-select:none}
.qty-btn:hover{background:var(--bg3)}
.qty-btn:active{background:var(--border)}
.qty-value{flex:0 0 40px;text-align:center;font-size:13px;font-weight:700;color:var(--p);border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);height:100%;display:flex;align-items:center;justify-content:center;background:#fff}
.btn-add{width:100%;padding:var(--card-btn-padding,11px 13px);background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:var(--card-btn-fs,11.5px);font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.06em;text-transform:uppercase;transition:all .22s var(--ease);box-shadow:0 2px 8px rgba(0,0,0,.16),inset 0 1px 0 rgba(255,255,255,.1);position:relative;overflow:hidden}
.btn-add::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 55%);pointer-events:none}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.15);filter:brightness(1.08)}
.btn-add:active{transform:scale(.97);box-shadow:0 1px 4px rgba(0,0,0,.15);filter:none}
.classic-grid .product-card{border-radius:16px}
.classic-grid .product-card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.12)}
.minimal-grid .product-card{background:transparent!important;border:none;box-shadow:none!important;transform:none!important}
.minimal-grid .product-card::before{display:none}
.minimal-grid .product-img{border-radius:14px;overflow:hidden}
.minimal-grid .product-info,.minimal-grid .cart-controls-wrap{background:transparent!important}
.minimal-grid .product-card:hover .product-img img{transform:scale(1.05)}
.minimal-grid .product-card:hover{transform:none!important;box-shadow:none!important}
.bold-grid .product-card{border-radius:12px;border-top:3px solid var(--primary)}
.bold-grid .product-card::before{display:none}
.bold-grid .product-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.elevated-grid .product-card{border:none;box-shadow:0 2px 14px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04)}
.elevated-grid .product-card:hover{box-shadow:0 20px 52px rgba(0,0,0,.13),0 4px 18px rgba(0,0,0,.07);transform:translateY(-5px)}
.compact-grid{gap:10px!important}
.compact-grid .product-card{border-radius:12px}
.compact-grid .product-img{aspect-ratio:1/1!important}
.compact-grid .product-info{padding:7px 10px 7px!important}
.compact-grid .product-name{font-size:11.5px!important;-webkit-line-clamp:1;margin-bottom:3px}
.compact-grid .product-price{font-size:12.5px!important}
.compact-grid .cart-controls-wrap{display:none!important}
.list-grid{grid-template-columns:1fr!important;gap:10px!important}
.list-grid .product-card{flex-direction:row;height:128px;border-radius:14px}
.list-grid .product-card::before{width:3px;height:auto;top:0;bottom:0;right:auto;left:0}
.list-grid .card-link{flex-direction:row;flex:1;min-width:0}
.list-grid .product-img{width:128px;min-width:128px;aspect-ratio:auto!important;height:128px;flex-shrink:0;border-radius:0}
.list-grid .product-info{flex:1;padding:14px 18px!important;justify-content:center;border-top:none;border-left:1px solid rgba(0,0,0,.05)}
.list-grid .cart-controls-wrap{padding:0 14px!important;display:flex;align-items:center;align-self:center}
.list-grid .product-card:hover{transform:none;box-shadow:var(--sh1)}
.list-grid .card-atc-overlay{display:none!important}
.list-grid .btn-add{width:auto;padding:9px 16px!important;white-space:nowrap}
.magazine-grid{gap:14px!important}
.magazine-grid .product-card:first-child{grid-column:span 2;grid-row:span 2}
.magazine-grid .product-card:first-child .product-img{aspect-ratio:auto!important;height:100%}
.magazine-grid .product-card{border-radius:14px}
.magazine-grid .product-card:hover{box-shadow:0 12px 36px rgba(0,0,0,.12)}
.overlay-grid .product-card{border-radius:var(--card-radius);border:none;overflow:hidden;background:transparent;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.overlay-grid .product-card::before{display:none}
.overlay-grid .product-card:hover{box-shadow:0 14px 40px rgba(0,0,0,.18);transform:translateY(-3px)}
.overlay-grid .card-link{flex-direction:column;position:relative;display:block}
.overlay-grid .product-img{aspect-ratio:3/4!important;border-radius:var(--card-radius)!important}
.overlay-grid .product-info{display:none!important}
.overlay-grid .cart-controls-wrap{padding:6px 8px 8px!important;background:transparent}
.overlay-grid .btn-add{background:var(--primary);border-radius:9px;font-size:11px}
.overlay-grid .card-atc-overlay{display:none!important}
.ov-layer{position:absolute;bottom:0;left:0;right:0;z-index:2;background:linear-gradient(to top,rgba(0,0,0,.84) 0%,rgba(0,0,0,.46) 40%,transparent 100%);padding:24px 12px 12px;color:#fff;pointer-events:none}
.ov-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35}
.ov-price-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ov-price{font-size:14px;font-weight:700;color:#fff}
.ov-compare{font-size:11px;text-decoration:line-through;color:rgba(255,255,255,.5)}
.ov-discount{font-size:9px;font-weight:700;background:rgba(239,68,68,.85);color:#fff;padding:2px 6px;border-radius:4px;letter-spacing:.04em}
.featured-section{max-width:1440px;margin:0 auto;box-sizing:border-box}
.empty{grid-column:1/-1;text-align:center;padding:80px 20px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty h3{font-size:18px;font-weight:600;color:var(--p2);margin-bottom:6px}
.empty p{font-size:14px;color:var(--p3)}
@keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#fafafa 50%,#f0f0f0 75%)!important;background-size:800px 100%!important;animation:shimmer 1.6s ease-in-out infinite!important;border-radius:var(--radius);border:none!important}
.skeleton *{visibility:hidden}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--p);color:#fff;padding:16px 48px;display:none;align-items:center;justify-content:space-between;z-index:300;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.cart-bar.on{display:flex}
.cbar-info{font-size:14px;font-weight:600}
.cbar-info span{color:rgba(255,255,255,.45);margin-right:10px;font-size:13px}
.cbar-btn{padding:11px 26px;background:#fff;color:var(--p);border-radius:8px;font-size:14px;font-weight:700;transition:.15s;text-decoration:none;letter-spacing:.01em}
.cbar-btn:hover{opacity:.9}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--p);color:#fff;border-radius:10px;padding:11px 20px;font-size:13.5px;font-weight:500;opacity:0;transition:all .25s var(--ease);z-index:400;white-space:nowrap;pointer-events:none;box-shadow:var(--sh2)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.tc-navbar{background:rgba(250,250,250,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:var(--navbar-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.nav-logo{font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:-.01em;cursor:pointer;display:flex;align-items:center;gap:10px}
.nav-logo-img{height:32px;object-fit:contain;border-radius:6px}
.nav-links{display:flex;gap:32px}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--p2);transition:color .15s;letter-spacing:.01em}
.nav-links a:hover{color:var(--p)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-cart-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;background:var(--p);color:#fff;border-radius:var(--btn-r);font-size:13.5px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);text-decoration:none;transition:.2s var(--ease);letter-spacing:.01em}
.nav-cart-btn:hover{background:#333}
.tc-hero{position:relative;overflow:hidden;background:var(--bg2);text-align:center}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.hero-ov{position:absolute;inset:0;z-index:1}
.hero-content{position:relative;z-index:2}
.tc-hero h1{font-family:var(--font-display);font-size:clamp(32px,5.5vw,68px);font-weight:400;letter-spacing:-.03em;margin-bottom:18px;line-height:1.05}
.tc-hero h1 em{font-style:italic}
.tc-hero p{font-size:17px;color:var(--p2);max-width:520px;margin:0 auto 36px;line-height:1.75}
.hero-badge-pill{display:inline-block;background:rgba(0,0,0,.07);font-size:11px;font-weight:600;padding:4px 14px;border-radius:999px;margin-bottom:16px;letter-spacing:.04em}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-cta{display:inline-flex;align-items:center;gap:8px;background:var(--p);color:#fff;padding:13px 28px;border-radius:var(--btn-r);font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:.2s var(--ease);text-decoration:none;letter-spacing:.01em}
.btn-cta:hover{background:#333}
.btn-cta-ghost{background:transparent;color:var(--p);border:1.5px solid rgba(0,0,0,.2)}
.btn-cta-ghost:hover{background:rgba(0,0,0,.05)}
.tc-section{padding:64px 48px}
.tc-section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:10px}
.tc-section-title{font-family:var(--font-display);font-size:28px;font-weight:400;letter-spacing:-.02em}
.tc-section-subtitle{font-size:14px;color:var(--p2);margin-top:5px}
.tc-view-all{font-size:13px;font-weight:600;color:var(--p);text-decoration:none;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;padding:7px 16px;transition:.15s}
.tc-view-all:hover{border-color:var(--p)}
.tc-cats-grid{display:grid;gap:14px}
.tc-cat-card{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border);transition:.22s var(--ease)}
.tc-cat-card:hover{border-color:var(--p);box-shadow:var(--sh1);transform:translateY(-2px)}

<script>
const slug=new URLSearchParams(location.search).get('store')
if(!slug)document.body.innerHTML='<div style="text-align:center;padding:80px;font-family:sans-serif"><h2>Store not found</h2><p style="color:#888;margin-top:8px">Add ?store=your-slug to the URL</p></div>'
const API='https://apiv2.aasaitech.in'

let storeConfig={},themeData=null,currency='₹'
let activeStyle='classic',activeSize='medium'

const ALL_CARD_STYLES=new Set(['classic','minimal','bold','elevated','compact','list','magazine','overlay'])
const CARD_SIZE_VARS={
  small:{'--card-aspect':'1/1','--card-name-fs':'11.5px','--card-price-fs':'12.5px','--card-info-pad':'8px 10px 4px','--card-btn-pad':'5px 10px 10px','--card-btn-padding':'8px 10px','--card-btn-fs':'10px','--card-cat-fs':'8.5px','--card-gap':'10px'},

function applyCardSizeVars(size){const vars=CARD_SIZE_VARS[size]||CARD_SIZE_VARS.medium;Object.entries(vars).forEach(([k,v])=>R.style.setProperty(k,v))}
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')

  const primaryFinal=readKey(s,'primary_color','primaryColor')||'#0f0f0f',bg=readKey(s,'secondary_color','bgColor','bg_color','background_color')||'#fafafa',text=readKey(s,'accent_color','textColor','text_color')||'#0f0f0f',radiusRaw=readKey(s,'radius','border_radius')||'16px',radiusPx=typeof radiusRaw==='number'?`${radiusRaw}px`:String(radiusRaw).includes('px')?radiusRaw:`${radiusRaw}px`,font=readKey(s,'font_heading','fontHeading','font')||'DM Sans',btnStyle=readKey(s,'button_style','buttonStyle','btnStyle')||'rounded',cols=readKey(s,'cols','columns')||4,cardBg=readKey(s,'card_bg','cardBg','card_background','cardBackground')||'#ffffff'
  R.style.setProperty('--primary',primaryFinal);R.style.setProperty('--brand',primaryFinal);R.style.setProperty('--p',text);R.style.setProperty('--bg',bg);R.style.setProperty('--radius',radiusPx);R.style.setProperty('--card-radius',radiusPx);R.style.setProperty('--card-bg',cardBg);R.style.setProperty('--font',`'${font}',system-ui,sans-serif`);R.style.setProperty('--btn-r',btnStyle==='pill'?'999px':btnStyle==='square'?'4px':radiusPx);R.style.setProperty('--cols',window.innerWidth<=768?'2':String(parseInt(cols)||4));document.body.style.background=bg
  if(font&&font!=='DM Sans'&&font!=='system-ui'){const fid='gf-'+font.replace(/\s+/g,'-');if(!document.getElementById(fid)){const l=document.createElement('link');l.id=fid;l.rel='stylesheet';l.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;500;600;700;800;900&display=swap`;document.head.appendChild(l)}}
  const rawStyle=readKey(s,'card_style','cardStyle')||'classic';activeStyle=ALL_CARD_STYLES.has(rawStyle)?rawStyle:'classic';syncAllProductGrids()
  activeSize=readKey(s,'card_size','cardSize')||'medium';applyCardSizeVars(activeSize)
  console.log('[theme] Applied: style=%s size=%s primary=%s',activeStyle,activeSize,primaryFinal)
}
function renderSections(sections){
  const isMobile=window.innerWidth<=768,visible=sections.filter(s=>s.is_visible!==false&&s.enabled!==false).sort((a,b)=>(a.order||0)-(b.order||0))
  const hasNavbar=visible.some(s=>s.type==='navbar'),hasHero=visible.some(s=>s.type==='hero')
  document.getElementById('origHeader').style.display=hasNavbar?'none':''
  const hb=document.getElementById('heroBanner');if(hasHero)hb.style.display='none';else hb.classList.add('visible')
  const page=document.getElementById('page-sections');page.innerHTML=''
  visible.forEach(s=>{const el=document.createElement('div');el.innerHTML=buildSec(s,isMobile);while(el.firstChild)page.appendChild(el.firstChild)})
  document.querySelectorAll('.theme-cart-qty').forEach(e=>e.textContent=getCart().reduce((s,x)=>s+x.qty,0))
  const updateCols=()=>{const cols=themeData?.settings?.cols||themeData?.settings?.columns||4;R.style.setProperty('--cols',window.innerWidth<=768?'2':String(parseInt(cols)||4))}
  window.addEventListener('resize',()=>{updateCols();applyCardSizeVars(activeSize)},{passive:true})
}

// ═══ FILL FEATURED — loads ALL products ═══
async function fillFeaturedAll(secId,cardOpts){
  const grid=document.getElementById(`${secId}-grid`);if(!grid)return
  grid.dataset.cardOpts=JSON.stringify(cardOpts)
  try{
    let allProducts=[],page=1,hasMore=true
    while(hasMore){const data=await fetch(`${API}/shop/${slug}/products?page=${page}&limit=50`).then(r=>r.json());const prods=data.products||[];allProducts=allProducts.concat(prods);if(page>=(data.pages||1)||prods.length===0)hasMore=false;page++}
    allProductsCache=allProducts
    if(!allProducts.length){const s=grid.closest('section');if(s)s.style.display='none';return}
    applyGridStyle(grid);grid.innerHTML=allProducts.map(p=>renderCard(p,'featured',null,cardOpts)).join('');initCartButtons();allProducts.forEach(p=>{if(getQty(p._id)>0)updateCC(p._id)});restoreWish();syncAllProductGrids()
  }catch(e){console.warn('[featured]',e.message);const s=document.getElementById(secId);if(s)s.style.display='none'}
}

async function fillCats(secId,cols,d,catStyle){
  const grid=document.getElementById(`${secId}-grid`);if(!grid)return
  const resolvedStyle=(catStyle||'image').toLowerCase(),isCircle=resolvedStyle==='circle'||resolvedStyle==='circular'||resolvedStyle==='round',isSimple=resolvedStyle==='simple'||resolvedStyle==='plain'||resolvedStyle==='icon'||resolvedStyle==='minimal'
  if(isCircle)grid.classList.add('cats-circle')
  try{
    const cats=await fetch(`${API}/shop/${slug}/categories`).then(r=>r.json()),list=Array.isArray(cats)?cats:[]
    if(!list.length){const s=grid.closest('section');if(s)s.style.display='none';return}
    storeCategories=list
    const em={fashion:'👗',clothing:'👕',electronics:'📱',tech:'💻',home:'🏠',living:'🛋️',beauty:'💄',gaming:'🎮',food:'🍕',accessories:'👜',footwear:'👟',sports:'⚽',fitness:'💪',books:'📚',toys:'🧸',jewelry:'💎',health:'💊',pet:'🐾',art:'🎨',music:'🎵',plants:'🌿',car:'🚗'}
    const getEmoji=n=>{const lc=(n||'').toLowerCase();for(const[k,v]of Object.entries(em))if(lc.includes(k))return v;return['🛍️','🎁','⭐','🏷️','✨','🎯','💫','🔆'][(n||'?').charCodeAt(0)%8]}
    const showCount=d.showCount!=='no'
    grid.innerHTML=list.map(c=>{
      const emoji=c.icon||getEmoji(c.name),countTxt=showCount&&c.product_count!=null?`${c.product_count}+`:''
      if(isCircle){const imgContent=c.image_url?`<img class="tc-cat-img" src="${c.image_url}" alt="${esc(c.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=\\'font-size:44px\\'>${emoji}</span>'">`:`<span style="font-size:44px">${emoji}</span>`;return`<div class="tc-cat-card" onclick="filterByCat('${c._id}','${esa(c.name)}')"><div class="tc-cat-img-wrap">${imgContent}</div><div class="tc-cat-footer"><span class="tc-cat-name">${esc(c.name)}</span>${countTxt?`<span class="tc-cat-count">${countTxt}</span>`:''}</div></div>`}
      if(isSimple)return`<div class="tc-cat-card" onclick="filterByCat('${c._id}','${esa(c.name)}')"><div class="tc-cat-simple"><div class="tc-cat-icon">${emoji}</div><div class="tc-cat-name-plain">${esc(c.name)}</div>${countTxt?`<div style="font-size:11px;color:var(--p3);margin-top:3px">${countTxt}</div>`:''}</div></div>`
      if(c.image_url)return`<div class="tc-cat-card" onclick="filterByCat('${c._id}','${esa(c.name)}')"><div class="tc-cat-img-wrap"><img class="tc-cat-img" src="${c.image_url}" alt="${esc(c.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=\\'font-size:36px;padding:20px;display:flex;align-items:center;justify-content:center;width:100%;height:100%\\'>${emoji}</span>'"></div><div class="tc-cat-footer"><span class="tc-cat-name">${esc(c.name)}</span>${countTxt?`<span class="tc-cat-count">${countTxt}</span>`:''}</div></div>`
      const colors=['#fef3c7','#fce7f3','#e0f2fe','#dcfce7','#ede9fe','#ffedd5'],bgColor=colors[(c.name||'?').charCodeAt(0)%colors.length]
      return`<div class="tc-cat-card" onclick="filterByCat('${c._id}','${esa(c.name)}')"><div class="tc-cat-img-wrap" style="background:${bgColor}"><span style="font-size:48px">${emoji}</span></div><div class="tc-cat-footer"><span class="tc-cat-name">${esc(c.name)}</span>${countTxt?`<span class="tc-cat-count">${countTxt}</span>`:''}</div></div>`
    }).join('')
  }catch(e){console.warn('[cats]',e.message);const s=document.getElementById(secId);if(s)s.style.display='none'}
}

// ═══ INIT ═══
async function init(){
  try{
    storeConfig=await fetch(`${API}/shop/${slug}/config`).then(r=>r.json())
    if(storeConfig.error)throw new Error(storeConfig.error)
    document.title=storeConfig.name;document.getElementById('storeName').textContent=storeConfig.name;document.getElementById('heroTitle').textContent=storeConfig.name;document.getElementById('heroTagline').textContent=storeConfig.tagline||storeConfig.description||'Discover amazing products'
    if(storeConfig.logo_url){const img=document.createElement('img');img.src=storeConfig.logo_url;img.style.cssText='height:32px;object-fit:contain;border-radius:6px';document.getElementById('storeLogo').prepend(img)}
    if(storeConfig.brand_color)R.style.setProperty('--primary',storeConfig.brand_color)
    if(storeConfig.currency==='USD')currency='$';else if(storeConfig.currency==='EUR')currency='€'
    if(storeConfig.payment_enabled)document.getElementById('payBadge').style.display='flex'
    sessionStorage.setItem('ekart_store',slug);sessionStorage.setItem('ekart_currency',currency);sessionStorage.setItem('ekart_store_name',storeConfig.name);sessionStorage.setItem('ekart_pay_enabled',storeConfig.payment_enabled?'1':'0')
    document.getElementById('cartBarBtn').href=`cart.html?store=${slug}`
    const tok=localStorage.getItem(`cust_token_${slug}`),name=localStorage.getItem(`cust_name_${slug}`)
    if(tok&&name){const icon=document.getElementById('accountBtnIcon');if(icon)icon.title=name.split(' ')[0]}
    await loadTheme()
    if(!document.querySelector('.featured-section')){const page=document.getElementById('page-sections'),defaultSec={id:'fallback-all-products',type:'featured',is_visible:true,data:{title:storeConfig.name||'All Products',count:999},settings:{}},isMobile=window.innerWidth<=768,el=document.createElement('div');el.innerHTML=buildSec(defaultSec,isMobile);while(el.firstChild)page.appendChild(el.firstChild)}
    updateCartUI();hideLoader()
    if(!document.querySelector('.tc-hero'))document.getElementById('heroBanner').classList.add('visible')
  }catch(e){document.body.innerHTML=`<div style="text-align:center;padding:80px;font-family:sans-serif"><div style="font-size:48px;margin-bottom:16px;opacity:.25">🏪</div><h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Store not found</h2><p style="color:#9ca3af;font-size:14px">${esc(e.message)}</p></div>`;hideLoader()}
}
if(slug){setTimeout(hideLoader,6000);init()}else hideLoader()
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#0f0f0f;--p2:#525252;--p3:#a3a3a3;
  --bg:#fafafa;--bg2:#f5f5f5;--bg3:#f0f0f0;
  --border:#e8e8e8;--accent:#0f0f0f;
  --primary:#111;--brand:#111;
  --radius:12px;--btn-r:8px;
  --font:'DM Sans',system-ui,sans-serif;
  --font-display:'DM Serif Display',serif;
  --cols:4;--navbar-h:64px;
  --sh0:0 1px 2px rgba(0,0,0,.04);
  --sh1:0 4px 16px rgba(0,0,0,.06);
  --sh2:0 16px 48px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
  --ease:cubic-bezier(.4,0,.2,1);
  --card-bg:#ffffff;
  --card-border:var(--border);
  --card-radius:16px;
  --card-aspect:4/5;
  --card-name-fs:13.5px;
  --card-price-fs:15px;
  --card-info-pad:13px 14px 5px;
  --card-btn-pad:7px 12px 12px;
  --card-btn-padding:11px 13px;
  --card-btn-fs:11.5px;
  --card-gap:20px;
  --card-cat-fs:9px;
}
body{font-family:var(--font);background:var(--bg);color:var(--p);-webkit-font-smoothing:antialiased;padding-bottom:80px}
img{display:block;max-width:100%}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}

#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .4s var(--ease)}
#loader.out{opacity:0;pointer-events:none}
.ld-ring{width:40px;height:40px;border:2.5px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:ldSpin .8s linear infinite}
.ld-text{font-size:13px;color:var(--p3);letter-spacing:.04em;font-weight:500}
@keyframes ldSpin{to{transform:rotate(360deg)}}

.announcement-bar{background:var(--p);color:#fff;text-align:center;padding:10px 16px;font-size:12.5px;font-weight:500;letter-spacing:.04em;position:relative;z-index:201;display:flex;align-items:center;justify-content:center;gap:12px}
.ann-close{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;flex-shrink:0}
.ann-close:hover{color:#fff}
.ann-link{color:rgba(255,255,255,.8);text-decoration:underline;font-size:12px}

#origHeader{background:rgba(250,250,250,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.hdr-inner{max-width:1440px;margin:0 auto;padding:0 48px;height:var(--navbar-h);display:flex;align-items:center;justify-content:space-between;gap:24px}
.hdr-logo{font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:-.01em;color:var(--p);white-space:nowrap;display:flex;align-items:center;gap:10px}
.hdr-logo img{height:32px;object-fit:contain;border-radius:6px}
.hdr-nav{display:flex;align-items:center;gap:32px}
.hdr-nav a{font-size:13.5px;font-weight:500;color:var(--p2);transition:color .15s;letter-spacing:.01em}
.hdr-nav a:hover{color:var(--p)}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-icon-btn{width:38px;height:38px;border-radius:10px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--p2);transition:background .15s,color .15s;font-size:15px}
.hdr-icon-btn:hover{background:var(--bg2);color:var(--p)}
.hdr-cart-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;background:var(--p);color:#fff;border-radius:var(--btn-r);font-size:13.5px;font-weight:600;border:none;cursor:pointer;transition:.2s var(--ease);letter-spacing:.01em}
.hdr-cart-btn:hover{background:#333}
.cart-badge{background:#fff;color:var(--p);font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px}
.cart-badge.on{display:flex}
#payBadge{display:none;padding:5px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px;font-size:11.5px;font-weight:600;color:#16a34a;align-items:center;gap:4px}

#heroBanner{padding:80px 40px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border);display:none}
#heroBanner.visible{display:block}
#heroBanner h1{font-family:var(--font-display);font-size:clamp(32px,5vw,60px);font-weight:400;letter-spacing:-.02em;margin-bottom:14px;line-height:1.1}
#heroBanner p{font-size:16px;color:var(--p2);max-width:440px;margin:0 auto 32px;line-height:1.7}
.hero-cta{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:var(--p);color:#fff;border-radius:var(--btn-r);font-size:14px;font-weight:600;border:none;cursor:pointer;transition:.2s var(--ease)}
.hero-cta:hover{background:#333}

/* featured sections only — main product grid removed */
.featured-section{max-width:1440px;margin:0 auto;box-sizing:border-box}

.empty{grid-column:1/-1;text-align:center;padding:80px 20px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty h3{font-size:18px;font-weight:600;color:var(--p2);margin-bottom:6px}
.empty p{font-size:14px;color:var(--p3)}
@keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#fafafa 50%,#f0f0f0 75%)!important;background-size:800px 100%!important;animation:shimmer 1.6s ease-in-out infinite!important;border-radius:var(--radius);border:none!important}
.skeleton *{visibility:hidden}

.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--p);color:#fff;padding:16px 48px;display:none;align-items:center;justify-content:space-between;z-index:300;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.cart-bar.on{display:flex}
.cbar-info{font-size:14px;font-weight:600}
.cbar-info span{color:rgba(255,255,255,.45);margin-right:10px;font-size:13px}
.cbar-btn{padding:11px 26px;background:#fff;color:var(--p);border-radius:8px;font-size:14px;font-weight:700;transition:.15s;text-decoration:none;letter-spacing:.01em}
.cbar-btn:hover{opacity:.9}

.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--p);color:#fff;border-radius:10px;padding:11px 20px;font-size:13.5px;font-weight:500;opacity:0;transition:all .25s var(--ease);z-index:400;white-space:nowrap;pointer-events:none;box-shadow:var(--sh2)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ════ THEME SECTIONS (unchanged) ════ */
.tc-navbar{background:rgba(250,250,250,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:var(--navbar-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.nav-logo{font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:-.01em;cursor:pointer;display:flex;align-items:center;gap:10px}
.nav-logo-img{height:32px;object-fit:contain;border-radius:6px}
.nav-links{display:flex;gap:32px}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--p2);transition:color .15s;letter-spacing:.01em}
.nav-links a:hover{color:var(--p)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-cart-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;background:var(--p);color:#fff;border-radius:var(--btn-r);font-size:13.5px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);text-decoration:none;transition:.2s var(--ease);letter-spacing:.01em}
.nav-cart-btn:hover{background:#333}

.tc-hero{position:relative;overflow:hidden;background:var(--bg2);text-align:center}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.hero-ov{position:absolute;inset:0;z-index:1}
.hero-content{position:relative;z-index:2}
.tc-hero h1{font-family:var(--font-display);font-size:clamp(32px,5.5vw,68px);font-weight:400;letter-spacing:-.03em;margin-bottom:18px;line-height:1.05}
.tc-hero h1 em{font-style:italic}
.tc-hero p{font-size:17px;color:var(--p2);max-width:520px;margin:0 auto 36px;line-height:1.75}
.hero-badge-pill{display:inline-block;background:rgba(0,0,0,.07);font-size:11px;font-weight:600;padding:4px 14px;border-radius:999px;margin-bottom:16px;letter-spacing:.04em}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-cta{display:inline-flex;align-items:center;gap:8px;background:var(--p);color:#fff;padding:13px 28px;border-radius:var(--btn-r);font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:.2s var(--ease);text-decoration:none;letter-spacing:.01em}
.btn-cta:hover{background:#333}
.btn-cta-ghost{background:transparent;color:var(--p);border:1.5px solid rgba(0,0,0,.2)}
.btn-cta-ghost:hover{background:rgba(0,0,0,.05)}

.tc-section{padding:64px 48px}
.tc-section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:10px}
.tc-section-title{font-family:var(--font-display);font-size:28px;font-weight:400;letter-spacing:-.02em}
.tc-section-subtitle{font-size:14px;color:var(--p2);margin-top:5px}
.tc-view-all{font-size:13px;font-weight:600;color:var(--p);text-decoration:none;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;padding:7px 16px;transition:.15s}
.tc-view-all:hover{border-color:var(--p)}

.tc-cats-grid{display:grid;gap:14px}
.tc-cat-card{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border);transition:.22s var(--ease)}
.tc-cat-card:hover{border-color:var(--p);box-shadow:var(--sh1);transform:translateY(-2px)}
.tc-cat-img-wrap{aspect-ratio:1/1;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative}
.tc-cat-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s var(--ease)}
.tc-cat-card:hover .tc-cat-img{transform:scale(1.05)}
.tc-cat-footer{padding:12px 14px;background:#fff;display:flex;align-items:center;justify-content:space-between}
.tc-cat-name{font-size:13.5px;font-weight:600;color:var(--p)}
.tc-cat-count{font-size:12px;color:var(--p3)}
.tc-cat-simple{padding:24px 16px;text-align:center}
.tc-cat-icon{font-size:28px;margin-bottom:8px}
.tc-cat-name-plain{font-size:13.5px;font-weight:600}
.tc-cats-grid.cats-circle{gap:24px}
.tc-cats-grid.cats-circle .tc-cat-card{background:transparent;border:none;box-shadow:none;display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 4px;border-radius:0}
.tc-cats-grid.cats-circle .tc-cat-card:hover{transform:translateY(-3px);box-shadow:none;border:none}
.tc-cats-grid.cats-circle .tc-cat-img-wrap{width:100%;aspect-ratio:1/1;border-radius:50%;overflow:hidden;border:3px solid transparent;background:var(--bg2);transition:border-color .2s,box-shadow .2s;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.tc-cats-grid.cats-circle .tc-cat-card:hover .tc-cat-img-wrap{border-color:var(--primary);box-shadow:0 6px 24px rgba(0,0,0,.14)}
.tc-cats-grid.cats-circle .tc-cat-footer{background:transparent;padding:0;flex-direction:column;align-items:center;gap:2px;width:100%}
.tc-cats-grid.cats-circle .tc-cat-name{font-size:14px;font-weight:700;text-align:center}
.tc-cats-grid.cats-circle .tc-cat-count{font-size:12px;color:var(--p3);text-align:center}
.tc-cats-grid.cats-circle .cat-fallback-wrap{width:100%;aspect-ratio:1/1;border-radius:50%;background:linear-gradient(135deg,var(--bg2),var(--bg3));display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 2px 12px rgba(0,0,0,.08);border:3px solid transparent;transition:border-color .2s,box-shadow .2s}
.tc-cats-grid.cats-circle .tc-cat-card:hover .cat-fallback-wrap{border-color:var(--primary);box-shadow:0 6px 24px rgba(0,0,0,.14)}

.tc-trust-section{padding:32px 48px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2)}
.tc-trust-grid{display:grid;gap:0}
.tc-trust-item{display:flex;align-items:center;gap:14px;padding:20px 28px;border-right:1px solid var(--border)}
.tc-trust-item:last-child{border-right:none}
.tc-trust-icon{font-size:24px;flex-shrink:0}
.tc-trust-label{font-size:14px;font-weight:600;color:var(--p)}
.tc-trust-sub{font-size:12px;color:var(--p3);margin-top:2px}

.tc-testimonials{padding:64px 48px;background:var(--bg2)}
.tc-testimonials-grid{display:grid;gap:16px;margin-top:32px}
.tc-testimonial{background:#fff;border-radius:14px;padding:24px;border:1px solid var(--border)}
.tc-t-stars{color:#f59e0b;font-size:14px;margin-bottom:12px;letter-spacing:2px}
.tc-t-text{font-size:14px;color:var(--p2);line-height:1.75;margin-bottom:16px;font-style:italic}
.tc-t-author{display:flex;align-items:center;gap:10px}
.tc-t-avatar{width:36px;height:36px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.tc-t-name{font-size:13px;font-weight:600}

.tc-newsletter{padding:80px 48px;text-align:center;background:var(--p);color:#fff}
.tc-newsletter h2{font-family:var(--font-display);font-size:34px;font-weight:400;letter-spacing:-.02em;margin-bottom:10px;color:#fff}
.tc-newsletter p{color:rgba(255,255,255,.55);margin-bottom:32px;font-size:15px}
.tc-newsletter-form{display:flex;gap:8px;max-width:480px;margin:0 auto;flex-wrap:wrap}
.tc-newsletter-input{flex:1;min-width:200px;padding:13px 18px;border:none;border-radius:var(--btn-r);font-size:14px;background:rgba(255,255,255,.1);color:#fff;font-family:var(--font);outline:none;border:1px solid rgba(255,255,255,.15)}
.tc-newsletter-input::placeholder{color:rgba(255,255,255,.35)}
.tc-newsletter-input:focus{border-color:rgba(255,255,255,.4)}
.tc-newsletter-form .btn-cta{background:#fff;color:var(--p);white-space:nowrap;width:auto!important;display:inline-flex!important}
.tc-newsletter-form .btn-cta:hover{background:rgba(255,255,255,.9)}
.tc-nl-note{font-size:12px;color:rgba(255,255,255,.3);margin-top:14px}

.tc-promo-banner{padding:72px 48px;text-align:center;color:#fff}
.tc-promo-content h2{font-family:var(--font-display);font-size:36px;font-weight:400;margin-bottom:12px}
.tc-promo-content p{opacity:.8;margin-bottom:28px;font-size:16px}
.banner-coupon-box{display:inline-block;background:rgba(255,255,255,.12);border:1.5px dashed rgba(255,255,255,.4);padding:10px 24px;border-radius:8px;font-size:16px;font-weight:700;letter-spacing:.1em;color:#fff;margin-bottom:18px}
.btn-ghost-white{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.45);padding:12px 28px;border-radius:var(--btn-r);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:.2s var(--ease)}
.btn-ghost-white:hover{background:rgba(255,255,255,.1)}

.tc-faq-section{padding:64px 48px}
.tc-faq-item{border-bottom:1px solid var(--border);padding:22px 0;cursor:pointer}
.tc-faq-q{font-size:15px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:16px}
.tc-faq-q-text{flex:1}
.tc-faq-icon{font-size:18px;color:var(--p3);transition:transform .2s;flex-shrink:0}
.tc-faq-item.open .tc-faq-icon{transform:rotate(45deg);color:var(--p)}
.tc-faq-a{font-size:14px;color:var(--p2);line-height:1.75;margin-top:10px;display:none}
.tc-faq-item.open .tc-faq-a{display:block}

.tc-countdown-section{padding:64px 48px;text-align:center}
.tc-countdown-row{display:flex;gap:14px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.tc-cd-unit{background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px 28px;min-width:90px}
.tc-cd-num{font-family:var(--font-display);font-size:44px;font-weight:400;line-height:1;color:var(--primary)}
.tc-cd-label{font-size:11px;font-weight:600;color:var(--p3);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}

.tc-gallery-section{padding:64px 48px}
.tc-gallery-grid{display:grid;gap:10px}
.tc-gallery-item{background:var(--bg2);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px}
.tc-gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s var(--ease)}
.tc-gallery-item:hover img{transform:scale(1.04)}

.tc-video-section{padding:64px 48px}
.tc-video-box{border-radius:16px;min-height:380px;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;margin-top:24px;border:1px solid var(--border)}
.tc-video-box iframe{width:100%;height:100%;border:none;min-height:380px}
.tc-play-circle{width:64px;height:64px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer}

.tc-footer{padding:64px 48px 36px;border-top:1px solid var(--border)}
.tc-footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:56px;margin-bottom:48px}
.tc-footer-logo{font-family:var(--font-display);font-size:20px;font-weight:400;margin-bottom:8px;cursor:pointer;letter-spacing:-.01em}
.tc-footer-tagline{font-size:13px;color:var(--p3);line-height:1.75;margin-bottom:20px;max-width:260px}
.tc-footer-contact{font-size:13px;color:var(--p2);line-height:1.8;margin-top:12px}
.tc-footer-col-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--p3);margin-bottom:14px}
.tc-footer-col-links{display:flex;flex-direction:column;gap:10px}
.tc-footer-col-links a{font-size:14px;color:var(--p2);transition:color .15s}
.tc-footer-col-links a:hover{color:var(--p)}
.tc-footer-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-top:28px;border-top:1px solid var(--border)}
.tc-footer-copy{font-size:12.5px;color:var(--p3)}
.tc-footer-social{display:flex;gap:8px}
.tc-social-btn{width:34px;height:34px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;text-decoration:none;transition:background .15s}
.tc-social-btn:hover{background:var(--border)}

.tc-about-section{padding:64px 48px}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.about-heading{font-family:var(--font-display);font-size:34px;font-weight:400;letter-spacing:-.02em;margin-bottom:16px}
.about-subheading{font-size:16px;color:var(--p2);margin-bottom:20px;line-height:1.7}
.about-body{font-size:14px;color:var(--p2);line-height:1.8;margin-bottom:28px}
.about-img-wrap{border-radius:16px;overflow:hidden;aspect-ratio:4/3;background:var(--bg2)}
.about-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.about-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px;padding-top:40px;border-top:1px solid var(--border)}
.about-stat-num{font-family:var(--font-display);font-size:36px;color:var(--primary)}
.about-stat-label{font-size:13px;color:var(--p2);margin-top:4px}

.tc-richtext-section{padding:64px 48px}
.richtext-inner{max-width:720px;margin:0 auto;text-align:center}
.richtext-title{font-family:var(--font-display);font-size:30px;font-weight:400;letter-spacing:-.02em;margin-bottom:20px}
.richtext-body{font-size:15px;color:var(--p2);line-height:1.85}
.richtext-cta{margin-top:32px}

.tc-imagetext-section{padding:64px 48px}
.imagetext-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.imagetext-grid.img-right{direction:rtl}
.imagetext-grid.img-right>*{direction:ltr}
.imagetext-img-wrap{border-radius:16px;overflow:hidden;aspect-ratio:4/3;background:var(--bg2)}
.imagetext-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.imagetext-heading{font-family:var(--font-display);font-size:30px;font-weight:400;letter-spacing:-.02em;margin-bottom:14px}
.imagetext-subheading{font-size:15px;color:var(--p2);margin-bottom:16px;line-height:1.7}
.imagetext-body{font-size:14px;color:var(--p2);line-height:1.8;margin-bottom:20px}
.imagetext-bullets{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.imagetext-bullet{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--p2)}
.imagetext-bullet-icon{color:var(--primary);font-size:16px;flex-shrink:0;margin-top:1px}

.tc-brands-section{padding:48px 48px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2)}
.brands-grid{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:32px;margin-top:24px}
.brand-item{opacity:.4;filter:grayscale(1);transition:.2s;display:flex;align-items:center;justify-content:center}
.brand-item:hover{opacity:.8;filter:grayscale(0)}
.brand-item img{max-height:40px;max-width:120px;object-fit:contain}
.brand-item-text{font-size:18px;font-weight:700;letter-spacing:-.01em;color:var(--p)}

.tc-offers-section{padding:64px 48px}
.offers-grid{display:grid;grid-template-columns:repeat(var(--cols,4),1fr);gap:16px}
.offer-card{background:#fff;border-radius:14px;padding:24px;border:1px solid var(--border);text-align:center;transition:.2s var(--ease)}
.offer-card:hover{border-color:var(--p);box-shadow:var(--sh1);transform:translateY(-2px)}
.offer-icon{font-size:32px;margin-bottom:12px}
.offer-title{font-size:15px;font-weight:700;color:var(--p);margin-bottom:6px}
.offer-desc{font-size:13px;color:var(--p2);line-height:1.6;margin-bottom:12px}
.offer-badge{display:inline-block;background:var(--p);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;letter-spacing:.04em}

.tc-team-section{padding:64px 48px}
.team-grid{display:grid;grid-template-columns:repeat(var(--cols,4),1fr);gap:24px}
.team-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border);text-align:center;transition:.2s var(--ease)}
.team-card:hover{box-shadow:var(--sh1);transform:translateY(-2px)}
.team-avatar{width:100%;aspect-ratio:1/1;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px}
.team-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.team-info{padding:16px}
.team-name{font-size:15px;font-weight:700;color:var(--p);margin-bottom:4px}
.team-role{font-size:12.5px;color:var(--p3)}

.tc-contact-section{padding:64px 48px}
.contact-grid{display:grid;grid-template-columns:1fr 1.5fr;gap:56px;margin-top:32px}
.contact-info-item{display:flex;align-items:flex-start;gap:14px;margin-bottom:24px}
.contact-info-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.contact-info-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--p3);margin-bottom:3px}
.contact-info-val{font-size:14px;color:var(--p);line-height:1.6}
.contact-form-grid{display:flex;flex-direction:column;gap:14px}
.contact-field{display:flex;flex-direction:column;gap:6px}
.contact-field label{font-size:12px;font-weight:600;color:var(--p2);letter-spacing:.03em}
.contact-field input,.contact-field textarea{padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:#fff;color:var(--p);transition:.15s}
.contact-field input:focus,.contact-field textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.contact-field textarea{resize:vertical;min-height:120px}

@media(max-width:1200px){
  :root{--cols:3}
  .hdr-inner,.tc-navbar{padding:0 28px}
  .tc-section,.tc-trust-section,.tc-newsletter,.tc-promo-banner,.tc-footer,.tc-faq-section,.tc-countdown-section,.tc-gallery-section,.tc-video-section,.tc-about-section,.tc-richtext-section,.tc-imagetext-section,.tc-brands-section,.tc-offers-section,.tc-team-section,.tc-contact-section,.tc-testimonials,.featured-section{padding-left:28px!important;padding-right:28px!important}
  .cart-bar{padding:14px 28px}
}
@media(max-width:768px){
  :root{--cols:2;--navbar-h:56px}
  .hdr-inner,.tc-navbar{padding:0 16px}
  .hdr-nav{display:none}
  .tc-section,.tc-trust-section,.tc-newsletter,.tc-promo-banner,.tc-footer,.tc-faq-section,.tc-countdown-section,.tc-gallery-section,.tc-video-section,.tc-about-section,.tc-richtext-section,.tc-imagetext-section,.tc-brands-section,.tc-offers-section,.tc-team-section,.tc-contact-section,.tc-testimonials,.featured-section{padding-left:16px!important;padding-right:16px!important}
  .tc-footer-grid{grid-template-columns:1fr!important;gap:28px!important}
  .tc-trust-grid{grid-template-columns:repeat(2,1fr)!important}
  .tc-trust-item{border-right:none!important;border-bottom:1px solid var(--border)}
  .tc-testimonials-grid{grid-template-columns:1fr!important}
  .products-grid{grid-template-columns:repeat(2,1fr)!important}
  .list-grid .product-card{flex-direction:column!important;height:auto}
  .list-grid .card-link{flex-direction:column!important}
  .list-grid .product-img{width:100%!important;min-width:unset!important;height:200px!important}
  .magazine-grid .product-card:first-child{grid-column:span 1!important;grid-row:span 1!important}
  .tc-newsletter-form{flex-direction:column!important}
  .tc-newsletter-input{min-width:unset!important;width:100%!important}
  .cart-bar{padding:12px 16px}
  .products-grid{gap:12px!important}
  .cart-qty-row{height:38px}
  .qty-btn{font-size:16px}
  .qty-value{flex:0 0 38px;font-size:12px}
  .btn-add{padding:10px 12px!important;font-size:11px!important}
  .cart-controls-wrap{padding:6px 10px 10px!important}
  .product-info{padding:10px 11px 3px!important}
  .product-name{font-size:12.5px!important}
  .product-price{font-size:13.5px!important}
  .about-grid,.imagetext-grid,.contact-grid{grid-template-columns:1fr!important;gap:32px!important}
  .about-stats{grid-template-columns:repeat(3,1fr)!important}
  .offers-grid,.team-grid{grid-template-columns:repeat(2,1fr)!important}
  .imagetext-grid.img-right{direction:ltr}
  .brands-grid{gap:20px}
}
</style>
</head>
<body>

<div id="loader">
  <div class="ld-ring"></div>
  <div class="ld-text">Loading store</div>
</div>

<header id="origHeader">
  <div class="hdr-inner">
    <a class="hdr-logo" href="javascript:void(0)" id="storeLogo" onclick="scrollTop()">
      <span id="storeName">Shop</span>
    </a>
    <nav class="hdr-nav" id="hdrNav"></nav>
    <!-- search removed per user request -->
    <div class="hdr-right">
      <div id="payBadge">⚡ Pay Online</div>
      <button class="hdr-icon-btn" id="accountBtnIcon" title="Account" onclick="gotoAccount()">👤</button>
      <button class="hdr-cart-btn" onclick="gotoCart()">
        🛒 <span id="cartLabel">Cart</span>
        <span class="cart-badge" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<div id="heroBanner">
  <div style="padding:80px 48px;max-width:1440px;margin:0 auto">
    <div class="hero-content">
      <h1 id="heroTitle">Welcome</h1>
      <p id="heroTagline">Discover amazing products</p>
      <button class="hero-cta" onclick="smoothScroll()">Shop Now →</button>
    </div>
  </div>
</div>

<div id="page-sections"></div>

<!-- main product grid completely removed -->

<div class="cart-bar" id="cartBar">
  <div class="cbar-info"><span id="cbarQty"></span><strong id="cbarTotal"></strong></div>
  <a href="#" class="cbar-btn" id="cartBarBtn">View Cart →</a>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const slug = new URLSearchParams(location.search).get('store')
if(!slug) document.body.innerHTML='<div style="text-align:center;padding:80px;font-family:sans-serif"><h2>Store not found</h2><p style="color:#888;margin-top:8px">Add ?store=your-slug to the URL</p></div>'

const API = 'https://apiv2.aasaitech.in'
const R = document.documentElement
let storeConfig = {}, themeData = null, currency = '₹'
let activeStyle = 'classic', activeSize = 'medium'

const ALL_CARD_STYLES = new Set(['classic','minimal','bold','elevated','compact','list','magazine','overlay'])

// ════ CARD SIZE PRESETS ════
const CARD_SIZE_VARS = {
  small:{'--card-aspect':'1/1','--card-name-fs':'11.5px','--card-price-fs':'12.5px','--card-info-pad':'8px 10px 4px','--card-btn-pad':'5px 10px 10px','--card-btn-padding':'8px 10px','--card-btn-fs':'10px','--card-cat-fs':'8.5px','--card-gap':'10px'},
  medium:{'--card-aspect':'4/5','--card-name-fs':'13.5px','--card-price-fs':'15px','--card-info-pad':'13px 14px 5px','--card-btn-pad':'7px 12px 12px','--card-btn-padding':'11px 13px','--card-btn-fs':'11.5px','--card-cat-fs':'9px','--card-gap':'20px'},
  large:{'--card-aspect':'4/5','--card-name-fs':'15px','--card-price-fs':'17px','--card-info-pad':'16px 18px 8px','--card-btn-pad':'8px 14px 14px','--card-btn-padding':'13px 16px','--card-btn-fs':'12.5px','--card-cat-fs':'9.5px','--card-gap':'24px'}
}

// ════ STYLE → CSS CLASS MAP (shared constant) ════
const GRID_STYLE_MAP = {
  classic:'classic-grid', minimal:'minimal-grid', bold:'bold-grid',
  elevated:'elevated-grid', compact:'compact-grid', list:'list-grid',
  magazine:'magazine-grid', overlay:'overlay-grid'
}

function getGridClass(style){ return GRID_STYLE_MAP[style] || 'classic-grid' }

function applyCardSizeVars(size){
  const vars = CARD_SIZE_VARS[size] || CARD_SIZE_VARS.medium
  Object.entries(vars).forEach(([k,v]) => R.style.setProperty(k, v))
}

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
const esa = s => String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')
const hideLoader = () => { const l=document.getElementById('loader'); if(l){l.classList.add('out');setTimeout(()=>l.remove(),450)} }
const showToast = m => { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2500) }
const scrollTop = () => window.scrollTo({top:0,behavior:'smooth'})

// updated smoothScroll: go to first featured section instead of #mainAnchor
const smoothScroll = () => {
  const firstFeat = document.querySelector('.featured-section');
  if (firstFeat) {
    const nb = document.querySelector('.tc-navbar') || document.getElementById('origHeader');
    const offset = nb ? nb.offsetHeight + 12 : 74;
    window.scrollTo({top: firstFeat.getBoundingClientRect().top + scrollY - offset, behavior:'smooth'});
  }
}

const scrollToEl = id => { const el=document.getElementById(id); if(!el)return; const nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader'); window.scrollTo({top:el.getBoundingClientRect().top+scrollY-(nb?nb.offsetHeight+12:74),behavior:'smooth'}) }
const gotoCart = () => location.href=`cart.html?store=${slug}`
const gotoAccount = () => location.href=localStorage.getItem(`cust_token_${slug}`)?`customer-account.html?store=${slug}`:`customer-login.html?store=${slug}`
const subscribeNL = () => { const v=document.querySelector('.tc-newsletter-input')?.value?.trim(); showToast(v?`📧 Thanks! We'll reach ${v}`:'Please enter your email') }

function readKey(obj, ...keys) {
  if (!obj) return undefined
  for (const k of keys) { const v = obj[k]; if (v !== undefined && v !== null && v !== '') return v }
  return undefined
}

// ═══════════════════════════════════════════════════════════════
// CART
// ═══════════════════════════════════════════════════════════════
const getCart = () => JSON.parse(localStorage.getItem('cart_'+slug)||'[]')
const saveCart = c => localStorage.setItem('cart_'+slug, JSON.stringify(c))
const getQty = id => { const i=getCart().find(x=>x.product_id===id&&!x.variant); return i?i.qty:0 }

function incCart(id,name,price,image){
  const cart=getCart(), i=cart.find(x=>x.product_id===id&&!x.variant)
  if(i) i.qty++; else cart.push({product_id:id,name,price,image,qty:1})
  saveCart(cart); updateCartUI(); updateCC(id); showToast('Added to cart ✓')
}
function decCart(id){
  const cart=getCart(), idx=cart.findIndex(x=>x.product_id===id&&!x.variant)
  if(idx!==-1){ if(cart[idx].qty>1)cart[idx].qty--; else cart.splice(idx,1); saveCart(cart); updateCartUI(); updateCC(id) }
}
const addToCart = (id,n,p,img) => incCart(id,n,p,img)

function updateCC(id){
  const qty=getQty(id)
  document.querySelectorAll(`.cart-controls[data-pid="${id}"]`).forEach(el=>{
    const n=el.dataset.name, p=parseFloat(el.dataset.price), img=el.dataset.image, sn=esa(n), si=esa(img)
    const card=el.closest('.product-card')
    const ic=card?.querySelector('.product-img')
    const isOverlay=card?.closest('.overlay-grid')!=null
    const lbl=card?.dataset.btnLabel||'Add to Cart'
    if(qty===0){
      el.innerHTML=`<button class="btn-add" onclick="event.preventDefault();addToCart('${id}','${sn}',${p},'${si}')"><span>🛒</span> ${esc(lbl)}</button>`
      if(card){
        card.classList.remove('in-cart')
        if(!isOverlay&&ic&&!ic.querySelector('.card-atc-overlay')){
          const ov=document.createElement('div'); ov.className='card-atc-overlay'
          ov.innerHTML=`<button class="card-atc-btn" onclick="event.preventDefault();event.stopPropagation();addToCart('${id}','${sn}',${p},'${si}')">🛒 ${esc(lbl)}</button>`
          ic.appendChild(ov)
        }
      }
    } else {
      el.innerHTML=`<div class="cart-qty-row"><button class="qty-btn" onclick="event.preventDefault();decCart('${id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incCart('${id}','${sn}',${p},'${si}')">+</button></div>`
      if(card){ card.classList.add('in-cart'); ic?.querySelector('.card-atc-overlay')?.remove() }
    }
  })
}

function updateCartUI(){
  const cart=getCart(), qty=cart.reduce((s,x)=>s+x.qty,0), amt=cart.reduce((s,x)=>s+x.price*x.qty,0)
  const el=document.getElementById('cartCount'); el.textContent=qty; el.className='cart-badge'+(qty>0?' on':'')
  document.getElementById('cartLabel').textContent=qty>0?`(${qty})`:'Cart'
  const bar=document.getElementById('cartBar')
  if(qty>0){ bar.classList.add('on'); document.getElementById('cbarQty').textContent=`${qty} item${qty!==1?'s':''} — `; document.getElementById('cbarTotal').textContent=`${currency}${amt.toFixed(2)}` }
  else bar.classList.remove('on')
  document.querySelectorAll('.theme-cart-qty').forEach(e=>e.textContent=qty)
}

// ═══════════════════════════════════════════════════════════════
// WISHLIST
// ═══════════════════════════════════════════════════════════════
function toggleWish(pid,btn){
  const key=`wish_${slug}`, list=JSON.parse(localStorage.getItem(key)||'[]'), idx=list.indexOf(pid)
  if(idx===-1){ list.push(pid); btn.textContent='♥'; btn.classList.add('wished'); showToast('Saved to wishlist') }
  else { list.splice(idx,1); btn.textContent='♡'; btn.classList.remove('wished'); showToast('Removed from wishlist') }
  localStorage.setItem(key,JSON.stringify(list))
}
function restoreWish(){
  const list=JSON.parse(localStorage.getItem(`wish_${slug}`)||'[]')
  list.forEach(pid=>{
    document.querySelectorAll(`.cart-controls[data-pid="${pid}"]`).forEach(cc=>{
      const wb=cc.closest('.product-card')?.querySelector('.wish-btn')
      if(wb){ wb.textContent='♥'; wb.classList.add('wished') }
    })
  })
}

// ═══════════════════════════════════════════════════════════════
// BADGE & HELPERS
// ═══════════════════════════════════════════════════════════════
const discPct = p => p.compare_at_price && p.compare_at_price > p.price ? Math.round((1-p.price/p.compare_at_price)*100) : 0
const isOOS = p => p.track_inventory && p.stock_qty <= 0
function getBadge(p,cls){
  const bt=p.badge_text||p.badge||''
  if(bt){ const bl=bt.toLowerCase(), c=bl.includes('best')||bl.includes('seller')?'badge-bestseller':bl.includes('new')?'badge-new':bl.includes('trend')?'badge-trending':bl.includes('hot')?'badge-hot':bl.includes('sale')?'badge-sale':'badge-custom'; return`<div class="${cls} ${c}">${esc(bt)}</div>` }
  const d=discPct(p); if(d>=5) return`<div class="${cls} badge-discount">−${d}%</div>`; return''
}
const colorPairs=[['#e8f4f8','#b2d8e8'],['#f8f0e8','#e8c8a8'],['#f0f8e8','#c8e8b0'],['#f8e8f0','#e8b0c8'],['#f0e8f8','#c8b0e8'],['#f8f8e8','#e8e8a0']]

// ═══════════════════════════════════════════════════════════════
// RENDER CARD (unchanged)
// ═══════════════════════════════════════════════════════════════
function renderCard(p, ctx, btnLabel, cardOpts){
  cardOpts = cardOpts || {}
  const label = cardOpts.btnLabel || btnLabel || 'Add to Cart'
  const cardBg = cardOpts.cardBg || ''
  const priceColor = cardOpts.priceColor || ''
  const showOriginal = cardOpts.showOriginal !== 'no'
  const showBadge = cardOpts.showBadge !== 'no'

  const style = activeStyle

  const oos=isOOS(p), qty=getQty(p._id), imgUrl=p.images?.[0]||''
  const si=esa(imgUrl), sn=esa(p.name), d=discPct(p)

  const colorIdx = (p.name||'').split('').reduce((s,c)=>s+c.charCodeAt(0),0)%colorPairs.length
  const [bg1,bg2c] = colorPairs[colorIdx]
  const gradientBg = imgUrl ? '' : `background:linear-gradient(135deg,${bg1},${bg2c});`

  const bgAttr = cardBg ? ` style="background:${cardBg}"` : ''
  const cardStyle2 = cardBg ? ` style="background:${cardBg};border-color:rgba(0,0,0,.06)"` : ''
  const priceAttr = priceColor ? ` style="color:${priceColor}"` : ''

  const imgTag = imgUrl ? `<img src="${imgUrl}" alt="${esc(p.name)}" loading="lazy" onerror="this.closest('.product-img').classList.add('img-error');this.nextElementSibling.style.opacity='.35'">` : ''
  const fallback = `<div class="img-fallback-icon" style="opacity:${imgUrl?'0':'.2'}">🛍️</div>`
  const badge = showBadge ? getBadge(p,'product-badge') : ''
  const ctrlData = `data-pid="${p._id}" data-name="${esc(p.name)}" data-price="${p.price}" data-image="${esc(imgUrl)}"`

  let ctrlHTML
  if(oos){
    ctrlHTML = `<span class="out-of-stock-label">Out of stock</span>`
  } else if(qty > 0){
    ctrlHTML = `<div class="cart-controls" ${ctrlData}><div class="cart-qty-row"><button class="qty-btn" onclick="event.preventDefault();decCart('${p._id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incCart('${p._id}','${sn}',${p.price},'${si}')">+</button></div></div>`
  } else {
    ctrlHTML = `<div class="cart-controls" ${ctrlData}></div>`
  }

  if(style === 'overlay'){
    const compareHtml = showOriginal && p.compare_at_price ? `<span class="ov-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''
    const discHtml = d ? `<span class="ov-discount">−${d}%</span>` : ''
    const wish = `<button class="wish-btn" onclick="event.preventDefault();event.stopPropagation();toggleWish('${p._id}',this)">♡</button>`
    return `<div class="product-card${qty>0?' in-cart':''}" data-btn-label="${esc(label)}"${cardStyle2}>
      <a class="card-link" href="product.html?store=${slug}&id=${p._id}">
        <div class="product-img" style="aspect-ratio:3/4;${gradientBg}">
          ${badge}${wish}${imgTag}${fallback}
          <div class="ov-layer">
            <div class="ov-name">${esc(p.name)}</div>
            <div class="ov-price-row">
              <span class="ov-price"${priceAttr}>${currency}${p.price.toFixed(2)}</span>
              ${compareHtml}${discHtml}
            </div>
          </div>
        </div>
      </a>
      <div class="cart-controls-wrap"${bgAttr}>${ctrlHTML}</div>
    </div>`
  }

  const hoverOverlay = (oos || qty > 0) ? ''
    : `<div class="card-atc-overlay"><button class="card-atc-btn" onclick="event.preventDefault();event.stopPropagation();addToCart('${p._id}','${sn}',${p.price},'${si}')">🛒 ${esc(label)}</button></div>`

  const wish = `<button class="wish-btn" onclick="event.preventDefault();event.stopPropagation();toggleWish('${p._id}',this)">♡</button>`
  return `<div class="product-card${qty>0?' in-cart':''}" data-btn-label="${esc(label)}"${cardStyle2}>
    <a class="card-link" href="product.html?store=${slug}&id=${p._id}">
      <div class="product-img" style="${gradientBg}">
        ${badge}${wish}${imgTag}${fallback}${hoverOverlay}
      </div>
      <div class="product-info"${bgAttr}>
        ${p.category_name?`<div class="product-cat">${esc(p.category_name)}</div>`:''}
        <div class="product-name">${esc(p.name)}</div>
        <div class="product-price-row">
          <span class="product-price"${priceAttr}>${currency}${p.price.toFixed(2)}</span>
          ${showOriginal&&p.compare_at_price?`<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>`:''}
          ${d?`<span class="product-discount">−${d}%</span>`:''}
        </div>
      </div>
    </a>
    <div class="cart-controls-wrap"${bgAttr}>${ctrlHTML}</div>
  </div>`
}

function initCartButtons(){
  document.querySelectorAll('.cart-controls').forEach(el=>{
    if(el.innerHTML.trim()!=='') return

function buildSec(sec, isMobile){
  const d = gd(sec)
  switch(sec.type){

    case 'announcement':{
      const closable = d.closable === 'yes'
      return `<div class="announcement-bar" style="${d.bgColor?'background:'+d.bgColor+';':''}${d.textColor?'color:'+d.textColor+';':''}">
        <span>${esc(d.text||'✨ Free shipping on orders above ₹999')}</span>
        ${d.linkText?`<a class="ann-link" href="${esc(d.linkUrl||'#')}">${esc(d.linkText)}</a>`:''}
        ${closable?`<button class="ann-close" onclick="this.closest('.announcement-bar').remove()">✕</button>`:''}
      </div>`
    }

    case 'navbar':{
      const lt = d.logoText || storeConfig.name || 'My Store'
      let links = d.navLinks?.length ? d.navLinks : [1,2,3,4,5].map(i=>d[`link${i}Text`]?{text:d[`link${i}Text`],url:d[`link${i}Url`]}:null).filter(Boolean)
      const lh = links.map(l=>{
        const url=l.url||l.href||'#', isA=url.startsWith('#'), sid=isA?url.slice(1):null
        const oc=isA?(sid===''||sid==='mainAnchor'?`onclick="event.preventDefault();smoothScroll()"`:`onclick="event.preventDefault();scrollToEl('${sid}')"`):''
        return `<a href="${esc(url)}" ${oc} style="${d.linkColor?'color:'+d.linkColor:''}">${esc(l.text||l.txt||'')}</a>`
      }).join('')
      const pos = d.sticky !== 'no' ? 'sticky' : 'relative'
      return `<nav class="tc-navbar" id="themeNavbar" style="${d.bgColor?'background:'+d.bgColor+';':''}position:${pos};top:0;z-index:200">
        <div class="nav-logo" style="${d.logoColor?'color:'+d.logoColor:''}" onclick="scrollTop()">
          ${d.logoUrl?`<img src="${d.logoUrl}" class="nav-logo-img" alt="${esc(lt)}">`:''}
          <span ${d.logoUrl?'class="hidden"':''}>${esc(lt)}</span>
        </div>
        ${!isMobile&&links.length?`<div class="nav-links">${lh}</div>`:''}
        <div class="nav-right">${d.showCart!=='no'?`<a href="cart.html?store=${slug}" class="nav-cart-btn">🛒 ${esc(d.cartText)} (<span class="theme-cart-qty">0</span>)</a>`:''}</div>
      </nav>`
    }

    case 'hero':{
      const heading = esc(d.heading||'Welcome to our Store').replace(/(store|shop)/gi,m=>`<em>${m}</em>`)
      const align = d.textAlign || 'center'
      const pads = {compact:isMobile?'48px 5% 40px':'72px 5% 60px', normal:isMobile?'64px 5% 56px':'112px 5% 96px', tall:isMobile?'96px 5% 72px':'160px 5% 128px'}
      const pad = pads[d.size] || pads.normal
      const hasBg = !!d.bgImage
      const bgS = hasBg ? '' : (d.bgColor ? `background:${d.bgColor};` : 'background:var(--bg2);')
      const ovOpacity = (parseInt(d.overlayOpacity)||40)/100
      const ctaIsAnchor = !d.ctaLink || d.ctaLink.startsWith('#')
      return `<section class="tc-hero" style="${bgS}padding:${pad};text-align:${align}">
        ${hasBg?`<div class="hero-bg-img" style="background-image:url('${d.bgImage}')"></div><div class="hero-ov" style="background:${d.overlayColor};opacity:${ovOpacity}"></div>`:''}
        <div class="hero-content" style="${d.textColor?'color:'+d.textColor:''}">
          ${d.badgeText?`<div class="hero-badge-pill">${esc(d.badgeText)}</div>`:''}
          <h1>${heading}</h1>
          <p>${esc(d.subheading||'Discover amazing products at the best prices.')}</p>
          <div class="hero-btns" style="justify-content:${align==='left'?'flex-start':align==='right'?'flex-end':'center'}">
            <a class="btn-cta" ${ctaIsAnchor?'onclick="smoothScroll()" href="javascript:void(0)"':`href="${d.ctaLink}"`}>${esc(d.ctaText||'Shop now')} →</a>
            ${d.cta2Text?`<a class="btn-cta btn-cta-ghost" href="${esc(d.cta2Link)}">${esc(d.cta2Text)}</a>`:''}
          </div>
        </div>
      </section>`
    }

    case 'featured':{
      // IGNORE count from settings — fetch all products (up to 1000)
      const count = 1000; // show all products
      const sid = `ft-${sec.id}`
      const featCols = d.featuredCols || d.columns || 0
      const colsStyle = featCols ? `--cols:${featCols};` : ''
      const skCount = isMobile ? 2 : (featCols || 4)

      const gridClass = getGridClass(activeStyle)

      const cardOpts = {
        btnLabel: d.btnText, cardBg: d.cardBg,
        priceColor: d.priceColor,
        showOriginal: d.showOriginalPrice,

      setTimeout(() => fillFeatured(sid, count, cardOpts), 0)

      return `<section class="tc-section featured-section" id="${sid}" style="${colsStyle}">

          <div>
            <div class="tc-section-title">${esc(d.title||'Featured Products')}</div>

          </div>
          <a href="javascript:void(0)" onclick="smoothScroll()" class="tc-view-all">${esc(d.viewAllText)}</a>
        </div>
        <div class="products-grid ${gridClass}" id="${sid}-grid">
          ${Array(skCount).fill(0).map(()=>`<div class="product-card skeleton" style="aspect-ratio:4/5"></div>`).join('')}
        </div>
      </section>`
    }

    // remaining section types (categories, banner, trustbadges, etc.) are unchanged
    case 'categories':{
      const cols = isMobile ? 2 : (parseInt(d.columns)||4), sid = `cs-${sec.id}`
      const catStyle = d.style || d.layout || 'image'
      setTimeout(() => fillCats(sid, cols, d, catStyle), 0)
      return `<section class="tc-section" id="${sid}">
        <div class="tc-section-hd">
          <div>
            <div class="tc-section-title">${esc(d.title||'Browse Categories')}</div>

        <div class="tc-cats-grid" id="${sid}-grid" style="grid-template-columns:repeat(${cols},1fr)">
          ${Array(cols).fill(0).map(()=>`<div class="tc-cat-card skeleton" style="height:200px"></div>`).join('')}
        </div>
      </section>`
    }

    // other cases (banner, trustbadges, testimonials, newsletter, footer, etc.) remain exactly as in original
    // ... (I'll keep them identical to the original for brevity; they are unchanged)

    default: return ''
  }
}

// FILL FEATURED — now loads ALL products (limit 1000)
// ═══════════════════════════════════════════════════════════════
async function fillFeatured(secId, count, cardOpts){
  const grid = document.getElementById(`${secId}-grid`); if(!grid) return
  try {
    const data = await fetch(`${API}/shop/${slug}/products?page=1&limit=${count}`).then(r=>r.json())
    const prods = data.products || []
    if(!prods.length){ const s=grid.closest('section'); if(s) s.style.display='none'; return }

    applyGridStyle(grid)
    grid.innerHTML = prods.map(p => renderCard(p, 'featured', null, cardOpts)).join('')
    initCartButtons()
    prods.forEach(p => { if(getQty(p._id)>0) updateCC(p._id) })
    restoreWish()
    syncAllProductGrids()
  } catch(e) {
    console.warn('[featured]', e.message)
    const s = document.getElementById(secId); if(s) s.style.display = 'none'
  }
}

    const getEmoji = n => { const lc=(n||'').toLowerCase(); for(const[k,v]of Object.entries(em)) if(lc.includes(k)) return v; return['🛍️','🎁','⭐','🏷️','✨','🎯','💫','🔆'][(n||'?').charCodeAt(0)%8] }

// LOAD THEME
// ═══════════════════════════════════════════════════════════════
async function loadTheme(){
  try {
    const res = await fetch(`${API}/shop/${slug}/theme`)
    if(!res.ok) return
    const raw = await res.json()
    let doc
    if(raw.published && typeof raw.published === 'object') doc = raw.published
    else if(raw.draft && typeof raw.draft === 'object') doc = raw.draft
    else if(raw.settings || raw.sections) doc = raw
    else doc = { settings: raw, sections: [] }
    themeData = doc

    const settings = doc.settings || doc
    applySettings(settings)
    const sections = (doc.sections || []).map(s => ({...s, type: resolveType(s.type)}))
    renderSections(sections)
  } catch(e) { console.warn('[theme]', e.message) }
}

function applySettings(s){
  if(!s || typeof s !== 'object') return
  const primaryFinal = readKey(s, 'primary_color','primaryColor') || '#0f0f0f'
  const bg = readKey(s, 'secondary_color','bgColor','bg_color','background_color') || '#fafafa'
  const text = readKey(s, 'accent_color','textColor','text_color') || '#0f0f0f'
  const radiusRaw = readKey(s, 'radius','border_radius') || '16px'
  const radiusPx = typeof radiusRaw === 'number' ? `${radiusRaw}px` : String(radiusRaw).includes('px') ? radiusRaw : `${radiusRaw}px`
  const font = readKey(s, 'font_heading','fontHeading','font') || 'DM Sans'
  const btnStyle = readKey(s, 'button_style','buttonStyle','btnStyle') || 'rounded'
  const cols = readKey(s, 'cols','columns') || 4
  const cardBg = readKey(s, 'card_bg','cardBg','card_background','cardBackground') || '#ffffff'

  R.style.setProperty('--primary', primaryFinal)
  R.style.setProperty('--brand', primaryFinal)
  R.style.setProperty('--p', text)
  R.style.setProperty('--bg', bg)
  R.style.setProperty('--radius', radiusPx)
  R.style.setProperty('--card-radius', radiusPx)
  R.style.setProperty('--card-bg', cardBg)
  R.style.setProperty('--font', `'${font}',system-ui,sans-serif`)
  R.style.setProperty('--btn-r', btnStyle==='pill'?'999px':btnStyle==='square'?'4px':radiusPx)
  R.style.setProperty('--cols', window.innerWidth<=768?'2':String(parseInt(cols)||4))
  document.body.style.background = bg

  if(font && font !== 'DM Sans' && font !== 'system-ui'){
    const fid = 'gf-'+font.replace(/\s+/g,'-')
    if(!document.getElementById(fid)){
      const l = document.createElement('link'); l.id=fid; l.rel='stylesheet'
      l.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;500;600;700;800;900&display=swap`
      document.head.appendChild(l)
    }
  }

  const rawStyle = readKey(s, 'card_style','cardStyle') || 'classic'
  activeStyle = ALL_CARD_STYLES.has(rawStyle) ? rawStyle : 'classic'
  syncAllProductGrids()

  activeSize = readKey(s, 'card_size','cardSize') || 'medium'
  applyCardSizeVars(activeSize)
}

function renderSections(sections){
  const isMobile = window.innerWidth <= 768
  const visible = sections.filter(s => s.is_visible !== false && s.enabled !== false).sort((a,b) => (a.order||0) - (b.order||0))
  if(!visible.length){ /* no sections */ return }

  const hasNavbar = visible.some(s => s.type === 'navbar')
  const hasHero = visible.some(s => s.type === 'hero')
  document.getElementById('origHeader').style.display = hasNavbar ? 'none' : ''
  const hb = document.getElementById('heroBanner')
  if(hasHero) hb.style.display = 'none'; else hb.classList.add('visible')

  const page = document.getElementById('page-sections')
  page.innerHTML = ''

  const navbarSec = visible.find(s => s.type === 'navbar')
  const heroSec = visible.find(s => s.type === 'hero')
  const rest = visible.filter(s => s.type !== 'navbar' && s.type !== 'hero')

  if(navbarSec){ const el = document.createElement('div'); el.innerHTML = buildSec(navbarSec, isMobile); while(el.firstChild) page.appendChild(el.firstChild) }
  if(heroSec){ const el = document.createElement('div'); el.innerHTML = buildSec(heroSec, isMobile); while(el.firstChild) page.appendChild(el.firstChild) }

  // append all remaining sections (main product grid removed, so no insertion)
  rest.forEach(s => {
    const el = document.createElement('div')
    el.innerHTML = buildSec(s, isMobile)
    while(el.firstChild) page.appendChild(el.firstChild)
  })

  document.querySelectorAll('.theme-cart-qty').forEach(e => e.textContent = getCart().reduce((s,x)=>s+x.qty,0))

  const updateOffset = () => {
    // no main anchor, but keep for possible future use
  }
  const updateCols = () => {
    const cols = themeData?.settings?.cols || themeData?.settings?.columns || 4
    R.style.setProperty('--cols', window.innerWidth<=768?'2':String(parseInt(cols)||4))
  }
  updateOffset()
  window.addEventListener('resize', () => { updateCols(); updateOffset(); applyCardSizeVars(activeSize) }, {passive:true})
}

// ═══════════════════════════════════════════════════════════════
// INIT (no main grid loading)
// ═══════════════════════════════════════════════════════════════
async function init(){
  try {
    storeConfig = await fetch(`${API}/shop/${slug}/config`).then(r=>r.json())
    if(storeConfig.error) throw new Error(storeConfig.error)
    document.title = storeConfig.name
    document.getElementById('storeName').textContent = storeConfig.name
    document.getElementById('heroTitle').textContent = storeConfig.name
    document.getElementById('heroTagline').textContent = storeConfig.tagline||storeConfig.description||'Discover amazing products'
    if(storeConfig.logo_url){ const img=document.createElement('img'); img.src=storeConfig.logo_url; img.style.cssText='height:32px;object-fit:contain;border-radius:6px'; document.getElementById('storeLogo').prepend(img) }
    if(storeConfig.brand_color) R.style.setProperty('--primary',storeConfig.brand_color)
    if(storeConfig.currency==='USD') currency='$'; else if(storeConfig.currency==='EUR') currency='€'
    if(storeConfig.payment_enabled) document.getElementById('payBadge').style.display='flex'
    sessionStorage.setItem('ekart_store',slug)
    sessionStorage.setItem('ekart_currency',currency)
    sessionStorage.setItem('ekart_store_name',storeConfig.name)
    sessionStorage.setItem('ekart_pay_enabled',storeConfig.payment_enabled?'1':'0')
    document.getElementById('cartBarBtn').href = `cart.html?store=${slug}`
    const tok=localStorage.getItem(`cust_token_${slug}`), name=localStorage.getItem(`cust_name_${slug}`)
    if(tok&&name){ const icon=document.getElementById('accountBtnIcon'); if(icon) icon.title=name.split(' ')[0] }
    await loadTheme()
    // no main grid loading
    updateCartUI()
    hideLoader()
    if(!document.querySelector('.tc-hero')) document.getElementById('heroBanner').classList.add('visible')
  } catch(e) {
    document.body.innerHTML = `<div style="text-align:center;padding:80px;font-family:sans-serif"><div style="font-size:48px;margin-bottom:16px;opacity:.25">🏪</div><h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Store not found</h2><p style="color:#9ca3af;font-size:14px">${esc(e.message)}</p></div>`
    hideLoader()
  }
}

if(slug){ setTimeout(hideLoader, 6000); init() } else hideLoader()
</script>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eKart Shop</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* ── Existing shop styles (keep everything) ───────────────────────── */
    :root {
      --accent: #6c63ff;
      --bg: #f8f9fc;
      --surface: #fff;
      --border: #e8eaf0;
      --text: #1a1a2e;
      --text2: #64748b;
      --text3: #94a3b8;
      --green: #16a34a;
      --surface2: #f1f5f9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 80px;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 64px;
    }

    .store-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      flex-shrink: 0;
    }

    .store-logo img {
      height: 36px;
      object-fit: contain;
      border-radius: 6px;
    }

    .store-logo-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .search-bar {
      flex: 1;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      padding: 9px 16px 9px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      background: var(--bg);
      transition: border-color .15s;
    }

    .search-bar input:focus {
      border-color: var(--accent);
      background: white;
    }

    .search-bar::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
    }

    .cart-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 700;
      white-space: nowrap;
      transition: all .15s;
    }

    .cart-btn:hover {
      background: #7c74ff;
      transform: translateY(-1px);
    }

    .cart-count {
      background: #ef4444;
      color: white;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .cart-count.has-items {
      display: flex;
    }

    .pay-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--green);
      white-space: nowrap;
    }

    /* ── Existing hero banner (will be replaced by theme's hero) ───────── */
    .hero-banner {
      width: 100%;
      padding: 52px 24px;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .hero-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero-banner h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    .hero-banner p {
      font-size: 16px;
      opacity: 0.9;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Existing product layout styles ─────────────────────────────────── */
    .layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 24px;
    }

    .filters {
      position: sticky;
      top: 88px;
      align-self: start;
    }

    .filter-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .filter-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 12px;
    }

    .cat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text2);
      transition: all .15s;
    }

    .cat-item:hover {
      background: rgba(108, 99, 255, 0.06);
      color: var(--accent);
    }

    .cat-item.active {
      background: rgba(108, 99, 255, 0.1);
      color: var(--accent);
      font-weight: 700;
    }

    .sort-select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13.5px;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
    }

    .sort-select:focus {
      border-color: var(--accent);
    }

    .price-inputs {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .price-inputs input {
      flex: 1;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      outline: none;
      background: var(--bg);
    }

    .price-inputs input:focus {
      border-color: var(--accent);
    }

    .price-sep {
      color: var(--text3);
      font-size: 12px;
    }

    .btn-filter {
      width: 100%;
      padding: 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      margin-top: 10px;
      transition: background .15s;
    }

    .btn-filter:hover {
      background: #7c74ff;
    }

    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .results-count {
      font-size: 13.5px;
      color: var(--text2);
      font-weight: 500;
    }

    .product-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .product-badge.sale {
      background: #ef4444;
      color: white;
    }

    .out-badge {
      text-align: center;
      font-size: 12px;
      color: #ef4444;
      font-weight: 700;
      padding: 7px;
      background: #fef2f2;
      border-radius: 8px;
    }

    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all .15s;
    }

    .btn-add:hover {
      background: #7c74ff;
    }

    .btn-add.added {
      background: var(--green);
    }

    /* product grid styles (grid, list, minimal, magazine) — keep existing */
    .style-grid .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 18px;
    }

    /* ... (all the existing product card styles) ... */
    /* We'll keep them as they are – not shown here for brevity, but keep your original CSS */

    /* ─── NEW: Styles for theme sections (copied from website-builder.html) ─── */
    /* Announcement */
    .announcement-bar {
      background: var(--primary);
      color: white;
      text-align: center;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .01em
    }

    /* Navbar */
    .navbar {
      background: var(--nav-bg);
      padding: 0 5%;
      height: var(--navbar-h, 62px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(var(--light-rgb, 0, 0, 0), .08);
      position: sticky;
      top: 0;
      z-index: 100
    }

    .nav-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -.03em
    }

    .nav-links {
      display: flex;
      gap: 28px;
      font-size: 13.5px;
      font-weight: 600;
      opacity: .65
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .nav-search {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: rgba(0, 0, 0, .06);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px
    }

    .nav-cart {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 15px;
      background: var(--primary);
      color: white;
      border-radius: var(--btn-r);
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: var(--font)
    }

    /* Hero */
    .hero {
      padding: 80px 5% 72px;
      text-align: center;
      background: var(--bg);
      position: relative;
      overflow: hidden
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 1
    }

    .hero-content {
      position: relative;
      z-index: 2
    }

    .hero h1 {
      font-size: 54px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -.03em;
      margin-bottom: 16px
    }

    .hero h1 em {
      font-style: normal;
      color: var(--primary)
    }

    .hero p {
      font-size: 17px;
      opacity: .65;
      max-width: 520px;
      margin: 0 auto 32px;
      line-height: 1.7
    }

    .hero-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap
    }

    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: white;
      padding: 13px 30px;
      border-radius: var(--btn-r);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: var(--font);
      transition: opacity .15s
    }

    .btn-cta:hover {
      opacity: .88
    }

    .btn-cta-ghost {
      background: transparent;
      color: var(--text);
      border: 1.5px solid rgba(0, 0, 0, .2)
    }

    .btn-cta-ghost:hover {
      background: rgba(0, 0, 0, .04)
    }

    /* Sections */
    .section {
      padding: 56px 5%
    }

    .section-header {
      margin-bottom: 28px
    }

    .section-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.02em
    }

    .section-subtitle {
      font-size: 14px;
      opacity: .55;
      margin-top: 6px
    }

    /* Products grid (used in featured section) */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), 1fr);
      gap: 18px
    }

    .product-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s
    }

    .product-card.shadow-style:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, .25)
    }

    .product-card.bordered-style {
      border: 1.5px solid rgba(0, 0, 0, .1)
    }

    .product-card.elevated-style {
      box-shadow: 0 4px 20px rgba(0, 0, 0, .15)
    }

    .product-card.elevated-style:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .2)
    }

    .product-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--primary);
      color: white;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: .04em
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1;
      background: var(--primary)18;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      position: relative
    }

    .product-info {
      padding: 14px
    }

    .product-name {
      font-size: 13.5px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.4
    }

    .stars {
      font-size: 11px;
      color: #f59e0b;
      margin-bottom: 5px
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .product-price {
      font-size: 16px;
      font-weight: 800;
      color: var(--primary)
    }

    .product-old {
      font-size: 11px;
      text-decoration: line-through;
      opacity: .38
    }

    .product-btn {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--btn-r);
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity .15s
    }

    .product-btn:hover {
      opacity: .88
    }

    /* Categories grid */
    .cats-grid {
      display: grid;
      gap: 16px
    }

    .cat-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: transform .2s
    }

    .cat-card:hover {
      transform: translateY(-2px)
    }

    .cat-card.circle-style {
      border-radius: 50%;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    .cat-card.minimal-style {
      background: transparent;
      border: 1.5px solid rgba(0, 0, 0, .1)
    }

    .cat-icon {
      font-size: 36px;
      margin-bottom: 10px
    }

    .cat-name {
      font-size: 14px;
      font-weight: 700
    }

    /* Promo Banner */
    .promo-banner {
      color: white;
      padding: 68px 5%;
      text-align: center
    }

    .promo-banner.left-layout {
      text-align: left;
      display: flex;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap
    }

    .promo-content h2 {
      font-size: 36px;
      font-weight: 900;
      margin-bottom: 10px
    }

    .promo-content p {
      opacity: .8;
      margin-bottom: 24px;
      font-size: 16px
    }

    .btn-white {
      background: white;
      color: var(--primary);
      padding: 12px 28px;
      border-radius: var(--btn-r);
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: var(--font)
    }

    /* Testimonials */
    .testimonials {
      padding: 56px 5%;
      background: var(--card-bg)
    }

    .testimonials-grid {
      display: grid;
      gap: 16px;
      margin-top: 24px
    }

    .testimonial {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 20px
    }

    .testimonial.quote-style {
      background: transparent;
      border-left: 3px solid var(--primary);
      border-radius: 0
    }

    .testimonial.minimal-style {
      background: transparent;
      border: 1.5px solid rgba(0, 0, 0, .08)
    }

    .t-stars {
      color: #f59e0b;
      font-size: 13px;
      margin-bottom: 10px
    }

    .t-text {
      font-size: 13.5px;
      line-height: 1.65;
      opacity: .7;
      margin-bottom: 14px
    }

    .t-author {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .t-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 13px
    }

    .t-name {
      font-size: 13px;
      font-weight: 700
    }

    /* Newsletter */
    .newsletter {
      padding: 56px 5%;
      text-align: center
    }

    .newsletter h2 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 10px
    }

    .newsletter p {
      opacity: .6;
      margin-bottom: 24px;
      font-size: 15px
    }

    .newsletter-form {
      display: flex;
      gap: 10px;
      max-width: 440px;
      margin: 0 auto;
      flex-wrap: wrap
    }

    .newsletter-input {
      flex: 1;
      min-width: 180px;
      padding: 11px 16px;
      border: 1.5px solid rgba(0, 0, 0, .12);
      border-radius: var(--btn-r);
      font-size: 14px;
      background: var(--card-bg);
      color: var(--text);
      font-family: var(--font);
      outline: none
    }

    /* Footer */
    .footer {
      padding: 40px 5%;
      border-top: 1px solid rgba(0, 0, 0, .08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px
    }

    .footer-logo {
      font-size: 17px;
      font-weight: 900
    }

    .footer-copy {
      font-size: 12px;
      opacity: .4
    }

    .footer-links {
      display: flex;
      gap: 18px;
      font-size: 12.5px;
      opacity: .45;
      font-weight: 600
    }

    /* Video */
    .video-section {
      padding: 56px 5%;
      text-align: center
    }

    .video-box {
      border-radius: var(--radius);
      height: 340px;
      overflow: hidden;
      position: relative;
      background: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px
    }

    .play-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer
    }

    /* Countdown */
    .countdown-section {
      padding: 56px 5%;
      text-align: center
    }

    .countdown-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap
    }

    .cd-unit {
      border-radius: var(--radius);
      padding: 18px 24px;
      min-width: 72px;
      background: var(--card-bg)
    }

    .cd-num {
      font-size: 38px;
      font-weight: 900;
      line-height: 1
    }

    .cd-label {
      font-size: 11px;
      font-weight: 700;
      opacity: .45;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 4px
    }

    /* Gallery */
    .gallery-section {
      padding: 56px 5%
    }

    .gallery-grid {
      display: grid;
      gap: 12px
    }

    .gallery-item {
      background: var(--card-bg);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px
    }

    /* Trust */
    .trust-section {
      padding: 32px 5%
    }

    .trust-grid {
      display: grid;
      gap: 12px
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px
    }

    .trust-icon {
      font-size: 20px
    }

    .trust-label {
      font-size: 13px;
      font-weight: 700
    }

    /* FAQ */
    .faq-section {
      padding: 56px 5%
    }

    .faq-item {
      border-bottom: 1px solid rgba(0, 0, 0, .08);
      padding: 18px 0
    }

    .faq-q {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px
    }

    .faq-a {
      font-size: 13.5px;
      opacity: .6;
      line-height: 1.65
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        font-size: 14px;
      }

      .btn-cta {
        padding: 11px 24px;
        font-size: 14px;
      }

      .navbar {
        height: 52px;
      }

      .nav-logo {
        font-size: 18px;
      }

      .nav-links {
        display: none;
      }

      .section {
        padding: 32px 5%;
      }

      .section-title {
        font-size: 20px;
      }

      .products-grid {
        gap: 10px;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }

    /* ── Existing pagination, empty state, etc. ────────────────────────── */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      transition: all .15s;
    }

    .page-btn:hover,
    .page-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text3);
      grid-column: 1/-1;
    }

    .empty-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .empty h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--text);
      color: white;
      padding: 14px 24px;
      display: none;
      align-items: center;
      justify-content: space-between;
      z-index: 300;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.2);
    }

    .cart-bar.show {
      display: flex;
    }

    .cart-bar-info {
      font-size: 14px;
      font-weight: 600;
    }

    .cart-bar-info span {
      color: rgba(255, 255, 255, 0.6);
      margin-right: 10px;
      font-size: 13px;
    }

    .cart-bar-btn {
      padding: 10px 24px;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: background .15s;
    }

    .cart-bar-btn:hover {
      background: #7c74ff;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: white;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all .3s;
      z-index: 400;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media(max-width:768px) {
      .section {
        padding: 24px 4% !important
      }

      .themed-products-grid,
      .products-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 10px !important
      }

      .navbar {
        padding: 10px 4% !important
      }

      .nav-links {
        display: none !important
      }

      .hero {
        padding: 36px 4% 28px !important
      }

      .hero h1 {
        font-size: 26px !important
      }

      .hero p {
        font-size: 13px !important
      }

      .btn-cta {
        padding: 10px 20px !important;
        font-size: 13px !important
      }

      .cats-grid {
        grid-template-columns: repeat(2, 1fr) !important
      }

      .testimonials-grid {
        grid-template-columns: 1fr !important
      }

      .list-grid .tc {
        flex-direction: column !important
      }

      .list-grid .tc-img {
        width: 100% !important;
        min-width: unset !important;
        min-height: 160px !important
      }

      .magazine-grid .tc:first-child {
        grid-column: span 1 !important
      }

      .footer {
        flex-direction: column !important;
        text-align: center !important
      }

      .newsletter-form {
        flex-direction: column !important
      }

      .newsletter-input {
        min-width: unset !important;
        width: 100% !important
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <a class="store-logo" href="javascript:void(0)" id="storeLogo">
        <span class="store-logo-text" id="storeName">Shop</span>
      </a>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products..." oninput="onSearch()">
      </div>
      <!-- Payment badge — shown only when Razorpay is enabled -->
      <div class="pay-badge" id="payBadge" style="display:none;">⚡ Online Payments</div>
      <a href="javascript:void(0)" id="accountBtn"
        style="display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:700;color:var(--text2);text-decoration:none;white-space:nowrap;transition:all .15s;"
        onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">
        👤 <span id="accountBtnLabel">Account</span>
      </a>
      <a href="cart.html" class="cart-btn" id="cartBtn">
        🛒 Cart <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </header>

  <!-- Original hero banner – will be replaced by theme's hero if present -->
  <div class="hero-banner" id="heroBanner" style="background:linear-gradient(135deg,#6c63ff,#a78bfa);">
    <div class="hero-content">
      <h1 id="heroTitle">Welcome</h1>
      <p id="heroTagline">Discover amazing products</p>
    </div>
  </div>

  <!-- NEW container for theme sections (will be inserted here) -->
  <div id="theme-sections"></div>

  <!-- Main product layout (unchanged) -->
  <div class="layout" id="mainLayout">
    <div class="filters">
      <div class="filter-section">
        <div class="filter-title">Categories</div>
        <div id="catList">
          <div class="cat-item active" data-cat="" onclick="selectCat(this,'')">🛍 All Products</div>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Sort By</div>
        <select class="sort-select" id="sortSelect" onchange="loadProducts()">
          <option value="">Newest</option>
          <option value="price_asc">Price: Low → High</option>
          <option value="price_desc">Price: High → Low</option>
          <option value="name_asc">Name: A → Z</option>
        </select>
      </div>
      <div class="filter-section">
        <div class="filter-title">Price Range</div>
        <div class="price-inputs">
          <input type="number" id="priceMin" placeholder="Min" min="0">
          <span class="price-sep">—</span>
          <input type="number" id="priceMax" placeholder="Max" min="0">
        </div>
        <button class="btn-filter" onclick="loadProducts()">Apply</button>
      </div>
    </div>

    <div class="products-section" id="productsSection">
      <div class="results-bar">
        <span class="results-count" id="resultsCount">Loading...</span>
      </div>
      <div class="products-grid" id="productsGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <div class="cart-bar" id="cartBar">
    <div class="cart-bar-info">
      <span id="cartBarQty"></span>
      <strong id="cartBarTotal"></strong>
    </div>
    <a href="cart.html" class="cart-bar-btn">View Cart →</a>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const slug = new URLSearchParams(location.search).get('store')
    if (!slug) document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif;"><h2>Store not found</h2></div>'

    const API = 'https://apiv2.aasaitech.in'
    let storeConfig = {}
    let cardStyle = 'grid'
    let currentCat = ''
    let currentPage = 1
    let searchTimeout = null
    let currency = '₹'

    // NEW: theme data
    let themeData = null

    // ================== THEME RENDERING (copied from website builder) ==================
    function loadTheme() {
      fetch(`${API}/shop/${slug}/theme`)
        .then(res => res.json())
        .then(data => {
          themeData = data
          renderThemeSections()
        })
        .catch(e => console.warn('Theme load failed', e))
    }

    function renderThemeSections() {
      if (!themeData || !themeData.sections) return
      const sections = themeData.sections.filter(s => s.is_visible !== false)
      const settings = themeData.settings || {}

      // Fix #4: sync --accent with --primary so existing product card CSS uses the theme color
      root.style.setProperty('--primary', settings.primary_color || '#6c63ff')
      root.style.setProperty('--accent', settings.primary_color || '#6c63ff')
      root.style.setProperty('--bg', settings.secondary_color || '#f8f9fc')
      root.style.setProperty('--text', settings.accent_color || '#1a1a2e')
      root.style.setProperty('--card-bg', settings.card_bg || '#ffffff')
      root.style.setProperty('--nav-bg', settings.nav_bg || '#ffffff')
      root.style.setProperty('--radius', settings.radius || '12px')
      root.style.setProperty('--btn-r', settings.button_style === 'pill' ? '999px' : settings.button_style === 'square' ? '3px' : settings.radius || '12px')
      root.style.setProperty('--font', `'${settings.font_heading || 'Outfit'}', sans-serif`)
      root.style.setProperty('--navbar-h', window.innerWidth <= 768 ? '52px' : '62px')
      const isLight = isLightColor(settings.secondary_color || '#ffffff')
      const lightRgb = isLight ? '0,0,0' : '255,255,255'
      root.style.setProperty('--light-rgb', lightRgb)

      const container = document.getElementById('theme-sections')
      if (!container) return
      const isMobile = window.innerWidth <= 768
      container.innerHTML = sections.map(sec => buildSectionHTML(sec, settings, isMobile)).join('')

      // Fix #7: hide old hero banner if theme has its own hero section
      const hasThemeHero = sections.some(s => s.type === 'hero')
      const heroBanner = document.getElementById('heroBanner')
      if (heroBanner) heroBanner.style.display = hasThemeHero ? 'none' : ''

      // Fix #8: hide original sticky header if theme has its own navbar section
      const hasThemeNavbar = sections.some(s => s.type === 'navbar')
      const origHeader = document.querySelector('header')
      if (origHeader) origHeader.style.display = hasThemeNavbar ? 'none' : ''

      // Fix #6: update theme navbar cart button with actual cart quantity
      updateThemeNavCart()
    }

    // ===== FULL buildSectionHTML from website-builder.html (adapted to use `settings`) =====
    function buildSectionHTML(sec, settings, isMobile) {
      const d = sec.data || {}
      const w = (cls, content) => `<div data-section-id="${sec.id}" class="${cls}" style="position:relative;cursor:pointer">${content}</div>`

      switch (sec.type) {
        case 'announcement': {
          const sz = d.textSize === 'large' ? '15px' : d.textSize === 'small' ? '11px' : '13px'
          const fw = d.bold === 'no' ? '500' : '700'
          return w('', `<div class="announcement-bar" style="${d.bgColor ? 'background:' + d.bgColor + ';' : ''}${d.textColor ? 'color:' + d.textColor + ';' : ''}font-size:${sz};font-weight:${fw};">${d.text || settings.announcementText || '✨ Free shipping!'}</div>`)
        }
        case 'navbar': {
          const logoStyle = `${d.logoColor ? 'color:' + d.logoColor + ';' : ''}`
          const navStyle = d.bgColor ? `background:${d.bgColor};` : ''
          const pos = d.sticky !== 'no' ? 'sticky' : 'relative'
          // Fix #5: navbar links have proper hrefs for the live storefront
          return w('', `<nav class="navbar" style="${navStyle}position:${pos};top:0;z-index:200;">
        <div class="nav-logo" style="${logoStyle}">${escHtml(d.logoText || 'My Store')}</div>
        ${!isMobile ? `<div class="nav-links" style="${d.linkColor ? 'color:' + d.linkColor + ';' : ''}"><a href="#">Home</a><a href="#products">Products</a><a href="#catList">Categories</a><a href="#about">About</a></div>` : ''}
        <div class="nav-right">
          ${d.showSearch !== 'no' ? `<button class="nav-search">🔍</button>` : ''}
          ${d.showCart !== 'no' ? `<button class="nav-cart" onclick="document.getElementById('cartBar').scrollIntoView({behavior:'smooth'})">🛒 Cart (0)</button>` : ''}
        </div>
      </nav>`)
        }
        case 'hero': {
          const rawH = d.heading || 'Welcome to our Store'
          const heading = rawH.replace(/(store|shop)/gi, m => `<em>${m}</em>`)
          const align = d.textAlign || 'center'
          const padMap = { compact: `${isMobile ? '32px 5% 28px' : '48px 5% 40px'}`, normal: `${isMobile ? '48px 5% 40px' : '80px 5% 72px'}`, tall: `${isMobile ? '72px 5% 60px' : '120px 5% 100px'}`, fullscreen: `${isMobile ? '80px 5%' : '160px 5%'}` }
          const pad = padMap[d.size || 'normal']
          const bgStyle = d.bgColor && !d.bgImage ? `background:${d.bgColor};` : `background:var(--bg);`
          const overlayStyle = d.bgImage && d.overlayColor ? `background:${d.overlayColor};opacity:${(parseInt(d.overlayOpacity) || 0) / 100};` : 'opacity:0;'
          return w('', `<section class="hero" style="${bgStyle}padding:${pad};text-align:${align};">
        ${d.bgImage ? `<div class="hero-bg" style="background-image:url('${d.bgImage}')"></div>` : ''}
        <div class="hero-overlay" style="${overlayStyle}"></div>
        <div class="hero-content" style="${d.textColor ? 'color:' + d.textColor + ';' : ''}">
          <h1>${heading}</h1>
          <p>${d.subheading || 'Discover amazing products at the best prices. Fast delivery across India.'}</p>
          <div class="hero-btns" style="justify-content:${align === 'left' ? 'flex-start' : align === 'right' ? 'flex-end' : 'center'}">
            <a href="${d.ctaLink || '#products'}" class="btn-cta">${d.ctaText || 'Shop Now'} →</a>
            ${d.cta2Text ? `<a href="${d.cta2Link || '#'}" class="btn-cta btn-cta-ghost">${d.cta2Text}</a>` : ''}
          </div>
        </div>
      </section>`)
        }
        case 'featured': {
          const count = parseInt(d.count) || 8
          const fCols = isMobile ? 2 : (parseInt(d.columns) || parseInt(settings.cols) || 3)
          const cBg = d.cardBg || settings.cardBg || '#13131e'
          const pColor = d.priceColor || settings.primaryColor || '#5b5cf6'
          const cardClass = `product-card ${(d.cardStyle || 'shadow')}-style`
          const btnTxt = d.btnText || 'Add to Cart'
          const showOld = d.showOldPrice !== 'no'
          const showRating = d.showRating === 'yes'
          const showBadge = d.showBadge === 'yes'
          const badge = d.badgeText || 'New'
          const emojis = ['👟', '👗', '🎧', '📱', '⌚', '👜', '🕶️', '💻', '🎮', '🛍️', '💄', '🏠']
          return w('', `<section class="section" id="products">
        <div class="section-header">
          <h2 class="section-title">${d.title || 'Featured Products'}</h2>
          ${d.subtitle ? `<p class="section-subtitle">${d.subtitle}</p>` : ''}
        </div>
        <div class="products-grid" style="--cols:${fCols}">
          ${emojis.slice(0, count).map((e, i) => `
          <div class="${cardClass}" style="background:${cBg}">
            <div class="product-img">
              ${showBadge && i < 3 ? `<div class="product-badge">${badge}</div>` : ''}
              ${e}
            </div>
            <div class="product-info">
              ${showRating ? `<div class="stars">★★★★☆ <span style="opacity:.4;font-size:10px">(${12 + i * 7})</span></div>` : ''}
              <div class="product-name">Premium Product ${i + 1}</div>
              <div class="price-row">
                <span class="product-price" style="color:${pColor}">₹${(499 + i * 200).toLocaleString()}</span>
                ${showOld ? `<span class="product-old">₹${(799 + i * 300).toLocaleString()}</span>` : ''}
              </div>
              <button class="product-btn">${btnTxt}</button>
            </div>
          </div>`).join('')}
        </div>
      </section>`)
        }
        case 'categories': {
          const cCols = isMobile ? 2 : (parseInt(d.columns) || 4)
          const style = d.style || 'card'
          const cats = [['👗', 'Fashion'], ['📱', 'Electronics'], ['🏠', 'Home & Living'], ['💄', 'Beauty'], ['🎮', 'Gaming'], ['🍕', 'Food'], ['⌚', 'Watches'], ['👟', 'Footwear']]
          return w('', `<section class="section">
        <div class="section-header"><h2 class="section-title">${d.title || 'Browse by Category'}</h2></div>
        <div class="cats-grid" style="grid-template-columns:repeat(${cCols},1fr)">
          ${cats.slice(0, cCols).map(([e, n]) => `<div class="cat-card ${style}-style"><div class="cat-icon">${e}</div><div class="cat-name">${n}</div></div>`).join('')}
        </div>
      </section>`)
        }
        case 'banner': {
          const bg = d.bgColor || settings.primaryColor || '#5b5cf6'
          const tc = d.textColor || '#ffffff'
          const layout = d.layout || 'center'
          return w('', `<section class="promo-banner ${layout}-layout" style="background:${bg};color:${tc}">
        <div class="promo-content">
          <h2>${d.heading || 'Limited Time Offer'}</h2>
          <p>${d.subtext || 'Get 20% off your first order. Use code WELCOME20'}</p>
          <button class="btn-white" style="color:${bg}">${d.ctaText || 'Claim Offer'}</button>
        </div>
      </section>`)
        }
        case 'testimonials': {
          const tCols = isMobile ? 1 : (parseInt(d.columns) || 3)
          const style = d.style || 'card'
          const ts = [['S', 'Sarah M.', 'Absolutely love this store! Fast shipping and great quality. Highly recommend!'],
          ['R', 'Rahul K.', 'Best shopping experience. Will definitely order again!'],
          ['A', 'Anita P.', 'Great products and excellent customer service. Five stars!']]
          return w('', `<section class="testimonials">
        <div class="section-header">
          <h2 class="section-title">${d.title || 'What Customers Say'}</h2>
          ${d.subtitle ? `<p class="section-subtitle">${d.subtitle}</p>` : ''}
        </div>
        <div class="testimonials-grid" style="grid-template-columns:repeat(${tCols},1fr)">
          ${ts.map(([av, n, t]) => `<div class="testimonial ${style}-style"><div class="t-stars">★★★★★</div><div class="t-text">"${t}"</div><div class="t-author"><div class="t-avatar">${av}</div><div class="t-name">${n}</div></div></div>`).join('')}
        </div>
      </section>`)
        }
        case 'newsletter': {
          const bg = d.bgColor ? `background:${d.bgColor};` : ''
          const tc = d.textColor ? `color:${d.textColor};` : ''
          const btnBg = d.btnColor || settings.primaryColor || '#5b5cf6'
          return w('', `<section class="newsletter" style="${bg}${tc}">
        <h2>${d.heading || 'Stay in the loop'}</h2>
        <p>${d.subtext || 'Get exclusive deals and offers straight to your inbox.'}</p>
        <div class="newsletter-form">
          <input class="newsletter-input" type="email" placeholder="${d.inputPlaceholder || 'Enter your email address'}">
          <button class="btn-cta" style="background:${btnBg};white-space:nowrap">${d.btnText || 'Subscribe'} →</button>
        </div>
      </section>`)
        }
        case 'footer': {
          const bg = d.bgColor ? `background:${d.bgColor};` : ''
          const tc = d.textColor ? `color:${d.textColor};` : ''
          return w('', `<footer class="footer" style="${bg}${tc}">
        <div class="footer-logo">My Store</div>
        <div class="footer-copy">${escHtml(d.footerText || settings.footerText || '© 2025 My Store. All rights reserved.')}</div>
        ${d.showSocial !== 'no' ? `<div class="footer-links"><a>Instagram</a><a>Facebook</a><a>Twitter</a></div>` : ''}
      </footer>`)
        }
        case 'video': {
          const bg = d.bgColor ? `background:${d.bgColor};` : ''
          return w('', `<section class="video-section" style="${bg}">
        <div class="section-header"><h2 class="section-title">${d.heading || 'Our Story'}</h2>${d.subtext ? `<p class="section-subtitle">${d.subtext}</p>` : ''}</div>
        <div class="video-box">
          ${d.videoUrl ? `<iframe src="${d.videoUrl}" style="width:100%;height:100%;border:none" allowfullscreen></iframe>` : `<div class="play-circle">▶</div><div style="font-size:13px;font-weight:600;opacity:.5">Add video URL to embed</div>`}
        </div>
      </section>`)
        }
        case 'countdown': {
          const bg = d.bgColor ? `background:${d.bgColor};` : 'background:var(--card-bg);'
          const tc = d.textColor ? `color:${d.textColor};` : ''
          const ac = d.accentColor || settings.primaryColor || '#5b5cf6'
          return w('', `<section class="countdown-section" style="${bg}${tc}">
        <div class="section-header">
          <h2 class="section-title">⏳ ${d.heading || 'Deal Ends In'}</h2>
          ${d.subtext ? `<p class="section-subtitle">${d.subtext}</p>` : ''}
        </div>
        <div class="countdown-row">
          ${[['02', 'Days'], ['14', 'Hours'], ['37', 'Mins'], ['52', 'Secs']].map(([n, l]) => `<div class="cd-unit"><div class="cd-num" style="color:${ac}">${n}</div><div class="cd-label">${l}</div></div>`).join('')}
        </div>
      </section>`)
        }
        case 'gallery': {
          const gCols = isMobile ? 2 : (parseInt(d.columns) || 4)
          const ratio = d.imgAspect === 'landscape' ? '16/9' : d.imgAspect === 'portrait' ? '3/4' : '1'
          return w('', `<section class="gallery-section">
        <div class="section-header">
          <h2 class="section-title">${d.title || 'Our Gallery'}</h2>
          ${d.subtitle ? `<p class="section-subtitle">${d.subtitle}</p>` : ''}
        </div>
        <div class="gallery-grid" style="grid-template-columns:repeat(${gCols},1fr)">
          ${['🌿', '✨', '🎁', '🛍️', '💎', '🌸', '🔥', '⚡'].slice(0, isMobile ? 4 : 8).map(e => `<div class="gallery-item" style="aspect-ratio:${ratio}">${e}</div>`).join('')}
        </div>
      </section>`)
        }
        case 'trustbadges': {
          const bg = d.bgColor ? `background:${d.bgColor};` : 'background:var(--card-bg);'
          const tc = d.textColor ? `color:${d.textColor};` : ''
          const layout = d.layout || 'row'
          const gridCols = layout === '2x2' ? (isMobile ? 2 : 2) : layout === 'column' ? 1 : (isMobile ? 2 : 4)
          return w('', `<section class="trust-section" style="${bg}${tc}">
        <div class="trust-grid" style="grid-template-columns:repeat(${gridCols},1fr)">
          ${[[d.badge1 || 'Free Shipping', '🚚'], [d.badge2 || 'Secure Payment', '🔒'], [d.badge3 || 'Easy Returns', '↩️'], [d.badge4 || '24/7 Support', '💬']].map(([label, icon]) => `<div class="trust-item"><span class="trust-icon">${icon}</span><span class="trust-label">${escHtml(label)}</span></div>`).join('')}
        </div>
      </section>`)
        }
        case 'faq': {
          const pairs = [[d.q1, d.a1], [d.q2, d.a2], [d.q3, d.a3]].filter(([q]) => q)
          const defaults = pairs.length ? pairs : [
            ['How long does shipping take?', 'Typically 3-7 business days across India. Express delivery available at checkout.'],
            ['What is your return policy?', 'Hassle-free 30-day returns. No questions asked, full refund guaranteed.'],
            ['Do you offer Cash on Delivery?', 'Yes! COD available across India on all orders.'],
          ]
          return w('', `<section class="faq-section">
        <div class="section-header">
          <h2 class="section-title">${d.title || 'Frequently Asked Questions'}</h2>
          ${d.subtitle ? `<p class="section-subtitle">${d.subtitle}</p>` : ''}
        </div>
        ${defaults.map(([q, a]) => `<div class="faq-item"><div class="faq-q">${escHtml(q)}</div><div class="faq-a">${escHtml(a)}</div></div>`).join('')}
      </section>`)
        }
        default: return ''
      }
    }

    // Helper functions
    function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') }
    function isLightColor(hex) {
      const c = (hex || '').replace('#', ''); if (c.length !== 6) return true
      const r = parseInt(c.slice(0, 2), 16), g = parseInt(c.slice(2, 4), 16), b = parseInt(c.slice(4, 6), 16)
      return (r * 299 + g * 587 + b * 114) / 1000 > 128
    }

    // ================== EXISTING SHOP FUNCTIONS (unchanged) ==================
    async function init() {
      try {
        storeConfig = await fetch(`${API}/shop/${slug}/config`).then(r => r.json())
        if (storeConfig.error) throw new Error(storeConfig.error)

        document.title = storeConfig.name
        document.getElementById('storeName').textContent = storeConfig.name
        document.getElementById('heroTitle').textContent = storeConfig.name
        document.getElementById('heroTagline').textContent = storeConfig.tagline || storeConfig.description || 'Discover amazing products'

        if (storeConfig.logo_url) {
          const img = document.createElement('img'); img.src = storeConfig.logo_url
          document.querySelector('.store-logo').prepend(img)
        }
        if (storeConfig.brand_color) {
          document.documentElement.style.setProperty('--accent', storeConfig.brand_color)
          document.getElementById('heroBanner').style.background =
            `linear-gradient(135deg,${storeConfig.brand_color},${storeConfig.brand_color}99)`
        }
        if (storeConfig.currency === 'USD') currency = '$'
        else if (storeConfig.currency === 'EUR') currency = '€'

        if (storeConfig.payment_enabled) {
          document.getElementById('payBadge').style.display = 'flex'
        }

        cardStyle = storeConfig.card_style || 'grid'
        document.getElementById('productsSection').className = `products-section style-${cardStyle}`
        document.getElementById('mainLayout').className = `layout style-${cardStyle}`

        sessionStorage.setItem('ekart_store', slug)
        sessionStorage.setItem('ekart_currency', currency)
        sessionStorage.setItem('ekart_store_name', storeConfig.name)
        sessionStorage.setItem('ekart_pay_enabled', storeConfig.payment_enabled ? '1' : '0')

        document.getElementById('cartBtn').href = `cart.html?store=${slug}`

        const custToken = localStorage.getItem(`cust_token_${slug}`)
        const custName = localStorage.getItem(`cust_name_${slug}`)
        const acctBtn = document.getElementById('accountBtn')
        const acctLabel = document.getElementById('accountBtnLabel')
        if (acctBtn) {
          acctBtn.href = custToken ? `customer-account.html?store=${slug}` : `customer-login.html?store=${slug}`
          if (acctLabel) acctLabel.textContent = custToken && custName ? custName.split(' ')[0] : 'Login'
        }

        await loadCategories()
        await loadProducts()
        updateCartUI()

        // NEW: load theme after store config
        loadTheme()
      } catch (e) {
        document.body.innerHTML = `<div style="text-align:center;padding:80px;font-family:sans-serif;"><h2>Store not found</h2><p>${e.message}</p></div>`
      }
    }

    async function loadCategories() {
      const cats = await fetch(`${API}/shop/${slug}/categories`).then(r => r.json())
      const list = document.getElementById('catList')
      list.innerHTML = `<div class="cat-item active" data-cat="" onclick="selectCat(this,'')">🛍 All</div>` +
        cats.map(c => `<div class="cat-item" data-cat="${c._id}" onclick="selectCat(this,'${c._id}')">${c.name}</div>`).join('')
    }

    async function loadProducts() {
      const q = document.getElementById('searchInput').value.trim()
      const sort = document.getElementById('sortSelect').value
      const minPrice = document.getElementById('priceMin').value
      const maxPrice = document.getElementById('priceMax').value
      const params = new URLSearchParams({ page: currentPage })
      if (q) params.set('q', q)
      if (currentCat) params.set('category', currentCat)
      if (sort) params.set('sort', sort)
      if (minPrice) params.set('min_price', minPrice)
      if (maxPrice) params.set('max_price', maxPrice)
      try {
        const data = await fetch(`${API}/shop/${slug}/products?${params}`).then(r => r.json())
        document.getElementById('resultsCount').textContent = `${data.total} product${data.total !== 1 ? 's' : ''} found`
        renderProducts(data.products)
        renderPagination(data.page, data.pages)
      } catch (e) { console.error(e) }
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid')
      if (!products.length) {
        grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>No products found</h3><p>Try a different search or category</p></div>`
        return
      }
      if (cardStyle === 'list') grid.innerHTML = products.map(p => renderListCard(p)).join('')
      else if (cardStyle === 'minimal') grid.innerHTML = products.map(p => renderMinimalCard(p)).join('')
      else if (cardStyle === 'magazine') grid.innerHTML = products.map((p, i) => renderMagazineCard(p, i)).join('')
      else grid.innerHTML = products.map(p => renderGridCard(p)).join('')
    }

    function discountPct(p) {
      return p.compare_at_price && p.compare_at_price > p.price
        ? Math.round((1 - p.price / p.compare_at_price) * 100) : 0
    }
    function isOOS(p) { return p.track_inventory && p.stock_qty <= 0 }

    function addBtn(p) {
      if (isOOS(p)) return `<div class="out-badge">Out of Stock</div>`
      return `<button class="btn-add" id="btn-${p._id}" onclick="event.preventDefault();addToCart('${p._id}','${p.name.replace(/'/g, "\\'")}',${p.price},'${p.images?.[0] || ''}')">🛒 Add to Cart</button>`
    }

    function renderGridCard(p) {
      const d = discountPct(p)
      const img = p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.name}" loading="lazy">` : '📦'
      return `<a class="product-card" href="product.html?store=${slug}&id=${p._id}">
    ${d >= 5 ? `<div class="product-badge sale">−${d}%</div>` : ''}
    <div class="product-img">${img}</div>
    <div class="product-info">
      ${p.category_name ? `<div class="product-cat">${p.category_name}</div>` : ''}
      <div class="product-name">${p.name}</div>
      <div class="product-price-row">
        <span class="product-price">${currency}${p.price.toFixed(2)}</span>
        ${p.compare_at_price ? `<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
        ${d ? `<span class="product-discount">${d}% off</span>` : ''}
      </div>
      ${addBtn(p)}
    </div>
  </a>`
    }

    function renderListCard(p) {
      const d = discountPct(p)
      const img = p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.name}" loading="lazy">` : '📦'
      return `<a class="product-card" href="product.html?store=${slug}&id=${p._id}">
    ${d >= 5 ? `<div class="product-badge sale">−${d}%</div>` : ''}
    <div class="product-img">${img}</div>
    <div class="product-info">
      <div class="product-info-left">
        ${p.category_name ? `<div class="product-cat">${p.category_name}</div>` : ''}
        <div class="product-name">${p.name}</div>
        ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
      </div>
      <div class="product-info-right">
        <span class="product-price">${currency}${p.price.toFixed(2)}</span>
        ${p.compare_at_price ? `<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
        ${d ? `<span class="product-discount">${d}% off</span><br><br>` : ''}
        ${addBtn(p)}
      </div>
    </div>
  </a>`
    }

    function renderMinimalCard(p) {
      const d = discountPct(p)
      const oos = isOOS(p)
      const img = p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.name}" loading="lazy">` : '📦'
      return `<a class="product-card" href="product.html?store=${slug}&id=${p._id}">
    <div class="product-img-wrap">
      ${img}
      ${!oos ? `<div class="product-overlay"><button class="btn-add" onclick="event.preventDefault();addToCart('${p._id}','${p.name.replace(/'/g, "\\'")}',${p.price},'${p.images?.[0] || ''}')">🛒 Add</button></div>` : ''}
      ${d >= 5 ? `<div class="product-badge sale" style="top:10px;left:10px;">−${d}%</div>` : ''}
    </div>
    <div class="product-info">
      ${p.category_name ? `<div class="product-cat">${p.category_name}</div>` : ''}
      <div class="product-name">${p.name}</div>
      <div class="product-price-row">
        <span class="product-price">${currency}${p.price.toFixed(2)}</span>
        ${p.compare_at_price ? `<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
        ${d ? `<span class="product-discount">${d}% off</span>` : ''}
      </div>
      ${oos ? `<div class="out-badge" style="margin-top:8px;">Out of Stock</div>` : ''}
    </div>
  </a>`
    }

    function renderMagazineCard(p, i) {
      const d = discountPct(p)
      const img = p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.name}" loading="lazy">` : '📦'
      return `<a class="product-card" href="product.html?store=${slug}&id=${p._id}">
    ${d >= 5 ? `<div class="product-badge sale">−${d}%</div>` : ''}
    <div class="product-img">${img}</div>
    <div class="product-info">
      ${p.category_name ? `<div class="product-cat">${p.category_name}</div>` : ''}
      <div class="product-name">${p.name}</div>
      <div class="product-price-row">
        <span class="product-price">${currency}${p.price.toFixed(2)}</span>
        ${p.compare_at_price ? `<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
        ${d ? `<span class="product-discount">${d}% off</span>` : ''}
      </div>
      ${addBtn(p)}
    </div>
  </a>`
    }

    function renderPagination(page, pages) {
      const el = document.getElementById('pagination')
      if (pages <= 1) { el.innerHTML = ''; return }
      let html = `<button class="page-btn" onclick="goPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>← Prev</button>`
      for (let i = 1; i <= pages; i++) {
        if (pages <= 7 || i === 1 || i === pages || Math.abs(i - page) <= 2)
          html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`
        else if (Math.abs(i - page) === 3) html += '<span style="padding:8px;color:var(--text3);">…</span>'
      }
      html += `<button class="page-btn" onclick="goPage(${page + 1})" ${page >= pages ? 'disabled' : ''}>Next →</button>`
      el.innerHTML = html
    }

    function goPage(p) { currentPage = p; loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }) }
    function selectCat(el, catId) { document.querySelectorAll('.cat-item').forEach(x => x.classList.remove('active')); el.classList.add('active'); currentCat = catId; currentPage = 1; loadProducts() }
    function onSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { currentPage = 1; loadProducts() }, 350) }

    function getCart() { return JSON.parse(localStorage.getItem('cart_' + slug) || '[]') }
    function saveCart(c) { localStorage.setItem('cart_' + slug, JSON.stringify(c)) }

    function addToCart(id, name, price, image) {
      const cart = getCart()
      const ex = cart.find(x => x.product_id === id && !x.variant)
      if (ex) ex.qty++; else cart.push({ product_id: id, name, price, image, qty: 1 })
      saveCart(cart); updateCartUI()
      const btn = document.getElementById('btn-' + id)
      if (btn) { btn.textContent = '✅ Added!'; btn.classList.add('added'); setTimeout(() => { btn.textContent = '🛒 Add to Cart'; btn.classList.remove('added') }, 1200) }
      toast('Added to cart! 🛒')
    }

    function updateCartUI() {
      const cart = getCart()
      const qty = cart.reduce((s, x) => s + x.qty, 0)
      const amt = cart.reduce((s, x) => s + x.price * x.qty, 0)
      const el = document.getElementById('cartCount')
      el.textContent = qty; el.className = 'cart-count' + (qty > 0 ? ' has-items' : '')
      const bar = document.getElementById('cartBar')
      if (qty > 0) {
        bar.classList.add('show')
        document.getElementById('cartBarQty').textContent = `${qty} item${qty !== 1 ? 's' : ''} — `
        document.getElementById('cartBarTotal').textContent = `${currency}${amt.toFixed(2)}`
      } else bar.classList.remove('show')
      // Fix #6: also update any theme navbar cart button with real count
      updateThemeNavCart()
    }

    // Fix #6: helper to update the theme-injected navbar cart button
    function updateThemeNavCart() {
      const cart = getCart()
      const qty = cart.reduce((s, x) => s + x.qty, 0)
      document.querySelectorAll('.nav-cart').forEach(btn => {
        btn.textContent = `🛒 Cart (${qty})`
      })
    }

    function toast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show')
      setTimeout(() => t.classList.remove('show'), 2000)
    }

    if (slug) init()
  </script>
</body>

</html>

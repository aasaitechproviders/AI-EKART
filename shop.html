<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eKart Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #6c63ff; --primary: #6c63ff;
      --bg: #f8f9fc; --surface: #fff; --border: #e8eaf0;
      --text: #1a1a2e; --text2: #64748b; --text3: #94a3b8;
      --green: #16a34a; --surface2: #f1f5f9;
      --card-bg: #ffffff; --nav-bg: #ffffff;
      --radius: 12px; --btn-r: 12px;
      --font: 'Outfit', sans-serif; --navbar-h: 62px; --cols: 3;
      
      /* Card size variables - these will be overridden by theme */
      --card-img-min-h: 200px;
      --card-name-fs: 14px;
      --card-price-fs: 16px;
      --card-info-pad: 14px;
      --grid-gap: 18px;
      --card-img-aspect: 1/1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); padding-bottom: 80px; }

    #initial-loader {
      position: fixed; inset: 0; background: white; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; transition: opacity 0.3s;
    }
    #initial-loader.hidden { opacity: 0; pointer-events: none; }

    #origHeader { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 64px; }
    .store-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); flex-shrink: 0; }
    .store-logo img { height: 36px; object-fit: contain; border-radius: 6px; }
    .store-logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; }
    .search-bar { flex: 1; max-width: 480px; margin: 0 auto; position: relative; }
    .search-bar input { width: 100%; padding: 9px 16px 9px 40px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: var(--font); outline: none; background: var(--bg); transition: border-color .15s; }
    .search-bar input:focus { border-color: var(--accent); background: white; }
    .search-bar::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
    .cart-btn { display: flex; align-items: center; gap: 8px; padding: 9px 18px; background: var(--accent); color: white; border-radius: 10px; text-decoration: none; font-size: 13.5px; font-weight: 700; white-space: nowrap; transition: all .15s; }
    .cart-btn:hover { background: #7c74ff; transform: translateY(-1px); }
    .cart-count { background: #ef4444; color: white; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
    .cart-count.has-items { display: flex; }
    .pay-badge { display: flex; align-items: center; gap: 5px; padding: 5px 10px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; font-size: 11.5px; font-weight: 700; color: var(--green); white-space: nowrap; }

    #heroBanner { width: 100%; padding: 52px 24px; text-align: center; color: white; position: relative; overflow: hidden; background: linear-gradient(135deg, #6c63ff, #a78bfa); }
    #heroBanner::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,.15); }
    #heroBanner .hero-content { position: relative; z-index: 1; }
    #heroBanner h1 { font-size: clamp(28px, 5vw, 52px); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
    #heroBanner p { font-size: 16px; opacity: .9; max-width: 480px; margin: 0 auto; }

    #mainLayout { padding: 48px 5%; }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 3), 1fr);
      gap: var(--grid-gap, 18px);
    }
    
    /* Base product card styles - will be modified by card size */
    .product-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; text-decoration: none;
      color: var(--text); display: block; transition: all .2s; position: relative;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.1); }
    
    /* Card image - size controlled by aspect ratio */
    .product-img {
      width: 100%;
      aspect-ratio: var(--card-img-aspect, 1/1);
      min-height: var(--card-img-min-h, 200px);
      background: var(--surface2); display: flex; align-items: center; justify-content: center;
      font-size: 48px; overflow: hidden; position: relative;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .product-badge { position: absolute; top: 10px; left: 10px; z-index: 2; font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 6px; }
    .product-badge.sale { background: #ef4444; color: white; }
    
    /* Product info - padding controlled by card size */
    .product-info { padding: var(--card-info-pad, 14px); }
    .product-cat { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .product-name { 
      font-size: var(--card-name-fs, 14px); 
      font-weight: 700; 
      margin-bottom: 8px; 
      line-height: 1.4;
      /* Ensure text truncates properly for small cards */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .product-price-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .product-price { font-size: var(--card-price-fs, 16px); font-weight: 800; color: var(--accent); }
    .product-compare { font-size: 12px; text-decoration: line-through; color: var(--text3); }
    .product-discount { font-size: 11px; font-weight: 700; color: var(--green); background: #f0fdf4; padding: 2px 6px; border-radius: 4px; }
    .out-badge { text-align: center; font-size: 12px; color: #ef4444; font-weight: 700; padding: 7px; background: #fef2f2; border-radius: 8px; }

    /* Cart controls - size adjustments based on card size */
    .cart-controls { display: flex; align-items: center; justify-content: space-between; gap: 4px; margin-top: 8px; }
    .qty-btn { 
      width: 32px; height: 32px; border: none; background: var(--accent); color: white; 
      font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer; display: flex; 
      align-items: center; justify-content: center; transition: opacity .15s; flex-shrink: 0; 
    }
    .qty-btn:hover { opacity: 0.85; }
    .qty-value { font-size: 14px; font-weight: 700; min-width: 24px; text-align: center; }
    .btn-add { 
      display: flex !important; align-items: center !important; justify-content: center !important; 
      gap: 6px; width: 100%; padding: 9px; background: var(--accent); color: white !important; 
      border: none; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; 
      font-family: var(--font); transition: all .15s; text-decoration: none; 
    }
    .btn-add:hover { opacity: 0.88; }
    .btn-add.added { background: var(--green); }

    /* Featured products section */
    .tc-products-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 3), 1fr);
      gap: var(--grid-gap, 18px);
    }
    .tc-product-card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; transition: transform .2s, box-shadow .2s; position: relative; border: 1px solid var(--border); }
    .tc-product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.15); }
    .tc-product-img { 
      width: 100%; 
      aspect-ratio: var(--card-img-aspect, 1/1); 
      min-height: var(--card-img-min-h, 200px); 
      background: rgba(0,0,0,.04); display: flex; align-items: center; justify-content: center; 
      font-size: 38px; position: relative; overflow: hidden; 
    }
    .tc-product-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tc-product-badge { position: absolute; top: 10px; left: 10px; background: var(--primary); color: white; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 4px; letter-spacing: .04em; z-index: 2; }
    .tc-product-info { padding: var(--card-info-pad, 14px); }
    .tc-product-name { 
      font-size: var(--card-name-fs, 13.5px); 
      font-weight: 700; 
      margin-bottom: 6px; 
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tc-price-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .tc-product-price { font-size: var(--card-price-fs, 16px); font-weight: 800; color: var(--primary); }
    .tc-product-old { font-size: 11px; text-decoration: line-through; opacity: .38; }
    .tc-product-btn { 
      display: flex !important; align-items: center !important; justify-content: center !important; 
      gap: 6px; width: 100%; padding: 10px; background: var(--primary); color: white !important; 
      border: none; border-radius: var(--btn-r, 9px); font-size: 13px; font-weight: 700; 
      cursor: pointer; font-family: var(--font); transition: all .15s; margin-top: 8px; 
    }
    .tc-product-btn:hover { opacity: 0.88; }

    /* Card style variations - now using CSS variables for size */
    .featured-minimal .tc-product-card { background: transparent; border: 1.5px solid var(--border); }
    .featured-minimal .tc-product-card:hover { border-color: var(--accent); box-shadow: none; }
    .featured-bold .tc-product-card { border-top: 3px solid var(--primary); border-left: none; border-right: none; border-bottom: none; }
    .featured-overlay .tc-product-img { aspect-ratio: 3/4; min-height: 0; }
    .featured-overlay .tc-product-info { display: none; }
    .featured-overlay .tc-btn-wrap { display: none; }
    .featured-overlay .tc-product-card .tc-overlay { padding: var(--card-info-pad, 14px); }
    .featured-overlay .tc-product-card .tc-overlay .tc-name { font-size: var(--card-name-fs, 13.5px); }
    .featured-overlay .tc-product-card .tc-overlay .tc-price { font-size: var(--card-price-fs, 16px); }
    .featured-compact .tc-product-info { padding: var(--card-info-pad, 8px 10px 10px) !important; }
    .featured-compact .tc-product-name { font-size: var(--card-name-fs, 12px) !important; }
    .featured-compact .tc-btn-wrap { display: none; }
    .featured-elevated .tc-product-card { border: none; box-shadow: 0 8px 28px rgba(0,0,0,.1); border-radius: calc(var(--radius) * 1.3); }
    .featured-elevated .tc-product-card:hover { transform: translateY(-7px); box-shadow: 0 20px 50px rgba(0,0,0,.18); }
    .featured-list .tc-products-grid { grid-template-columns: 1fr !important; }
    .featured-list .tc-product-card { display: flex; flex-direction: row; align-items: stretch; }
    .featured-list .tc-product-img { width: 200px; min-width: 200px; aspect-ratio: auto; height: auto; min-height: 150px; }
    .featured-list .tc-product-info { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: var(--card-info-pad, 24px); }
    .featured-list .tc-product-name { font-size: var(--card-name-fs, 14px); }
    .featured-magazine .tc-product-card:first-child { grid-column: span 2; }
    .featured-magazine .tc-product-card:first-child .tc-product-img { aspect-ratio: 2/1; min-height: 0; }
    .featured-magazine .tc-product-card { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .featured-magazine .tc-product-card:hover { transform: translateY(-3px); }

    /* Main grid style variations - using CSS variables for size */
    .minimal-grid .product-card { background: transparent; border: 1.5px solid var(--border); }
    .minimal-grid .product-card:hover { border-color: var(--accent); box-shadow: none; }
    .overlay-grid .product-card { border: none; }
    .overlay-grid .product-img { aspect-ratio: 3/4; min-height: 0; }
    .overlay-grid .product-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(0deg, rgba(0,0,0,.90) 0%, rgba(0,0,0,.4) 55%, transparent 100%);
      padding: var(--card-info-pad, 20px 14px 14px); color: white; z-index: 3; display: flex; flex-direction: column; gap: 5px;
    }
    .overlay-grid .product-overlay .ov-name { font-size: var(--card-name-fs, 13px); font-weight: 700; color: white; }
    .overlay-grid .product-overlay .ov-price { font-size: var(--card-price-fs, 15px); font-weight: 800; color: white; }
    .overlay-grid .product-overlay .ov-compare { font-size: 11px; color: rgba(255,255,255,.55); text-decoration: line-through; }
    .overlay-grid .product-overlay .btn-add { background: rgba(255,255,255,.18) !important; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.35) !important; color: white !important; margin-top: 4px; }
    .overlay-grid .product-info { display: none; }
    .overlay-grid .cart-controls-wrap { display: none; }
    .bold-grid .product-card { border: none; border-top: 3px solid var(--accent); }
    .bold-grid .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .list-grid { grid-template-columns: 1fr !important; }
    .list-grid .product-card { display: flex; flex-direction: row; align-items: stretch; }
    .list-grid .product-img { width: 200px; min-width: 200px; aspect-ratio: auto; height: auto; min-height: 150px; }
    .list-grid .product-info { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: var(--card-info-pad, 24px); }
    .list-grid .product-name { font-size: var(--card-name-fs, 14px); }
    .list-grid .btn-add { width: auto; padding: 8px 20px; }
    .magazine-grid .product-card:first-child { grid-column: span 2; }
    .magazine-grid .product-card:first-child .product-img { aspect-ratio: 2/1; min-height: 0; }
    .magazine-grid .product-card { box-shadow: 0 2px 8px rgba(0,0,0,.06); border: none; }
    .magazine-grid .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,.12); }
    .compact-grid .product-info { padding: var(--card-info-pad, 8px 10px 10px) !important; }
    .compact-grid .product-name { font-size: var(--card-name-fs, 12px) !important; margin-bottom: 3px; }
    .compact-grid .product-price { font-size: var(--card-price-fs, 13px) !important; }
    .compact-grid .product-price-row { margin-bottom: 0; }
    .compact-grid .cart-controls-wrap { display: none; }
    .compact-grid .product-card:hover { transform: none; opacity: .85; }
    .compact-grid { gap: 10px !important; }
    .elevated-grid .product-card { border: none; box-shadow: 0 8px 28px rgba(0,0,0,.08); border-radius: calc(var(--radius) * 1.3); }
    .elevated-grid .product-card:hover { transform: translateY(-7px); box-shadow: 0 20px 50px rgba(0,0,0,.15); }

    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 32px; flex-wrap: wrap; }
    .page-btn { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 9px; background: var(--surface); color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 13.5px; font-weight: 600; transition: all .15s; }
    .page-btn:hover, .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .page-btn:disabled { opacity: .4; cursor: default; pointer-events: none; }

    .empty { text-align: center; padding: 80px 20px; color: var(--text3); grid-column: 1/-1; }
    .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }

    .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--text); color: white; padding: 14px 24px; display: none; align-items: center; justify-content: space-between; z-index: 300; box-shadow: 0 -4px 24px rgba(0,0,0,.2); }
    .cart-bar.show { display: flex; }
    .cart-bar-info { font-size: 14px; font-weight: 600; }
    .cart-bar-info span { color: rgba(255,255,255,.6); margin-right: 10px; font-size: 13px; }
    .cart-bar-btn { padding: 10px 24px; background: var(--accent); color: white; border-radius: 10px; text-decoration: none; font-size: 14px; font-weight: 700; }

    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 600; opacity: 0; transition: all .3s; z-index: 400; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .announcement-bar { background: var(--primary); color: white; text-align: center; padding: 9px 16px; font-size: 13px; font-weight: 600; letter-spacing: .01em; position: relative; z-index: 201; }
    .tc-navbar { background: var(--nav-bg); padding: 0 5%; height: var(--navbar-h); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,.08); position: sticky; top: 0; z-index: 200; }
    .nav-logo { font-size: 22px; font-weight: 900; letter-spacing: -.03em; cursor: pointer; }
    .nav-links { display: flex; gap: 28px; font-size: 13.5px; font-weight: 600; opacity: .7; }
    .nav-links a { text-decoration: none; color: inherit; transition: opacity .15s; }
    .nav-links a:hover { opacity: 1; }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-cart-btn { display: flex; align-items: center; gap: 6px; padding: 7px 15px; background: var(--primary); color: white; border-radius: var(--btn-r); font-size: 13px; font-weight: 700; border: none; cursor: pointer; font-family: var(--font); text-decoration: none; }
    .nav-logo-img { height: 36px; object-fit: contain; border-radius: 6px; }
    .tc-hero { padding: 80px 5% 72px; text-align: center; background: var(--bg); position: relative; overflow: hidden; }
    .hero-bg-img { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
    .hero-overlay-div { position: absolute; inset: 0; z-index: 1; }
    .hero-content { position: relative; z-index: 2; }
    .tc-hero h1 { font-size: clamp(32px, 5vw, 54px); font-weight: 900; line-height: 1.1; letter-spacing: -.03em; margin-bottom: 16px; }
    .tc-hero h1 em { font-style: normal; color: var(--primary); }
    .tc-hero p { font-size: 17px; opacity: .65; max-width: 520px; margin: 0 auto 32px; line-height: 1.7; }
    .hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--primary); color: white; padding: 13px 30px; border-radius: var(--btn-r); font-size: 15px; font-weight: 700; cursor: pointer; border: none; font-family: var(--font); transition: opacity .15s; text-decoration: none; }
    .btn-cta:hover { opacity: .88; }
    .btn-cta-ghost { background: transparent; color: var(--text); border: 1.5px solid rgba(0,0,0,.2); }
    .tc-section { padding: 56px 5%; }
    .tc-section-title { font-size: 28px; font-weight: 800; letter-spacing: -.02em; }
    .tc-section-subtitle { font-size: 14px; opacity: .55; margin-top: 6px; }
    .tc-cats-grid { display: grid; gap: 16px; }
    .tc-cat-card { background: var(--card-bg); border-radius: var(--radius); padding: 32px 20px; text-align: center; cursor: pointer; transition: transform .2s; border: 1px solid var(--border); }
    .tc-cat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .tc-cat-icon { font-size: 36px; margin-bottom: 10px; }
    .tc-cat-name { font-size: 14px; font-weight: 700; }
    .tc-promo-banner { color: white; padding: 68px 5%; text-align: center; }
    .tc-promo-content h2 { font-size: 36px; font-weight: 900; margin-bottom: 10px; }
    .tc-promo-content p { opacity: .8; margin-bottom: 24px; font-size: 16px; }
    .btn-white { background: white; color: var(--primary); padding: 12px 28px; border-radius: var(--btn-r); font-size: 14px; font-weight: 700; border: none; cursor: pointer; font-family: var(--font); }
    .tc-testimonials { padding: 56px 5%; background: var(--card-bg); }
    .tc-testimonials-grid { display: grid; gap: 16px; margin-top: 24px; }
    .tc-testimonial { background: var(--bg); border-radius: var(--radius); padding: 20px; }
    .tc-t-stars { color: #f59e0b; font-size: 13px; margin-bottom: 10px; }
    .tc-t-text { font-size: 13.5px; line-height: 1.65; opacity: .7; margin-bottom: 14px; }
    .tc-t-author { display: flex; align-items: center; gap: 10px; }
    .tc-t-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .tc-t-name { font-size: 13px; font-weight: 700; }
    .tc-newsletter { padding: 56px 5%; text-align: center; }
    .tc-newsletter h2 { font-size: 30px; font-weight: 800; margin-bottom: 10px; }
    .tc-newsletter p { opacity: .6; margin-bottom: 24px; font-size: 15px; }
    .tc-newsletter-form { display: flex; gap: 10px; max-width: 440px; margin: 0 auto; flex-wrap: wrap; }
    .tc-newsletter-input { flex: 1; min-width: 180px; padding: 11px 16px; border: 1.5px solid rgba(0,0,0,.12); border-radius: var(--btn-r); font-size: 14px; background: var(--card-bg); color: var(--text); font-family: var(--font); outline: none; }
    .tc-newsletter-form .btn-cta { white-space: nowrap; width: auto !important; display: inline-flex !important; }
    .tc-footer { padding: 48px 5% 24px; border-top: 1px solid rgba(0,0,0,.08); }
    .tc-footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 40px; margin-bottom: 32px; }
    .tc-footer-logo { font-size: 20px; font-weight: 900; margin-bottom: 8px; cursor: pointer; }
    .tc-footer-tagline { font-size: 13px; opacity: .5; line-height: 1.6; margin-bottom: 16px; }
    .tc-footer-contact { font-size: 12px; opacity: .4; line-height: 1.8; }
    .tc-footer-col-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; opacity: .45; margin-bottom: 14px; }
    .tc-footer-col-links { display: flex; flex-direction: column; gap: 10px; }
    .tc-footer-col-links a { font-size: 13px; opacity: .55; font-weight: 600; cursor: pointer; text-decoration: none; color: inherit; transition: opacity .15s; }
    .tc-footer-col-links a:hover { opacity: 1; }
    .tc-footer-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,.06); }
    .tc-footer-copy { font-size: 12px; opacity: .35; }
    .tc-footer-social { display: flex; gap: 10px; }
    .tc-social-btn { width: 32px; height: 32px; border-radius: 8px; background: rgba(0,0,0,.05); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; text-decoration: none; transition: background .15s; }
    .tc-social-btn:hover { background: rgba(0,0,0,.1); }
    .tc-video-section { padding: 56px 5%; text-align: center; }
    .tc-video-box { border-radius: var(--radius); height: 340px; overflow: hidden; position: relative; background: var(--card-bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; margin-top: 20px; }
    .tc-video-box iframe { width: 100%; height: 100%; border: none; }
    .tc-play-circle { width: 64px; height: 64px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
    .tc-countdown-section { padding: 56px 5%; text-align: center; }
    .tc-countdown-row { display: flex; gap: 14px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .tc-cd-unit { border-radius: var(--radius); padding: 18px 24px; min-width: 72px; background: var(--card-bg); }
    .tc-cd-num { font-size: 38px; font-weight: 900; line-height: 1; color: var(--primary); }
    .tc-cd-label { font-size: 11px; font-weight: 700; opacity: .45; text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }
    .tc-gallery-section { padding: 56px 5%; }
    .tc-gallery-grid { display: grid; gap: 12px; }
    .tc-gallery-item { background: var(--card-bg); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 28px; overflow: hidden; }
    .tc-gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tc-trust-section { padding: 32px 5%; background: var(--card-bg); }
    .tc-trust-grid { display: grid; gap: 12px; }
    .tc-trust-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--bg); border-radius: var(--radius); }
    .tc-trust-icon { font-size: 24px; flex-shrink: 0; }
    .tc-trust-label { font-size: 13.5px; font-weight: 700; }
    .tc-trust-sub { font-size: 11.5px; opacity: .5; margin-top: 2px; }
    .tc-faq-section { padding: 56px 5%; }
    .tc-faq-item { border-bottom: 1px solid rgba(0,0,0,.08); padding: 18px 0; }
    .tc-faq-q { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .tc-faq-a { font-size: 13.5px; opacity: .6; line-height: 1.65; }
    .cat-pill { padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text2); background: #fff; transition: all .15s; font-family: var(--font); }
    .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
    .cat-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .tc-skeleton { background: linear-gradient(90deg, #e8eaf0 25%, #f1f5f9 50%, #e8eaf0 75%) !important; background-size: 400px 100% !important; animation: shimmer 1.2s ease-in-out infinite !important; border-radius: var(--radius); }

    @media (max-width: 768px) {
      .tc-navbar { height: 52px !important; padding: 0 4% !important; }
      .nav-logo { font-size: 18px !important; }
      .nav-links { display: none !important; }
      .tc-hero { padding: 36px 4% 28px !important; }
      .tc-hero h1 { font-size: 26px !important; }
      .tc-section { padding: 32px 4% !important; }
      .tc-products-grid { grid-template-columns: repeat(2,1fr) !important; gap: 10px !important; }
      .tc-cats-grid { grid-template-columns: repeat(2,1fr) !important; }
      .tc-testimonials-grid { grid-template-columns: 1fr !important; }
      .tc-footer-grid { grid-template-columns: 1fr !important; }
      .products-grid { grid-template-columns: repeat(2,1fr) !important; gap: 10px !important; }
      #mainLayout { padding: 24px 4% !important; }
      .list-grid .product-card { flex-direction: column !important; }
      .list-grid .product-img { width: 100% !important; min-width: unset !important; aspect-ratio: 1 !important; min-height: var(--card-img-min-h) !important; }
      .featured-list .tc-product-card { flex-direction: column !important; }
      .featured-list .tc-product-img { width: 100% !important; min-width: unset !important; aspect-ratio: 1 !important; }
      .magazine-grid .product-card:first-child { grid-column: span 1 !important; }
      .magazine-grid .product-card:first-child .product-img { aspect-ratio: 1 !important; min-height: var(--card-img-min-h) !important; }
      .featured-magazine .tc-product-card:first-child { grid-column: span 1 !important; }
      .featured-magazine .tc-product-card:first-child .tc-product-img { aspect-ratio: 1 !important; }
      .tc-newsletter-form { flex-direction: column !important; }
      .tc-newsletter-input { min-width: unset !important; width: 100% !important; }
    }
  </style>
</head>
<body>

  <div id="initial-loader">
    <div style="font-size:64px">🛍️</div>
    <div style="margin-top:16px;font-size:18px;color:#333;font-family:sans-serif">Loading store...</div>
  </div>

  <header id="origHeader">
    <div class="header-inner">
      <a class="store-logo" href="javascript:void(0)" id="storeLogo" onclick="scrollToTop()">
        <span class="store-logo-text" id="storeName">Shop</span>
      </a>
      <div class="search-bar">
        <input type="text" id="origSearchInput" placeholder="Search products..." oninput="updateSearch(this.value)">
      </div>
      <div class="pay-badge" id="payBadge" style="display:none">⚡ Online Payments</div>
      <a href="javascript:void(0)" id="accountBtn"
        style="display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:700;color:var(--text2);text-decoration:none;white-space:nowrap;transition:all .15s"
        onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">
        👤 <span id="accountBtnLabel">Account</span>
      </a>
      <a href="cart.html?store=..." class="cart-btn" id="cartBtn">
        🛒 Cart <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </header>

  <div id="heroBanner">
    <div class="hero-content">
      <h1 id="heroTitle">Welcome</h1>
      <p id="heroTagline">Discover amazing products</p>
      <div style="margin-top:24px">
        <button class="btn-cta" onclick="smoothScrollToProducts()" style="border:none;cursor:pointer">Shop Now →</button>
      </div>
    </div>
  </div>

  <div id="theme-sections-top"></div>

  <div id="mainLayout">
    <a id="mainProducts" style="display:block;position:relative;visibility:hidden"></a>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <h2 id="allProductsTitle" style="font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--text)">All Products</h2>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="position:relative">
          <input type="text" id="mainSearchInput" placeholder="Search products..."
            oninput="updateSearch(this.value)"
            style="padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13.5px;font-family:var(--font);outline:none;background:var(--surface);color:var(--text);width:200px;transition:border-color .15s"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
          <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none">🔍</span>
        </div>
        <select id="sortSelect" onchange="loadProducts()"
          style="padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13.5px;font-family:var(--font);outline:none;background:var(--surface);color:var(--text);cursor:pointer">
          <option value="">Newest</option>
          <option value="price_asc">Price: Low → High</option>
          <option value="price_desc">Price: High → Low</option>
          <option value="name_asc">Name: A → Z</option>
        </select>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="priceMin" placeholder="Min ₹" min="0"
            style="width:80px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);outline:none;background:var(--surface);color:var(--text)">
          <span style="color:var(--text3);font-size:12px">—</span>
          <input type="number" id="priceMax" placeholder="Max ₹" min="0"
            style="width:80px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);outline:none;background:var(--surface);color:var(--text)">
          <button onclick="loadProducts()"
            style="padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)">Apply</button>
        </div>
      </div>
    </div>

    <div id="catPills" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
      <button class="cat-pill active" data-cat="" onclick="selectCatPill(this,'')">🛍 All</button>
    </div>

    <div style="margin-bottom:16px">
      <span id="resultsCount" style="font-size:13.5px;color:var(--text2);font-weight:500">Loading...</span>
    </div>

    <div id="productsGridWrap">
      <div class="products-grid" id="productsGrid"></div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="theme-sections-bottom"></div>

  <div class="cart-bar" id="cartBar">
    <div class="cart-bar-info">
      <span id="cartBarQty"></span>
      <strong id="cartBarTotal"></strong>
    </div>
    <a href="cart.html?store=..." class="cart-bar-btn" id="cartBarBtn">View Cart →</a>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const slug = new URLSearchParams(location.search).get('store')
    if (!slug) {
      document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif"><h2>Store not found</h2><p>Please provide a store parameter in the URL.</p></div>'
    }

    const API = 'https://apiv2.aasaitech.in'
    const root = document.documentElement
    let storeConfig = {}
    let currentCat = '', currentPage = 1, searchTimeout = null
    let currency = '₹', themeData = null, searchQuery = ''
    let activeCardStyle = 'classic'
    let activeCardSize = 'medium'

    // FIXED: Card size variables properly defined with all CSS properties
    const CARD_SIZE_VARS = {
      small: { 
        '--card-img-min-h': '120px',
        '--card-img-aspect': '1/1',
        '--card-name-fs': '11px',   
        '--card-price-fs': '12px', 
        '--card-info-pad': '6px', 
        '--grid-gap': '8px',
        // Additional overrides for compact display
        '--product-cat-fs': '9px',
        '--product-badge-fs': '9px',
        '--qty-btn-size': '24px'
      },
      medium: { 
        '--card-img-min-h': '180px',
        '--card-img-aspect': '1/1',
        '--card-name-fs': '14px',   
        '--card-price-fs': '16px', 
        '--card-info-pad': '12px', 
        '--grid-gap': '16px',
        '--product-cat-fs': '11px',
        '--product-badge-fs': '11px',
        '--qty-btn-size': '32px'
      },
      large: {  
        '--card-img-min-h': '260px',
        '--card-img-aspect': '1/1',
        '--card-name-fs': '16px', 
        '--card-price-fs': '20px', 
        '--card-info-pad': '18px', 
        '--grid-gap': '24px',
        '--product-cat-fs': '12px',
        '--product-badge-fs': '12px',
        '--qty-btn-size': '36px'
      },
    }

    function applyCardSize(size) {
      activeCardSize = size || 'medium'
      const vars = CARD_SIZE_VARS[activeCardSize] || CARD_SIZE_VARS.medium
      Object.entries(vars).forEach(([k, v]) => {
        root.style.setProperty(k, v)
      })
      
      // Also update quantity button sizes if needed
      const qtyBtns = document.querySelectorAll('.qty-btn')
      if (qtyBtns.length) {
        const btnSize = vars['--qty-btn-size'] || '32px'
        qtyBtns.forEach(btn => {
          btn.style.width = btnSize
          btn.style.height = btnSize
        })
      }
      
      console.log(`Applied card size: ${size}`, vars)
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    function hideLoader() {
      const loader = document.getElementById('initial-loader')
      if (loader) { loader.classList.add('hidden'); setTimeout(() => loader.remove(), 400) }
    }

    function updateSearch(val) {
      searchQuery = val
      const orig = document.getElementById('origSearchInput'), main = document.getElementById('mainSearchInput')
      if (orig) orig.value = val; if (main) main.value = val
      clearTimeout(searchTimeout)
      searchTimeout = setTimeout(() => { currentPage = 1; loadProducts() }, 350)
    }

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }) }

    function smoothScrollToProducts() {
      const anchor = document.getElementById('mainProducts')
      const navbar = document.querySelector('.tc-navbar') || document.getElementById('origHeader')
      const offset = navbar ? navbar.offsetHeight + 10 : 70
      if (anchor) { const y = anchor.getBoundingClientRect().top + window.pageYOffset - offset; window.scrollTo({ top: y, behavior: 'smooth' }) }
    }

    function scrollToElement(elId) {
      const el = document.getElementById(elId); if (!el) return
      const navbar = document.querySelector('.tc-navbar') || document.getElementById('origHeader')
      const offset = navbar ? navbar.offsetHeight + 10 : 70
      window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - offset, behavior: 'smooth' })
    }

    function adjustMainProductsOffset() {
      const anchor = document.getElementById('mainProducts'); if (!anchor) return
      const navbar = document.querySelector('.tc-navbar') || document.getElementById('origHeader')
      anchor.style.top = `-${(navbar ? navbar.offsetHeight : 0) + 20}px`
    }

    function toast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show')
      setTimeout(() => t.classList.remove('show'), 2000)
    }

    function subscribeNewsletter() {
      const email = document.querySelector('.tc-newsletter-input')?.value
      toast(email ? `📧 Subscribed for ${email}!` : 'Please enter your email')
    }

    /* ── CART ── */
    function getCart() { return JSON.parse(localStorage.getItem('cart_' + slug) || '[]') }
    function saveCart(cart) { localStorage.setItem('cart_' + slug, JSON.stringify(cart)) }
    function getCartItemQty(productId) {
      const item = getCart().find(i => i.product_id === productId && !i.variant)
      return item ? item.qty : 0
    }
    function incrementCartItem(productId, name, price, image) {
      let cart = getCart(); const item = cart.find(i => i.product_id === productId && !i.variant)
      if (item) item.qty++; else cart.push({ product_id: productId, name, price, image, qty: 1 })
      saveCart(cart); updateCartUI(); updateProductCardControls(productId); toast('➕ Added to cart')
    }
    function decrementCartItem(productId) {
      let cart = getCart(); const index = cart.findIndex(i => i.product_id === productId && !i.variant)
      if (index !== -1) {
        if (cart[index].qty > 1) cart[index].qty--; else cart.splice(index, 1)
        saveCart(cart); updateCartUI(); updateProductCardControls(productId); toast('➖ Item removed')
      }
    }
    function updateProductCardControls(productId) {
      const qty = getCartItemQty(productId)
      document.querySelectorAll(`.cart-controls[data-product-id="${productId}"]`).forEach(container => {
        const name = container.dataset.name || '', price = container.dataset.price || 0, image = container.dataset.image || ''
        if (qty === 0) {
          container.innerHTML = `<button class="btn-add" onclick="event.preventDefault();addToCart('${productId}','${name.replace(/'/g,"\\'")}',${price},'${image}')">🛒 Add to Cart</button>`
        } else {
          container.innerHTML = `
            <button class="qty-btn" onclick="event.preventDefault();decrementCartItem('${productId}')">−</button>
            <span class="qty-value">${qty}</span>
            <button class="qty-btn" onclick="event.preventDefault();incrementCartItem('${productId}','${name.replace(/'/g,"\\'")}',${price},'${image}')">+</button>`
        }
      })
    }
    function addToCart(id, name, price, image) { incrementCartItem(id, name, price, image) }
    function updateCartUI() {
      const cart = getCart(), qty = cart.reduce((s,x) => s + x.qty, 0), amt = cart.reduce((s,x) => s + x.price * x.qty, 0)
      const el = document.getElementById('cartCount'); el.textContent = qty; el.className = 'cart-count' + (qty > 0 ? ' has-items' : '')
      const bar = document.getElementById('cartBar')
      if (qty > 0) { bar.classList.add('show'); document.getElementById('cartBarQty').textContent = `${qty} item${qty!==1?'s':''} — `; document.getElementById('cartBarTotal').textContent = `${currency}${amt.toFixed(2)}` }
      else bar.classList.remove('show')
      document.querySelectorAll('.theme-cart-qty').forEach(el => el.textContent = qty)
    }

    /* ── THEME ── */
    async function loadTheme() {
      try {
        const res = await fetch(`${API}/shop/${slug}/theme`); if (!res.ok) return
        themeData = await res.json()
        applyThemeSettings(themeData.settings || {})
        renderThemeSections(themeData.sections || [])
      } catch(e) { console.warn('[theme] load failed:', e.message) }
    }

    function applyThemeSettings(s) {
      const primary   = s.primaryColor   || s.primary_color   || '#6c63ff'
      const secondary = s.bgColor        || s.secondary_color  || '#f8f9fc'
      const navBg     = s.navBg          || s.nav_bg           || '#ffffff'
      const cardBg    = s.cardBg         || s.card_bg          || '#ffffff'
      const textColor = s.textColor      || s.text_color       || '#1a1a2e'
      const radius    = s.radius         || '12px'
      const font      = s.fontHeading    || s.font_heading     || 'Outfit'
      const btnStyle  = s.buttonStyle    || s.button_style     || 'rounded'
      const cols      = s.cols           || s.columns          || 3

      root.style.setProperty('--primary', primary)
      root.style.setProperty('--accent', primary)
      root.style.setProperty('--bg', secondary)
      root.style.setProperty('--nav-bg', navBg)
      root.style.setProperty('--card-bg', cardBg)
      root.style.setProperty('--text', textColor)
      root.style.setProperty('--radius', radius)
      root.style.setProperty('--font', `'${font}', sans-serif`)
      root.style.setProperty('--btn-r', btnStyle === 'pill' ? '999px' : btnStyle === 'square' ? '3px' : radius)
      root.style.setProperty('--cols', window.innerWidth <= 768 ? '2' : String(parseInt(cols) || 3))
      document.body.style.background = secondary

      if (font && font !== 'Outfit') {
        const fontId = 'gfont-' + font.replace(/\s+/g, '-')
        if (!document.getElementById(fontId)) {
          const link = document.createElement('link')
          link.id = fontId; link.rel = 'stylesheet'
          link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;600;700;800;900&display=swap`
          document.head.appendChild(link)
        }
      }

      const hero = document.getElementById('heroBanner')
      if (hero) hero.style.background = `linear-gradient(135deg,${primary},${primary}cc)`

      // Get card style and size from settings
      activeCardStyle = s.card_style || s.cardStyle || 'classic'
      applyCardStyleToMainGrid()

      // FIXED: Apply card size with proper variable mapping
      const cardSizeRaw = s.card_size || s.cardSize || 'medium'
      console.log('Applying card size from theme:', cardSizeRaw)
      applyCardSize(cardSizeRaw)
    }

    function applyCardStyleToMainGrid() {
      const wrap = document.getElementById('productsGridWrap')
      const grid = document.getElementById('productsGrid')
      if (!wrap || !grid) return
      wrap.className = `${activeCardStyle}-grid`
      if (activeCardStyle === 'list') grid.style.gridTemplateColumns = '1fr'
      else grid.style.gridTemplateColumns = ''
    }

    function renderThemeSections(sections) {
      const isMobile = window.innerWidth <= 768
      const settings = themeData?.settings || {}
      const visible = sections
        .filter(s => s.is_visible !== false && s.enabled !== false)
        .sort((a, b) => (a.order || 0) - (b.order || 0))
      if (!visible.length) return

      const TOP_TYPES    = new Set(['announcement','navbar','hero','featured','categories'])
      const BOTTOM_TYPES = new Set(['testimonials','newsletter','banner','faq','trustbadges','gallery','countdown','video','footer','richtext','about','contact','team','imagetext','brands','offers'])
      const topSections    = visible.filter(s => TOP_TYPES.has(s.type))
      const bottomSections = visible.filter(s => BOTTOM_TYPES.has(s.type))

      const topContainer    = document.getElementById('theme-sections-top')
      const bottomContainer = document.getElementById('theme-sections-bottom')
      if (topContainer)    topContainer.innerHTML    = topSections.map(s => buildSectionHTML(s, settings, isMobile)).join('')
      if (bottomContainer) bottomContainer.innerHTML = bottomSections.map(s => buildSectionHTML(s, settings, isMobile)).join('')

      document.getElementById('origHeader').style.display = visible.some(s => s.type === 'navbar') ? 'none' : ''
      document.getElementById('heroBanner').style.display  = visible.some(s => s.type === 'hero')   ? 'none' : ''

      document.querySelectorAll('.theme-cart-qty').forEach(el => el.textContent = getCart().reduce((s,x) => s + x.qty, 0))
      adjustMainProductsOffset()
      window.addEventListener('resize', adjustMainProductsOffset)
      visible.filter(s => s.type === 'countdown').forEach(sec => {
        const d = getSectionData(sec)
        if (d.targetDate) startCountdown(sec.id, d.targetDate)
      })
    }

    function getSectionData(sec) {
      const d = sec.data || {}, s = sec.settings || {}
      return {
        text: d.text||s.text||'',
        heading: d.heading||s.heading||s.title||'',
        subheading: d.subheading||s.subheading||s.text||'',
        title: d.title||s.heading||s.title||'',
        subtitle: d.subtitle||s.subheading||'',
        ctaText: d.ctaText||s.button_text||s.ctaText||'',
        ctaLink: d.ctaLink||s.button_url||s.ctaLink||'#mainProducts',
        cta2Text: d.cta2Text||'', cta2Link: d.cta2Link||'#',

    function buildSectionHTML(sec, settings, isMobile) {

          const bg = d.bgColor, tc = d.textColor
          return `<div class="announcement-bar" style="${bg?'background:'+bg+';':''}${tc?'color:'+tc+';':''}font-size:${sz};font-weight:${fw}">${escHtml(d.text||'✨ Free shipping on all orders above ₹499!')}</div>`
        }

        case 'navbar': {
          const pos = d.sticky!=='no'?'sticky':'relative'
          const navBg = d.bgColor||'', logoColor = d.logoColor||''
          const logoText = d.logoText || storeConfig.name || 'My Store'
          let links = []
          if (d.navLinks && d.navLinks.length) {
            links = d.navLinks
          } else {
            for (let i = 1; i <= 5; i++) {
              const txt = d[`link${i}Text`], url = d[`link${i}Url`] || '#'
              if (txt) links.push({ text: txt, url })

          const linkHTML = links.map(l => {
            const url = l.url || l.href || '#'
            const isAnchor = url.startsWith('#')

                  ? `onclick="event.preventDefault();smoothScrollToProducts()"`

    /* ── COUNTDOWN ── */
    function startCountdown(secId, targetDate) {
      const target = new Date(targetDate).getTime()
      function tick() {
        const diff = target - Date.now()
        const pad = n => String(Math.floor(Math.abs(n))).padStart(2,'0')
        const el = cls => document.getElementById(`${secId}-${cls}`)
        if (diff <= 0) { ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(c=>{const e=el(c);if(e)e.textContent='00'}); return }
        if(el('cd-days'))  el('cd-days').textContent  = pad(diff/86400000)
        if(el('cd-hours')) el('cd-hours').textContent = pad((diff%86400000)/3600000)
        if(el('cd-mins'))  el('cd-mins').textContent  = pad((diff%3600000)/60000)
        if(el('cd-secs'))  el('cd-secs').textContent  = pad((diff%60000)/1000)
      }
      tick(); setInterval(tick, 1000)
    }

    /* ── STORE INIT ── */
    async function init() {
      try {
        storeConfig = await fetch(`${API}/shop/${slug}/config`).then(r => r.json())
        if (storeConfig.error) throw new Error(storeConfig.error)
        document.title = storeConfig.name + ' — Shop'
        document.getElementById('storeName').textContent = storeConfig.name
        document.getElementById('heroTitle').textContent = storeConfig.name
        document.getElementById('heroTagline').textContent = storeConfig.tagline||storeConfig.description||'Discover amazing products'
        if (storeConfig.logo_url) {
          const img = document.createElement('img'); img.src = storeConfig.logo_url
          document.getElementById('storeLogo').prepend(img)
        }
        if (storeConfig.brand_color) {
          root.style.setProperty('--accent', storeConfig.brand_color)
          root.style.setProperty('--primary', storeConfig.brand_color)
          document.getElementById('heroBanner').style.background = `linear-gradient(135deg,${storeConfig.brand_color},${storeConfig.brand_color}cc)`
        }
        if (storeConfig.currency==='USD') currency='$'; else if (storeConfig.currency==='EUR') currency='€'
        if (storeConfig.payment_enabled) document.getElementById('payBadge').style.display = 'flex'
        sessionStorage.setItem('ekart_store', slug)
        sessionStorage.setItem('ekart_currency', currency)
        sessionStorage.setItem('ekart_store_name', storeConfig.name)
        sessionStorage.setItem('ekart_pay_enabled', storeConfig.payment_enabled?'1':'0')
        document.getElementById('cartBtn').href = `cart.html?store=${slug}`
        document.getElementById('cartBarBtn').href = `cart.html?store=${slug}`
        const custToken = localStorage.getItem(`cust_token_${slug}`)
        const custName  = localStorage.getItem(`cust_name_${slug}`)
        const acctBtn = document.getElementById('accountBtn')
        if (acctBtn) {
          acctBtn.href = custToken ? `customer-account.html?store=${slug}` : `customer-login.html?store=${slug}`
          document.getElementById('accountBtnLabel').textContent = (custToken&&custName) ? custName.split(' ')[0] : 'Login'
        }
        await loadCategories()
        await loadProducts()
        updateCartUI()
        await loadTheme()
        hideLoader()
      } catch(e) {
        document.body.innerHTML = `<div style="text-align:center;padding:80px;font-family:sans-serif"><h2>Store not found</h2><p style="color:#888;margin-top:8px">${e.message}</p></div>`
        hideLoader()
      }
    }

    /* ── CATEGORIES ── */
    let storeCategories = []
    async function loadCategories() {
      try {
        const cats = await fetch(`${API}/shop/${slug}/categories`).then(r => r.json())
        storeCategories = Array.isArray(cats)?cats:[]
        const pills = document.getElementById('catPills')
        if (pills) {
          pills.innerHTML = `<button class="cat-pill active" data-cat="" onclick="selectCatPill(this,'')">🛍 All</button>` +
            storeCategories.map(c => `<button class="cat-pill" data-cat="${c._id}" onclick="selectCatPill(this,'${c._id}')">${escHtml(c.name)}</button>`).join('')
        }
      } catch(e) { console.error('[categories]', e) }
    }
    function selectCatPill(el, catId) {
      document.querySelectorAll('.cat-pill').forEach(x => x.classList.remove('active'))
      el.classList.add('active')
      currentCat = catId; currentPage = 1; loadProducts()
    }

    /* ── PRODUCTS ── */
    async function loadProducts() {
      const params = new URLSearchParams({ page: currentPage })
      if (searchQuery) params.set('q', searchQuery)
      if (currentCat) params.set('category', currentCat)
      const sort = document.getElementById('sortSelect').value; if (sort) params.set('sort', sort)
      const minPrice = document.getElementById('priceMin').value
      const maxPrice = document.getElementById('priceMax').value
      if (minPrice) params.set('min_price', minPrice)
      if (maxPrice) params.set('max_price', maxPrice)
      try {
        const data = await fetch(`${API}/shop/${slug}/products?${params}`).then(r => r.json())
        document.getElementById('resultsCount').textContent = `${data.total} product${data.total!==1?'s':''} found`
        renderProducts(data.products||[])
        renderPagination(data.page, data.pages)
      } catch(e) {
        console.error('[products]', e)
        document.getElementById('resultsCount').textContent = 'Failed to load products'
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid')
      if (!products.length) {
        grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>No products found</h3><p>Try a different search or category</p></div>`
        return
      }
      grid.innerHTML = products.map(p => renderGridCard(p)).join('')
      applyCardStyleToMainGrid()
      products.forEach(p => { if (getCartItemQty(p._id) > 0) updateProductCardControls(p._id) })
    }

    function discountPct(p) { return p.compare_at_price&&p.compare_at_price>p.price ? Math.round((1-p.price/p.compare_at_price)*100) : 0 }
    function isOOS(p) { return p.track_inventory && p.stock_qty <= 0 }

    function renderGridCard(p) {
      const d = discountPct(p), oos = isOOS(p)
      const img = p.images?.[0]
        ? `<img src="${p.images[0]}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=font-size:48px>📦</span>'">`
        : '<span style="font-size:48px">📦</span>'
      const qty = getCartItemQty(p._id)
      const safeImg  = (p.images?.[0]||'').replace(/'/g,"\\'")
      const safeName = escHtml(p.name).replace(/'/g,"\\'")

      const cartHTML = oos
        ? `<div class="out-badge">Out of Stock</div>`
        : `<div class="cart-controls-wrap">
            <div class="cart-controls" data-product-id="${p._id}" data-name="${escHtml(p.name)}" data-price="${p.price}" data-image="${safeImg}">
              ${qty === 0
                ? `<button class="btn-add" onclick="event.preventDefault();addToCart('${p._id}','${safeName}',${p.price},'${safeImg}')">🛒 Add to Cart</button>`
                : `<button class="qty-btn" onclick="event.preventDefault();decrementCartItem('${p._id}')">−</button>
                   <span class="qty-value">${qty}</span>
                   <button class="qty-btn" onclick="event.preventDefault();incrementCartItem('${p._id}','${safeName}',${p.price},'${safeImg}')">+</button>`}
            </div>
          </div>`

      if (activeCardStyle === 'overlay') {
        return `<a class="product-card" href="product.html?store=${slug}&id=${p._id}">
          ${d>=5?`<div class="product-badge sale">−${d}%</div>`:''}
          <div class="product-img">
            ${img}
            <div class="product-overlay">
              ${p.category_name?`<div style="font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.06em;font-weight:700">${escHtml(p.category_name)}</div>`:''}
              <div class="ov-name">${escHtml(p.name)}</div>
              <div style="display:flex;align-items:center;gap:8px">
                <span class="ov-price">${currency}${p.price.toFixed(2)}</span>
                ${p.compare_at_price?`<span class="ov-compare">${currency}${p.compare_at_price.toFixed(2)}</span>`:''}
              </div>
              ${oos?`<div style="font-size:12px;color:#ef4444;font-weight:700">Out of Stock</div>`:`
                <div class="cart-controls" data-product-id="${p._id}" data-name="${escHtml(p.name)}" data-price="${p.price}" data-image="${safeImg}">
                  ${qty===0
                    ? `<button class="btn-add" onclick="event.preventDefault();addToCart('${p._id}','${safeName}',${p.price},'${safeImg}')">🛒 Add</button>`
                    : `<button class="qty-btn" onclick="event.preventDefault();decrementCartItem('${p._id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incrementCartItem('${p._id}','${safeName}',${p.price},'${safeImg}')">+</button>`}
                </div>`}
            </div>
          </div>
        </a>`
      }

      return `<a class="product-card" href="product.html?store=${slug}&id=${p._id}">
        ${d>=5?`<div class="product-badge sale">−${d}%</div>`:''}
        <div class="product-img">${img}</div>
        <div class="product-info">
          ${p.category_name?`<div class="product-cat">${escHtml(p.category_name)}</div>`:''}
          <div class="product-name">${escHtml(p.name)}</div>
          <div class="product-price-row">
            <span class="product-price">${currency}${p.price.toFixed(2)}</span>
            ${p.compare_at_price?`<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>`:''}
            ${d?`<span class="product-discount">${d}% off</span>`:''}
          </div>
          ${cartHTML}
        </div>
      </a>`
    }

    /* ── PAGINATION ── */
    function renderPagination(page, pages) {
      const el = document.getElementById('pagination')
      if (!pages||pages<=1) { el.innerHTML=''; return }
      let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>← Prev</button>`
      for (let i=1;i<=pages;i++) {
        if (pages<=7||i===1||i===pages||Math.abs(i-page)<=2)
          html+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`
        else if (Math.abs(i-page)===3) html+='<span style="padding:8px;color:var(--text3)">…</span>'
      }
      html += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>Next →</button>`
      el.innerHTML = html
    }
    function goPage(p) { currentPage=p; loadProducts(); window.scrollTo({top:0,behavior:'smooth'}) }

    /* ── FILL FEATURED SECTION ── */
    async function fillFeaturedSection(secId, count, d, cardStyle) {
      const grid = document.getElementById(`${secId}-grid`); if (!grid) return
      try {
        const data = await fetch(`${API}/shop/${slug}/products?page=1&limit=${count}`).then(r => r.json())
        const products = (data.products||[]).slice(0, count)
        if (!products.length) { const sec = grid.closest('section'); if(sec) sec.style.display='none'; return }

        grid.innerHTML = products.map(p => {
          const disc = p.compare_at_price&&p.compare_at_price>p.price?Math.round((1-p.price/p.compare_at_price)*100):0
          const oos  = p.track_inventory&&p.stock_qty<=0
          const img  = p.images?.[0]
            ? `<img src="${p.images[0]}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=font-size:48px>📦</span>'">`
            : '<span style="font-size:48px">📦</span>'
          const qty = getCartItemQty(p._id)
          const safeImg  = (p.images?.[0]||'').replace(/'/g,"\\'")
          const safeName = escHtml(p.name).replace(/'/g,"\\'")
          const btnLabel = escHtml(d.btnText||'Add to Cart')

          if (cardStyle === 'overlay') {
            return `<div class="tc-product-card">
              <a href="product.html?store=${slug}&id=${p._id}" style="text-decoration:none;color:inherit;display:block;position:relative">
                <div class="tc-product-img" style="position:relative">
                  ${disc>=5?`<div class="tc-product-badge">−${disc}%</div>`:''}
                  ${img}
                  <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 55%,transparent 100%);padding:20px 14px 14px;color:white;display:flex;flex-direction:column;gap:5px;z-index:3">
                    <div style="font-size:13px;font-weight:700">${escHtml(p.name)}</div>
                    <div style="display:flex;align-items:center;gap:8px">
                      <span style="font-size:15px;font-weight:800">${currency}${p.price.toFixed(2)}</span>
                      ${p.compare_at_price?`<span style="font-size:11px;text-decoration:line-through;opacity:.55">${currency}${p.compare_at_price.toFixed(2)}</span>`:''}
                    </div>
                    ${!oos?`<div class="cart-controls" data-product-id="${p._id}" data-name="${escHtml(p.name)}" data-price="${p.price}" data-image="${safeImg}">
                      ${qty===0
                        ? `<button class="tc-product-btn" style="margin-top:4px" onclick="event.preventDefault();addToCart('${p._id}','${safeName}',${p.price},'${safeImg}')">🛒 ${btnLabel}</button>`
                        : `<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><button class="qty-btn" onclick="event.preventDefault();decrementCartItem('${p._id}')">−</button><span class="qty-value" style="color:white">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incrementCartItem('${p._id}','${safeName}',${p.price},'${safeImg}')">+</button></div>`}
                    </div>`:`<div style="font-size:12px;color:#ef4444;font-weight:700">Out of Stock</div>`}
                  </div>
                </div>
              </a>
            </div>`
          }

          return `<div class="tc-product-card">
            <a href="product.html?store=${slug}&id=${p._id}" style="text-decoration:none;color:inherit;display:block">
              <div class="tc-product-img" style="position:relative">
                ${disc>=5?`<div class="tc-product-badge">−${disc}%</div>`:''}
                ${img}
              </div>
              <div class="tc-product-info">
                ${p.category_name?`<div style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">${escHtml(p.category_name)}</div>`:''}
                <div class="tc-product-name">${escHtml(p.name)}</div>
                <div class="tc-price-row">
                  <span class="tc-product-price">${currency}${p.price.toFixed(2)}</span>
                  ${p.compare_at_price?`<span class="tc-product-old">${currency}${p.compare_at_price.toFixed(2)}</span>`:''}
                  ${disc?`<span style="font-size:11px;font-weight:700;color:var(--green);background:#f0fdf4;padding:2px 6px;border-radius:4px;margin-left:2px">${disc}% off</span>`:''}
                </div>
              </div>
            </a>
            <div class="tc-btn-wrap" style="padding:0 var(--card-info-pad) var(--card-info-pad)">
              ${oos
                ? `<div style="text-align:center;font-size:12px;color:#ef4444;font-weight:700;padding:7px;background:#fef2f2;border-radius:8px">Out of Stock</div>`
                : `<div class="cart-controls" data-product-id="${p._id}" data-name="${escHtml(p.name)}" data-price="${p.price}" data-image="${safeImg}">
                    ${qty===0
                      ? `<button class="tc-product-btn" onclick="event.preventDefault();addToCart('${p._id}','${safeName}',${p.price},'${safeImg}')">🛒 ${btnLabel}</button>`
                      : `<button class="qty-btn" onclick="event.preventDefault();decrementCartItem('${p._id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incrementCartItem('${p._id}','${safeName}',${p.price},'${safeImg}')">+</button>`}
                  </div>`}
            </div>
          </div>`
        }).join('')
      } catch(e) {
        console.error('[featured section]', e)
        const sec = document.getElementById(secId); if (sec) sec.style.display='none'
      }
    }

    /* ── FILL CATEGORIES SECTION ── */
    async function fillCategoriesSection(secId, cols, d) {
      const grid = document.getElementById(`${secId}-grid`); if (!grid) return
      try {
        const cats = await fetch(`${API}/shop/${slug}/categories`).then(r => r.json())
        const list = Array.isArray(cats)?cats:[]
        if (!list.length) { const sec = grid.closest('section'); if(sec) sec.style.display='none'; return }
        const emojiMap = {fashion:'👗',clothing:'👕',electronics:'📱',tech:'💻',home:'🏠',beauty:'💄',gaming:'🎮',food:'🍕',accessories:'👜',footwear:'👟',sports:'⚽'}
        const getEmoji = name => { const lc=(name||'').toLowerCase(); for(const[k,v]of Object.entries(emojiMap))if(lc.includes(k))return v; return '🛍️' }
        grid.innerHTML = list.map(c=>`
          <div class="tc-cat-card" onclick="filterByCat('${c._id}','${escHtml(c.name)}')">
            <div class="tc-cat-icon">${c.icon||getEmoji(c.name)}</div>
            <div class="tc-cat-name">${escHtml(c.name)}</div>
            ${d.showCount==='yes'&&c.product_count!=null?`<div style="font-size:11px;opacity:.45;margin-top:3px">${c.product_count} items</div>`:''}
          </div>`).join('')
      } catch(e) {
        console.error('[categories section]', e)
        const sec = document.getElementById(secId); if(sec) sec.style.display='none'
      }
    }

    function filterByCat(catId, catName) {
      currentCat=catId; currentPage=1
      document.querySelectorAll('.cat-pill').forEach(x => x.classList.toggle('active', x.dataset.cat===catId))
      loadProducts(); smoothScrollToProducts()
    }

    if (slug) { setTimeout(hideLoader, 3000); init() } else hideLoader()
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ─── RESET & ROOT ──────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#0f0f0f; --p2:#525252; --p3:#a3a3a3;
  --bg:#fafafa; --bg2:#f5f5f5; --bg3:#f0f0f0;
  --border:#e8e8e8; --accent:#0f0f0f;
  --primary:#111;
  --radius:12px; --btn-r:8px;
  --font:'DM Sans',system-ui,sans-serif;
  --font-display:'DM Serif Display',serif;
  --cols:4; --navbar-h:64px;
  --card-img-h:280px;
  --sh0:0 1px 2px rgba(0,0,0,.04);
  --sh1:0 4px 16px rgba(0,0,0,.06);
  --sh2:0 16px 48px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
  --ease:cubic-bezier(.4,0,.2,1);
  --brand:#111;
}
body{font-family:var(--font);background:var(--bg);color:var(--p);-webkit-font-smoothing:antialiased;padding-bottom:80px}
img{display:block;max-width:100%}
button,input,select{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ─── LOADER ──────────────────────────────────────────────── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .4s var(--ease)}
#loader.out{opacity:0;pointer-events:none}
.ld-ring{width:40px;height:40px;border:2.5px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:ldSpin .8s linear infinite}
.ld-text{font-size:13px;color:var(--p3);letter-spacing:.04em;font-weight:500}
@keyframes ldSpin{to{transform:rotate(360deg)}}

/* ─── ANNOUNCEMENT BAR ──────────────────────────────────── */
.ann-bar,.announcement-bar{
  background:var(--p);color:#fff;
  text-align:center;padding:10px 16px;
  font-size:12.5px;font-weight:500;letter-spacing:.04em;
  position:relative;z-index:201;
}

/* ─── HEADER ─────────────────────────────────────────────── */
#origHeader{
  background:rgba(250,250,250,.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}
.hdr-inner{
  max-width:1440px;margin:0 auto;
  padding:0 48px;height:var(--navbar-h);
  display:flex;align-items:center;justify-content:space-between;gap:24px;
}
.hdr-logo{
  font-family:var(--font-display);
  font-size:20px;font-weight:400;
  letter-spacing:-.01em;color:var(--p);
  white-space:nowrap;display:flex;align-items:center;gap:10px;
}
.hdr-logo img{height:32px;object-fit:contain;border-radius:6px}
.hdr-nav{display:flex;align-items:center;gap:32px}
.hdr-nav a{
  font-size:13.5px;font-weight:500;color:var(--p2);
  transition:color .15s;letter-spacing:.01em;
}
.hdr-nav a:hover{color:var(--p)}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-icon-btn{
  width:38px;height:38px;border-radius:10px;
  border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--p2);transition:background .15s,color .15s;font-size:15px;
}
.hdr-icon-btn:hover{background:var(--bg2);color:var(--p)}
.hdr-search-wrap{flex:1;max-width:360px;margin:0 16px;position:relative}
.hdr-search-wrap input{
  width:100%;padding:9px 14px 9px 38px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:13.5px;outline:none;background:var(--bg2);
  color:var(--p);transition:.2s;
}
.hdr-search-wrap input:focus{
  border-color:var(--p);background:#fff;
  box-shadow:0 0 0 3px rgba(0,0,0,.06);
}
.hdr-search-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--p3);pointer-events:none;font-size:13px}
.hdr-cart-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 18px;background:var(--p);color:#fff;
  border-radius:var(--btn-r);font-size:13.5px;font-weight:600;
  border:none;cursor:pointer;transition:.2s var(--ease);
  letter-spacing:.01em;
}
.hdr-cart-btn:hover{background:#333}
.cart-badge{
  background:#fff;color:var(--p);
  font-size:10px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;
  display:none;align-items:center;justify-content:center;padding:0 4px;
}
.cart-badge.on{display:flex}

/* ─── DEFAULT HERO ───────────────────────────────────────── */
#heroBanner{padding:80px 40px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border);display:none}
#heroBanner.visible{display:block}
#heroBanner h1{font-family:var(--font-display);font-size:clamp(32px,5vw,60px);font-weight:400;letter-spacing:-.02em;margin-bottom:14px;line-height:1.1}
#heroBanner p{font-size:16px;color:var(--p2);max-width:440px;margin:0 auto 32px;line-height:1.7}
.hero-cta{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;background:var(--p);color:#fff;
  border-radius:var(--btn-r);font-size:14px;font-weight:600;
  border:none;cursor:pointer;transition:.2s var(--ease);
}
.hero-cta:hover{background:#333}

/* ─── MAIN LAYOUT ─────────────────────────────────────────── */
#mainLayout{max-width:1440px;margin:0 auto;padding:48px 48px 0}

/* ─── TOOLBAR ──────────────────────────────────── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.toolbar-title{
  font-family:var(--font-display);
  font-size:26px;font-weight:400;letter-spacing:-.01em;
}
.toolbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tb-select,.tb-input{
  padding:8px 12px;border:1.5px solid var(--border);
  border-radius:8px;font-size:13px;outline:none;
  background:#fff;color:var(--p);cursor:pointer;transition:.15s;
}
.tb-select:focus,.tb-input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.tb-search-wrap{position:relative}
.tb-search-wrap .tb-input{padding-left:30px;width:190px}
.tb-search-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--p3);font-size:12px;pointer-events:none}
.price-grp{display:flex;align-items:center;gap:5px}
.price-grp .tb-input{width:80px}
.tb-btn{
  padding:8px 14px;background:var(--p);color:#fff;
  border:none;border-radius:8px;font-size:13px;
  font-weight:600;cursor:pointer;transition:.15s;
}
.tb-btn:hover{background:#333}
.results-label{font-size:13px;color:var(--p3);margin-bottom:16px;display:block;letter-spacing:.01em}

/* ─── CATEGORY PILLS ─────────────────────────────────────── */
#catPills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.cat-pill{
  padding:7px 16px;border:1.5px solid var(--border);
  border-radius:999px;font-size:13px;font-weight:500;
  cursor:pointer;color:var(--p2);background:#fff;transition:.15s;
}
.cat-pill:hover{border-color:var(--p);color:var(--p)}
.cat-pill.active{background:var(--p);color:#fff;border-color:var(--p)}

/* ═══════════════════════════════════════════════════
   PRODUCT CARD — Production Quality
═══════════════════════════════════════════════════ */
.products-grid,.tc-products-grid{
  display:grid;
  grid-template-columns:repeat(var(--cols,4),1fr);
  gap:24px;
}

/* ── Base Card ── */
.product-card,.tc-product-card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  color:var(--p);
  display:flex;
  flex-direction:column;
  position:relative;
  border:1px solid var(--border);
  transition:box-shadow .25s var(--ease), transform .25s var(--ease);
  cursor:pointer;
}
.product-card:hover,.tc-product-card:hover{
  box-shadow:var(--sh2);
  transform:translateY(-3px);
  z-index:2;
}

.card-link{text-decoration:none;color:inherit;display:block;flex:1}

/* ── Image Container ── */
.product-img,.tc-product-img{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  overflow:hidden;
  background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
}
.product-img img,.tc-product-img img{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .45s var(--ease), filter .3s var(--ease);
  display:block;
}
.product-card:hover .product-img img,
.tc-product-card:hover .tc-product-img img{
  transform:scale(1.06);
}
.product-img.img-error,.tc-product-img.img-error{
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);
}
.product-img.img-error img,.tc-product-img.img-error img{display:none}
.img-fallback-icon{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:48px;opacity:.2;
  pointer-events:none;
}

/* ── Badges ── */
.product-badge,.tc-product-badge{
  position:absolute;top:12px;left:12px;z-index:3;
  font-size:10.5px;font-weight:700;
  padding:4px 9px;border-radius:6px;
  letter-spacing:.04em;text-transform:uppercase;
}
.badge-sale,.badge-discount{background:#ef4444;color:#fff}
.badge-new{background:#0ea5e9;color:#fff}
.badge-bestseller,.badge-hot{background:#f97316;color:#fff}
.badge-trending{background:#8b5cf6;color:#fff}
.badge-custom{background:var(--p);color:#fff}

/* ── Wishlist ── */
.wish-btn{
  position:absolute;top:10px;right:10px;z-index:3;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.95);
  border:1px solid rgba(0,0,0,.08);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:.2s var(--ease);
  opacity:0;transform:scale(.85);
}
.product-card:hover .wish-btn,.tc-product-card:hover .wish-btn{
  opacity:1;transform:scale(1);
}
.wish-btn:hover{background:#fff;transform:scale(1.1)!important}
.wish-btn.wished{color:#ef4444;opacity:1;transform:scale(1)}

/* ── Quick Add overlay ── */
.card-atc-overlay{
  position:absolute;bottom:0;left:0;right:0;z-index:4;
  padding:0 12px 12px;
  transform:translateY(calc(100% + 4px));
  transition:transform .3s var(--ease);
  pointer-events:none;
}
.product-card:hover .card-atc-overlay,
.tc-product-card:hover .card-atc-overlay{
  transform:translateY(0);
  pointer-events:auto;
}
.product-card.in-cart .card-atc-overlay,
.tc-product-card.in-cart .card-atc-overlay{
  display:none!important;
  pointer-events:none!important;
}

/* ══════════════════════════════════════════════════
   PREMIUM QUICK-ADD BUTTON — Glassmorphism
══════════════════════════════════════════════════ */
.card-atc-btn{
  width:100%;padding:13px 16px;
  background:rgba(8,8,8,.80);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:#fff;
  border:1px solid rgba(255,255,255,.15);
  border-radius:12px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font);letter-spacing:.05em;
  transition:background .18s var(--ease),transform .12s,box-shadow .18s;
  display:flex;align-items:center;justify-content:center;gap:7px;
  box-shadow:
    0 8px 32px rgba(0,0,0,.28),
    0 2px 8px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.08);
  text-transform:uppercase;
  font-size:11.5px;letter-spacing:.1em;
}
.card-atc-btn:hover{
  background:rgba(8,8,8,.95);
  box-shadow:0 12px 40px rgba(0,0,0,.38),0 4px 12px rgba(0,0,0,.22);
  transform:translateY(-1px);
}
.card-atc-btn:active{transform:scale(.97) translateY(0)}

/* ── Card Info ── */
.product-info,.tc-product-info{padding:14px 16px 16px}

.product-cat,.tc-product-cat{
  font-size:10px;color:var(--p3);font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;
}
.product-name,.tc-product-name{
  font-size:14px;font-weight:500;line-height:1.5;
  color:var(--p);margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  letter-spacing:-.01em;
}
.product-price-row,.tc-price-row{
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;
  margin-bottom:0;
}
.product-price,.tc-product-price{
  font-size:15px;font-weight:700;color:var(--p);letter-spacing:-.02em;
}
.product-compare,.tc-product-old{
  font-size:12.5px;text-decoration:line-through;color:var(--p3);
  letter-spacing:-.01em;
}
.product-discount{
  font-size:10px;font-weight:700;color:#16a34a;
  background:#f0fdf4;padding:2px 7px;border-radius:999px;
  letter-spacing:.02em;border:1px solid #bbf7d0;
}
.out-of-stock-label{
  font-size:12px;color:var(--p3);margin-top:6px;
  font-style:italic;letter-spacing:.01em;
}

/* ══════════════════════════════════════════════════
   PREMIUM CART CONTROLS — Complete Redesign
══════════════════════════════════════════════════ */
.cart-controls-wrap,.tc-btn-wrap{padding:8px 16px 14px}

/* Qty row — full width, pill style, premium feel */
.cart-qty-row{
  display:flex;
  align-items:center;
  width:100%;
  height:46px;
  border-radius:12px;
  border:1.5px solid var(--border);
  overflow:hidden;
  background:#fff;
  box-shadow:
    0 1px 3px rgba(0,0,0,.06),
    0 4px 12px rgba(0,0,0,.04);
  transition:border-color .2s, box-shadow .2s;
}
.cart-qty-row:hover{
  border-color:rgba(0,0,0,.18);
  box-shadow:0 2px 8px rgba(0,0,0,.1),0 6px 20px rgba(0,0,0,.06);
}

.qty-btn{
  flex:1;
  height:100%;
  border:none;
  background:transparent;
  color:var(--p);
  font-size:22px;
  font-weight:300;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .15s,color .15s;
  -webkit-user-select:none;user-select:none;
  line-height:1;
}
.qty-btn:hover{
  background:var(--bg2);
  color:var(--p);
}
.qty-btn:active{
  background:var(--bg3);
}

.qty-value{
  flex:0 0 52px;
  text-align:center;
  font-size:15px;
  font-weight:700;
  color:var(--p);
  border-left:1.5px solid var(--border);
  border-right:1.5px solid var(--border);
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  letter-spacing:-.02em;
  background:#fff;
  line-height:1;
}

/* ══════════════════════════════════════════════════
   PREMIUM ADD TO CART BUTTON
══════════════════════════════════════════════════ */
.btn-add,.tc-product-btn{
  width:100%;
  padding:13px 16px;
  background:var(--p);
  color:#fff;
  border:none;
  border-radius:11px;
  font-size:12.5px;
  font-weight:700;
  cursor:pointer;
  transition:
    background .2s var(--ease),
    transform .12s,
    box-shadow .2s var(--ease);
  font-family:var(--font);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  letter-spacing:.06em;
  text-transform:uppercase;
  box-shadow:
    0 2px 6px rgba(0,0,0,.14),
    0 6px 20px rgba(0,0,0,.10),
    inset 0 1px 0 rgba(255,255,255,.08);
}
.btn-add:hover,.tc-product-btn:hover{
  background:#1a1a1a;
  box-shadow:
    0 4px 12px rgba(0,0,0,.2),
    0 10px 32px rgba(0,0,0,.15),
    inset 0 1px 0 rgba(255,255,255,.08);
  transform:translateY(-1px);
}
.btn-add:active,.tc-product-btn:active{
  transform:scale(.97) translateY(0);
  box-shadow:0 1px 4px rgba(0,0,0,.12);
}

@keyframes cartPulse{
  0%{transform:scale(1)}
  40%{transform:scale(1.3)}
  100%{transform:scale(1)}
}
.btn-add.just-added .btn-icon,
.tc-product-btn.just-added .btn-icon{
  animation:cartPulse .35s var(--ease);
}

/* ════════════════════════════════════════════════
   CARD STYLE VARIANTS
════════════════════════════════════════════════ */
.classic-grid{gap:20px!important}
.classic-grid .product-card{border-radius:12px;border:1px solid var(--border);background:#fff}

.minimal-grid{gap:24px!important}
.minimal-grid .product-card{background:transparent;border:none;border-radius:12px}
.minimal-grid .product-img{border-radius:12px;overflow:hidden}
.minimal-grid .product-card:hover{box-shadow:none;transform:none}
.minimal-grid .product-card:hover .product-img img{transform:scale(1.05)}
.minimal-grid .product-info{padding:12px 0}

.bold-grid{gap:20px!important}
.bold-grid .product-card{border-radius:12px;border:1px solid var(--border);border-top:3px solid var(--primary)}
.bold-grid .product-img img{object-fit:cover;padding:0}
.bold-grid .product-info{padding:14px 14px 16px}

.elevated-grid{gap:28px!important}
.elevated-grid .product-card{border-radius:16px;border:none;box-shadow:0 2px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04)}
.elevated-grid .product-card:hover{box-shadow:0 20px 60px rgba(0,0,0,.14),0 4px 16px rgba(0,0,0,.06);transform:translateY(-5px)}
.elevated-grid .product-img img{object-fit:cover;padding:0}
.elevated-grid .product-info{padding:14px 16px 18px}

.compact-grid{gap:14px!important}
.compact-grid .product-card{border-radius:10px;border:1px solid var(--border)}
.compact-grid .product-img{aspect-ratio:1/1}
.compact-grid .product-info{padding:10px 12px 12px}
.compact-grid .product-name{font-size:12.5px;-webkit-line-clamp:1;margin-bottom:5px}
.compact-grid .product-price{font-size:13px}
.compact-grid .cart-controls-wrap,.compact-grid .tc-btn-wrap{display:none}
.compact-grid .card-atc-overlay{display:none}

.list-grid{grid-template-columns:1fr!important;gap:12px!important}
.list-grid .product-card{flex-direction:row;height:150px;border-radius:12px}
.list-grid .card-link{display:flex;flex:1;min-width:0}
.list-grid .product-img{width:150px;min-width:150px;aspect-ratio:auto;height:150px;flex-shrink:0;border-radius:0}
.list-grid .product-img img{padding:0;object-fit:cover}
.list-grid .product-info{flex:1;padding:20px 24px;display:flex;flex-direction:column;justify-content:center}
.list-grid .cart-controls-wrap{padding:0 16px 16px;display:flex;align-items:center}
.list-grid .product-card:hover{transform:none;box-shadow:var(--sh1)}
.list-grid .card-atc-overlay{display:none}
.list-grid .btn-add{width:auto;padding:9px 20px}

.magazine-grid{gap:16px!important}
.magazine-grid .product-card:first-child{grid-column:span 2;grid-row:span 2}
.magazine-grid .product-card:first-child .product-img{aspect-ratio:auto;height:100%}

.overlay-grid{gap:16px!important}
.overlay-grid .product-card{border-radius:14px;border:none;overflow:hidden}
.overlay-grid .product-card .card-link{display:block;position:relative}
.overlay-grid .product-img{aspect-ratio:3/4!important}
.overlay-grid .product-img img{object-fit:cover!important;padding:0!important}
.overlay-grid .product-info{display:none}
.overlay-grid .card-atc-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25)}
.overlay-grid .cart-controls-wrap{padding:0 12px 12px}
.ov-layer{
  position:absolute;bottom:0;left:0;right:0;z-index:2;
  background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 55%,transparent 100%);
  padding:24px 14px 14px;color:#fff;
}
.ov-name{font-size:13.5px;font-weight:600;color:#fff;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ov-price{font-size:15px;font-weight:700;color:#fff}

.padded-grid{gap:20px!important}
.padded-grid .product-card{border-radius:12px;border:1px solid var(--border)}
.padded-grid .product-info{padding:14px 14px 16px}

/* ══════════════════════════════════════════════════════════
   FEATURED SECTION
══════════════════════════════════════════════════════════ */
[class*="featured-"].tc-section{
  padding-left:48px!important;
  padding-right:48px!important;
  max-width:1440px;
  margin-left:auto;
  margin-right:auto;
  box-sizing:border-box;
}
[class*="featured-"] .tc-products-grid{
  grid-template-columns:repeat(var(--cols,4),1fr)!important;
  gap:24px!important;
}
.tc-product-card{border-radius:16px;border:1px solid var(--border);background:#fff}
.tc-product-info{padding:14px 16px 16px}
.tc-product-img img{object-fit:cover;padding:0}

.featured-classic .tc-products-grid{gap:20px!important}
.featured-classic .tc-product-card{border-radius:12px}

.featured-minimal .tc-product-card{background:transparent;border:none;box-shadow:none}
.featured-minimal .tc-product-card:hover{box-shadow:none;transform:none}
.featured-minimal .tc-product-img{border-radius:12px;overflow:hidden}
.featured-minimal .tc-product-info{padding:12px 0}

.featured-elevated .tc-products-grid{gap:28px!important}
.featured-elevated .tc-product-card{border-radius:16px;border:none;box-shadow:0 2px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04)}
.featured-elevated .tc-product-card:hover{transform:translateY(-5px);box-shadow:0 20px 60px rgba(0,0,0,.14),0 4px 16px rgba(0,0,0,.06)}
.featured-elevated .tc-product-info{padding:14px 16px 18px}

.featured-bold .tc-product-card{border-radius:12px;border:1px solid var(--border);border-top:3px solid var(--primary)}

.featured-compact .tc-btn-wrap{display:none}
.featured-compact .tc-product-name{-webkit-line-clamp:1}
.featured-compact .tc-product-info{padding:10px 12px 12px}

.featured-list .tc-products-grid{grid-template-columns:1fr!important;gap:12px!important}
.featured-list .tc-product-card{flex-direction:row;height:150px;border-radius:12px}
.featured-list .card-link{display:flex;flex:1;min-width:0}
.featured-list .tc-product-img{width:150px;min-width:150px;aspect-ratio:auto!important;height:150px;flex-shrink:0}
.featured-list .tc-product-img img{padding:0;object-fit:cover}
.featured-list .tc-product-info{flex:1;padding:16px 20px;display:flex;flex-direction:column;justify-content:center}
.featured-list .tc-btn-wrap{padding:0 16px 16px}

.featured-overlay .tc-products-grid{gap:16px!important}
.featured-overlay .tc-product-card{overflow:hidden;border-radius:14px;border:none}
.featured-overlay .tc-product-card .card-link{position:relative;display:block}
.featured-overlay .tc-product-img{aspect-ratio:3/4!important}
.featured-overlay .tc-product-img img{object-fit:cover!important;padding:0!important}
.featured-overlay .tc-product-info{display:none}

/* ─── PAGINATION ──────────────────────────────────────────── */
.pagination{display:flex;justify-content:center;gap:6px;margin-top:56px;flex-wrap:wrap;padding-bottom:56px}
.page-btn{
  padding:9px 16px;border:1.5px solid var(--border);
  border-radius:8px;background:#fff;color:var(--p2);
  cursor:pointer;font-size:13.5px;font-weight:500;transition:.15s;
}
.page-btn:hover,.page-btn.active{background:var(--p);color:#fff;border-color:var(--p)}
.page-btn:disabled{opacity:.3;cursor:default;pointer-events:none}

/* ─── EMPTY ───────────────────────────────────────────────── */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty h3{font-size:18px;font-weight:600;color:var(--p2);margin-bottom:6px}
.empty p{font-size:14px;color:var(--p3)}

/* ─── SKELETON ────────────────────────────────────────────── */
@keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
.skeleton{
  background:linear-gradient(90deg,#f0f0f0 25%,#fafafa 50%,#f0f0f0 75%)!important;
  background-size:800px 100%!important;
  animation:shimmer 1.6s ease-in-out infinite!important;
  border-radius:var(--radius);border:none!important;
}
.skeleton *{visibility:hidden}

/* ─── CART BAR ────────────────────────────────────────────── */
.cart-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--p);color:#fff;
  padding:16px 48px;
  display:none;align-items:center;justify-content:space-between;
  z-index:300;
  box-shadow:0 -4px 30px rgba(0,0,0,.15);
}
.cart-bar.on{display:flex}
.cbar-info{font-size:14px;font-weight:600}
.cbar-info span{color:rgba(255,255,255,.45);margin-right:10px;font-size:13px}
.cbar-btn{
  padding:11px 26px;background:#fff;color:var(--p);
  border-radius:8px;font-size:14px;font-weight:700;
  transition:.15s;text-decoration:none;letter-spacing:.01em;
}
.cbar-btn:hover{opacity:.9}

/* ─── TOAST ───────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:88px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--p);color:#fff;border-radius:10px;
  padding:11px 20px;font-size:13.5px;font-weight:500;
  opacity:0;transition:all .25s var(--ease);z-index:400;
  white-space:nowrap;pointer-events:none;box-shadow:var(--sh2);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── THEME SECTIONS ──────────────────────────────────────── */
.tc-navbar{
  background:rgba(250,250,250,.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 48px;height:var(--navbar-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.nav-logo{
  font-family:var(--font-display);
  font-size:20px;font-weight:400;
  letter-spacing:-.01em;cursor:pointer;
  display:flex;align-items:center;gap:10px;
}
.nav-logo-img{height:32px;object-fit:contain;border-radius:6px}
.nav-links{display:flex;gap:32px}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--p2);transition:color .15s;letter-spacing:.01em}
.nav-links a:hover{color:var(--p)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-cart-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 18px;background:var(--p);color:#fff;
  border-radius:var(--btn-r);font-size:13.5px;font-weight:600;
  border:none;cursor:pointer;font-family:var(--font);text-decoration:none;
  transition:.2s var(--ease);letter-spacing:.01em;
}
.nav-cart-btn:hover{background:#333}

/* hero */
.tc-hero{position:relative;overflow:hidden;background:var(--bg2);text-align:center}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.hero-ov{position:absolute;inset:0;z-index:1}
.hero-content{position:relative;z-index:2}
.tc-hero h1{
  font-family:var(--font-display);
  font-size:clamp(32px,5.5vw,68px);font-weight:400;
  letter-spacing:-.03em;margin-bottom:18px;line-height:1.05;
}
.tc-hero h1 em{font-style:italic}
.tc-hero p{font-size:17px;color:var(--p2);max-width:520px;margin:0 auto 36px;line-height:1.75}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-cta{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--p);color:#fff;padding:13px 28px;
  border-radius:var(--btn-r);font-size:15px;font-weight:600;
  cursor:pointer;border:none;font-family:var(--font);
  transition:.2s var(--ease);text-decoration:none;letter-spacing:.01em;
}
.btn-cta:hover{background:#333}
.btn-cta-ghost{background:transparent;color:var(--p);border:1.5px solid rgba(0,0,0,.2)}
.btn-cta-ghost:hover{background:rgba(0,0,0,.05)}

/* section */
.tc-section{padding:64px 48px}
.tc-section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:10px}
.tc-section-title{font-family:var(--font-display);font-size:28px;font-weight:400;letter-spacing:-.02em}
.tc-section-subtitle{font-size:14px;color:var(--p2);margin-top:5px}
.tc-view-all{
  font-size:13px;font-weight:600;color:var(--p);text-decoration:none;
  border:1.5px solid var(--border);border-radius:8px;
  background:none;cursor:pointer;padding:7px 16px;transition:.15s;
}
.tc-view-all:hover{border-color:var(--p)}

/* categories */
.tc-cats-grid{display:grid;gap:14px}
.tc-cat-card{
  background:#fff;border-radius:14px;overflow:hidden;
  cursor:pointer;position:relative;border:1px solid var(--border);
  transition:.22s var(--ease);
}
.tc-cat-card:hover{border-color:var(--p);box-shadow:var(--sh1);transform:translateY(-2px)}
.tc-cat-img-wrap{
  aspect-ratio:1/1;overflow:hidden;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;position:relative;
}
.tc-cat-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s var(--ease)}
.tc-cat-card:hover .tc-cat-img{transform:scale(1.05)}
.tc-cat-footer{padding:12px 14px;background:#fff;display:flex;align-items:center;justify-content:space-between}
.tc-cat-name{font-size:13.5px;font-weight:600;color:var(--p)}
.tc-cat-count{font-size:12px;color:var(--p3)}
.tc-cat-simple{padding:24px 16px;text-align:center}
.tc-cat-icon{font-size:28px;margin-bottom:8px}
.tc-cat-name-plain{font-size:13.5px;font-weight:600}

/* trust */
.tc-trust-section{padding:32px 48px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2)}
.tc-trust-grid{display:grid;gap:0}
.tc-trust-item{display:flex;align-items:center;gap:14px;padding:20px 28px;border-right:1px solid var(--border)}
.tc-trust-item:last-child{border-right:none}
.tc-trust-icon{font-size:24px;flex-shrink:0}
.tc-trust-label{font-size:14px;font-weight:600;color:var(--p)}
.tc-trust-sub{font-size:12px;color:var(--p3);margin-top:2px}

/* testimonials */
.tc-testimonials{padding:64px 48px;background:var(--bg2)}
.tc-testimonials-grid{display:grid;gap:16px;margin-top:32px}
.tc-testimonial{background:#fff;border-radius:14px;padding:24px;border:1px solid var(--border)}
.tc-t-stars{color:#f59e0b;font-size:14px;margin-bottom:12px;letter-spacing:2px}
.tc-t-text{font-size:14px;color:var(--p2);line-height:1.75;margin-bottom:16px;font-style:italic}
.tc-t-author{display:flex;align-items:center;gap:10px}
.tc-t-avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--p);display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:13px;flex-shrink:0;
}
.tc-t-name{font-size:13px;font-weight:600}

/* newsletter */
.tc-newsletter{padding:80px 48px;text-align:center;background:var(--p);color:#fff}
.tc-newsletter h2{font-family:var(--font-display);font-size:34px;font-weight:400;letter-spacing:-.02em;margin-bottom:10px;color:#fff}
.tc-newsletter p{color:rgba(255,255,255,.55);margin-bottom:32px;font-size:15px}
.tc-newsletter-form{display:flex;gap:8px;max-width:480px;margin:0 auto;flex-wrap:wrap}
.tc-newsletter-input{
  flex:1;min-width:200px;padding:13px 18px;
  border:none;border-radius:var(--btn-r);
  font-size:14px;background:rgba(255,255,255,.1);
  color:#fff;font-family:var(--font);outline:none;
  border:1px solid rgba(255,255,255,.15);
}
.tc-newsletter-input::placeholder{color:rgba(255,255,255,.35)}
.tc-newsletter-input:focus{border-color:rgba(255,255,255,.4)}
.tc-newsletter-form .btn-cta{background:#fff;color:var(--p);white-space:nowrap;width:auto!important;display:inline-flex!important}
.tc-newsletter-form .btn-cta:hover{background:rgba(255,255,255,.9)}
.tc-nl-note{font-size:12px;color:rgba(255,255,255,.3);margin-top:14px}

/* promo */
.tc-promo-banner{padding:72px 48px;text-align:center;color:#fff}
.tc-promo-content h2{font-family:var(--font-display);font-size:36px;font-weight:400;margin-bottom:12px}
.tc-promo-content p{opacity:.8;margin-bottom:28px;font-size:16px}
.btn-ghost-white{
  background:transparent;color:#fff;border:2px solid rgba(255,255,255,.45);
  padding:12px 28px;border-radius:var(--btn-r);font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:.2s var(--ease);
}
.btn-ghost-white:hover{background:rgba(255,255,255,.1)}

/* footer */
.tc-footer{padding:64px 48px 36px;border-top:1px solid var(--border)}
.tc-footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:56px;margin-bottom:48px}
.tc-footer-logo{font-family:var(--font-display);font-size:20px;font-weight:400;margin-bottom:8px;cursor:pointer;letter-spacing:-.01em}
.tc-footer-tagline{font-size:13px;color:var(--p3);line-height:1.75;margin-bottom:20px;max-width:260px}
.tc-footer-col-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--p3);margin-bottom:14px}
.tc-footer-col-links{display:flex;flex-direction:column;gap:10px}
.tc-footer-col-links a{font-size:14px;color:var(--p2);transition:color .15s}
.tc-footer-col-links a:hover{color:var(--p)}
.tc-footer-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-top:28px;border-top:1px solid var(--border)}
.tc-footer-copy{font-size:12.5px;color:var(--p3)}
.tc-footer-social{display:flex;gap:8px}
.tc-social-btn{
  width:34px;height:34px;border-radius:8px;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;text-decoration:none;transition:background .15s;
}
.tc-social-btn:hover{background:var(--border)}

/* faq */
.tc-faq-section{padding:64px 48px}
.tc-faq-item{border-bottom:1px solid var(--border);padding:22px 0}
.tc-faq-q{font-size:15px;font-weight:600;margin-bottom:8px}
.tc-faq-a{font-size:14px;color:var(--p2);line-height:1.75}

/* countdown */
.tc-countdown-section{padding:64px 48px;text-align:center}
.tc-countdown-row{display:flex;gap:14px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.tc-cd-unit{background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px 28px;min-width:90px}
.tc-cd-num{font-family:var(--font-display);font-size:44px;font-weight:400;line-height:1;color:var(--primary)}
.tc-cd-label{font-size:11px;font-weight:600;color:var(--p3);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}

/* gallery */
.tc-gallery-section{padding:64px 48px}
.tc-gallery-grid{display:grid;gap:10px}
.tc-gallery-item{background:var(--bg2);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px}
.tc-gallery-item img{width:100%;height:100%;object-fit:cover;display:block}

/* video */
.tc-video-section{padding:64px 48px}
.tc-video-box{border-radius:16px;height:380px;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;margin-top:24px;border:1px solid var(--border)}
.tc-video-box iframe{width:100%;height:100%;border:none}
.tc-play-circle{width:64px;height:64px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer}

/* pay badge */
#payBadge{
  display:none;padding:5px 12px;
  background:#f0fdf4;border:1px solid #bbf7d0;
  border-radius:7px;font-size:11.5px;font-weight:600;color:#16a34a;
  align-items:center;gap:4px;
}

/* ─── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:1200px){
  :root{--cols:3}
  .hdr-inner,.tc-navbar{padding:0 28px}
  .tc-section,.tc-trust-section,.tc-newsletter,.tc-promo-banner,.tc-footer,.tc-faq-section,.tc-countdown-section,.tc-gallery-section,.tc-video-section{padding-left:28px!important;padding-right:28px!important}
  [class*="featured-"].tc-section{padding-left:28px!important;padding-right:28px!important}
  #mainLayout{padding:36px 28px 0}
  .cart-bar{padding:14px 28px}
}
@media(max-width:768px){
  :root{--cols:2;--navbar-h:56px}
  .hdr-inner,.tc-navbar{padding:0 16px}
  .hdr-nav{display:none}
  .hdr-search-wrap{max-width:140px;margin:0 8px}
  .tc-section,.tc-trust-section,.tc-newsletter,.tc-promo-banner,.tc-footer,.tc-faq-section,.tc-countdown-section,.tc-gallery-section,.tc-video-section{padding-left:16px!important;padding-right:16px!important}
  [class*="featured-"].tc-section{padding-left:16px!important;padding-right:16px!important}
  #mainLayout{padding:20px 16px 0}
  .toolbar{flex-direction:column;align-items:flex-start}
  .toolbar-right{flex-direction:column;align-items:flex-start;width:100%}
  .tb-search-wrap,.tb-search-wrap .tb-input{width:100%}
  .tc-footer-grid{grid-template-columns:1fr!important;gap:28px!important}
  .tc-trust-grid{grid-template-columns:repeat(2,1fr)!important}
  .tc-trust-item{border-right:none!important;border-bottom:1px solid var(--border)}
  .tc-testimonials-grid{grid-template-columns:1fr!important}
  .tc-products-grid,.products-grid{grid-template-columns:repeat(2,1fr)!important}
  [class*="featured-"] .tc-products-grid{grid-template-columns:repeat(2,1fr)!important}
  .list-grid .product-card{flex-direction:column!important;height:auto}
  .list-grid .card-link{flex-direction:column!important}
  .list-grid .product-img{width:100%!important;min-width:unset!important;height:200px!important}
  .magazine-grid .product-card:first-child{grid-column:span 1!important;grid-row:span 1!important}
  .tc-newsletter-form{flex-direction:column!important}
  .tc-newsletter-input{min-width:unset!important;width:100%!important}
  .cart-bar{padding:12px 16px}
  .products-grid{gap:12px!important}
  .tc-products-grid{gap:12px!important}
  .cart-qty-row{height:42px}
  .qty-btn{font-size:20px}
  .qty-value{flex:0 0 44px;font-size:14px}
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="ld-ring"></div>
  <div class="ld-text">Loading store</div>
</div>

<!-- ========== SECTION TEMPLATES ========== -->
<!-- All section structures are defined once inside <template> tags. 
     They will be cloned and filled with data at runtime. -->

<!-- Announcement Bar -->
<template id="template-announcement">
  <div class="announcement-bar section-announcement" data-section-type="announcement">
    <span class="announcement-text"></span>
    <span class="announcement-link hidden"></span>
    <button class="announcement-close hidden">✕</button>
  </div>
</template>

<!-- Navigation Bar -->
<template id="template-navbar">
  <nav class="tc-navbar section-navbar" data-section-type="navbar" style="position:sticky;top:0;z-index:200">
    <div class="nav-logo">
      <img class="nav-logo-img hidden" src="" alt="">
      <span class="nav-logo-text"></span>
    </div>
    <div class="nav-links"></div>
    <div class="nav-right">
      <a class="nav-cart-btn hidden" href="#">🛒 <span class="nav-cart-text">Cart</span> <span class="nav-cart-count">0</span></a>
    </div>
  </nav>
</template>

<!-- Hero Banner -->
<template id="template-hero">
  <section class="tc-hero section-hero" data-section-type="hero">
    <div class="hero-bg-img" style="display:none"></div>
    <div class="hero-ov" style="display:none"></div>
    <div class="hero-content">
      <div class="hero-badge hidden"></div>
      <h1 class="hero-heading"></h1>
      <p class="hero-subheading"></p>
      <div class="hero-btns">
        <a class="btn-cta hero-cta-primary" href="#"></a>
        <a class="btn-cta btn-cta-ghost hero-cta-secondary hidden" href="#"></a>
      </div>
    </div>
  </section>
</template>

<!-- Featured Products -->
<template id="template-featured">
  <section class="tc-section featured-{cardStyle}" data-section-type="featured">
    <div class="tc-section-hd">
      <div>
        <div class="tc-section-title"></div>
        <div class="tc-section-subtitle hidden"></div>
      </div>
      <a class="tc-view-all hidden" href="#">View all</a>
    </div>
    <div class="tc-products-grid"></div>
  </section>
</template>

<!-- Category Grid -->
<template id="template-categories">
  <section class="tc-section" data-section-type="categories">
    <div class="tc-section-hd">
      <div>
        <div class="tc-section-title"></div>
        <div class="tc-section-subtitle hidden"></div>
      </div>
    </div>
    <div class="tc-cats-grid"></div>
  </section>
</template>

<!-- Banner / Promo -->
<template id="template-banner">
  <section class="tc-promo-banner" data-section-type="banner">
    <div class="tc-promo-content">
      <h2 class="banner-heading"></h2>
      <p class="banner-subtext"></p>
      <div class="banner-coupon hidden"></div>
      <button class="btn-ghost-white banner-cta hidden"></button>
    </div>
  </section>
</template>

<!-- Testimonials -->
<template id="template-testimonials">
  <section class="tc-testimonials" data-section-type="testimonials">
    <div class="tc-section-hd">
      <div class="tc-section-title"></div>
      <div class="tc-section-subtitle hidden"></div>
    </div>
    <div class="tc-testimonials-grid"></div>
  </section>
</template>

<!-- Newsletter -->
<template id="template-newsletter">
  <section class="tc-newsletter" data-section-type="newsletter">
    <h2 class="newsletter-heading"></h2>
    <p class="newsletter-subtext"></p>
    <div class="tc-newsletter-form">
      <input class="tc-newsletter-input" type="email" placeholder="">
      <button class="btn-cta newsletter-btn"></button>
    </div>
    <div class="tc-nl-note newsletter-note hidden"></div>
  </section>
</template>

<!-- Footer -->
<template id="template-footer">
  <footer class="tc-footer" data-section-type="footer">
    <div class="tc-footer-grid">

  <div class="cbar-info"><span id="cbarQty"></span><strong id="cbarTotal"></strong></div>
  <a href="#" class="cbar-btn" id="cartBarBtn">View Cart →</a>
</div>
<div class="toast" id="toast"></div>

<script>
// ─────────────── CONFIG ──────────────────────────────────────
const slug = new URLSearchParams(location.search).get('store')
if(!slug) document.body.innerHTML='<div style="text-align:center;padding:80px;font-family:sans-serif"><h2>Store not found</h2><p style="color:#888;margin-top:8px">Add ?store=your-slug to the URL</p></div>'

const API = 'https://apiv2.aasaitech.in'
const R = document.documentElement
let storeConfig={}, themeData=null, currency='₹'
let activeStyle='classic', activeSize='medium'
let currentCat='', currentPage=1, searchQ='', searchT=null
let storeCategories=[]

// ─────────────── UTILS ───────────────────────────────────────
const esc = s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
const esa = s=>String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')
const hideLoader = ()=>{const l=document.getElementById('loader');if(l){l.classList.add('out');setTimeout(()=>l.remove(),450)}}
const toast = m=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._);t._=setTimeout(()=>t.classList.remove('on'),2500)}
const scrollTop = ()=>window.scrollTo({top:0,behavior:'smooth'})
const smoothScroll = ()=>{
  const a=document.getElementById('mainAnchor'),nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader'),off=nb?nb.offsetHeight+12:74
  if(a)window.scrollTo({top:a.getBoundingClientRect().top+scrollY-off,behavior:'smooth'})
}
const scrollToEl = id=>{const el=document.getElementById(id);if(!el)return;const nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader');window.scrollTo({top:el.getBoundingClientRect().top+scrollY-(nb?nb.offsetHeight+12:74),behavior:'smooth'})}
const gotoCart = ()=>location.href=`cart.html?store=${slug}`
const gotoAccount = ()=>location.href=localStorage.getItem(`cust_token_${slug}`)?`customer-account.html?store=${slug}`:`customer-login.html?store=${slug}`
const subscribeNL = ()=>{const v=document.querySelector('.tc-newsletter-input')?.value;toast(v?`📧 Thanks! We'll reach ${v}`:'Please enter your email')}
const updateOffset = ()=>{const a=document.getElementById('mainAnchor');if(!a)return;const nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader');a.style.top=`-${(nb?nb.offsetHeight:0)+20}px`}
const updateCols = ()=>{const s=themeData?.settings||{},cols=s.cols||s.columns||4;R.style.setProperty('--cols',window.innerWidth<=768?'2':String(parseInt(cols)||4))}

// ─────────────── CART ─────────────────────────────────────────
const getCart = ()=>JSON.parse(localStorage.getItem('cart_'+slug)||'[]')
const saveCart = c=>localStorage.setItem('cart_'+slug,JSON.stringify(c))
const getQty = id=>{const i=getCart().find(x=>x.product_id===id&&!x.variant);return i?i.qty:0}

function incCart(id,name,price,image){
  const cart=getCart(),i=cart.find(x=>x.product_id===id&&!x.variant)
  if(i)i.qty++;else cart.push({product_id:id,name,price,image,qty:1})
  saveCart(cart);updateCartUI();updateCC(id);toast('Added to cart ✓')
}
function decCart(id){
  const cart=getCart(),idx=cart.findIndex(x=>x.product_id===id&&!x.variant)
  if(idx!==-1){if(cart[idx].qty>1)cart[idx].qty--;else cart.splice(idx,1);saveCart(cart);updateCartUI();updateCC(id)}
}
const addToCart=(id,n,p,img)=>incCart(id,n,p,img)

function updateCC(id){
  const qty=getQty(id)
  document.querySelectorAll(`.cart-controls[data-pid="${id}"]`).forEach(el=>{
    const n=el.dataset.name,p=parseFloat(el.dataset.price),img=el.dataset.image,sn=esa(n),si=esa(img)
    const card=el.closest('.product-card,.tc-product-card')
    const ic=card?.querySelector('.product-img,.tc-product-img')

    if(qty===0){
      el.innerHTML=`<button class="btn-add" onclick="event.preventDefault();addToCart('${id}','${sn}',${p},'${si}')"><span class="btn-icon">🛒</span> Add to cart</button>`
      if(card){
        card.classList.remove('in-cart')
        if(ic && !ic.querySelector('.card-atc-overlay')){
          const ov=document.createElement('div');ov.className='card-atc-overlay'
          ov.innerHTML=`<button class="card-atc-btn" onclick="event.preventDefault();addToCart('${id}','${sn}',${p},'${si}')">🛒 Add to cart</button>`
          ic.appendChild(ov)
        }
      }
    }else{
      el.innerHTML=`<div class="cart-qty-row"><button class="qty-btn" onclick="event.preventDefault();decCart('${id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incCart('${id}','${sn}',${p},'${si}')">+</button></div>`
      if(card){
        card.classList.add('in-cart')
        ic?.querySelector('.card-atc-overlay')?.remove()
      }
    }
  })
}

function updateCartUI(){
  const cart=getCart(),qty=cart.reduce((s,x)=>s+x.qty,0),amt=cart.reduce((s,x)=>s+x.price*x.qty,0)
  const el=document.getElementById('cartCount');el.textContent=qty;el.className='cart-badge'+(qty>0?' on':'')
  document.getElementById('cartLabel').textContent=qty>0?`(${qty})`:'Cart'
  const bar=document.getElementById('cartBar')
  if(qty>0){bar.classList.add('on');document.getElementById('cbarQty').textContent=`${qty} item${qty!==1?'s':''} — `;document.getElementById('cbarTotal').textContent=`${currency}${amt.toFixed(2)}`}
  else bar.classList.remove('on')
  document.querySelectorAll('.theme-cart-qty').forEach(e=>e.textContent=qty)
}

// ─────────────── WISHLIST ─────────────────────────────────────
function toggleWish(pid,btn){
  const key=`wish_${slug}`,list=JSON.parse(localStorage.getItem(key)||'[]'),idx=list.indexOf(pid)
  if(idx===-1){list.push(pid);btn.textContent='♥';btn.classList.add('wished');toast('Saved to wishlist')}
  else{list.splice(idx,1);btn.textContent='♡';btn.classList.remove('wished');toast('Removed from wishlist')}
  localStorage.setItem(key,JSON.stringify(list))
}
function restoreWish(){
  const list=JSON.parse(localStorage.getItem(`wish_${slug}`)||'[]')
  list.forEach(pid=>{
    document.querySelectorAll(`.cart-controls[data-pid="${pid}"]`).forEach(cc=>{
      const card=cc.closest('.product-card,.tc-product-card')
      const wb=card?.querySelector('.wish-btn')
      if(wb){wb.textContent='♥';wb.classList.add('wished')}
    })
  })
}

// ─────────────── BADGE ───────────────────────────────────────
function getBadge(p,cls){
  const bt=p.badge_text||p.badge||''
  if(bt){const bl=bt.toLowerCase(),c=bl.includes('best')||bl.includes('seller')?'badge-bestseller':bl.includes('new')?'badge-new':bl.includes('trend')?'badge-trending':bl.includes('hot')?'badge-hot':bl.includes('sale')?'badge-sale':'badge-custom';return`<div class="${cls} ${c}">${esc(bt)}</div>`}
  const d=discPct(p);if(d>=5)return`<div class="${cls} badge-discount">−${d}%</div>`;return''
}
const discPct=p=>p.compare_at_price&&p.compare_at_price>p.price?Math.round((1-p.price/p.compare_at_price)*100):0
const isOOS=p=>p.track_inventory&&p.stock_qty<=0

// ─────────────── RENDER CARD ─────────────────────────────────
function renderCard(p,ctx,btnLabel){
  ctx=ctx||'main';btnLabel=btnLabel||'Add to cart'
  const oos=isOOS(p),qty=getQty(p._id),imgUrl=p.images?.[0]||''
  const si=esa(imgUrl),sn=esa(p.name),d=discPct(p)
  const isM=ctx==='main'
  const cc=isM?'product-card':'tc-product-card'
  const ic=isM?'product-img':'tc-product-img'
  const inf=isM?'product-info':'tc-product-info'
  const ca=isM?'product-cat':'tc-product-cat'
  const nc=isM?'product-name':'tc-product-name'
  const rc=isM?'product-price-row':'tc-price-row'
  const pc=isM?'product-price':'tc-product-price'
  const oc=isM?'product-compare':'tc-product-old'
  const wc=isM?'cart-controls-wrap':'tc-btn-wrap'
  const bc=isM?'product-badge':'tc-product-badge'

  // Gradient placeholder colors
  const colorPairs=[
    ['#e8f4f8','#b2d8e8'],['#f8f0e8','#e8c8a8'],['#f0f8e8','#c8e8b0'],
    ['#f8e8f0','#e8b0c8'],['#f0e8f8','#c8b0e8'],['#f8f8e8','#e8e8a0']
  ]
  const colorIdx=(p.name||'').split('').reduce((s,c)=>s+c.charCodeAt(0),0)%colorPairs.length
  const [bg1,bg2c]=colorPairs[colorIdx]

  const imgTag=imgUrl
    ?`<img src="${imgUrl}" alt="${esc(p.name)}" loading="lazy" onerror="this.closest('.${ic}').classList.add('img-error');this.closest('.${ic}').querySelector('.img-fallback-icon').style.opacity='.4'">`
    :''
  const fallbackIcon=`<div class="img-fallback-icon" style="opacity:${imgUrl?'0':'.25'}">🛍️</div>`
  const gradientBg=imgUrl?'':`background:linear-gradient(135deg,${bg1},${bg2c});`

  const badge=getBadge(p,bc)
  const wish=`<button class="wish-btn" onclick="event.preventDefault();toggleWish('${p._id}',this)">♡</button>`

  const ctrlData=`data-pid="${p._id}" data-name="${esc(p.name)}" data-price="${p.price}" data-image="${esc(imgUrl)}"`

  // Inline cart controls
  let ctrlHTML
  if(oos){
    ctrlHTML=`<span class="out-of-stock-label">Out of stock</span>`
  }else if(qty>0){
    ctrlHTML=`<div class="cart-controls" ${ctrlData}><div class="cart-qty-row"><button class="qty-btn" onclick="event.preventDefault();decCart('${p._id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incCart('${p._id}','${sn}',${p.price},'${si}')">+</button></div></div>`
  }else{
    ctrlHTML=`<div class="cart-controls" ${ctrlData}></div>`
  }

  // Hover overlay — only when not in cart and not OOS
  const overlayBtn = (oos || qty > 0) ? '' : `<div class="card-atc-overlay"><button class="card-atc-btn" onclick="event.preventDefault();addToCart('${p._id}','${sn}',${p.price},'${si}')">🛒 Add to cart</button></div>`

  // OVERLAY STYLE
  if(activeStyle==='overlay'){
    return`<div class="${cc}${qty>0?' in-cart':''}">
      <a class="card-link" href="product.html?store=${slug}&id=${p._id}">
        <div class="${ic}" style="${gradientBg}">
          ${badge}${imgTag}${fallbackIcon}
          <div class="ov-layer"><div class="ov-name">${esc(p.name)}</div><div class="ov-price">${currency}${p.price.toFixed(2)}</div></div>
        </div>
      </a>
      ${overlayBtn}
      <div class="${wc}">${qty>0?`<div class="cart-controls" ${ctrlData}><div class="cart-qty-row"><button class="qty-btn" onclick="event.preventDefault();decCart('${p._id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incCart('${p._id}','${sn}',${p.price},'${si}')">+</button></div></div>`:''}</div>
    </div>`
  }

  // STANDARD CARD
  return`<div class="${cc}${qty>0?' in-cart':''}">
    <a class="card-link" href="product.html?store=${slug}&id=${p._id}">
      <div class="${ic}" style="${gradientBg}">
        ${badge}${wish}
        ${imgTag}${fallbackIcon}
        ${overlayBtn}
      </div>
      <div class="${inf}">
        ${p.category_name?`<div class="${ca}">${esc(p.category_name)}</div>`:''}
        <div class="${nc}">${esc(p.name)}</div>
        <div class="${rc}">
          <span class="${pc}">${currency}${p.price.toFixed(2)}</span>
          ${p.compare_at_price?`<span class="${oc}">${currency}${p.compare_at_price.toFixed(2)}</span>`:''}
          ${d?`<span class="product-discount">−${d}%</span>`:''}
        </div>
        <div class="${wc}">
          ${oos
            ? `<span class="out-of-stock-label">Out of stock</span>`
            : qty>0
              ? `<div class="cart-controls" ${ctrlData}><div class="cart-qty-row"><button class="qty-btn" onclick="event.preventDefault();decCart('${p._id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incCart('${p._id}','${sn}',${p.price},'${si}')">+</button></div></div>`
              : `<div class="cart-controls" ${ctrlData}></div>`
          }
        </div>
      </div>
    </a>
  </div>`
}

// Render initial add-to-cart button for empty cart-controls divs
function initCartButtons(){
  document.querySelectorAll('.cart-controls').forEach(el=>{
    if(el.innerHTML.trim()!=='') return // already has content (qty row or OOS)
    const id=el.dataset.pid,n=el.dataset.name,p=parseFloat(el.dataset.price),img=el.dataset.image
    const sn=esa(n),si=esa(img)
    el.innerHTML=`<button class="btn-add" onclick="event.preventDefault();addToCart('${id}','${sn}',${p},'${si}')"><span class="btn-icon">🛒</span> Add to cart</button>`
  })
}

function applyStyleToGrid(){
  const grid=document.getElementById('productsGrid')
  if(!grid)return
  const styleMap={classic:'classic-grid',minimal:'minimal-grid',bold:'bold-grid',elevated:'elevated-grid',compact:'compact-grid',list:'list-grid',magazine:'magazine-grid',overlay:'overlay-grid'}
  const cls=styleMap[activeStyle]||'classic-grid'
  grid.className=`products-grid ${cls}`
  if(activeStyle==='list')grid.style.gridTemplateColumns='1fr'
  else grid.style.gridTemplateColumns=''
}

// ─────────────── THEME LOADING (HYBRID TEMPLATE APPROACH) ────
async function loadTheme(){
  try{
    const res=await fetch(`${API}/shop/${slug}/theme`)
    if(!res.ok)return
    themeData=await res.json()
    applySettings(themeData.settings||{})
    renderSections(themeData.sections||[])
  }catch(e){console.warn('[theme]',e.message)}
}

function applySettings(s){
  const primary=s.primaryColor||s.primary_color||'#0f0f0f'
  const bg=s.bgColor||s.secondary_color||'#fafafa'
  const text=s.textColor||s.text_color||'#0f0f0f'
  const radius=s.radius||'12px'
  const font=s.fontHeading||s.font_heading||'DM Sans'
  const btnStyle=s.buttonStyle||s.button_style||'rounded'
  const cols=s.cols||s.columns||4

  R.style.setProperty('--primary',primary)

  document.body.style.background=bg

  if(font&&font!=='DM Sans'&&font!=='system-ui'){
    const fid='gf-'+font.replace(/\s+/g,'-')
    if(!document.getElementById(fid)){const l=document.createElement('link');l.id=fid;l.rel='stylesheet';l.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;500;600;700&display=swap`;document.head.appendChild(l)}
  }

  activeStyle=s.card_style||s.cardStyle||'classic'

  activeSize=sz
}

// Which sections go top vs bottom (same as original)
const TOP_TYPES = new Set(['announcement','navbar','hero','featured','categories'])

function renderSections(sections) {
  const topContainer = document.getElementById('theme-sections-top')
  const bottomContainer = document.getElementById('theme-sections-bottom')
  topContainer.innerHTML = ''
  bottomContainer.innerHTML = ''

  const enabled = sections.filter(s => s.is_visible !== false && s.enabled !== false)
                          .sort((a,b) => (a.order||0) - (b.order||0))

  enabled.forEach(sec => {
    const tmplId = templateMap[sec.type]
    if (!tmplId) return // unknown type – skip
    const template = document.getElementById(tmplId)
    if (!template) return
    const clone = template.content.cloneNode(true)
    const container = clone.firstElementChild // the section root

    const data = getSectionData(sec)
    populateSection(container, data, sec.type)

    if (TOP_TYPES.has(sec.type)) {
      topContainer.appendChild(container)
    } else {
      bottomContainer.appendChild(container)
    }
  })

  // After rendering, trigger async fills (featured, categories)
  enabled.forEach(sec => {
    if (sec.type === 'featured') {
      const el = topContainer.querySelector(`[data-section-type="featured"]:last-child`) || bottomContainer.querySelector(`[data-section-type="featured"]:last-child`)
      if (el) fillFeaturedSection(el, getSectionData(sec))
    }
    if (sec.type === 'categories') {
      const el = topContainer.querySelector(`[data-section-type="categories"]:last-child`) || bottomContainer.querySelector(`[data-section-type="categories"]:last-child`)
      if (el) fillCategoriesSection(el, getSectionData(sec))
    }
    if (sec.type === 'countdown') {
      const el = topContainer.querySelector(`[data-section-type="countdown"]:last-child`) || bottomContainer.querySelector(`[data-section-type="countdown"]:last-child`)
      if (el && getSectionData(sec).targetDate) startCountdown(el, getSectionData(sec).targetDate)
    }
  })

  const hasNavbar = enabled.some(s => s.type === 'navbar')
  const hasHero = enabled.some(s => s.type === 'hero')
  document.getElementById('origHeader').style.display = hasNavbar ? 'none' : ''
  document.getElementById('heroBanner').classList.toggle('visible', !hasHero)

  document.querySelectorAll('.theme-cart-qty').forEach(e => e.textContent = getCart().reduce((s,x)=>s+x.qty,0))
  updateOffset()
  window.addEventListener('resize', ()=>{ updateCols(); updateOffset() })
}

// Async fill functions (simplified – you can reuse your original fillFeatured/fillCats but adapt to use container)
async function fillFeaturedSection(container, d) {
  const grid = container.querySelector('.tc-products-grid')
  if (!grid) return
  const count = parseInt(d.count) || 8
  try {
    const res = await fetch(`${API}/shop/${slug}/products?page=1&limit=${count}`)
    const json = await res.json()
    const products = (json.products || []).slice(0, count)
    if (products.length === 0) {
      container.style.display = 'none'
      return
    }
    grid.innerHTML = products.map(p => renderCard(p, 'featured', d.btnText || 'Add to cart')).join('')
    initCartButtons()
    products.forEach(p => { if(getQty(p._id)>0) updateCC(p._id) })
    restoreWish()
  } catch(e) {
    container.style.display = 'none'
  }
}

async function fillCategoriesSection(container, d) {
  const grid = container.querySelector('.tc-cats-grid')
  if (!grid) return
  const cols = parseInt(d.columns) || 4
  grid.style.gridTemplateColumns = `repeat(${cols},1fr)`
  const catStyle = d.catCardStyle || 'image'
  const showCount = d.showCount !== 'no'
  try {
    const cats = await fetch(`${API}/shop/${slug}/categories`).then(r=>r.json())
    const list = Array.isArray(cats) ? cats : []
    if (list.length === 0) {
      container.style.display = 'none'
      return
    }
    const em = { fashion:'👗', electronics:'📱', home:'🏠', beauty:'💄', gaming:'🎮', accessories:'👜', footwear:'👟', sports:'⚽' }
    const getEmoji = n => { const lc=(n||'').toLowerCase(); for(let k in em) if(lc.includes(k)) return em[k]; return '🛍️' }
    grid.innerHTML = list.map(c => {
      if (catStyle === 'simple' || catStyle === 'icon') {
        return `<div class="tc-cat-card" onclick="filterByCat('${c._id}','${esa(c.name)}')">
          <div class="tc-cat-simple">
            <div class="tc-cat-icon">${c.icon || getEmoji(c.name)}</div>
            <div class="tc-cat-name-plain">${esc(c.name)}</div>
            ${showCount && c.product_count ? `<div style="font-size:11px;color:var(--p3);margin-top:3px">${c.product_count}+ items</div>` : ''}
          </div>
        </div>`
      } else {
        // image style
        return `<div class="tc-cat-card" onclick="filterByCat('${c._id}','${esa(c.name)}')">
          <div class="tc-cat-img-wrap">
            ${c.image_url ? `<img class="tc-cat-img" src="${c.image_url}" alt="${esc(c.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=\\'font-size:32px\\'>${getEmoji(c.name)}</span>'">` : `<span style="font-size:32px">${getEmoji(c.name)}</span>`}
          </div>
          <div class="tc-cat-footer">
            <span class="tc-cat-name">${esc(c.name)}</span>
            ${showCount && c.product_count ? `<span class="tc-cat-count">${c.product_count}+</span>` : ''}
          </div>
        </div>`
      }
    }).join('')
  } catch(e) {
    container.style.display = 'none'
  }
}

function startCountdown(container, targetDate) {
  const target = new Date(targetDate).getTime()
  const daysEl = container.querySelector('.cd-days')
  const hoursEl = container.querySelector('.cd-hours')
  const minsEl = container.querySelector('.cd-mins')
  const secsEl = container.querySelector('.cd-secs')
  const update = () => {
    const now = Date.now()
    const diff = target - now
    if (diff <= 0) {
      if (daysEl) daysEl.textContent = '00'
      if (hoursEl) hoursEl.textContent = '00'
      if (minsEl) minsEl.textContent = '00'
      if (secsEl) secsEl.textContent = '00'
      return
    }
    const days = Math.floor(diff / 86400000)
    const hours = Math.floor((diff % 86400000) / 3600000)
    const mins = Math.floor((diff % 3600000) / 60000)
    const secs = Math.floor((diff % 60000) / 1000)
    if (daysEl) daysEl.textContent = String(days).padStart(2,'0')
    if (hoursEl) hoursEl.textContent = String(hours).padStart(2,'0')
    if (minsEl) minsEl.textContent = String(mins).padStart(2,'0')
    if (secsEl) secsEl.textContent = String(secs).padStart(2,'0')
  }
  update()
  setInterval(update, 1000)
}

// ─────────────── CATEGORIES & PRODUCTS (unchanged) ───────────
async function loadCategories(){
  try{
    const cats=await fetch(`${API}/shop/${slug}/categories`).then(r=>r.json())
    storeCategories=Array.isArray(cats)?cats:[]
    const p=document.getElementById('catPills')
    if(p)p.innerHTML=`<button class="cat-pill active" data-cat="" onclick="selectCat(this,'')">All</button>`+storeCategories.map(c=>`<button class="cat-pill" data-cat="${c._id}" onclick="selectCat(this,'${c._id}')">${esc(c.name)}</button>`).join('')
  }catch(e){}
}
function selectCat(el,id){document.querySelectorAll('.cat-pill').forEach(x=>x.classList.remove('active'));el.classList.add('active');currentCat=id;currentPage=1;loadProducts()}
function filterByCat(id){currentCat=id;currentPage=1;document.querySelectorAll('.cat-pill').forEach(x=>x.classList.toggle('active',x.dataset.cat===id));loadProducts();smoothScroll()}
function updateSearch(v){searchQ=v;const o=document.getElementById('origSearchInput'),m=document.getElementById('mainSearchInput');if(o&&o!==document.activeElement)o.value=v;if(m&&m!==document.activeElement)m.value=v;clearTimeout(searchT);searchT=setTimeout(()=>{currentPage=1;loadProducts()},350)}

async function loadProducts(){
  const p=new URLSearchParams({page:currentPage})
  if(searchQ)p.set('q',searchQ);if(currentCat)p.set('category',currentCat)
  const sort=document.getElementById('sortSelect').value;if(sort)p.set('sort',sort)
  const min=document.getElementById('priceMin').value;if(min)p.set('min_price',min)
  const max=document.getElementById('priceMax').value;if(max)p.set('max_price',max)
  try{
    const data=await fetch(`${API}/shop/${slug}/products?${p}`).then(r=>r.json())
    document.getElementById('resultsCount').textContent=`${data.total} product${data.total!==1?'s':''}`
    renderProducts(data.products||[]);renderPagination(data.page,data.pages)
  }catch(e){document.getElementById('resultsCount').textContent='Failed to load';console.error(e)}
}

function renderProducts(products){
  const grid=document.getElementById('productsGrid')
  if(!products.length){grid.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><h3>No products found</h3><p>Try a different search or category</p></div>`;return}
  grid.innerHTML=products.map(p=>renderCard(p,'main','Add to cart')).join('')
  applyStyleToGrid()
  initCartButtons()
  products.forEach(p=>{if(getQty(p._id)>0)updateCC(p._id)});restoreWish()
}

function renderPagination(page,pages){
  const el=document.getElementById('pagination');if(!pages||pages<=1){el.innerHTML='';return}
  let h=`<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>← Prev</button>`
  for(let i=1;i<=pages;i++){if(pages<=7||i===1||i===pages||Math.abs(i-page)<=2)h+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;else if(Math.abs(i-page)===3)h+='<span style="padding:0 4px;color:var(--p3)">…</span>'}
  h+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>Next →</button>`
  el.innerHTML=h
}
function goPage(p){currentPage=p;loadProducts();scrollTo({top:0,behavior:'smooth'})}

// ─────────────── INIT ────────────────────────────────────────
async function init(){
  try{
    storeConfig=await fetch(`${API}/shop/${slug}/config`).then(r=>r.json())
    if(storeConfig.error)throw new Error(storeConfig.error)

    document.title=storeConfig.name
    document.getElementById('storeName').textContent=storeConfig.name
    document.getElementById('heroTitle').textContent=storeConfig.name
    document.getElementById('heroTagline').textContent=storeConfig.tagline||storeConfig.description||'Discover amazing products'
    document.getElementById('allProductsTitle').textContent='Products'

    if(storeConfig.logo_url){
      const img=document.createElement('img');img.src=storeConfig.logo_url;img.style.cssText='height:32px;object-fit:contain;border-radius:6px'
      document.getElementById('storeLogo').prepend(img)
    }
    if(storeConfig.brand_color){R.style.setProperty('--primary',storeConfig.brand_color)}
    if(storeConfig.currency==='USD')currency='$';else if(storeConfig.currency==='EUR')currency='€'
    if(storeConfig.payment_enabled)document.getElementById('payBadge').style.display='flex'

    sessionStorage.setItem('ekart_store',slug);sessionStorage.setItem('ekart_currency',currency)
    sessionStorage.setItem('ekart_store_name',storeConfig.name)
    sessionStorage.setItem('ekart_pay_enabled',storeConfig.payment_enabled?'1':'0')
    document.getElementById('cartBarBtn').href=`cart.html?store=${slug}`

    const tok=localStorage.getItem(`cust_token_${slug}`),name=localStorage.getItem(`cust_name_${slug}`)
    if(tok&&name){const icon=document.getElementById('accountBtnIcon');if(icon)icon.title=name.split(' ')[0]}

    await loadTheme()
    await loadCategories()
    await loadProducts()
    updateCartUI()
    hideLoader()

    const hasThemeHero=document.querySelector('.tc-hero')
    if(!hasThemeHero)document.getElementById('heroBanner').classList.add('visible')

  }catch(e){
    document.body.innerHTML=`<div style="text-align:center;padding:80px;font-family:sans-serif"><div style="font-size:48px;margin-bottom:16px;opacity:.25">🏪</div><h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Store not found</h2><p style="color:#9ca3af;font-size:14px">${esc(e.message)}</p></div>`
    hideLoader()
  }
}

if(slug){setTimeout(hideLoader,6000);init()}else hideLoader()

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eKart Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ... (all your existing styles remain exactly the same) ... */
    :root {
      --accent: #6c63ff;
      --primary: #6c63ff;
      --bg: #f8f9fc;
      --surface: #fff;
      --border: #e8eaf0;
      --text: #1a1a2e;
      --text2: #64748b;
      --text3: #94a3b8;
      --green: #16a34a;
      --surface2: #f1f5f9;
      --card-bg: #ffffff;
      --nav-bg: #ffffff;
      --radius: 12px;
      --btn-r: 12px;
      --font: 'Outfit', sans-serif;
      --navbar-h: 62px;
      --cols: 3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding-bottom: 80px;
    }

    /* ── ORIGINAL HEADER (hidden when theme has navbar) ── */
    #origHeader {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 64px;
    }
    .store-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      flex-shrink: 0;
    }
    .store-logo img { height: 36px; object-fit: contain; border-radius: 6px; }
    .store-logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; }
    .search-bar { flex: 1; max-width: 480px; margin: 0 auto; position: relative; }
    .search-bar input {
      width: 100%; padding: 9px 16px 9px 40px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: var(--font); outline: none;
      background: var(--bg); transition: border-color .15s;
    }
    .search-bar input:focus { border-color: var(--accent); background: white; }
    .search-bar::before {
      content: '🔍'; position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 14px; pointer-events: none;
    }
    .cart-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 18px; background: var(--accent); color: white;
      border-radius: 10px; text-decoration: none;
      font-size: 13.5px; font-weight: 700; white-space: nowrap; transition: all .15s;
    }
    .cart-btn:hover { background: #7c74ff; transform: translateY(-1px); }
    .cart-count {
      background: #ef4444; color: white; font-size: 10px; font-weight: 700;
      min-width: 18px; height: 18px; border-radius: 9px;
      display: none; align-items: center; justify-content: center; padding: 0 4px;
    }
    .cart-count.has-items { display: flex; }
    .pay-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 8px; font-size: 11.5px; font-weight: 700;
      color: var(--green); white-space: nowrap;
    }

    /* ── ORIGINAL HERO (hidden when theme has hero) ── */
    #heroBanner {
      width: 100%; padding: 52px 24px; text-align: center;
      color: white; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
    }
    #heroBanner::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,.15); }
    #heroBanner .hero-content { position: relative; z-index: 1; }
    #heroBanner h1 {
      font-size: clamp(28px, 5vw, 52px); font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 8px;
    }
    #heroBanner p { font-size: 16px; opacity: .9; max-width: 480px; margin: 0 auto; }

    /* ── PRODUCT LAYOUT ── */
    .layout {
      max-width: 1200px; margin: 0 auto; padding: 24px;
      display: grid; grid-template-columns: 220px 1fr; gap: 24px;
    }
    .filters { position: sticky; top: 88px; align-self: start; }
    .filter-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px; margin-bottom: 14px;
    }
    .filter-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 12px;
    }
    .cat-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-radius: 8px; cursor: pointer; font-size: 14px;
      color: var(--text2); transition: all .15s;
    }
    .cat-item:hover { background: rgba(108,99,255,.06); color: var(--accent); }
    .cat-item.active { background: rgba(108,99,255,.1); color: var(--accent); font-weight: 700; }
    .sort-select {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 13.5px; font-family: var(--font);
      color: var(--text); outline: none; cursor: pointer; transition: border-color .15s;
    }
    .sort-select:focus { border-color: var(--accent); }
    .price-inputs { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .price-inputs input {
      flex: 1; padding: 7px 10px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 13px; font-family: 'DM Mono', monospace;
      outline: none; background: var(--bg);
    }
    .price-inputs input:focus { border-color: var(--accent); }
    .price-sep { color: var(--text3); font-size: 12px; }
    .btn-filter {
      width: 100%; padding: 8px; background: var(--accent); color: white;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: var(--font); margin-top: 10px; transition: background .15s;
    }
    .btn-filter:hover { background: #7c74ff; }
    .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .results-count { font-size: 13.5px; color: var(--text2); font-weight: 500; }

    /* ── PRODUCT CARDS ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 3), 1fr);
      gap: 18px;
    }
    .product-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; text-decoration: none;
      color: var(--text); display: block; transition: all .2s;
      position: relative;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.1); }
    .product-img {
      width: 100%; aspect-ratio: 1; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; overflow: hidden; position: relative;
    }
    .product-img img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .product-badge {
      position: absolute; top: 10px; left: 10px; z-index: 2;
      font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 6px;
    }
    .product-badge.sale { background: #ef4444; color: white; }
    .product-info { padding: 14px; }
    .product-cat { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .product-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
    .product-price-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .product-price { font-size: 16px; font-weight: 800; color: var(--accent); }
    .product-compare { font-size: 12px; text-decoration: line-through; color: var(--text3); }
    .product-discount { font-size: 11px; font-weight: 700; color: var(--green); background: #f0fdf4; padding: 2px 6px; border-radius: 4px; }
    .out-badge { text-align: center; font-size: 12px; color: #ef4444; font-weight: 700; padding: 7px; background: #fef2f2; border-radius: 8px; }
    .btn-add {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 9px; background: var(--accent); color: white;
      border: none; border-radius: 9px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: var(--font); transition: all .15s;
    }
    .btn-add:hover { background: #7c74ff; }
    .btn-add.added { background: var(--green); }

    /* ── PAGINATION ── */
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 32px; flex-wrap: wrap; }
    .page-btn {
      padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--surface); color: var(--text2); cursor: pointer;
      font-family: var(--font); font-size: 13.5px; font-weight: 600; transition: all .15s;
    }
    .page-btn:hover, .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .page-btn:disabled { opacity: .4; cursor: default; pointer-events: none; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 80px 20px; color: var(--text3); grid-column: 1/-1; }
    .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }

    /* ── CART BAR ── */
    .cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--text); color: white; padding: 14px 24px;
      display: none; align-items: center; justify-content: space-between;
      z-index: 300; box-shadow: 0 -4px 24px rgba(0,0,0,.2);
    }
    .cart-bar.show { display: flex; }
    .cart-bar-info { font-size: 14px; font-weight: 600; }
    .cart-bar-info span { color: rgba(255,255,255,.6); margin-right: 10px; font-size: 13px; }
    .cart-bar-btn {
      padding: 10px 24px; background: var(--accent); color: white;
      border-radius: 10px; text-decoration: none; font-size: 14px; font-weight: 700;
    }
    .cart-bar-btn:hover { background: #7c74ff; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: white; border-radius: 12px;
      padding: 12px 20px; font-size: 14px; font-weight: 600;
      opacity: 0; transition: all .3s; z-index: 400;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════════════════════════
       THEME SECTION STYLES (unchanged)
    ══════════════════════════════════════════════════════════ */

    /* Announcement */
    .announcement-bar {
      background: var(--primary); color: white; text-align: center;
      padding: 9px 16px; font-size: 13px; font-weight: 600; letter-spacing: .01em;
      position: relative; z-index: 201;
    }

    /* Navbar */
    .tc-navbar {
      background: var(--nav-bg); padding: 0 5%;
      height: var(--navbar-h); display: flex; align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0,0,0,.08);
      position: sticky; top: 0; z-index: 200;
    }
    .nav-logo { font-size: 22px; font-weight: 900; letter-spacing: -.03em; }
    .nav-links { display: flex; gap: 28px; font-size: 13.5px; font-weight: 600; opacity: .65; }
    .nav-links a { text-decoration: none; color: inherit; }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-search-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(0,0,0,.06); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .nav-cart-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 15px; background: var(--primary); color: white;
      border-radius: var(--btn-r); font-size: 13px; font-weight: 700;
      border: none; cursor: pointer; font-family: var(--font); text-decoration: none;
    }
    .nav-logo-img { height: 36px; object-fit: contain; border-radius: 6px; }

    /* Hero */
    .tc-hero {
      padding: 80px 5% 72px; text-align: center;
      background: var(--bg); position: relative; overflow: hidden;
    }
    .hero-bg-img {
      position: absolute; inset: 0; background-size: cover;
      background-position: center; z-index: 0;
    }
    .hero-overlay-div { position: absolute; inset: 0; z-index: 1; }
    .hero-content { position: relative; z-index: 2; }
    .tc-hero h1 {
      font-size: clamp(32px, 5vw, 54px); font-weight: 900;
      line-height: 1.1; letter-spacing: -.03em; margin-bottom: 16px;
    }
    .tc-hero h1 em { font-style: normal; color: var(--primary); }
    .tc-hero p { font-size: 17px; opacity: .65; max-width: 520px; margin: 0 auto 32px; line-height: 1.7; }
    .hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary); color: white; padding: 13px 30px;
      border-radius: var(--btn-r); font-size: 15px; font-weight: 700;
      cursor: pointer; border: none; font-family: var(--font); transition: opacity .15s;
      text-decoration: none;
    }
    .btn-cta:hover { opacity: .88; }
    .btn-cta-ghost {
      background: transparent; color: var(--text);
      border: 1.5px solid rgba(0,0,0,.2);
    }
    .btn-cta-ghost:hover { background: rgba(0,0,0,.04); }

    /* Sections common */
    .tc-section { padding: 56px 5%; }
    .tc-section-header { margin-bottom: 28px; }
    .tc-section-title { font-size: 28px; font-weight: 800; letter-spacing: -.02em; }
    .tc-section-subtitle { font-size: 14px; opacity: .55; margin-top: 6px; }

    /* Featured products (theme) */
    .tc-products-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 3), 1fr);
      gap: 18px;
    }
    .tc-product-card {
      background: var(--card-bg); border-radius: var(--radius);
      overflow: hidden; transition: transform .2s, box-shadow .2s; position: relative;
    }
    .tc-product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.15); }
    .tc-product-img {
      width: 100%; aspect-ratio: 1; background: rgba(0,0,0,.04);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; position: relative; overflow: hidden;
    }
    .tc-product-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tc-product-badge {
      position: absolute; top: 10px; left: 10px; background: var(--primary);
      color: white; font-size: 10px; font-weight: 800;
      padding: 3px 8px; border-radius: 4px; letter-spacing: .04em;
    }
    .tc-product-info { padding: 14px; }
    .tc-product-name { font-size: 13.5px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .tc-price-row { display: flex; align-items: center; gap: 6px; }
    .tc-product-price { font-size: 16px; font-weight: 800; color: var(--primary); }
    .tc-product-old { font-size: 11px; text-decoration: line-through; opacity: .38; }
    .tc-product-btn {
      width: 100%; margin-top: 10px; padding: 9px; background: var(--primary);
      color: white; border: none; border-radius: var(--btn-r); font-size: 12.5px;
      font-weight: 700; cursor: pointer; font-family: var(--font); transition: opacity .15s;
    }
    .tc-product-btn:hover { opacity: .88; }

    /* Categories */
    .tc-cats-grid { display: grid; gap: 16px; }
    .tc-cat-card {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 32px 20px; text-align: center; cursor: pointer; transition: transform .2s;
    }
    .tc-cat-card:hover { transform: translateY(-2px); }
    .tc-cat-icon { font-size: 36px; margin-bottom: 10px; }
    .tc-cat-name { font-size: 14px; font-weight: 700; }

    /* Promo Banner */
    .tc-promo-banner { color: white; padding: 68px 5%; text-align: center; }
    .tc-promo-content h2 { font-size: 36px; font-weight: 900; margin-bottom: 10px; }
    .tc-promo-content p { opacity: .8; margin-bottom: 24px; font-size: 16px; }
    .btn-white {
      background: white; color: var(--primary); padding: 12px 28px;
      border-radius: var(--btn-r); font-size: 14px; font-weight: 700;
      border: none; cursor: pointer; font-family: var(--font);
    }

    /* Testimonials */
    .tc-testimonials { padding: 56px 5%; background: var(--card-bg); }
    .tc-testimonials-grid { display: grid; gap: 16px; margin-top: 24px; }
    .tc-testimonial { background: var(--bg); border-radius: var(--radius); padding: 20px; }
    .tc-t-stars { color: #f59e0b; font-size: 13px; margin-bottom: 10px; }
    .tc-t-text { font-size: 13.5px; line-height: 1.65; opacity: .7; margin-bottom: 14px; }
    .tc-t-author { display: flex; align-items: center; gap: 10px; }
    .tc-t-avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 13px; flex-shrink: 0;
    }
    .tc-t-name { font-size: 13px; font-weight: 700; }

    /* Newsletter */
    .tc-newsletter { padding: 56px 5%; text-align: center; }
    .tc-newsletter h2 { font-size: 30px; font-weight: 800; margin-bottom: 10px; }
    .tc-newsletter p { opacity: .6; margin-bottom: 24px; font-size: 15px; }
    .tc-newsletter-form { display: flex; gap: 10px; max-width: 440px; margin: 0 auto; flex-wrap: wrap; }
    .tc-newsletter-input {
      flex: 1; min-width: 180px; padding: 11px 16px;
      border: 1.5px solid rgba(0,0,0,.12); border-radius: var(--btn-r);
      font-size: 14px; background: var(--card-bg); color: var(--text);
      font-family: var(--font); outline: none;
    }

    /* Footer */
    .tc-footer {
      padding: 40px 5%; border-top: 1px solid rgba(0,0,0,.08);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 14px;
    }
    .tc-footer-logo { font-size: 17px; font-weight: 900; }
    .tc-footer-copy { font-size: 12px; opacity: .4; }
    .tc-footer-links { display: flex; gap: 18px; font-size: 12.5px; opacity: .45; font-weight: 600; }
    .tc-footer-links a { text-decoration: none; color: inherit; }

    /* Video */
    .tc-video-section { padding: 56px 5%; text-align: center; }
    .tc-video-box {
      border-radius: var(--radius); height: 340px; overflow: hidden;
      position: relative; background: var(--card-bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; margin-top: 20px;
    }
    .tc-video-box iframe { width: 100%; height: 100%; border: none; }
    .tc-play-circle {
      width: 64px; height: 64px; border-radius: 50%; background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer;
    }

    /* Countdown */
    .tc-countdown-section { padding: 56px 5%; text-align: center; }
    .tc-countdown-row { display: flex; gap: 14px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .tc-cd-unit { border-radius: var(--radius); padding: 18px 24px; min-width: 72px; background: var(--card-bg); }
    .tc-cd-num { font-size: 38px; font-weight: 900; line-height: 1; color: var(--primary); }
    .tc-cd-label { font-size: 11px; font-weight: 700; opacity: .45; text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }

    /* Gallery */
    .tc-gallery-section { padding: 56px 5%; }
    .tc-gallery-grid { display: grid; gap: 12px; }
    .tc-gallery-item {
      background: var(--card-bg); border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; overflow: hidden;
    }
    .tc-gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Trust Badges */
    .tc-trust-section { padding: 32px 5%; }
    .tc-trust-grid { display: grid; gap: 12px; }
    .tc-trust-item { display: flex; align-items: center; gap: 12px; padding: 10px; }
    .tc-trust-icon { font-size: 20px; }
    .tc-trust-label { font-size: 13px; font-weight: 700; }
    .tc-trust-sub { font-size: 12px; opacity: .55; }

    /* FAQ */
    .tc-faq-section { padding: 56px 5%; }
    .tc-faq-item { border-bottom: 1px solid rgba(0,0,0,.08); padding: 18px 0; }
    .tc-faq-q { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .tc-faq-a { font-size: 13.5px; opacity: .6; line-height: 1.65; }

    /* Category pills */
    .cat-pill {
      padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 999px;
      font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text2);
      background: #fff; transition: all .15s; font-family: var(--font);
    }
    .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
    .cat-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Skeleton shimmer */
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .tc-skeleton {
      background: linear-gradient(90deg, #e8eaf0 25%, #f1f5f9 50%, #e8eaf0 75%) !important;
      background-size: 400px 100% !important;
      animation: shimmer 1.2s ease-in-out infinite !important;
      border-radius: var(--radius);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; padding: 16px; }
      .filters { position: static; }
      .tc-navbar { height: 52px !important; padding: 0 4% !important; }
      .nav-logo { font-size: 18px !important; }
      .nav-links { display: none !important; }
      .tc-hero { padding: 36px 4% 28px !important; }
      .tc-hero h1 { font-size: 26px !important; }
      .tc-hero p { font-size: 13px !important; }
      .btn-cta { padding: 10px 20px !important; font-size: 13px !important; }
      .tc-section { padding: 32px 4% !important; }
      .tc-section-title { font-size: 20px !important; }
      .tc-products-grid { grid-template-columns: repeat(2,1fr) !important; gap: 10px !important; }
      .tc-cats-grid { grid-template-columns: repeat(2,1fr) !important; }
      .tc-testimonials-grid { grid-template-columns: 1fr !important; }
      .tc-footer { flex-direction: column !important; text-align: center !important; }
      .tc-newsletter-form { flex-direction: column !important; }
      .tc-newsletter-input { min-width: unset !important; width: 100% !important; }
      .products-grid { grid-template-columns: repeat(2,1fr) !important; gap: 10px !important; }
    }
  </style>
</head>
<body>

  <!-- Original sticky header (hidden when theme has navbar section) -->
  <header id="origHeader">
    <div class="header-inner">
      <a class="store-logo" href="javascript:void(0)" id="storeLogo" onclick="scrollToTop()">
        <span class="store-logo-text" id="storeName">Shop</span>
      </a>
      <div class="search-bar">
        <input type="text" id="origSearchInput" placeholder="Search products..." oninput="updateSearch(this.value)">
      </div>
      <div class="pay-badge" id="payBadge" style="display:none;">⚡ Online Payments</div>
      <a href="javascript:void(0)" id="accountBtn"
        style="display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:700;color:var(--text2);text-decoration:none;white-space:nowrap;transition:all .15s;"
        onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">
        👤 <span id="accountBtnLabel">Account</span>
      </a>
      <a href="cart.html?store=..." class="cart-btn" id="cartBtn">
        🛒 Cart <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </header>

  <!-- Original hero (hidden when theme has hero section) -->
  <div id="heroBanner">
    <div class="hero-content">
      <h1 id="heroTitle">Welcome</h1>
      <p id="heroTagline">Discover amazing products</p>
    </div>
  </div>

  <!-- Theme sections: announcement, navbar, hero, featured, categories go here (ABOVE products) -->
  <div id="theme-sections-top"></div>

  <!-- Real browsable products grid — always shown, positioned after featured/categories -->
  <div id="mainLayout" style="padding:48px 5%;">
    <a id="mainProducts" style="display:block;position:relative;visibility:hidden;"></a>

    <!-- Section header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <h2 id="allProductsTitle" style="font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--text);">All Products</h2>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="position:relative;">
          <input type="text" id="mainSearchInput" placeholder="Search products..."
            oninput="updateSearch(this.value)"
            style="padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13.5px;font-family:var(--font);outline:none;background:var(--surface);color:var(--text);width:200px;transition:border-color .15s;"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
          <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;">🔍</span>
        </div>
        <select id="sortSelect" onchange="loadProducts()"
          style="padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13.5px;font-family:var(--font);outline:none;background:var(--surface);color:var(--text);cursor:pointer;">
          <option value="">Newest</option>
          <option value="price_asc">Price: Low → High</option>
          <option value="price_desc">Price: High → Low</option>
          <option value="name_asc">Name: A → Z</option>
        </select>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="number" id="priceMin" placeholder="Min ₹" min="0"
            style="width:80px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);outline:none;background:var(--surface);color:var(--text);">
          <span style="color:var(--text3);font-size:12px;">—</span>
          <input type="number" id="priceMax" placeholder="Max ₹" min="0"
            style="width:80px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);outline:none;background:var(--surface);color:var(--text);">
          <button onclick="loadProducts()"
            style="padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);">Apply</button>
        </div>
      </div>
    </div>

    <!-- Category pills (populated from real API) -->
    <div id="catPills" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
      <button class="cat-pill active" data-cat="" onclick="selectCatPill(this,'')">🛍 All</button>
    </div>

    <!-- Hidden sidebar catList kept for compatibility -->
    <div id="catList" style="display:none;"></div>

    <!-- Results bar -->
    <div style="margin-bottom:16px;">
      <span id="resultsCount" style="font-size:13.5px;color:var(--text2);font-weight:500;">Loading...</span>
    </div>

    <!-- Products grid -->
    <div class="products-grid" id="productsGrid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- Theme sections: testimonials, newsletter, footer go here (BELOW products) -->
  <div id="theme-sections-bottom"></div>

  <div class="cart-bar" id="cartBar">
    <div class="cart-bar-info">
      <span id="cartBarQty"></span>
      <strong id="cartBarTotal"></strong>
    </div>
    <a href="cart.html?store=..." class="cart-bar-btn" id="cartBarBtn">View Cart →</a>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ========== GLOBAL VARIABLES ==========
    const slug = new URLSearchParams(location.search).get('store')
    if (!slug) {
      document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif;"><h2>Store not found</h2><p>Please provide a store parameter in the URL.</p></div>'
    }

    const API = 'https://apiv2.aasaitech.in'
    const root = document.documentElement
    let storeConfig = {}
    let currentCat = ''
    let currentPage = 1
    let searchTimeout = null
    let currency = '₹'
    let themeData = null
    let searchQuery = ''  // unified search term

    // ========== HELPER FUNCTIONS ==========
    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }
    function isLightColor(hex) {
      const c = (hex || '').replace('#','')
      if (c.length !== 6) return true
      const r = parseInt(c.slice(0,2),16), g = parseInt(c.slice(2,4),16), b = parseInt(c.slice(4,6),16)
      return (r*299 + g*587 + b*114) / 1000 > 128
    }

    // Unified search update
    function updateSearch(val) {
      searchQuery = val
      // sync both input fields
      const orig = document.getElementById('origSearchInput')
      const main = document.getElementById('mainSearchInput')
      if (orig) orig.value = val
      if (main) main.value = val
      clearTimeout(searchTimeout)
      searchTimeout = setTimeout(() => {
        currentPage = 1
        loadProducts()
      }, 350)
    }

    // Scroll to top smoothly
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    // Scroll to element by ID with offset for sticky header
    function scrollToElement(elId) {
      const el = document.getElementById(elId)
      if (!el) return
      const navbar = document.querySelector('.tc-navbar') || document.getElementById('origHeader')
      const offset = navbar ? navbar.offsetHeight + 10 : 70
      const y = el.getBoundingClientRect().top + window.pageYOffset - offset
      window.scrollTo({ top: y, behavior: 'smooth' })
    }

    // Adjust hidden anchor offset based on sticky navbar height
    function adjustMainProductsOffset() {
      const anchor = document.getElementById('mainProducts')
      if (!anchor) return
      const navbar = document.querySelector('.tc-navbar') || document.getElementById('origHeader')
      const height = navbar ? navbar.offsetHeight : 0
      anchor.style.top = `-${height + 20}px`
    }

    // Toast message
    function toast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.classList.add('show')
      setTimeout(() => t.classList.remove('show'), 2000)
    }

    // Demo newsletter subscription
    function subscribeNewsletter() {
      const email = document.querySelector('.tc-newsletter-input')?.value
      if (email) {
        toast(`📧 Subscribed (demo) for ${email}`)
      } else {
        toast('Please enter your email')
      }
    }

    // Play video (demo)
    function playVideo(url) {
      if (url) {
        window.open(url, '_blank')
      } else {
        toast('No video configured')
      }
    }

    // ========== THEME LOADING & RENDERING ==========
    async function loadTheme() {
      try {
        const res = await fetch(`${API}/shop/${slug}/theme`)
        if (!res.ok) return
        themeData = await res.json()
        applyThemeSettings(themeData.settings || {})
        renderThemeSections(themeData.sections || [])
      } catch(e) {
        console.warn('[theme] load failed:', e.message)
      }
    }

    function applyThemeSettings(s) {
      const primary   = s.primaryColor   || s.primary_color   || '#6c63ff'
      const secondary = s.bgColor        || s.secondary_color  || s.bg_color || '#f8f9fc'
      const navBg     = s.navBg          || s.nav_bg           || '#ffffff'
      const cardBg    = s.cardBg         || s.card_bg          || '#ffffff'
      const textColor = s.textColor      || s.text_color       || '#1a1a2e'
      const radius    = s.radius         || s.border_radius    || '12px'
      const font      = s.fontHeading    || s.font_heading     || 'Outfit'
      const btnStyle  = s.buttonStyle    || s.button_style     || 'rounded'

      root.style.setProperty('--primary', primary)
      root.style.setProperty('--accent', primary)
      root.style.setProperty('--bg', secondary)
      root.style.setProperty('--nav-bg', navBg)
      root.style.setProperty('--card-bg', cardBg)
      root.style.setProperty('--text', textColor)
      root.style.setProperty('--radius', radius)
      root.style.setProperty('--font', `'${font}', sans-serif`)
      root.style.setProperty('--btn-r', btnStyle === 'pill' ? '999px' : btnStyle === 'square' ? '3px' : radius)
      const cols = s.cols || s.columns || 3
      root.style.setProperty('--cols', window.innerWidth <= 768 ? '2' : String(parseInt(cols) || 3))
      document.body.style.background = secondary

      const hero = document.getElementById('heroBanner')
      if (hero) hero.style.background = `linear-gradient(135deg, ${primary}, ${primary}99)`
    }

    function renderThemeSections(sections) {
      const isMobile = window.innerWidth <= 768
      const settings = (themeData && themeData.settings) ? themeData.settings : {}

      const visible = sections
        .filter(s => s.is_visible !== false && s.enabled !== false)
        .sort((a, b) => (a.order || 0) - (b.order || 0))

      if (!visible.length) return

      const TOP_TYPES    = new Set(['announcement','navbar','hero','featured','categories'])
      const BOTTOM_TYPES = new Set(['testimonials','newsletter','banner','faq','trustbadges','gallery','countdown','video','footer','richtext','about','contact','team','imagetext','brands','offers'])

      const topSections    = visible.filter(s => TOP_TYPES.has(s.type))
      const bottomSections = visible.filter(s => BOTTOM_TYPES.has(s.type))

      const topContainer    = document.getElementById('theme-sections-top')
      const bottomContainer = document.getElementById('theme-sections-bottom')

      if (topContainer)    topContainer.innerHTML    = topSections.map(s => buildSectionHTML(s, settings, isMobile)).join('')
      if (bottomContainer) bottomContainer.innerHTML = bottomSections.map(s => buildSectionHTML(s, settings, isMobile)).join('')

      const hasNavbar = visible.some(s => s.type === 'navbar')
      document.getElementById('origHeader').style.display = hasNavbar ? 'none' : ''

      const hasHero = visible.some(s => s.type === 'hero')
      document.getElementById('heroBanner').style.display = hasHero ? 'none' : ''

      updateThemeNavCart()
      adjustMainProductsOffset()
      window.addEventListener('resize', adjustMainProductsOffset)

      visible.filter(s => s.type === 'countdown').forEach(sec => {
        const d = getSectionData(sec)
        if (d.targetDate) startCountdown(sec.id, d.targetDate)
      })

      // Attach click handlers to navbar links for smooth scrolling
      setupNavLinks()
    }

    function setupNavLinks() {
      // Handle all hash links (including those in navbar, hero, etc.)
      document.querySelectorAll('a[href^="#"]').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault()
          const id = link.getAttribute('href').substring(1)
          if (id === 'mainProducts' || id === 'catPills') {
            scrollToElement(id)
          } else {
            // try to find any element with that id
            const target = document.getElementById(id)
            if (target) scrollToElement(id)
          }
        })
      })

      // Also handle navbar links that might not be hash links
      const navHome = document.querySelector('.nav-links a[href*="home"]') || document.querySelector('.nav-links a:first-child')
      if (navHome) {
        navHome.addEventListener('click', (e) => {
          e.preventDefault()
          scrollToTop()
        })
      }
      const navProducts = document.querySelector('.nav-links a[href*="products"]')
      if (navProducts) {
        navProducts.addEventListener('click', (e) => {
          e.preventDefault()
          scrollToElement('mainProducts')
        })
      }
      const navCategories = document.querySelector('.nav-links a[href*="categories"]')
      if (navCategories) {
        navCategories.addEventListener('click', (e) => {
          e.preventDefault()
          scrollToElement('catPills')
        })
      }

      // Logo click
      const logo = document.querySelector('.nav-logo')
      if (logo) {
        logo.style.cursor = 'pointer'
        logo.addEventListener('click', scrollToTop)
      }
    }

    // ... (getSectionData function remains exactly the same as before) ...
    function getSectionData(sec) {
      const d = sec.data || {}
      const s = sec.settings || {}
      return {
        heading:       d.heading       || s.heading       || s.title       || '',
        subheading:    d.subheading    || s.subheading    || s.text        || '',
        title:         d.title         || s.heading       || s.title       || '',
        subtitle:      d.subtitle      || s.subheading    || '',
        text:          d.text          || s.text          || '',
        ctaText:       d.ctaText       || s.button_text   || s.ctaText     || '',
        ctaLink:       d.ctaLink       || s.button_url    || s.ctaLink     || '#mainProducts',
        cta2Text:      d.cta2Text      || s.cta2Text      || '',
        cta2Link:      d.cta2Link      || s.cta2Link      || '#',
        bgColor:       d.bgColor       || s.bg_color      || s.bgColor     || '',
        textColor:     d.textColor     || s.text_color    || s.textColor   || '',
        bgImage:       d.bgImage       || s.image_url     || s.bgImage     || '',
        layout:        d.layout        || s.layout        || 'center',
        style:         d.style         || s.style         || 'card',
        columns:       d.columns       || s.columns       || 3,
        count:         d.count         || s.limit         || 8,
        size:          d.size          || s.size          || 'normal',
        textAlign:     d.textAlign     || s.text_align    || 'center',
        sticky:        d.sticky        || s.sticky        || 'yes',
        logoText:      d.logoText      || s.logo_text     || '',
        logoColor:     d.logoColor     || s.logo_color    || '',
        logoUrl:       d.logoUrl       || s.logo_url      || '',
        linkColor:     d.linkColor     || s.link_color    || '',
        showSearch:    d.showSearch    || s.show_search   || 'yes',
        showCart:      d.showCart      || s.show_cart     || 'yes',
        textSize:      d.textSize      || s.text_size     || 'normal',
        bold:          d.bold          || s.bold          || 'yes',
        overlayColor:  d.overlayColor  || s.overlay_color || 'rgba(0,0,0,0.4)',
        overlayOpacity:d.overlayOpacity|| s.overlay_opacity || 40,
        cardBg:        d.cardBg        || s.card_bg       || '',
        cardStyle:     d.cardStyle     || s.card_style    || 'shadow',
        priceColor:    d.priceColor    || s.price_color   || '',
        btnText:       d.btnText       || s.button_text   || 'Add to Cart',
        showOldPrice:  d.showOldPrice  || s.show_old_price|| 'yes',
        showRating:    d.showRating    || s.show_rating   || 'no',
        showBadge:     d.showBadge     || s.show_badge    || 'no',
        badgeText:     d.badgeText     || s.badge_text    || 'New',
        badge1:        d.badge1        || s.badge1        || 'Free Shipping',
        badge2:        d.badge2        || s.badge2        || 'Secure Payment',
        badge3:        d.badge3        || s.badge3        || 'Easy Returns',
        badge4:        d.badge4        || s.badge4        || '24/7 Support',
        badge1Icon:    d.badge1Icon    || s.badge1Icon    || '🚚',
        badge2Icon:    d.badge2Icon    || s.badge2Icon    || '🔒',
        badge3Icon:    d.badge3Icon    || s.badge3Icon    || '↩️',
        badge4Icon:    d.badge4Icon    || s.badge4Icon    || '💬',
        badge1sub:     d.badge1sub     || s.badge1sub     || '',
        badge2sub:     d.badge2sub     || s.badge2sub     || '',
        badge3sub:     d.badge3sub     || s.badge3sub     || '',
        badge4sub:     d.badge4sub     || s.badge4sub     || '',
        t1name:        d.t1name        || 'Sarah M.',
        t1text:        d.t1text        || 'Absolutely love this store! Fast shipping and great quality.',
        t1stars:       d.t1stars       || 5,
        t2name:        d.t2name        || 'Rahul K.',
        t2text:        d.t2text        || 'Best shopping experience. Will definitely order again!',
        t2stars:       d.t2stars       || 5,
        t3name:        d.t3name        || 'Anita P.',
        t3text:        d.t3text        || 'Great products and excellent customer service.',
        t3stars:       d.t3stars       || 5,
        q1:d.q1||s.q1||'', a1:d.a1||s.a1||'',
        q2:d.q2||s.q2||'', a2:d.a2||s.a2||'',
        q3:d.q3||s.q3||'', a3:d.a3||s.a3||'',
        q4:d.q4||s.q4||'', a4:d.a4||s.a4||'',
        q5:d.q5||s.q5||'', a5:d.a5||s.a5||'',
        inputPlaceholder: d.inputPlaceholder || 'Enter your email address',
        btnColor:     d.btnColor     || '',
        footerText:   d.footerText   || s.footerText   || `© ${new Date().getFullYear()} My Store. All rights reserved.`,
        showSocial:   d.showSocial   || 'yes',
        instagramUrl: d.instagramUrl || '#',
        facebookUrl:  d.facebookUrl  || '#',
        twitterUrl:   d.twitterUrl   || '#',
        col1Title:    d.col1Title    || '',
        col1Links:    d.col1Links    || '',
        col2Title:    d.col2Title    || '',
        col2Links:    d.col2Links    || '',
        videoUrl:     d.videoUrl     || s.video_url    || '',
        targetDate:   d.targetDate   || d.endDate     || s.target_date  || s.endDate || '',
        subtext:      d.subtext      || s.subtext      || '',
        ctaText2:     d.ctaText      || '',
        expiredText:  d.expiredText  || 'Offer has ended',
        imgAspect:    d.imgAspect    || 'square',
        img1:d.img1||'', img2:d.img2||'', img3:d.img3||'',
        img4:d.img4||'', img5:d.img5||'', img6:d.img6||'',
        couponCode:   d.couponCode   || '',
        accentColor:  d.accentColor  || '',
        link1Text:d.link1Text||'Home', link2Text:d.link2Text||'Products',
        link3Text:d.link3Text||'Categories', link4Text:d.link4Text||'About',
        link5Text:d.link5Text||'Blog',
        cartText:     d.cartText     || 'Cart',
        tagline:      d.tagline      || '',
      }
    }

    // ... (buildSectionHTML modified for banner, newsletter, video, footer) ...
    function buildSectionHTML(sec, settings, isMobile) {
      const d = getSectionData(sec)
      const sid = escHtml(sec.id || '')

      switch(sec.type) {

        case 'announcement': {
          const sz = d.textSize === 'large' ? '15px' : d.textSize === 'small' ? '11px' : '13px'
          const fw = d.bold === 'no' ? '500' : '700'
          const bg = d.bgColor || ''
          const tc = d.textColor || ''
          return `<div class="announcement-bar" style="${bg?'background:'+bg+';':''}${tc?'color:'+tc+';':''}font-size:${sz};font-weight:${fw};">
            ${escHtml(d.text || '✨ Free shipping on all orders above ₹499!')}
          </div>`
        }

        case 'navbar': {
          const pos = d.sticky !== 'no' ? 'sticky' : 'relative'
          const navBg = d.bgColor || ''
          const logoColor = d.logoColor || ''
          const logoText = d.logoText || storeConfig.name || 'My Store'
          return `<nav class="tc-navbar" style="${navBg?'background:'+navBg+';':''}position:${pos};top:0;z-index:200;" id="themeNavbar">
            <div class="nav-logo" style="${logoColor?'color:'+logoColor+';':''} cursor:pointer;" onclick="scrollToTop()">
              ${d.logoUrl ? `<img src="${d.logoUrl}" class="nav-logo-img" alt="${escHtml(logoText)}">` : escHtml(logoText)}
            </div>
            ${!isMobile ? `<div class="nav-links" style="${d.linkColor?'color:'+d.linkColor+';':''}">
              <a href="javascript:void(0)" onclick="scrollToTop()">${escHtml(d.link1Text||'Home')}</a>
              <a href="javascript:void(0)" onclick="scrollToElement('mainProducts')">${escHtml(d.link2Text||'Products')}</a>
              <a href="javascript:void(0)" onclick="scrollToElement('catPills')">${escHtml(d.link3Text||'Categories')}</a>
              ${d.link4Text ? `<a href="javascript:void(0)" onclick="scrollToElement('${d.link4Text.toLowerCase()}')">${escHtml(d.link4Text)}</a>` : ''}
              ${d.link5Text && d.link5Text !== 'Blog' ? `<a href="javascript:void(0)">${escHtml(d.link5Text)}</a>` : ''}
            </div>` : ''}
            <div class="nav-right">
              ${d.showSearch !== 'no' ? `<button class="nav-search-btn" onclick="document.getElementById('mainSearchInput').focus()">🔍</button>` : ''}
              ${d.showCart !== 'no' ? `<a href="cart.html?store=${slug}" class="nav-cart-btn" id="themeNavCartBtn">🛒 ${escHtml(d.cartText||'Cart')} (<span class="theme-cart-qty">0</span>)</a>` : ''}
            </div>
          </nav>`
        }

        case 'hero': {
          const heading = escHtml(d.heading || 'Welcome to our Store').replace(/(store|shop)/gi, m => `<em>${m}</em>`)
          const align = d.textAlign || 'center'
          const padMap = {
            compact: isMobile ? '32px 5% 28px' : '48px 5% 40px',
            normal:  isMobile ? '48px 5% 40px' : '80px 5% 72px',
            tall:    isMobile ? '72px 5% 60px' : '120px 5% 100px',
            fullscreen: isMobile ? '80px 5%' : '160px 5%'
          }
          const pad = padMap[d.size] || padMap.normal
          const bgStyle = d.bgImage ? '' : (d.bgColor ? `background:${d.bgColor};` : 'background:var(--bg);')
          const overlayStyle = d.bgImage && d.overlayColor
            ? `background:${d.overlayColor};opacity:${(parseInt(d.overlayOpacity)||40)/100};`
            : 'opacity:0;'
          return `<section class="tc-hero" style="${bgStyle}padding:${pad};text-align:${align};">

    // Countdown with expired message
    function startCountdown(secId, targetDate) {
      const target = new Date(targetDate).getTime()
      function tick() {
        const now = new Date().getTime()
        const diff = target - now
        const container = document.getElementById(`countdown-${secId}`)
        if (!container) return

        if (diff <= 0) {
          container.querySelector('.tc-countdown-row').innerHTML = `<div style="font-size:18px;opacity:.6">${d.expiredText || 'Offer has ended'}</div>`
          return
        }
        const days  = Math.floor(diff / 86400000)
        const hours = Math.floor((diff % 86400000) / 3600000)
        const mins  = Math.floor((diff % 3600000)  / 60000)
        const secs  = Math.floor((diff % 60000)    / 1000)
        const pad = n => String(n).padStart(2,'0')
        const el = (cls) => document.getElementById(`${secId}-${cls}`)
        if (el('cd-days'))  el('cd-days').textContent  = pad(days)
        if (el('cd-hours')) el('cd-hours').textContent = pad(hours)
        if (el('cd-mins'))  el('cd-mins').textContent  = pad(mins)
        if (el('cd-secs'))  el('cd-secs').textContent  = pad(secs)
      }
      tick()
      setInterval(tick, 1000)
    }

    // Update theme navbar cart count
    function updateThemeNavCart() {
      const cart = getCart()
      const qty = cart.reduce((s,x) => s + x.qty, 0)
      document.querySelectorAll('.theme-cart-qty').forEach(el => el.textContent = qty)
    }

    // ========== STORE INIT ==========
    async function init() {
      try {
        storeConfig = await fetch(`${API}/shop/${slug}/config`).then(r => r.json())
        if (storeConfig.error) throw new Error(storeConfig.error)

        document.title = storeConfig.name + ' — Shop'
        document.getElementById('storeName').textContent = storeConfig.name
        document.getElementById('heroTitle').textContent = storeConfig.name
        document.getElementById('heroTagline').textContent = storeConfig.tagline || storeConfig.description || 'Discover amazing products'

        if (storeConfig.logo_url) {
          const img = document.createElement('img')
          img.src = storeConfig.logo_url
          document.getElementById('storeLogo').prepend(img)
        }
        if (storeConfig.brand_color) {
          root.style.setProperty('--accent', storeConfig.brand_color)
          root.style.setProperty('--primary', storeConfig.brand_color)
          document.getElementById('heroBanner').style.background =
            `linear-gradient(135deg,${storeConfig.brand_color},${storeConfig.brand_color}99)`
        }
        if (storeConfig.currency === 'USD') currency = '$'
        else if (storeConfig.currency === 'EUR') currency = '€'
        if (storeConfig.payment_enabled) document.getElementById('payBadge').style.display = 'flex'

        sessionStorage.setItem('ekart_store', slug)
        sessionStorage.setItem('ekart_currency', currency)
        sessionStorage.setItem('ekart_store_name', storeConfig.name)
        sessionStorage.setItem('ekart_pay_enabled', storeConfig.payment_enabled ? '1' : '0')

        document.getElementById('cartBtn').href = `cart.html?store=${slug}`
        document.getElementById('cartBarBtn').href = `cart.html?store=${slug}`

        const custToken = localStorage.getItem(`cust_token_${slug}`)
        const custName  = localStorage.getItem(`cust_name_${slug}`)
        const acctBtn   = document.getElementById('accountBtn')
        if (acctBtn) {
          acctBtn.href = custToken ? `customer-account.html?store=${slug}` : `customer-login.html?store=${slug}`
          document.getElementById('accountBtnLabel').textContent = (custToken && custName) ? custName.split(' ')[0] : 'Login'
        }

        await loadCategories()
        await loadProducts()
        updateCartUI()

        await loadTheme()

      } catch(e) {
        document.body.innerHTML = `<div style="text-align:center;padding:80px;font-family:sans-serif;">
          <h2>Store not found</h2><p style="color:#888;margin-top:8px;">${e.message}</p>
        </div>`
      }
    }

    // ... (loadCategories, selectCatPill, loadProducts, renderProducts, etc. remain exactly the same as before) ...
    let storeCategories = []
    async function loadCategories() {
      try {
        const cats = await fetch(`${API}/shop/${slug}/categories`).then(r => r.json())
        storeCategories = Array.isArray(cats) ? cats : []

        const list = document.getElementById('catList')
        if (list) {
          list.innerHTML = `<div class="cat-item active" data-cat="" onclick="selectCat(this,'')">🛍 All</div>` +
            storeCategories.map(c =>
              `<div class="cat-item" data-cat="${c._id}" onclick="selectCat(this,'${c._id}')">${escHtml(c.name)}</div>`
            ).join('')
        }

        const pills = document.getElementById('catPills')
        if (pills) {
          pills.innerHTML = `<button class="cat-pill active" data-cat="" onclick="selectCatPill(this,'')">🛍 All</button>` +
            storeCategories.map(c =>
              `<button class="cat-pill" data-cat="${c._id}" onclick="selectCatPill(this,'${c._id}')">${escHtml(c.name)}</button>`
            ).join('')
        }
      } catch(e) { console.error('[categories]', e) }
    }

    function selectCatPill(el, catId) {
      document.querySelectorAll('.cat-pill').forEach(x => x.classList.remove('active'))
      el.classList.add('active')
      currentCat = catId; currentPage = 1; loadProducts()
    }

    async function loadProducts() {
      const params   = new URLSearchParams({ page: currentPage })
      if (searchQuery) params.set('q', searchQuery)
      if (currentCat) params.set('category', currentCat)
      const sort = document.getElementById('sortSelect').value
      if (sort) params.set('sort', sort)
      const minPrice = document.getElementById('priceMin').value
      const maxPrice = document.getElementById('priceMax').value
      if (minPrice) params.set('min_price', minPrice)
      if (maxPrice) params.set('max_price', maxPrice)

      try {
        const data = await fetch(`${API}/shop/${slug}/products?${params}`).then(r => r.json())
        document.getElementById('resultsCount').textContent =
          `${data.total} product${data.total !== 1 ? 's' : ''} found`
        renderProducts(data.products || [])
        renderPagination(data.page, data.pages)
      } catch(e) {
        console.error('[products]', e)
        document.getElementById('resultsCount').textContent = 'Failed to load products'
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid')
      if (!products.length) {
        grid.innerHTML = `<div class="empty">
          <div class="empty-icon">🔍</div>
          <h3>No products found</h3>
          <p>Try a different search or category</p>
        </div>`
        return
      }
      grid.innerHTML = products.map(p => renderGridCard(p)).join('')
    }

    function discountPct(p) {
      return p.compare_at_price && p.compare_at_price > p.price
        ? Math.round((1 - p.price / p.compare_at_price) * 100) : 0
    }
    function isOOS(p) { return p.track_inventory && p.stock_qty <= 0 }

    function renderGridCard(p) {
      const d   = discountPct(p)
      const oos = isOOS(p)
      const img = p.images?.[0]
        ? `<img src="${p.images[0]}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=font-size:48px>📦</span>'">`
        : '<span style="font-size:48px;">📦</span>'
      return `<a class="product-card" href="product.html?store=${slug}&id=${p._id}" style="background:var(--card-bg);border-radius:var(--radius);">
        ${d >= 5 ? `<div class="product-badge sale">−${d}%</div>` : ''}
        <div class="product-img">${img}</div>
        <div class="product-info">
          ${p.category_name ? `<div class="product-cat">${escHtml(p.category_name)}</div>` : ''}
          <div class="product-name">${escHtml(p.name)}</div>
          <div class="product-price-row">
            <span class="product-price" style="color:var(--accent)">${currency}${p.price.toFixed(2)}</span>
            ${p.compare_at_price ? `<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
            ${d ? `<span class="product-discount">${d}% off</span>` : ''}
          </div>
          ${oos
            ? `<div class="out-badge">Out of Stock</div>`
            : `<button class="btn-add" id="btn-${p._id}" onclick="event.preventDefault();addToCart('${p._id}','${(p.name||'').replace(/'/g,"\\'")}',${p.price},'${p.images?.[0]||''}')">🛒 Add to Cart</button>`
          }
        </div>
      </a>`
    }

    function renderPagination(page, pages) {
      const el = document.getElementById('pagination')
      if (!pages || pages <= 1) { el.innerHTML = ''; return }
      let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>← Prev</button>`
      for (let i = 1; i <= pages; i++) {
        if (pages <= 7 || i === 1 || i === pages || Math.abs(i-page) <= 2)
          html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`
        else if (Math.abs(i-page) === 3)
          html += '<span style="padding:8px;color:var(--text3);">…</span>'
      }
      html += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>Next →</button>`
      el.innerHTML = html
    }

    function goPage(p)         { currentPage = p; loadProducts(); window.scrollTo({top:0,behavior:'smooth'}) }
    function selectCat(el, id) {
      document.querySelectorAll('.cat-item').forEach(x => x.classList.remove('active'))
      el.classList.add('active')
      document.querySelectorAll('.cat-pill').forEach(x =>
        x.classList.toggle('active', x.dataset.cat === id))
      currentCat = id; currentPage = 1; loadProducts()
    }

    // ========== CART ==========
    function getCart()     { return JSON.parse(localStorage.getItem('cart_'+slug) || '[]') }
    function saveCart(c)   { localStorage.setItem('cart_'+slug, JSON.stringify(c)) }

    function addToCart(id, name, price, image) {
      const cart = getCart()
      const ex   = cart.find(x => x.product_id === id && !x.variant)
      if (ex) ex.qty++
      else cart.push({ product_id: id, name, price, image, qty: 1 })
      saveCart(cart)
      updateCartUI()
      const btn = document.getElementById('btn-'+id)
      if (btn) {
        btn.textContent = '✅ Added!'
        btn.classList.add('added')
        setTimeout(() => { btn.textContent = '🛒 Add to Cart'; btn.classList.remove('added') }, 1200)
      }
      toast('Added to cart! 🛒')
    }

    function updateCartUI() {
      const cart = getCart()
      const qty  = cart.reduce((s,x) => s+x.qty, 0)
      const amt  = cart.reduce((s,x) => s+x.price*x.qty, 0)
      const el   = document.getElementById('cartCount')
      el.textContent = qty
      el.className   = 'cart-count' + (qty > 0 ? ' has-items' : '')
      const bar = document.getElementById('cartBar')
      if (qty > 0) {
        bar.classList.add('show')
        document.getElementById('cartBarQty').textContent    = `${qty} item${qty!==1?'s':''} — `
        document.getElementById('cartBarTotal').textContent  = `${currency}${amt.toFixed(2)}`
      } else {
        bar.classList.remove('show')
      }
      updateThemeNavCart()
    }

    // ... (fillFeaturedSection and fillCategoriesSection remain the same) ...
    async function fillFeaturedSection(secId, count, d) {
      const grid = document.getElementById(`${secId}-grid`)
      if (!grid) return
      try {
        const data = await fetch(`${API}/shop/${slug}/products?page=1&limit=${count}`).then(r => r.json())
        const products = (data.products || []).slice(0, count)
        if (!products.length) { grid.closest('section').style.display = 'none'; return }

        const cols = parseInt(grid.closest('.tc-section').querySelector('.tc-products-grid')?.style.getPropertyValue('--cols')) ||
                     (window.innerWidth <= 768 ? 2 : parseInt(d.columns) || 3)

        grid.innerHTML = products.map(p => {
          const disc = p.compare_at_price && p.compare_at_price > p.price
            ? Math.round((1 - p.price / p.compare_at_price) * 100) : 0
          const oos  = p.track_inventory && p.stock_qty <= 0
          const img  = p.images?.[0]
            ? `<img src="${p.images[0]}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=font-size:48px>📦</span>'">`
            : '<span style="font-size:48px">📦</span>'
          return `<a class="tc-product-card" href="product.html?store=${slug}&id=${p._id}" style="text-decoration:none;color:var(--text);">
            <div class="tc-product-img" style="position:relative;">
              ${disc >= 5 ? `<div class="tc-product-badge">−${disc}%</div>` : ''}
              ${img}
            </div>
            <div class="tc-product-info">
              ${p.category_name ? `<div style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">${escHtml(p.category_name)}</div>` : ''}
              <div class="tc-product-name">${escHtml(p.name)}</div>
              <div class="tc-price-row">
                <span class="tc-product-price">${currency}${p.price.toFixed(2)}</span>
                ${p.compare_at_price ? `<span class="tc-product-old">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
                ${disc ? `<span style="font-size:11px;font-weight:700;color:var(--green);background:#f0fdf4;padding:2px 6px;border-radius:4px;">${disc}% off</span>` : ''}
              </div>
              ${oos
                ? `<div style="text-align:center;font-size:12px;color:#ef4444;font-weight:700;padding:7px;background:#fef2f2;border-radius:8px;">Out of Stock</div>`
                : `<button class="tc-product-btn" onclick="event.preventDefault();addToCart('${p._id}','${(p.name||'').replace(/'/g,"\\'")}',${p.price},'${p.images?.[0]||''}')">🛒 ${escHtml(d.btnText||'Add to Cart')}</button>`
              }
            </div>
          </a>`
        }).join('')
      } catch(e) {
        console.error('[featured section]', e)
        const sec = document.getElementById(secId)
        if (sec) sec.style.display = 'none'
      }
    }

    async function fillCategoriesSection(secId, cols, d) {
      const grid = document.getElementById(`${secId}-grid`)
      if (!grid) return
      try {
        const cats = await fetch(`${API}/shop/${slug}/categories`).then(r => r.json())
        const list = Array.isArray(cats) ? cats : []
        if (!list.length) { grid.closest('section').style.display = 'none'; return }

        const emojiMap = {
          fashion:'👗', clothing:'👕', apparel:'👔', dress:'👗',
          electronics:'📱', tech:'💻', gadgets:'🎧', mobile:'📱',
          home:'🏠', living:'🛋️', furniture:'🪑', kitchen:'🍳',
          beauty:'💄', cosmetics:'💋', skincare:'✨', makeup:'💅',
          gaming:'🎮', games:'🕹️', toys:'🧸',
          food:'🍕', grocery:'🛒', beverages:'☕',
          watches:'⌚', jewellery:'💎', jewelry:'💎', accessories:'👜',
          footwear:'👟', shoes:'👠', sports:'⚽', fitness:'💪',
          books:'📚', stationery:'✏️', office:'💼',
          travel:'✈️', outdoors:'🏕️', garden:'🌿',
        }
        const getEmoji = name => {
          const lc = (name||'').toLowerCase()
          for (const [k,v] of Object.entries(emojiMap)) if (lc.includes(k)) return v
          return '🛍️'
        }

        grid.innerHTML = list.map(c => `
          <div class="tc-cat-card" onclick="filterByCat('${c._id}','${escHtml(c.name)}')">
            <div class="tc-cat-icon">${c.icon || getEmoji(c.name)}</div>
            <div class="tc-cat-name">${escHtml(c.name)}</div>
            ${d.showCount === 'yes' && c.product_count != null
              ? `<div style="font-size:11px;opacity:.45;margin-top:3px;">${c.product_count} items</div>` : ''}
          </div>`).join('')
      } catch(e) {
        console.error('[categories section]', e)
        const sec = document.getElementById(secId)
        if (sec) sec.style.display = 'none'
      }
    }

    function filterByCat(catId, catName) {
      currentCat = catId
      currentPage = 1
      document.querySelectorAll('.cat-pill').forEach(x => {
        x.classList.toggle('active', x.dataset.cat === catId)
      })
      loadProducts()
      scrollToElement('mainProducts')
    }

    if (slug) init()
  </script>
</body>
</html>

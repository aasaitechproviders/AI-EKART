<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKart Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#6c63ff;--primary:#6c63ff;
  --bg:#f8f9fc;--surface:#fff;--border:#e8eaf0;
  --text:#1a1a2e;--text2:#64748b;--text3:#94a3b8;
  --green:#16a34a;--red:#ef4444;
  --surface2:#f1f5f9;--card-bg:#fff;--nav-bg:#fff;
  --radius:14px;--btn-r:12px;
  --font:'Outfit',sans-serif;--navbar-h:64px;--cols:3;
  --card-img-min-h:220px;--card-name-fs:14px;--card-price-fs:16px;
  --card-info-pad:14px;--grid-gap:18px;--card-img-aspect:1/1;
  --sh1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --sh3:0 16px 40px rgba(0,0,0,.13),0 4px 12px rgba(0,0,0,.06);
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding-bottom:80px;-webkit-font-smoothing:antialiased}

/* LOADER */
#loader{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .4s var(--ease)}
#loader.out{opacity:0;pointer-events:none}
.ld-icon{font-size:52px;animation:ldB .9s ease-in-out infinite alternate}
.ld-bar{width:140px;height:3px;background:#e8eaf0;border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--accent);border-radius:2px;animation:ldF 1.6s ease-in-out infinite}
@keyframes ldB{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.08)}}
@keyframes ldF{0%{width:0;margin-left:0}50%{width:75%;margin-left:12%}100%{width:0;margin-left:100%}}

/* DEFAULT HEADER */
#origHeader{background:var(--nav-bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:var(--sh1)}
.hdr{max-width:1300px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:12px;height:var(--navbar-h)}
.slogo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);flex-shrink:0}
.slogo img{height:34px;object-fit:contain;border-radius:8px}
.slogo-txt{font-size:18px;font-weight:900;letter-spacing:-.03em}
.hsearch{flex:1;max-width:420px;margin:0 auto;position:relative}
.hsearch input{width:100%;padding:9px 14px 9px 40px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;font-family:var(--font);outline:none;background:var(--surface2);color:var(--text);transition:.15s}
.hsearch input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(108,99,255,.1)}
.hsearch-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.hactions{display:flex;align-items:center;gap:9px;flex-shrink:0}
.pay-badge{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:11.5px;font-weight:700;color:var(--green);white-space:nowrap}
.acct-btn{display:flex;align-items:center;gap:5px;padding:8px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:.15s;white-space:nowrap}
.acct-btn:hover{border-color:var(--accent);color:var(--accent)}
.cart-btn{display:flex;align-items:center;gap:7px;padding:9px 17px;background:var(--accent);color:#fff;border-radius:10px;text-decoration:none;font-size:13.5px;font-weight:700;white-space:nowrap;transition:.2s var(--ease)}
.cart-btn:hover{background:#7c74ff;transform:translateY(-1px);box-shadow:var(--sh2)}
.cart-count{background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px}
.cart-count.has-items{display:flex}

/* DEFAULT HERO */
#heroBanner{padding:56px 24px;text-align:center;color:#fff;position:relative;overflow:hidden;background:linear-gradient(135deg,#6c63ff,#a78bfa)}
#heroBanner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='3' fill='%23ffffff' fill-opacity='0.06'/%3E%3C/svg%3E")}
#heroBanner::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.1)}
#heroBanner .hi{position:relative;z-index:1}
#heroBanner h1{font-size:clamp(28px,5vw,54px);font-weight:900;letter-spacing:-.04em;margin-bottom:12px;line-height:1.1}
#heroBanner p{font-size:16px;opacity:.88;max-width:460px;margin:0 auto;line-height:1.65}

/* MAIN LAYOUT */
#mainLayout{max-width:1300px;margin:0 auto;padding:48px 24px}
.filters-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.filters-title{font-size:26px;font-weight:800;letter-spacing:-.025em}
.filters-right{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.fi{padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;font-family:var(--font);outline:none;background:var(--surface);color:var(--text);transition:.15s}
.fi:focus{border-color:var(--accent)}
.fi-w{position:relative}
.fi-w .fi{padding-left:34px}
.fi-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:13px}
select.fi{cursor:pointer}
.pg{display:flex;align-items:center;gap:6px}
.pg .fi{width:82px}
.apply-btn{padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.15s}
.apply-btn:hover{background:#7c74ff}
#catPills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.cat-pill{padding:7px 16px;border:1.5px solid var(--border);border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);background:var(--surface);transition:.15s;font-family:var(--font)}
.cat-pill:hover{border-color:var(--accent);color:var(--accent)}
.cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#resultsCount{font-size:13.5px;color:var(--text2);font-weight:500;display:block;margin-bottom:16px}

/* CARDS */
.product-card,.tc-product-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;color:var(--text);display:flex;flex-direction:column;position:relative;transition:transform .22s var(--ease),box-shadow .22s var(--ease)}
.product-card:hover,.tc-product-card:hover{transform:translateY(-4px);box-shadow:var(--sh3)}
.card-link{text-decoration:none;color:inherit;display:block;flex:1}
.product-img,.tc-product-img{width:100%;aspect-ratio:var(--card-img-aspect,1/1);min-height:var(--card-img-min-h,220px);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden;position:relative}
.product-img img,.tc-product-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s var(--ease)}
.product-card:hover .product-img img,.tc-product-card:hover .tc-product-img img{transform:scale(1.04)}
.product-img.img-error img,.tc-product-img.img-error img{display:none}
.product-img.img-error::before,.tc-product-img.img-error::before{content:'📦';font-size:44px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1}

/* BADGE */
.product-badge,.tc-product-badge{position:absolute;top:10px;left:10px;z-index:4;font-size:11px;font-weight:800;padding:3px 9px;border-radius:7px;color:#fff;letter-spacing:.02em}
.badge-sale{background:#ef4444}
.badge-new{background:#0ea5e9}
.badge-bestseller,.badge-hot{background:#f97316}
.badge-trending{background:#ec4899}
.badge-discount{background:#ef4444}

/* WISHLIST */
.wish-btn{position:absolute;top:10px;right:10px;z-index:4;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.2s var(--ease);box-shadow:var(--sh1)}
.wish-btn:hover{background:#fff;transform:scale(1.12)}
.wish-btn.wished{color:#ef4444}

.product-info,.tc-product-info{padding:var(--card-info-pad,14px)}
.product-cat,.tc-product-cat{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.product-name,.tc-product-name{font-size:var(--card-name-fs,14px);font-weight:700;margin-bottom:10px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.product-price-row,.tc-price-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.product-price,.tc-product-price{font-size:var(--card-price-fs,16px);font-weight:800;color:var(--accent)}
.product-compare,.tc-product-old{font-size:12px;text-decoration:line-through;color:var(--text3)}
.product-discount{font-size:11px;font-weight:700;color:var(--green);background:#f0fdf4;padding:2px 6px;border-radius:4px}
.out-badge{text-align:center;font-size:12px;color:var(--red);font-weight:700;padding:9px 12px;background:#fef2f2;border-radius:9px}
.cart-controls-wrap,.tc-btn-wrap{padding:0 var(--card-info-pad) var(--card-info-pad)}
.cart-controls{display:flex;align-items:center;justify-content:space-between;gap:6px}
.qty-btn{width:34px;height:34px;border:none;background:var(--accent);color:#fff;font-size:18px;font-weight:700;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.qty-btn:hover{opacity:.85;transform:scale(.95)}
.qty-value{font-size:15px;font-weight:800;min-width:28px;text-align:center}
.btn-add,.tc-product-btn{display:flex!important;align-items:center!important;justify-content:center!important;gap:6px;width:100%;padding:10px;background:var(--accent);color:#fff!important;border:none;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.2s var(--ease)}
.btn-add:hover,.tc-product-btn:hover{opacity:.88;transform:translateY(-1px)}

/* GRIDS */
.products-grid,.tc-products-grid{display:grid;grid-template-columns:repeat(var(--cols,3),1fr);gap:var(--grid-gap,18px)}

/* CARD STYLE VARIANTS */
.minimal-grid .product-card,.featured-minimal .tc-product-card{background:transparent;border:1.5px solid var(--border)}
.minimal-grid .product-card:hover,.featured-minimal .tc-product-card:hover{border-color:var(--accent);box-shadow:none;transform:none}
.bold-grid .product-card,.featured-bold .tc-product-card{border:none;border-top:3px solid var(--accent)}
.elevated-grid .product-card,.featured-elevated .tc-product-card{border:none;box-shadow:var(--sh2);border-radius:calc(var(--radius)*1.3)}
.elevated-grid .product-card:hover,.featured-elevated .tc-product-card:hover{transform:translateY(-8px);box-shadow:var(--sh3)}
.compact-grid .product-info,.featured-compact .tc-product-info{padding:8px 10px 10px!important}
.compact-grid .product-name,.featured-compact .tc-product-name{font-size:12px!important;margin-bottom:4px}
.compact-grid .product-price,.featured-compact .tc-product-price{font-size:13px!important}
.compact-grid .cart-controls-wrap,.compact-grid .tc-btn-wrap,.featured-compact .cart-controls-wrap,.featured-compact .tc-btn-wrap{display:none}
.compact-grid .product-card:hover,.featured-compact .tc-product-card:hover{transform:none;opacity:.85}
.compact-grid{gap:10px!important}
.list-grid{grid-template-columns:1fr!important}
.list-grid .product-card{flex-direction:row}
.list-grid .card-link{display:flex;flex:1;min-width:0}
.list-grid .product-img{width:220px;min-width:220px;aspect-ratio:auto!important;min-height:160px!important}
.list-grid .product-info{flex:1;padding:24px;display:flex;flex-direction:column;justify-content:center}
.list-grid .cart-controls-wrap{padding:0 24px 24px}
.list-grid .btn-add{width:auto;padding:9px 22px}
.featured-list .tc-products-grid{grid-template-columns:1fr!important}
.featured-list .tc-product-card{flex-direction:row}
.featured-list .card-link{display:flex;flex:1}
.featured-list .tc-product-img{width:220px;min-width:220px;aspect-ratio:auto!important;min-height:160px!important}
.featured-list .tc-product-info{flex:1;padding:24px;display:flex;flex-direction:column;justify-content:center}
.featured-list .tc-btn-wrap{padding:0 24px 24px}
.magazine-grid .product-card:first-child{grid-column:span 2}
.magazine-grid .product-card:first-child .product-img{aspect-ratio:2/1;min-height:0}
.magazine-grid .product-card{box-shadow:var(--sh1);border:none}
.featured-magazine .tc-product-card:first-child{grid-column:span 2}
.featured-magazine .tc-product-card:first-child .tc-product-img{aspect-ratio:2/1;min-height:0}
.featured-magazine .tc-product-card{box-shadow:var(--sh1);border:none}
/* OVERLAY */
.overlay-grid .product-card,.featured-overlay .tc-product-card{border:none;background:#1a1a2e}
.overlay-grid .product-card .card-link,.featured-overlay .tc-product-card .card-link{display:block;position:relative}
.overlay-grid .product-img,.featured-overlay .tc-product-img{aspect-ratio:3/4!important;min-height:0!important}
.overlay-grid .product-info,.featured-overlay .tc-product-info{display:none}
.product-overlay,.tc-overlay-inner{position:absolute;bottom:0;left:0;right:0;z-index:3;background:linear-gradient(0deg,rgba(0,0,0,.92) 0%,rgba(0,0,0,.5) 45%,transparent 100%);padding:24px 14px 14px;color:#fff;display:flex;flex-direction:column;gap:4px}
.ov-cat{font-size:10px;opacity:.65;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.ov-name{font-size:var(--card-name-fs,13.5px);font-weight:700;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ov-pr{display:flex;align-items:center;gap:8px;margin-top:2px}
.ov-price{font-size:var(--card-price-fs,16px);font-weight:800;color:#fff}
.ov-compare{font-size:12px;color:rgba(255,255,255,.5);text-decoration:line-through}
.overlay-grid .cart-controls-wrap,.featured-overlay .tc-btn-wrap{display:block!important;padding:0 12px 12px}
.overlay-grid .btn-add,.featured-overlay .tc-product-btn{background:rgba(255,255,255,.15)!important;color:#fff!important;border:1.5px solid rgba(255,255,255,.3)!important;backdrop-filter:blur(8px)}
.overlay-grid .btn-add:hover,.featured-overlay .tc-product-btn:hover{background:var(--accent)!important;border-color:var(--accent)!important}
.overlay-grid .qty-btn,.featured-overlay .qty-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3)}
.overlay-grid .qty-value,.featured-overlay .qty-value{color:#fff}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:8px;margin-top:40px;flex-wrap:wrap}
.page-btn{padding:8px 16px;border:1.5px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--font);font-size:13.5px;font-weight:600;transition:.15s}
.page-btn:hover,.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.empty{text-align:center;padding:80px 20px;color:var(--text3);grid-column:1/-1}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty h3{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px}

/* SKELETON */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.tc-skeleton{background:linear-gradient(90deg,#eef0f5 25%,#f7f8fc 50%,#eef0f5 75%)!important;background-size:600px 100%!important;animation:shimmer 1.4s ease-in-out infinite!important;border-radius:var(--radius)}

/* CART BAR */
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--text);color:#fff;padding:14px 24px;display:none;align-items:center;justify-content:space-between;z-index:300;box-shadow:0 -4px 24px rgba(0,0,0,.2)}
.cart-bar.show{display:flex}
.cart-bar-info{font-size:14px;font-weight:600}
.cart-bar-info span{color:rgba(255,255,255,.55);margin-right:10px;font-size:13px}
.cart-bar-btn{padding:10px 24px;background:var(--accent);color:#fff;border-radius:10px;text-decoration:none;font-size:14px;font-weight:700;transition:.15s}
.cart-bar-btn:hover{background:#7c74ff}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;border-radius:12px;padding:11px 20px;font-size:13.5px;font-weight:600;opacity:0;transition:all .28s var(--ease);z-index:400;white-space:nowrap;pointer-events:none;box-shadow:var(--sh3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* THEME SECTIONS */
.announcement-bar{background:var(--primary);color:#fff;text-align:center;padding:9px 16px;font-size:13px;font-weight:600;z-index:201;position:relative}
.tc-navbar{background:var(--nav-bg);padding:0 5%;height:var(--navbar-h);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.07);position:sticky;top:0;z-index:200}
.nav-logo{font-size:22px;font-weight:900;letter-spacing:-.03em;cursor:pointer}
.nav-logo-img{height:36px;object-fit:contain;border-radius:6px}
.nav-links{display:flex;gap:28px;font-size:13.5px;font-weight:600;opacity:.7}
.nav-links a{text-decoration:none;color:inherit;transition:.15s}
.nav-links a:hover{opacity:1}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-cart-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--primary);color:#fff;border-radius:var(--btn-r);font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);text-decoration:none}
/* Hero theme */
.tc-hero{padding:80px 5% 72px;text-align:center;background:var(--bg);position:relative;overflow:hidden}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.hero-overlay-div{position:absolute;inset:0;z-index:1}
.hero-content{position:relative;z-index:2}
.tc-hero h1{font-size:clamp(32px,5vw,58px);font-weight:900;line-height:1.08;letter-spacing:-.04em;margin-bottom:16px}
.tc-hero h1 em{font-style:normal;color:var(--primary)}
.tc-hero p{font-size:17px;opacity:.6;max-width:520px;margin:0 auto 32px;line-height:1.7}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-cta{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;padding:13px 30px;border-radius:var(--btn-r);font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:var(--font);transition:.2s var(--ease);text-decoration:none}
.btn-cta:hover{opacity:.88;transform:translateY(-1px)}
.btn-cta-ghost{background:transparent;color:var(--text);border:1.5px solid rgba(0,0,0,.18)}
.tc-section{padding:56px 5%}
.tc-section-title{font-size:28px;font-weight:800;letter-spacing:-.02em}
.tc-section-subtitle{font-size:14px;opacity:.5;margin-top:6px}
/* CATEGORIES with image overlay */
.tc-cats-grid{display:grid;gap:16px}
.tc-cat-card{background:var(--card-bg);border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;transition:.22s var(--ease);border:1px solid var(--border)}
.tc-cat-card:hover{transform:translateY(-3px);box-shadow:var(--sh3)}
.tc-cat-img-wrap{width:100%;aspect-ratio:1/1;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:36px}
.tc-cat-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s var(--ease)}
.tc-cat-card:hover .tc-cat-img{transform:scale(1.06)}
.tc-cat-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.8) 0%,rgba(0,0,0,.2) 60%,transparent 100%);padding:16px 14px 12px;color:#fff}
.tc-cat-name{font-size:14px;font-weight:800;color:#fff}
.tc-cat-count{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
.tc-cat-simple{padding:28px 20px;text-align:center}
.tc-cat-icon{font-size:32px;margin-bottom:8px}
.tc-cat-name-plain{font-size:14px;font-weight:700}
/* Promo */
.tc-promo-banner{color:#fff;padding:68px 5%;text-align:center}
.tc-promo-content h2{font-size:36px;font-weight:900;margin-bottom:10px}
.tc-promo-content p{opacity:.8;margin-bottom:24px;font-size:16px}
.btn-white{background:#fff;color:var(--primary);padding:12px 28px;border-radius:var(--btn-r);font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font)}
/* TRUST BADGES - dark style */
.tc-trust-section{padding:32px 5%}
.tc-trust-grid{display:grid;gap:12px}
.tc-trust-item{display:flex;align-items:center;gap:14px;padding:18px 20px;background:var(--text);border-radius:var(--radius);color:#fff}
.tc-trust-icon{font-size:26px;flex-shrink:0}
.tc-trust-label{font-size:14px;font-weight:700;color:#fff}
.tc-trust-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
/* Testimonials */
.tc-testimonials{padding:56px 5%}
.tc-testimonials-grid{display:grid;gap:16px;margin-top:28px}
.tc-testimonial{background:var(--surface);border-radius:var(--radius);padding:24px;border:1px solid var(--border)}
.tc-t-stars{color:#f59e0b;font-size:15px;margin-bottom:12px;letter-spacing:2px}
.tc-t-text{font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:16px}
.tc-t-author{display:flex;align-items:center;gap:10px}
.tc-t-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.tc-t-name{font-size:13px;font-weight:700}
/* NEWSLETTER dark input */
.tc-newsletter{padding:72px 5%;text-align:center}
.tc-newsletter h2{font-size:32px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
.tc-newsletter p{opacity:.55;margin-bottom:32px;font-size:15px}
.tc-newsletter-form{display:flex;gap:10px;max-width:500px;margin:0 auto;flex-wrap:wrap}
.tc-newsletter-input{flex:1;min-width:200px;padding:13px 18px;border:none;border-radius:var(--btn-r);font-size:14px;background:var(--text);color:#fff;font-family:var(--font);outline:none}
.tc-newsletter-input::placeholder{color:rgba(255,255,255,.4)}
.tc-newsletter-form .btn-cta{white-space:nowrap;width:auto!important;display:inline-flex!important}
.tc-newsletter-note{font-size:12px;color:var(--text3);margin-top:12px}
/* Footer */
.tc-footer{padding:52px 5% 28px;border-top:1px solid var(--border)}
.tc-footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:48px;margin-bottom:40px}
.tc-footer-logo{font-size:20px;font-weight:900;margin-bottom:8px;cursor:pointer;letter-spacing:-.02em}
.tc-footer-tagline{font-size:13px;opacity:.45;line-height:1.7;margin-bottom:20px;max-width:280px}
.tc-footer-col-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;opacity:.35;margin-bottom:16px}
.tc-footer-col-links{display:flex;flex-direction:column;gap:10px}
.tc-footer-col-links a{font-size:13.5px;opacity:.55;font-weight:600;cursor:pointer;text-decoration:none;color:inherit;transition:.15s}
.tc-footer-col-links a:hover{opacity:1}
.tc-footer-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-top:24px;border-top:1px solid var(--border)}
.tc-footer-copy{font-size:12px;opacity:.35}
.tc-footer-social{display:flex;gap:8px}
.tc-social-btn{width:34px;height:34px;border-radius:9px;background:rgba(0,0,0,.05);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;text-decoration:none;transition:.15s}
.tc-social-btn:hover{background:rgba(0,0,0,.1)}
/* Other sections */
.tc-video-section,.tc-countdown-section,.tc-gallery-section,.tc-faq-section{padding:56px 5%}
.tc-video-box{border-radius:var(--radius);height:340px;overflow:hidden;position:relative;background:var(--card-bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;margin-top:20px}
.tc-video-box iframe{width:100%;height:100%;border:none}
.tc-play-circle{width:64px;height:64px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}
.tc-countdown-row{display:flex;gap:14px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.tc-cd-unit{border-radius:var(--radius);padding:20px 28px;min-width:80px;background:var(--card-bg);border:1px solid var(--border);text-align:center}
.tc-cd-num{font-size:40px;font-weight:900;line-height:1;color:var(--primary)}
.tc-cd-label{font-size:11px;font-weight:700;opacity:.4;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.tc-gallery-grid{display:grid;gap:12px}
.tc-gallery-item{background:var(--card-bg);border-radius:var(--radius);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px}
.tc-gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
.tc-faq-item{border-bottom:1px solid var(--border);padding:20px 0}
.tc-faq-q{font-size:15px;font-weight:700;margin-bottom:8px}
.tc-faq-a{font-size:13.5px;color:var(--text2);line-height:1.7}

/* RESPONSIVE */
@media(max-width:768px){
  .tc-navbar{height:52px!important;padding:0 4%!important}
  .nav-links{display:none!important}
  .tc-hero{padding:40px 4% 32px!important}
  .tc-hero h1{font-size:26px!important}
  .tc-section{padding:32px 4%!important}
  .tc-products-grid{grid-template-columns:repeat(2,1fr)!important;gap:10px!important}
  .tc-cats-grid{grid-template-columns:repeat(2,1fr)!important}
  .tc-testimonials-grid{grid-template-columns:1fr!important}
  .tc-footer-grid{grid-template-columns:1fr!important;gap:28px!important}
  .products-grid{grid-template-columns:repeat(2,1fr)!important;gap:10px!important}
  #mainLayout{padding:24px 16px!important}
  .hdr{padding:0 16px;gap:8px}
  .hsearch{max-width:180px}
  .filters-right{flex-direction:column;align-items:flex-start}
  .list-grid .product-card{flex-direction:column!important}
  .list-grid .card-link{flex-direction:column!important}
  .list-grid .product-img{width:100%!important;min-width:unset!important;aspect-ratio:1!important}
  .magazine-grid .product-card:first-child{grid-column:span 1!important}
  .tc-newsletter-form{flex-direction:column!important}
  .tc-newsletter-input{min-width:unset!important;width:100%!important}
}
</style>
</head>
<body>

<div id="loader">
  <div class="ld-icon">🛍️</div>
  <div style="font-size:14px;color:#888;font-family:sans-serif;font-weight:500">Loading store…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<header id="origHeader">
  <div class="hdr">
    <a class="slogo" href="javascript:void(0)" id="storeLogo" onclick="scrollToTop()">
      <span class="slogo-txt" id="storeName">Shop</span>
    </a>
    <div class="hsearch">
      <span class="hsearch-ic">🔍</span>
      <input type="text" id="origSearchInput" placeholder="Search products…" oninput="updateSearch(this.value)">
    </div>
    <div class="hactions">
      <div class="pay-badge" id="payBadge" style="display:none">⚡ Payments</div>
      <a href="javascript:void(0)" id="accountBtn" class="acct-btn">👤 <span id="accountBtnLabel">Login</span></a>
      <a href="cart.html?store=..." class="cart-btn" id="cartBtn">🛒 Cart <span class="cart-count" id="cartCount">0</span></a>
    </div>
  </div>
</header>

<div id="heroBanner">
  <div class="hi">
    <h1 id="heroTitle">Welcome</h1>
    <p id="heroTagline">Discover amazing products</p>
    <div style="margin-top:28px">
      <button class="btn-cta" onclick="smoothScrollToProducts()" style="border:none;cursor:pointer">Shop Now →</button>
    </div>
  </div>
</div>

<div id="theme-sections-top"></div>

<div id="mainLayout">
  <a id="mainProducts" style="display:block;position:relative;visibility:hidden"></a>
  <div class="filters-row">
    <h2 class="filters-title" id="allProductsTitle">All Products</h2>
    <div class="filters-right">
      <div class="fi-w">
        <span class="fi-ic">🔍</span>
        <input type="text" class="fi" id="mainSearchInput" placeholder="Search…" style="width:190px" oninput="updateSearch(this.value)">
      </div>
      <select id="sortSelect" class="fi" onchange="loadProducts()">
        <option value="">Newest</option>
        <option value="price_asc">Price: Low → High</option>
        <option value="price_desc">Price: High → Low</option>
        <option value="name_asc">Name: A → Z</option>
      </select>
      <div class="pg">
        <input type="number" id="priceMin" class="fi" placeholder="Min ₹" min="0">
        <span style="color:var(--text3);font-size:12px">—</span>
        <input type="number" id="priceMax" class="fi" placeholder="Max ₹" min="0">
        <button class="apply-btn" onclick="loadProducts()">Apply</button>
      </div>
    </div>
  </div>
  <div id="catPills"><button class="cat-pill active" data-cat="" onclick="selectCatPill(this,'')">🛍 All</button></div>
  <span id="resultsCount">Loading…</span>
  <div id="productsGridWrap"><div class="products-grid" id="productsGrid"></div></div>
  <div class="pagination" id="pagination"></div>
</div>

<div id="theme-sections-bottom"></div>

<div class="cart-bar" id="cartBar">
  <div class="cart-bar-info"><span id="cartBarQty"></span><strong id="cartBarTotal"></strong></div>
  <a href="cart.html?store=..." class="cart-bar-btn" id="cartBarBtn">View Cart →</a>
</div>
<div class="toast" id="toast"></div>

<script>
const slug = new URLSearchParams(location.search).get('store')
if (!slug) document.body.innerHTML='<div style="text-align:center;padding:80px;font-family:sans-serif"><h2>Store not found</h2><p>Add ?store=slug to the URL</p></div>'

const API='https://apiv2.aasaitech.in'
const root=document.documentElement
let storeConfig={},themeData=null,currency='₹',activeCardStyle='classic',activeCardSize='medium'
let currentCat='',currentPage=1,searchQuery='',searchTimer=null,storeCategories=[]

const SIZES={
  small:{'--card-img-min-h':'130px','--card-name-fs':'11px','--card-price-fs':'13px','--card-info-pad':'8px','--grid-gap':'10px','--card-img-aspect':'1/1'},
  medium:{'--card-img-min-h':'220px','--card-name-fs':'14px','--card-price-fs':'16px','--card-info-pad':'14px','--grid-gap':'18px','--card-img-aspect':'1/1'},
  large:{'--card-img-min-h':'300px','--card-name-fs':'18px','--card-price-fs':'22px','--card-info-pad':'20px','--grid-gap':'24px','--card-img-aspect':'1/1'}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function esa(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function hideLoader(){const l=document.getElementById('loader');if(l){l.classList.add('out');setTimeout(()=>l.remove(),450)}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2300)}
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'})}
function smoothScrollToProducts(){const a=document.getElementById('mainProducts'),nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader'),off=nb?nb.offsetHeight+10:70;if(a)window.scrollTo({top:a.getBoundingClientRect().top+scrollY-off,behavior:'smooth'})}
function scrollToElement(id){const el=document.getElementById(id);if(!el)return;const nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader');window.scrollTo({top:el.getBoundingClientRect().top+scrollY-(nb?nb.offsetHeight+10:70),behavior:'smooth'})}
function adjustOffset(){const a=document.getElementById('mainProducts');if(!a)return;const nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader');a.style.top=`-${(nb?nb.offsetHeight:0)+20}px`}
function subscribeNewsletter(){const v=document.querySelector('.tc-newsletter-input')?.value;toast(v?`📧 Subscribed! Deals coming to ${v}`:'Please enter your email')}
function updateSearch(val){searchQuery=val;const o=document.getElementById('origSearchInput'),m=document.getElementById('mainSearchInput');if(o&&o!==document.activeElement)o.value=val;if(m&&m!==document.activeElement)m.value=val;clearTimeout(searchTimer);searchTimer=setTimeout(()=>{currentPage=1;loadProducts()},350)}
function applyCardSize(s){activeCardSize=s||'medium';const v=SIZES[activeCardSize]||SIZES.medium;Object.entries(v).forEach(([k,val])=>root.style.setProperty(k,val))}
function updateCols(){const s=themeData?.settings||{},cols=s.cols||s.columns||3;root.style.setProperty('--cols',window.innerWidth<=768?'2':String(parseInt(cols)||3))}

// CART
function getCart(){return JSON.parse(localStorage.getItem('cart_'+slug)||'[]')}
function saveCart(c){localStorage.setItem('cart_'+slug,JSON.stringify(c))}
function getQty(id){const i=getCart().find(x=>x.product_id===id&&!x.variant);return i?i.qty:0}
function incCart(id,name,price,image){const cart=getCart(),i=cart.find(x=>x.product_id===id&&!x.variant);if(i)i.qty++;else cart.push({product_id:id,name,price,image,qty:1});saveCart(cart);updateCartUI();updateCC(id);toast('🛒 Added to cart')}
function decCart(id){const cart=getCart(),idx=cart.findIndex(x=>x.product_id===id&&!x.variant);if(idx!==-1){if(cart[idx].qty>1)cart[idx].qty--;else cart.splice(idx,1);saveCart(cart);updateCartUI();updateCC(id);toast('❌ Removed')}}
function addToCart(id,name,price,image){incCart(id,name,price,image)}
function updateCC(id){const qty=getQty(id);document.querySelectorAll(`.cart-controls[data-pid="${id}"]`).forEach(el=>{const n=el.dataset.name||'',p=parseFloat(el.dataset.price)||0,img=el.dataset.image||'',sn=esa(n),si=esa(img);el.innerHTML=qty===0?`<button class="btn-add" onclick="event.preventDefault();addToCart('${id}','${sn}',${p},'${si}')">🛒 Add to Cart</button>`:`<button class="qty-btn" onclick="event.preventDefault();decCart('${id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incCart('${id}','${sn}',${p},'${si}')">+</button>`})}
function updateCartUI(){const cart=getCart(),qty=cart.reduce((s,x)=>s+x.qty,0),amt=cart.reduce((s,x)=>s+x.price*x.qty,0),el=document.getElementById('cartCount');el.textContent=qty;el.className='cart-count'+(qty>0?' has-items':'');const bar=document.getElementById('cartBar');if(qty>0){bar.classList.add('show');document.getElementById('cartBarQty').textContent=`${qty} item${qty!==1?'s':''} — `;document.getElementById('cartBarTotal').textContent=`${currency}${amt.toFixed(2)}`}else bar.classList.remove('show');document.querySelectorAll('.theme-cart-qty').forEach(e=>e.textContent=qty)}

// WISHLIST
function toggleWish(pid,btn){const key=`wish_${slug}`,list=JSON.parse(localStorage.getItem(key)||'[]'),idx=list.indexOf(pid);if(idx===-1){list.push(pid);btn.textContent='♥';btn.classList.add('wished');toast('♥ Saved to wishlist')}else{list.splice(idx,1);btn.textContent='♡';btn.classList.remove('wished');toast('Removed from wishlist')}localStorage.setItem(key,JSON.stringify(list))}
function restoreWish(){const list=JSON.parse(localStorage.getItem(`wish_${slug}`)||'[]');list.forEach(pid=>{document.querySelectorAll('.wish-btn').forEach(btn=>{if(btn.closest('[data-wid]')?.dataset.wid===pid||btn.nextElementSibling?.dataset?.pid===pid||btn.parentElement?.parentElement?.querySelector(`[data-pid="${pid}"]`)){btn.textContent='♥';btn.classList.add('wished')}})})}

// BADGE
function getBadgeHTML(p,bc){const bt=p.badge_text||p.badge||'';if(bt){const bl=bt.toLowerCase(),cls=bl.includes('best')||bl.includes('seller')?'badge-bestseller':bl.includes('new')?'badge-new':bl.includes('trend')?'badge-trending':bl.includes('hot')?'badge-hot':bl.includes('sale')?'badge-sale':'badge-sale';return`<div class="${bc} ${cls}">${esc(bt)}</div>`}const d=discountPct(p);if(d>=5)return`<div class="${bc} badge-discount">−${d}%</div>`;return''}
function discountPct(p){return p.compare_at_price&&p.compare_at_price>p.price?Math.round((1-p.price/p.compare_at_price)*100):0}
function isOOS(p){return p.track_inventory&&p.stock_qty<=0}

// RENDER CARD
function renderCard(p,ctx,btnLabel){
  ctx=ctx||'main';btnLabel=btnLabel||'Add to Cart'
  const oos=isOOS(p),qty=getQty(p._id),si=esa(p.images?.[0]||''),sn=esa(p.name),imgUrl=p.images?.[0]||'',isM=ctx==='main'
  const cc=isM?'product-card':'tc-product-card',ic=isM?'product-img':'tc-product-img'
  const inf=isM?'product-info':'tc-product-info',ca=isM?'product-cat':'tc-product-cat'
  const nc=isM?'product-name':'tc-product-name',rc=isM?'product-price-row':'tc-price-row'
  const pc=isM?'product-price':'tc-product-price',oc=isM?'product-compare':'tc-product-old'
  const wc=isM?'cart-controls-wrap':'tc-btn-wrap',bc=isM?'product-badge':'tc-product-badge'
  const btc=isM?'btn-add':'tc-product-btn'
  const imgTag=imgUrl?`<img src="${imgUrl}" alt="${esc(p.name)}" loading="lazy" onerror="this.closest('.${isM?'product-img':'tc-product-img'}').classList.add('img-error')">`:'';
  const badge=getBadgeHTML(p,bc)
  const wish=`<button class="wish-btn" onclick="event.preventDefault();toggleWish('${p._id}',this)" title="Wishlist">♡</button>`
  const d=discountPct(p)
  let cartHTML
  if(oos){cartHTML=`<div class="out-badge">Out of Stock</div>`}else{const cd=`data-pid="${p._id}" data-name="${esc(p.name)}" data-price="${p.price}" data-image="${esc(imgUrl)}"`;cartHTML=qty===0?`<div class="cart-controls" ${cd}><button class="${btc}" onclick="event.preventDefault();addToCart('${p._id}','${sn}',${p.price},'${si}')">🛒 ${esc(btnLabel)}</button></div>`:`<div class="cart-controls" ${cd}><button class="qty-btn" onclick="event.preventDefault();decCart('${p._id}')">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="event.preventDefault();incCart('${p._id}','${sn}',${p.price},'${si}')">+</button></div>`}
  if(activeCardStyle==='overlay'){const oi=isM?'product-overlay':'tc-overlay-inner';return`<div class="${cc}"><a class="card-link" href="product.html?store=${slug}&id=${p._id}"><div class="${ic}">${badge}${imgTag||'<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px">📦</span>'}<div class="${oi}">${p.category_name?`<div class="ov-cat">${esc(p.category_name)}</div>`:''}<div class="ov-name">${esc(p.name)}</div><div class="ov-pr"><span class="ov-price">${currency}${p.price.toFixed(2)}</span>${p.compare_at_price?`<span class="ov-compare">${currency}${p.compare_at_price.toFixed(2)}</span>`:''}</div></div></div></a><div class="${wc}">${cartHTML}</div></div>`}
  return`<div class="${cc}"><a class="card-link" href="product.html?store=${slug}&id=${p._id}"><div class="${ic}">${badge}${wish}${imgTag||'<span style="font-size:48px">📦</span>'}</div><div class="${inf}">${p.category_name?`<div class="${ca}">${esc(p.category_name)}</div>`:''}<div class="${nc}">${esc(p.name)}</div><div class="${rc}"><span class="${pc}">${currency}${p.price.toFixed(2)}</span>${p.compare_at_price?`<span class="${oc}">${currency}${p.compare_at_price.toFixed(2)}</span>`:''} ${d?`<span class="product-discount">-${d}% off</span>`:''}</div></div></a><div class="${wc}">${cartHTML}</div></div>`
}

function applyStyleToGrid(){const wrap=document.getElementById('productsGridWrap'),grid=document.getElementById('productsGrid');if(!wrap||!grid)return;wrap.className=`${activeCardStyle}-grid`;grid.style.gridTemplateColumns=activeCardStyle==='list'?'1fr':''}

// THEME
async function loadTheme(){try{const res=await fetch(`${API}/shop/${slug}/theme`);if(!res.ok)return;themeData=await res.json();applyThemeSettings(themeData.settings||{});renderSections(themeData.sections||[])}catch(e){console.warn('[theme]',e.message)}}

function applyThemeSettings(s){
  const primary=s.primaryColor||s.primary_color||'#6c63ff',secondary=s.bgColor||s.secondary_color||'#f8f9fc'
  const navBg=s.navBg||s.nav_bg||'#fff',cardBg=s.cardBg||s.card_bg||'#fff',textColor=s.textColor||s.text_color||'#1a1a2e'
  const radius=s.radius||'14px',font=s.fontHeading||s.font_heading||'Outfit',btnStyle=s.buttonStyle||s.button_style||'rounded',cols=s.cols||s.columns||3
  root.style.setProperty('--primary',primary);root.style.setProperty('--accent',primary)
  root.style.setProperty('--bg',secondary);root.style.setProperty('--nav-bg',navBg)
  root.style.setProperty('--card-bg',cardBg);root.style.setProperty('--text',textColor)
  root.style.setProperty('--radius',radius);root.style.setProperty('--font',`'${font}',sans-serif`)
  root.style.setProperty('--btn-r',btnStyle==='pill'?'999px':btnStyle==='square'?'3px':radius)
  root.style.setProperty('--cols',window.innerWidth<=768?'2':String(parseInt(cols)||3))
  document.body.style.background=secondary
  if(font&&font!=='Outfit'){const fid='gf-'+font.replace(/\s+/g,'-');if(!document.getElementById(fid)){const l=document.createElement('link');l.id=fid;l.rel='stylesheet';l.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;600;700;800;900&display=swap`;document.head.appendChild(l)}}
  const hero=document.getElementById('heroBanner');if(hero)hero.style.background=`linear-gradient(135deg,${primary},${primary}cc)`
  activeCardStyle=s.card_style||s.cardStyle||'classic';applyStyleToGrid();applyCardSize(s.card_size||s.cardSize||'medium')
}

function renderSections(sections){
  const isMobile=window.innerWidth<=768,settings=themeData?.settings||{}
  const visible=sections.filter(s=>s.is_visible!==false&&s.enabled!==false).sort((a,b)=>(a.order||0)-(b.order||0))
  if(!visible.length)return
  const TOP=new Set(['announcement','navbar','hero','featured','categories'])
  const BOT=new Set(['testimonials','newsletter','banner','faq','trustbadges','gallery','countdown','video','footer'])
  const te=document.getElementById('theme-sections-top'),be=document.getElementById('theme-sections-bottom')
  if(te)te.innerHTML=visible.filter(s=>TOP.has(s.type)).map(s=>buildSec(s,settings,isMobile)).join('')
  if(be)be.innerHTML=visible.filter(s=>BOT.has(s.type)).map(s=>buildSec(s,settings,isMobile)).join('')
  document.getElementById('origHeader').style.display=visible.some(s=>s.type==='navbar')?'none':''
  document.getElementById('heroBanner').style.display=visible.some(s=>s.type==='hero')?'none':''
  document.querySelectorAll('.theme-cart-qty').forEach(e=>e.textContent=getCart().reduce((s,x)=>s+x.qty,0))

function startCd(secId,targetDate){
  const target=new Date(targetDate).getTime()
  const tick=()=>{const diff=target-Date.now(),pad=n=>String(Math.floor(Math.abs(n))).padStart(2,'0'),el=c=>document.getElementById(`${secId}-${c}`);if(diff<=0){['cd-days','cd-hours','cd-mins','cd-secs'].forEach(c=>{const e=el(c);if(e)e.textContent='00'});return}if(el('cd-days'))el('cd-days').textContent=pad(diff/86400000);if(el('cd-hours'))el('cd-hours').textContent=pad((diff%86400000)/3600000);if(el('cd-mins'))el('cd-mins').textContent=pad((diff%3600000)/60000);if(el('cd-secs'))el('cd-secs').textContent=pad((diff%60000)/1000)}
  tick();setInterval(tick,1000)
}

async function fillFeatured(secId,count,d){
  const grid=document.getElementById(`${secId}-grid`);if(!grid)return
  try{const data=await fetch(`${API}/shop/${slug}/products?page=1&limit=${count}`).then(r=>r.json()),prods=(data.products||[]).slice(0,count);if(!prods.length){const s=grid.closest('section');if(s)s.style.display='none';return}grid.innerHTML=prods.map(p=>renderCard(p,'featured',d.btnText||'Add to Cart')).join('');prods.forEach(p=>{if(getQty(p._id)>0)updateCC(p._id)});restoreWish()}catch(e){const s=document.getElementById(secId);if(s)s.style.display='none'}
}

async function fillCats(secId,cols,d){

    const ge=n=>{const lc=(n||'').toLowerCase();for(const[k,v]of Object.entries(emap))if(lc.includes(k))return v;return'🛍️'}

    document.getElementById('cartBtn').href=`cart.html?store=${slug}`
    document.getElementById('cartBarBtn').href=`cart.html?store=${slug}`
    const tok=localStorage.getItem(`cust_token_${slug}`),name=localStorage.getItem(`cust_name_${slug}`),ab=document.getElementById('accountBtn')
    if(ab){ab.href=tok?`customer-account.html?store=${slug}`:`customer-login.html?store=${slug}`;document.getElementById('accountBtnLabel').textContent=(tok&&name)?name.split(' ')[0]:'Login'}
    await loadTheme();await loadCategories();await loadProducts();updateCartUI();hideLoader()
  }catch(e){
    document.body.innerHTML=`<div style="text-align:center;padding:80px;font-family:sans-serif"><div style="font-size:52px;margin-bottom:20px">🏪</div><h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Store not found</h2><p style="color:#888;font-size:14px">${esc(e.message)}</p></div>`
    hideLoader()
  }
}

async function loadCategories(){
  try{const cats=await fetch(`${API}/shop/${slug}/categories`).then(r=>r.json());storeCategories=Array.isArray(cats)?cats:[];const pills=document.getElementById('catPills');if(pills)pills.innerHTML=`<button class="cat-pill active" data-cat="" onclick="selectCatPill(this,'')">🛍 All</button>`+storeCategories.map(c=>`<button class="cat-pill" data-cat="${c._id}" onclick="selectCatPill(this,'${c._id}')">${c.icon||''}${esc(c.name)}</button>`).join('')}catch(e){console.error('[cats]',e)}
}
function selectCatPill(el,catId){document.querySelectorAll('.cat-pill').forEach(x=>x.classList.remove('active'));el.classList.add('active');currentCat=catId;currentPage=1;loadProducts()}
function filterByCat(catId){currentCat=catId;currentPage=1;document.querySelectorAll('.cat-pill').forEach(x=>x.classList.toggle('active',x.dataset.cat===catId));loadProducts();smoothScrollToProducts()}

async function loadProducts(){
  const p=new URLSearchParams({page:currentPage})
  if(searchQuery)p.set('q',searchQuery);if(currentCat)p.set('category',currentCat)
  const sort=document.getElementById('sortSelect').value;if(sort)p.set('sort',sort)
  const min=document.getElementById('priceMin').value;if(min)p.set('min_price',min)
  const max=document.getElementById('priceMax').value;if(max)p.set('max_price',max)
  try{const data=await fetch(`${API}/shop/${slug}/products?${p}`).then(r=>r.json());document.getElementById('resultsCount').textContent=`${data.total} product${data.total!==1?'s':''} found`;renderProducts(data.products||[]);renderPagination(data.page,data.pages)}
  catch(e){document.getElementById('resultsCount').textContent='Failed to load products';console.error('[products]',e)}
}

function renderProducts(products){
  const grid=document.getElementById('productsGrid')
  if(!products.length){grid.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><h3>No products found</h3><p>Try a different search or category</p></div>`;return}
  grid.innerHTML=products.map(p=>renderCard(p,'main','Add to Cart')).join('')
  applyStyleToGrid();products.forEach(p=>{if(getQty(p._id)>0)updateCC(p._id)});restoreWish()
}

function renderPagination(page,pages){
  const el=document.getElementById('pagination');if(!pages||pages<=1){el.innerHTML='';return}
  let h=`<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>← Prev</button>`
  for(let i=1;i<=pages;i++){if(pages<=7||i===1||i===pages||Math.abs(i-page)<=2)h+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;else if(Math.abs(i-page)===3)h+='<span style="padding:8px 4px;color:var(--text3)">…</span>'}
  h+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>Next →</button>`;el.innerHTML=h
}
function goPage(p){currentPage=p;loadProducts();scrollTo({top:0,behavior:'smooth'})}

if(slug){setTimeout(hideLoader,5000);init()}else hideLoader()
</script>
</body>
</html>

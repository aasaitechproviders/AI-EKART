<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── Base CSS variables (overridden when theme loads) ─── */
:root {
  --accent: #6c63ff;
  --primary: #6c63ff;
  --bg: #f8f9fc;
  --surface: #fff;
  --surface2: #f1f5f9;
  --border: #e8eaf0;
  --text: #1a1a2e;
  --text2: #64748b;
  --text3: #94a3b8;
  --green: #16a34a;
  --card-bg: #ffffff;
  --nav-bg: #ffffff;
  --radius: 12px;
  --btn-r: 12px;
  --font: 'Outfit', sans-serif;
  --cols: 3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); padding-bottom: 80px; }
a { color: inherit; text-decoration: none; }

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
#site-header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; transition: background .3s, border-color .3s; }
.header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 14px; height: 64px; }
.store-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); flex-shrink: 0; }
.store-logo img { height: 36px; object-fit: contain; border-radius: 6px; }
.store-logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; font-family: var(--font); }
.search-bar { flex: 1; max-width: 480px; margin: 0 auto; position: relative; }
.search-bar input { width: 100%; padding: 9px 16px 9px 40px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: var(--font); outline: none; background: var(--bg); color: var(--text); transition: border-color .15s, background .3s; }
.search-bar input:focus { border-color: var(--primary); background: var(--surface); }
.search-bar::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
.pay-badge { display: flex; align-items: center; gap: 5px; padding: 5px 10px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; font-size: 11.5px; font-weight: 700; color: var(--green); white-space: nowrap; flex-shrink: 0; }
.acct-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; font-weight: 700; color: var(--text2); text-decoration: none; white-space: nowrap; transition: all .15s; flex-shrink: 0; }
.acct-btn:hover { border-color: var(--primary); color: var(--primary); }
.cart-btn { display: flex; align-items: center; gap: 8px; padding: 9px 18px; background: var(--primary); color: white; border-radius: 10px; text-decoration: none; font-size: 13.5px; font-weight: 700; white-space: nowrap; transition: all .15s; flex-shrink: 0; }
.cart-btn:hover { opacity: .88; transform: translateY(-1px); }
.cart-count { background: #ef4444; color: white; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
.cart-count.has-items { display: flex; }

/* ══════════════════════════════════════════
   FALLBACK HERO (hidden when theme has hero)
══════════════════════════════════════════ */
#default-hero { width: 100%; padding: 52px 24px; text-align: center; color: white; position: relative; overflow: hidden; }
#default-hero::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.15); }
#default-hero .hero-content { position: relative; z-index: 1; }
#default-hero h1 { font-size: clamp(28px, 5vw, 52px); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; text-shadow: 0 2px 12px rgba(0,0,0,0.2); }
#default-hero p { font-size: 16px; opacity: 0.9; max-width: 480px; margin: 0 auto; }

/* ══════════════════════════════════════════
   THEME SECTION STYLES
══════════════════════════════════════════ */

/* Announcement */
.t-announcement { background: var(--primary); color: white; text-align: center; padding: 9px 16px; font-size: 13px; font-weight: 600; letter-spacing: .01em; }

/* Hero */
.t-hero { padding: 80px 5% 72px; text-align: center; background: var(--bg); position: relative; overflow: hidden; }
.t-hero .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
.t-hero .hero-overlay { position: absolute; inset: 0; z-index: 1; }
.t-hero .t-hero-inner { position: relative; z-index: 2; }
.t-hero h1 { font-size: clamp(28px, 5vw, 54px); font-weight: 900; line-height: 1.1; letter-spacing: -.03em; margin-bottom: 16px; font-family: var(--font); }
.t-hero h1 em { font-style: normal; color: var(--primary); }
.t-hero p { font-size: 17px; opacity: .65; max-width: 520px; margin: 0 auto 32px; line-height: 1.7; }
.t-hero .hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-theme { display: inline-flex; align-items: center; gap: 8px; background: var(--primary); color: white; padding: 13px 30px; border-radius: var(--btn-r); font-size: 15px; font-weight: 700; cursor: pointer; border: none; font-family: var(--font); transition: opacity .15s; text-decoration: none; }
.btn-theme:hover { opacity: .88; }
.btn-theme-ghost { background: transparent; color: var(--text); border: 1.5px solid rgba(0,0,0,.2); }
.btn-theme-ghost:hover { background: rgba(0,0,0,.04); opacity: 1; }

/* Generic section wrapper */
.t-section { padding: 56px 5%; }
.t-section-header { margin-bottom: 28px; }
.t-section-title { font-size: 28px; font-weight: 800; letter-spacing: -.02em; color: var(--text); font-family: var(--font); }
.t-section-subtitle { font-size: 14px; opacity: .55; margin-top: 6px; color: var(--text); }

/* ══════════════════════════════════════════
   PRODUCT CARDS — 8 STYLES
   All styles use the .tc base class
══════════════════════════════════════════ */
.themed-grid { display: grid; grid-template-columns: repeat(var(--cols, 3), 1fr); gap: 18px; }

/* ── Base card ── */
.tc { display: block; background: var(--card-bg); border-radius: var(--radius); overflow: hidden; position: relative; cursor: pointer; transition: transform .22s ease, box-shadow .22s ease; color: var(--text); text-decoration: none; }
.tc-img { width: 100%; aspect-ratio: 1; background: rgba(0,0,0,.04); display: flex; align-items: center; justify-content: center; font-size: 44px; overflow: hidden; position: relative; flex-shrink: 0; }
.tc-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .35s ease; }
.tc:hover .tc-img img { transform: scale(1.05); }
.tc-sale-badge { position: absolute; top: 10px; left: 10px; background: #ef4444; color: white; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 4px; letter-spacing: .04em; z-index: 2; }
.tc-new-badge { position: absolute; top: 10px; left: 10px; background: var(--primary); color: white; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 4px; z-index: 2; }
.tc-info { padding: 14px; }
.tc-cat { font-size: 10px; font-weight: 700; color: var(--primary); opacity: .7; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .06em; }
.tc-name { font-size: 13.5px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; color: var(--text); }
.tc-stars { font-size: 11px; color: #f59e0b; margin-bottom: 5px; }
.tc-price-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.tc-price { font-size: 16px; font-weight: 800; color: var(--primary); }
.tc-compare { font-size: 11.5px; text-decoration: line-through; opacity: .38; color: var(--text); }
.tc-disc { font-size: 10px; font-weight: 700; background: rgba(239,68,68,.1); color: #ef4444; padding: 2px 6px; border-radius: 4px; }
.tc-btn { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: var(--btn-r); font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); transition: opacity .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.tc-btn:hover { opacity: .88; }
.tc-btn.added { background: #16a34a; }
.tc-oos { text-align: center; font-size: 12px; color: #ef4444; font-weight: 700; padding: 8px; background: rgba(239,68,68,.08); border-radius: 8px; width: 100%; }

/* 1. Classic — standard shadow card */
.style-classic .tc { box-shadow: 0 2px 10px rgba(0,0,0,.07); }
.style-classic .tc:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.14); }

/* 2. Minimal — no bg, outline border */
.style-minimal .tc { background: transparent; border: 1.5px solid var(--border); box-shadow: none; }
.style-minimal .tc:hover { border-color: var(--primary); }

/* 3. Overlay — image fills card, info overlaid at bottom */
.style-overlay .tc { overflow: hidden; }
.style-overlay .tc .tc-img { aspect-ratio: 1; }
.style-overlay .tc .tc-overlay-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(0deg, rgba(0,0,0,.88) 0%, rgba(0,0,0,.35) 55%, transparent 100%); padding: 22px 14px 14px; z-index: 3; }
.style-overlay .tc .tc-overlay-info .tc-name { color: white; font-size: 14px; margin-bottom: 4px; }
.style-overlay .tc .tc-overlay-info .tc-price { color: white; }
.style-overlay .tc .tc-overlay-info .tc-btn { background: white; color: var(--primary); margin-top: 8px; }
.style-overlay .tc .tc-info { display: none; }

/* 4. Bold — coloured top border */
.style-bold .tc { border-top: 4px solid var(--primary); }
.style-bold .tc:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }

/* 5. List — horizontal layout */
.style-list .themed-grid { grid-template-columns: 1fr !important; }
.style-list .tc { display: flex; flex-direction: row; align-items: stretch; }
.style-list .tc .tc-img { width: 150px; min-width: 150px; aspect-ratio: unset; height: auto; min-height: 140px; }
.style-list .tc .tc-info { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 18px 20px; }
.style-list .tc .tc-btn { margin-top: auto; width: auto; padding: 9px 20px; }
.style-list .tc:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }

/* 6. Magazine — first card spans 2 cols (only when >1 card present) */
.style-magazine .themed-grid:has(.tc:nth-child(2)) .tc:first-child { grid-column: span 2; }
.style-magazine .tc:first-child .tc-img { aspect-ratio: 2/1; }
.style-magazine .tc:first-child .tc-name { font-size: 18px; font-weight: 800; }
.style-magazine .tc:first-child .tc-price { font-size: 20px; }
.style-magazine .tc { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.style-magazine .tc:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,.13); }

/* 7. Compact — tight grid, no add button */
.style-compact .themed-grid { gap: 10px !important; }
.style-compact .tc .tc-info { padding: 8px 10px 10px; }
.style-compact .tc .tc-name { font-size: 12px; margin-bottom: 3px; }
.style-compact .tc .tc-price { font-size: 13px; }
.style-compact .tc .tc-price-row { margin-bottom: 0; }
.style-compact .tc .tc-btn { display: none; }
.style-compact .tc:hover { opacity: .84; }

/* 8. Elevated — deep shadow, larger radius */
.style-elevated .tc { box-shadow: 0 8px 28px rgba(0,0,0,.1); border-radius: calc(var(--radius) + 4px); }
.style-elevated .tc:hover { transform: translateY(-7px); box-shadow: 0 22px 52px rgba(0,0,0,.18); }

/* ── Skeleton loader ── */
.tc-skeleton { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.tc-skeleton .sk-img { width: 100%; aspect-ratio: 1; background: linear-gradient(90deg, rgba(0,0,0,.06) 25%, rgba(0,0,0,.1) 50%, rgba(0,0,0,.06) 75%); background-size: 200% 100%; animation: shimmer 1.5s ease infinite; }
.tc-skeleton .sk-line { height: 12px; background: linear-gradient(90deg, rgba(0,0,0,.06) 25%, rgba(0,0,0,.1) 50%, rgba(0,0,0,.06) 75%); background-size: 200% 100%; animation: shimmer 1.5s ease infinite; border-radius: 6px; margin: 10px 14px 6px; }
.tc-skeleton .sk-line.short { width: 55%; height: 10px; }

/* ══════════════════════════════════════════
   OTHER THEME SECTIONS
══════════════════════════════════════════ */

/* Categories */
.t-cats-grid { display: grid; gap: 16px; }
.t-cat-card { background: var(--card-bg); border-radius: var(--radius); padding: 32px 20px; text-align: center; cursor: pointer; transition: transform .2s; color: var(--text); text-decoration: none; display: block; }
.t-cat-card:hover { transform: translateY(-2px); }
.t-cat-card.style-circle { border-radius: 50%; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.t-cat-card.style-minimal { background: transparent; border: 1.5px solid var(--border); }
.t-cat-card .cat-icon { font-size: 36px; margin-bottom: 10px; }
.t-cat-card .cat-name { font-size: 14px; font-weight: 700; }

/* Promo Banner */
.t-banner { color: white; padding: 68px 5%; text-align: center; }
.t-banner.layout-left { text-align: left; display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
.t-banner h2 { font-size: 36px; font-weight: 900; margin-bottom: 10px; font-family: var(--font); }
.t-banner p { opacity: .8; margin-bottom: 24px; font-size: 16px; }
.btn-white { background: white; color: var(--primary); padding: 12px 28px; border-radius: var(--btn-r); font-size: 14px; font-weight: 700; border: none; cursor: pointer; font-family: var(--font); }

/* Testimonials */
.t-testimonials { padding: 56px 5%; background: var(--card-bg); }
.t-testimonials-grid { display: grid; gap: 16px; margin-top: 24px; }
.t-testimonial { background: var(--bg); border-radius: var(--radius); padding: 20px; }
.t-testimonial.style-quote { background: transparent; border-left: 3px solid var(--primary); border-radius: 0; }
.t-testimonial.style-minimal { background: transparent; border: 1.5px solid var(--border); }
.t-stars { color: #f59e0b; font-size: 13px; margin-bottom: 10px; }
.t-ttext { font-size: 13.5px; line-height: 1.65; opacity: .7; margin-bottom: 14px; color: var(--text); }
.t-author { display: flex; align-items: center; gap: 10px; }
.t-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 13px; }
.t-aname { font-size: 13px; font-weight: 700; color: var(--text); }

/* Newsletter */
.t-newsletter { padding: 56px 5%; text-align: center; }
.t-newsletter h2 { font-size: 30px; font-weight: 800; margin-bottom: 10px; color: var(--text); font-family: var(--font); }
.t-newsletter p { opacity: .6; margin-bottom: 24px; font-size: 15px; color: var(--text); }
.t-nl-form { display: flex; gap: 10px; max-width: 440px; margin: 0 auto; flex-wrap: wrap; }
.t-nl-input { flex: 1; min-width: 180px; padding: 11px 16px; border: 1.5px solid var(--border); border-radius: var(--btn-r); font-size: 14px; background: var(--card-bg); color: var(--text); font-family: var(--font); outline: none; transition: border-color .15s; }
.t-nl-input:focus { border-color: var(--primary); }

/* Footer */
.t-footer { padding: 40px 5%; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
.t-footer-logo { font-size: 17px; font-weight: 900; color: var(--text); font-family: var(--font); }
.t-footer-copy { font-size: 12px; opacity: .4; color: var(--text); }
.t-footer-links { display: flex; gap: 18px; font-size: 12.5px; opacity: .45; font-weight: 600; }
.t-footer-links a { color: var(--text); text-decoration: none; transition: opacity .15s; }
.t-footer-links a:hover { opacity: 1; }

/* Video */
.t-video { padding: 56px 5%; text-align: center; }
.t-video-box { border-radius: var(--radius); height: 340px; overflow: hidden; background: var(--card-bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; margin-top: 20px; }
.t-play-circle { width: 64px; height: 64px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: white; }

/* Countdown */
.t-countdown { padding: 56px 5%; text-align: center; }
.t-cd-row { display: flex; gap: 14px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
.t-cd-unit { border-radius: var(--radius); padding: 18px 24px; min-width: 72px; background: var(--card-bg); }
.t-cd-num { font-size: 38px; font-weight: 900; line-height: 1; color: var(--primary); font-family: var(--font); }
.t-cd-label { font-size: 11px; font-weight: 700; opacity: .45; text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; color: var(--text); }

/* Gallery */
.t-gallery { padding: 56px 5%; }
.t-gallery-grid { display: grid; gap: 12px; }
.t-gallery-item { background: var(--card-bg); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 28px; overflow: hidden; }
.t-gallery-item img { width: 100%; height: 100%; object-fit: cover; }

/* Trust Badges */
.t-trust { padding: 32px 5%; }
.t-trust-grid { display: grid; gap: 12px; }
.t-trust-item { display: flex; align-items: center; gap: 12px; padding: 10px; }
.t-trust-icon { font-size: 20px; }
.t-trust-label { font-size: 13px; font-weight: 700; color: var(--text); }

/* FAQ */
.t-faq { padding: 56px 5%; }
.t-faq-item { border-bottom: 1px solid var(--border); padding: 18px 0; cursor: pointer; }
.t-faq-q { font-size: 15px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
.t-faq-q::after { content: '+'; font-size: 18px; opacity: .5; flex-shrink: 0; }
.t-faq-item.open .t-faq-q::after { content: '−'; }
.t-faq-a { font-size: 13.5px; opacity: .6; line-height: 1.65; margin-top: 10px; color: var(--text); display: none; }
.t-faq-item.open .t-faq-a { display: block; }

/* ══════════════════════════════════════════
   MAIN PRODUCT CATALOG
══════════════════════════════════════════ */
#main-catalog { max-width: 1200px; margin: 0 auto; padding: 28px 24px; display: grid; grid-template-columns: 220px 1fr; gap: 24px; }
.filters { position: sticky; top: 80px; align-self: start; }
.filter-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
.filter-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
.cat-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text2); transition: all .15s; }
.cat-item:hover { background: rgba(108,99,255,.06); color: var(--primary); }
.cat-item.active { background: rgba(108,99,255,.1); color: var(--primary); font-weight: 700; }
.sort-select { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; font-family: var(--font); color: var(--text); background: var(--surface); outline: none; cursor: pointer; }
.sort-select:focus { border-color: var(--primary); }
.price-inputs { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.price-inputs input { flex: 1; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'DM Mono', monospace; outline: none; background: var(--bg); color: var(--text); }
.price-inputs input:focus { border-color: var(--primary); }
.price-sep { color: var(--text3); font-size: 12px; }
.btn-filter { width: 100%; padding: 8px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); margin-top: 10px; }
.btn-filter:hover { opacity: .88; }
.results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.results-count { font-size: 13.5px; color: var(--text2); font-weight: 500; }

/* Catalog product grid */
#catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 18px; }
.prod-card { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all .2s; color: var(--text); text-decoration: none; position: relative; }
.prod-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.1); border-color: rgba(108,99,255,.25); }
.prod-img { width: 100%; aspect-ratio: 1; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
.prod-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.prod-card:hover .prod-img img { transform: scale(1.04); }
.prod-img .emoji-placeholder { font-size: 44px; }
.prod-badge { position: absolute; top: 10px; left: 10px; z-index: 2; font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 6px; }
.prod-badge.sale { background: #ef4444; color: white; }
.prod-info { padding: 14px; }
.prod-cat { font-size: 10px; font-weight: 700; color: var(--primary); opacity: .7; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .06em; }
.prod-name { font-size: 13.5px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
.prod-desc { font-size: 12px; color: var(--text2); margin-bottom: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.prod-price-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.prod-price { font-size: 16px; font-weight: 800; color: var(--primary); }
.prod-compare { font-size: 11.5px; text-decoration: line-through; opacity: .38; }
.prod-disc { font-size: 10px; font-weight: 700; background: rgba(239,68,68,.1); color: #ef4444; padding: 2px 6px; border-radius: 4px; }
.out-badge { text-align: center; font-size: 12px; color: #ef4444; font-weight: 700; padding: 7px; background: rgba(239,68,68,.08); border-radius: 8px; }
.btn-add { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 9px; background: var(--primary); color: white; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); transition: all .15s; }
.btn-add:hover { opacity: .88; }
.btn-add.added { background: var(--green); }

/* Pagination */
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 32px; flex-wrap: wrap; }
.page-btn { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 9px; background: var(--surface); color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 13.5px; font-weight: 600; transition: all .15s; }
.page-btn:hover, .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.page-btn:disabled { opacity: .4; cursor: default; pointer-events: none; }

/* Empty state */
.empty-state { text-align: center; padding: 80px 20px; color: var(--text3); grid-column: 1 / -1; }
.empty-state .ei { font-size: 56px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }

/* ── Sticky cart bar ── */
.cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--text); color: white; padding: 14px 24px; display: none; align-items: center; justify-content: space-between; z-index: 300; box-shadow: 0 -4px 24px rgba(0,0,0,.2); }
.cart-bar.show { display: flex; }
.cart-bar-info { font-size: 14px; font-weight: 600; }
.cart-bar-info .qty-lbl { color: rgba(255,255,255,.6); margin-right: 10px; font-size: 13px; }
.cart-bar-btn { padding: 10px 24px; background: var(--primary); color: white; border-radius: 10px; text-decoration: none; font-size: 14px; font-weight: 700; }
.cart-bar-btn:hover { opacity: .88; }

/* ── Toast ── */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 600; opacity: 0; transition: all .3s; z-index: 400; white-space: nowrap; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .header-inner { gap: 8px; }
  #main-catalog { grid-template-columns: 1fr; padding: 16px; }
  .filters { display: none; }
  .t-hero { padding: 48px 5% 40px; }
  .t-hero h1 { font-size: 28px; }
  .t-hero p { font-size: 14px; }
  .btn-theme { padding: 11px 24px; font-size: 14px; }
  .t-section { padding: 32px 5%; }
  .t-section-title { font-size: 20px; }
  .t-testimonials { padding: 32px 5%; }
  .t-testimonials-grid { grid-template-columns: 1fr !important; }
  .themed-grid { gap: 10px; }
  .style-list .tc .tc-img { width: 100px; min-width: 100px; }
  .style-magazine .tc:first-child { grid-column: span 2; }
  .t-footer { flex-direction: column; align-items: flex-start; }
  .t-video-box { height: 200px; }
  .t-cd-num { font-size: 28px; }
}
</style>
</head>
<body>

<!-- ════════════ HEADER ════════════ -->
<header id="site-header">
  <div class="header-inner">
    <a class="store-logo" href="javascript:void(0)" id="storeLogo">
      <span class="store-logo-text" id="storeName">Shop</span>
    </a>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search products..." oninput="onSearch()">
    </div>
    <div class="pay-badge" id="payBadge" style="display:none">⚡ Online Payments</div>
    <a href="javascript:void(0)" class="acct-btn" id="accountBtn">
      👤 <span id="accountBtnLabel">Account</span>
    </a>
    <a href="cart.html" class="cart-btn" id="cartBtn">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </a>
  </div>
</header>

<!-- Theme sections before catalog (announcement, hero, featured, categories, banner, etc.) -->
<div id="theme-top"></div>

<!-- Fallback hero (shown only when theme has no hero section) -->
<div id="default-hero" style="background:linear-gradient(135deg,#6c63ff,#a78bfa);display:none">
  <div class="hero-content">
    <h1 id="heroTitle">Welcome</h1>
    <p id="heroTagline">Discover amazing products</p>
  </div>
</div>

<!-- ════════════ MAIN PRODUCT CATALOG ════════════ -->
<div id="main-catalog">
  <div class="filters">
    <div class="filter-section">
      <div class="filter-title">Categories</div>
      <div id="catList">
        <div class="cat-item active" data-cat="" onclick="selectCat(this,'')">🛍 All Products</div>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Sort By</div>
      <select class="sort-select" id="sortSelect" onchange="loadProducts()">
        <option value="">Newest</option>
        <option value="price_asc">Price: Low → High</option>
        <option value="price_desc">Price: High → Low</option>
        <option value="name_asc">Name: A → Z</option>
      </select>
    </div>
    <div class="filter-section">
      <div class="filter-title">Price Range</div>
      <div class="price-inputs">
        <input type="number" id="priceMin" placeholder="Min" min="0">
        <span class="price-sep">—</span>
        <input type="number" id="priceMax" placeholder="Max" min="0">
      </div>
      <button class="btn-filter" onclick="loadProducts()">Apply</button>
    </div>
  </div>

  <div id="products-col">
    <div class="results-bar">
      <span class="results-count" id="resultsCount">Loading...</span>
    </div>
    <div id="catalog-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Theme sections after catalog (newsletter, footer) -->
<div id="theme-bottom"></div>

<!-- Sticky cart bar -->
<div class="cart-bar" id="cartBar">
  <div class="cart-bar-info">
    <span class="qty-lbl" id="cartBarQty"></span>
    <strong id="cartBarTotal"></strong>
  </div>
  <a href="cart.html" class="cart-bar-btn" id="cartBarBtn">View Cart →</a>
</div>
<div id="toast"></div>

<script>
/* ════════════════════════════════════════════
   CONSTANTS & STATE
════════════════════════════════════════════ */
const slug = new URLSearchParams(location.search).get('store')
if (!slug) {
  document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif;"><h2>Store not found</h2><p>Please provide a ?store= parameter.</p></div>'
}

const API = 'https://apiv2.aasaitech.in'
let storeConfig = {}
let themeSettings = {}
let themeSections = []
let cardStyle = 'classic'   // global card style from theme
let currentCat = ''
let currentPage = 1
let searchTimeout = null
let currency = '₹'

/* ════════════════════════════════════════════
   UTILS
════════════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function isLightColor(hex) {
  const c = (hex || '').replace('#', '')
  if (c.length !== 6) return true
  const r = parseInt(c.slice(0,2), 16), g = parseInt(c.slice(2,4), 16), b = parseInt(c.slice(4,6), 16)
  return (r * 299 + g * 587 + b * 114) / 1000 > 128
}
function discountPct(p) {
  return p.compare_at_price && p.compare_at_price > p.price
    ? Math.round((1 - p.price / p.compare_at_price) * 100) : 0
}
function isOOS(p) { return p.track_inventory && p.stock_qty <= 0 }

/* ════════════════════════════════════════════
   APPLY THEME CSS VARIABLES
════════════════════════════════════════════ */
function applyThemeCSSVars(s) {
  const root = document.documentElement
  const primary  = s.primary_color    || '#6c63ff'
  const bg       = s.secondary_color  || '#f8f9fc'
  const cardBg   = s.card_bg          || '#ffffff'
  const navBg    = s.nav_bg           || '#ffffff'
  const radius   = s.radius           || '12px'
  const font     = s.font_heading     || 'Outfit'
  const cols     = String(s.cols || 3)
  const btnStyle = s.button_style     || 'rounded'
  const btnR     = btnStyle === 'pill' ? '999px' : btnStyle === 'square' ? '3px' : radius
  const isLight  = isLightColor(bg)

  root.style.setProperty('--primary',   primary)
  root.style.setProperty('--accent',    primary)
  root.style.setProperty('--bg',        bg)
  root.style.setProperty('--card-bg',   cardBg)
  root.style.setProperty('--nav-bg',    navBg)
  root.style.setProperty('--radius',    radius)
  root.style.setProperty('--btn-r',     btnR)
  root.style.setProperty('--font',      `'${font}', sans-serif`)
  root.style.setProperty('--cols',      cols)

  if (isLight) {
    root.style.setProperty('--text',     s.accent_color || '#1a1a2e')
    root.style.setProperty('--text2',    '#64748b')
    root.style.setProperty('--border',   '#e8eaf0')
    root.style.setProperty('--surface',  '#ffffff')
    root.style.setProperty('--surface2', '#f1f5f9')
  } else {
    root.style.setProperty('--text',     s.accent_color || '#f1f5f9')
    root.style.setProperty('--text2',    'rgba(255,255,255,.6)')
    root.style.setProperty('--border',   'rgba(255,255,255,.08)')
    root.style.setProperty('--surface',  navBg)
    root.style.setProperty('--surface2', cardBg)
    // Update header for dark themes
    const hdr = document.getElementById('site-header')
    if (hdr) { hdr.style.background = navBg; hdr.style.borderBottomColor = 'rgba(255,255,255,.08)'; }
  }

  // Update cart button color
  const cartBtn = document.getElementById('cartBtn')
  if (cartBtn) cartBtn.style.background = primary

  // Load custom font if not already loaded
  if (!['Outfit','DM Mono'].includes(font) && !document.querySelector(`link[data-font="${font}"]`)) {
    const link = document.createElement('link')
    link.rel = 'stylesheet'
    link.dataset.font = font
    link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@300;400;500;600;700;800;900&display=swap`
    document.head.appendChild(link)
  }

  // Persist for cross-page use
  sessionStorage.setItem('ekart_store',       slug)
  sessionStorage.setItem('ekart_currency',    currency)
  sessionStorage.setItem('ekart_store_name',  storeConfig.name || '')
  sessionStorage.setItem('ekart_pay_enabled', storeConfig.payment_enabled ? '1' : '0')
}

/* ════════════════════════════════════════════
   LOAD THEME
════════════════════════════════════════════ */
async function loadTheme() {
  try {
    const data = await fetch(`${API}/shop/${slug}/theme`).then(r => r.json())
    const doc  = data.draft || data.published || null
    if (!doc) return

    themeSettings = doc.settings || {}
    themeSections = (doc.sections || []).filter(s => s.is_visible !== false)
    cardStyle     = themeSettings.card_style || 'classic'

    applyThemeCSSVars(themeSettings)
    renderThemeSections()
  } catch(e) {
    console.warn('Theme load failed:', e.message)
  }
}

/* ════════════════════════════════════════════
   RENDER THEME SECTIONS
   Top: announcement, hero, featured, categories, banner, video, countdown, gallery, trustbadges, faq, testimonials
   Bottom: newsletter, footer
════════════════════════════════════════════ */
const BOTTOM_TYPES = new Set(['newsletter','newsletter_signup','footer'])
// We skip rendering a theme navbar — the store's functional header already handles navigation
const SKIP_TYPES   = new Set(['navbar','nav','navigation','header'])

function renderThemeSections() {
  const isMobile = window.innerWidth <= 768
  const topSecs    = themeSections.filter(s => !BOTTOM_TYPES.has(s.type) && !SKIP_TYPES.has(s.type))
  const bottomSecs = themeSections.filter(s => BOTTOM_TYPES.has(s.type))

  // Decide whether to show default hero
  const hasHero = topSecs.some(s => s.type === 'hero')
  document.getElementById('default-hero').style.display = hasHero ? 'none' : 'block'

  document.getElementById('theme-top').innerHTML    = topSecs.map(s    => renderSection(s, isMobile)).join('')
  document.getElementById('theme-bottom').innerHTML = bottomSecs.map(s => renderSection(s, isMobile)).join('')

  // Wire FAQ toggles
  document.querySelectorAll('.t-faq-item').forEach(item => {
    item.addEventListener('click', () => {
      const wasOpen = item.classList.contains('open')
      document.querySelectorAll('.t-faq-item').forEach(i => i.classList.remove('open'))
      if (!wasOpen) item.classList.add('open')
    })
  })

  // Load real products for featured section
  const featuredSec = topSecs.find(s =>
    ['featured','featured_products','products'].includes(s.type)
  )
  if (featuredSec) loadFeaturedProducts(featuredSec)
}

/* ════════════════════════════════════════════
   RENDER INDIVIDUAL SECTION
════════════════════════════════════════════ */
function renderSection(sec, isMobile) {
  const d = sec.settings || sec.data || {}
  const s = themeSettings
  const t = sec.type

  switch(t) {
    /* ── Announcement ── */
    case 'announcement':
    case 'announcement_bar': {
      const text = d.text || s.announcement_bar?.text || '✨ Free shipping on orders over ₹999!'
      const bg   = d.bgColor || d.bg_color || s.primary_color || '#6c63ff'
      const tc   = d.textColor || d.text_color || '#ffffff'
      const sz   = d.textSize === 'large' ? '15px' : d.textSize === 'small' ? '11px' : '13px'
      const fw   = d.bold === 'no' ? '500' : '700'
      return `<div class="t-announcement" style="background:${bg};color:${tc};font-size:${sz};font-weight:${fw}">${escHtml(text)}</div>`
    }

    /* ── Hero ── */
    case 'hero': {
      const align   = d.textAlign || d.text_align || 'center'
      const padMap  = { compact: isMobile ? '36px 5% 28px' : '48px 5% 40px', normal: isMobile ? '48px 5% 40px' : '80px 5% 72px', tall: isMobile ? '64px 5% 52px' : '120px 5% 100px', fullscreen: '160px 5%' }
      const pad     = padMap[d.size || 'normal']
      const bgS     = d.bgColor ? `background:${d.bgColor}` : 'background:var(--bg)'
      const rawH    = d.heading || storeConfig.name || 'Welcome to our Store'
      const heading = rawH.replace(/(store|shop)/gi, m => `<em>${m}</em>`)
      const overlayS= d.bgImage && d.overlayColor ? `background:${d.overlayColor};opacity:${(parseInt(d.overlayOpacity) || 0) / 100}` : 'opacity:0'
      const justS   = align === 'left' ? 'flex-start' : align === 'right' ? 'flex-end' : 'center'
      const textColor= d.textColor ? `color:${d.textColor}` : ''
      return `
        <section class="t-hero" style="${bgS};padding:${pad};text-align:${align}">
          ${d.bgImage ? `<div class="hero-bg" style="background-image:url('${d.bgImage}')"></div>` : ''}
          <div class="hero-overlay" style="${overlayS}"></div>
          <div class="t-hero-inner" style="${textColor}">
            <h1>${heading}</h1>
            <p>${escHtml(d.subheading || storeConfig.tagline || storeConfig.description || 'Discover amazing products at the best prices. Fast delivery across India.')}</p>
            <div class="hero-btns" style="justify-content:${justS}">
              <a href="${d.ctaLink || '#main-catalog'}" class="btn-theme">${escHtml(d.ctaText || 'Shop Now')} →</a>
              ${d.cta2Text ? `<a href="${d.cta2Link || '#'}" class="btn-theme btn-theme-ghost">${escHtml(d.cta2Text)}</a>` : ''}
            </div>
          </div>
        </section>`
    }

    /* ── Featured Products (skeleton, filled by loadFeaturedProducts) ── */
    case 'featured':
    case 'featured_products':
    case 'products': {
      const count    = parseInt(d.count) || 8
      const cs       = d.cardStyle || d.card_style || cardStyle
      const cols     = cs === 'list' ? 1 : (isMobile ? 2 : (parseInt(d.columns) || parseInt(themeSettings.cols) || 3))
      const skelCount= Math.min(count, isMobile ? 4 : cols * 2)
      return `
        <section class="t-section style-${escHtml(cs)}" id="theme-featured"
          data-card-style="${escHtml(cs)}" data-count="${count}" data-cols="${cols}"
          data-price-color="${escHtml(d.priceColor || d.price_color || '')}"
          data-card-bg="${escHtml(d.cardBg || d.card_bg || '')}"
          data-btn-text="${escHtml(d.btnText || d.btn_text || 'Add to Cart')}"
          data-show-old="${escHtml(d.showOldPrice !== 'no' ? 'yes' : 'no')}"
          data-show-rating="${escHtml(d.showRating === 'yes' ? 'yes' : 'no')}"
          data-show-badge="${escHtml(d.showBadge === 'yes' ? 'yes' : 'no')}"
          data-badge-text="${escHtml(d.badgeText || 'New')}">
          <div class="t-section-header">
            <h2 class="t-section-title">${escHtml(d.title || 'Featured Products')}</h2>
            ${d.subtitle ? `<p class="t-section-subtitle">${escHtml(d.subtitle)}</p>` : ''}
          </div>
          <div class="themed-grid" id="featured-grid" style="--cols:${cols}">
            ${Array(skelCount).fill(0).map(() =>
              `<div class="tc-skeleton"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line short"></div></div>`
            ).join('')}
          </div>
        </section>`
    }

    /* ── Categories ── */
    case 'categories':
    case 'category_grid':
    case 'categories_grid': {
      const cCols = isMobile ? 2 : (parseInt(d.columns) || 4)
      const style  = d.style || 'card'
      const cats   = [['👗','Fashion'],['📱','Electronics'],['🏠','Home & Living'],['💄','Beauty'],['🎮','Gaming'],['🍕','Food'],['⌚','Watches'],['👟','Footwear']]
      return `
        <section class="t-section">
          <div class="t-section-header"><h2 class="t-section-title">${escHtml(d.title || 'Browse by Category')}</h2></div>
          <div class="t-cats-grid" style="grid-template-columns:repeat(${cCols},1fr)">
            ${cats.slice(0, cCols).map(([e, n]) =>
              `<a href="shop.html?store=${slug}&cat=${encodeURIComponent(n)}" class="t-cat-card style-${style}">
                <div class="cat-icon">${e}</div><div class="cat-name">${escHtml(n)}</div>
              </a>`).join('')}
          </div>
        </section>`
    }

    /* ── Promo Banner ── */
    case 'banner':
    case 'promo_banner':
    case 'promotional_banner': {
      const bg     = d.bgColor || d.bg_color || themeSettings.primary_color || '#6c63ff'
      const tc     = d.textColor || d.text_color || '#ffffff'
      const layout = d.layout || 'center'
      return `
        <section class="t-banner layout-${layout}" style="background:${bg};color:${tc}">
          <div>
            <h2>${escHtml(d.heading || 'Limited Time Offer')}</h2>
            <p>${escHtml(d.subtext || 'Get 20% off your first order. Use code WELCOME20')}</p>
            <button class="btn-white" style="color:${bg}" onclick="location.href='${d.ctaLink || '#main-catalog'}'">
              ${escHtml(d.ctaText || 'Claim Offer')}
            </button>
          </div>
        </section>`
    }

    /* ── Testimonials ── */
    case 'testimonials': {
      const tCols = isMobile ? 1 : (parseInt(d.columns) || 3)
      const style  = d.style || 'card'
      const items  = [
        ['S','Sarah M.','Absolutely love this store! Fast shipping and great quality. Highly recommend!'],
        ['R','Rahul K.','Best shopping experience ever. Will definitely order again!'],
        ['A','Anita P.','Great products and excellent customer service. Five stars!'],
      ]
      return `
        <section class="t-testimonials">
          <div class="t-section-header">
            <h2 class="t-section-title">${escHtml(d.title || 'What Customers Say')}</h2>
            ${d.subtitle ? `<p class="t-section-subtitle">${escHtml(d.subtitle)}</p>` : ''}
          </div>
          <div class="t-testimonials-grid" style="grid-template-columns:repeat(${tCols},1fr)">
            ${items.map(([av,n,txt]) => `
              <div class="t-testimonial style-${style}">
                <div class="t-stars">★★★★★</div>
                <div class="t-ttext">"${escHtml(txt)}"</div>
                <div class="t-author"><div class="t-avatar">${av}</div><div class="t-aname">${escHtml(n)}</div></div>
              </div>`).join('')}
          </div>
        </section>`
    }

    /* ── Newsletter ── */
    case 'newsletter':
    case 'newsletter_signup': {
      const bgS   = d.bgColor ? `background:${d.bgColor}` : 'background:var(--bg)'
      const tcS   = d.textColor ? `color:${d.textColor}` : ''
      const btnBg = d.btnColor || themeSettings.primary_color || '#6c63ff'
      return `
        <section class="t-newsletter" style="${bgS};${tcS}">
          <h2>${escHtml(d.heading || 'Stay in the loop')}</h2>
          <p>${escHtml(d.subtext || 'Get exclusive deals and offers straight to your inbox.')}</p>
          <div class="t-nl-form">
            <input class="t-nl-input" type="email" placeholder="${escHtml(d.inputPlaceholder || 'Enter your email address')}">
            <button class="btn-theme" style="background:${btnBg};white-space:nowrap"
              onclick="subscribeNewsletter(this)">
              ${escHtml(d.btnText || 'Subscribe')} →
            </button>
          </div>
        </section>`
    }

    /* ── Footer ── */
    case 'footer': {
      const bgS = d.bgColor ? `background:${d.bgColor}` : ''
      const tcS = d.textColor ? `color:${d.textColor}` : ''
      const footerText = d.footerText || d.footer_text || themeSettings.footer_text || `© ${new Date().getFullYear()} My Store. All rights reserved.`
      return `
        <footer class="t-footer" style="${bgS};${tcS}">
          <div class="t-footer-logo">${escHtml(storeConfig.name || 'My Store')}</div>
          <div class="t-footer-copy">${escHtml(footerText)}</div>
          ${d.showSocial !== 'no' ? `<div class="t-footer-links"><a href="#">Instagram</a><a href="#">Facebook</a><a href="#">Twitter</a></div>` : ''}
        </footer>`
    }

    /* ── Video ── */
    case 'video': {
      const bgS = d.bgColor ? `background:${d.bgColor}` : ''
      return `
        <section class="t-video t-section" style="${bgS}">
          <div class="t-section-header">
            <h2 class="t-section-title">${escHtml(d.heading || 'Our Story')}</h2>
            ${d.subtext ? `<p class="t-section-subtitle">${escHtml(d.subtext)}</p>` : ''}
          </div>
          <div class="t-video-box">
            ${d.videoUrl || d.video_url
              ? `<iframe src="${d.videoUrl || d.video_url}" style="width:100%;height:100%;border:none" allowfullscreen></iframe>`
              : `<div class="t-play-circle">▶</div><p style="font-size:13px;font-weight:600;opacity:.5">No video URL set</p>`}
          </div>
        </section>`
    }

    /* ── Countdown ── */
    case 'countdown':
    case 'countdown_timer': {
      const bgS = d.bgColor ? `background:${d.bgColor}` : 'background:var(--card-bg)'
      const tcS = d.textColor ? `color:${d.textColor}` : ''
      const ac  = d.accentColor || d.accent_color || themeSettings.primary_color || '#6c63ff'
      // Compute from endDate if provided
      const units = computeCountdown(d.endDate || d.end_date)
      return `
        <section class="t-countdown t-section" style="${bgS};${tcS}">
          <div class="t-section-header">
            <h2 class="t-section-title">⏳ ${escHtml(d.heading || 'Deal Ends In')}</h2>
            ${d.subtext ? `<p class="t-section-subtitle">${escHtml(d.subtext)}</p>` : ''}
          </div>
          <div class="t-cd-row">
            ${units.map(([n,l]) => `<div class="t-cd-unit"><div class="t-cd-num" style="color:${ac}">${n}</div><div class="t-cd-label">${l}</div></div>`).join('')}
          </div>
        </section>`
    }

    /* ── Gallery ── */
    case 'gallery':
    case 'image_gallery':
    case 'photo_gallery': {
      const gCols = isMobile ? 2 : (parseInt(d.columns) || 4)
      const ratio  = d.imgAspect === 'landscape' ? '16/9' : d.imgAspect === 'portrait' ? '3/4' : '1'
      const images = d.images || []
      const placeholders = ['🌿','✨','🎁','🛍️','💎','🌸','🔥','⚡']
      return `
        <section class="t-gallery t-section">
          <div class="t-section-header">
            <h2 class="t-section-title">${escHtml(d.title || 'Our Gallery')}</h2>
            ${d.subtitle ? `<p class="t-section-subtitle">${escHtml(d.subtitle)}</p>` : ''}
          </div>
          <div class="t-gallery-grid" style="grid-template-columns:repeat(${gCols},1fr)">
            ${placeholders.slice(0, isMobile ? 4 : 8).map((e, i) =>
              `<div class="t-gallery-item" style="aspect-ratio:${ratio}">
                ${images[i] ? `<img src="${escHtml(images[i])}" alt="Gallery ${i+1}" loading="lazy">` : e}
              </div>`).join('')}
          </div>
        </section>`
    }

    /* ── Trust Badges ── */
    case 'trustbadges':
    case 'trust_badges':
    case 'trust_section':
    case 'trust': {
      const bgS    = d.bgColor ? `background:${d.bgColor}` : 'background:var(--card-bg)'
      const tcS    = d.textColor ? `color:${d.textColor}` : ''
      const layout = d.layout || 'row'
      const gCols  = layout === '2x2' ? (isMobile ? 2 : 2) : layout === 'column' ? 1 : (isMobile ? 2 : 4)
      const badges = [
        [d.badge1 || 'Free Shipping','🚚'],
        [d.badge2 || 'Secure Payment','🔒'],
        [d.badge3 || 'Easy Returns','↩️'],
        [d.badge4 || '24/7 Support','💬'],
      ]
      return `
        <section class="t-trust" style="${bgS};${tcS}">
          <div class="t-trust-grid" style="grid-template-columns:repeat(${gCols},1fr)">
            ${badges.map(([label, icon]) =>
              `<div class="t-trust-item"><span class="t-trust-icon">${icon}</span><span class="t-trust-label">${escHtml(label)}</span></div>`
            ).join('')}
          </div>
        </section>`
    }

    /* ── FAQ ── */
    case 'faq':
    case 'faq_section': {
      const pairs = [[d.q1,d.a1],[d.q2,d.a2],[d.q3,d.a3]].filter(([q]) => q)
      const items  = pairs.length ? pairs : [
        ['How long does shipping take?','Typically 3–7 business days across India. Express delivery available at checkout.'],
        ['What is your return policy?','Hassle-free 30-day returns. No questions asked, full refund guaranteed.'],
        ['Do you offer Cash on Delivery?','Yes! COD is available across India on all orders.'],
      ]
      return `
        <section class="t-faq t-section">
          <div class="t-section-header">
            <h2 class="t-section-title">${escHtml(d.title || 'Frequently Asked Questions')}</h2>
            ${d.subtitle ? `<p class="t-section-subtitle">${escHtml(d.subtitle)}</p>` : ''}
          </div>
          ${items.map(([q, a]) => `
            <div class="t-faq-item">
              <div class="t-faq-q">${escHtml(q)}</div>
              <div class="t-faq-a">${escHtml(a)}</div>
            </div>`).join('')}
        </section>`
    }

    default: return ''
  }
}

/* ════════════════════════════════════════════
   COUNTDOWN HELPER
════════════════════════════════════════════ */
function computeCountdown(endDateStr) {
  if (!endDateStr) return [['02','Days'],['14','Hours'],['37','Mins'],['52','Secs']]
  const diff = Math.max(0, new Date(endDateStr) - Date.now())
  const d = Math.floor(diff / 86400000)
  const h = Math.floor((diff % 86400000) / 3600000)
  const m = Math.floor((diff % 3600000) / 60000)
  const s = Math.floor((diff % 60000) / 1000)
  return [
    [String(d).padStart(2,'0'),'Days'],
    [String(h).padStart(2,'0'),'Hours'],
    [String(m).padStart(2,'0'),'Mins'],
    [String(s).padStart(2,'0'),'Secs'],
  ]
}

/* ════════════════════════════════════════════
   FEATURED PRODUCTS — real API data
════════════════════════════════════════════ */
async function loadFeaturedProducts(sec) {
  const grid = document.getElementById('featured-grid')
  if (!grid) return

  const sec_el   = document.getElementById('theme-featured')
  const cs       = sec_el?.dataset.cardStyle   || cardStyle
  const count    = parseInt(sec_el?.dataset.count)  || 8
  const cols     = parseInt(sec_el?.dataset.cols)   || 3
  const priceColor = sec_el?.dataset.priceColor || themeSettings.primary_color || '#6c63ff'
  const cardBg   = sec_el?.dataset.cardBg       || themeSettings.card_bg || 'var(--card-bg)'
  const btnText  = sec_el?.dataset.btnText      || 'Add to Cart'
  const showOld  = sec_el?.dataset.showOld      !== 'no'
  const showRating = sec_el?.dataset.showRating === 'yes'
  const showBadge  = sec_el?.dataset.showBadge  === 'yes'
  const badgeText  = sec_el?.dataset.badgeText  || 'New'

  try {
    const data = await fetch(`${API}/shop/${slug}/products?limit=${count}`).then(r => r.json())
    const products = data.products || data || []
    if (!products.length) { grid.innerHTML = ''; return }

    grid.innerHTML = products.slice(0, count).map((p, i) =>
      buildThemedCard(p, cs, { priceColor, cardBg, btnText, showOld, showRating, showBadge, badgeText, i })
    ).join('')
  } catch(e) {
    console.warn('Featured products load failed:', e.message)
    grid.innerHTML = ''
  }
}

/* ════════════════════════════════════════════
   BUILD THEMED CARD — used for both featured and catalog
════════════════════════════════════════════ */
function buildThemedCard(p, style, opts = {}) {
  const {
    priceColor = 'var(--primary)',
    cardBg     = 'var(--card-bg)',
    btnText    = 'Add to Cart',
    showOld    = true,
    showRating = false,
    showBadge  = false,
    badgeText  = 'New',
    i          = 0,
  } = opts

  const disc     = discountPct(p)
  const oos      = isOOS(p)
  const imgSrc   = p.images?.[0]
  const imgHTML  = imgSrc
    ? `<img src="${escHtml(imgSrc)}" alt="${escHtml(p.name)}" loading="lazy">`
    : `<span style="font-size:44px">📦</span>`

  const priceHTML = `
    <div class="tc-price-row">
      <span class="tc-price" style="color:${priceColor}">${currency}${p.price.toFixed(2)}</span>
      ${showOld && p.compare_at_price ? `<span class="tc-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
      ${disc ? `<span class="tc-disc">-${disc}%</span>` : ''}
    </div>`

  const btnHTML = oos
    ? `<div class="tc-oos">Out of Stock</div>`
    : `<button class="tc-btn" id="tcbtn-${p._id}"
        onclick="event.preventDefault();addToCart('${p._id}','${escHtml(p.name.replace(/'/g,"\\'"))}',${p.price},'${escHtml(imgSrc||'')}')">
        🛒 ${escHtml(btnText)}
       </button>`

  const infoHTML = `
    <div class="tc-info">
      ${p.category_name ? `<div class="tc-cat">${escHtml(p.category_name)}</div>` : ''}
      ${showRating ? `<div class="tc-stars">★★★★☆ <span style="opacity:.4;font-size:10px">(${12 + i * 7})</span></div>` : ''}
      <div class="tc-name">${escHtml(p.name)}</div>
      ${priceHTML}
      ${style !== 'compact' ? btnHTML : ''}
    </div>`

  const overlayHTML = `
    <div class="tc-overlay-info">
      ${showRating ? `<div class="tc-stars">★★★★☆</div>` : ''}
      <div class="tc-name">${escHtml(p.name)}</div>
      ${priceHTML}
      ${oos ? `<div class="tc-oos">Out of Stock</div>` : `<button class="tc-btn"
        onclick="event.preventDefault();addToCart('${p._id}','${escHtml(p.name.replace(/'/g,"\\'"))}',${p.price},'${escHtml(imgSrc||'')}')">
        🛒 ${escHtml(btnText)}</button>`}
    </div>`

  const isOverlay = style === 'overlay'
  const bgStyle   = cardBg && cardBg !== 'var(--card-bg)' ? `background:${cardBg}` : ''

  return `
    <a class="tc" href="product.html?store=${slug}&id=${p._id}" style="${bgStyle}">
      ${disc >= 5 ? `<div class="tc-sale-badge">-${disc}%</div>` : (showBadge && i < 3 ? `<div class="tc-new-badge">${escHtml(badgeText)}</div>` : '')}
      <div class="tc-img">${imgHTML}</div>
      ${isOverlay ? overlayHTML : infoHTML}
    </a>`
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
async function init() {
  try {
    storeConfig = await fetch(`${API}/shop/${slug}/config`).then(r => r.json())
    if (storeConfig.error) throw new Error(storeConfig.error)

    // Update page title and header
    document.title = storeConfig.name + ' — Shop'
    document.getElementById('storeName').textContent = storeConfig.name
    document.getElementById('heroTitle').textContent = storeConfig.name
    document.getElementById('heroTagline').textContent = storeConfig.tagline || storeConfig.description || 'Discover amazing products'

    // Logo image
    if (storeConfig.logo_url) {
      const img = document.createElement('img')
      img.src = storeConfig.logo_url
      document.querySelector('.store-logo').prepend(img)
    }

    // Show default hero immediately with brand color; theme will replace if it has a hero
    const defaultHero = document.getElementById('default-hero')
    defaultHero.style.display = 'block'
    if (storeConfig.brand_color) {
      document.documentElement.style.setProperty('--primary', storeConfig.brand_color)
      document.documentElement.style.setProperty('--accent',  storeConfig.brand_color)
      defaultHero.style.background = `linear-gradient(135deg, ${storeConfig.brand_color}, ${storeConfig.brand_color}99)`
    }

    // Currency
    if      (storeConfig.currency === 'USD') currency = '$'
    else if (storeConfig.currency === 'EUR') currency = '€'

    // Payment badge
    if (storeConfig.payment_enabled) {
      document.getElementById('payBadge').style.display = 'flex'
    }

    // Account button
    const custToken = localStorage.getItem(`cust_token_${slug}`)
    const custName  = localStorage.getItem(`cust_name_${slug}`)
    const acctBtn   = document.getElementById('accountBtn')
    const acctLabel = document.getElementById('accountBtnLabel')
    if (acctBtn) {
      acctBtn.href = custToken ? `customer-account.html?store=${slug}` : `customer-login.html?store=${slug}`
      if (acctLabel) acctLabel.textContent = custToken && custName ? custName.split(' ')[0] : 'Login'
    }

    // Cart links
    document.getElementById('cartBtn').href    = `cart.html?store=${slug}`
    document.getElementById('cartBarBtn').href = `cart.html?store=${slug}`

    // Session storage
    sessionStorage.setItem('ekart_store',       slug)
    sessionStorage.setItem('ekart_currency',    currency)
    sessionStorage.setItem('ekart_store_name',  storeConfig.name)
    sessionStorage.setItem('ekart_pay_enabled', storeConfig.payment_enabled ? '1' : '0')

    // Load data in parallel
    await Promise.all([
      loadCategories(),
      loadProducts(),
    ])
    updateCartUI()

    // Load theme last (non-blocking, decorative)
    loadTheme()
  } catch(e) {
    document.body.innerHTML = `<div style="text-align:center;padding:80px;font-family:sans-serif;">
      <h2>Store not found</h2><p>${e.message}</p></div>`
  }
}

/* ════════════════════════════════════════════
   CATEGORIES
════════════════════════════════════════════ */
async function loadCategories() {
  try {
    const cats = await fetch(`${API}/shop/${slug}/categories`).then(r => r.json())
    const list  = document.getElementById('catList')
    list.innerHTML =
      `<div class="cat-item active" data-cat="" onclick="selectCat(this,'')">🛍 All</div>` +
      cats.map(c =>
        `<div class="cat-item" data-cat="${c._id}" onclick="selectCat(this,'${c._id}')">${escHtml(c.name)}</div>`
      ).join('')
  } catch(e) { console.warn('Categories failed:', e.message) }
}

/* ════════════════════════════════════════════
   PRODUCT CATALOG
════════════════════════════════════════════ */
async function loadProducts() {
  const q        = document.getElementById('searchInput').value.trim()
  const sort     = document.getElementById('sortSelect').value
  const minPrice = document.getElementById('priceMin').value
  const maxPrice = document.getElementById('priceMax').value
  const params   = new URLSearchParams({ page: currentPage })
  if (q)          params.set('q', q)
  if (currentCat) params.set('category', currentCat)
  if (sort)       params.set('sort', sort)
  if (minPrice)   params.set('min_price', minPrice)
  if (maxPrice)   params.set('max_price', maxPrice)

  document.getElementById('resultsCount').textContent = 'Loading…'
  try {
    const data     = await fetch(`${API}/shop/${slug}/products?${params}`).then(r => r.json())
    const products = data.products || []
    document.getElementById('resultsCount').textContent =
      `${data.total} product${data.total !== 1 ? 's' : ''} found`
    renderCatalogProducts(products)
    renderPagination(data.page, data.pages)
  } catch(e) {
    console.error('Products failed:', e.message)
    document.getElementById('resultsCount').textContent = 'Failed to load products'
  }
}

function renderCatalogProducts(products) {
  const grid = document.getElementById('catalog-grid')
  if (!products.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="ei">🔍</div>
      <h3>No products found</h3>
      <p>Try a different search or category</p>
    </div>`
    return
  }
  grid.innerHTML = products.map((p, i) => renderCatalogCard(p, i)).join('')
}

function renderCatalogCard(p, i) {
  const disc   = discountPct(p)
  const oos    = isOOS(p)
  const imgSrc = p.images?.[0]
  return `
    <a class="prod-card" href="product.html?store=${slug}&id=${p._id}">
      ${disc >= 5 ? `<div class="prod-badge sale">-${disc}%</div>` : ''}
      <div class="prod-img">
        ${imgSrc ? `<img src="${escHtml(imgSrc)}" alt="${escHtml(p.name)}" loading="lazy">` : `<span class="emoji-placeholder">📦</span>`}
      </div>
      <div class="prod-info">
        ${p.category_name ? `<div class="prod-cat">${escHtml(p.category_name)}</div>` : ''}
        <div class="prod-name">${escHtml(p.name)}</div>
        ${p.description ? `<div class="prod-desc">${escHtml(p.description)}</div>` : ''}
        <div class="prod-price-row">
          <span class="prod-price">${currency}${p.price.toFixed(2)}</span>
          ${p.compare_at_price ? `<span class="prod-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
          ${disc ? `<span class="prod-disc">-${disc}% off</span>` : ''}
        </div>
        ${oos
          ? `<div class="out-badge">Out of Stock</div>`
          : `<button class="btn-add" id="btn-${p._id}"
              onclick="event.preventDefault();addToCart('${p._id}','${escHtml(p.name.replace(/'/g,"\\'"))}',${p.price},'${escHtml(imgSrc||'')}')">
              🛒 Add to Cart
             </button>`}
      </div>
    </a>`
}

function renderPagination(page, pages) {
  const el = document.getElementById('pagination')
  if (pages <= 1) { el.innerHTML = ''; return }
  let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>← Prev</button>`
  for (let i = 1; i <= pages; i++) {
    if (pages <= 7 || i === 1 || i === pages || Math.abs(i - page) <= 2)
      html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`
    else if (Math.abs(i - page) === 3)
      html += `<span style="padding:8px;color:var(--text3)">…</span>`
  }
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>Next →</button>`
  el.innerHTML = html
}

function goPage(p)            { currentPage = p; loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }) }
function selectCat(el, catId) {
  document.querySelectorAll('.cat-item').forEach(x => x.classList.remove('active'))
  el.classList.add('active')
  currentCat = catId; currentPage = 1; loadProducts()
}
function onSearch() {
  clearTimeout(searchTimeout)
  searchTimeout = setTimeout(() => { currentPage = 1; loadProducts() }, 350)
}

/* ════════════════════════════════════════════
   CART
════════════════════════════════════════════ */
function getCart()   { return JSON.parse(localStorage.getItem('cart_' + slug) || '[]') }
function saveCart(c) { localStorage.setItem('cart_' + slug, JSON.stringify(c)) }

function addToCart(id, name, price, image) {
  const cart = getCart()
  const ex   = cart.find(x => x.product_id === id && !x.variant)
  if (ex) ex.qty++
  else cart.push({ product_id: id, name, price, image, qty: 1 })
  saveCart(cart)
  updateCartUI()

  // Feedback on catalog card button
  const btn = document.getElementById('btn-' + id) || document.getElementById('tcbtn-' + id)
  if (btn) {
    btn.textContent = '✅ Added!'
    btn.classList.add('added')
    setTimeout(() => { btn.textContent = '🛒 Add to Cart'; btn.classList.remove('added') }, 1400)
  }
  showToast('Added to cart! 🛒')
}

function updateCartUI() {
  const cart = getCart()
  const qty  = cart.reduce((s, x) => s + x.qty, 0)
  const amt  = cart.reduce((s, x) => s + x.price * x.qty, 0)
  const el   = document.getElementById('cartCount')
  el.textContent = qty
  el.className   = 'cart-count' + (qty > 0 ? ' has-items' : '')
  const bar = document.getElementById('cartBar')
  if (qty > 0) {
    bar.classList.add('show')
    document.getElementById('cartBarQty').textContent   = `${qty} item${qty !== 1 ? 's' : ''} — `
    document.getElementById('cartBarTotal').textContent = `${currency}${amt.toFixed(2)}`
  } else {
    bar.classList.remove('show')
  }
}

/* ════════════════════════════════════════════
   NEWSLETTER
════════════════════════════════════════════ */
function subscribeNewsletter(btn) {
  const input = btn.previousElementSibling
  if (!input || !input.value.includes('@')) {
    showToast('Please enter a valid email address')
    return
  }
  btn.textContent = '✅ Subscribed!'
  btn.disabled = true
  input.value = ''
  showToast('Thanks for subscribing! 🎉')
}

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2200)
}

if (slug) init()

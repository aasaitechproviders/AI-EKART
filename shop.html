<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --accent: #6c63ff; --bg: #f8f9fc; --surface: #ffffff; --border: #e8eaf0; --text: #1a1a2e; --text2: #64748b; --text3: #94a3b8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 64px; }
  .store-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); flex-shrink: 0; }
  .store-logo img { height: 38px; object-fit: contain; }
  .store-logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; }
  .search-bar { flex: 1; max-width: 480px; margin: 0 auto; position: relative; }
  .search-bar input { width: 100%; padding: 9px 16px 9px 40px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Outfit', sans-serif; outline: none; background: var(--bg); transition: border-color .15s; }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
  .cart-btn { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--accent); color: white; border-radius: 10px; text-decoration: none; font-size: 13.5px; font-weight: 600; position: relative; white-space: nowrap; }
  .cart-count { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; display: none; }
  .cart-count.has-items { display: flex; }

  /* HERO BANNER */
  .hero-banner { width: 100%; padding: 48px 24px; text-align: center; color: white; }
  .hero-banner h1 { font-size: clamp(28px, 5vw, 48px); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
  .hero-banner p { font-size: 16px; opacity: 0.85; }

  /* MAIN LAYOUT */
  .layout { max-width: 1200px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 220px 1fr; gap: 24px; }

  /* SIDEBAR FILTERS */
  .filters { position: sticky; top: 88px; align-self: start; }
  .filter-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .filter-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
  .cat-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text2); transition: all .15s; }
  .cat-item:hover { background: #f0f0ff; color: var(--accent); }
  .cat-item.active { background: rgba(108,99,255,0.1); color: var(--accent); font-weight: 600; }
  .sort-select { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; font-family: 'Outfit', sans-serif; color: var(--text); outline: none; cursor: pointer; }
  .sort-select:focus { border-color: var(--accent); }

  /* PRODUCTS GRID */
  .products-section {}
  .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .results-count { font-size: 14px; color: var(--text2); }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

  /* PRODUCT CARD */
  .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s; text-decoration: none; color: var(--text); display: block; }
  .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  .product-img { aspect-ratio: 1; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 48px; overflow: hidden; }
  .product-img img { width: 100%; height: 100%; object-fit: cover; }
  .product-info { padding: 14px; }
  .product-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .product-cat { font-size: 11.5px; color: var(--text3); margin-bottom: 8px; }
  .product-price-row { display: flex; align-items: center; gap: 8px; }
  .product-price { font-size: 16px; font-weight: 800; color: var(--text); }
  .product-compare { font-size: 12px; color: var(--text3); text-decoration: line-through; }
  .product-discount { font-size: 11px; font-weight: 700; color: #16a34a; background: #dcfce7; padding: 2px 6px; border-radius: 5px; }
  .btn-add { display: block; width: 100%; margin-top: 10px; padding: 8px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Outfit', sans-serif; transition: background .15s; }
  .btn-add:hover { background: #7b74ff; }
  .out-of-stock { font-size: 11.5px; color: #ef4444; font-weight: 600; margin-top: 8px; }

  /* PAGINATION */
  .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 32px; }
  .page-btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text2); cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 13.5px; transition: all .15s; }
  .page-btn:hover, .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.4; cursor: default; }

  /* EMPTY */
  .empty { text-align: center; padding: 80px 20px; color: var(--text3); }
  .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: white; border-radius: 12px; padding: 14px 20px; font-size: 14px; display: none; z-index: 2000; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .toast.show { display: block; }

  @media(max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .filters { position: static; display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; }
    .filter-section { min-width: 160px; margin-bottom: 0; }
    .header-inner { flex-wrap: wrap; height: auto; padding: 12px 16px; gap: 10px; }
    .search-bar { order: 3; max-width: 100%; width: 100%; margin: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="store-logo" href="javascript:void(0)" id="storeLogo">
      <span class="store-logo-text" id="storeName">Shop</span>
    </a>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search products..." oninput="onSearch()">
    </div>
    <a href="cart.html" class="cart-btn" id="cartBtn">
      🛒 Cart
      <span class="cart-count" id="cartCount">0</span>
    </a>
  </div>
</header>

<div class="hero-banner" id="heroBanner" style="background:linear-gradient(135deg,#6c63ff,#a78bfa);">
  <h1 id="heroTitle">Welcome to our Store</h1>
  <p id="heroTagline">Discover amazing products</p>
</div>

<div class="layout">
  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-section">
      <div class="filter-title">Categories</div>
      <div id="catList">
        <div class="cat-item active" data-cat="" onclick="selectCat(this,'')">🛍 All Products</div>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Sort By</div>
      <select class="sort-select" id="sortSelect" onchange="loadProducts()">
        <option value="">Newest</option>
        <option value="price_asc">Price: Low → High</option>
        <option value="price_desc">Price: High → Low</option>
      </select>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="products-section">
    <div class="results-bar">
      <span class="results-count" id="resultsCount">Loading...</span>
    </div>
    <div class="products-grid" id="productsGrid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3);">Loading products...</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const slug = new URLSearchParams(location.search).get('store')
if (!slug) { document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif;"><h2>Store not found</h2><p>No store slug provided in URL.</p></div>' }

const API = 'https://apiv2.aasaitech.in'

let storeConfig = {}
let currentCat = ''
let currentPage = 1
let searchTimeout = null
let currency = '₹'

async function init() {
  try {
    storeConfig = await fetch(`${API}/shop/${slug}/config`).then(r => r.json())
    if (storeConfig.error) throw new Error(storeConfig.error)
    document.title = storeConfig.name
    document.getElementById('storeName').textContent = storeConfig.name
    document.getElementById('heroTitle').textContent = storeConfig.name
    document.getElementById('heroTagline').textContent = storeConfig.tagline || storeConfig.description || 'Discover amazing products'
    if (storeConfig.logo_url) {
      const img = document.createElement('img')
      img.src = storeConfig.logo_url
      document.querySelector('.store-logo').prepend(img)
    }
    if (storeConfig.brand_color) {
      document.documentElement.style.setProperty('--accent', storeConfig.brand_color)
      document.getElementById('heroBanner').style.background = `linear-gradient(135deg,${storeConfig.brand_color},${storeConfig.brand_color}99)`
    }
    if (storeConfig.currency === 'USD') currency = '$'
    else if (storeConfig.currency === 'EUR') currency = '€'
    // Pass currency to cart page via storage
    sessionStorage.setItem('ekart_store', slug)
    sessionStorage.setItem('ekart_currency', currency)
    sessionStorage.setItem('ekart_store_name', storeConfig.name)

    await loadCategories()
    await loadProducts()
    updateCartBadge()
  } catch (e) {
    document.body.innerHTML = `<div style="text-align:center;padding:80px;font-family:sans-serif;"><h2>Store not found</h2><p>${e.message}</p></div>`
  }
}

async function loadCategories() {
  const cats = await fetch(`${API}/shop/${slug}/categories`).then(r => r.json())
  const list = document.getElementById('catList')
  list.innerHTML = `<div class="cat-item active" data-cat="" onclick="selectCat(this,'')">🛍 All</div>` +
    cats.map(c => `<div class="cat-item" data-cat="${c._id}" onclick="selectCat(this,'${c._id}')">${c.name}</div>`).join('')
}

async function loadProducts() {
  const q = document.getElementById('searchInput').value.trim()
  const sort = document.getElementById('sortSelect').value
  const params = new URLSearchParams({ page: currentPage })
  if (q) params.set('q', q)
  if (currentCat) params.set('category', currentCat)
  if (sort) params.set('sort', sort)
  try {
    const data = await fetch(`${API}/shop/${slug}/products?${params}`).then(r => r.json())
    document.getElementById('resultsCount').textContent = `${data.total} product${data.total !== 1 ? 's' : ''} found`
    renderProducts(data.products)
    renderPagination(data.page, data.pages)
  } catch (e) { console.error(e) }
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid')
  if (!products.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">🔍</div><h3>No products found</h3><p>Try a different search or category</p></div>`
    return
  }
  grid.innerHTML = products.map(p => {
    const img = p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.name}" loading="lazy">` : '📦'
    const discount = p.compare_at_price && p.compare_at_price > p.price
      ? Math.round((1 - p.price / p.compare_at_price) * 100) : 0
    const outOfStock = p.track_inventory && p.stock_qty <= 0
    return `<a class="product-card" href="product.html?store=${slug}&id=${p._id}">
      <div class="product-img">${img}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-cat">${p.category_name || ''}</div>
        <div class="product-price-row">
          <span class="product-price">${currency}${p.price.toFixed(2)}</span>
          ${p.compare_at_price ? `<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
          ${discount ? `<span class="product-discount">${discount}% off</span>` : ''}
        </div>
        ${outOfStock
          ? '<div class="out-of-stock">Out of Stock</div>'
          : `<button class="btn-add" onclick="event.preventDefault();addToCart('${p._id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.images?.[0]||''}')">Add to Cart</button>`}
      </div>
    </a>`
  }).join('')
}

function renderPagination(page, pages) {
  const el = document.getElementById('pagination')
  if (pages <= 1) { el.innerHTML = ''; return }
  let html = `<button class="page-btn" onclick="goPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>← Prev</button>`
  for (let i = 1; i <= pages; i++) {
    if (pages <= 7 || i === 1 || i === pages || Math.abs(i - page) <= 2) {
      html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`
    } else if (Math.abs(i - page) === 3) html += '<span style="padding:8px;">…</span>'
  }
  html += `<button class="page-btn" onclick="goPage(${page + 1})" ${page >= pages ? 'disabled' : ''}>Next →</button>`
  el.innerHTML = html
}

function goPage(p) { currentPage = p; loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }) }

function selectCat(el, catId) {
  document.querySelectorAll('.cat-item').forEach(x => x.classList.remove('active'))
  el.classList.add('active')
  currentCat = catId; currentPage = 1; loadProducts()
}

function onSearch() {
  clearTimeout(searchTimeout)
  searchTimeout = setTimeout(() => { currentPage = 1; loadProducts() }, 350)
}

// Cart helpers (stored in localStorage per store)
function getCart() { return JSON.parse(localStorage.getItem('cart_' + slug) || '[]') }
function saveCart(c) { localStorage.setItem('cart_' + slug, JSON.stringify(c)) }

function addToCart(id, name, price, image) {
  const cart = getCart()
  const existing = cart.find(x => x.product_id === id && !x.variant)
  if (existing) existing.qty++
  else cart.push({ product_id: id, name, price, image, qty: 1 })
  saveCart(cart)
  updateCartBadge()
  toast('Added to cart! 🛒')
}

function updateCartBadge() {
  const cart = getCart()
  const total = cart.reduce((s, x) => s + x.qty, 0)
  const el = document.getElementById('cartCount')
  el.textContent = total
  el.className = 'cart-count' + (total > 0 ? ' has-items' : '')
}

function toast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2000)
}

if (slug) init()
</script>
</body>
</html>

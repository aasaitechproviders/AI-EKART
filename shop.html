<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   RESET & DESIGN TOKENS
═══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Text */
  --p:#0f0f0f;
  --p2:#525252;
  --p3:#a3a3a3;
  /* Surfaces */
  --bg:#fafafa;
  --bg2:#f5f5f5;
  --bg3:#ebebeb;
  --border:#e8e8e8;
  /* Brand (overridden by theme) */
  --primary:#111111;
  /* Layout */
  --navbar-h:64px;
  --cols:4;
  /* Typography */
  --font:'DM Sans',system-ui,sans-serif;
  --font-display:'DM Serif Display',serif;
  /* Motion */
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(0,0,.2,1);
  /* Radius (overridden by theme) */
  --radius:14px;
  --btn-r:10px;
  /* Card dimensions */
  --card-radius:16px;
  --card-aspect:4/5;
  --card-gap:18px;
  /* Card typography */
  --card-name-fs:13.5px;
  --card-price-fs:15px;
  --card-cat-fs:10px;
  --card-btn-fs:12.5px;
  /* Card spacing */
  --card-info-pad:14px 14px 6px;
  --card-btn-pad:8px 14px 14px;
  --card-btn-h:42px;
  /* Card colors (set per-card via inline style) */
  --card-bg:#ffffff;
  --card-price-color:#111111;
  /* Shadows */
  --sh0:0 1px 3px rgba(0,0,0,.05);
  --sh1:0 4px 16px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);
  --sh2:0 16px 48px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
  --card-shadow:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.04);
  --card-shadow-hover:0 12px 40px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
}
body{font-family:var(--font);background:var(--bg);color:var(--p);-webkit-font-smoothing:antialiased;padding-bottom:80px;line-height:1.5}
img{display:block;max-width:100%}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}

/* ═══════════════════════════════════════════════════════════════
   LOADER
═══════════════════════════════════════════════════════════════ */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s var(--ease)}
#loader.out{opacity:0;pointer-events:none}
.ld-ring{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:ldSpin .8s linear infinite}
.ld-text{font-size:12.5px;color:var(--p3);letter-spacing:.05em;font-weight:500}
@keyframes ldSpin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════════════════════
   ANNOUNCEMENT BAR
═══════════════════════════════════════════════════════════════ */
.announcement-bar{background:var(--p);color:#fff;text-align:center;padding:10px 16px;font-size:12.5px;font-weight:500;letter-spacing:.04em;position:relative;z-index:201;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.ann-close{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;flex-shrink:0;margin-left:auto;transition:color .15s}
.ann-close:hover{color:#fff}
.ann-link{color:rgba(255,255,255,.8);text-decoration:underline;font-size:12px;white-space:nowrap}

/* ═══════════════════════════════════════════════════════════════
   FALLBACK HEADER
═══════════════════════════════════════════════════════════════ */
#origHeader{background:rgba(250,250,250,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.hdr-inner{max-width:1440px;margin:0 auto;padding:0 48px;height:var(--navbar-h);display:flex;align-items:center;justify-content:space-between;gap:24px}
.hdr-logo{font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:-.01em;color:var(--p);white-space:nowrap;display:flex;align-items:center;gap:10px}
.hdr-logo img{height:32px;object-fit:contain;border-radius:6px}
.hdr-nav{display:flex;align-items:center;gap:32px}
.hdr-nav a{font-size:13.5px;font-weight:500;color:var(--p2);transition:color .15s;letter-spacing:.01em}
.hdr-nav a:hover{color:var(--p)}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-icon-btn{width:38px;height:38px;border-radius:10px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--p2);transition:background .15s,color .15s}
.hdr-icon-btn:hover{background:var(--bg2);color:var(--p)}
.hdr-cart-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;background:var(--p);color:#fff;border-radius:var(--btn-r);font-size:13.5px;font-weight:600;border:none;cursor:pointer;transition:background .2s;letter-spacing:.01em}
.hdr-cart-btn:hover{background:#333}
.cart-badge{background:#fff;color:var(--p);font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px}
.cart-badge.on{display:flex}
#payBadge{display:none;padding:5px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px;font-size:11.5px;font-weight:600;color:#16a34a;align-items:center;gap:4px}

/* ═══════════════════════════════════════════════════════════════
   HERO BANNER (fallback)
═══════════════════════════════════════════════════════════════ */
#heroBanner{padding:80px 40px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border);display:none}
#heroBanner.visible{display:block}
#heroBanner h1{font-family:var(--font-display);font-size:clamp(32px,5vw,60px);font-weight:400;letter-spacing:-.02em;margin-bottom:14px;line-height:1.1}
#heroBanner p{font-size:16px;color:var(--p2);max-width:440px;margin:0 auto 32px;line-height:1.7}
.hero-cta{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:var(--p);color:#fff;border-radius:var(--btn-r);font-size:14px;font-weight:600;border:none;cursor:pointer;transition:opacity .2s}
.hero-cta:hover{opacity:.85}

/* ═══════════════════════════════════════════════════════════════
   PRODUCT GRID
═══════════════════════════════════════════════════════════════ */
.featured-section{max-width:1440px;margin:0 auto;box-sizing:border-box}
.products-grid{
  display:grid;
  grid-template-columns:repeat(var(--cols,4),1fr);
  gap:var(--card-gap,18px);
}

/* ═══════════════════════════════════════════════════════════════
   PRODUCT CARD — BASE
   Single authoritative block. No overrides below this.
═══════════════════════════════════════════════════════════════ */
.product-card{
  background:var(--card-bg,#fff);
  border-radius:var(--card-radius,16px);
  overflow:hidden;
  position:relative;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  border:1px solid var(--border);
  box-shadow:var(--card-shadow);
  transition:transform .22s var(--ease),box-shadow .22s var(--ease),border-color .2s;
  will-change:transform;
}
.product-card:hover{
  transform:translateY(-4px);
  box-shadow:var(--card-shadow-hover);
}

/* card-link */
.card-link{display:flex;flex-direction:column;flex:1;color:inherit;min-width:0;cursor:pointer}

/* ── Image ── */
.product-img{
  width:100%;
  aspect-ratio:var(--card-aspect,4/5);
  background:var(--bg2);
  overflow:hidden;
  position:relative;
  flex-shrink:0;
}
.product-img img{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .45s var(--ease-out);
  display:block;
}
.product-card:hover .product-img img{transform:scale(1.05)}
.img-fallback-icon{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:44px;opacity:.18;pointer-events:none;
}
.product-img.img-error img{display:none}

/* ── Badges ── */
.product-badge{
  position:absolute;top:10px;left:10px;
  font-size:10.5px;font-weight:700;
  padding:3px 10px;
  border-radius:6px;
  letter-spacing:.03em;
  z-index:2;line-height:1.4;
}
.badge-bestseller,.badge-hot{background:#f59e0b;color:#fff}
.badge-new{background:#10b981;color:#fff}
.badge-trending{background:#8b5cf6;color:#fff}
.badge-sale,.badge-discount{background:#ef4444;color:#fff}
.badge-custom{background:var(--primary);color:#fff}

/* ── Wishlist ── */
.wish-btn{
  position:absolute;top:10px;right:10px;
  width:32px;height:32px;
  border-radius:50%;
  background:rgba(255,255,255,.92);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
  z-index:3;
  opacity:0;
  transition:opacity .15s,transform .15s,background .15s;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
  backdrop-filter:blur(4px);
}
.product-card:hover .wish-btn{opacity:1}
.wish-btn.wished{opacity:1;color:#ef4444}
.wish-btn:hover{transform:scale(1.1);background:#fff}

/* ── Hover overlay ATC ── */
.card-atc-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.28) 0%,rgba(0,0,0,.08) 40%,transparent 70%);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:16px;
  opacity:0;
  transition:opacity .2s var(--ease);
  z-index:4;pointer-events:none;
}
.product-card:hover .card-atc-overlay{opacity:1;pointer-events:auto}
.card-atc-btn{
  padding:9px 22px;
  background:#fff;
  color:var(--p);
  border:none;
  border-radius:999px;
  font-size:12.5px;font-weight:700;
  cursor:pointer;font-family:var(--font);
  letter-spacing:.02em;
  transition:background .15s,transform .1s,box-shadow .15s;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  white-space:nowrap;
}
.card-atc-btn:hover{background:var(--bg2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.18)}

/* ── Product info ── */
.product-info{
  padding:var(--card-info-pad,14px 14px 6px);
  background:var(--card-bg,#fff);
  flex:1;min-width:0;
}
.product-cat{
  font-size:var(--card-cat-fs,10px);
  font-weight:600;color:var(--p2);
  margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.07em;
}
.product-name{
  font-size:var(--card-name-fs,13.5px);
  font-weight:600;
  line-height:1.45;
  margin-bottom:8px;
  color:var(--p);
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.product-price-row{
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;
}
.product-price{
  font-size:var(--card-price-fs,15px);
  font-weight:700;
  color:var(--card-price-color,var(--primary));
}
.product-compare{
  font-size:12px;
  text-decoration:line-through;
  opacity:.4;color:var(--p);
}
.product-discount{
  font-size:10.5px;font-weight:700;
  background:rgba(239,68,68,.1);color:#ef4444;
  padding:2px 7px;border-radius:5px;
}

/* ── Cart controls wrapper ── */
.cart-controls-wrap{
  padding:var(--card-btn-pad,8px 14px 14px);
  background:var(--card-bg,#fff);
  flex-shrink:0;
}
.cart-controls{width:100%}

/* ── ADD TO CART button ── */
.btn-add{
  width:100%;
  height:var(--card-btn-h,42px);
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:var(--btn-r,10px);
  font-size:var(--card-btn-fs,12.5px);
  font-weight:600;
  cursor:pointer;
  font-family:var(--font);
  letter-spacing:.025em;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:opacity .15s,transform .12s;
  position:relative;overflow:hidden;
}
.btn-add::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background .15s;
}
.btn-add:hover{opacity:.88;transform:translateY(-1px)}
.btn-add:active{transform:translateY(0);opacity:1}
.btn-add .btn-icon{font-size:14px;line-height:1}

/* Out of stock */
.out-of-stock-label{
  display:flex;align-items:center;justify-content:center;
  height:var(--card-btn-h,42px);
  font-size:12px;font-weight:600;color:var(--p3);
  background:var(--bg2);
  border-radius:var(--btn-r,10px);
  border:1px solid var(--border);
  letter-spacing:.03em;
}

/* ── Quantity selector ── */
.cart-qty-row{
  display:flex;align-items:center;
  height:var(--card-btn-h,42px);
  border-radius:var(--btn-r,10px);
  border:1.5px solid var(--primary);
  overflow:hidden;
  width:100%;
  background:#fff;
}
.qty-btn{
  flex:0 0 42px;height:100%;
  border:none;
  background:transparent;
  color:var(--primary);
  font-size:18px;font-weight:500;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;
  flex-shrink:0;
  line-height:1;
}
.qty-btn:hover{background:var(--primary);color:#fff}
.qty-value{
  flex:1;text-align:center;
  font-size:13.5px;font-weight:700;
  color:var(--p);
  background:transparent;
  pointer-events:none;
  user-select:none;
}

/* ── In-cart indicator ── */
.product-card.in-cart{
  border-color:var(--primary);
  border-width:1.5px;
}
.product-card.in-cart::before{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:2.5px;
  background:var(--primary);
  z-index:5;
}

/* ═══════════════════════════════════════════════════════════════
   CARD STYLE VARIANTS
   All scoped to [data-style="..."] — higher specificity, no !important
═══════════════════════════════════════════════════════════════ */

/* ── MINIMAL ──
   Clean lines, ghost button, no shadow */
[data-style="minimal"].products-grid{gap:12px}
[data-style="minimal"] .product-card{
  background:transparent;
  border:1.5px solid var(--border);
  box-shadow:none;
}
[data-style="minimal"] .product-card:hover{
  border-color:var(--primary);
  transform:none;
  box-shadow:0 4px 20px rgba(0,0,0,.06);
}
[data-style="minimal"] .product-card.in-cart::before{display:none}
[data-style="minimal"] .product-img{border-bottom:1px solid var(--border)}
[data-style="minimal"] .btn-add{
  background:transparent;
  color:var(--primary);
  border:1.5px solid var(--primary);
}
[data-style="minimal"] .btn-add:hover{background:var(--primary);color:#fff;opacity:1;transform:none}
[data-style="minimal"] .cart-qty-row{border-color:var(--primary)}

/* ── BOLD ──
   Strong top accent, high-contrast typography */
[data-style="bold"] .product-card{
  border:none;
  border-top:3px solid var(--primary);
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
[data-style="bold"] .product-card.in-cart::before{display:none}
[data-style="bold"] .product-card.in-cart{border-top-width:5px}
[data-style="bold"] .product-name{font-weight:700}
[data-style="bold"] .btn-add{font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:11px}

/* ── ELEVATED ──
   No border, floating shadow */
[data-style="elevated"] .product-card{
  border:none;
  box-shadow:0 4px 20px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);
}
[data-style="elevated"] .product-card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 50px rgba(0,0,0,.13),0 6px 18px rgba(0,0,0,.07);
}
[data-style="elevated"] .product-card.in-cart{
  box-shadow:0 0 0 2px var(--primary),0 4px 20px rgba(0,0,0,.07);
}
[data-style="elevated"] .product-card.in-cart::before{display:none}

/* ── COMPACT ──
   Dense grid, square images, essentials only */
[data-style="compact"].products-grid{gap:8px}
[data-style="compact"] .product-img{aspect-ratio:1/1}
[data-style="compact"] .product-info{padding:8px 10px 4px}
[data-style="compact"] .product-name{
  font-size:11.5px;
  -webkit-line-clamp:1;
  margin-bottom:3px;
}
[data-style="compact"] .product-price{font-size:12.5px}
[data-style="compact"] .product-cat,
[data-style="compact"] .product-compare,
[data-style="compact"] .product-discount{display:none}
[data-style="compact"] .cart-controls-wrap{padding:4px 8px 9px}
[data-style="compact"] .btn-add{height:34px;font-size:11px;border-radius:8px}
[data-style="compact"] .cart-qty-row{height:34px;border-radius:8px}
[data-style="compact"] .qty-btn{flex:0 0 34px;font-size:16px}
[data-style="compact"] .qty-value{font-size:12px}

/* ── LIST ──
   Horizontal row: [image 160px][info flex][controls 180px] */
[data-style="list"].products-grid{gap:12px}
[data-style="list"] .product-card{
  flex-direction:row;height:160px;align-items:stretch;
  border-radius:14px;
}
[data-style="list"] .card-link{flex-direction:row;flex:1;min-width:0}
[data-style="list"] .product-img{
  width:160px;min-width:160px;height:160px;
  aspect-ratio:unset;border-radius:0;flex-shrink:0;
}
[data-style="list"] .product-info{
  flex:1;padding:16px 18px;
  display:flex;flex-direction:column;justify-content:center;
  border-left:1px solid var(--border);min-width:0;
}
[data-style="list"] .product-name{-webkit-line-clamp:2;white-space:normal}
[data-style="list"] .product-card:hover{transform:none;box-shadow:0 8px 28px rgba(0,0,0,.1)}
[data-style="list"] .cart-controls-wrap{
  padding:0 18px;
  display:flex;align-items:center;
  flex-shrink:0;width:180px;
  border-left:1px solid var(--border);
}
[data-style="list"] .cart-controls{width:100%}
[data-style="list"] .btn-add{white-space:nowrap;height:40px;font-size:12px}
[data-style="list"] .cart-qty-row{height:40px}
[data-style="list"] .wish-btn{opacity:1}
[data-style="list"] .card-atc-overlay{display:none}
[data-style="list"] .product-card.in-cart::before{display:none}
[data-style="list"] .product-card.in-cart{border-left:3px solid var(--primary)}

/* ── MAGAZINE ──
   First card spans 2 cols × 2 rows */
[data-style="magazine"].products-grid{gap:14px}
[data-style="magazine"] .product-card:first-child{grid-column:span 2;grid-row:span 2}
[data-style="magazine"] .product-card:first-child .product-img{aspect-ratio:16/10}
[data-style="magazine"] .product-card:first-child .product-name{
  font-size:calc(var(--card-name-fs) * 1.35);
  -webkit-line-clamp:3;
}
[data-style="magazine"] .product-card:first-child .product-price{font-size:calc(var(--card-price-fs) * 1.2)}
[data-style="magazine"] .product-card:first-child .cart-controls-wrap{padding:10px 18px 18px}

/* ── OVERLAY ──
   Full image with gradient overlay, info hidden below image */
[data-style="overlay"] .product-card{overflow:hidden}
[data-style="overlay"] .product-img{aspect-ratio:3/4}
[data-style="overlay"] .product-info,
[data-style="overlay"] .cart-controls-wrap{display:none}
[data-style="overlay"] .product-card::before{display:none}
[data-style="overlay"] .product-card.in-cart{
  border:2px solid var(--primary);
}

/* Overlay info layer */
.ov-layer{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 55%,transparent 100%);
  padding:28px 14px 14px;
  color:#fff;z-index:3;
}
.ov-name{font-size:14px;font-weight:700;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ov-price-row{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.ov-price{font-size:16px;font-weight:700;color:#fff}
.ov-compare{font-size:12px;text-decoration:line-through;opacity:.55}
.ov-discount{font-size:10.5px;font-weight:700;background:rgba(239,68,68,.88);padding:2px 8px;border-radius:5px}
.ov-btn{
  width:100%;height:40px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.35);
  color:#fff;
  border-radius:var(--btn-r,10px);
  font-size:12.5px;font-weight:700;
  cursor:pointer;font-family:var(--font);
  letter-spacing:.02em;
  transition:background .15s,transform .1s;
}
.ov-btn:hover{background:rgba(255,255,255,.3);transform:translateY(-1px)}
.ov-qty-row{
  display:flex;align-items:center;height:40px;
  border-radius:var(--btn-r,10px);overflow:hidden;
  border:1px solid rgba(255,255,255,.4);width:100%;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(6px);
}
.ov-qty-btn{
  flex:0 0 40px;height:100%;
  border:none;background:transparent;
  color:#fff;font-size:18px;
  cursor:pointer;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s;flex-shrink:0;
}
.ov-qty-btn:hover{background:rgba(255,255,255,.2)}
.ov-qty-val{flex:1;text-align:center;font-size:13px;font-weight:700;color:#fff}

/* ═══════════════════════════════════════════════════════════════
   SKELETON
═══════════════════════════════════════════════════════════════ */
@keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
.skeleton{
  background:linear-gradient(90deg,#f0f0f0 25%,#fafafa 50%,#f0f0f0 75%);
  background-size:800px 100%;
  animation:shimmer 1.6s ease-in-out infinite;
  border-radius:var(--card-radius);
  border:none;box-shadow:none;
}
.skeleton *{visibility:hidden}

/* ═══════════════════════════════════════════════════════════════
   CART BAR
═══════════════════════════════════════════════════════════════ */
.cart-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--p);color:#fff;
  padding:14px 48px;
  display:none;align-items:center;justify-content:space-between;
  z-index:300;
  box-shadow:0 -4px 30px rgba(0,0,0,.15);
}
.cart-bar.on{display:flex}
.cbar-info{font-size:14px;font-weight:600}
.cbar-info span{color:rgba(255,255,255,.45);margin-right:10px;font-size:13px}
.cbar-btn{
  padding:11px 26px;
  background:#fff;color:var(--p);
  border-radius:var(--btn-r);
  font-size:13.5px;font-weight:700;
  transition:opacity .15s;
  text-decoration:none;letter-spacing:.01em;
}
.cbar-btn:hover{opacity:.9}

/* ═══════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:84px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--p);color:#fff;
  border-radius:10px;padding:10px 20px;
  font-size:13.5px;font-weight:500;
  opacity:0;transition:all .22s var(--ease);
  z-index:400;white-space:nowrap;pointer-events:none;
  box-shadow:var(--sh2);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══════════════════════════════════════════════════════════════
   NAVBAR SECTION
═══════════════════════════════════════════════════════════════ */
.tc-navbar{
  background:rgba(250,250,250,.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 48px;height:var(--navbar-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.nav-logo{font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:-.01em;cursor:pointer;display:flex;align-items:center;gap:10px;white-space:nowrap;flex-shrink:0}
.nav-logo-img{height:32px;object-fit:contain;border-radius:6px}
.nav-links{display:flex;gap:28px}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--p2);transition:color .15s;letter-spacing:.01em}
.nav-links a:hover{color:var(--p)}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-cart-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 18px;background:var(--p);color:#fff;
  border-radius:var(--btn-r);
  font-size:13.5px;font-weight:600;border:none;cursor:pointer;
  font-family:var(--font);text-decoration:none;
  transition:background .2s;letter-spacing:.01em;
}
.nav-cart-btn:hover{background:#333}

/* ═══════════════════════════════════════════════════════════════
   HERO SECTION
═══════════════════════════════════════════════════════════════ */
.tc-hero{position:relative;overflow:hidden;background:var(--bg2);text-align:center}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.hero-ov{position:absolute;inset:0;z-index:1}
.hero-content{position:relative;z-index:2}
.tc-hero h1{font-family:var(--font-display);font-size:clamp(32px,5.5vw,68px);font-weight:400;letter-spacing:-.03em;margin-bottom:18px;line-height:1.05}
.tc-hero h1 em{font-style:italic}
.tc-hero p{font-size:17px;color:var(--p2);max-width:520px;margin:0 auto 36px;line-height:1.75}
.hero-badge-pill{display:inline-block;background:rgba(0,0,0,.07);font-size:11px;font-weight:600;padding:4px 14px;border-radius:999px;margin-bottom:16px;letter-spacing:.04em}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-cta{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;padding:13px 28px;border-radius:var(--btn-r);font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:opacity .2s;text-decoration:none;letter-spacing:.01em}
.btn-cta:hover{opacity:.88}
.btn-cta-ghost{background:transparent;color:var(--p);border:1.5px solid rgba(0,0,0,.2)}
.btn-cta-ghost:hover{background:rgba(0,0,0,.05);opacity:1}

/* ═══════════════════════════════════════════════════════════════
   SECTION BASE
═══════════════════════════════════════════════════════════════ */
.tc-section{padding:64px 48px}
.tc-section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:10px}
.tc-section-title{font-family:var(--font-display);font-size:28px;font-weight:400;letter-spacing:-.02em}
.tc-section-subtitle{font-size:14px;color:var(--p2);margin-top:5px}
.tc-view-all{font-size:13px;font-weight:600;color:var(--p);border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;padding:7px 16px;transition:border-color .15s;text-decoration:none;white-space:nowrap;flex-shrink:0}
.tc-view-all:hover{border-color:var(--p)}

/* ═══════════════════════════════════════════════════════════════
   CATEGORIES
═══════════════════════════════════════════════════════════════ */
.tc-cats-grid{display:grid;gap:14px}
.tc-cat-card{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--border);transition:.22s var(--ease)}
.tc-cat-card:hover{border-color:var(--p);box-shadow:var(--sh1);transform:translateY(-2px)}
.tc-cat-img-wrap{aspect-ratio:1/1;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative}
.tc-cat-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s var(--ease)}
.tc-cat-card:hover .tc-cat-img{transform:scale(1.05)}
.tc-cat-footer{padding:12px 14px;background:#fff;display:flex;align-items:center;justify-content:space-between}
.tc-cat-name{font-size:13.5px;font-weight:600;color:var(--p)}
.tc-cat-count{font-size:12px;color:var(--p3)}
.tc-cats-grid.cats-circle{gap:24px}
.tc-cats-grid.cats-circle .tc-cat-card{background:transparent;border:none;box-shadow:none;display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 4px;border-radius:0}
.tc-cats-grid.cats-circle .tc-cat-card:hover{transform:translateY(-3px);box-shadow:none;border:none}
.tc-cats-grid.cats-circle .tc-cat-img-wrap{width:100%;border-radius:50%;border:3px solid transparent;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:border-color .2s,box-shadow .2s}
.tc-cats-grid.cats-circle .tc-cat-card:hover .tc-cat-img-wrap{border-color:var(--primary);box-shadow:0 6px 24px rgba(0,0,0,.14)}
.tc-cats-grid.cats-circle .tc-cat-footer{background:transparent;padding:0;flex-direction:column;align-items:center;gap:2px;width:100%}
.tc-cats-grid.cats-circle .tc-cat-name{font-size:14px;font-weight:700;text-align:center}
.tc-cats-grid.cats-circle .tc-cat-count{font-size:12px;color:var(--p3);text-align:center}

/* ═══════════════════════════════════════════════════════════════
   PROMO BANNER
═══════════════════════════════════════════════════════════════ */
.tc-promo-banner{padding:72px 48px;text-align:center;color:#fff;position:relative;overflow:hidden}
.tc-promo-banner::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:rgba(255,255,255,.08);border-radius:50%;pointer-events:none}
.tc-promo-content h2{font-family:var(--font-display);font-size:36px;font-weight:400;margin-bottom:12px}
.tc-promo-content p{opacity:.8;margin-bottom:24px;font-size:16px;line-height:1.6}
.banner-coupon-box{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);border:1.5px dashed rgba(255,255,255,.45);padding:9px 22px;border-radius:8px;font-size:15px;font-weight:700;letter-spacing:.1em;color:#fff;margin-bottom:20px;font-family:monospace}
.btn-ghost-white{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.5);padding:12px 28px;border-radius:var(--btn-r);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background .2s;display:inline-flex;align-items:center;gap:8px}
.btn-ghost-white:hover{background:rgba(255,255,255,.12)}
.btn-solid-white{background:#fff;color:var(--primary);padding:12px 28px;border-radius:var(--btn-r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);border:none;transition:opacity .2s;display:inline-flex;align-items:center;gap:8px}
.btn-solid-white:hover{opacity:.9}

/* ═══════════════════════════════════════════════════════════════
   TRUST BADGES
═══════════════════════════════════════════════════════════════ */
.tc-trust-section{padding:32px 48px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2)}
.tc-trust-grid{display:grid;gap:0}
.tc-trust-item{display:flex;align-items:center;gap:14px;padding:20px 28px;border-right:1px solid var(--border)}
.tc-trust-item:last-child{border-right:none}
.tc-trust-icon{font-size:26px;flex-shrink:0}
.tc-trust-label{font-size:14px;font-weight:700;color:var(--p)}
.tc-trust-sub{font-size:12px;color:var(--p3);margin-top:2px}

/* ═══════════════════════════════════════════════════════════════
   TESTIMONIALS
═══════════════════════════════════════════════════════════════ */
.tc-testimonials{padding:64px 48px;background:var(--bg2)}
.tc-testimonials-grid{display:grid;gap:16px;margin-top:32px}
.tc-testimonial{background:#fff;border-radius:14px;padding:24px;border:1px solid var(--border)}
.tc-t-stars{font-size:14px;margin-bottom:12px;letter-spacing:2px}
.tc-t-text{font-size:14px;color:var(--p2);line-height:1.75;margin-bottom:16px;font-style:italic}
.tc-t-author{display:flex;align-items:center;gap:10px}
.tc-t-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.tc-t-name{font-size:13px;font-weight:600}

/* ═══════════════════════════════════════════════════════════════
   NEWSLETTER
═══════════════════════════════════════════════════════════════ */
.tc-newsletter{padding:80px 48px;text-align:center}
.tc-newsletter h2{font-family:var(--font-display);font-size:34px;font-weight:400;letter-spacing:-.02em;margin-bottom:10px}
.tc-newsletter p{color:var(--p2);margin-bottom:32px;font-size:15px;line-height:1.7}
.tc-newsletter-form{display:flex;gap:8px;max-width:480px;margin:0 auto;flex-wrap:wrap}
.tc-newsletter-input{flex:1;min-width:200px;padding:13px 18px;border:1.5px solid var(--border);border-radius:var(--btn-r);font-size:14px;background:#fff;color:var(--p);font-family:var(--font);outline:none;transition:border-color .15s}
.tc-newsletter-input:focus{border-color:var(--primary)}
.tc-nl-note{font-size:12px;color:var(--p3);margin-top:14px}
.tc-newsletter-dark{background:var(--p);color:#fff}
.tc-newsletter-dark .tc-newsletter-input{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)}
.tc-newsletter-dark .tc-newsletter-input::placeholder{color:rgba(255,255,255,.4)}
.tc-newsletter-dark .tc-newsletter-input:focus{border-color:rgba(255,255,255,.5)}
.tc-newsletter-dark .tc-nl-note{color:rgba(255,255,255,.35)}
.tc-newsletter-dark h2,.tc-newsletter-dark p{color:#fff}
.tc-newsletter-dark p{opacity:.7}

/* ═══════════════════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════════════════ */
.tc-footer{padding:64px 48px 36px;border-top:1px solid var(--border)}
.tc-footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:56px;margin-bottom:48px}
.tc-footer-logo{font-family:var(--font-display);font-size:20px;font-weight:400;margin-bottom:8px;cursor:pointer;letter-spacing:-.01em}
.tc-footer-tagline{font-size:13px;color:var(--p3);line-height:1.75;margin-bottom:20px;max-width:260px}
.tc-footer-contact{font-size:13px;color:var(--p2);line-height:1.8;margin-top:12px}
.tc-footer-col-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--p3);margin-bottom:14px}
.tc-footer-col-links{display:flex;flex-direction:column;gap:10px}
.tc-footer-col-links a{font-size:14px;color:var(--p2);transition:color .15s;cursor:pointer}
.tc-footer-col-links a:hover{color:var(--p)}
.tc-footer-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-top:28px;border-top:1px solid var(--border)}
.tc-footer-copy{font-size:12.5px;color:var(--p3)}
.tc-footer-social{display:flex;gap:8px}
.tc-social-btn{width:34px;height:34px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;text-decoration:none;transition:background .15s}
.tc-social-btn:hover{background:var(--border)}

/* ═══════════════════════════════════════════════════════════════
   VIDEO
═══════════════════════════════════════════════════════════════ */
.tc-video-section{padding:64px 48px}
.tc-video-section-hd{margin-bottom:24px;text-align:center}
.tc-video-box{border-radius:16px;min-height:380px;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;border:1px solid var(--border)}
.tc-video-box iframe{width:100%;min-height:380px;border:none;display:block}
.tc-play-circle{width:68px;height:68px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.2);transition:transform .15s,box-shadow .15s}
.tc-play-circle:hover{transform:scale(1.07);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.tc-play-label{font-size:13px;font-weight:600;color:var(--p2)}

/* ═══════════════════════════════════════════════════════════════
   COUNTDOWN
═══════════════════════════════════════════════════════════════ */
.tc-countdown-section{padding:64px 48px;text-align:center}
.tc-countdown-row{display:flex;gap:14px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.tc-cd-unit{background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px 28px;min-width:90px;transition:border-color .2s}
.tc-cd-num{font-family:var(--font-display);font-size:44px;font-weight:400;line-height:1;color:var(--primary)}
.tc-cd-label{font-size:11px;font-weight:600;color:var(--p3);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}
.tc-countdown-cta{margin-top:36px}

/* ═══════════════════════════════════════════════════════════════
   GALLERY
═══════════════════════════════════════════════════════════════ */
.tc-gallery-section{padding:64px 48px}
.tc-gallery-grid{display:grid;gap:10px}
.tc-gallery-item{background:var(--bg2);border-radius:12px;overflow:hidden;display:block;cursor:pointer}
.tc-gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s var(--ease)}
.tc-gallery-item:hover img{transform:scale(1.04)}

/* ═══════════════════════════════════════════════════════════════
   FAQ
═══════════════════════════════════════════════════════════════ */
.tc-faq-section{padding:64px 48px}
.tc-faq-item{border-bottom:1px solid var(--border);padding:22px 0;cursor:pointer;user-select:none}
.tc-faq-item:first-of-type{border-top:1px solid var(--border)}
.tc-faq-q{font-size:15px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:16px;transition:color .15s}
.tc-faq-q-text{flex:1}
.tc-faq-icon{font-size:20px;color:var(--p3);transition:transform .22s var(--ease),color .15s;flex-shrink:0;line-height:1}
.tc-faq-item.open .tc-faq-icon{transform:rotate(45deg);color:var(--p)}
.tc-faq-item.open .tc-faq-q{color:var(--primary)}
.tc-faq-a{font-size:14px;color:var(--p2);line-height:1.75;margin-top:10px;display:none;padding-right:32px}
.tc-faq-item.open .tc-faq-a{display:block}

/* ═══════════════════════════════════════════════════════════════
   ABOUT
═══════════════════════════════════════════════════════════════ */
.tc-about-section{padding:64px 48px}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.about-heading{font-family:var(--font-display);font-size:34px;font-weight:400;letter-spacing:-.02em;margin-bottom:12px}
.about-subheading{font-size:15px;color:var(--primary);font-weight:700;margin-bottom:14px;line-height:1.6}
.about-body{font-size:14px;color:var(--p2);line-height:1.85;margin-bottom:28px}
.about-img-wrap{border-radius:16px;overflow:hidden;aspect-ratio:4/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:72px}
.about-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.about-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px;padding-top:40px;border-top:1px solid var(--border)}
.about-stat-num{font-family:var(--font-display);font-size:36px;color:var(--primary)}
.about-stat-label{font-size:13px;color:var(--p2);margin-top:4px;font-weight:500}

/* ═══════════════════════════════════════════════════════════════
   RICH TEXT
═══════════════════════════════════════════════════════════════ */
.tc-richtext-section{padding:64px 48px}
.richtext-inner{margin:0 auto;line-height:1.85}
.richtext-title{font-family:var(--font-display);font-size:30px;font-weight:400;letter-spacing:-.02em;margin-bottom:20px}
.richtext-body{font-size:15px;color:var(--p2);line-height:1.85}
.richtext-cta{margin-top:32px}

/* ═══════════════════════════════════════════════════════════════
   IMAGE + TEXT
═══════════════════════════════════════════════════════════════ */
.tc-imagetext-section{padding:64px 48px}
.imagetext-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.imagetext-img-wrap{border-radius:16px;overflow:hidden;aspect-ratio:4/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:72px}
.imagetext-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.imagetext-heading{font-family:var(--font-display);font-size:30px;font-weight:400;letter-spacing:-.02em;margin-bottom:12px}
.imagetext-subheading{font-size:15px;color:var(--primary);font-weight:700;margin-bottom:14px;line-height:1.6}
.imagetext-body{font-size:14px;color:var(--p2);line-height:1.85;margin-bottom:18px}
.imagetext-bullets{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.imagetext-bullet{font-size:14px;color:var(--p2);display:flex;align-items:flex-start;gap:8px;line-height:1.5}

/* ═══════════════════════════════════════════════════════════════
   BRANDS
═══════════════════════════════════════════════════════════════ */
.tc-brands-section{padding:48px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2)}
.brands-grid{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:12px;margin-top:24px}
.brand-pill{padding:10px 24px;background:#fff;border:1px solid var(--border);border-radius:999px;font-size:14px;font-weight:700;color:var(--p2);cursor:pointer;transition:all .15s;letter-spacing:-.01em}
.brand-pill:hover{border-color:var(--p);color:var(--p);box-shadow:var(--sh0)}

/* ═══════════════════════════════════════════════════════════════
   OFFERS
═══════════════════════════════════════════════════════════════ */
.tc-offers-section{padding:64px 48px}
.offers-grid{display:grid;gap:16px}
.offer-card{border-radius:14px;padding:28px;color:#fff;position:relative;overflow:hidden}
.offer-card::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:rgba(255,255,255,.09);border-radius:50%}
.offer-card::after{content:'';position:absolute;bottom:-20px;left:-20px;width:90px;height:90px;background:rgba(255,255,255,.06);border-radius:50%}
.offer-card-inner{position:relative;z-index:1}
.offer-title{font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-.01em}
.offer-desc{font-size:13.5px;opacity:.82;margin-bottom:16px;line-height:1.5}
.offer-code-wrap{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);border:1.5px dashed rgba(255,255,255,.5);padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:.08em;font-family:monospace}

/* ═══════════════════════════════════════════════════════════════
   TEAM
═══════════════════════════════════════════════════════════════ */
.tc-team-section{padding:64px 48px}
.team-grid{display:grid;gap:24px}
.team-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border);text-align:center;transition:.2s var(--ease)}
.team-card:hover{box-shadow:var(--sh1);transform:translateY(-3px)}
.team-avatar{width:100%;aspect-ratio:1/1;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:52px}
.team-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.team-info{padding:18px 16px}
.team-name{font-size:15px;font-weight:700;color:var(--p);margin-bottom:4px}
.team-role{font-size:12.5px;color:var(--p3)}

/* ═══════════════════════════════════════════════════════════════
   CONTACT
═══════════════════════════════════════════════════════════════ */
.tc-contact-section{padding:64px 48px}
.contact-grid{display:grid;grid-template-columns:1fr 1.5fr;gap:56px;margin-top:32px}
.contact-info-item{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px}
.contact-info-icon{font-size:20px;flex-shrink:0;margin-top:2px;width:40px;height:40px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.contact-info-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--p3);margin-bottom:2px}
.contact-info-val{font-size:14px;color:var(--p);line-height:1.6}
.contact-form-grid{display:flex;flex-direction:column;gap:14px}
.contact-field{display:flex;flex-direction:column;gap:6px}
.contact-field label{font-size:12px;font-weight:600;color:var(--p2);letter-spacing:.03em}
.contact-field input,.contact-field textarea{padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:#fff;color:var(--p);transition:border-color .15s;font-family:var(--font)}
.contact-field input:focus,.contact-field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.contact-field textarea{resize:vertical;min-height:120px}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════════════ */
@media(max-width:1200px){
  :root{--cols:3}
  .hdr-inner,.tc-navbar{padding:0 28px}
  .tc-section,.tc-trust-section,.tc-newsletter,.tc-promo-banner,.tc-footer,
  .tc-faq-section,.tc-countdown-section,.tc-gallery-section,.tc-video-section,
  .tc-about-section,.tc-richtext-section,.tc-imagetext-section,.tc-brands-section,
  .tc-offers-section,.tc-team-section,.tc-contact-section,.tc-testimonials,.featured-section{
    padding-left:28px;padding-right:28px;
  }
  .cart-bar{padding:14px 28px}
}
@media(max-width:768px){
  :root{--navbar-h:56px;--card-gap:10px}
  .hdr-inner,.tc-navbar{padding:0 16px}
  .hdr-nav,.nav-links{display:none}
  .tc-section,.tc-trust-section,.tc-newsletter,.tc-promo-banner,.tc-footer,
  .tc-faq-section,.tc-countdown-section,.tc-gallery-section,.tc-video-section,
  .tc-about-section,.tc-richtext-section,.tc-imagetext-section,.tc-brands-section,
  .tc-offers-section,.tc-team-section,.tc-contact-section,.tc-testimonials,.featured-section{
    padding-left:16px;padding-right:16px;
  }
  .tc-section-title{font-size:22px}
  .tc-footer-grid{grid-template-columns:1fr;gap:28px}
  .tc-trust-grid{grid-template-columns:repeat(2,1fr)}
  .tc-trust-item{border-right:none;border-bottom:1px solid var(--border)}
  .tc-testimonials-grid{grid-template-columns:1fr}
  /* Mobile: 2-col grid for all non-list styles */
  .products-grid:not([data-style="list"]){
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  /* List collapses to vertical */
  [data-style="list"] .product-card{height:auto;flex-direction:column}
  [data-style="list"] .card-link{flex-direction:column}
  [data-style="list"] .product-img{width:100%;min-width:unset;height:200px;aspect-ratio:unset}
  [data-style="list"] .product-info{border-left:none;border-top:1px solid var(--border)}
  [data-style="list"] .cart-controls-wrap{width:100%;border-left:none;border-top:1px solid var(--border);padding:10px 14px}
  /* Magazine: collapse span on mobile */
  [data-style="magazine"] .product-card:first-child{grid-column:span 1;grid-row:span 1}
  [data-style="magazine"] .product-card:first-child .product-img{aspect-ratio:var(--card-aspect)}
  .tc-newsletter-form{flex-direction:column}
  .tc-newsletter-input{min-width:unset;width:100%}
  .about-grid,.imagetext-grid,.contact-grid{grid-template-columns:1fr;gap:32px}
  .about-stats{grid-template-columns:repeat(3,1fr)}
  .offers-grid{grid-template-columns:1fr}
  .team-grid{grid-template-columns:repeat(2,1fr)}
  .cart-bar{padding:12px 16px}
  .tc-cd-unit{padding:16px 18px;min-width:72px}
  .tc-cd-num{font-size:32px}
  .tc-promo-banner{padding:48px 16px}
  .tc-promo-content h2{font-size:24px}
  /* Compact overrides on mobile */
  [data-style="compact"] .btn-add{height:32px;font-size:10.5px}
  [data-style="compact"] .cart-qty-row{height:32px}
  [data-style="compact"] .qty-btn{flex:0 0 32px}
}
</style>
</head>
<body>

<div id="loader">
  <div class="ld-ring"></div>
  <div class="ld-text">Loading store</div>
</div>

<header id="origHeader">
  <div class="hdr-inner">
    <a class="hdr-logo" href="javascript:void(0)" id="storeLogo" onclick="scrollTop()">
      <span id="storeName">Shop</span>
    </a>
    <nav class="hdr-nav" id="hdrNav"></nav>
    <div class="hdr-right">
      <div id="payBadge">⚡ Pay Online</div>
      <button class="hdr-icon-btn" id="accountBtnIcon" title="Account" onclick="gotoAccount()">👤</button>
      <button class="hdr-cart-btn" onclick="gotoCart()">
        🛒 <span id="cartLabel">Cart</span>
        <span class="cart-badge" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<div id="heroBanner" style="display:none">
  <div style="padding:80px 48px;max-width:1440px;margin:0 auto;text-align:center">
    <h1 id="heroTitle" style="font-family:var(--font-display);font-size:clamp(32px,5vw,60px);font-weight:400;letter-spacing:-.02em;margin-bottom:14px;line-height:1.1">Welcome</h1>
    <p id="heroTagline" style="font-size:16px;color:var(--p2);max-width:440px;margin:0 auto 32px;line-height:1.7">Discover amazing products</p>
    <button class="hero-cta" onclick="smoothScroll()">Shop Now →</button>
  </div>
</div>

<div id="page-sections"></div>

<div class="cart-bar" id="cartBar">
  <div class="cbar-info"><span id="cbarQty"></span><strong id="cbarTotal"></strong></div>
  <a href="#" class="cbar-btn" id="cartBarBtn">View Cart →</a>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const slug = new URLSearchParams(location.search).get('store')
if(!slug) document.body.innerHTML='<div style="text-align:center;padding:80px;font-family:sans-serif"><h2>Store not found</h2><p style="color:#888;margin-top:8px">Add ?store=your-slug to the URL</p></div>'

const API = 'https://apiv2.aasaitech.in'
const R = document.documentElement
let storeConfig = {}, themeData = null, currency = '₹'
let activeStyle = 'classic', activeSize = 'medium'
let globalCardSettings = {}

const ALL_CARD_STYLES = new Set(['classic','minimal','bold','elevated','compact','list','magazine','overlay'])

// Card size variables — control proportions per size tier
const CARD_SIZE_VARS = {
  small:{
    '--card-aspect':'1/1','--card-name-fs':'11.5px','--card-price-fs':'12.5px',
    '--card-info-pad':'8px 10px 4px','--card-btn-pad':'5px 10px 10px',
    '--card-btn-h':'36px','--card-btn-fs':'10.5px','--card-cat-fs':'8.5px','--card-gap':'10px'
  },
  medium:{
    '--card-aspect':'4/5','--card-name-fs':'13.5px','--card-price-fs':'15px',
    '--card-info-pad':'14px 14px 6px','--card-btn-pad':'8px 14px 14px',
    '--card-btn-h':'42px','--card-btn-fs':'12.5px','--card-cat-fs':'10px','--card-gap':'18px'
  },
  large:{
    '--card-aspect':'4/5','--card-name-fs':'15px','--card-price-fs':'17px',
    '--card-info-pad':'16px 18px 8px','--card-btn-pad':'10px 16px 16px',
    '--card-btn-h':'46px','--card-btn-fs':'13px','--card-cat-fs':'10px','--card-gap':'22px'
  }
}

function applyStyleToGrid(gridEl, style){
  gridEl.setAttribute('data-style', style || 'classic')
  if(style === 'list') gridEl.style.setProperty('--cols', '1')
  else gridEl.style.removeProperty('--cols')
}

function applyCardSizeVars(size){
  const vars = CARD_SIZE_VARS[size] || CARD_SIZE_VARS.medium
  Object.entries(vars).forEach(([k,v]) => R.style.setProperty(k, v))
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
const hideLoader = () => { const l=document.getElementById('loader'); if(l){l.classList.add('out');setTimeout(()=>l.remove(),450)} }
const showToast = m => { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2500) }
const scrollTop = () => window.scrollTo({top:0,behavior:'smooth'})
const smoothScroll = () => {
  const el = document.querySelector('.featured-section') || document.getElementById('mainAnchor')
  if(el){ const nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader'); window.scrollTo({top:el.getBoundingClientRect().top+scrollY-(nb?nb.offsetHeight+12:74),behavior:'smooth'}) }
}
const scrollToEl = id => { const el=document.getElementById(id); if(!el)return; const nb=document.querySelector('.tc-navbar')||document.getElementById('origHeader'); window.scrollTo({top:el.getBoundingClientRect().top+scrollY-(nb?nb.offsetHeight+12:74),behavior:'smooth'}) }
const gotoCart = () => location.href=`cart.html?store=${slug}`
const gotoAccount = () => location.href=localStorage.getItem(`cust_token_${slug}`)?`customer-account.html?store=${slug}`:`customer-login.html?store=${slug}`
const subscribeNL = (inputEl) => { const v=(inputEl||document.querySelector('.tc-newsletter-input'))?.value?.trim(); showToast(v?`📧 Thanks! We'll reach ${v}`:'Please enter your email') }

function readKey(obj,...keys){ if(!obj)return undefined; for(const k of keys){ const v=obj[k]; if(v!==undefined&&v!==null&&v!=='')return v } return undefined }

// ═══════════════════════════════════════════
// CART
// ═══════════════════════════════════════════
const getCart = () => JSON.parse(localStorage.getItem('cart_'+slug)||'[]')
const saveCart = c => localStorage.setItem('cart_'+slug, JSON.stringify(c))
const getQty = id => { const i=getCart().find(x=>x.product_id===id&&!x.variant); return i?i.qty:0 }

function getProductData(pid){
  const el = document.querySelector(`.cart-controls[data-pid="${pid}"]`) ||
             document.querySelector(`.ov-ctrl[data-pid="${pid}"]`)
  if(!el) return null
  return { id: pid, name: el.dataset.name, price: parseFloat(el.dataset.price), image: el.dataset.image }
}

function handleCartBtn(btn){
  const pid    = btn.dataset.pid
  const action = btn.dataset.action
  if(!pid) return
  const p = getProductData(pid)
  if(!p) return
  if(action === 'add' || action === 'inc') incCart(p.id, p.name, p.price, p.image)
  else if(action === 'dec') decCart(p.id)
}

function cardClick(event, pid, storeSlug){
  if(event.target.closest('button,.wish-btn,.cart-controls,.cart-controls-wrap,.ov-ctrl,.card-atc-overlay')) return
  location.href = `product.html?store=${storeSlug}&id=${pid}`
}

function incCart(id, name, price, image){
  const cart=getCart(), i=cart.find(x=>x.product_id===id&&!x.variant)
  if(i) i.qty++; else cart.push({product_id:id, name, price, image, qty:1})
  saveCart(cart); updateCartUI(); refreshProductCard(id); showToast('Added to cart ✓')
}
function decCart(id){
  const cart=getCart(), idx=cart.findIndex(x=>x.product_id===id&&!x.variant)
  if(idx!==-1){ if(cart[idx].qty>1)cart[idx].qty--; else cart.splice(idx,1); saveCart(cart); updateCartUI(); refreshProductCard(id) }
}
const addToCart = (id,n,p,img) => incCart(id,n,p,img)

// ═══════════════════════════════════════════
// REFRESH A SINGLE PRODUCT CARD
// ═══════════════════════════════════════════
function refreshProductCard(id){
  const qty = getQty(id)

  // Standard styles — update .cart-controls
  document.querySelectorAll(`.cart-controls[data-pid="${id}"]`).forEach(ctrlEl => {
    const card    = ctrlEl.closest('.product-card')
    const label   = (card && card.dataset.btnLabel) || globalCardSettings.btnLabel || 'Add to Cart'

    if(qty === 0){
      ctrlEl.innerHTML = `<button class="btn-add" data-action="add" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)"><span class="btn-icon">🛒</span>${esc(label)}</button>`
      if(card) card.classList.remove('in-cart')
      // Restore overlay ATC
      const isListStyle = card && card.closest('.products-grid[data-style="list"]')
      if(card && !isListStyle){
        let ov = card.querySelector('.card-atc-overlay')
        if(!ov){
          const imgWrap = card.querySelector('.product-img')
          if(imgWrap){
            ov = document.createElement('div')
            ov.className = 'card-atc-overlay'
            ov.innerHTML = `<button class="card-atc-btn" data-action="add" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button>`
            imgWrap.appendChild(ov)
          }
        }
      }
    } else {
      ctrlEl.innerHTML = `<div class="cart-qty-row">
        <button class="qty-btn" data-action="dec" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button>
        <span class="qty-value">${qty}</span>
        <button class="qty-btn" data-action="inc" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button>
      </div>`
      if(card){
        card.classList.add('in-cart')
        const ov = card.querySelector('.card-atc-overlay')
        if(ov) ov.remove()
      }
    }
  })

  // Overlay style — update .ov-ctrl
  document.querySelectorAll(`.ov-ctrl[data-pid="${id}"]`).forEach(ovCtrl => {
    const card  = ovCtrl.closest('.product-card')
    const label = (card && card.dataset.btnLabel) || globalCardSettings.btnLabel || 'Add to Cart'

    if(qty === 0){
      ovCtrl.innerHTML = `<button class="ov-btn" data-action="add" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button>`
      if(card) card.classList.remove('in-cart')
    } else {
      ovCtrl.innerHTML = `<div class="ov-qty-row">
        <button class="ov-qty-btn" data-action="dec" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button>
        <span class="ov-qty-val">${qty}</span>
        <button class="ov-qty-btn" data-action="inc" data-pid="${id}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button>
      </div>`
      if(card) card.classList.add('in-cart')
    }
  })
}

function updateCartUI(){
  const cart=getCart(), qty=cart.reduce((s,x)=>s+x.qty,0), amt=cart.reduce((s,x)=>s+x.price*x.qty,0)
  const el=document.getElementById('cartCount')
  el.textContent=qty; el.className='cart-badge'+(qty>0?' on':'')
  document.getElementById('cartLabel').textContent=qty>0?`(${qty})`:'Cart'
  const bar=document.getElementById('cartBar')
  if(qty>0){ bar.classList.add('on'); document.getElementById('cbarQty').textContent=`${qty} item${qty!==1?'s':''} — `; document.getElementById('cbarTotal').textContent=`${currency}${amt.toFixed(2)}` }
  else bar.classList.remove('on')
  document.querySelectorAll('.theme-cart-qty').forEach(e=>e.textContent=qty)
}

// ═══════════════════════════════════════════
// WISHLIST
// ═══════════════════════════════════════════
function toggleWish(pid,btn){
  const key=`wish_${slug}`, list=JSON.parse(localStorage.getItem(key)||'[]'), idx=list.indexOf(pid)
  if(idx===-1){ list.push(pid); btn.textContent='♥'; btn.classList.add('wished'); showToast('Saved to wishlist') }
  else { list.splice(idx,1); btn.textContent='♡'; btn.classList.remove('wished'); showToast('Removed from wishlist') }
  localStorage.setItem(key,JSON.stringify(list))
}
function restoreWish(){
  const list=JSON.parse(localStorage.getItem(`wish_${slug}`)||'[]')
  list.forEach(pid=>{
    document.querySelectorAll(`.product-card`).forEach(card=>{
      const cc = card.querySelector(`.cart-controls[data-pid="${pid}"]`)
      if(cc){
        const wb=card.querySelector('.wish-btn')
        if(wb){ wb.textContent='♥'; wb.classList.add('wished') }
      }
    })
  })
}

// ═══════════════════════════════════════════
// PRODUCT CARD RENDER
// ═══════════════════════════════════════════
const discPct = p => p.compare_at_price && p.compare_at_price > p.price ? Math.round((1-p.price/p.compare_at_price)*100) : 0
const isOOS = p => p.track_inventory && p.stock_qty <= 0

function getBadge(p,cls){
  const bt=p.badge_text||p.badge||''
  if(bt){
    const bl=bt.toLowerCase()
    const c=bl.includes('best')||bl.includes('seller')?'badge-bestseller':bl.includes('new')?'badge-new':bl.includes('trend')?'badge-trending':bl.includes('hot')?'badge-hot':bl.includes('sale')?'badge-sale':'badge-custom'
    return `<div class="${cls} ${c}">${esc(bt)}</div>`
  }
  const d=discPct(p)
  if(d>=5) return `<div class="${cls} badge-discount">−${d}%</div>`
  return ''
}

const colorPairs=[['#e8f4f8','#b2d8e8'],['#f8f0e8','#e8c8a8'],['#f0f8e8','#c8e8b0'],['#f8e8f0','#e8b0c8'],['#f0e8f8','#c8b0e8'],['#f8f8e8','#e8e8a0']]

function renderCard(p, cardOpts, styleOverride){
  cardOpts = cardOpts || {}
  const label      = cardOpts.btnLabel    || globalCardSettings.btnLabel    || 'Add to Cart'
  const cardBg     = cardOpts.cardBg      || globalCardSettings.cardBg      || '#ffffff'
  const priceColor = cardOpts.priceColor  || globalCardSettings.priceColor  || '#000000'
  const showOrig   = (cardOpts.showOriginal  !== 'no') && (globalCardSettings.showOriginal  !== 'no')
  const showBadge  = (cardOpts.showBadge     !== 'no') && (globalCardSettings.showBadge     !== 'no')

  const style = styleOverride || activeStyle

  const cardBgStyle = `--card-bg:${cardBg}`
  const priceStyle  = `style="color:${priceColor}"`
  const oos = isOOS(p), qty = getQty(p._id), imgUrl = p.images?.[0] || ''
  const d = discPct(p)
  const cIdx = (p.name||'').split('').reduce((s,c)=>s+c.charCodeAt(0),0) % colorPairs.length
  const [bg1,bg2c] = colorPairs[cIdx]
  const gradBg = imgUrl ? '' : `background:linear-gradient(135deg,${bg1},${bg2c});`

  const pid      = p._id
  const ctrlData = `data-pid="${pid}" data-name="${esc(p.name)}" data-price="${p.price}" data-image="${esc(imgUrl)}"`

  const imgTag   = imgUrl ? `<img src="${imgUrl}" alt="${esc(p.name)}" loading="lazy" onerror="this.closest('.product-img').classList.add('img-error')">` : ''
  const fallback = `<div class="img-fallback-icon">🛍️</div>`
  const badge    = showBadge ? getBadge(p,'product-badge') : ''
  const wish     = `<button class="wish-btn" data-wish="${pid}" onclick="event.preventDefault();event.stopPropagation();toggleWish(this.dataset.wish,this)">♡</button>`

  // ── OVERLAY STYLE ──────────────────────────────────────────────────
  if(style === 'overlay'){
    let ovCtrlHTML
    if(oos){
      ovCtrlHTML = `<div class="ov-ctrl" ${ctrlData}><span style="opacity:.5;font-size:12px">Out of stock</span></div>`
    } else if(qty > 0){
      ovCtrlHTML = `<div class="ov-ctrl" ${ctrlData}><div class="ov-qty-row">
        <button class="ov-qty-btn" data-action="dec" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button>
        <span class="ov-qty-val">${qty}</span>
        <button class="ov-qty-btn" data-action="inc" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button>
      </div></div>`
    } else {
      ovCtrlHTML = `<div class="ov-ctrl" ${ctrlData}><button class="ov-btn" data-action="add" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button></div>`
    }
    return `<div class="product-card${qty>0?' in-cart':''}" data-pid="${pid}" data-btn-label="${esc(label)}" style="${cardBgStyle}">
      <div class="card-link" onclick="cardClick(event,'${pid}','${slug}')">
        <div class="product-img" style="${gradBg}aspect-ratio:3/4">
          ${badge}${wish}${imgTag}${fallback}
          <div class="ov-layer">
            <div class="ov-name">${esc(p.name)}</div>
            <div class="ov-price-row">
              <span class="ov-price" ${priceStyle}>${currency}${p.price.toFixed(2)}</span>
              ${showOrig && p.compare_at_price ? `<span class="ov-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
              ${d ? `<span class="ov-discount">−${d}%</span>` : ''}
            </div>
            ${ovCtrlHTML}
          </div>
        </div>
      </div>
    </div>`
  }

  // ── ALL OTHER STYLES ───────────────────────────────────────────────
  let ctrlInner
  if(oos){
    ctrlInner = `<span class="out-of-stock-label">Out of stock</span>`
  } else if(qty > 0){
    ctrlInner = `<div class="cart-qty-row">
      <button class="qty-btn" data-action="dec" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">−</button>
      <span class="qty-value">${qty}</span>
      <button class="qty-btn" data-action="inc" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">+</button>
    </div>`
  } else {
    ctrlInner = `<button class="btn-add" data-action="add" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)"><span class="btn-icon">🛒</span>${esc(label)}</button>`
  }
  const ctrlHTML = `<div class="cart-controls" ${ctrlData}>${ctrlInner}</div>`

  const isListStyle = style === 'list'
  const hoverAtc = (oos || qty > 0 || isListStyle) ? '' :
    `<div class="card-atc-overlay"><button class="card-atc-btn" data-action="add" data-pid="${pid}" onclick="event.preventDefault();event.stopPropagation();handleCartBtn(this)">🛒 ${esc(label)}</button></div>`

  return `<div class="product-card${qty>0?' in-cart':''}" data-pid="${pid}" data-btn-label="${esc(label)}" style="${cardBgStyle}">
    <div class="card-link" onclick="cardClick(event,'${pid}','${slug}')">
      <div class="product-img" style="${gradBg}">
        ${badge}${wish}${imgTag}${fallback}${hoverAtc}
      </div>
      <div class="product-info">
        ${p.category_name ? `<div class="product-cat">${esc(p.category_name)}</div>` : ''}
        <div class="product-name">${esc(p.name)}</div>
        <div class="product-price-row">
          <span class="product-price" ${priceStyle}>${currency}${p.price.toFixed(2)}</span>
          ${showOrig && p.compare_at_price ? `<span class="product-compare">${currency}${p.compare_at_price.toFixed(2)}</span>` : ''}
          ${d ? `<span class="product-discount">−${d}%</span>` : ''}
        </div>
      </div>
    </div>
    <div class="cart-controls-wrap">
      ${ctrlHTML}
    </div>
  </div>`
}

// BUILD SECTION HTML
// ═══════════════════════════════════════════
function buildSec(sec, isMobile){
  const d = gd(sec)
  const bgS = d.bgColor ? `background:${d.bgColor};` : ''
  const tcS = d.textColor ? `color:${d.textColor};` : ''

  switch(sec.type){

    case 'announcement':{
      const sz=d.size==='large'?'15px':d.size==='small'?'11px':'13px'
      return `<div class="announcement-bar" style="${bgS}${tcS}font-size:${sz}">
        <span>${esc(d.text||'✨ Free shipping on orders above ₹999')}</span>
        ${d.linkText?`<a class="ann-link" href="${esc(d.linkUrl||'#')}">${esc(d.linkText)}</a>`:''}
        ${d.closable==='yes'?`<button class="ann-close" onclick="this.closest('.announcement-bar').remove()">✕</button>`:''}
      </div>`
    }

    case 'navbar':{
      const lt=d.logoText||storeConfig.name||'My Store'
      let links=d.navLinks?.length ? d.navLinks : [1,2,3,4,5].map(i=>d[`link${i}Text`]?{text:d[`link${i}Text`],url:d[`link${i}Url`]}:null).filter(Boolean)
      const lh=links.map(l=>{
        const url=l.url||l.href||'#', isA=url.startsWith('#'), sid=isA?url.slice(1):null
        const oc=isA?(sid===''||sid==='mainAnchor'?`onclick="event.preventDefault();smoothScroll()"`:`onclick="event.preventDefault();scrollToEl('${sid}')"`):``
        return `<a href="${esc(url)}" ${oc} style="${d.linkColor?'color:'+d.linkColor:''}">${esc(l.text||l.txt||'')}</a>`
      }).join('')
      const pos=d.sticky!=='no'?'sticky':'relative'
      return `<nav class="tc-navbar" id="themeNavbar" style="${d.bgColor?'background:'+d.bgColor+';':''}position:${pos};top:0;z-index:200">
        <div class="nav-logo" style="${d.logoColor?'color:'+d.logoColor:''}" onclick="scrollTop()">
          ${d.logoUrl?`<img src="${esc(d.logoUrl)}" class="nav-logo-img" alt="${esc(lt)}">`:''}
          <span ${d.logoUrl?'class="hidden"':''}>${esc(lt)}</span>
        </div>
        ${!isMobile&&links.length?`<div class="nav-links">${lh}</div>`:''}
        <div class="nav-right">
          ${d.showCart!=='no'?`<a href="cart.html?store=${slug}" class="nav-cart-btn">🛒 ${esc(d.cartText)} (<span class="theme-cart-qty">0</span>)</a>`:''}
        </div>
      </nav>`
    }

    case 'hero':{
      const pads={compact:isMobile?'48px 5% 40px':'72px 5% 60px',normal:isMobile?'64px 5% 56px':'112px 5% 96px',tall:isMobile?'96px 5% 72px':'160px 5% 128px',fullscreen:isMobile?'100px 5%':'180px 5%'}

      const hasBg=!!d.bgImage
      const secBg=hasBg?'':(d.bgColor?`background:${d.bgColor};`:'background:var(--bg2);')
      const ovOp=(parseInt(d.overlayOpacity)||40)/100
      const align=d.textAlign||'center'
      const justMap={left:'flex-start',right:'flex-end',center:'center'}
      return `<section class="tc-hero" style="${secBg}padding:${pad};text-align:${align}">
        ${hasBg?`<div class="hero-bg-img" style="background-image:url('${esc(d.bgImage)}')"></div><div class="hero-ov" style="background:${esc(d.overlayColor)};opacity:${ovOp}"></div>`:''}
        <div class="hero-content" style="${d.textColor?'color:'+d.textColor:''}">
          ${d.badgeText?`<div class="hero-badge-pill">${esc(d.badgeText)}</div>`:''}
          <h1>${esc(d.heading||'Welcome to our Store').replace(/(store|shop)/gi,m=>`<em>${m}</em>`)}</h1>
          <p>${esc(d.subheading||'Discover amazing products at the best prices.')}</p>
          <div class="hero-btns" style="justify-content:${justMap[align]||'center'}">
            <a class="btn-cta" href="javascript:void(0)" onclick="smoothScroll()">${esc(d.ctaText||'Shop now')} →</a>
            ${d.cta2Text?`<a class="btn-cta btn-cta-ghost" href="${esc(d.cta2Link)}">${esc(d.cta2Text)}</a>`:''}
          </div>
        </div>
      </section>`
    }

    case 'featured':{
      const sid=`ft-${sec.id}`
      const fc=d.featuredCols||d.columns||0
      const colsStyle=fc?`--cols:${fc};`:''
      const skCount=isMobile?2:(fc||4)

                           readKey(sec.data||{},'cardStyle','card_style') ||

                           activeStyle

      const cardOpts = {

        priceColor:    d.priceColor,

      setTimeout(()=>fillFeatured(sid, d.count||1000, cardOpts), 0)
      return `<section class="tc-section featured-section" id="${sid}" style="${colsStyle}">
        <div class="tc-section-hd">
          <div>
            <div class="tc-section-title">${esc(d.title||'Featured Products')}</div>
            ${d.subtitle?`<div class="tc-section-subtitle">${esc(d.subtitle)}</div>`:''}

          <a href="javascript:void(0)" onclick="smoothScroll()" class="tc-view-all">${esc(d.viewAllText)}</a>

    case 'categories':{

// FILL FEATURED
// ═══════════════════════════════════════════
async function fillFeatured(secId, count, cardOpts){
  const grid=document.getElementById(`${secId}-grid`); if(!grid)return
  try{
    const data=await fetch(`${API}/shop/${slug}/products?page=1&limit=${count}`).then(r=>r.json())
    const prods=data.products||[]
    if(!prods.length){ const s=grid.closest('section'); if(s)s.style.display='none'; return }
    const sectionStyle = cardOpts.cardStyle || activeStyle
    grid.className='products-grid'
    applyStyleToGrid(grid, sectionStyle)
    grid.innerHTML=prods.map(p=>renderCard(p, cardOpts, sectionStyle)).join('')
    restoreWish()
    updateCartUI()
  }catch(e){
    console.warn('[featured]',e.message)
    const s=document.getElementById(secId); if(s)s.style.display='none'
  }
}

async function fillCats(secId, cols, d, catStyle){
  const grid=document.getElementById(`${secId}-grid`); if(!grid)return
  const style=(catStyle||'image').toLowerCase()
  const isCircle=style==='circle'||style==='circular'||style==='round'
  if(isCircle)grid.classList.add('cats-circle')
  try{
    const cats=await fetch(`${API}/shop/${slug}/categories`).then(r=>r.json())
    const list=Array.isArray(cats)?cats:[]
    if(!list.length){ const s=grid.closest('section'); if(s)s.style.display='none'; return }
    const emMap={fashion:'👗',clothing:'👕',electronics:'📱',tech:'💻',home:'🏠',living:'🛋️',beauty:'💄',gaming:'🎮',food:'🍕',accessories:'👜',footwear:'👟',sports:'⚽',fitness:'💪',books:'📚',toys:'🧸',jewelry:'💎',health:'💊'}
    const getEmoji=n=>{ const lc=(n||'').toLowerCase(); for(const[k,v]of Object.entries(emMap))if(lc.includes(k))return v; return['🛍️','🎁','⭐','🏷️','✨','🎯'][(n||'?').charCodeAt(0)%6] }
    const showCount=d.showCount!=='no'
    const bg1=['#fef3c7','#fce7f3','#e0f2fe','#dcfce7','#ede9fe','#ffedd5']
    grid.innerHTML=list.map(c=>{
      const emoji=c.icon||getEmoji(c.name)
      const count=showCount&&c.product_count!=null?`${c.product_count}+`:''
      if(isCircle){
        const imgContent=c.image_url?`<img class="tc-cat-img" src="${esc(c.image_url)}" alt="${esc(c.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=\\'font-size:44px\\'>${emoji}</span>'">`:''
        return `<div class="tc-cat-card"><div class="tc-cat-img-wrap">${imgContent||`<span style="font-size:44px">${emoji}</span>`}</div><div class="tc-cat-footer"><span class="tc-cat-name">${esc(c.name)}</span>${count?`<span class="tc-cat-count">${count}</span>`:''}</div></div>`
      }
      if(c.image_url) return `<div class="tc-cat-card"><div class="tc-cat-img-wrap"><img class="tc-cat-img" src="${esc(c.image_url)}" alt="${esc(c.name)}" loading="lazy"></div><div class="tc-cat-footer"><span class="tc-cat-name">${esc(c.name)}</span>${count?`<span class="tc-cat-count">${count}</span>`:''}</div></div>`
      const bgColor=bg1[(c.name||'?').charCodeAt(0)%bg1.length]
      return `<div class="tc-cat-card"><div class="tc-cat-img-wrap" style="background:${bgColor}"><span style="font-size:48px">${emoji}</span></div><div class="tc-cat-footer"><span class="tc-cat-name">${esc(c.name)}</span>${count?`<span class="tc-cat-count">${count}</span>`:''}</div></div>`
    }).join('')
  }catch(e){ console.warn('[cats]',e.message); const s=document.getElementById(secId); if(s)s.style.display='none' }
}

// COLOR HELPER
// ═══════════════════════════════════════════
function isColorDark(hex){
  const c=(hex||'').replace('#','')
  if(c.length!==6)return false
  const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16)
  return(r*299+g*587+b*114)/1000<128
}

// ═══════════════════════════════════════════
// COUNTDOWN TICKER
// ═══════════════════════════════════════════
function startCountdowns(){
  document.querySelectorAll('[data-countdown]').forEach(el=>{
    const end=new Date(el.getAttribute('data-countdown')).getTime()
    function tick(){
      const diff=end-Date.now(); if(diff<=0)return
      const pad=n=>String(Math.max(0,Math.floor(n))).padStart(2,'0')
      const d=el.querySelector('.cd-days'),h=el.querySelector('.cd-hrs'),m=el.querySelector('.cd-min'),s=el.querySelector('.cd-sec')
      if(d)d.textContent=pad(diff/86400000)
      if(h)h.textContent=pad((diff%86400000)/3600000)
      if(m)m.textContent=pad((diff%3600000)/60000)
      if(s)s.textContent=pad((diff%60000)/1000)
    }
    tick(); setInterval(tick,1000)
  })
}

// LOAD THEME
// ═══════════════════════════════════════════
async function loadTheme(){
  try{
    const res=await fetch(`${API}/shop/${slug}/theme`)
    if(!res.ok)return
    const raw=await res.json()
    let doc
    if(raw.published&&typeof raw.published==='object') doc=raw.published
    else if(raw.draft&&typeof raw.draft==='object') doc=raw.draft
    else if(raw.settings||raw.sections) doc=raw
    else doc={settings:raw,sections:[]}
    themeData=doc
    applySettings(doc.settings||doc)
    const sections=(doc.sections||[]).map(s=>({...s,type:resolveType(s.type)}))
    renderSections(sections)
  }catch(e){ console.warn('[theme]',e.message) }
}

function applySettings(s){
  if(!s||typeof s!=='object')return
  const primary  = readKey(s,'primary_color','primaryColor')||'#0f0f0f'
  const bg       = readKey(s,'secondary_color','bgColor','bg_color','background_color')||'#fafafa'
  const text     = readKey(s,'accent_color','textColor','text_color')||'#0f0f0f'
  const radiusRaw= readKey(s,'radius','border_radius')||'14px'
  const radius   = typeof radiusRaw==='number'?`${radiusRaw}px`:String(radiusRaw).includes('px')?radiusRaw:`${radiusRaw}px`
  const font     = readKey(s,'font_heading','fontHeading','font')||'DM Sans'
  const btnStyle = readKey(s,'button_style','buttonStyle','btnStyle')||'rounded'
  const cols     = readKey(s,'cols','columns')||4
  const cardBg   = readKey(s,'card_bg','cardBg','card_background')||'#ffffff'
  const navBg    = readKey(s,'nav_bg','navBg')

  globalCardSettings = {
    cardBg:       cardBg,
    priceColor:   readKey(s,'price_color','priceColor')||primary,
    btnLabel:     readKey(s,'add_to_cart_label','btnText')||'Add to Cart',
    showOriginal: readKey(s,'show_original_price','showOldPrice')||'yes',
    showBadge:    readKey(s,'show_product_badge','showBadge')||'no'
  }

  // Compute button radius from style
  const btnR = btnStyle==='pill'?'999px' : btnStyle==='square'?'6px' : radius

  R.style.setProperty('--primary',primary)
  R.style.setProperty('--brand',primary)
  R.style.setProperty('--p',text)
  R.style.setProperty('--bg',bg)
  R.style.setProperty('--radius',radius)
  R.style.setProperty('--card-radius',radius)
  R.style.setProperty('--btn-r',btnR)
  // NOTE: --card-bg is set per-card via inline style="--card-bg:..."
  // to avoid global bleed into all card info/control elements
  R.style.setProperty('--card-price-color',globalCardSettings.priceColor)
  R.style.setProperty('--font',`'${font}',system-ui,sans-serif`)
  R.style.setProperty('--cols', String(parseInt(cols)||4))
  if(navBg) R.style.setProperty('--navbar-bg',navBg)
  document.body.style.background=bg

  // Load custom font if needed
  if(font&&font!=='DM Sans'&&font!=='system-ui'){
    const fid='gf-'+font.replace(/\s+/g,'-')
    if(!document.getElementById(fid)){
      const l=document.createElement('link'); l.id=fid; l.rel='stylesheet'
      l.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;500;600;700;800&display=swap`
      document.head.appendChild(l)
    }
  }

  const rawStyle=readKey(s,'card_style','cardStyle')||'classic'
  activeStyle=ALL_CARD_STYLES.has(rawStyle)?rawStyle:'classic'
  activeSize=readKey(s,'card_size','cardSize')||'medium'
  applyCardSizeVars(activeSize)
  syncGridStyles()
}

// ═══════════════════════════════════════════
// RENDER SECTIONS
// ═══════════════════════════════════════════
function renderSections(sections){
  const isMobile=window.innerWidth<=768
  const visible=sections.filter(s=>s.is_visible!==false&&s.enabled!==false).sort((a,b)=>(a.order||0)-(b.order||0))
  if(!visible.length)return

  const hasNavbar=visible.some(s=>s.type==='navbar')
  const hasHero=visible.some(s=>s.type==='hero')
  document.getElementById('origHeader').style.display=hasNavbar?'none':''
  const hb=document.getElementById('heroBanner')
  if(hasHero)hb.style.display='none'; else hb.classList.add('visible')

  const page=document.getElementById('page-sections')
  page.innerHTML=''
  visible.forEach(sec => {
    const el=document.createElement('div')
    el.innerHTML=buildSec(sec,isMobile)
    while(el.firstChild) page.appendChild(el.firstChild)
  })

  document.querySelectorAll('.theme-cart-qty').forEach(e=>e.textContent=getCart().reduce((s,x)=>s+x.qty,0))
  setTimeout(()=>{ startCountdowns(); updateCartUI() }, 100)

  window.addEventListener('resize',()=>{
    applyCardSizeVars(activeSize)
    document.querySelectorAll('.products-grid[data-style="list"]').forEach(g=>g.style.setProperty('--cols','1'))
  },{passive:true})
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init(){
  try{
    storeConfig=await fetch(`${API}/shop/${slug}/config`).then(r=>r.json())
    if(storeConfig.error)throw new Error(storeConfig.error)
    document.title=storeConfig.name
    document.getElementById('storeName').textContent=storeConfig.name
    document.getElementById('heroTitle').textContent=storeConfig.name
    document.getElementById('heroTagline').textContent=storeConfig.tagline||storeConfig.description||'Discover amazing products'
    if(storeConfig.logo_url){
      const img=document.createElement('img'); img.src=storeConfig.logo_url
      img.style.cssText='height:32px;object-fit:contain;border-radius:6px'
      document.getElementById('storeLogo').prepend(img)
    }
    if(storeConfig.brand_color)R.style.setProperty('--primary',storeConfig.brand_color)
    if(storeConfig.currency==='USD')currency='$'; else if(storeConfig.currency==='EUR')currency='€'
    if(storeConfig.payment_enabled)document.getElementById('payBadge').style.display='flex'
    sessionStorage.setItem('ekart_store',slug)
    sessionStorage.setItem('ekart_currency',currency)
    sessionStorage.setItem('ekart_store_name',storeConfig.name)
    sessionStorage.setItem('ekart_pay_enabled',storeConfig.payment_enabled?'1':'0')
    document.getElementById('cartBarBtn').href=`cart.html?store=${slug}`
    const tok=localStorage.getItem(`cust_token_${slug}`),name=localStorage.getItem(`cust_name_${slug}`)
    if(tok&&name){ const icon=document.getElementById('accountBtnIcon'); if(icon)icon.title=name.split(' ')[0] }
    await loadTheme()
    updateCartUI()
    hideLoader()
    if(!document.querySelector('.tc-hero'))document.getElementById('heroBanner').classList.add('visible')
  }catch(e){
    document.body.innerHTML=`<div style="text-align:center;padding:80px;font-family:sans-serif"><div style="font-size:48px;margin-bottom:16px;opacity:.25">🏪</div><h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Store not found</h2><p style="color:#9ca3af;font-size:14px">${esc(e.message)}</p></div>`
    hideLoader()
  }
}

if(slug){ setTimeout(hideLoader,6000); init() } else hideLoader()
</script>

</html>

<!DOCTYPE html>
<html lang="en" style="background:#080910">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKart — Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">

<script>
/* ── BLOCKING: apply theme before first paint ── */
(function(){
  if (localStorage.getItem('ekart_theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light')
    document.documentElement.style.background = '#f0f0f5'
  }
})()
</script>

<style>
/* ══════════════════════════════════════════════
   SKELETON — mirrors sidebar + topbar + content
   exactly so there is zero layout shift on load
══════════════════════════════════════════════ */
@keyframes skel-shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position:  600px 0; }
}
.skel {
  border-radius: 6px;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0.04) 25%,
    rgba(255,255,255,0.09) 50%,
    rgba(255,255,255,0.04) 75%
  );
  background-size: 600px 100%;
  animation: skel-shimmer 1.4s infinite linear;
}
[data-theme="light"] .skel {
  background: linear-gradient(
    90deg,
    rgba(0,0,0,0.06) 25%,
    rgba(0,0,0,0.11) 50%,
    rgba(0,0,0,0.06) 75%
  );
  background-size: 600px 100%;
  animation: skel-shimmer 1.4s infinite linear;
}

#page-skeleton {
  position: fixed;
  inset: 0;
  display: flex;
  z-index: 9999;
  background: inherit;
  transition: opacity .25s ease;
}
#page-skeleton.skel-hidden {
  opacity: 0;
  pointer-events: none;
}

/* Sidebar replica */
.skel-sidebar {
  width: 240px;
  flex-shrink: 0;
  height: 100%;
  background: #0d0e18;
  border-right: 1px solid rgba(255,255,255,0.06);
  padding: 20px 14px;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
}
[data-theme="light"] .skel-sidebar {
  background: #fff;
  border-right-color: rgba(0,0,0,0.09);
}

/* Main area */
.skel-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Topbar replica */
.skel-topbar {
  height: 60px;
  flex-shrink: 0;
  background: #0d0e18;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  box-sizing: border-box;
}
[data-theme="light"] .skel-topbar {
  background: #fff;
  border-bottom-color: rgba(0,0,0,0.09);
}

/* Content body */
.skel-body {
  flex: 1;
  padding: 24px;
  overflow: hidden;
  box-sizing: border-box;
}

/* Sidebar internals */
.skel-sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 14px;
}
[data-theme="light"] .skel-sidebar-user { border-bottom-color: rgba(0,0,0,0.08); }
.skel-sidebar-user-text { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.skel-nav-rows { display: flex; flex-direction: column; gap: 4px; }

/* ══════════════════════════════════════════════
   LIGHT THEME OVERRIDES
══════════════════════════════════════════════ */
[data-theme="light"] {
  --surface:  #ffffff;
  --surface2: #f3f4f6;
  --surface3: #e9eaf0;
  --border:   rgba(0,0,0,0.10);
  --border2:  rgba(0,0,0,0.14);
  --text:     #111827;
  --text2:    #374151;
  --text3:    #9ca3af;
  --accent:   #6c63ff;
  --accent2:  #5b52e0;
  --green:    #16a34a;
  --red:      #dc2626;
  --yellow:   #ca8a04;
  background: #f0f0f5 !important;
}
[data-theme="light"] body              { background: #f0f0f5 !important; }
[data-theme="light"] .sidebar          { background: #fff !important; border-right-color: rgba(0,0,0,0.09) !important; }
[data-theme="light"] .main-wrap        { background: #f0f0f5 !important; }
[data-theme="light"] .topbar           { background: #fff !important; border-bottom-color: rgba(0,0,0,0.09) !important; }
[data-theme="light"] .topbar-title     { color: #111827 !important; }
[data-theme="light"] .content          { background: #f0f0f5 !important; }
[data-theme="light"] .tool-card        { background: #fff !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .tool-card:hover  { background: rgba(108,99,255,0.04) !important; }
[data-theme="light"] .tool-card.active { background: rgba(108,99,255,0.07) !important; border-color: #6c63ff !important; }
[data-theme="light"] .tool-card-name   { color: #111827 !important; }
[data-theme="light"] .tool-card-desc   { color: #9ca3af !important; }
[data-theme="light"] .tool-panel       { background: #fff !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .tool-panel-header { border-bottom-color: rgba(0,0,0,0.07) !important; }
[data-theme="light"] .tool-panel-header h2 { color: #111827 !important; }
[data-theme="light"] .result-block     { background: #f3f4f6 !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .result-content   { color: #374151 !important; }
[data-theme="light"] .result-copy-btn  { background: #fff !important; border-color: rgba(0,0,0,0.12) !important; color: #374151 !important; }
[data-theme="light"] .result-copy-btn:hover { background: #6c63ff !important; color: #fff !important; border-color: #6c63ff !important; }
[data-theme="light"] .tab-btn          { color: #6b7280 !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .tab-btn.active   { background: #6c63ff !important; color: #fff !important; border-color: #6c63ff !important; }
[data-theme="light"] .field input,
[data-theme="light"] .field textarea,
[data-theme="light"] .field select     { background: #f3f4f6 !important; color: #111827 !important; border-color: rgba(0,0,0,0.12) !important; }
[data-theme="light"] .field label      { color: #374151 !important; }
[data-theme="light"] .field-hint       { color: #9ca3af !important; }
[data-theme="light"] .nav-item         { color: #374151 !important; }
[data-theme="light"] .nav-item:hover,
[data-theme="light"] .nav-item.active  { background: rgba(108,99,255,0.08) !important; color: #5b52e0 !important; }
[data-theme="light"] .sidebar-logo     { color: #111827 !important; }
[data-theme="light"] .sidebar-user-name  { color: #111827 !important; }
[data-theme="light"] .sidebar-user-email { color: #9ca3af !important; }
[data-theme="light"] .nav-section-label  { color: #9ca3af !important; }
[data-theme="light"] .btn-logout       { color: #374151 !important; }
[data-theme="light"] .store-select-wrap { background: #f3f4f6 !important; border-color: rgba(0,0,0,0.12) !important; }
[data-theme="light"] .store-selector  { color: #111827 !important; background: transparent !important; }
[data-theme="light"] .store-select-label { color: #9ca3af !important; }
[data-theme="light"] .platform-tabs   { background: #f3f4f6 !important; border-color: rgba(0,0,0,0.10) !important; }
[data-theme="light"] .char-counter.ok { color: #16a34a !important; }
[data-theme="light"] .char-counter.warn { color: #ca8a04 !important; }
[data-theme="light"] .char-counter.over { color: #dc2626 !important; }
[data-theme="light"] .empty-panel      { color: #9ca3af !important; }
[data-theme="light"] .badge-gray       { background: #e9eaf0 !important; color: #374151 !important; }
[data-theme="light"] .hashtag          { background: rgba(108,99,255,0.1) !important; color: #5b52e0 !important; }

/* ── THEME TOGGLE ── */
.theme-toggle {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; flex-shrink: 0;
  transition: all .2s;
}
.theme-toggle:hover {
  border-color: rgba(108,99,255,0.4);
  background: rgba(108,99,255,0.08);
  transform: rotate(12deg) scale(1.05);
}
[data-theme="light"] .theme-toggle {
  background: #f3f4f6;
  border-color: rgba(0,0,0,0.12);
  color: #374151;
}

/* ══════════════════════════════════════════════
   PAGE CONTENT TRANSITIONS
══════════════════════════════════════════════ */
#page-content { will-change: opacity, transform; }

@keyframes pageIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page-enter { animation: pageIn .3s ease both; }

/* ── STORE SELECTOR LOADING INDICATOR ── */
.store-loading { position: relative; }
.store-loading::after {
  content: '';
  position: absolute;
  right: -20px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(108,99,255,0.25);
  border-top-color: var(--accent, #6c63ff);
  animation: spin .65s linear infinite;
  pointer-events: none;
}

/* ══════════════════════════════════════════════
   MARKETING LAYOUT
══════════════════════════════════════════════ */
.marketing-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 20px;
  align-items: start;
}

/* ── TOOL CARDS (Left Sidebar) ── */
.tool-list { display: flex; flex-direction: column; gap: 8px; }

.tool-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color .2s, background .2s, transform .18s, box-shadow .2s;
  position: relative;
  overflow: hidden;
}
.tool-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(108,99,255,0.06), transparent 60%);
  opacity: 0; transition: opacity .2s;
  pointer-events: none;
}
.tool-card:hover {
  border-color: rgba(108,99,255,0.30);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.tool-card:hover::before { opacity: 1; }
.tool-card.active {
  border-color: var(--accent);
  background: rgba(108,99,255,0.08);
  box-shadow: 0 4px 18px rgba(108,99,255,0.18);
}
.tool-card.active::before { opacity: 1; }
.tool-card-top {
  display: flex; align-items: center; gap: 12px; margin-bottom: 6px;
}
.tool-card-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  flex-shrink: 0;
  transition: background .2s;
}
.tool-card.active .tool-card-icon {
  background: rgba(108,99,255,0.15);
  border-color: rgba(108,99,255,0.25);
}
.tool-card-name { font-size: 14px; font-weight: 800; color: var(--text); }
.tool-card-desc { font-size: 11.5px; color: var(--text3); line-height: 1.5; padding-left: 50px; }
.tool-card-arrow {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%) translateX(-4px);
  font-size: 14px; color: var(--accent2);
  opacity: 0; transition: all .2s;
}
.tool-card.active .tool-card-arrow { opacity: 1; transform: translateY(-50%) translateX(0); }

/* ── TOOL PANEL (Right) ── */
.tool-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
}
.tool-panel-header {
  padding: 20px 24px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 14px;
  background: linear-gradient(135deg, rgba(108,99,255,0.04), transparent 60%);
}
.tool-panel-header-icon {
  width: 46px; height: 46px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  background: rgba(108,99,255,0.1);
  border: 1px solid rgba(108,99,255,0.2);
  flex-shrink: 0;
}
.tool-panel-header h2 { font-size: 17px; font-weight: 800; margin-bottom: 3px; color: var(--text); }
.tool-panel-header p  { font-size: 12px; color: var(--text3); line-height: 1.5; }
.tool-panel-body { padding: 24px; }

/* ── FORM FIELDS ── */
.tool-panel-body .field { margin-bottom: 16px; }
.tool-panel-body .field label {
  display: block; font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--text3); margin-bottom: 7px;
}
.tool-panel-body .field input,
.tool-panel-body .field textarea,
.tool-panel-body .field select {
  width: 100%; padding: 11px 14px;
  background: var(--surface2); color: var(--text);
  border: 1.5px solid var(--border2);
  border-radius: 11px;
  font-family: 'Outfit', sans-serif; font-size: 13.5px;
  outline: none; transition: border-color .15s, box-shadow .15s;
  box-sizing: border-box;
}
.tool-panel-body .field input:focus,
.tool-panel-body .field textarea:focus,
.tool-panel-body .field select:focus {
  border-color: rgba(108,99,255,0.55);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
}
.tool-panel-body .field textarea { min-height: 80px; resize: vertical; }
.tool-panel-body .field-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}
.field-hint { font-size: 11px; color: var(--text3); margin-top: 5px; line-height: 1.5; }

/* ── GENERATE BUTTON ── */
.btn-generate {
  width: 100%; padding: 13px;
  border-radius: 13px;
  border: none; cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: linear-gradient(135deg, #6c63ff, #a259ff);
  color: white;
  box-shadow: 0 4px 18px rgba(108,99,255,0.35);
  transition: all .2s;
  letter-spacing: 0.02em;
  position: relative; overflow: hidden;
}
.btn-generate::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  pointer-events: none;
}
.btn-generate:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(108,99,255,0.45);
}
.btn-generate:active:not(:disabled) { transform: translateY(0); }
.btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-generate .sparkle { font-size: 16px; }

/* ── RESULTS ── */
.mkt-results { margin-top: 20px; display: flex; flex-direction: column; gap: 14px; }

.result-block {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  overflow: hidden;
  animation: slideUp .25s ease both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.result-block:nth-child(2) { animation-delay: .05s; }
.result-block:nth-child(3) { animation-delay: .1s; }

.result-block-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.result-block-title {
  font-size: 10.5px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text3);
  display: flex; align-items: center; gap: 6px;
}
.result-copy-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 5px 12px;
  font-size: 11px; font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.result-copy-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
.result-copy-btn.copied { background: var(--green, #16a34a); color: white; border-color: var(--green, #16a34a); }

.result-body { padding: 14px 16px; }
.result-content {
  font-size: 13.5px; color: var(--text2);
  line-height: 1.75; white-space: pre-wrap; word-break: break-word;
}
.email-subject-text {
  font-size: 15px; font-weight: 800; color: var(--text);
  line-height: 1.4;
}

/* ── HASHTAGS ── */
.insta-hashtags { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 4px; }
.hashtag {
  font-size: 12px; font-weight: 600;
  color: var(--accent2);
  background: rgba(108,99,255,0.1);
  border-radius: 6px; padding: 3px 9px;
  transition: background .15s;
  cursor: default;
}
.hashtag:hover { background: rgba(108,99,255,0.18); }

/* ── CHAR COUNTER (SMS) ── */
.char-counter {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 800;
  margin-top: 10px; padding: 5px 10px;
  border-radius: 7px;
}
.char-counter.ok   { background: rgba(22,163,74,0.1);  color: var(--green, #16a34a); }
.char-counter.warn { background: rgba(202,138,4,0.1);  color: var(--yellow, #ca8a04); }
.char-counter.over { background: rgba(220,38,38,0.1);  color: var(--red, #dc2626); }

/* ── PLATFORM TABS ── */
.platform-tabs {
  display: flex; gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 4px;
  margin-bottom: 16px; width: fit-content;
}
.tab-btn {
  padding: 6px 14px; border-radius: 7px;
  font-size: 12.5px; font-weight: 700;
  cursor: pointer; border: none;
  background: none; color: var(--text3);
  font-family: 'Outfit', sans-serif;
  transition: all .15s;
}
.tab-btn.active { background: var(--accent); color: white; }
.tab-btn:hover:not(.active) { color: var(--text2); background: rgba(255,255,255,0.05); }

/* ── EMPTY / LOADING STATE ── */
.empty-panel {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 220px; gap: 10px;
  color: var(--text3);
}
.empty-panel-icon { font-size: 40px; opacity: 0.4; }
.empty-panel-text { font-size: 13px; font-weight: 600; }

.loading-dots {
  display: flex; gap: 5px;
  align-items: center; justify-content: center;
  padding: 40px 0;
}
.loading-dots span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  animation: dotBounce 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: .15s; }
.loading-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
  40%           { transform: scale(1);   opacity: 1; }
}

/* ── INLINE SKELETON FOR STORE SWITCH ── */
/* Mirrors the 2-col marketing layout exactly */
.inline-skel-marketing {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 20px;
  align-items: start;
}

/* ── SPINNER (used in button) ── */
@keyframes spin { to { transform: rotate(360deg); } }

/* responsive */
@media (max-width: 860px) {
  .marketing-layout { grid-template-columns: 1fr; }
  .inline-skel-marketing { grid-template-columns: 1fr; }
  .tool-list { flex-direction: row; flex-wrap: wrap; }
  .tool-card { flex: 1; min-width: 140px; }
  .tool-card-desc { padding-left: 0; }
}
@media (max-width: 560px) {
  .tool-panel-body .field-row { grid-template-columns: 1fr; }
}
</style>

<script src="api.js"></script>
<script src="nav.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════
  SKELETON — perfectly mirrors the real layout:
    skel-sidebar  → .sidebar
    skel-topbar   → .topbar
    skel-body     → .content

  Marketing-specific body:
    260px tool-list column + 1fr tool-panel card
══════════════════════════════════════════ -->
<div id="page-skeleton" aria-hidden="true">

  <!-- LEFT: sidebar replica -->
  <div class="skel-sidebar">
    <!-- Logo -->
    <div style="margin-bottom:22px;">
      <div class="skel" style="height:20px;width:72px;border-radius:5px;"></div>
    </div>

    <!-- User row -->
    <div class="skel-sidebar-user">
      <div class="skel" style="width:32px;height:32px;border-radius:50%;flex-shrink:0;"></div>
      <div class="skel-sidebar-user-text">
        <div class="skel" style="height:10px;width:90px;border-radius:4px;"></div>
        <div class="skel" style="height:9px;width:120px;border-radius:4px;"></div>
      </div>
    </div>

    <!-- Section label -->
    <div class="skel" style="height:8px;width:56px;border-radius:4px;margin-bottom:8px;opacity:.45;"></div>

    <!-- Nav items — "Marketing" (6th) is active -->
    <div class="skel-nav-rows">
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>
      <div class="skel" style="height:34px;border-radius:9px;opacity:.28;"></div>

<script>
/* ══════════════════════════════════════════════
   SKELETON DISMISSAL
══════════════════════════════════════════════ */
function hideSkeleton() {
  const skel = document.getElementById('page-skeleton')
  if (!skel) return
  skel.classList.add('skel-hidden')
  setTimeout(() => skel.remove(), 280)
}

/* ══════════════════════════════════════════════
   SMOOTH TRANSITION HELPERS
══════════════════════════════════════════════ */
const FADE_MS = 180

function fadeOut(el) {
  return new Promise(resolve => {
    el.style.transition    = `opacity ${FADE_MS}ms ease, transform ${FADE_MS}ms ease`
    el.style.opacity       = '0'
    el.style.transform     = 'translateY(-6px)'
    el.style.pointerEvents = 'none'
    setTimeout(resolve, FADE_MS)
  })
}

function fadeIn(el) {
  el.style.transition    = 'none'
  el.style.opacity       = '0'
  el.style.transform     = 'translateY(8px)'
  el.style.display       = ''
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.transition    = `opacity ${FADE_MS + 40}ms ease, transform ${FADE_MS + 40}ms ease`
      el.style.opacity       = '1'
      el.style.transform     = 'translateY(0)'
      el.style.pointerEvents = ''
    })
  })
}

/* ══════════════════════════════════════════════
   INLINE SKELETON for store-switch
   Mirrors the marketing 2-col grid exactly:
   260px tool-card column + 1fr tool-panel
══════════════════════════════════════════════ */
function inlineSkeletonHTML() {
  return `
    <div class="inline-skel-marketing">
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="skel" style="height:76px;border-radius:16px;"></div>
        <div class="skel" style="height:76px;border-radius:16px;opacity:.80;"></div>
        <div class="skel" style="height:76px;border-radius:16px;opacity:.60;"></div>
        <div class="skel" style="height:76px;border-radius:16px;opacity:.40;"></div>
      </div>
      <div class="skel" style="height:500px;border-radius:20px;opacity:.9;"></div>
    </div>`
}

/* ══════════════════════════════════════════════
   STORE SELECTOR BUSY INDICATOR
══════════════════════════════════════════════ */
function setStoreLoading(on) {
  const wrap = document.getElementById('store-select-wrap')
  if (!wrap) return
  on ? wrap.classList.add('store-loading') : wrap.classList.remove('store-loading')
}

/* ══════════════════════════════════════════════
   THEME SYSTEM
══════════════════════════════════════════════ */
let _isDark = localStorage.getItem('ekart_theme') !== 'light'

function applyTheme(dark) {
  _isDark = dark
  const root = document.documentElement
  if (dark) {
    root.removeAttribute('data-theme')
    root.style.background = '#080910'
  } else {
    root.setAttribute('data-theme', 'light')
    root.style.background = '#f0f0f5'
  }
  const btn = document.getElementById('themeToggleBtn')
  if (btn) btn.textContent = dark ? '🌙' : '☀️'
  localStorage.setItem('ekart_theme', dark ? 'dark' : 'light')
}
function toggleTheme() { applyTheme(!_isDark) }
applyTheme(_isDark)

/* ══════════════════════════════════════════════
   STATE
   _loadToken: race-condition guard.
   allProducts: refreshed per store.
   currentTool: persists across store switches
     so the user stays on the same tool.
══════════════════════════════════════════════ */
let currentStoreId = ''
let currentTool    = 'instagram'
let allProducts    = []
let _loadToken     = 0

const TOOLS = {
  instagram: {
    icon: '📸', name: 'Instagram Post',
    desc: 'Captions, hashtags & story text for maximum engagement',
    help: 'Generate scroll-stopping Instagram captions with trending hashtags for your products or store.'
  },
  whatsapp: {
    icon: '💬', name: 'WhatsApp Broadcast',
    desc: 'Promotional messages for customer broadcasts',
    help: 'Create personalized broadcast messages to announce sales, new arrivals, and exclusive offers.'
  },
  email: {
    icon: '📧', name: 'Email Campaign',
    desc: 'Subject line + full email body copy',
    help: 'Generate a full email campaign with compelling subject line, preview text and body for your customers.'
  },
  sms: {
    icon: '📱', name: 'SMS Blast',
    desc: 'Punchy 160-character promo texts',
    help: 'Short, conversion-optimized SMS messages that respect the 160-character limit.'
  }
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('marketing', (id) => {
    currentStoreId = id
    loadStoreData()
  })

  if (!nav) { hideSkeleton(); return }
  currentStoreId = nav.currentStoreId

  // Theme toggle button
  const topbarRight = document.querySelector('.topbar-right')
  if (topbarRight && !document.getElementById('themeToggleBtn')) {
    const btn       = document.createElement('button')
    btn.className   = 'theme-toggle'
    btn.id          = 'themeToggleBtn'
    btn.title       = 'Toggle day / night mode'
    btn.onclick     = toggleTheme
    btn.textContent = _isDark ? '🌙' : '☀️'
    topbarRight.insertBefore(btn, topbarRight.firstChild)
  }
  applyTheme(_isDark)

  if (currentStoreId) await loadStoreDataFirstLoad()
  else {
    renderPage()
    const content = document.getElementById('page-content')
    content.style.display = ''
    hideSkeleton()
  }
})

/* ══════════════════════════════════════════════
   FIRST LOAD — skeleton visible while fetching,
   then reveal content and dismiss skeleton.
══════════════════════════════════════════════ */
async function loadStoreDataFirstLoad() {
  const token   = ++_loadToken
  const content = document.getElementById('page-content')
  setStoreLoading(true)

  try {
    allProducts = await apiFetch(`/stores/${currentStoreId}/products`)
    if (token !== _loadToken) return
  } catch (_) {
    allProducts = []
  }

  if (token !== _loadToken) return

  renderPage()
  content.style.display = ''
  requestAnimationFrame(() => hideSkeleton())
  setStoreLoading(false)
}

/* ══════════════════════════════════════════════
   STORE SWITCH — 3-phase transition
   Phase 1 → fade out current content
   Phase 2 → inline shimmer skeleton
   Phase 3 → fetch products → fade in real content
══════════════════════════════════════════════ */
async function loadStoreData() {
  const token   = ++_loadToken
  const content = document.getElementById('page-content')
  const isFirst = content.style.display === 'none'

  if (isFirst) { await loadStoreDataFirstLoad(); return }

  setStoreLoading(true)

  // Phase 1: fade out
  await fadeOut(content)
  if (token !== _loadToken) return

  // Phase 2: inline skeleton
  content.innerHTML = inlineSkeletonHTML()
  fadeIn(content)

  // Fetch products for the new store
  try {
    allProducts = await apiFetch(`/stores/${currentStoreId}/products`)
  } catch (_) {
    allProducts = []
  }

  if (token !== _loadToken) return

  // Phase 3: fade out skeleton, render real content, fade in
  await fadeOut(content)
  if (token !== _loadToken) return

  renderPage()
  fadeIn(content)
  setStoreLoading(false)
}

/* ══════════════════════════════════════════════
   PAGE RENDER
   Builds the full marketing layout.
   Preserves currentTool selection across
   store switches.
══════════════════════════════════════════════ */
function renderPage() {
  const content        = document.getElementById('page-content')
  const productOptions = allProducts.map(p =>
    `<option value="${p._id}">${p.name}</option>`
  ).join('')

  content.innerHTML = `
    <div class="marketing-layout">

      <!-- Left: Tool selector -->
      <div class="tool-list">
        ${Object.entries(TOOLS).map(([key, t]) => `
          <div class="tool-card ${currentTool === key ? 'active' : ''}" onclick="switchTool('${key}')">
            <div class="tool-card-top">
              <div class="tool-card-icon">${t.icon}</div>
              <div class="tool-card-name">${t.name}</div>
            </div>
            <div class="tool-card-desc">${t.desc}</div>
            <span class="tool-card-arrow">→</span>
          </div>`).join('')}
      </div>

      <!-- Right: Active tool panel -->
      <div class="tool-panel" id="toolPanel">
        ${renderToolPanel(productOptions)}
      </div>

    </div>`
}

/* ══════════════════════════════════════════════
   TOOL PANEL HTML
══════════════════════════════════════════════ */
function renderToolPanel(productOptions) {
  const t        = TOOLS[currentTool]
  const hasOffer = currentTool === 'email' || currentTool === 'whatsapp'
  const label    = currentTool === 'instagram' ? 'Post'
                 : currentTool === 'email'     ? 'Email'
                 : currentTool === 'sms'       ? 'SMS'
                 : 'Message'

  return `
    <div class="tool-panel-header">
      <div class="tool-panel-header-icon">${t.icon}</div>
      <div>
        <h2>${t.name}</h2>
        <p>${t.help}</p>
      </div>
    </div>

    <div class="tool-panel-body">
      <div class="field">
        <label>Campaign Goal *</label>
        <input type="text" id="mktGoal"
          placeholder="e.g. Promote summer sale, Announce new product, Drive store traffic…">
      </div>

      <div class="field-row">
        <div class="field">
          <label>Product <span style="opacity:.5;font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
          <select id="mktProduct">
            <option value="">General / All Products</option>
            ${productOptions}
          </select>
        </div>
        <div class="field">
          <label>Tone</label>
          <select id="mktTone">
            <option value="friendly">😊 Friendly &amp; Warm</option>
            <option value="professional">💼 Professional</option>
            <option value="urgent">🔥 Urgent / FOMO</option>
            <option value="playful">🎉 Playful &amp; Fun</option>
            <option value="luxurious">✨ Premium &amp; Luxurious</option>
          </select>
        </div>
      </div>

      ${hasOffer ? `
      <div class="field">
        <label>Offer / Discount <span style="opacity:.5;font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
        <input type="text" id="mktOffer"
          placeholder="e.g. 20% off, Free shipping above ₹500, BOGO deal">
      </div>` : ''}

      <div class="field">
        <label>Brand / Store Name</label>
        <input type="text" id="mktBrand" placeholder="Your store or brand name">
      </div>

      <button class="btn-generate" onclick="generateMarketing()" id="mktGenBtn">
        <span class="sparkle">✨</span>
        Generate ${label}
      </button>

      <div id="mktResult"></div>
    </div>`
}

/* ══════════════════════════════════════════════
   SWITCH TOOL
   Updates tool card active state and re-renders
   the panel in place — no full-page transition
   needed since switching tools is instant and
   doesn't require a network round trip.
══════════════════════════════════════════════ */
function switchTool(tool) {
  currentTool = tool
  // Update left sidebar active state
  document.querySelectorAll('.tool-card').forEach((card, i) => {
    card.classList.toggle('active', Object.keys(TOOLS)[i] === tool)
  })
  // Re-render panel
  const productOptions = allProducts.map(p =>
    `<option value="${p._id}">${p.name}</option>`
  ).join('')
  document.getElementById('toolPanel').innerHTML = renderToolPanel(productOptions)
}

/* ══════════════════════════════════════════════
   GENERATE MARKETING CONTENT
══════════════════════════════════════════════ */
async function generateMarketing() {
  if (!currentStoreId) return toast('Select a store first', 'error')
  const goal = document.getElementById('mktGoal').value.trim()
  if (!goal)  return toast('Enter a campaign goal', 'error')

  const btn     = document.getElementById('mktGenBtn')
  const resultEl = document.getElementById('mktResult')
  const label   = currentTool === 'instagram' ? 'Post'
                : currentTool === 'email'     ? 'Email'
                : currentTool === 'sms'       ? 'SMS'
                : 'Message'

  btn.disabled = true
  btn.innerHTML = `<span style="display:inline-flex;gap:5px;align-items:center;"><span style="display:inline-block;animation:spin .7s linear infinite">⏳</span> Generating…</span>`
  resultEl.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`

  const productId = document.getElementById('mktProduct')?.value || ''
  const product   = allProducts.find(p => p._id === productId)
  const tone      = document.getElementById('mktTone').value
  const offer     = document.getElementById('mktOffer')?.value.trim() || ''
  const brand     = document.getElementById('mktBrand').value.trim()

  try {
    const stores = await apiFetch('/stores')
    const store  = stores.find(s => s._id === currentStoreId)

    const r = await apiFetch('/ai/marketing-content', {
      method: 'POST',
      body: JSON.stringify({
        store_name:          brand || store?.name || 'My Store',
        product_name:        product ? product.name : goal,
        product_description: product
          ? (product.description || '') + (offer ? ' Offer: ' + offer : '')
          : (offer || goal),
        platform:            currentTool,
        tone,
        currency:            'INR',
        price:               product ? product.price : ''
      })
    })

    const allContent = r.content
    let content
    if      (currentTool === 'instagram') content = allContent.instagram || allContent
    else if (currentTool === 'whatsapp')  content = allContent.whatsapp  || allContent
    else if (currentTool === 'email')     content = allContent.email     || allContent
    else if (currentTool === 'sms')       content = { message: allContent.sms || allContent.message || '' }
    else                                  content = allContent

    renderResult(content)
  } catch (e) {
    resultEl.innerHTML = `<div style="padding:16px;color:var(--red,#f87171);font-size:13px;font-weight:600;">⚠️ ${e.message}</div>`
  }

  btn.disabled = false
  btn.innerHTML = `<span class="sparkle">✨</span> Generate ${label}`
}

/* ══════════════════════════════════════════════
   RENDER RESULTS
══════════════════════════════════════════════ */
function renderResult(content) {
  const res = document.getElementById('mktResult')
  if (!content) {
    res.innerHTML = '<p style="color:var(--red,#f87171);padding-top:12px;">No content generated</p>'
    return
  }

  let html = '<div class="mkt-results">'

  if (currentTool === 'instagram') {
    const hashtags = content.hashtags || []
    html += resultBlock('📸 Caption', content.caption || content.text || '', 'instaCaption')
    if (hashtags.length) {
      html += `<div class="result-block">
        <div class="result-block-header">
          <span class="result-block-title">🏷️ Hashtags</span>
          <button class="result-copy-btn" onclick="copyBlock('instaHashtagsRaw', this)">📋 Copy all</button>
        </div>
        <div class="result-body">
          <div id="instaHashtagsRaw" style="display:none;">${hashtags.map(h => h.startsWith('#') ? h : '#' + h).join(' ')}</div>
          <div class="insta-hashtags">${hashtags.map(h => `<span class="hashtag">${h.startsWith('#') ? h : '#' + h}</span>`).join('')}</div>
        </div>
      </div>`
    }
    if (content.story_text) html += resultBlock('📱 Story Text', content.story_text, 'storyText')

  } else if (currentTool === 'whatsapp') {
    html += resultBlock('💬 Message', content.message || content.text || '', 'waMsg')
    if (content.cta) html += resultBlock('🔗 Call-to-Action', content.cta, 'waCta')

  } else if (currentTool === 'email') {
    html += `<div class="result-block">
      <div class="result-block-header">
        <span class="result-block-title">📌 Subject Line</span>
        <button class="result-copy-btn" onclick="copyBlock('emailSubject', this)">📋 Copy</button>
      </div>
      <div class="result-body">
        <div class="email-subject-text" id="emailSubject">${content.subject || ''}</div>
      </div>
    </div>`
    if (content.preheader) html += resultBlock('👁️ Preview Text', content.preheader, 'emailPreheader')
    html += resultBlock('📧 Email Body', content.body || content.text || '', 'emailBody')

  } else if (currentTool === 'sms') {
    const msg = content.message || content.text || ''
    const len = msg.length
    const cls  = len > 160 ? 'over' : len > 140 ? 'warn' : 'ok'
    const icon = len > 160 ? '⚠️'  : len > 140 ? '⚡'   : '✓'
    html += `<div class="result-block">
      <div class="result-block-header">
        <span class="result-block-title">📱 SMS Message</span>
        <button class="result-copy-btn" onclick="copyBlock('smsMsg', this)">📋 Copy</button>
      </div>
      <div class="result-body">
        <div class="result-content" id="smsMsg">${msg}</div>
        <div class="char-counter ${cls}">${icon} ${len} / 160 characters${len > 160 ? ' — Too long!' : len > 140 ? ' — Near limit' : ' — Good'}</div>
      </div>
    </div>`
  }

  html += '</div>'
  document.getElementById('mktResult').innerHTML = html
}

function resultBlock(title, text, id) {
  return `<div class="result-block">
    <div class="result-block-header">
      <span class="result-block-title">${title}</span>
      <button class="result-copy-btn" onclick="copyBlock('${id}', this)">📋 Copy</button>
    </div>
    <div class="result-body">
      <div class="result-content" id="${id}">${text}</div>
    </div>
  </div>`
}

/* ══════════════════════════════════════════════
   COPY TO CLIPBOARD
══════════════════════════════════════════════ */
function copyBlock(id, btn) {
  const el = document.getElementById(id)
  if (!el) return
  navigator.clipboard.writeText(el.textContent)
    .then(() => {
      btn.textContent = '✓ Copied!'
      btn.classList.add('copied')
      setTimeout(() => {
        btn.textContent = '📋 Copy'
        btn.classList.remove('copied')
      }, 2000)
    })
    .catch(() => toast(el.textContent, 'info'))
}
</script>

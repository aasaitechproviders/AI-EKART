<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>eKart — Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Theme init: light default; dark only if explicitly saved -->
<script>
;(function(){
  var saved = localStorage.getItem('ekart_theme');
  if(saved === 'dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.documentElement.style.background = '#07080D';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.documentElement.style.background = '#F2F3F9';
  }
})();
</script>

<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — LIGHT DEFAULT
═══════════════════════════════════════════════ */
:root {
  --bg:           #F2F3F9;
  --surface:      #FFFFFF;
  --surface-2:    #F7F8FD;
  --surface-3:    #EFF1F8;
  --surface-4:    #E5E8F4;
  --border:       rgba(0,0,0,0.07);
  --border-md:    rgba(0,0,0,0.11);
  --border-lg:    rgba(0,0,0,0.17);
  --text:         #0F1117;
  --text-2:       #5A5E78;
  --text-3:       #9EA3BB;
  --accent:       #7C6FFF;
  --accent-2:     #6A5DEE;
  --accent-3:     #5A4DDD;
  --accent-dim:   rgba(124,111,255,0.08);
  --accent-glow:  rgba(124,111,255,0.18);
  --accent-soft:  rgba(124,111,255,0.05);
  --green:        #19a37a;
  --green-dim:    rgba(25,163,122,0.09);
  --green-border: rgba(25,163,122,0.22);
  --amber:        #d97706;
  --amber-dim:    rgba(217,119,6,0.09);
  --red:          #e05252;
  --red-dim:      rgba(224,82,82,0.09);
  --r-xs:  6px;
  --r-sm:  10px;
  --r:     14px;
  --r-lg:  18px;
  --r-xl:  24px;
  --sh-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --sh:    0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --sh-lg: 0 12px 40px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.06);
  --sh-accent: 0 6px 24px rgba(124,111,255,0.2);
  --font: 'Plus Jakarta Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(0.4,0,0.2,1);
  --t: all 0.18s cubic-bezier(0.4,0,0.2,1);
  --sidebar-w: 248px;
}

[data-theme="dark"] {
  --bg:           #07080D;
  --surface:      #0C0E16;
  --surface-2:    #111420;
  --surface-3:    #171B28;
  --surface-4:    #1D2133;
  --border:       rgba(255,255,255,0.055);
  --border-md:    rgba(255,255,255,0.09);
  --border-lg:    rgba(255,255,255,0.14);
  --text:         #ECEDF4;
  --text-2:       #878BAA;
  --text-3:       #474B65;
  --accent-dim:   rgba(124,111,255,0.11);
  --accent-glow:  rgba(124,111,255,0.22);
  --accent-soft:  rgba(124,111,255,0.06);
  --green:        #2DD4A0;
  --green-dim:    rgba(45,212,160,0.10);
  --green-border: rgba(45,212,160,0.22);
  --amber:        #F5A523;
  --amber-dim:    rgba(245,165,35,0.10);
  --red:          #F26B6B;
  --red-dim:      rgba(242,107,107,0.10);
  --sh-sm: 0 1px 4px rgba(0,0,0,0.4);
  --sh:    0 4px 20px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.2);
  --sh-lg: 0 16px 48px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
  --sh-accent: 0 8px 32px rgba(124,111,255,0.25);
}

/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100%}

/* ═══════════════════════════════════════════════
   SKELETON LOADER
═══════════════════════════════════════════════ */
@keyframes skelShimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.skel{
  border-radius:var(--r-xs);
  background:linear-gradient(90deg,rgba(0,0,0,0.04) 0%,rgba(0,0,0,0.09) 40%,rgba(0,0,0,0.04) 80%);
  background-size:600px 100%;
  animation:skelShimmer 1.6s ease-in-out infinite;
}
[data-theme="dark"] .skel{
  background:linear-gradient(90deg,rgba(255,255,255,0.03) 0%,rgba(255,255,255,0.08) 40%,rgba(255,255,255,0.03) 80%);
  background-size:600px 100%;
}

#page-skeleton{
  position:fixed;
  top:0;right:0;bottom:0;left:var(--sidebar-w);
  display:flex;flex-direction:column;
  z-index:9999;
  background:var(--bg);
  opacity:1;
  transition:opacity 0.3s var(--ease);
  pointer-events:none;
}
#page-skeleton.skel-hiding{opacity:0}

.skel-topbar{
  height:60px;flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  justify-content:space-between;padding:0 28px;
}
.skel-body{flex:1;padding:24px 28px;overflow:hidden;display:flex;flex-direction:column;gap:16px}
.skel-mkt-grid{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}
.skel-tool-list{display:flex;flex-direction:column;gap:8px}
.skel-tool-card{height:84px;border-radius:var(--r-lg)}

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sidebar-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  z-index:149;opacity:0;
  transition:opacity .22s var(--ease);
  pointer-events:none;
}
.sidebar-backdrop.open{opacity:1;pointer-events:all}

.sidebar{
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:150;overflow:hidden;overflow-y:auto;
  scrollbar-width:none;
  transition:transform .25s var(--ease);
}
.sidebar::-webkit-scrollbar{display:none}
.sidebar-logo{
  display:flex;align-items:center;gap:9px;
  padding:18px 18px 16px;
  font-family:var(--font);font-size:19px;font-weight:800;
  letter-spacing:-0.05em;color:var(--text);
  text-decoration:none;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-logo::before{
  content:'';display:inline-block;width:26px;height:26px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-3) 100%);
  border-radius:7px;box-shadow:0 4px 12px var(--accent-glow);flex-shrink:0;
}
.logo-k{color:var(--accent)}

.sidebar-user{
  display:flex;align-items:center;gap:10px;
  margin:10px 10px 4px;padding:10px 11px;
  border-radius:var(--r-sm);
  background:var(--surface-2);
  border:1px solid var(--border);
  transition:var(--t);cursor:default;overflow:hidden;min-width:0;
}
.sidebar-user:hover{border-color:var(--border-md);background:var(--surface-3)}
.sidebar-avatar{
  width:34px;height:34px;min-width:34px;min-height:34px;
  max-width:34px;max-height:34px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-3));
  font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  color:white;flex-shrink:0;overflow:hidden;line-height:1;
}
.sidebar-avatar img{width:34px;height:34px;object-fit:cover;border-radius:50%;display:block;}
.sidebar-user-info{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;gap:2px}
.sidebar-user-name{font-size:12.5px;font-weight:600;color:var(--text);letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.sidebar-user-email{font-size:10.5px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

.sidebar-user-skel{display:flex;align-items:center;gap:10px;margin:10px 10px 4px;padding:10px 11px;border-radius:var(--r-sm)}
#sidebar-user-skel.loaded{display:none}
.sidebar-user.loading{display:none}

.nav-section{padding:6px 10px;flex-shrink:0}
.nav-section-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);padding:8px 8px 5px}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:var(--r-sm);
  font-size:13px;font-weight:500;color:var(--text-2);
  text-decoration:none;transition:var(--t);position:relative;margin-bottom:1px;
}
.nav-item:hover{background:var(--surface-3);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:22%;bottom:22%;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav-icon{font-size:15px;width:20px;display:flex;justify-content:center;flex-shrink:0;opacity:.8}
.nav-item.active .nav-icon{opacity:1}

.sidebar-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.btn-logout{
  width:100%;padding:9px 11px;border-radius:var(--r-sm);
  border:1px solid var(--border-md);background:transparent;
  color:var(--text-2);font-size:12.5px;font-weight:500;
  cursor:pointer;text-align:left;transition:var(--t);
  display:flex;align-items:center;gap:7px;font-family:var(--font);
}
.btn-logout:hover{background:var(--red-dim);border-color:rgba(242,107,107,0.3);color:var(--red)}

/* ═══════════════════════════════════════════════
   MOBILE TOPBAR
═══════════════════════════════════════════════ */
.mobile-topbar{
  display:none;
  height:56px;background:var(--surface);
  border-bottom:1px solid var(--border);
  align-items:center;justify-content:space-between;
  padding:0 16px;
  position:sticky;top:0;z-index:60;flex-shrink:0;
  box-shadow:var(--sh-sm);
}
.mob-left{display:flex;align-items:center;gap:10px}
.mob-right{display:flex;align-items:center;gap:8px}
.hamburger{
  width:36px;height:36px;border-radius:var(--r-sm);
  background:var(--surface-2);border:1px solid var(--border-md);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:var(--t);
}
.hamburger:hover{background:var(--surface-3);border-color:var(--accent)}
.hamburger svg{width:16px;height:16px;stroke:var(--text-2);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.mob-logo{font-size:17px;font-weight:800;letter-spacing:-0.05em;color:var(--text);text-decoration:none;font-family:var(--font)}
.mob-logo span{color:var(--accent)}

/* ═══════════════════════════════════════════════
   MAIN WRAP + TOPBAR
═══════════════════════════════════════════════ */
.main-wrap{
  margin-left:var(--sidebar-w);
  min-height:100vh;
  background:var(--bg);
  display:flex;flex-direction:column;
}
.topbar{
  height:60px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
  position:sticky;top:0;z-index:50;flex-shrink:0;
  box-shadow:0 1px 0 var(--border);
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;padding:24px 28px;background:var(--bg);min-width:0}

.theme-toggle{
  width:36px;height:36px;border-radius:var(--r-sm);
  background:var(--surface-2);border:1px solid var(--border-md);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;flex-shrink:0;transition:var(--t);
}
.theme-toggle:hover{border-color:var(--accent);background:var(--accent-dim);transform:rotate(14deg) scale(1.06)}

/* ═══════════════════════════════════════════════
   STORE SELECTOR
═══════════════════════════════════════════════ */
.store-select-wrap{
  display:flex;align-items:center;gap:6px;
  padding:0 10px;height:36px;border-radius:var(--r-sm);
  background:var(--surface-2);border:1px solid var(--border-md);
  transition:var(--t);
}
.store-select-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.store-select-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-3);white-space:nowrap}
.store-selector{
  background:none;border:none;outline:none;
  font-family:var(--font);font-size:12.5px;font-weight:600;
  color:var(--text);cursor:pointer;max-width:180px;
}
.store-selector option{background:var(--surface);color:var(--text)}

/* Store selector loading */
.store-loading{position:relative}
.store-loading::after{
  content:'';position:absolute;right:-20px;top:50%;
  transform:translateY(-50%);
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(124,111,255,0.25);
  border-top-color:var(--accent);
  animation:spin .65s linear infinite;pointer-events:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════
   MARKETING LAYOUT
═══════════════════════════════════════════════ */
.marketing-layout{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:20px;
  align-items:start;
}

/* ═══════════════════════════════════════════════
   TOOL CARDS (Left)
═══════════════════════════════════════════════ */
.tool-list{display:flex;flex-direction:column;gap:8px}

.tool-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r-lg);
  padding:16px 18px;
  cursor:pointer;
  transition:border-color .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease);
  position:relative;overflow:hidden;
  box-shadow:var(--sh-sm);
}
.tool-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent-soft),transparent 60%);
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.tool-card:hover{
  border-color:rgba(124,111,255,0.30);
  transform:translateY(-2px);
  box-shadow:var(--sh);
}
.tool-card:hover::before{opacity:1}
.tool-card.active{
  border-color:var(--accent);
  background:var(--accent-dim);
  box-shadow:var(--sh-accent);
}
.tool-card.active::before{opacity:1}

.tool-card-top{display:flex;align-items:center;gap:11px;margin-bottom:5px}
.tool-card-icon{
  width:38px;height:38px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
  background:var(--surface-3);border:1px solid var(--border);
  flex-shrink:0;transition:background .18s,border-color .18s;
}
.tool-card.active .tool-card-icon{background:var(--accent-dim);border-color:rgba(124,111,255,0.25)}
.tool-card-name{font-size:13.5px;font-weight:800;color:var(--text);letter-spacing:-0.02em}
.tool-card-desc{font-size:11px;color:var(--text-3);line-height:1.55;padding-left:49px}
.tool-card-arrow{
  position:absolute;right:14px;top:50%;
  transform:translateY(-50%) translateX(-4px);
  font-size:12px;color:var(--accent-2);
  opacity:0;transition:all .18s;
}
.tool-card.active .tool-card-arrow{opacity:1;transform:translateY(-50%) translateX(0)}
.tool-card-badge{
  margin-left:auto;flex-shrink:0;
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;
  padding:2px 7px;border-radius:20px;
  background:var(--accent-dim);color:var(--accent-2);
  border:1px solid rgba(124,111,255,0.2);
}

/* ═══════════════════════════════════════════════
   TOOL PANEL (Right)
═══════════════════════════════════════════════ */
.tool-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  overflow:hidden;
  box-shadow:var(--sh);
  animation:panelIn .25s var(--ease) both;
}
@keyframes panelIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.tool-panel-header{
  padding:20px 24px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:14px;
  background:linear-gradient(135deg,var(--accent-soft),transparent 65%);
}
.tool-panel-header-icon{
  width:46px;height:46px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  background:var(--accent-dim);
  border:1px solid rgba(124,111,255,0.2);
  flex-shrink:0;
}
.tool-panel-header-info{flex:1;min-width:0}
.tool-panel-header h2{font-size:16px;font-weight:800;margin-bottom:3px;color:var(--text);letter-spacing:-0.03em}
.tool-panel-header p{font-size:11.5px;color:var(--text-3);line-height:1.55}

.tool-panel-body{padding:24px}

/* ═══════════════════════════════════════════════
   FORM FIELDS
═══════════════════════════════════════════════ */
.field{margin-bottom:14px}
.field label{
  display:block;font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.08em;
  color:var(--text-3);margin-bottom:7px;
}
.field label .opt{
  font-weight:500;text-transform:none;letter-spacing:0;
  opacity:.7;
}
.field input,
.field textarea,
.field select{
  width:100%;padding:10px 13px;
  background:var(--surface-2);color:var(--text);
  border:1.5px solid var(--border-md);
  border-radius:var(--r-sm);
  font-family:var(--font);font-size:13px;
  outline:none;transition:border-color .15s,box-shadow .15s,background .15s;
  box-sizing:border-box;
}
.field input:focus,
.field textarea:focus,
.field select:focus{
  border-color:rgba(124,111,255,0.55);
  box-shadow:0 0 0 3px var(--accent-dim);
  background:var(--surface-3);
}
.field input::placeholder,
.field textarea::placeholder{color:var(--text-3)}
.field textarea{min-height:78px;resize:vertical}
.field select option{background:var(--surface);color:var(--text)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field-hint{font-size:11px;color:var(--text-3);margin-top:5px;line-height:1.5}

/* ═══════════════════════════════════════════════
   GENERATE BUTTON
═══════════════════════════════════════════════ */
.btn-generate{
  width:100%;padding:13px;
  border-radius:var(--r-sm);
  border:none;cursor:pointer;
  font-family:var(--font);font-size:13.5px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-3) 100%);
  color:white;
  box-shadow:0 4px 18px var(--accent-glow);
  transition:all .2s var(--ease);
  letter-spacing:-0.01em;
  position:relative;overflow:hidden;
}
.btn-generate::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.13),transparent);
  pointer-events:none;
}
.btn-generate:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 8px 28px var(--accent-glow);
}
.btn-generate:active:not(:disabled){transform:translateY(0)}
.btn-generate:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-generate .sparkle{font-size:15px}

/* ═══════════════════════════════════════════════
   RESULT BLOCKS
═══════════════════════════════════════════════ */
.mkt-results{margin-top:18px;display:flex;flex-direction:column;gap:12px}

.result-block{
  background:var(--surface-2);
  border:1px solid var(--border-md);
  border-radius:var(--r);
  overflow:hidden;
  animation:resultIn .22s var(--ease) both;
}
.result-block:nth-child(2){animation-delay:.05s}
.result-block:nth-child(3){animation-delay:.1s}
@keyframes resultIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.result-block-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.result-block-title{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.09em;
  color:var(--text-3);
  display:flex;align-items:center;gap:5px;
}
.result-body{padding:13px 15px}
.result-content{
  font-size:13px;color:var(--text-2);
  line-height:1.8;white-space:pre-wrap;word-break:break-word;
}
.email-subject-text{
  font-size:15px;font-weight:800;color:var(--text);
  line-height:1.4;letter-spacing:-0.02em;
}

.result-copy-btn{
  background:var(--surface-2);
  border:1px solid var(--border-md);
  border-radius:var(--r-xs);
  padding:4px 11px;
  font-size:10.5px;font-weight:700;
  color:var(--text-2);cursor:pointer;
  font-family:var(--font);transition:all .15s;
  display:flex;align-items:center;gap:4px;
}
.result-copy-btn:hover{background:var(--accent);color:white;border-color:var(--accent)}
.result-copy-btn.copied{background:var(--green);color:white;border-color:var(--green)}

/* ═══════════════════════════════════════════════
   HASHTAGS
═══════════════════════════════════════════════ */
.insta-hashtags{display:flex;flex-wrap:wrap;gap:5px;padding-top:2px}
.hashtag{
  font-size:11.5px;font-weight:600;
  color:var(--accent-2);
  background:var(--accent-dim);
  border-radius:var(--r-xs);padding:3px 9px;
  transition:background .15s;cursor:default;
  border:1px solid rgba(124,111,255,0.15);
}
.hashtag:hover{background:rgba(124,111,255,0.16)}

/* ═══════════════════════════════════════════════
   CHAR COUNTER (SMS)
═══════════════════════════════════════════════ */
.char-counter{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;
  margin-top:8px;padding:4px 10px;
  border-radius:var(--r-xs);
}
.char-counter.ok  {background:var(--green-dim);color:var(--green)}
.char-counter.warn{background:var(--amber-dim);color:var(--amber)}
.char-counter.over{background:var(--red-dim);color:var(--red)}

/* ═══════════════════════════════════════════════
   LOADING / EMPTY STATES
═══════════════════════════════════════════════ */
.empty-panel{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:240px;gap:10px;
  color:var(--text-3);
}
.empty-panel-icon{font-size:40px;opacity:.35}
.empty-panel-text{font-size:12.5px;font-weight:600}

.loading-dots{
  display:flex;gap:5px;
  align-items:center;justify-content:center;
  padding:40px 0;
}
.loading-dots span{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  animation:dotBounce 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.7);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ═══════════════════════════════════════════════
   INLINE SKELETON (store switch)
═══════════════════════════════════════════════ */
.inline-skel-mkt{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:20px;align-items:start;
}

/* Fade transitions for store switch */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s var(--ease) both}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
#toast-container{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;align-items:center;
  width:100%;max-width:400px;padding:0 16px;
}
.toast{
  background:var(--surface);border:1px solid var(--border-md);
  border-radius:var(--r);padding:12px 18px;
  font-size:13px;font-weight:500;color:var(--text);
  box-shadow:var(--sh-lg);
  display:flex;align-items:center;gap:9px;
  animation:toastIn .25s var(--ease) both;
  pointer-events:all;width:100%;
}
.toast.fade-out{animation:toastOut .25s var(--ease) forwards}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(8px)}}

/* ═══════════════════════════════════════════════
   RESPONSIVE — TABLET  (≤900px)
═══════════════════════════════════════════════ */

<script>
/* ════════════════════════════════════════════════
   TOAST — inline fallback
════════════════════════════════════════════════ */
function toast(msg, type){
  type = type || 'success';
  if(typeof window._toast === 'function') return window._toast(msg, type);
  let c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const icons = {success:'✓',error:'✕',info:'ℹ',warning:'⚠'};
  el.innerHTML = '<span style="font-size:14px;">'+(icons[type]||'✓')+'</span><span>'+msg+'</span>';
  c.appendChild(el);
  setTimeout(() => { el.classList.add('fade-out'); el.addEventListener('animationend', () => el.remove()); }, 3200);
}

/* ════════════════════════════════════════════════
   THEME — light default
════════════════════════════════════════════════ */
let _isDark = localStorage.getItem('ekart_theme') === 'dark';
function applyTheme(dark){
  _isDark = dark;
  const root = document.documentElement;
  if(dark){ root.setAttribute('data-theme','dark'); root.style.background = '#07080D'; }
  else { root.removeAttribute('data-theme'); root.style.background = '#F2F3F9'; }
  const icon = dark ? '🌙' : '☀️';
  ['themeToggleBtn','themeToggleMob'].forEach(id => {
    const b = document.getElementById(id);
    if(b) b.textContent = icon;
  });
  localStorage.setItem('ekart_theme', dark ? 'dark' : 'light');
}
function toggleTheme(){ applyTheme(!_isDark); }
applyTheme(_isDark);

/* ════════════════════════════════════════════════
   SKELETON
════════════════════════════════════════════════ */
function dismissSkeleton(){
  const skel = document.getElementById('page-skeleton');
  if(!skel || skel._dismissed) return;
  skel._dismissed = true;
  skel.classList.add('skel-hiding');
  skel.addEventListener('transitionend', () => skel.remove(), {once:true});
  setTimeout(() => { if(skel.parentNode) skel.remove(); }, 500);
}
function revealSidebarUser(){
  const s = document.getElementById('sidebar-user-skel');
  const r = document.getElementById('sidebar-user-real');
  if(s) s.classList.add('loaded');
  if(r) r.classList.remove('loading');
}

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let currentStoreId = '';
let currentTool    = 'instagram';
let allProducts    = [];
let _loadToken     = 0;

const TOOLS = {
  instagram:{
    icon:'📸', name:'Instagram Post',
    desc:'Captions, hashtags & story text for maximum engagement',
    help:'Generate scroll-stopping captions with trending hashtags for your products or store.',
    badge:'Popular'
  },
  whatsapp:{
    icon:'💬', name:'WhatsApp Broadcast',
    desc:'Promotional messages for customer broadcasts',
    help:'Create personalized broadcast messages to announce sales, new arrivals, and exclusive offers.'
  },
  email:{
    icon:'📧', name:'Email Campaign',
    desc:'Subject line + full email body copy',
    help:'Generate a full email campaign with compelling subject line, preview text and body copy.'
  },
  sms:{
    icon:'📱', name:'SMS Blast',
    desc:'Punchy 160-character promo texts',
    help:'Short, conversion-optimized SMS messages that respect the 160-character limit.'
  }
};

/* ════════════════════════════════════════════════
   STORE LOADING INDICATOR
════════════════════════════════════════════════ */
function setStoreLoading(on){
  const w = document.getElementById('store-select-wrap');
  if(w) on ? w.classList.add('store-loading') : w.classList.remove('store-loading');
}

/* ════════════════════════════════════════════════
   INLINE SKELETON for store switch
════════════════════════════════════════════════ */
function inlineSkeletonHTML(){
  return `
    <div class="inline-skel-mkt">
      <div class="skel-tool-list">
        <div class="skel skel-tool-card"></div>
        <div class="skel skel-tool-card" style="opacity:.8"></div>
        <div class="skel skel-tool-card" style="opacity:.6"></div>
        <div class="skel skel-tool-card" style="opacity:.4"></div>
      </div>
      <div class="skel" style="height:520px;border-radius:var(--r-xl);opacity:.9;"></div>
    </div>`;
}

/* ════════════════════════════════════════════════
   FADE HELPERS
════════════════════════════════════════════════ */
const FADE_MS = 170;
function fadeOut(el){
  return new Promise(resolve => {
    el.style.transition = `opacity ${FADE_MS}ms ease, transform ${FADE_MS}ms ease`;
    el.style.opacity = '0'; el.style.transform = 'translateY(-5px)';
    el.style.pointerEvents = 'none';
    setTimeout(resolve, FADE_MS);
  });
}
function fadeIn(el){
  el.style.transition = 'none'; el.style.opacity = '0';
  el.style.transform = 'translateY(6px)'; el.style.display = '';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.transition = `opacity ${FADE_MS+40}ms ease, transform ${FADE_MS+40}ms ease`;
    el.style.opacity = '1'; el.style.transform = 'translateY(0)';
    el.style.pointerEvents = '';
  }));
}

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('marketing', (id) => {
    currentStoreId = id;
    loadStoreData();
  });
  if(!nav){ dismissSkeleton(); return; }
  revealSidebarUser();
  currentStoreId = nav.currentStoreId;
  applyTheme(_isDark);

  if(currentStoreId) await loadFirstLoad();
  else {
    renderPage();
    const c = document.getElementById('page-content');
    c.style.display = '';
    dismissSkeleton();
  }
});

/* ════════════════════════════════════════════════
   FIRST LOAD
════════════════════════════════════════════════ */
async function loadFirstLoad(){
  const token = ++_loadToken;
  const c = document.getElementById('page-content');
  setStoreLoading(true);
  try {
    allProducts = await apiFetch(`/stores/${currentStoreId}/products`);
    if(token !== _loadToken) return;
  } catch(_){ allProducts = []; }
  if(token !== _loadToken) return;
  renderPage();
  c.style.display = '';
  requestAnimationFrame(() => dismissSkeleton());
  setStoreLoading(false);
}

/* ════════════════════════════════════════════════
   STORE SWITCH — 3-phase transition
════════════════════════════════════════════════ */
async function loadStoreData(){
  const token = ++_loadToken;
  const c = document.getElementById('page-content');
  const isFirst = c.style.display === 'none';
  if(isFirst){ await loadFirstLoad(); return; }

  setStoreLoading(true);
  await fadeOut(c);
  if(token !== _loadToken) return;

  c.innerHTML = inlineSkeletonHTML();
  fadeIn(c);

  try {
    allProducts = await apiFetch(`/stores/${currentStoreId}/products`);
  } catch(_){ allProducts = []; }
  if(token !== _loadToken) return;

  await fadeOut(c);
  if(token !== _loadToken) return;
  renderPage();
  fadeIn(c);
  setStoreLoading(false);
}

/* ════════════════════════════════════════════════
   PAGE RENDER
════════════════════════════════════════════════ */
function renderPage(){
  const c = document.getElementById('page-content');
  const productOptions = allProducts.map(p =>
    `<option value="${p._id}">${p.name}</option>`
  ).join('');

  c.innerHTML = `
    <div class="marketing-layout">
      <div class="tool-list" id="toolList">
        ${Object.entries(TOOLS).map(([key,t]) => `
          <div class="tool-card ${currentTool===key?'active':''}" onclick="switchTool('${key}')">
            <div class="tool-card-top">
              <div class="tool-card-icon">${t.icon}</div>
              <div class="tool-card-name">${t.name}</div>
              ${t.badge ? `<span class="tool-card-badge">${t.badge}</span>` : ''}
            </div>
            <div class="tool-card-desc">${t.desc}</div>
            <span class="tool-card-arrow">→</span>
          </div>`).join('')}
      </div>
      <div class="tool-panel" id="toolPanel">
        ${renderToolPanel(productOptions)}
      </div>
    </div>`;
}

/* ════════════════════════════════════════════════
   TOOL PANEL HTML
════════════════════════════════════════════════ */
function renderToolPanel(productOptions){
  const t = TOOLS[currentTool];
  const hasOffer = currentTool === 'email' || currentTool === 'whatsapp';
  const label = {instagram:'Post', email:'Email', sms:'SMS', whatsapp:'Message'}[currentTool] || 'Content';

  return `
    <div class="tool-panel-header">
      <div class="tool-panel-header-icon">${t.icon}</div>
      <div class="tool-panel-header-info">
        <h2>${t.name}</h2>
        <p>${t.help}</p>
      </div>
    </div>
    <div class="tool-panel-body">
      <div class="field">
        <label>Campaign Goal <span style="color:var(--red);font-size:11px;">*</span></label>
        <input type="text" id="mktGoal"
          placeholder="e.g. Promote summer sale, Announce new product, Drive store traffic…"
          oninput="clearResultOnChange()">
      </div>

      <div class="field-row">
        <div class="field">
          <label>Product <span class="opt">(optional)</span></label>
          <select id="mktProduct">
            <option value="">General / All Products</option>
            ${productOptions}
          </select>
        </div>
        <div class="field">
          <label>Tone</label>
          <select id="mktTone">
            <option value="friendly">😊 Friendly &amp; Warm</option>
            <option value="professional">💼 Professional</option>
            <option value="urgent">🔥 Urgent / FOMO</option>
            <option value="playful">🎉 Playful &amp; Fun</option>
            <option value="luxurious">✨ Premium &amp; Luxurious</option>
          </select>
        </div>
      </div>

      ${hasOffer ? `
      <div class="field">
        <label>Offer / Discount <span class="opt">(optional)</span></label>
        <input type="text" id="mktOffer"
          placeholder="e.g. 20% off, Free shipping above ₹500, BOGO deal">
      </div>` : ''}

      <div class="field">
        <label>Brand / Store Name</label>
        <input type="text" id="mktBrand" placeholder="Your store or brand name">
      </div>

      <button class="btn-generate" onclick="generateMarketing()" id="mktGenBtn">
        <span class="sparkle">✨</span> Generate ${label}
      </button>

      <div id="mktResult"></div>
    </div>`;
}

/* ════════════════════════════════════════════════
   SWITCH TOOL
════════════════════════════════════════════════ */
function switchTool(tool){
  if(currentTool === tool) return;
  currentTool = tool;
  document.querySelectorAll('.tool-card').forEach((card, i) => {
    card.classList.toggle('active', Object.keys(TOOLS)[i] === tool);
  });
  const productOptions = allProducts.map(p =>
    `<option value="${p._id}">${p.name}</option>`
  ).join('');
  const panel = document.getElementById('toolPanel');
  panel.style.transition = 'opacity .12s ease';
  panel.style.opacity = '0';
  setTimeout(() => {
    panel.innerHTML = renderToolPanel(productOptions);
    panel.style.opacity = '1';
  }, 120);
  // Close sidebar on mobile after tool selection
  if(window.innerWidth <= 648) closeMobileSidebar();
}

function clearResultOnChange(){
  // Only clear if there are results (avoid jarring on first type)
}

/* ════════════════════════════════════════════════
   GENERATE
════════════════════════════════════════════════ */
async function generateMarketing(){
  if(!currentStoreId) return toast('Select a store first', 'error');
  const goal = document.getElementById('mktGoal').value.trim();
  if(!goal) return toast('Enter a campaign goal first', 'error');

  const btn = document.getElementById('mktGenBtn');
  const resultEl = document.getElementById('mktResult');
  const label = {instagram:'Post',email:'Email',sms:'SMS',whatsapp:'Message'}[currentTool] || 'Content';

  btn.disabled = true;
  btn.innerHTML = `<span style="display:inline-block;animation:spin .7s linear infinite">⏳</span> Generating…`;
  resultEl.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;

  const productId = document.getElementById('mktProduct')?.value || '';
  const product   = allProducts.find(p => p._id === productId);
  const tone      = document.getElementById('mktTone').value;
  const offer     = document.getElementById('mktOffer')?.value.trim() || '';
  const brand     = document.getElementById('mktBrand').value.trim();

  try {
    const stores = await apiFetch('/stores');
    const store  = stores.find(s => s._id === currentStoreId);

    const r = await apiFetch('/ai/marketing-content', {
      method:'POST',
      body: JSON.stringify({
        store_name:          brand || store?.name || 'My Store',
        product_name:        product ? product.name : goal,
        product_description: product
          ? (product.description || '') + (offer ? ' Offer: ' + offer : '')
          : (offer || goal),
        platform:    currentTool,
        tone,
        currency:    'INR',
        price:       product ? product.price : ''
      })
    });

    const allContent = r.content;
    let content;
    if     (currentTool==='instagram') content = allContent.instagram || allContent;
    else if(currentTool==='whatsapp')  content = allContent.whatsapp  || allContent;
    else if(currentTool==='email')     content = allContent.email     || allContent;
    else if(currentTool==='sms')       content = { message: allContent.sms || allContent.message || '' };
    else                               content = allContent;

    renderResult(content);
  } catch(e){
    resultEl.innerHTML = `<div style="padding:14px;color:var(--red);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px;">⚠️ ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = `<span class="sparkle">✨</span> Generate ${label}`;
}

/* ════════════════════════════════════════════════
   RENDER RESULTS
════════════════════════════════════════════════ */
function renderResult(content){
  const res = document.getElementById('mktResult');
  if(!content){
    res.innerHTML = '<p style="color:var(--red);padding-top:12px;font-size:12.5px;">No content generated.</p>';
    return;
  }

  let html = '<div class="mkt-results">';

  if(currentTool === 'instagram'){
    const hashtags = content.hashtags || [];
    html += resultBlock('📸 Caption', content.caption || content.text || '', 'instaCaption');
    if(hashtags.length){
      html += `<div class="result-block">
        <div class="result-block-header">
          <span class="result-block-title">🏷️ Hashtags</span>
          <button class="result-copy-btn" onclick="copyBlock('instaHashtagsRaw',this)">📋 Copy all</button>
        </div>
        <div class="result-body">
          <div id="instaHashtagsRaw" style="display:none;">${hashtags.map(h=>h.startsWith('#')?h:'#'+h).join(' ')}</div>
          <div class="insta-hashtags">${hashtags.map(h=>`<span class="hashtag">${h.startsWith('#')?h:'#'+h}</span>`).join('')}</div>
        </div>
      </div>`;
    }
    if(content.story_text) html += resultBlock('📱 Story Text', content.story_text, 'storyText');

  } else if(currentTool === 'whatsapp'){
    html += resultBlock('💬 Message', content.message || content.text || '', 'waMsg');
    if(content.cta) html += resultBlock('🔗 Call-to-Action', content.cta, 'waCta');

  } else if(currentTool === 'email'){
    html += `<div class="result-block">
      <div class="result-block-header">
        <span class="result-block-title">📌 Subject Line</span>
        <button class="result-copy-btn" onclick="copyBlock('emailSubject',this)">📋 Copy</button>
      </div>
      <div class="result-body">
        <div class="email-subject-text" id="emailSubject">${content.subject || ''}</div>
      </div>
    </div>`;
    if(content.preheader) html += resultBlock('👁️ Preview Text', content.preheader, 'emailPreheader');
    html += resultBlock('📧 Email Body', content.body || content.text || '', 'emailBody');

  } else if(currentTool === 'sms'){
    const msg = content.message || content.text || '';
    const len = msg.length;
    const cls  = len > 160 ? 'over' : len > 140 ? 'warn' : 'ok';
    const icon = len > 160 ? '⚠️' : len > 140 ? '⚡' : '✓';
    const note = len > 160 ? ' — Too long!' : len > 140 ? ' — Near limit' : ' — Good';
    html += `<div class="result-block">
      <div class="result-block-header">
        <span class="result-block-title">📱 SMS Message</span>
        <button class="result-copy-btn" onclick="copyBlock('smsMsg',this)">📋 Copy</button>
      </div>
      <div class="result-body">
        <div class="result-content" id="smsMsg">${msg}</div>
        <div class="char-counter ${cls}">${icon} ${len} / 160 characters${note}</div>
      </div>
    </div>`;
  }

  html += '</div>';
  res.innerHTML = html;
}

function resultBlock(title, text, id){
  return `<div class="result-block">
    <div class="result-block-header">
      <span class="result-block-title">${title}</span>
      <button class="result-copy-btn" onclick="copyBlock('${id}',this)">📋 Copy</button>
    </div>
    <div class="result-body">
      <div class="result-content" id="${id}">${text}</div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════
   COPY TO CLIPBOARD
════════════════════════════════════════════════ */
function copyBlock(id, btn){
  const el = document.getElementById(id);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent)
    .then(() => {
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
    })
    .catch(() => toast('Could not copy to clipboard', 'error'));
}

/* ════════════════════════════════════════════════
   MOBILE SIDEBAR
════════════════════════════════════════════════ */
function openMobileSidebar(){
  document.getElementById('sidebar').classList.add('mob-open');
  document.getElementById('sidebarBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('sidebarBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      if(window.innerWidth <= 648) closeMobileSidebar();
    });
  });
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>eKart — Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script>
;(function(){
  var saved = localStorage.getItem('ekart_theme');
  if(saved === 'dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.documentElement.style.background = '#07080D';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.documentElement.style.background = '#F2F3F9';
  }
})();
</script>

<style>
/* ══ TOKENS ══ */
:root {
  --bg:           #F2F3F9;
  --surface:      #FFFFFF;
  --surface-2:    #F7F8FD;
  --surface-3:    #EFF1F8;
  --surface-4:    #E5E8F4;
  --border:       rgba(0,0,0,0.07);
  --border-md:    rgba(0,0,0,0.11);
  --border-lg:    rgba(0,0,0,0.17);
  --text:         #0F1117;
  --text-2:       #5A5E78;
  --text-3:       #9EA3BB;
  --accent:       #7C6FFF;
  --accent-2:     #6A5DEE;
  --accent-3:     #5A4DDD;
  --accent-dim:   rgba(124,111,255,0.08);
  --accent-glow:  rgba(124,111,255,0.18);
  --accent-soft:  rgba(124,111,255,0.05);
  --green:        #19a37a;
  --green-dim:    rgba(25,163,122,0.09);
  --green-border: rgba(25,163,122,0.22);
  --amber:        #d97706;
  --amber-dim:    rgba(217,119,6,0.09);
  --red:          #e05252;
  --red-dim:      rgba(224,82,82,0.09);
  --r-xs:  6px;
  --r-sm:  10px;
  --r:     14px;
  --r-lg:  18px;
  --r-xl:  24px;
  --sh-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --sh:    0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --sh-lg: 0 12px 40px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.06);
  --sh-accent: 0 6px 24px rgba(124,111,255,0.2);
  --font: 'Plus Jakarta Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(0.4,0,0.2,1);
  --t: all 0.18s cubic-bezier(0.4,0,0.2,1);
  --sidebar-w: 248px;
}
[data-theme="dark"] {
  --bg:           #07080D;
  --surface:      #0C0E16;
  --surface-2:    #111420;
  --surface-3:    #171B28;
  --surface-4:    #1D2133;
  --border:       rgba(255,255,255,0.055);
  --border-md:    rgba(255,255,255,0.09);
  --border-lg:    rgba(255,255,255,0.14);
  --text:         #ECEDF4;
  --text-2:       #878BAA;
  --text-3:       #474B65;
  --accent-dim:   rgba(124,111,255,0.11);
  --accent-glow:  rgba(124,111,255,0.22);
  --accent-soft:  rgba(124,111,255,0.06);
  --green:        #2DD4A0;
  --green-dim:    rgba(45,212,160,0.10);
  --green-border: rgba(45,212,160,0.22);
  --amber:        #F5A523;
  --amber-dim:    rgba(245,165,35,0.10);
  --red:          #F26B6B;
  --red-dim:      rgba(242,107,107,0.10);
  --sh-sm: 0 1px 4px rgba(0,0,0,0.4);
  --sh:    0 4px 20px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.2);
  --sh-lg: 0 16px 48px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
  --sh-accent: 0 8px 32px rgba(124,111,255,0.25);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100%}

/* ══ SKELETON ══ */
@keyframes skelShimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.skel{
  border-radius:var(--r-xs);
  background:linear-gradient(90deg,rgba(0,0,0,0.04) 0%,rgba(0,0,0,0.09) 40%,rgba(0,0,0,0.04) 80%);
  background-size:600px 100%;animation:skelShimmer 1.6s ease-in-out infinite;
}
[data-theme="dark"] .skel{
  background:linear-gradient(90deg,rgba(255,255,255,0.03) 0%,rgba(255,255,255,0.08) 40%,rgba(255,255,255,0.03) 80%);
  background-size:600px 100%;
}
#page-skeleton{
  position:fixed;top:0;right:0;bottom:0;left:var(--sidebar-w);
  display:flex;flex-direction:column;z-index:9999;
  background:var(--bg);opacity:1;transition:opacity 0.3s var(--ease);pointer-events:none;
}
#page-skeleton.skel-hiding{opacity:0}
.skel-topbar{
  height:60px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
}
.skel-body{flex:1;padding:24px 28px;overflow:hidden;display:flex;flex-direction:column;gap:16px}
.skel-mkt-grid{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}

/* ══ SIDEBAR BACKDROP ══ */
.sidebar-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  z-index:149;opacity:0;transition:opacity .22s var(--ease);pointer-events:none;
}
.sidebar-backdrop.open{opacity:1;pointer-events:all}

/* ══ SIDEBAR ══ */
.sidebar{
  width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;
  z-index:150;overflow:hidden;overflow-y:auto;scrollbar-width:none;transition:transform .25s var(--ease);
}
.sidebar::-webkit-scrollbar{display:none}
.sidebar-logo{
  display:flex;align-items:center;gap:9px;padding:18px 18px 16px;
  font-family:var(--font);font-size:19px;font-weight:800;letter-spacing:-0.05em;
  color:var(--text);text-decoration:none;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-logo::before{
  content:'';display:inline-block;width:26px;height:26px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-3) 100%);
  border-radius:7px;box-shadow:0 4px 12px var(--accent-glow);flex-shrink:0;
}
.logo-k{color:var(--accent)}
.sidebar-user{
  display:flex;align-items:center;gap:10px;margin:10px 10px 4px;padding:10px 11px;
  border-radius:var(--r-sm);background:var(--surface-2);border:1px solid var(--border);
  transition:var(--t);cursor:default;overflow:hidden;min-width:0;
}
.sidebar-user:hover{border-color:var(--border-md);background:var(--surface-3)}
.sidebar-avatar{
  width:34px;height:34px;min-width:34px;min-height:34px;max-width:34px;max-height:34px;
  border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-3));
  font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;
  color:white;flex-shrink:0;overflow:hidden;line-height:1;
}
.sidebar-avatar img{width:34px;height:34px;object-fit:cover;border-radius:50%;display:block;}
.sidebar-user-info{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;gap:2px}
.sidebar-user-name{font-size:12.5px;font-weight:600;color:var(--text);letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.sidebar-user-email{font-size:10.5px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.sidebar-user-skel{display:flex;align-items:center;gap:10px;margin:10px 10px 4px;padding:10px 11px;border-radius:var(--r-sm)}
#sidebar-user-skel.loaded{display:none}
.sidebar-user.loading{display:none}
.nav-section{padding:6px 10px;flex-shrink:0}
.nav-section-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);padding:8px 8px 5px}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);
  font-size:13px;font-weight:500;color:var(--text-2);text-decoration:none;
  transition:var(--t);position:relative;margin-bottom:1px;
}
.nav-item:hover{background:var(--surface-3);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:22%;bottom:22%;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav-icon{font-size:15px;width:20px;display:flex;justify-content:center;flex-shrink:0;opacity:.8}
.nav-item.active .nav-icon{opacity:1}
.sidebar-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.btn-logout{
  width:100%;padding:9px 11px;border-radius:var(--r-sm);border:1px solid var(--border-md);
  background:transparent;color:var(--text-2);font-size:12.5px;font-weight:500;cursor:pointer;
  text-align:left;transition:var(--t);display:flex;align-items:center;gap:7px;font-family:var(--font);
}
.btn-logout:hover{background:var(--red-dim);border-color:rgba(242,107,107,0.3);color:var(--red)}

/* ══ MOBILE TOPBAR ══ */
.mobile-topbar{
  display:none;height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  align-items:center;justify-content:space-between;padding:0 14px;
  position:sticky;top:0;z-index:60;flex-shrink:0;box-shadow:var(--sh-sm);
}
.mob-left{display:flex;align-items:center;gap:10px}
.mob-right{display:flex;align-items:center;gap:8px}
.hamburger{
  width:36px;height:36px;border-radius:var(--r-sm);background:var(--surface-2);
  border:1px solid var(--border-md);display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:var(--t);
}
.hamburger:hover{background:var(--surface-3);border-color:var(--accent)}
.hamburger svg{width:16px;height:16px;stroke:var(--text-2);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.mob-logo{font-size:17px;font-weight:800;letter-spacing:-0.05em;color:var(--text);text-decoration:none;font-family:var(--font)}
.mob-logo span{color:var(--accent)}
.mob-store-pill{
  display:flex;align-items:center;gap:4px;padding:0 10px;height:34px;border-radius:20px;
  background:var(--surface-2);border:1px solid var(--border-md);transition:var(--t);
}
.mob-store-pill:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.mob-store-pill select{
  background:none;border:none;outline:none;font-family:var(--font);
  font-size:12.5px;font-weight:700;color:var(--text);cursor:pointer;
  -webkit-appearance:none;appearance:none;max-width:110px;
}
.mob-store-pill select option{background:var(--surface);color:var(--text)}
.mob-store-chevron{font-size:9px;color:var(--text-3);flex-shrink:0;pointer-events:none;margin-left:1px}

/* ══ MAIN WRAP + TOPBAR ══ */
.main-wrap{margin-left:var(--sidebar-w);min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.topbar{
  height:60px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;position:sticky;top:0;z-index:50;flex-shrink:0;box-shadow:0 1px 0 var(--border);
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;padding:24px 28px;background:var(--bg);min-width:0}
.theme-toggle{
  width:36px;height:36px;border-radius:var(--r-sm);background:var(--surface-2);
  border:1px solid var(--border-md);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;flex-shrink:0;transition:var(--t);
}
.theme-toggle:hover{border-color:var(--accent);background:var(--accent-dim);transform:rotate(14deg) scale(1.06)}
.store-select-wrap{
  display:flex;align-items:center;gap:6px;padding:0 10px;height:36px;
  border-radius:var(--r-sm);background:var(--surface-2);border:1px solid var(--border-md);transition:var(--t);
}
.store-select-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.store-select-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-3);white-space:nowrap}
.store-selector{
  background:none;border:none;outline:none;font-family:var(--font);
  font-size:12.5px;font-weight:600;color:var(--text);cursor:pointer;max-width:180px;
}
.store-selector option{background:var(--surface);color:var(--text)}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
.store-loading{position:relative}
.store-loading::after{
  content:'';position:absolute;right:-20px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(124,111,255,0.25);border-top-color:var(--accent);
  animation:spin .65s linear infinite;pointer-events:none;
}

/* ══ PAGE HEADER ══ */
.page-header{margin-bottom:22px}
.page-header-title{font-size:20px;font-weight:800;letter-spacing:-0.04em;color:var(--text);margin-bottom:4px}
.page-header-sub{font-size:12.5px;color:var(--text-3);line-height:1.5}

/* ══════════════════════════════════════════════
   MARKETING LAYOUT
══════════════════════════════════════════════ */
.marketing-layout{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:20px;
  align-items:start;
}

/* ══════════════════════════════════════════════
   TOOL LIST — 4 SEPARATE INDIVIDUAL CARDS
   Each card is its own standalone box, like order cards
══════════════════════════════════════════════ */
.tool-list{
  display:flex;
  flex-direction:column;
  gap:8px; /* gap between individual cards */
  position:sticky;
  top:80px;
}

/* Each tool card is a completely independent box */
.tool-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r-lg);
  padding:13px 15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:12px;
  transition:border-color .18s var(--ease), transform .18s var(--ease), box-shadow .18s var(--ease);
  position:relative;
  box-shadow:var(--sh-sm);
  overflow:hidden;
}
/* Accent left bar */
.tool-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--accent);
  opacity:0;border-radius:0 2px 2px 0;
  transition:opacity .16s;
}
.tool-card:hover{
  border-color:rgba(124,111,255,0.28);
  transform:translateY(-1px);
  box-shadow:var(--sh);
}
.tool-card.active{
  border-color:var(--accent);
  background:var(--accent-dim);
  box-shadow:var(--sh-accent);
}
.tool-card.active::before{opacity:1}
.tool-card.active .tool-card-name{color:var(--accent);font-weight:700}
.tool-card.active .tool-card-icon{
  background:rgba(124,111,255,0.12);
  border-color:rgba(124,111,255,0.28);
}

.tool-card-icon{
  width:38px;height:38px;min-width:38px;
  border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
  background:var(--surface-3);
  border:1px solid var(--border);
  flex-shrink:0;
  transition:var(--t);
}
.tool-card-text{flex:1;min-width:0}
.tool-card-name{
  font-size:12.5px;font-weight:600;color:var(--text);
  letter-spacing:-0.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .16s;
}
.tool-card-desc{
  font-size:10.5px;color:var(--text-3);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tool-card-badge{
  flex-shrink:0;
  font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;
  padding:2px 7px;border-radius:20px;
  background:var(--accent-dim);color:var(--accent-2);
  border:1px solid rgba(124,111,255,0.18);
}
.tool-card-arrow{
  font-size:14px;color:var(--text-3);
  flex-shrink:0;
  opacity:0;transition:opacity .15s,transform .15s;
  transform:translateX(-4px);
}
.tool-card:hover .tool-card-arrow{opacity:1;transform:translateX(0)}
.tool-card.active .tool-card-arrow{opacity:1;color:var(--accent);transform:translateX(0)}

/* ══ RIGHT PANEL ══ */
.tool-panel-right{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  overflow:hidden;
  box-shadow:var(--sh);
  animation:panelIn .22s var(--ease) both;
}
@keyframes panelIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tool-panel-header{
  padding:20px 24px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:14px;
  background:linear-gradient(135deg,var(--accent-soft),transparent 65%);
}
.tool-panel-header-icon{
  width:46px;height:46px;min-width:46px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:var(--accent-dim);border:1px solid rgba(124,111,255,0.2);flex-shrink:0;
}
.tool-panel-header-info{flex:1;min-width:0}
.tool-panel-header h2{font-size:16px;font-weight:800;margin-bottom:3px;color:var(--text);letter-spacing:-0.03em}
.tool-panel-header p{font-size:11.5px;color:var(--text-3);line-height:1.55}
.tool-panel-body{padding:22px 24px}

/* ══ FORM FIELDS ══ */
.field{margin-bottom:14px}
.field label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-3);margin-bottom:7px}
.field label .opt{font-weight:500;text-transform:none;letter-spacing:0;opacity:.7}
.field input,.field textarea,.field select{
  width:100%;padding:10px 13px;background:var(--surface-2);color:var(--text);
  border:1.5px solid var(--border-md);border-radius:var(--r-sm);font-family:var(--font);font-size:13px;
  outline:none;transition:border-color .15s,box-shadow .15s,background .15s;box-sizing:border-box;
}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:rgba(124,111,255,0.55);box-shadow:0 0 0 3px var(--accent-dim);background:var(--surface-3);
}
.field input::placeholder,.field textarea::placeholder{color:var(--text-3)}
.field textarea{min-height:78px;resize:vertical}
.field select option{background:var(--surface);color:var(--text)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Tone chips */
.tone-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.tone-chip{
  padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:600;
  border:1.5px solid var(--border-md);background:var(--surface-2);color:var(--text-2);
  cursor:pointer;transition:var(--t);font-family:var(--font);
}
.tone-chip:hover{border-color:var(--accent);color:var(--accent-2);background:var(--accent-dim)}
.tone-chip.active{border-color:var(--accent);color:var(--accent-2);background:var(--accent-dim);font-weight:700}

/* ══ GENERATE BUTTON ══ */
.btn-generate{
  width:100%;padding:13px;border-radius:var(--r-sm);border:none;cursor:pointer;
  font-family:var(--font);font-size:13.5px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-3) 100%);
  color:white;box-shadow:0 4px 18px var(--accent-glow);
  transition:all .2s var(--ease);letter-spacing:-0.01em;position:relative;overflow:hidden;margin-top:4px;
}
.btn-generate::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.13),transparent);pointer-events:none}
.btn-generate:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px var(--accent-glow)}
.btn-generate:active:not(:disabled){transform:translateY(0)}
.btn-generate:disabled{opacity:.55;cursor:not-allowed;transform:none}

/* ══ RESULTS ══ */
.mkt-results{margin-top:20px;display:flex;flex-direction:column;gap:12px}
.result-block{
  background:var(--surface-2);border:1px solid var(--border-md);border-radius:var(--r);
  overflow:hidden;animation:resultIn .22s var(--ease) both;
}
.result-block:nth-child(2){animation-delay:.05s}
.result-block:nth-child(3){animation-delay:.10s}
.result-block:nth-child(4){animation-delay:.15s}
@keyframes resultIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-block-header{
  display:flex;align-items:center;justify-content:space-between;padding:9px 13px;
  border-bottom:1px solid var(--border);background:var(--surface);
}
.result-block-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-3)}
.result-body{padding:13px 15px}
.result-content{font-size:13px;color:var(--text-2);line-height:1.85;white-space:pre-wrap;word-break:break-word}
.email-subject-text{font-size:15px;font-weight:800;color:var(--text);line-height:1.4;letter-spacing:-0.02em}
.result-copy-btn{
  background:var(--surface-2);border:1px solid var(--border-md);border-radius:var(--r-xs);
  padding:4px 11px;font-size:10.5px;font-weight:700;color:var(--text-2);
  cursor:pointer;font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:4px;
}
.result-copy-btn:hover{background:var(--accent);color:white;border-color:var(--accent)}
.result-copy-btn.copied{background:var(--green);color:white;border-color:var(--green)}
.insta-hashtags{display:flex;flex-wrap:wrap;gap:5px;padding-top:2px}
.hashtag{
  font-size:11.5px;font-weight:600;color:var(--accent-2);background:var(--accent-dim);
  border-radius:var(--r-xs);padding:3px 9px;border:1px solid rgba(124,111,255,0.15);
}
.hashtag:hover{background:rgba(124,111,255,0.16)}
.char-counter{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;margin-top:8px;padding:4px 10px;border-radius:var(--r-xs)}
.char-counter.ok  {background:var(--green-dim);color:var(--green)}
.char-counter.warn{background:var(--amber-dim);color:var(--amber)}
.char-counter.over{background:var(--red-dim);color:var(--red)}

/* ══ EMPTY / LOADING ══ */
.empty-panel{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:240px;gap:10px;
}
.empty-panel-icon{font-size:40px;opacity:.28;animation:floatIcon 3s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.empty-panel-text{font-size:13px;font-weight:600;color:var(--text-3)}
.empty-panel-sub{font-size:11.5px;color:var(--text-3);opacity:.7}
.generating-state{display:flex;flex-direction:column;align-items:center;gap:14px;padding:44px 0}
.generating-bar{width:200px;height:3px;background:var(--surface-3);border-radius:3px;overflow:hidden}
.generating-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-3));border-radius:3px;animation:genProg 2.2s var(--ease) infinite}
@keyframes genProg{0%{width:0;margin-left:0}60%{width:80%;margin-left:0}100%{width:20%;margin-left:80%}}
.generating-label{font-size:12px;color:var(--text-3);font-weight:600}
.loading-dots{display:flex;gap:5px;align-items:center;justify-content:center}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:dotBounce 1.2s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.7);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ══ INLINE SKELETON ══ */
.inline-skel-mkt{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}

/* ══ TOAST ══ */
#toast-container{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:8px;
  pointer-events:none;align-items:center;width:100%;max-width:400px;padding:0 16px;
}
.toast{
  background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r);
  padding:12px 18px;font-size:13px;font-weight:500;color:var(--text);box-shadow:var(--sh-lg);
  display:flex;align-items:center;gap:9px;animation:toastIn .25s var(--ease) both;pointer-events:all;width:100%;
}
.toast.fade-out{animation:toastOut .25s var(--ease) forwards}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(8px)}}

/* ══════════════════════════════════════════════
   TABLET ≤900px — stacks to single column
   Tool cards stay as individual boxes in 2×2 grid
══════════════════════════════════════════════ */
@media(max-width:900px){
  .marketing-layout{grid-template-columns:1fr}
  .inline-skel-mkt{grid-template-columns:1fr}
  .skel-mkt-grid{grid-template-columns:1fr}
  .tool-list{
    position:static;
    /* 2×2 grid of individual cards */
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  /* Keep each card as its own box — no changes needed */
  .tool-card{
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:16px 12px;
    gap:9px;
  }
  .tool-card-icon{width:40px;height:40px;min-width:40px;font-size:18px}
  .tool-card-text{flex:none;width:100%}
  .tool-card-name{font-size:12px;white-space:normal;text-align:center;line-height:1.3}
  /* Hide desc, badge, arrow in grid mode */
  .tool-card-desc{display:none}
  .tool-card-badge{display:none}
  .tool-card-arrow{display:none}
  .field-row{grid-template-columns:1fr 1fr}
}

@media(max-width:648px){

  .skel-mkt-grid{grid-template-columns:1fr}

<script>
/* ── TOAST ── */
function toast(msg,type){
  type=type||'success';
  if(typeof window._toast==='function') return window._toast(msg,type);
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className='toast '+type;
  const icons={success:'✓',error:'✕',info:'ℹ',warning:'⚠'};
  el.innerHTML='<span style="font-size:14px;">'+(icons[type]||'✓')+'</span><span>'+msg+'</span>';
  c.appendChild(el);
  setTimeout(()=>{el.classList.add('fade-out');el.addEventListener('animationend',()=>el.remove());},3200);
}

/* ── THEME ── */
let _isDark=localStorage.getItem('ekart_theme')==='dark';
function applyTheme(dark){
  _isDark=dark;
  const root=document.documentElement;
  if(dark){root.setAttribute('data-theme','dark');root.style.background='#07080D';}
  else{root.removeAttribute('data-theme');root.style.background='#F2F3F9';}
  const icon=dark?'🌙':'☀️';
  ['themeToggleBtn','themeToggleMob'].forEach(id=>{const b=document.getElementById(id);if(b)b.textContent=icon;});
  localStorage.setItem('ekart_theme',dark?'dark':'light');
}
function toggleTheme(){applyTheme(!_isDark);}
applyTheme(_isDark);

/* ── SKELETON ── */
function dismissSkeleton(){
  const skel=document.getElementById('page-skeleton');
  if(!skel||skel._dismissed)return;
  skel._dismissed=true;
  skel.classList.add('skel-hiding');
  skel.addEventListener('transitionend',()=>skel.remove(),{once:true});
  setTimeout(()=>{if(skel.parentNode)skel.remove();},500);
}
function revealSidebarUser(){
  const s=document.getElementById('sidebar-user-skel');
  const r=document.getElementById('sidebar-user-real');
  if(s)s.classList.add('loaded');
  if(r)r.classList.remove('loading');
}

/* ── STATE ── */
let currentStoreId='';
let currentTool='instagram';
let allProducts=[];
let allStores=[];
let selectedTone='friendly';
let _loadToken=0;

const TOOLS={
  instagram:{icon:'📸',name:'Instagram Post',  desc:'Captions + hashtags',    help:'Generate scroll-stopping captions with trending hashtags for your products or store.',  badge:'Popular', label:'Post'},
  whatsapp: {icon:'💬',name:'WhatsApp Broadcast',desc:'Promotional messages',  help:'Create personalized broadcast messages to announce sales, new arrivals, and exclusive offers.', label:'Message'},
  email:    {icon:'📧',name:'Email Campaign',  desc:'Subject + full body copy',help:'Generate a compelling email with subject line, preview text and persuasive body copy.',   label:'Email'},
  sms:      {icon:'📱',name:'SMS Blast',       desc:'Punchy 160-char texts',   help:'Short, conversion-optimized SMS messages that respect the 160-character limit.',          label:'SMS'}
};
const TONES=[
  {key:'friendly',    label:'😊 Friendly'},
  {key:'professional',label:'💼 Professional'},
  {key:'urgent',      label:'🔥 Urgent'},
  {key:'playful',     label:'🎉 Playful'},
  {key:'luxurious',   label:'✨ Premium'},
];

/* ── STORE HELPERS ── */
function setStoreLoading(on){
  const w=document.getElementById('store-select-wrap');
  if(w) on?w.classList.add('store-loading'):w.classList.remove('store-loading');
}
function syncMobStoreSelector(stores,selectedId){
  const mob=document.getElementById('mob-store-selector');
  if(!mob)return;
  mob.innerHTML=stores.map(s=>`<option value="${s._id}"${s._id===selectedId?' selected':''}>${s.name}</option>`).join('');
}
function onMobStoreChange(id){
  const desk=document.getElementById('store-selector');
  if(desk)desk.value=id;
  currentStoreId=id;
  loadStoreData();
}

/* ── TRANSITIONS ── */
function inlineSkeletonHTML(){
  return `<div class="inline-skel-mkt">
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div class="skel" style="height:64px;border-radius:var(--r-lg);"></div>
      <div class="skel" style="height:64px;border-radius:var(--r-lg);opacity:.8;"></div>
      <div class="skel" style="height:64px;border-radius:var(--r-lg);opacity:.65;"></div>
      <div class="skel" style="height:64px;border-radius:var(--r-lg);opacity:.45;"></div>
    </div>
    <div class="skel" style="height:520px;border-radius:var(--r-xl);opacity:.9;"></div>
  </div>`;
}
const FADE_MS=160;
function fadeOut(el){
  return new Promise(r=>{
    el.style.transition=`opacity ${FADE_MS}ms ease,transform ${FADE_MS}ms ease`;
    el.style.opacity='0';el.style.transform='translateY(-4px)';el.style.pointerEvents='none';
    setTimeout(r,FADE_MS);
  });
}
function fadeIn(el){
  el.style.transition='none';el.style.opacity='0';el.style.transform='translateY(6px)';el.style.display='';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.style.transition=`opacity ${FADE_MS+40}ms ease,transform ${FADE_MS+40}ms ease`;
    el.style.opacity='1';el.style.transform='translateY(0)';el.style.pointerEvents='';
  }));
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',async()=>{
  const nav=await renderNav('marketing',(id)=>{
    currentStoreId=id;
    const mob=document.getElementById('mob-store-selector');
    if(mob)mob.value=id;
    loadStoreData();
  });
  if(!nav){dismissSkeleton();return;}
  revealSidebarUser();
  currentStoreId=nav.currentStoreId;
  applyTheme(_isDark);
  try{allStores=await apiFetch('/stores');}catch(_){allStores=[];}
  syncMobStoreSelector(allStores,currentStoreId);
  if(currentStoreId){await loadFirstLoad();}
  else{showNoStoreState();document.getElementById('page-content').style.display='';dismissSkeleton();}
});

async function loadFirstLoad(){
  const token=++_loadToken;
  const c=document.getElementById('page-content');
  setStoreLoading(true);
  try{allProducts=await apiFetch(`/stores/${currentStoreId}/products`);if(token!==_loadToken)return;}
  catch(_){allProducts=[];}
  if(token!==_loadToken)return;
  renderPage();
  c.style.display='';
  requestAnimationFrame(()=>dismissSkeleton());
  setStoreLoading(false);
}
async function loadStoreData(){
  const token=++_loadToken;
  const c=document.getElementById('page-content');
  if(c.style.display==='none'){await loadFirstLoad();return;}
  setStoreLoading(true);
  await fadeOut(c);if(token!==_loadToken)return;
  c.innerHTML=inlineSkeletonHTML();fadeIn(c);
  try{allProducts=await apiFetch(`/stores/${currentStoreId}/products`);}catch(_){allProducts=[];}
  if(token!==_loadToken)return;
  await fadeOut(c);if(token!==_loadToken)return;
  renderPage();fadeIn(c);
  setStoreLoading(false);
}
function showNoStoreState(){
  document.getElementById('page-content').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 200px);text-align:center;">
      <div style="font-size:48px;margin-bottom:16px;opacity:.35;">📣</div>
      <div style="font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.03em;margin-bottom:8px;">No store selected</div>
      <div style="font-size:13px;color:var(--text-3);line-height:1.65;max-width:300px;">Select a store from the dropdown above to start generating AI marketing content.</div>
    </div>`;
}

/* ── RENDER PAGE ── */
function renderPage(){
  const c=document.getElementById('page-content');
  const productOptions=allProducts.map(p=>`<option value="${p._id}">${p.name}</option>`).join('');
  c.innerHTML=`
    <div class="page-header">
      <div class="page-header-title">AI Marketing Tools</div>
      <div class="page-header-sub">Generate on-brand content for every channel in seconds — powered by AI.</div>
    </div>
    <div class="marketing-layout">

      <!-- LEFT: 4 individual standalone cards -->
      <div class="tool-list" id="toolList">
        ${Object.entries(TOOLS).map(([key,t])=>`
          <div class="tool-card${currentTool===key?' active':''}" onclick="switchTool('${key}')" role="button" tabindex="0">
            <div class="tool-card-icon">${t.icon}</div>
            <div class="tool-card-text">
              <div class="tool-card-name">${t.name}</div>
              <div class="tool-card-desc">${t.desc}</div>
            </div>
            ${t.badge?`<span class="tool-card-badge">${t.badge}</span>`:''}
            <span class="tool-card-arrow">›</span>
          </div>`).join('')}
      </div>

      <!-- RIGHT: form panel -->
      <div class="tool-panel-right" id="toolPanel">
        ${renderToolPanel(productOptions)}
      </div>

    </div>`;
  c.querySelectorAll('.tool-card').forEach(card=>{
    card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();card.click();}});
  });
}

/* ── TOOL PANEL HTML ── */
function renderToolPanel(productOptions){
  const t=TOOLS[currentTool];
  const hasOffer=currentTool==='email'||currentTool==='whatsapp';
  const label=t.label||'Content';
  const storeName=(allStores.find(s=>s._id===currentStoreId)||{}).name||'';
  const goalPlaceholders={
    instagram:'e.g. Promote summer sale, Announce new arrivals…',
    whatsapp: 'e.g. Flash sale this weekend, New product launch…',
    email:    'e.g. Monthly newsletter, Re-engage inactive customers…',
    sms:      'e.g. 48-hour sale, Limited stock alert…',
  };
  const toneChips=TONES.map(tone=>
    `<button class="tone-chip${selectedTone===tone.key?' active':''}" onclick="setTone('${tone.key}',this)">${tone.label}</button>`
  ).join('');
  return `
    <div class="tool-panel-header">
      <div class="tool-panel-header-icon">${t.icon}</div>
      <div class="tool-panel-header-info">
        <h2>${t.name}</h2>
        <p>${t.help}</p>
      </div>
    </div>
    <div class="tool-panel-body">
      <div class="field">
        <label>Campaign Goal <span style="color:var(--red);font-size:11px;">*</span></label>
        <input type="text" id="mktGoal" placeholder="${goalPlaceholders[currentTool]||''}"
          onkeydown="if(event.key==='Enter')generateMarketing()">
      </div>
      ${allProducts.length?`
      <div class="field">
        <label>Product <span class="opt">(optional)</span></label>
        <select id="mktProduct">
          <option value="">— General / All Products</option>
          ${productOptions}
        </select>
      </div>`:''}
      <div class="field">
        <label>Tone</label>
        <div class="tone-chips" id="toneChips">${toneChips}</div>
        <input type="hidden" id="mktTone" value="${selectedTone}">
      </div>
      ${hasOffer?`
      <div class="field">
        <label>Offer / Discount <span class="opt">(optional)</span></label>
        <input type="text" id="mktOffer" placeholder="e.g. 20% off, Free shipping above ₹500, BOGO deal">
      </div>`:''}
      <div class="field">
        <label>Brand / Store Name</label>
        <input type="text" id="mktBrand" placeholder="Your store or brand name" value="${storeName}">
      </div>
      <button class="btn-generate" onclick="generateMarketing()" id="mktGenBtn">
        <span>✨</span> Generate ${label}
      </button>
      <div id="mktResult">
        <div class="empty-panel">
          <div class="empty-panel-icon">${t.icon}</div>
          <div class="empty-panel-text">Ready to generate</div>
          <div class="empty-panel-sub">Fill in the goal above and hit Generate</div>
        </div>
      </div>
    </div>`;
}

/* ── TONE ── */
function setTone(tone,btn){
  selectedTone=tone;
  document.getElementById('mktTone').value=tone;
  document.querySelectorAll('#toneChips .tone-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
}

/* ── SWITCH TOOL ── */
function switchTool(tool){
  if(currentTool===tool)return;
  currentTool=tool;
  document.querySelectorAll('.tool-card').forEach(card=>{
    const m=card.getAttribute('onclick').match(/'(\w+)'/);
    card.classList.toggle('active',m&&m[1]===tool);
  });
  const productOptions=allProducts.map(p=>`<option value="${p._id}">${p.name}</option>`).join('');
  const panel=document.getElementById('toolPanel');
  panel.style.transition='opacity .12s ease,transform .12s ease';
  panel.style.opacity='0';panel.style.transform='translateY(4px)';
  setTimeout(()=>{
    panel.innerHTML=renderToolPanel(productOptions);
    panel.style.transition='opacity .18s ease,transform .18s ease';
    panel.style.opacity='1';panel.style.transform='translateY(0)';
  },130);
  if(window.innerWidth<=648)closeMobileSidebar();
}

/* ── GENERATE ── */
async function generateMarketing(){
  if(!currentStoreId)return toast('Select a store first','error');
  const goal=document.getElementById('mktGoal').value.trim();
  if(!goal)return toast('Enter a campaign goal first','error');
  const btn=document.getElementById('mktGenBtn');
  const resultEl=document.getElementById('mktResult');
  const label=TOOLS[currentTool].label||'Content';
  btn.disabled=true;
  btn.innerHTML=`<span style="display:inline-block;animation:spin .7s linear infinite">⏳</span> Generating…`;
  resultEl.innerHTML=`
    <div class="generating-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="generating-bar"><div class="generating-bar-fill"></div></div>
      <div class="generating-label">Crafting your ${label.toLowerCase()}…</div>
    </div>`;
  const productId=document.getElementById('mktProduct')?.value||'';
  const product=allProducts.find(p=>p._id===productId);
  const tone=document.getElementById('mktTone')?.value||selectedTone;
  const offer=document.getElementById('mktOffer')?.value.trim()||'';
  const brand=document.getElementById('mktBrand').value.trim();
  try{
    const store=allStores.find(s=>s._id===currentStoreId)||{};
    const r=await apiFetch('/ai/marketing-content',{
      method:'POST',
      body:JSON.stringify({
        store_name:brand||store.name||'My Store',
        product_name:product?product.name:goal,
        product_description:[product?.description||'',offer?'Offer: '+offer:'',!product?goal:''].filter(Boolean).join('. '),
        platform:currentTool,tone,
        currency:store.currency||'INR',
        price:product?product.price:''
      })
    });
    const all=r.content;
    let content;
    if(currentTool==='instagram')content=all.instagram||all;
    else if(currentTool==='whatsapp')content=all.whatsapp||all;
    else if(currentTool==='email')content=all.email||all;
    else if(currentTool==='sms')content={message:all.sms||all.message||''};
    else content=all;
    renderResult(content);
  }catch(e){
    resultEl.innerHTML=`
      <div style="margin-top:16px;padding:14px 16px;background:var(--red-dim);
        border:1px solid rgba(224,82,82,0.2);border-radius:var(--r-sm);
        color:var(--red);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px;">
        ⚠️ ${e.message||'Something went wrong. Please try again.'}
      </div>`;
  }
  btn.disabled=false;
  btn.innerHTML=`<span>✨</span> Generate ${label}`;
}

/* ── RENDER RESULTS ── */
function renderResult(content){
  const res=document.getElementById('mktResult');
  if(!content){res.innerHTML='<p style="color:var(--red);padding-top:14px;font-size:12.5px;">No content generated.</p>';return;}
  let html='<div class="mkt-results">';
  if(currentTool==='instagram'){
    const caption=content.caption||content.text||'';
    const hashtags=content.hashtags||[];
    html+=resultBlock('📸 Caption',caption,'instaCaption');
    if(hashtags.length){
      const hashStr=hashtags.map(h=>h.startsWith('#')?h:'#'+h).join(' ');
      html+=`<div class="result-block">
        <div class="result-block-header">
          <span class="result-block-title">🏷️ Hashtags (${hashtags.length})</span>
          <button class="result-copy-btn" onclick="copyBlock('instaHashtagsRaw',this)">📋 Copy all</button>
        </div>
        <div class="result-body">
          <div id="instaHashtagsRaw" style="display:none;">${hashStr}</div>
          <div class="insta-hashtags">${hashtags.map(h=>`<span class="hashtag">${h.startsWith('#')?h:'#'+h}</span>`).join('')}</div>
        </div>
      </div>`;
    }
    if(content.story_text)html+=resultBlock('📱 Story Text',content.story_text,'storyText');
  }else if(currentTool==='whatsapp'){
    html+=resultBlock('💬 Message',content.message||content.text||'','waMsg');
    if(content.cta)html+=resultBlock('🔗 Call-to-Action',content.cta,'waCta');
  }else if(currentTool==='email'){
    const subject=content.subject||'';
    const preheader=content.preheader||'';
    const body=content.body||content.text||'';
    html+=`<div class="result-block">
      <div class="result-block-header">
        <span class="result-block-title">📌 Subject Line</span>
        <button class="result-copy-btn" onclick="copyBlock('emailSubject',this)">📋 Copy</button>
      </div>
      <div class="result-body"><div class="email-subject-text" id="emailSubject">${subject}</div></div>
    </div>`;
    if(preheader)html+=resultBlock('👁️ Preview Text',preheader,'emailPreheader');
    html+=resultBlock('📧 Email Body',body,'emailBody');
  }else if(currentTool==='sms'){
    const msg=content.message||content.text||'';
    const len=msg.length;
    const cls=len>160?'over':len>140?'warn':'ok';
    const icon=len>160?'⚠️':len>140?'⚡':'✓';
    const note=len>160?` — ${len-160} chars over`:len>140?' — Near limit':' — Good length';
    html+=`<div class="result-block">
      <div class="result-block-header">
        <span class="result-block-title">📱 SMS Message</span>
        <button class="result-copy-btn" onclick="copyBlock('smsMsg',this)">📋 Copy</button>
      </div>
      <div class="result-body">
        <div class="result-content" id="smsMsg">${msg}</div>
        <div class="char-counter ${cls}">${icon} ${len} / 160 characters${note}</div>
      </div>
    </div>`;
  }
  html+='</div>';
  res.innerHTML=html;
}
function resultBlock(title,text,id){
  return `<div class="result-block">
    <div class="result-block-header">
      <span class="result-block-title">${title}</span>
      <button class="result-copy-btn" onclick="copyBlock('${id}',this)">📋 Copy</button>
    </div>
    <div class="result-body"><div class="result-content" id="${id}">${text}</div></div>
  </div>`;
}

/* ── COPY ── */
function copyBlock(id,btn){
  const el=document.getElementById(id);if(!el)return;
  navigator.clipboard.writeText(el.textContent.trim())
    .then(()=>{
      const orig=btn.innerHTML;btn.innerHTML='✓ Copied!';btn.classList.add('copied');
      setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('copied');},2000);
    })
    .catch(()=>toast('Could not copy','error'));
}

/* ── MOBILE SIDEBAR ── */
function openMobileSidebar(){
  document.getElementById('sidebar').classList.add('mob-open');
  document.getElementById('sidebarBackdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('sidebarBackdrop').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.addEventListener('click',()=>{if(window.innerWidth<=648)closeMobileSidebar();});
  });
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMobileSidebar();});
</script>
</body>
</html>

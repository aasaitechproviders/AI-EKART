<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --accent: #6c63ff; --bg: #f8f9fc; --surface: #ffffff; --border: #e8eaf0; --text: #1a1a2e; --text2: #64748b; --text3: #94a3b8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 64px; }
  .store-logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; text-decoration: none; color: var(--text); }
  .breadcrumb { font-size: 13px; color: var(--text3); }
  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .cart-btn { margin-left: auto; display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--accent); color: white; border-radius: 10px; text-decoration: none; font-size: 13.5px; font-weight: 600; position: relative; }
  .cart-count { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; display: none; }
  .cart-count.has-items { display: flex; }

  .page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }

  /* Images */
  .img-gallery { position: sticky; top: 90px; }
  .main-img { aspect-ratio: 1; border-radius: 18px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 80px; margin-bottom: 12px; }
  .main-img img { width: 100%; height: 100%; object-fit: cover; }
  .thumbs { display: flex; gap: 10px; flex-wrap: wrap; }
  .thumb { width: 72px; height: 72px; border-radius: 10px; overflow: hidden; background: var(--surface); border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: border-color .15s; }
  .thumb:hover, .thumb.active { border-color: var(--accent); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* Info */
  .product-info { padding-top: 8px; }
  .product-cat-badge { display: inline-block; font-size: 11.5px; font-weight: 600; padding: 3px 10px; border-radius: 6px; background: rgba(108,99,255,0.1); color: var(--accent); margin-bottom: 12px; }
  .product-title { font-size: clamp(22px, 3vw, 32px); font-weight: 800; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 14px; }
  .price-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .price-main { font-size: 32px; font-weight: 800; }
  .price-compare { font-size: 18px; color: var(--text3); text-decoration: line-through; }
  .price-discount { font-size: 13px; font-weight: 700; color: #16a34a; background: #dcfce7; padding: 3px 9px; border-radius: 7px; }
  .product-desc { font-size: 15px; color: var(--text2); line-height: 1.8; margin-bottom: 24px; white-space: pre-wrap; }

  /* Variants */
  .variant-group { margin-bottom: 18px; }
  .variant-label { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
  .variant-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .variant-btn { padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; font-family: 'Outfit', sans-serif; background: var(--surface); color: var(--text); cursor: pointer; transition: all .15s; }
  .variant-btn:hover { border-color: var(--accent); color: var(--accent); }
  .variant-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }

  /* Qty */
  .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .qty-label { font-size: 13px; font-weight: 700; color: var(--text2); }
  .qty-ctrl { display: flex; align-items: center; gap: 0; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
  .qty-btn { width: 38px; height: 38px; border: none; background: var(--bg); font-size: 18px; cursor: pointer; font-family: 'Outfit', sans-serif; transition: background .15s; display: flex; align-items: center; justify-content: center; }
  .qty-btn:hover { background: #ebebff; }
  .qty-num { width: 44px; text-align: center; font-size: 15px; font-weight: 700; border: none; background: var(--surface); border-left: 1px solid var(--border); border-right: 1px solid var(--border); height: 38px; font-family: 'Outfit', sans-serif; color: var(--text); }

  .btn-cart { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif; transition: background .15s; margin-bottom: 10px; }
  .btn-cart:hover { background: #7b74ff; }
  .btn-buy { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; background: #1a1a2e; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif; transition: background .15s; }
  .btn-buy:hover { background: #2d2d4a; }
  .out-of-stock-box { background: #fef2f2; border: 1.5px solid #fecaca; border-radius: 12px; padding: 16px; text-align: center; color: #ef4444; font-weight: 600; }

  .meta-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; }
  .meta-tag { font-size: 12px; padding: 3px 10px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); color: var(--text3); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: white; border-radius: 12px; padding: 14px 20px; font-size: 14px; display: none; z-index: 2000; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .toast.show { display: block; }

  @media(max-width:768px) { .product-layout { grid-template-columns: 1fr; } .img-gallery { position: static; } }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="store-logo-text" id="storeName" href="javascript:history.back()">← Shop</a>
    <div class="breadcrumb" id="breadcrumb"></div>
    <a href="cart.html" class="cart-btn">
      🛒 Cart
      <span class="cart-count" id="cartCount"></span>
    </a>
  </div>
</header>

<div class="page-wrap" id="pageWrap">
  <div style="text-align:center;padding:80px;color:#94a3b8;">Loading product...</div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search)
const slug = params.get('store')
const productId = params.get('id')
let selectedVariants = {}
let quantity = 1
let product = null
let currency = sessionStorage.getItem('ekart_currency') || '₹'

async function init() {
  try {
    // Load store config for branding
    const config = await fetch(`/shop/${slug}/config`).then(r => r.json())
    document.getElementById('storeName').textContent = '← ' + (config.name || 'Shop')
    if (config.brand_color) document.documentElement.style.setProperty('--accent', config.brand_color)
    if (config.currency === 'USD') currency = '$'
    else if (config.currency === 'EUR') currency = '€'

    product = await fetch(`/shop/${slug}/products/${productId}`).then(r => r.json())
    if (product.error) throw new Error(product.error)
    document.title = product.name + ' — ' + config.name
    if (product.category_name) document.getElementById('breadcrumb').innerHTML = `<a href="shop.html?store=${slug}">All</a> › ${product.category_name} › ${product.name}`
    renderProduct()
    updateCartBadge()
  } catch (e) {
    document.getElementById('pageWrap').innerHTML = `<div style="text-align:center;padding:80px;"><h2>Product not found</h2><p>${e.message}</p></div>`
  }
}

function renderProduct() {
  const outOfStock = product.track_inventory && product.stock_qty <= 0
  const discount = product.compare_at_price && product.compare_at_price > product.price
    ? Math.round((1 - product.price / product.compare_at_price) * 100) : 0

  const images = product.images || []
  const mainImgHtml = images.length
    ? `<img id="mainImg" src="${images[0]}" alt="${product.name}">`
    : '📦'
  const thumbsHtml = images.length > 1
    ? images.map((img, i) => `<div class="thumb ${i === 0 ? 'active' : ''}" onclick="setMainImg(this,'${img}')"><img src="${img}" alt=""></div>`).join('')
    : ''

  const variantsHtml = (product.variants || []).map(v => `
    <div class="variant-group">
      <div class="variant-label">${v.label}</div>
      <div class="variant-options">
        ${(v.options || '').split(',').map(opt => opt.trim()).filter(Boolean).map(opt =>
          `<button class="variant-btn" data-label="${v.label}" data-val="${opt}" onclick="selectVariant(this,'${v.label}','${opt}')">${opt}</button>`
        ).join('')}
      </div>
    </div>`).join('')

  document.getElementById('pageWrap').innerHTML = `
    <div class="product-layout">
      <div class="img-gallery">
        <div class="main-img">${mainImgHtml}</div>
        <div class="thumbs">${thumbsHtml}</div>
      </div>
      <div class="product-info">
        ${product.category_name ? `<span class="product-cat-badge">${product.category_name}</span>` : ''}
        <h1 class="product-title">${product.name}</h1>
        <div class="price-row">
          <span class="price-main">${currency}${product.price.toFixed(2)}</span>
          ${product.compare_at_price ? `<span class="price-compare">${currency}${product.compare_at_price.toFixed(2)}</span>` : ''}
          ${discount ? `<span class="price-discount">${discount}% off</span>` : ''}
        </div>
        ${product.description ? `<div class="product-desc">${product.description}</div>` : ''}
        ${variantsHtml}
        ${!outOfStock ? `
        <div class="qty-row">
          <span class="qty-label">Quantity</span>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <input class="qty-num" type="number" id="qtyInput" value="1" min="1" max="${product.track_inventory ? product.stock_qty : 999}" onchange="quantity=parseInt(this.value)||1">
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>
        <button class="btn-cart" onclick="addToCart()">🛒 Add to Cart</button>
        <button class="btn-buy" onclick="buyNow()">⚡ Buy Now</button>
        ` : '<div class="out-of-stock-box">❌ Out of Stock</div>'}
        ${product.track_inventory && product.stock_qty > 0 ? `<p style="font-size:12.5px;color:#64748b;margin-top:10px;">Only ${product.stock_qty} left in stock</p>` : ''}
        ${product.tags?.length ? `<div class="meta-tags">${product.tags.map(t => `<span class="meta-tag">#${t}</span>`).join('')}</div>` : ''}
        ${product.sku ? `<p style="font-size:12px;color:#94a3b8;margin-top:12px;">SKU: ${product.sku}</p>` : ''}
      </div>
    </div>`
}

function setMainImg(el, src) {
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  const main = document.getElementById('mainImg')
  if (main) main.src = src
}

function selectVariant(el, label, val) {
  document.querySelectorAll(`[data-label="${label}"]`).forEach(b => b.classList.remove('selected'))
  el.classList.add('selected')
  selectedVariants[label] = val
}

function changeQty(delta) {
  const input = document.getElementById('qtyInput')
  const max = product.track_inventory ? product.stock_qty : 999
  quantity = Math.max(1, Math.min(max, (parseInt(input.value) || 1) + delta))
  input.value = quantity
}

function getVariantString() {
  return Object.entries(selectedVariants).map(([k, v]) => `${k}: ${v}`).join(', ')
}

function getCart() { return JSON.parse(localStorage.getItem('cart_' + slug) || '[]') }
function saveCart(c) { localStorage.setItem('cart_' + slug, JSON.stringify(c)) }

function addToCart() {
  const variantStr = getVariantString()
  const key = productId + (variantStr ? '_' + variantStr : '')
  const cart = getCart()
  const existing = cart.find(x => x._key === key)
  if (existing) existing.qty += quantity
  else cart.push({ _key: key, product_id: productId, name: product.name, price: product.price, image: product.images?.[0] || '', variant: variantStr || null, qty: quantity })
  saveCart(cart)
  updateCartBadge()
  toast('Added to cart! 🛒')
}

function buyNow() {
  addToCart()
  location.href = 'cart.html'
}

function updateCartBadge() {
  const cart = getCart()
  const total = cart.reduce((s, x) => s + x.qty, 0)
  const el = document.getElementById('cartCount')
  el.textContent = total
  el.className = 'cart-count' + (total > 0 ? ' has-items' : '')
}

function toast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2000)
}

if (slug && productId) init()
</script>
</body>
</html>

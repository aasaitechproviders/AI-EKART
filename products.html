<!DOCTYPE html>
<html lang="en" style="background:#080910">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKart — Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">
<style>
  .product-thumb { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; background: var(--surface2); }
  .product-thumb-placeholder { width: 38px; height: 38px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .variant-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .variant-row input { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; }
  .variant-row button { background: none; border: 1px solid var(--border2); border-radius: 6px; color: var(--red); padding: 6px 10px; cursor: pointer; font-size: 14px; transition: all .15s; }
  .variant-row button:hover { background: rgba(248,113,113,0.1); }
  .img-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .img-preview img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border2); }
  .ai-result-box { background: linear-gradient(135deg,rgba(108,99,255,0.07),rgba(167,139,250,0.03)); border: 1px solid rgba(108,99,255,0.2); border-radius: 12px; padding: 16px; margin-top: 12px; }
  .ai-result-box h4 { font-size: 11px; font-weight: 800; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  .ai-field-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .ai-field-label { font-size: 11px; font-weight: 700; color: var(--text3); width: 80px; flex-shrink: 0; padding-top: 2px; }
  .ai-field-val { font-size: 13px; color: var(--text); flex: 1; line-height: 1.5; }
  .ai-tag { display: inline-block; padding: 2px 8px; background: rgba(108,99,255,0.12); color: var(--accent2); border-radius: 5px; font-size: 11px; font-weight: 600; margin: 2px; }
  .ai-highlight { padding: 4px 0 4px 10px; border-left: 2px solid var(--accent); color: var(--text2); font-size: 13px; margin-bottom: 5px; line-height: 1.5; }
  .ai-apply-btn { padding: 6px 14px; background: var(--accent); color: white; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif; margin-top: 10px; transition: background .15s; }
  .ai-apply-btn:hover { background: #7b74ff; }
  .low-stock td { background: rgba(251,191,36,0.04) !important; }
  .low-stock-badge { display:inline-block; padding:2px 7px; background:rgba(251,191,36,0.15); color:var(--yellow); border-radius:5px; font-size:10px; font-weight:700; margin-left:4px; }
  .bulk-bar { display:none; align-items:center; gap:10px; padding:10px 14px; background:rgba(108,99,255,0.1); border:1px solid rgba(108,99,255,0.25); border-radius:10px; margin-bottom:12px; }
  .bulk-bar.visible { display:flex; }
  .bulk-bar span { font-size:13px; font-weight:700; color:var(--accent2); flex:1; }
  .cb-all { width:16px; height:16px; cursor:pointer; accent-color:var(--accent); }
</style>
<script src="api.js"></script>
<script src="nav.js"></script>
</head>
<body>
<div id="page-skeleton">
    <div class="skel-sidebar">
      <div class="skel" style="height:22px;width:68px;border-radius:5px;margin-bottom:20px;"></div>
      <div style="display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px;">
        <div class="skel" style="width:32px;height:32px;border-radius:50%;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:5px;">
          <div class="skel" style="height:10px;width:80px;border-radius:4px;"></div>
          <div class="skel" style="height:9px;width:110px;border-radius:4px;"></div>
        </div>
      </div>
      <div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.65;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div>
    </div>
    <div class="skel-main">
      <div class="skel-topbar">
        <div class="skel" style="height:16px;width:100px;border-radius:5px;"></div>
        <div class="skel" style="height:32px;width:150px;border-radius:8px;"></div>
      </div>
      <div class="skel-body">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;">
          <div class="skel" style="height:78px;border-radius:13px;"></div><div class="skel" style="height:78px;border-radius:13px;"></div><div class="skel" style="height:78px;border-radius:13px;"></div><div class="skel" style="height:78px;border-radius:13px;"></div>
        </div>
        <div class="skel" style="height:40px;border-radius:9px;margin-bottom:10px;"></div>
        <div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:1.0;"></div><div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:0.82;"></div><div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:0.64;"></div><div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:0.46;"></div><div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:0.28;"></div>
      </div>
    </div>
  </div>
<div class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="home.html">e<span class="logo-k">K</span>art<span class="logo-dot"></span></a>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="nav-avatar">…</div>
      <div style="min-width:0;">
        <div class="sidebar-user-name" id="nav-user-name">…</div>
        <div class="sidebar-user-email" id="nav-user-email">…</div>
      </div>
    </div>
        <div class="nav-section"><div class="nav-section-label">Merchant</div>
      <a class="nav-item" href="home.html"><span class="nav-icon">🏪</span>My Stores</a>
      <a class="nav-item active" href="products.html"><span class="nav-icon">📦</span>Products</a>
      <a class="nav-item" href="categories.html"><span class="nav-icon">🗂️</span>Categories</a>
      <a class="nav-item" href="orders.html"><span class="nav-icon">📋</span>Orders</a>
      <a class="nav-item" href="coupons.html"><span class="nav-icon">🎟️</span>Coupons</a>
      <a class="nav-item" href="payments.html"><span class="nav-icon">💳</span>Payments</a>
      <a class="nav-item" href="analytics.html"><span class="nav-icon">📊</span>Analytics</a>
      <a class="nav-item" href="marketing.html"><span class="nav-icon">📣</span>Marketing</a>
      <a class="nav-item" href="inventory.html"><span class="nav-icon">📋</span>Inventory</a>
    </div>
    <div class="nav-section"><div class="nav-section-label">AI Tools</div>
      <a class="nav-item" href="ai-assistant.html"><span class="nav-icon">🤖</span>AI Assistant</a>
    </div>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logout()">↩ Logout</button>
    </div>
  </div>
  <div class="main-wrap">
    <div class="topbar">
      <div class="topbar-left"><span class="topbar-title">Products</span></div>
      <div class="topbar-right">
          <div class="store-select-wrap" id="store-select-wrap"><span class="store-select-label">Store</span><select class="store-selector" id="store-selector"></select></div>
        <div id="topbar-actions"></div>
      </div>
    </div>
    <div id="page-content" class="content page-enter" style="display:none;"></div>
  </div>
<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal" style="max-width:560px;">
    <h2 id="productModalTitle">Add Product</h2>
    <input type="hidden" id="productEditId">
    <div class="field" style="display:flex;align-items:flex-end;gap:10px;">
      <div style="flex:1;"><label>Product Name *</label><input type="text" id="productName" placeholder="e.g. Wireless Headphones"></div>
      <button class="btn-ai btn-ai-sm" onclick="aiGenerateProduct()" id="aiGenBtn" style="margin-bottom:0;flex-shrink:0;">✨ AI</button>
    </div>
    <div id="aiProductResult" style="display:none;"></div>
    <div class="field"><label>Description</label><textarea id="productDesc" placeholder="Describe your product..."></textarea></div>
    <div class="field-row">
      <div class="field"><label>Price *</label><input type="number" id="productPrice" placeholder="999" step="0.01" min="0"></div>
      <div class="field"><label>Compare at Price</label><input type="number" id="productCompare" placeholder="1499" step="0.01" min="0"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>SKU</label><input type="text" id="productSku" placeholder="SKU-001"></div>
      <div class="field"><label>Category</label><select id="productCategory"><option value="">No Category</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Stock Qty</label><input type="number" id="productStock" placeholder="100" min="0"></div>
      <div class="field"><label>Status</label>
        <select id="productStatus">
          <option value="active">Active</option>
          <option value="draft">Draft</option>
          <option value="archived">Archived</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Tags (comma separated)</label><input type="text" id="productTags" placeholder="electronics, wireless, audio"></div>
    <div class="field">
      <label>Product Images (up to 5)</label>
      <input type="file" id="productImageFiles" accept="image/*" multiple onchange="previewProductImages(this)"
        style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:8px 12px;color:var(--text);font-family:Outfit,sans-serif;">
      <div id="productImagesPreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>
      <div id="existingImagesWrap" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;"></div>
    </div>
    <div class="field">
      <label>Variants</label>
      <div id="variantsList"></div>
      <button class="btn btn-secondary btn-sm" onclick="addVariantRow()" style="margin-top:6px;">+ Add Variant</button>
      <div class="field-hint">e.g. "Size: S, M, L" or "Color: Red, Blue"</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('productModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script>
let allProducts = [], allCategories = [], catMap = {}, currentStoreId = ''

window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('products', (id) => { currentStoreId = id; loadProducts() })
  if (!nav) return
  currentStoreId = nav.currentStoreId
  setTopbarActions(`<button class="btn btn-primary" onclick="openCreateProduct()">+ Add Product</button>`)
  if (currentStoreId) await loadProducts()
  else renderEmpty()
  // Read AI prefill from ai-assistant.html
  const prefill = sessionStorage.getItem('ai_product_prefill')
  if (prefill) {
    try {
      const d = JSON.parse(prefill)
      sessionStorage.removeItem('ai_product_prefill')
      openCreateProduct()
      if (d.title) document.getElementById('productName').value = d.title
      if (d.desc)  document.getElementById('productDesc').value = d.desc
      if (d.tags)  document.getElementById('productTags').value = d.tags
      toast('AI content pre-filled from AI Assistant!', 'success')
    } catch {}
  }
})

async function loadProducts() {
  if (!currentStoreId) return
  document.getElementById('page-content').innerHTML = '<div class="spinner"></div>'
  try {
    ;[allProducts, allCategories] = await Promise.all([
      apiFetch(`/stores/${currentStoreId}/products`),
      apiFetch(`/stores/${currentStoreId}/categories`)
    ])
    catMap = {}; allCategories.forEach(c => catMap[c._id] = c.name)
    renderPage()
  } catch (e) { toast(e.message, 'error') }
}

function renderPage() {
  const lowStock = allProducts.filter(p => p.track_inventory && p.stock_qty <= 5).length
  const content = document.getElementById('page-content')
  content.innerHTML = `
    ${lowStock > 0 ? `<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:10px;margin-bottom:16px;font-size:13px;"><span style="font-size:16px;">⚠️</span><strong style="color:var(--yellow);">${lowStock} product${lowStock>1?'s':''} low on stock</strong><span style="color:var(--text2);">— stock qty ≤ 5</span></div>` : ''}
    <div id="bulkBar" class="bulk-bar">
      <span id="bulkCount">0 selected</span>
      <button class="btn btn-secondary btn-sm" onclick="bulkAction('active')">✅ Set Active</button>
      <button class="btn btn-secondary btn-sm" onclick="bulkAction('draft')">📝 Set Draft</button>
      <button class="btn btn-secondary btn-sm" onclick="bulkAction('archived')">📦 Archive</button>
      <button class="btn btn-danger btn-sm" onclick="bulkAction('delete')">🗑 Delete</button>
      <button class="btn btn-secondary btn-sm" onclick="clearSelection()">✕ Clear</button>
    </div>
    <div class="toolbar">
      <input class="search-field" id="productSearch" placeholder="Search products..." oninput="filterProducts()">
      <select class="filter-select" id="productCatFilter" onchange="filterProducts()">
        <option value="">All Categories</option>
        ${allCategories.map(c => `<option value="${c._id}">${c.name}</option>`).join('')}
      </select>
      <select class="filter-select" id="productStatusFilter" onchange="filterProducts()">
        <option value="">All Status</option>
        <option value="active">Active</option>
        <option value="draft">Draft</option>
        <option value="archived">Archived</option>
      </select>
    </div>
    <div class="section-card">
      <div class="section-card-header">
        <span class="section-card-title">Products <span id="prodCount" style="color:var(--text3);font-weight:400;">(${allProducts.length})</span></span>
      </div>
      <div class="table-wrap" style="border:none;border-radius:0;">
        <table>
          <thead><tr><th><input type="checkbox" class="cb-all" id="cbAll" onchange="toggleSelectAll(this)"></th><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="productsBody"></tbody>
        </table>
      </div>
    </div>`
  renderProducts(allProducts)
  const catSel = document.getElementById('productCategory')
  if (catSel) catSel.innerHTML = '<option value="">No Category</option>' + allCategories.map(c => `<option value="${c._id}">${c.name}</option>`).join('')
}

function filterProducts() {
  const q = document.getElementById('productSearch')?.value.toLowerCase() || ''
  const cat = document.getElementById('productCatFilter')?.value || ''
  const status = document.getElementById('productStatusFilter')?.value || ''
  let f = allProducts
  if (q) f = f.filter(p => p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q))
  if (cat) f = f.filter(p => String(p.category_id) === cat || (p.category_id?.$oid === cat))
  if (status) f = f.filter(p => p.status === status)
  renderProducts(f)
}

function renderProducts(products) {
  const body = document.getElementById('productsBody'); if (!body) return
  if (!products.length) {
    body.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📦</div><h3>No products found</h3></div></td></tr>`
    return
  }
  const cur = '₹'
  body.innerHTML = products.map(p => {
    const thumb = p.images?.[0]
      ? `<img class="product-thumb" src="${p.images[0]}" alt="">`
      : `<div class="product-thumb-placeholder">📦</div>`
    const catName = catMap[p.category_id] || catMap[p.category_id?.$oid] || '—'
    const isLow = p.track_inventory && p.stock_qty <= 5
    return `<tr class="${isLow ? 'low-stock' : ''}">
      <td><input type="checkbox" class="prod-cb" data-id="${p._id}" onchange="updateBulkBar()" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent);"></td>
      <td><div style="display:flex;align-items:center;gap:10px;">${thumb}
        <div><div style="font-weight:700;font-size:13px;">${p.name}</div>
        <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;">${p.sku||'—'}</div></div></div></td>
      <td style="color:var(--text2);font-size:12.5px;">${catName}</td>
      <td><strong style="font-family:'DM Mono',monospace;">${cur}${p.price.toFixed(2)}</strong>
        ${p.compare_at_price?`<div style="font-size:11px;color:var(--text3);text-decoration:line-through;">${cur}${p.compare_at_price.toFixed(2)}</div>`:''}
      </td>
      <td style="color:${isLow?'var(--yellow)':'var(--text2)'};font-family:'DM Mono',monospace;">
        ${p.track_inventory ? p.stock_qty : '∞'}${isLow ? '<span class="low-stock-badge">LOW</span>' : ''}
      </td>
      <td>${statusBadge(p.status)}</td>
      <td><div style="display:flex;gap:6px;">
        <button class="btn btn-secondary btn-sm" onclick="openEditProduct('${p._id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p._id}','${p.name.replace(/'/g,"\\'")}')">🗑</button>
      </div></td>
    </tr>`
  }).join('')
}

function getSelectedIds() {
  return Array.from(document.querySelectorAll('.prod-cb:checked')).map(cb => cb.dataset.id)
}

function updateBulkBar() {
  const ids = getSelectedIds()
  const bar = document.getElementById('bulkBar')
  if (!bar) return
  bar.classList.toggle('visible', ids.length > 0)
  const countEl = document.getElementById('bulkCount')
  if (countEl) countEl.textContent = `${ids.length} selected`
  const cbAll = document.getElementById('cbAll')
  if (cbAll) cbAll.checked = ids.length > 0 && ids.length === document.querySelectorAll('.prod-cb').length
}

function toggleSelectAll(cb) {
  document.querySelectorAll('.prod-cb').forEach(el => el.checked = cb.checked)
  updateBulkBar()
}

function clearSelection() {
  document.querySelectorAll('.prod-cb').forEach(el => el.checked = false)
  updateBulkBar()
}

async function bulkAction(action) {
  const ids = getSelectedIds()
  if (!ids.length) return
  if (action === 'delete') {
    if (!confirm(`Delete ${ids.length} product(s)? This cannot be undone.`)) return
    try {
      await Promise.all(ids.map(id => apiFetch(`/stores/${currentStoreId}/products/${id}`, { method: 'DELETE', body: '{}' })))
      toast(`${ids.length} product(s) deleted`, 'success')
    } catch (e) { toast(e.message, 'error') }
  } else {
    try {
      await Promise.all(ids.map(id => apiFetch(`/stores/${currentStoreId}/products/${id}`, { method: 'PUT', body: JSON.stringify({ status: action }) })))
      toast(`${ids.length} product(s) updated to ${action}`, 'success')
    } catch (e) { toast(e.message, 'error') }
  }
  await loadProducts()
}

function renderEmpty() {
  document.getElementById('page-content').innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><h3>No store selected</h3><p>Select a store from the top bar</p></div>`
}

function openCreateProduct() {
  if (!currentStoreId) return toast('Select a store first', 'error')
  document.getElementById('productModalTitle').textContent = 'Add Product'
  document.getElementById('productEditId').value = ''
  ;['productName','productDesc','productPrice','productCompare','productSku','productTags'].forEach(id => document.getElementById(id).value = '')
  document.getElementById('productStock').value = ''
  document.getElementById('productImageFiles').value = ''
  document.getElementById('productImagesPreview').innerHTML = ''
  document.getElementById('existingImagesWrap').innerHTML = ''
  document.getElementById('productStatus').value = 'active'
  document.getElementById('variantsList').innerHTML = ''
  document.getElementById('aiProductResult').style.display = 'none'
  const catSel = document.getElementById('productCategory')
  catSel.innerHTML = '<option value="">No Category</option>' + allCategories.map(c => `<option value="${c._id}">${c.name}</option>`).join('')
  openModal('productModal')
}

function openEditProduct(id) {
  const p = allProducts.find(x => x._id === id); if (!p) return
  document.getElementById('productModalTitle').textContent = 'Edit Product'
  document.getElementById('productEditId').value = id
  document.getElementById('productName').value = p.name
  document.getElementById('productDesc').value = p.description || ''
  document.getElementById('productPrice').value = p.price
  document.getElementById('productCompare').value = p.compare_at_price || ''
  document.getElementById('productSku').value = p.sku || ''
  document.getElementById('productStock').value = p.stock_qty || ''
  document.getElementById('productTags').value = (p.tags||[]).join(', ')
  document.getElementById('productImageFiles').value = ''
  document.getElementById('productImagesPreview').innerHTML = ''
  document.getElementById('existingImagesWrap').innerHTML = (p.images||[]).map(img =>
    `<img src="${img}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;border:1px solid var(--border2);">`).join('')
  document.getElementById('productStatus').value = p.status || 'active'
  document.getElementById('aiProductResult').style.display = 'none'
  const catId = p.category_id?.$oid || p.category_id || ''
  const catSel = document.getElementById('productCategory')
  catSel.innerHTML = '<option value="">No Category</option>' + allCategories.map(c => `<option value="${c._id}" ${c._id===catId?'selected':''}>${c.name}</option>`).join('')
  document.getElementById('variantsList').innerHTML = ''
  ;(p.variants||[]).forEach(v => addVariantRow(v.label, v.options))
  openModal('productModal')
}

async function saveProduct() {
  const id = document.getElementById('productEditId').value
  const name = document.getElementById('productName').value.trim()
  const price = document.getElementById('productPrice').value
  if (!name || !price) return toast('Name and price required', 'error')
  const variantRows = document.querySelectorAll('.variant-row')
  const variants = Array.from(variantRows).map(row => ({
    label: row.querySelector('.var-label').value.trim(),
    options: row.querySelector('.var-options').value.trim()
  })).filter(v => v.label)
  const fd = new FormData()
  fd.append('name', name)
  fd.append('description', document.getElementById('productDesc').value.trim())
  fd.append('price', price)
  fd.append('compare_at_price', document.getElementById('productCompare').value || '')
  fd.append('sku', document.getElementById('productSku').value.trim())
  fd.append('stock_qty', document.getElementById('productStock').value || 0)
  fd.append('track_inventory', !!document.getElementById('productStock').value)
  fd.append('category_id', document.getElementById('productCategory').value || '')
  fd.append('tags', document.getElementById('productTags').value)
  fd.append('status', document.getElementById('productStatus').value)
  fd.append('variants', JSON.stringify(variants))
  const imageFiles = document.getElementById('productImageFiles').files
  if (imageFiles.length > 0) Array.from(imageFiles).forEach(f => fd.append('images', f))
  else {
    const existingImgs = Array.from(document.querySelectorAll('#existingImagesWrap img')).map(i => i.src)
    fd.append('images', JSON.stringify(existingImgs))
  }
  try {
    const url = id ? `${API}/stores/${currentStoreId}/products/${id}` : `${API}/stores/${currentStoreId}/products`
    const res = await fetch(url, { method: id ? 'PUT' : 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: fd })
    if (!res.ok) { const e = await res.json(); throw new Error(e.error) }
    closeModal('productModal')
    await loadProducts()
    toast(id ? 'Product updated!' : 'Product added!', 'success')
  } catch (e) { toast(e.message, 'error') }
}

async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"?`)) return
  try {
    await apiFetch(`/stores/${currentStoreId}/products/${id}`, { method: 'DELETE', body: '{}' })
    await loadProducts()
    toast('Product deleted')
  } catch (e) { toast(e.message, 'error') }
}

function addVariantRow(label = '', options = '') {
  const div = document.createElement('div'); div.className = 'variant-row'
  div.innerHTML = `<input class="var-label" type="text" placeholder="Label (e.g. Size)" value="${label}">
  <input class="var-options" type="text" placeholder="Options (e.g. S, M, L)" value="${options}">
  <button onclick="this.parentElement.remove()">✕</button>`
  document.getElementById('variantsList').appendChild(div)
}

function previewProductImages(input) {
  const wrap = document.getElementById('productImagesPreview'); wrap.innerHTML = ''
  Array.from(input.files).forEach(f => {
    const r = new FileReader(); r.onload = e => {
      const img = document.createElement('img'); img.src = e.target.result
      img.style = 'width:56px;height:56px;border-radius:8px;object-fit:cover;border:1px solid var(--border2);'
      wrap.appendChild(img)
    }; r.readAsDataURL(f)
  })
}

async function aiGenerateProduct() {
  const name = document.getElementById('productName').value.trim()
  if (!name) return toast('Enter a product name first', 'error')
  const btn = document.getElementById('aiGenBtn')
  btn.disabled = true; btn.textContent = '⏳'
  const box = document.getElementById('aiProductResult'); box.style.display = 'none'
  try {
    const cat = document.getElementById('productCategory')
    const catName = cat?.options[cat.selectedIndex]?.text || ''
    const r = await apiFetch('/ai/generate-product-content', {
      method: 'POST',
      body: JSON.stringify({ product_name: name, category: catName, currency: 'INR' })
    })
    const d = r.content
    box.innerHTML = `<div class="ai-result-box">
      <h4>✨ AI Generated</h4>
      <div class="ai-field-row"><span class="ai-field-label">Title</span><span class="ai-field-val" style="font-weight:700;">${d.title}</span></div>
      <div class="ai-field-row"><span class="ai-field-label">Desc</span><span class="ai-field-val">${d.description}</span></div>
      <div style="margin:8px 0;">${(d.highlights||[]).map(h=>`<div class="ai-highlight">${h}</div>`).join('')}</div>
      <div>${(d.tags||[]).map(t=>`<span class="ai-tag">${t}</span>`).join('')}</div>
      <button class="ai-apply-btn" onclick="applyAIContent(${JSON.stringify(d).replace(/"/g,'&quot;')})">✅ Apply to Form</button>
    </div>`
    box.style.display = 'block'
  } catch (e) { toast('AI failed: ' + e.message, 'error') }
  btn.disabled = false; btn.textContent = '✨ AI'
}

function applyAIContent(d) {
  if (d.title) document.getElementById('productName').value = d.title
  if (d.description) document.getElementById('productDesc').value = d.description
  if (d.tags) document.getElementById('productTags').value = d.tags.join(', ')
  document.getElementById('aiProductResult').style.display = 'none'
  toast('AI content applied!', 'success')
}
</script>

<!DOCTYPE html>
<html lang="en" style="background:#080910">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKart — Categories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">
<style>
  .cats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-top: 20px; }
  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color .15s, transform .15s;
  }
  .cat-card:hover { border-color: rgba(108,99,255,0.3); transform: translateY(-2px); }
  .cat-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .cat-slug { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 3px; }
  .cat-delete { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: all .15s; }
  .cat-delete:hover { color: var(--red); background: rgba(248,113,113,0.1); }
  .add-card {
    background: none;
    border: 1.5px dashed var(--border2);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--text3); font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: all .15s;
    font-family: 'Outfit', sans-serif;
    width: 100%;
  }
  .add-card:hover { border-color: var(--accent); color: var(--accent2); background: rgba(108,99,255,0.04); }
  .add-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .add-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 14px; color: var(--text);
    font-family: 'Outfit', sans-serif;
    outline: none; transition: border-color .15s;
  }
  .add-row input:focus { border-color: var(--accent); }
</style>
<script src="api.js"></script>
<script src="nav.js"></script>
</head>
<body>
<div id="page-skeleton">
    <div class="skel-sidebar">
      <div class="skel" style="height:22px;width:68px;border-radius:5px;margin-bottom:20px;"></div>
      <div style="display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px;">
        <div class="skel" style="width:32px;height:32px;border-radius:50%;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:5px;">
          <div class="skel" style="height:10px;width:80px;border-radius:4px;"></div>
          <div class="skel" style="height:9px;width:110px;border-radius:4px;"></div>
        </div>
      </div>
      <div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.65;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div><div class="skel" style="height:34px;border-radius:9px;margin-bottom:2px;opacity:.3;"></div>
    </div>
    <div class="skel-main">
      <div class="skel-topbar">
        <div class="skel" style="height:16px;width:100px;border-radius:5px;"></div>
        <div class="skel" style="height:32px;width:150px;border-radius:8px;"></div>
      </div>
      <div class="skel-body">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;">
          <div class="skel" style="height:78px;border-radius:13px;"></div><div class="skel" style="height:78px;border-radius:13px;"></div><div class="skel" style="height:78px;border-radius:13px;"></div><div class="skel" style="height:78px;border-radius:13px;"></div>
        </div>
        <div class="skel" style="height:40px;border-radius:9px;margin-bottom:10px;"></div>
        <div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:1.0;"></div><div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:0.82;"></div><div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:0.64;"></div><div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:0.46;"></div><div class="skel" style="height:52px;border-radius:9px;margin-bottom:8px;opacity:0.28;"></div>
      </div>
    </div>
  </div>
<div class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="home.html">e<span class="logo-k">K</span>art<span class="logo-dot"></span></a>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="nav-avatar">…</div>
      <div style="min-width:0;">
        <div class="sidebar-user-name" id="nav-user-name">…</div>
        <div class="sidebar-user-email" id="nav-user-email">…</div>
      </div>
    </div>
    <div class="nav-section"><div class="nav-section-label">Merchant</div>
      <a class="nav-item" href="home.html"><span class="nav-icon">🏪</span>My Stores</a>
      <a class="nav-item" href="products.html"><span class="nav-icon">📦</span>Products</a>
      <a class="nav-item active" href="categories.html"><span class="nav-icon">🗂️</span>Categories</a>
      <a class="nav-item" href="orders.html"><span class="nav-icon">📋</span>Orders</a>
      <a class="nav-item" href="coupons.html"><span class="nav-icon">🎟️</span>Coupons</a>
      <a class="nav-item" href="payments.html"><span class="nav-icon">💳</span>Payments</a>
    <a class="nav-item" href="analytics.html"><span class="nav-icon">📊</span>Analytics</a>
      <a class="nav-item" href="marketing.html"><span class="nav-icon">📣</span>Marketing</a>
    </div><div class="nav-section"><div class="nav-section-label">AI Tools</div>
      <a class="nav-item" href="ai-assistant.html"><span class="nav-icon">🤖</span>AI Assistant</a>
    </div>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logout()">↩ Logout</button>
    </div>
  </div>
  <div class="main-wrap">
    <div class="topbar">
      <div class="topbar-left"><span class="topbar-title">Categories</span></div>
      <div class="topbar-right">
          <div class="store-select-wrap" id="store-select-wrap"><span class="store-select-label">Store</span><select class="store-selector" id="store-selector"></select></div>
        <div id="topbar-actions"></div>
      </div>
    </div>
    <div id="page-content" class="content page-enter" style="display:none;"></div>
  </div>
<script>
let allCategories = [], currentStoreId = ''

window.addEventListener('DOMContentLoaded', async () => {
  const nav = await renderNav('categories', (id) => { currentStoreId = id; loadCategories() })
  if (!nav) return
  currentStoreId = nav.currentStoreId
  if (currentStoreId) await loadCategories()
  else renderEmpty()
})

async function loadCategories() {
  if (!currentStoreId) return
  document.getElementById('page-content').innerHTML = '<div class="spinner"></div>'
  try {
    allCategories = await apiFetch(`/stores/${currentStoreId}/categories`)
    renderPage()
  } catch (e) { toast(e.message, 'error') }
}

function renderPage() {
  const content = document.getElementById('page-content')
  content.innerHTML = `
    <div class="section-card" style="padding:20px;">
      <div class="section-card-header" style="padding:0 0 16px;border-bottom:1px solid var(--border);margin-bottom:0;">
        <span class="section-card-title">Categories <span style="color:var(--text3);font-weight:400;">(${allCategories.length})</span></span>
      </div>
      <div style="padding-top:16px;">
        <div class="add-row">
          <input type="text" id="catNewName" placeholder="New category name..." onkeydown="if(event.key==='Enter')createCategory()">
          <button class="btn btn-primary" onclick="createCategory()">+ Add</button>
        </div>
        <div class="field-hint" style="margin-bottom:16px;">Press Enter or click Add to create a category</div>
      </div>
    </div>
    <div class="cats-grid" id="catsGrid"></div>`
  renderCategories()
}

function renderCategories() {
  const grid = document.getElementById('catsGrid'); if (!grid) return
  if (!allCategories.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🗂️</div><h3>No categories yet</h3><p>Add categories to organize your products</p></div>`
    return
  }
  grid.innerHTML = allCategories.map(c => `
    <div class="cat-card">
      <div>
        <div class="cat-name">🗂️ ${c.name}</div>
        <div class="cat-slug">${c.slug}</div>
      </div>
      <button class="cat-delete" onclick="deleteCategory('${c._id}','${c.name.replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('')
}

async function createCategory() {
  if (!currentStoreId) return toast('Select a store first', 'error')
  const input = document.getElementById('catNewName')
  const name = input.value.trim()
  if (!name) return toast('Enter a category name', 'error')
  try {
    await apiFetch(`/stores/${currentStoreId}/categories`, { method: 'POST', body: JSON.stringify({ name }) })
    input.value = ''
    await loadCategories()
    toast('Category added!', 'success')
  } catch (e) { toast(e.message, 'error') }
}

async function deleteCategory(id, name) {
  if (!confirm(`Delete category "${name}"?`)) return
  try {
    await apiFetch(`/stores/${currentStoreId}/categories/${id}`, { method: 'DELETE', body: '{}' })
    await loadCategories()
    toast('Category deleted')
  } catch (e) { toast(e.message, 'error') }
}

function renderEmpty() {
  document.getElementById('page-content').innerHTML = `<div class="empty-state"><div class="empty-icon">🗂️</div><h3>No store selected</h3><p>Select a store from the top bar</p></div>`
}
</script>
</body>
</html>
</html>

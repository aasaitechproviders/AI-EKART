<!DOCTYPE html>
<html lang="en" style="background:#09090f">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKart — Website Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════════════════════ */
:root {
  --bg:       #09090f;
  --surface:  #0e0e17;
  --surface2: #13131e;
  --surface3: #181826;
  --border:   rgba(255,255,255,.06);
  --border2:  rgba(255,255,255,.1);
  --border3:  rgba(255,255,255,.16);
  --accent:   #5b5cf6;
  --accent2:  #818cf8;
  --accent3:  #312e81;
  --green:    #22c55e;
  --amber:    #f59e0b;
  --red:      #ef4444;
  --text:     #f1f5f9;
  --text2:    #94a3b8;
  --text3:    #475569;
  --radius:   10px;
  --sidebar-w: 280px;
  --topbar-h:  52px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════ */
#topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  flex-shrink: 0;
  z-index: 200;
}

.tb-logo {
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -.04em;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 2px;
  padding-right: 12px;
  border-right: 1px solid var(--border2);
  margin-right: 4px;
}
.tb-logo em { color: var(--accent2); font-style: normal; }

.tb-store-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 5px 10px 5px 8px;
  cursor: pointer;
  transition: all .15s;
  min-width: 0;
}
.tb-store-pill:hover { border-color: var(--accent); }
.tb-store-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(34,197,94,.6);
}
.tb-store-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 140px;
}
.tb-store-chevron { color: var(--text3); font-size: 10px; flex-shrink: 0; }

.tb-page-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
}
.tb-page-label::before { content: '/'; color: var(--border3); }

.tb-spacer { flex: 1; }

.tb-unsaved {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--amber);
  background: rgba(245,158,11,.08);
  border: 1px solid rgba(245,158,11,.2);
  padding: 4px 10px;
  border-radius: 6px;
  opacity: 0;
  transition: opacity .3s;
}
.tb-unsaved.show { opacity: 1; }

.tb-device-group {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.tb-device-btn {
  padding: 6px 10px;
  border: none;
  background: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  transition: all .15s;
  line-height: 1;
}
.tb-device-btn.active {
  background: var(--surface3);
  color: var(--accent2);
}

.tb-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: all .15s;
  white-space: nowrap;
}
.tb-btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
}
.tb-btn-ghost:hover { border-color: var(--border3); color: var(--text); }
.tb-btn-primary {
  background: var(--accent);
  color: white;
}
.tb-btn-primary:hover { background: #4f4de0; box-shadow: 0 4px 16px rgba(91,92,246,.4); }
.tb-btn-primary:disabled { opacity: .5; cursor: not-allowed; }

/* ═══════════════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════════════ */
#builder-wrap {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════
   LEFT PANEL
═══════════════════════════════════════════════════════ */
#left-panel {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .25s;
}

/* Panel header with tabs */
.panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}
.panel-tab {
  flex: 1;
  padding: 12px 4px;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: .02em;
  color: var(--text3);
  cursor: pointer;
  text-align: center;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  user-select: none;
}
.panel-tab.active {
  color: var(--accent2);
  border-bottom-color: var(--accent);
  background: rgba(91,92,246,.04);
}
.panel-tab:hover:not(.active) { color: var(--text2); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── Sections Panel ── */
.sections-panel { padding: 12px; }

.panel-group-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 8px 4px 6px;
  display: block;
}

.section-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s;
  margin-bottom: 2px;
  border: 1.5px solid transparent;
  position: relative;
}
.section-row:hover { background: var(--surface2); }
.section-row.active {
  background: rgba(91,92,246,.08);
  border-color: rgba(91,92,246,.25);
}

.section-drag {
  color: var(--text3);
  font-size: 12px;
  cursor: grab;
  padding: 2px;
  opacity: 0;
  transition: opacity .15s;
  flex-shrink: 0;
}
.section-row:hover .section-drag { opacity: 1; }

.section-icon-wrap {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  transition: background .15s;
}
.section-row.active .section-icon-wrap {
  background: rgba(91,92,246,.15);
}
.section-row-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.section-row.active .section-row-label { color: var(--text); }

.section-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  opacity: 0;
  transition: opacity .15s;
  flex-shrink: 0;
}
.section-row:hover .section-actions { opacity: 1; }
.section-row.active .section-actions { opacity: 1; }

.section-action-btn {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  border: none;
  background: var(--surface3);
  color: var(--text3);
  cursor: pointer;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .12s;
}
.section-action-btn:hover { background: var(--border2); color: var(--text); }
.section-action-btn.danger:hover { background: rgba(239,68,68,.15); color: var(--red); }

.section-toggle {
  width: 28px;
  height: 16px;
  border-radius: 8px;
  background: var(--border2);
  border: none;
  cursor: pointer;
  position: relative;
  transition: background .15s;
  flex-shrink: 0;
}
.section-toggle.on { background: var(--accent); }
.section-toggle::after {
  content: '';
  position: absolute;
  width: 11px; height: 11px;
  background: white;
  border-radius: 50%;
  top: 2.5px; left: 2.5px;
  transition: left .15s;
}
.section-toggle.on::after { left: 14.5px; }

/* Add section block */
.add-section-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1.5px dashed var(--border2);
  cursor: pointer;
  transition: all .15s;
  color: var(--text3);
  font-size: 13px;
  font-weight: 600;
  margin-top: 6px;
}
.add-section-row:hover {
  border-color: var(--accent);
  color: var(--accent2);
  background: rgba(91,92,246,.04);
}

/* ── Section Editor (slides in) ── */
.editor-panel { padding: 0; display: flex; flex-direction: column; height: 100%; }
.editor-panel-header {
  padding: 14px 14px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.editor-back-btn {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: all .12s;
  flex-shrink: 0;
}
.editor-back-btn:hover { border-color: var(--border3); color: var(--text); }
.editor-panel-title {
  font-size: 13.5px;
  font-weight: 800;
  color: var(--text);
  flex: 1;
}
.editor-panel-icon { font-size: 16px; }

.editor-fields { flex: 1; overflow-y: auto; padding: 14px; }
.editor-fields::-webkit-scrollbar { width: 3px; }
.editor-fields::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.field-group {
  margin-bottom: 20px;
}
.field-group-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: block;
}

.field-row { margin-bottom: 12px; }
.field-label {
  font-size: 11.5px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.field-hint { font-size: 10px; font-weight: 500; color: var(--text3); }

.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 8px 11px;
  font-size: 13px;
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none;
  transition: border-color .15s;
  resize: vertical;
}
.field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,92,246,.1); }
.field-input::placeholder { color: var(--text3); }

.field-textarea { min-height: 72px; line-height: 1.5; }

.field-color-row { display: flex; gap: 8px; align-items: center; }
.field-color-swatch {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1.5px solid var(--border2);
  cursor: pointer;
  flex-shrink: 0;
  overflow: hidden;
  padding: 2px;
  background: var(--surface2);
}
.field-color-swatch input[type=color] {
  width: 100%; height: 100%;
  border: none;
  cursor: pointer;
  background: none;
  outline: none;
  border-radius: 5px;
}

.field-select {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 8px 11px;
  font-size: 13px;
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  padding-right: 28px;
}
.field-select:focus { border-color: var(--accent); }
.field-select option { background: var(--surface2); }

.field-range-wrap { display: flex; align-items: center; gap: 10px; }
.field-range {
  flex: 1;
  accent-color: var(--accent);
  height: 4px;
  cursor: pointer;
}
.field-range-val {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  min-width: 32px;
  text-align: right;
  font-family: 'DM Mono', monospace;
}

.color-palette { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
.color-dot {
  width: 20px; height: 20px;
  border-radius: 5px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform .12s;
}
.color-dot:hover { transform: scale(1.15); }
.color-dot.active { border-color: white; box-shadow: 0 0 0 2px var(--accent); }

.font-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.font-opt {
  padding: 8px 10px;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text2);
  text-align: center;
  transition: all .12s;
  font-weight: 600;
}
.font-opt.active, .font-opt:hover {
  border-color: var(--accent);
  color: var(--accent2);
  background: rgba(91,92,246,.06);
}

/* Editor footer */
.editor-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.ef-btn {
  flex: 1;
  padding: 9px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: all .15s;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.ef-btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1.5px solid var(--border2);
}
.ef-btn-ghost:hover { color: var(--text); border-color: var(--border3); }
.ef-btn-primary { background: var(--accent); color: white; }
.ef-btn-primary:hover { background: #4f4de0; }

/* ── Themes Panel ── */
.themes-panel { padding: 12px; }
.theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.theme-card {
  border: 2px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.theme-card:hover { border-color: rgba(91,92,246,.4); transform: translateY(-1px); }
.theme-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(91,92,246,.15);
}
.theme-check {
  position: absolute;
  top: 6px; right: 6px;
  width: 18px; height: 18px;
  background: var(--accent);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: white;
  font-weight: 700;
  z-index: 2;
}
.theme-card.active .theme-check { display: flex; }
.theme-preview { height: 72px; overflow: hidden; position: relative; }
.theme-name {
  padding: 6px 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  background: var(--surface2);
  border-top: 1px solid var(--border);
}
.themes-browse-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
  padding: 11px;
  background: rgba(91,92,246,.06);
  border: 1.5px dashed rgba(91,92,246,.3);
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent2);
  transition: all .15s;
}
.themes-browse-btn:hover { background: rgba(91,92,246,.1); border-color: rgba(91,92,246,.5); }

/* ── Settings Panel ── */
.settings-panel { padding: 14px; }

/* ═══════════════════════════════════════════════════════
   CENTER PREVIEW
═══════════════════════════════════════════════════════ */
#center-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #111118;
  overflow: hidden;
  position: relative;
}

.preview-bar {
  height: 40px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
}
.preview-url {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 5px 12px;
  max-width: 460px;
  margin: 0 auto;
}
.preview-url-lock { font-size: 11px; color: var(--green); }
.preview-url-text {
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.preview-refresh {
  background: none; border: none;
  color: var(--text3); font-size: 13px;
  cursor: pointer; padding: 2px 4px;
  border-radius: 4px; transition: all .12s;
  margin-left: auto;
}
.preview-refresh:hover { color: var(--text); background: var(--surface2); }

.preview-canvas {
  flex: 1;
  overflow: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
}
.preview-canvas::-webkit-scrollbar { width: 5px; height: 5px; }
.preview-canvas::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.device-shell {
  background: white;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  transition: all .3s ease;
  flex-shrink: 0;
}
.device-shell.desktop { width: 100%; max-width: 1100px; }
.device-shell.tablet {
  width: 768px;
  border-radius: 14px;
  border: 10px solid #1a1c2e;
  box-shadow: 0 0 0 1px var(--border), 0 30px 60px rgba(0,0,0,.7);
}
.device-shell.mobile {
  width: 375px;
  border-radius: 32px;
  border: 10px solid #1a1c2e;
  box-shadow: 0 0 0 1px var(--border), 0 30px 60px rgba(0,0,0,.7);
}
.device-shell iframe {
  display: block;
  width: 100%;
  border: none;
}

/* Click-highlight overlay for sections */
.section-overlay {
  position: absolute;
  border: 2px solid var(--accent);
  border-radius: 4px;
  pointer-events: none;
  z-index: 100;
  transition: all .15s;
  opacity: 0;
}
.section-overlay.visible { opacity: 1; }
.section-overlay-label {
  position: absolute;
  top: -24px;
  left: -1px;
  background: var(--accent);
  color: white;
  font-size: 10.5px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px 4px 0 0;
  white-space: nowrap;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

/* ═══════════════════════════════════════════════════════
   ADD SECTION DRAWER
═══════════════════════════════════════════════════════ */
.add-section-drawer {
  position: fixed;
  bottom: 0;
  left: var(--sidebar-w);
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border2);
  padding: 20px 28px 28px;
  z-index: 300;
  transform: translateY(100%);
  transition: transform .25s cubic-bezier(.2,.8,.2,1);
  box-shadow: 0 -20px 60px rgba(0,0,0,.5);
}
.add-section-drawer.open { transform: translateY(0); }
.add-section-drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.add-section-drawer-title { font-size: 15px; font-weight: 800; color: var(--text); }
.add-section-drawer-close {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;

window.addEventListener('DOMContentLoaded', async () => {
  setLoading('Authenticating…', 15)
  const token = new URLSearchParams(location.search).get('token')
  if (token) { localStorage.setItem('ekart_token', token); history.replaceState({}, '', '/website-builder.html') }

  const t = localStorage.getItem('ekart_token')
  if (!t) { window.location = '/'; return }

  try {
    setLoading('Loading user…', 30)
    const user = await api('/auth/me')
    currentUser = user

    setLoading('Fetching stores…', 55)
    const stores = await api('/stores')
    allStores = stores || []

    currentStoreId = localStorage.getItem('ekart_store_id')
    if (!currentStoreId || !allStores.find(s => s._id === currentStoreId)) {
      currentStoreId = allStores[0]?._id || null
    }

    setLoading('Building UI…', 75)
    renderStorePill()
    renderStoreDropdown()
    renderThemesGrid()
    renderSettingsPanel()
    renderAddSectionTypes()

    setLoading('Loading theme…', 90)
    await loadThemeForStore(currentStoreId)

    setLoading('Ready!', 100)
    setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 400)

  } catch (e) {
    console.error(e)
    if (e.message?.includes('401') || e.message?.includes('Unauthorized')) {
      window.location = '/'
    } else {
      toast('Failed to load: ' + e.message, 'error')
      document.getElementById('loading-overlay').classList.add('hidden')
    }
  }
})

/* ════════════════════════════════════════════════════
   API
════════════════════════════════════════════════════ */
async function api(path, opts = {}) {
  const token = localStorage.getItem('ekart_token')
  const res = await fetch(path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...(opts.headers || {})
    }
  })
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }))
    throw new Error(err.error || res.statusText)
  }
  return res.json()
}

   LOAD / SAVE THEME
════════════════════════════════════════════════════ */
async function loadThemeForStore(storeId) {
  if (!storeId) {
    sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS))
    renderSectionsList()
    renderPreview()
    return
  }
  try {
    const data = await api(`/stores/${storeId}/theme`)
    const themeDoc = data.draft || data.published || null
    applyThemeFromBackend(themeDoc)
  } catch (e) {
    console.warn('No theme found, using defaults')
    sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS))
    themeData = { ...THEMES[0].settings, themeId: 'modern', announcementText: '✨ Free shipping on orders over ₹999!', footerText: '© 2025 My Store.' }
  }
  renderSectionsList()
  renderPreview()
  markThemeActive(themeData.themeId || 'modern')
  markUnsaved(false)
}

function applyThemeFromBackend(doc) {
  if (!doc) {
    sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS))
    return
  }
  const s = doc.settings || {}
  themeData = {
    themeId:          s.themeId       || 'modern',
    primaryColor:     s.primary_color  || '#5b5cf6',
    bgColor:          s.secondary_color || '#09090f',
    textColor:        s.accent_color   || '#f1f5f9',
    cardBg:           s.card_bg        || '#13131e',
    navBg:            s.nav_bg         || '#0e0e17',
    font:             s.font_heading   || 'Outfit',
    cols:             String(s.cols    || 3),
    radius:           s.radius         || '12px',
    btnStyle:         s.button_style   || 'rounded',
    announcementText: s.announcement_bar?.text || '✨ Free shipping on orders over ₹999!',
    footerText:       s.footer_text    || '© 2025 My Store.',
  }
  if (doc.sections && doc.sections.length) {
    sections = doc.sections.map(bs => {
      const def = DEFAULT_SECTIONS.find(d => d.type === bs.type)
      return {
        id:      bs.id || `sec_${bs.type}_${Date.now()}`,
        type:    bs.type,
        enabled: bs.is_visible !== false,
        data:    bs.settings || def?.data || {}
      }
    })
    DEFAULT_SECTIONS.forEach(def => {
      if (!sections.find(s => s.type === def.type)) {
        sections.push({ ...JSON.parse(JSON.stringify(def)), enabled: false })
      }
    })
  } else {
    sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS))
  }
}

function buildBackendPayload() {
  return {
    settings: {
      themeId:          themeData.themeId,
      primary_color:    themeData.primaryColor,
      secondary_color:  themeData.bgColor,
      accent_color:     themeData.textColor,
      card_bg:          themeData.cardBg,
      nav_bg:           themeData.navBg,
      font_heading:     themeData.font,
      font_body:        themeData.font,
      cols:             parseInt(themeData.cols) || 3,
      radius:           themeData.radius,
      button_style:     themeData.btnStyle,
      footer_text:      themeData.footerText,
      announcement_bar: {
        enabled:    sections.find(s => s.type === 'announcement')?.enabled || false,
        text:       themeData.announcementText,
        bg_color:   themeData.primaryColor,
        text_color: '#ffffff'
      }
    },
    sections: sections.map((s, i) => ({
      id:         s.id,
      type:       s.type,
      order:      i + 1,
      is_visible: s.enabled,
      settings:   s.data || {}
    }))
  }
}

async function saveAndPublish() {
  if (!currentStoreId) { toast('Please select a store first', 'error'); return }
  const btn = document.getElementById('save-btn')
  btn.disabled = true
  btn.innerHTML = '<span>⌛</span> Saving…'
  try {
    const payload = buildBackendPayload()
    await api(`/stores/${currentStoreId}/theme/settings`, {
      method: 'PUT',
      body: JSON.stringify(payload.settings)
    })
    await api(`/stores/${currentStoreId}/theme/sections`, {
      method: 'PUT',
      body: JSON.stringify({ sections: payload.sections })
    })
    await api(`/stores/${currentStoreId}/theme/publish`, { method: 'POST' })
    markUnsaved(false)
    toast('Theme saved & published! 🚀', 'success')
  } catch (e) {
    toast('Save failed: ' + e.message, 'error')
  } finally {
    btn.disabled = false
    btn.innerHTML = '<span>💾</span> Save & Publish'
  }
}

function renderSectionsList() {
  const wrap = document.getElementById('sections-list-wrap')
  const enabledSections  = sections.filter(s => s.enabled)
  const disabledSections = sections.filter(s => !s.enabled)

  let html = `<span class="panel-group-label">Active Sections</span>`

  if (enabledSections.length === 0) {
    html += `<div style="padding:20px 10px;text-align:center;color:var(--text3);font-size:12px;">No active sections</div>`
  }

  enabledSections.forEach((s, i) => {
    const def = SECTION_DEFS[s.type] || { icon:'📦', label: s.type }
    const isActive = activeSectionId === s.id
    const idx = sections.indexOf(s)
    html += renderSectionRow(s, def, idx, isActive, true)
  })

  html += `
  <div class="add-section-row" onclick="openAddDrawer()">
    <span>＋</span> Add Section
  </div>`

  if (disabledSections.length > 0) {
    html += `<span class="panel-group-label" style="margin-top:16px;">Hidden Sections</span>`
    disabledSections.forEach(s => {
      const def = SECTION_DEFS[s.type] || { icon:'📦', label: s.type }
      const idx = sections.indexOf(s)
      html += renderSectionRow(s, def, idx, false, false)
    })
  }

  wrap.innerHTML = html
  initDragDrop()
}

function renderSectionRow(s, def, idx, isActive, isEnabled) {
  return `
  <div class="section-row ${isActive ? 'active' : ''}" id="srow_${s.id}"
       draggable="true"
       data-idx="${idx}"
       onclick="selectSection('${s.id}')">
    <span class="section-drag" title="Drag to reorder">⠿</span>
    <div class="section-icon-wrap">${def.icon}</div>
    <span class="section-row-label">${def.label}</span>
    <div class="section-actions">
      <button class="section-action-btn" onclick="event.stopPropagation();openSectionEditor('${s.id}')" title="Edit">✏️</button>
      <button class="section-action-btn danger" onclick="event.stopPropagation();removeSection('${s.id}')" title="Remove">🗑</button>
    </div>
    <button class="section-toggle ${isEnabled ? 'on' : ''}"
            onclick="event.stopPropagation();toggleSection('${s.id}')"
            title="${isEnabled ? 'Hide section' : 'Show section'}"></button>
  </div>`
}

function selectSection(id) {
  activeSectionId = id
  renderSectionsList()
  highlightSectionInPreview(id)
  // Auto-open editor
  openSectionEditor(id)
}

function toggleSection(id) {
  const s = sections.find(x => x.id === id)
  if (s) { s.enabled = !s.enabled; markUnsaved(true); renderSectionsList(); renderPreview() }
}

function removeSection(id) {
  const idx = sections.findIndex(x => x.id === id)
  if (idx > -1) {
    sections.splice(idx, 1)
    if (activeSectionId === id) {
      activeSectionId = null
      showSectionsListView()
    }
    markUnsaved(true)
    renderSectionsList()
    renderPreview()
    toast('Section removed', 'success')
  }
}

function openSectionEditor(id) {
  const s = sections.find(x => x.id === id)
  if (!s) return
  activeSectionId = id
  const def = SECTION_DEFS[s.type] || { icon:'📦', label: s.type, fields: [] }

  const panelBody = document.getElementById('tab-sections')
  panelBody.innerHTML = `

    <div class="editor-panel-header">
      <button class="editor-back-btn" onclick="showSectionsListView()">←</button>

    <div class="editor-footer">

function renderEditorFields(fields, data) {
  if (!fields || fields.length === 0) {
    return `<div style="padding:30px 16px;text-align:center;color:var(--text3);">
      <div style="font-size:28px;margin-bottom:10px;">🔒</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;">No editable fields</div>
      <div style="font-size:12px;margin-top:6px;line-height:1.6;">Content is automatically pulled from your store data.</div>
    </div>`
  }

  return `<div class="field-group">
    <span class="field-group-label">Section Content</span>
    ${fields.map(f => renderField(f, data[f.key] ?? '')).join('')}
  </div>`
}

function renderField(f, value) {
  const id = `field_${f.key}`
  let input = ''

  if (f.type === 'text' || f.type === 'number') {
    input = `<input type="${f.type}" class="field-input" id="${id}"
      value="${escHtml(String(value))}"
      placeholder="${f.placeholder || ''}"
      ${f.min !== undefined ? `min="${f.min}"` : ''}
      ${f.max !== undefined ? `max="${f.max}"` : ''}
      oninput="liveUpdateField('${f.key}',this.value)">`
  } else if (f.type === 'textarea') {
    input = `<textarea class="field-input field-textarea" id="${id}"
      placeholder="${f.placeholder || ''}"
      oninput="liveUpdateField('${f.key}',this.value)">${escHtml(String(value))}</textarea>`
  } else if (f.type === 'color') {
    input = `<div class="field-color-row">
      <div class="field-color-swatch">
        <input type="color" id="${id}" value="${value || '#5b5cf6'}"
          oninput="liveUpdateField('${f.key}',this.value)">
      </div>
      <input type="text" class="field-input" style="flex:1;"
        value="${value || ''}"
        placeholder="#5b5cf6"
        oninput="document.getElementById('${id}').value=this.value;liveUpdateField('${f.key}',this.value)">
    </div>`
  } else if (f.type === 'select') {
    input = `<select class="field-select" id="${id}" onchange="liveUpdateField('${f.key}',this.value)">
      ${(f.opts || []).map(o => `<option value="${o}" ${value == o ? 'selected' : ''}>${o}</option>`).join('')}
    </select>`
  }

  return `<div class="field-row">
    <div class="field-label">${f.label}</div>
    ${input}
  </div>`
}

function liveUpdateField(key, value) {
  if (!activeSectionId) return
  const s = sections.find(x => x.id === activeSectionId)
  if (!s) return
  s.data[key] = value
  markUnsaved(true)
  renderPreview()
}

function applySectionChanges(id) {
  toast('Changes applied', 'success')
  markUnsaved(true)
  renderPreview()
}

function resetSectionData(id) {
  const s = sections.find(x => x.id === id)
  if (!s) return
  const def = DEFAULT_SECTIONS.find(d => d.type === s.type)
  if (def) { s.data = { ...def.data }; openSectionEditor(id); renderPreview(); markUnsaved(true) }
}

function renderAddSectionTypes() {
  document.getElementById('add-section-types').innerHTML = ADD_SECTION_TYPES.map(t => `
    <div class="add-section-type" onclick="addSection('${t.type}','${t.name}','${t.icon}')">
      <span class="add-section-type-icon">${t.icon}</span>
      <span class="add-section-type-name">${t.name}</span>
    </div>
  `).join('')
}

function openAddDrawer() {
  document.getElementById('add-section-drawer').classList.add('open')
}
function closeAddDrawer() {
  document.getElementById('add-section-drawer').classList.remove('open')
}

function addSection(type, name, icon) {
  const existing = sections.find(s => s.type === type && !s.enabled)
  if (existing) {
    existing.enabled = true
    toast(`"${name}" section enabled`, 'success')
  } else {
    const def = DEFAULT_SECTIONS.find(d => d.type === type)
    const newSec = {
      id: `sec_${type}_${Date.now()}`,
      type,
      enabled: true,
      data: def ? { ...def.data } : {}
    }
    // Insert before footer
    const footerIdx = sections.findIndex(s => s.type === 'footer')
    if (footerIdx > -1) sections.splice(footerIdx, 0, newSec)
    else sections.push(newSec)
    toast(`"${name}" section added`, 'success')
  }
  closeAddDrawer()
  markUnsaved(true)
  renderSectionsList()
  renderPreview()
}

/* ════════════════════════════════════════════════════
   DRAG & DROP REORDER
════════════════════════════════════════════════════ */
let dragSrcIdx = null

function initDragDrop() {
  document.querySelectorAll('.section-row[draggable]').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragSrcIdx = parseInt(row.dataset.idx)
      row.classList.add('dragging')
    })
    row.addEventListener('dragend', e => {
      row.classList.remove('dragging')
      document.querySelectorAll('.section-row').forEach(r => r.classList.remove('drag-over'))
    })
    row.addEventListener('dragover', e => {
      e.preventDefault()
      document.querySelectorAll('.section-row').forEach(r => r.classList.remove('drag-over'))
      row.classList.add('drag-over')
    })
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'))
    row.addEventListener('drop', e => {
      e.preventDefault()
      const dropIdx = parseInt(row.dataset.idx)
      if (dragSrcIdx === null || dragSrcIdx === dropIdx) return
      const moved = sections.splice(dragSrcIdx, 1)[0]
      sections.splice(dropIdx, 0, moved)
      dragSrcIdx = null
      markUnsaved(true)
      renderSectionsList()
      renderPreview()
    })
  })
}

function setupPreviewClicks(iframe) {
  try {
    const doc = iframe.contentDocument
    if (!doc) return
    // Make all sections clickable
    const sectionEls = doc.querySelectorAll('[data-section-id]')
    sectionEls.forEach(el => {
      el.style.cursor = 'pointer'
      el.style.outline = 'none'
      el.addEventListener('click', () => {
        const secId = el.getAttribute('data-section-id')
        selectSection(secId)
        // Switch to sections tab if not there
        if (activeLeftTab !== 'sections') {
          document.querySelectorAll('.panel-tab')[0].click()
        }
      })
      el.addEventListener('mouseenter', () => {
        el.style.outline = '2px solid rgba(91,92,246,.5)'
        el.style.outlineOffset = '-2px'
      })
      el.addEventListener('mouseleave', () => {
        const activeS = sections.find(s => s.id === activeSectionId)
        if (!activeS || el.getAttribute('data-section-id') !== activeSectionId) {
          el.style.outline = 'none'
        }
      })
    })
  } catch(e) {}
}

function highlightSectionInPreview(id) {
  try {
    const iframe = document.getElementById('preview-iframe')
    const doc = iframe.contentDocument
    if (!doc) return
    doc.querySelectorAll('[data-section-id]').forEach(el => {
      if (el.getAttribute('data-section-id') === id) {
        el.style.outline = '2px solid rgba(91,92,246,.8)'
        el.style.outlineOffset = '-2px'
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
      } else {
        el.style.outline = 'none'
      }
    })
  } catch(e) {}
}

function clearHighlight() {
  try {
    const iframe = document.getElementById('preview-iframe')
    const doc = iframe.contentDocument
    if (!doc) return
    doc.querySelectorAll('[data-section-id]').forEach(el => { el.style.outline = 'none' })
  } catch(e) {}
}

      <section class="trust-section">
        <div class="trust-row">
          ${[
            [d.badge1||'Free Shipping','🚚'],
            [d.badge2||'Secure Payment','🔒'],
            [d.badge3||'Easy Returns','↩️'],
            [d.badge4||'24/7 Support','💬']
          ].map(([label, icon]) => `
          <div class="trust-item">
            <span class="trust-icon">${icon}</span>
            <span class="trust-label">${label}</span>
          </div>`).join('')}
        </div>
      </section>`)

    case 'faq': return wrap(`
      <section class="faq-section">
        <h2 class="section-title">${d.title || 'FAQ'}</h2>
        ${d.q1 ? `<div class="faq-item"><div class="faq-q">${d.q1}</div><div class="faq-a">${d.a1||''}</div></div>` : ''}
        ${d.q2 ? `<div class="faq-item"><div class="faq-q">${d.q2}</div><div class="faq-a">${d.a2||''}</div></div>` : ''}
        ${!d.q1 ? `
        <div class="faq-item"><div class="faq-q">How long does shipping take?</div><div class="faq-a">Typically 3-7 business days across India. Express options available.</div></div>
        <div class="faq-item"><div class="faq-q">What is your return policy?</div><div class="faq-a">Hassle-free 30-day returns. No questions asked.</div></div>
        <div class="faq-item"><div class="faq-q">Do you offer Cash on Delivery?</div><div class="faq-a">Yes! COD available across India on all orders.</div></div>` : ''}
      </section>`)

    default: return ''
  }
}

/* ════════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════════ */
function isLightColor(hex) {
  const c = (hex || '').replace('#','')
  if (c.length !== 6) return true
  const r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16)
  return (r*299+g*587+b*114)/1000 > 128
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function toast(msg, type = 'success') {
  const container = document.getElementById('toast-container')
  const el = document.createElement('div')
  el.className = `toast ${type}`
  el.innerHTML = `
    <span class="toast-icon">${type === 'success' ? '✅' : '❌'}</span>
    <span class="toast-text">${msg}</span>`
  container.appendChild(el)
  requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add('show') }) })
  setTimeout(() => {
    el.classList.remove('show')
    setTimeout(() => el.remove(), 400)
  }, 3000)
}
</script>

<!DOCTYPE html>
<html lang="en" style="background:#09090f">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eKart — Website Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Token extraction (must run before anything else) -->
<script>
;(function(){
  var p=new URLSearchParams(location.search), t=p.get('token');
  if(t){ localStorage.setItem('ekart_token',t); history.replaceState({},'','/website-builder.html'); }
})();
</script>
<!-- api.js provides apiFetch() with auth headers + base URL handling -->
<script src="api.js"></script>

<style>
/* ═══════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════ */
:root {
  --bg:        #09090f;
  --surface:   #0e0e17;
  --surface2:  #13131e;
  --surface3:  #181826;
  --border:    rgba(255,255,255,.06);
  --border2:   rgba(255,255,255,.10);
  --border3:   rgba(255,255,255,.16);
  --accent:    #5b5cf6;
  --accent2:   #818cf8;
  --green:     #22c55e;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --text:      #f1f5f9;
  --text2:     #94a3b8;
  --text3:     #475569;
  --panel-w:   280px;
  --topbar-h:  52px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ═══════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════ */
#topbar {
  height:var(--topbar-h);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:8px;
  flex-shrink:0;
  z-index:200;
  position:relative;
}
.tb-logo {
  font-family:'Outfit',sans-serif;
  font-size:18px;
  font-weight:900;
  color:var(--text);
  letter-spacing:-.04em;
  text-decoration:none;
  display:flex;
  align-items:center;
  padding-right:12px;
  border-right:1px solid var(--border2);
  margin-right:4px;
  flex-shrink:0;
}
.tb-logo em { color:var(--accent2); font-style:normal; }

.tb-store-pill {
  display:flex;
  align-items:center;
  gap:7px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:5px 10px 5px 8px;
  cursor:pointer;
  transition:all .15s;
  min-width:0;
  flex-shrink:0;
}
.tb-store-pill:hover { border-color:var(--accent); }
.tb-store-dot {
  width:7px; height:7px;
  border-radius:50%;
  background:var(--green);
  flex-shrink:0;
  box-shadow:0 0 6px rgba(34,197,94,.6);
}
.tb-store-name {
  font-size:13px; font-weight:700;
  color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:130px;
}
.tb-store-chevron { color:var(--text3); font-size:10px; flex-shrink:0; }

.tb-page-label {
  font-size:12px; font-weight:600; color:var(--text3);
  display:flex; align-items:center; gap:5px;
}
.tb-page-label::before { content:'/'; color:var(--border3); }

.tb-spacer { flex:1; }

.tb-unsaved {
  display:flex; align-items:center; gap:6px;
  font-size:11.5px; font-weight:600; color:var(--amber);
  background:rgba(245,158,11,.08);
  border:1px solid rgba(245,158,11,.2);
  padding:4px 10px; border-radius:6px;
  opacity:0; transition:opacity .3s;
  white-space:nowrap;
}
.tb-unsaved.show { opacity:1; }

.tb-device-group {
  display:flex;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px; overflow:hidden;
  flex-shrink:0;
}
.tb-device-btn {
  padding:6px 10px; border:none; background:none;
  color:var(--text3); cursor:pointer; font-size:14px;
  transition:all .15s; line-height:1;
}
.tb-device-btn.active { background:var(--surface3); color:var(--accent2); }

.tb-btn {
  display:flex; align-items:center; gap:6px;
  padding:7px 13px; border-radius:8px;
  font-size:12.5px; font-weight:700;
  cursor:pointer; border:none;
  font-family:'Plus Jakarta Sans',sans-serif;
  transition:all .15s; white-space:nowrap; flex-shrink:0;
}
.tb-btn-ghost {
  background:transparent; color:var(--text2);
  border:1px solid var(--border2);
}
.tb-btn-ghost:hover { border-color:var(--border3); color:var(--text); }
.tb-btn-accent {
  background:rgba(91,92,246,.12);
  color:var(--accent2);
  border:1px solid rgba(91,92,246,.3);
}
.tb-btn-accent:hover { background:rgba(91,92,246,.2); border-color:rgba(91,92,246,.5); }
.tb-btn-primary { background:var(--accent); color:white; }
.tb-btn-primary:hover { background:#4f4de0; box-shadow:0 4px 16px rgba(91,92,246,.4); }
.tb-btn-primary:disabled { opacity:.5; cursor:not-allowed; }

/* ── Store Dropdown ── */
.store-dropdown {
  position:absolute;
  top:calc(var(--topbar-h) + 4px);
  left:86px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:6px; z-index:600;
  min-width:200px;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  display:none;
}
.store-dropdown.open { display:block; }
.store-dropdown-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 10px; border-radius:7px;
  cursor:pointer; transition:background .12s;
  font-size:13px; font-weight:600; color:var(--text2);
}
.store-dropdown-item:hover { background:var(--surface3); color:var(--text); }
.store-dropdown-item.active { color:var(--accent2); }
.store-dropdown-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--green); flex-shrink:0;
}
.store-dropdown-sep {
  border:none; border-top:1px solid var(--border);
  margin:4px 0;
}

/* ═══════════════════════════════════════════════════════
   BUILDER LAYOUT
═══════════════════════════════════════════════════════ */
#builder-wrap {
  display:flex; flex:1; overflow:hidden;
}

/* ═══════════════════════════════════════════════════════
   LEFT PANEL
═══════════════════════════════════════════════════════ */
#left-panel {
  width:var(--panel-w); min-width:var(--panel-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.panel-tabs {
  display:flex; border-bottom:1px solid var(--border);
  flex-shrink:0; background:var(--surface);
}
.panel-tab {
  flex:1; padding:12px 4px;
  font-size:11.5px; font-weight:700;
  letter-spacing:.02em; color:var(--text3);
  cursor:pointer; text-align:center;
  border-bottom:2px solid transparent;
  transition:all .15s; user-select:none;
}
.panel-tab.active {
  color:var(--accent2);
  border-bottom-color:var(--accent);
  background:rgba(91,92,246,.04);
}
.panel-tab:hover:not(.active) { color:var(--text2); }

.panel-body {
  flex:1; overflow-y:auto; overflow-x:hidden;
}
.panel-body::-webkit-scrollbar { width:3px; }
.panel-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── Group labels ── */
.panel-group-label {
  font-size:10px; font-weight:800;
  letter-spacing:.12em; text-transform:uppercase;
  color:var(--text3); padding:10px 4px 6px;
  display:block;
}

/* ── Section Rows ── */
.sections-panel { padding:12px; }
.section-row {
  display:flex; align-items:center; gap:7px;
  padding:8px 9px; border-radius:8px;
  cursor:pointer; transition:all .15s;
  margin-bottom:2px;
  border:1.5px solid transparent;
}
.section-row:hover { background:var(--surface2); }
.section-row.active {
  background:rgba(91,92,246,.08);
  border-color:rgba(91,92,246,.25);
}
.section-drag {
  color:var(--text3); font-size:12px;
  cursor:grab; padding:2px;
  opacity:0; transition:opacity .15s; flex-shrink:0;
}
.section-row:hover .section-drag { opacity:1; }
.section-icon-wrap {
  width:28px; height:28px; border-radius:6px;
  background:var(--surface3);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; flex-shrink:0; transition:background .15s;
}
.section-row.active .section-icon-wrap { background:rgba(91,92,246,.18); }
.section-row-label {
  font-size:12.5px; font-weight:600; color:var(--text2);
  flex:1; min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.section-row.active .section-row-label { color:var(--text); }
.section-actions {
  display:flex; align-items:center; gap:3px;
  opacity:0; transition:opacity .15s; flex-shrink:0;
}
.section-row:hover .section-actions,
.section-row.active .section-actions { opacity:1; }
.section-action-btn {
  width:22px; height:22px; border-radius:5px;
  border:none; background:var(--surface3);
  color:var(--text3); cursor:pointer;
  font-size:11px;
  display:flex; align-items:center; justify-content:center;
  transition:all .12s;
}
.section-action-btn:hover { background:var(--border2); color:var(--text); }
.section-action-btn.danger:hover { background:rgba(239,68,68,.15); color:var(--red); }
.section-toggle {
  width:28px; height:16px; border-radius:8px;
  background:var(--border2); border:none;
  cursor:pointer; position:relative;
  transition:background .15s; flex-shrink:0;
}
.section-toggle.on { background:var(--accent); }
.section-toggle::after {
  content:''; position:absolute;
  width:11px; height:11px;
  background:white; border-radius:50%;
  top:2.5px; left:2.5px;
  transition:left .15s;
}
.section-toggle.on::after { left:14.5px; }

.add-section-row {
  display:flex; align-items:center; gap:8px;
  padding:8px 10px; border-radius:8px;
  border:1.5px dashed var(--border2);
  cursor:pointer; transition:all .15s;
  color:var(--text3); font-size:13px; font-weight:600;
  margin-top:6px;
}
.add-section-row:hover {
  border-color:var(--accent); color:var(--accent2);
  background:rgba(91,92,246,.04);
}

/* ── Editor Panel (replaces sections list) ── */
.editor-panel { display:flex; flex-direction:column; height:100%; }
.editor-panel-header {
  padding:12px 12px 10px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:9px;
  flex-shrink:0;
}
.editor-back-btn {
  width:28px; height:28px; border-radius:7px;
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text2); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; transition:all .12s; flex-shrink:0;
}
.editor-back-btn:hover { border-color:var(--border3); color:var(--text); }
.editor-panel-title { font-size:13px; font-weight:800; color:var(--text); flex:1; }
.editor-fields { flex:1; overflow-y:auto; padding:12px; }
.editor-fields::-webkit-scrollbar { width:3px; }
.editor-fields::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.field-group { margin-bottom:18px; }
.field-group-label {
  font-size:10px; font-weight:800;
  letter-spacing:.12em; text-transform:uppercase;
  color:var(--text3); margin-bottom:10px;
  padding-bottom:6px; border-bottom:1px solid var(--border);
  display:block;
}
.field-row { margin-bottom:11px; }
.field-label {
  font-size:11.5px; font-weight:700; color:var(--text2);
  margin-bottom:5px;
  display:flex; align-items:center; justify-content:space-between;
}
.field-hint { font-size:10px; font-weight:500; color:var(--text3); }
.field-input {
  width:100%;
  background:var(--surface2);
  border:1.5px solid var(--border2);
  border-radius:8px;
  padding:8px 10px;
  font-size:12.5px; color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  outline:none; transition:border-color .15s;
  resize:vertical;
}
.field-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,92,246,.1); }
.field-input::placeholder { color:var(--text3); }
.field-textarea { min-height:68px; line-height:1.5; }
.field-color-row { display:flex; gap:8px; align-items:center; }
.field-color-swatch {
  width:36px; height:36px;
  border-radius:8px;
  border:1.5px solid var(--border2);
  cursor:pointer; flex-shrink:0;
  overflow:hidden; padding:2px;
  background:var(--surface2);
}
.field-color-swatch input[type=color] {
  width:100%; height:100%;
  border:none; cursor:pointer;
  background:none; outline:none; border-radius:5px;
}
.field-select {
  width:100%;
  background:var(--surface2);
  border:1.5px solid var(--border2);
  border-radius:8px;
  padding:8px 10px;
  font-size:12.5px; color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  outline:none; cursor:pointer;
  transition:border-color .15s;
  appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:right 10px center;
  padding-right:28px;
}
.field-select:focus { border-color:var(--accent); }
.field-select option { background:var(--surface2); }
.field-range-wrap { display:flex; align-items:center; gap:10px; }
.field-range { flex:1; accent-color:var(--accent); height:4px; cursor:pointer; }
.field-range-val {
  font-size:12px; font-weight:700; color:var(--text2);
  min-width:32px; text-align:right;
  font-family:'DM Mono',monospace;
}
.color-palette { display:flex; gap:5px; flex-wrap:wrap; margin-top:7px; }
.color-dot {
  width:20px; height:20px; border-radius:5px;
  cursor:pointer; border:2px solid transparent; transition:transform .12s;
}
.color-dot:hover { transform:scale(1.15); }
.color-dot.active { border-color:white; box-shadow:0 0 0 2px var(--accent); }
.font-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.font-opt {
  padding:8px 10px;
  background:var(--surface2);
  border:1.5px solid var(--border2);
  border-radius:8px; cursor:pointer;
  font-size:12px; color:var(--text2);
  text-align:center; transition:all .12s; font-weight:600;
}
.font-opt.active,.font-opt:hover {
  border-color:var(--accent); color:var(--accent2);
  background:rgba(91,92,246,.06);
}
.editor-footer {
  padding:10px 12px;
  border-top:1px solid var(--border);
  display:flex; gap:8px; flex-shrink:0;
}
.ef-btn {
  flex:1; padding:9px; border-radius:8px;
  font-size:12.5px; font-weight:700; cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
  transition:all .15s; border:none;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.ef-btn-ghost {
  background:var(--surface2); color:var(--text2);
  border:1.5px solid var(--border2);
}
.ef-btn-ghost:hover { color:var(--text); border-color:var(--border3); }
.ef-btn-primary { background:var(--accent); color:white; }
.ef-btn-primary:hover { background:#4f4de0; }

/* ── Themes Panel ── */
.themes-panel { padding:12px; }
.theme-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.theme-card {
  border:2px solid var(--border);
  border-radius:10px; overflow:hidden;
  cursor:pointer; transition:all .2s; position:relative;
}
.theme-card:hover { border-color:rgba(91,92,246,.4); transform:translateY(-1px); }
.theme-card.active {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(91,92,246,.15);
}
.theme-check {
  position:absolute; top:6px; right:6px;
  width:18px; height:18px; background:var(--accent);
  border-radius:50%; display:none;
  align-items:center; justify-content:center;
  font-size:10px; color:white; font-weight:700; z-index:2;
}
.theme-card.active .theme-check { display:flex; }
.theme-preview { height:72px; overflow:hidden; position:relative; }
.theme-name {
  padding:6px 8px; font-size:11px; font-weight:700;
  color:var(--text2); background:var(--surface2);
  border-top:1px solid var(--border);
}
.themes-browse-cta {
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-top:10px; padding:12px;
  background:rgba(91,92,246,.06);
  border:1.5px dashed rgba(91,92,246,.3);
  border-radius:10px; cursor:pointer;
  font-size:13px; font-weight:700; color:var(--accent2);
  transition:all .15s; text-align:center;
  flex-direction:column;
}
.themes-browse-cta:hover { background:rgba(91,92,246,.1); border-color:rgba(91,92,246,.5); }
.themes-browse-cta-sub { font-size:11px; color:var(--text3); font-weight:600; margin-top:2px; }

/* ── Settings Panel ── */
.settings-panel { padding:14px; }

/* ═══════════════════════════════════════════════════════
   CENTER PREVIEW
═══════════════════════════════════════════════════════ */
#center-panel {
  flex:1; display:flex; flex-direction:column;
  background:#111118; overflow:hidden; position:relative;
}
.preview-bar {
  height:40px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center;
  padding:0 14px; gap:10px; flex-shrink:0;
}
.preview-url {
  flex:1;
  display:flex; align-items:center; gap:8px;
  background:var(--bg);
  border:1px solid var(--border2);
  border-radius:7px;
  padding:5px 12px;
  max-width:460px; margin:0 auto;
}
.preview-url-lock { font-size:11px; color:var(--green); }
.preview-url-text {
  font-size:12px;
  font-family:'DM Mono',monospace;
  color:var(--text3);
  overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; flex:1;
}
.preview-refresh {
  background:none; border:none; color:var(--text3);
  font-size:13px; cursor:pointer; padding:2px 5px;
  border-radius:4px; transition:all .12s; margin-left:auto;
}
.preview-refresh:hover { color:var(--text); background:var(--surface2); }
.preview-canvas {
  flex:1; overflow:auto;
  display:flex; align-items:flex-start; justify-content:center;
  padding:20px;
}
.preview-canvas::-webkit-scrollbar { width:5px; height:5px; }
.preview-canvas::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
.device-shell {
  background:white; border-radius:4px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  transition:all .3s ease; flex-shrink:0;
}
.device-shell.desktop { width:100%; max-width:1100px; }
.device-shell.tablet {
  width:768px; border-radius:14px;
  border:10px solid #1a1c2e;
  box-shadow:0 0 0 1px var(--border),0 30px 60px rgba(0,0,0,.7);
}
.device-shell.mobile {
  width:375px; border-radius:32px;
  border:10px solid #1a1c2e;
  box-shadow:0 0 0 1px var(--border),0 30px 60px rgba(0,0,0,.7);
}
.device-shell iframe { display:block; width:100%; border:none; }

/* ═══════════════════════════════════════════════════════
   ADD SECTION DRAWER (slides up from bottom)
═══════════════════════════════════════════════════════ */
.add-section-drawer {
  position:fixed;
  bottom:0;
  left:var(--panel-w);
  right:0;
  background:var(--surface);
  border-top:1px solid var(--border2);
  padding:18px 24px 24px;
  z-index:300;
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 -20px 60px rgba(0,0,0,.5);
}
.add-section-drawer.open { transform:translateY(0); }
.add-section-drawer-header {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:14px;
}
.add-section-drawer-title { font-size:15px; font-weight:800; color:var(--text); }
.add-section-drawer-close {
  width:28px; height:28px; border-radius:7px;
  border:1px solid var(--border2);
  background:var(--surface2); color:var(--text2);
  cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:all .12s;
}
.add-section-drawer-close:hover { border-color:var(--border3); color:var(--text); }
.add-section-types {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
  gap:9px;
}
.add-section-type {
  display:flex; flex-direction:column;
  align-items:center; gap:7px;
  padding:14px 10px;
  background:var(--surface2);
  border:1.5px solid var(--border2);

/* ════════════════════════════════════════════════════
   LOADING

function setLoading(text, pct) {
  const fill = document.getElementById('loading-fill')
  const txt  = document.getElementById('loading-text')
  if (fill) fill.style.width = pct + '%'
  if (txt)  txt.textContent  = text
}
function hideLoading() {
  setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 400)
}

/* ════════════════════════════════════════════════════
   INIT  — uses apiFetch from api.js
════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  setLoading('Authenticating…', 15)

  // ── Try real auth; fall back to demo ──
  let authOk = false
  const hasToken = !!localStorage.getItem('ekart_token')

  if (hasToken) {
    try {
      setLoading('Loading user…', 30)
      currentUser = await apiFetch('/auth/me')
      authOk = true
    } catch(e) {
      console.warn('Auth check failed, demo mode:', e.message)
    }
  }

  if (authOk) {
    try {
      setLoading('Fetching stores…', 55)
      const storeList = await apiFetch('/stores')
      allStores = Array.isArray(storeList) ? storeList : (storeList?.stores || [])
    } catch(e) {
      console.warn('Store fetch failed:', e.message)
      allStores = []
    }

    currentStoreId = localStorage.getItem('ekart_store_id')
    if (!currentStoreId || !allStores.find(s => s._id === currentStoreId)) {
      currentStoreId = allStores[0]?._id || null
    }
    if (currentStoreId) localStorage.setItem('ekart_store_id', currentStoreId)
  } else {
    // Demo mode
    allStores = [{ _id:'demo', name:'Demo Store', slug:'demo-store' }]
    currentStoreId = 'demo'
    if (!hasToken) toast('No auth token — running in preview mode', 'error')
  }

  setLoading('Building UI…', 75)
  renderStorePill()
  renderStoreDropdown()
  renderThemesGrid()
  renderSettingsPanel()
  renderAddSectionTypes()

  setLoading('Loading theme…', 90)
  if (authOk && currentStoreId && currentStoreId !== 'demo') {
    await loadThemeForStore(currentStoreId)
  } else {
    sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS))
    renderSectionsList()
    renderPreview()
    markThemeActive('modern')
    markUnsaved(false)
  }

  setLoading('Ready!', 100)
  hideLoading()
})

/* ════════════════════════════════════════════════════
   LOAD / SAVE THEME  — uses apiFetch from api.js
════════════════════════════════════════════════════ */
async function loadThemeForStore(storeId) {
  if (!storeId) { useDefaults(); return }
  try {
    const data = await apiFetch(`/stores/${storeId}/theme`)
    const doc = data.draft || data.published || null
    applyThemeFromBackend(doc)
  } catch(e) {
    console.warn('Theme load failed, using defaults:', e.message)
    useDefaults()
  }
  renderSectionsList()
  renderPreview()
  markThemeActive(themeData.themeId || 'modern')
  markUnsaved(false)
}

function useDefaults() {
  sections  = JSON.parse(JSON.stringify(DEFAULT_SECTIONS))
  themeData = { ...THEMES[0].settings, themeId:'modern' }
}

function applyThemeFromBackend(doc) {
  if (!doc) { useDefaults(); return }
  const s = doc.settings || {}
  themeData = {
    themeId:          s.themeId           || 'modern',
    primaryColor:     s.primary_color      || '#5b5cf6',
    bgColor:          s.secondary_color    || '#09090f',
    textColor:        s.accent_color       || '#f1f5f9',
    cardBg:           s.card_bg            || '#13131e',
    navBg:            s.nav_bg             || '#0e0e17',
    font:             s.font_heading       || 'Outfit',
    cols:             String(s.cols || 3),
    radius:           s.radius             || '12px',
    btnStyle:         s.button_style       || 'rounded',
    announcementText: s.announcement_bar?.text || '✨ Free shipping on orders over ₹999!',
    footerText:       s.footer_text        || '© 2025 My Store.',
  }
  if (doc.sections && doc.sections.length) {
    sections = doc.sections.map(bs => {
      // Translate backend type → frontend type (e.g. 'navigation' → 'navbar')
      const frontendType = toFrontendType(bs.type)
      const def = DEFAULT_SECTIONS.find(d => d.type === frontendType)
      return {
        id:      bs.id || `sec_${frontendType}_${Date.now()}`,
        type:    frontendType,
        enabled: bs.is_visible !== false,
        data:    bs.settings || def?.data || {}
      }
    })
    // Ensure all default section types exist (even if disabled)
    DEFAULT_SECTIONS.forEach(def => {
      if (!sections.find(s => s.type === def.type)) {
        sections.push({ ...JSON.parse(JSON.stringify(def)), enabled:false })
      }
    })
  } else {
    sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS))
  }
}

// Maps our internal frontend type names → backend-accepted type names.
// The backend was rejecting 'navbar', 'categories', 'trustbadges', etc.
// Inspect your API's allowed enum; extend this map if needed.
const BACKEND_TYPE_MAP = {
  navbar:       'navigation',
  categories:   'category_grid',
  trustbadges:  'trust_badges',
  featured:     'featured_products',
  newsletter:   'newsletter_signup',
  announcement: 'announcement_bar',
  // pass-through types (already match backend names)
  hero:         'hero',
  banner:       'banner',
  testimonials: 'testimonials',
  footer:       'footer',
  video:        'video',
  countdown:    'countdown',
  gallery:      'gallery',
  faq:          'faq',
}

// Reverse map: backend type → our frontend type (used when loading)
const FRONTEND_TYPE_MAP = Object.fromEntries(
  Object.entries(BACKEND_TYPE_MAP).map(([k, v]) => [v, k])
)

function toBackendType(frontendType) {
  return BACKEND_TYPE_MAP[frontendType] || frontendType
}

function toFrontendType(backendType) {
  return FRONTEND_TYPE_MAP[backendType] || backendType
}

function buildBackendPayload() {
  return {
    settings: {
      themeId:          themeData.themeId,
      primary_color:    themeData.primaryColor,
      secondary_color:  themeData.bgColor,
      accent_color:     themeData.textColor,
      card_bg:          themeData.cardBg,
      nav_bg:           themeData.navBg,
      font_heading:     themeData.font,
      font_body:        themeData.font,
      cols:             parseInt(themeData.cols) || 3,
      radius:           themeData.radius,
      button_style:     themeData.btnStyle,
      footer_text:      themeData.footerText,
      announcement_bar: {
        enabled:    sections.find(s => s.type === 'announcement')?.enabled || false,
        text:       themeData.announcementText,
        bg_color:   themeData.primaryColor,
        text_color: '#ffffff'
      }
    },
    sections: sections.map((s, i) => ({
      id:         s.id,
      type:       toBackendType(s.type),   // ← translate to backend enum
      order:      i + 1,
      is_visible: s.enabled,
      settings:   s.data || {}
    }))
  }
}

async function saveAndPublish() {
  if (!currentStoreId || currentStoreId === 'demo') {
    toast('Connect your store to save — running in preview mode', 'error'); return
  }
  const btn = document.getElementById('save-btn')
  btn.disabled = true
  btn.innerHTML = '⌛ Saving…'
  try {
    const payload = buildBackendPayload()

    // Log the section types being sent — helps debug backend validation errors
    console.log('[Save] Section types being sent:',
      payload.sections.map(s => `${s.type} (order:${s.order})`).join(', '))

    await apiFetch(`/stores/${currentStoreId}/theme/settings`, {
      method:'PUT',
      body:JSON.stringify(payload.settings)
    })
    await apiFetch(`/stores/${currentStoreId}/theme/sections`, {
      method:'PUT',
      body:JSON.stringify({ sections: payload.sections })
    })
    await apiFetch(`/stores/${currentStoreId}/theme/publish`, { method:'POST' })
    markUnsaved(false)
    toast('Theme saved & published! 🚀', 'success')
    renderPreview()
  } catch(e) {
    // Show the full error message so we can see exactly which type/field is invalid
    console.error('[Save] Error:', e)
    toast('Save failed: ' + e.message, 'error')
  } finally {
    btn.disabled = false
    btn.innerHTML = '💾 Save &amp; Publish'
  }
}

function markUnsaved(val) {
  hasUnsaved = val
  document.getElementById('unsaved-indicator').classList.toggle('show', val)
}

/* ════════════════════════════════════════════════════
   SECTIONS LIST
════════════════════════════════════════════════════ */
function renderSectionsList() {
  const wrap = document.getElementById('sections-list-wrap')
  if (!wrap) return
  const enabled  = sections.filter(s => s.enabled)
  const disabled = sections.filter(s => !s.enabled)

  let html = `<span class="panel-group-label">Active Sections</span>`

  if (!enabled.length) {
    html += `<div style="padding:20px 10px;text-align:center;color:var(--text3);font-size:12px;">No active sections</div>`
  }
  enabled.forEach(s => {
    const def = SECTION_DEFS[s.type] || { icon:'📦', label:s.type }
    html += renderSectionRow(s, def, sections.indexOf(s), activeSectionId === s.id, true)
  })

  html += `<div class="add-section-row" onclick="openAddDrawer()"><span>＋</span> Add Section</div>`

  if (disabled.length) {
    html += `<span class="panel-group-label" style="margin-top:14px;">Hidden Sections</span>`
    disabled.forEach(s => {
      const def = SECTION_DEFS[s.type] || { icon:'📦', label:s.type }
      html += renderSectionRow(s, def, sections.indexOf(s), false, false)
    })
  }

  wrap.innerHTML = html
  initDragDrop()
}

function renderSectionRow(s, def, idx, isActive, isEnabled) {
  return `
  <div class="section-row ${isActive?'active':''}" id="srow_${s.id}"
       draggable="true" data-idx="${idx}"
       onclick="selectSection('${s.id}')">
    <span class="section-drag" title="Drag to reorder">⠿</span>
    <div class="section-icon-wrap">${def.icon}</div>
    <span class="section-row-label">${def.label}</span>
    <div class="section-actions">
      <button class="section-action-btn" onclick="event.stopPropagation();openSectionEditor('${s.id}')" title="Edit">✏️</button>
      <button class="section-action-btn danger" onclick="event.stopPropagation();removeSection('${s.id}')" title="Remove">🗑</button>
    </div>
    <button class="section-toggle ${isEnabled?'on':''}"
            onclick="event.stopPropagation();toggleSection('${s.id}')"
            title="${isEnabled?'Hide':'Show'} section"></button>
  </div>`
}

function selectSection(id) {
  activeSectionId = id
  highlightSectionInPreview(id)
  openSectionEditor(id)
  // Ensure sections tab is visible
  if (activeLeftTab !== 'sections') {
    document.querySelectorAll('.panel-tab')[0].click()
  }
}

function toggleSection(id) {
  const s = sections.find(x => x.id === id)
  if (!s) return
  s.enabled = !s.enabled
  markUnsaved(true)
  if (activeSectionId === id && !s.enabled) showSectionsListView()
  else renderSectionsList()
  renderPreview()
}

function removeSection(id) {
  const idx = sections.findIndex(x => x.id === id)
  if (idx > -1) {
    sections.splice(idx, 1)
    markUnsaved(true)
    if (activeSectionId === id) { activeSectionId = null; showSectionsListView() }
    else renderSectionsList()
    renderPreview()
    toast('Section removed', 'success')
  }
}

/* ════════════════════════════════════════════════════
   SECTION EDITOR (replaces list in left panel)
════════════════════════════════════════════════════ */
function openSectionEditor(id) {
  const s = sections.find(x => x.id === id)
  if (!s) return
  activeSectionId = id
  const def = SECTION_DEFS[s.type] || { icon:'📦', label:s.type, fields:[] }

  const tabBody = document.getElementById('tab-sections')
  tabBody.innerHTML = `
  <div class="editor-panel">
    <div class="editor-panel-header">
      <button class="editor-back-btn" onclick="showSectionsListView()">←</button>
      <span class="editor-panel-title">${def.label}</span>
      <span>${def.icon}</span>
    </div>
    <div class="editor-fields" id="editor-fields-wrap">
      ${renderEditorFields(def.fields, s.data)}
    </div>
    <div class="editor-footer">
      <button class="ef-btn ef-btn-ghost"    onclick="resetSectionData('${id}')">↺ Reset</button>
      <button class="ef-btn ef-btn-primary"  onclick="applySectionChanges('${id}')">✓ Apply</button>
    </div>
  </div>`

  highlightSectionInPreview(id)
}

function showSectionsListView() {
  activeSectionId = null
  const tabBody = document.getElementById('tab-sections')
  tabBody.innerHTML = `<div class="sections-panel" id="sections-list-wrap"></div>`
  renderSectionsList()
  clearHighlight()
}

function renderEditorFields(fields, data) {
  if (!fields || !fields.length) {
    return `<div style="padding:28px 14px;text-align:center;color:var(--text3);">
      <div style="font-size:28px;margin-bottom:10px;">🔒</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;">No editable fields</div>
      <div style="font-size:12px;margin-top:6px;line-height:1.6;">Content is pulled automatically from your store data.</div>
    </div>`
  }
  return `<div class="field-group">
    <span class="field-group-label">Section Content</span>
    ${fields.map(f => renderField(f, data[f.key] ?? '')).join('')}
  </div>`
}

function renderField(f, value) {
  const id = `field_${f.key}`
  let input = ''
  if (f.type === 'text' || f.type === 'number') {
    input = `<input type="${f.type}" class="field-input" id="${id}"
      value="${escHtml(String(value))}"
      placeholder="${f.placeholder || ''}"
      ${f.min !== undefined ? `min="${f.min}"` : ''}
      ${f.max !== undefined ? `max="${f.max}"` : ''}
      oninput="liveUpdateField('${f.key}',this.value)">`
  } else if (f.type === 'textarea') {
    input = `<textarea class="field-input field-textarea" id="${id}"
      placeholder="${f.placeholder || ''}"
      oninput="liveUpdateField('${f.key}',this.value)">${escHtml(String(value))}</textarea>`
  } else if (f.type === 'color') {
    input = `<div class="field-color-row">
      <div class="field-color-swatch">
        <input type="color" id="${id}" value="${value || '#5b5cf6'}"
          oninput="document.getElementById('${id}_hex').value=this.value;liveUpdateField('${f.key}',this.value)">
      </div>
      <input type="text" class="field-input" id="${id}_hex" style="flex:1;"
        value="${value || ''}" placeholder="#5b5cf6"
        oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value)){document.getElementById('${id}').value=this.value;liveUpdateField('${f.key}',this.value)}">
    </div>`
  } else if (f.type === 'select') {
    input = `<select class="field-select" id="${id}" onchange="liveUpdateField('${f.key}',this.value)">
      ${(f.opts||[]).map(o => `<option value="${o}" ${value==o?'selected':''}>${o}</option>`).join('')}
    </select>`
  }
  return `<div class="field-row">
    <div class="field-label">${f.label}</div>
    ${input}
  </div>`
}

function liveUpdateField(key, value) {
  if (!activeSectionId) return
  const s = sections.find(x => x.id === activeSectionId)
  if (!s) return
  s.data[key] = value
  markUnsaved(true)
  renderPreview()
}

function applySectionChanges(id) {
  toast('Section updated ✓', 'success')
  markUnsaved(true)
}

function resetSectionData(id) {
  const s   = sections.find(x => x.id === id)
  const def = DEFAULT_SECTIONS.find(d => d.type === s?.type)
  if (s && def) {
    s.data = { ...def.data }
    openSectionEditor(id)
    renderPreview()
    markUnsaved(true)
  }
}

function updateSetting(key, value) {
  themeData[key] = value

}

════════════════════════════════════════════════════ */
function renderAddSectionTypes() {
  document.getElementById('add-section-types').innerHTML =
    ADD_SECTION_TYPES.map(t => `
      <div class="add-section-type" onclick="addSection('${t.type}','${t.name}','${t.icon}')">
        <span class="add-section-type-icon">${t.icon}</span>
        <span class="add-section-type-name">${t.name}</span>
      </div>`).join('')
}
function openAddDrawer()  { document.getElementById('add-section-drawer').classList.add('open') }
function closeAddDrawer() { document.getElementById('add-section-drawer').classList.remove('open') }

function addSection(type, name, icon) {
  const existing = sections.find(s => s.type === type && !s.enabled)
  if (existing) {
    existing.enabled = true
    toast(`"${name}" section enabled`, 'success')
  } else {
    const def = DEFAULT_SECTIONS.find(d => d.type === type)
    const newSec = { id:`sec_${type}_${Date.now()}`, type, enabled:true, data: def ? {...def.data} : {} }
    const footerIdx = sections.findIndex(s => s.type === 'footer')
    if (footerIdx > -1) sections.splice(footerIdx, 0, newSec)
    else sections.push(newSec)
    toast(`"${name}" section added`, 'success')
  }
  closeAddDrawer()
  markUnsaved(true)
  // If editor is open, close it first so sections-list-wrap exists
  if (activeSectionId) showSectionsListView()
  else renderSectionsList()
  renderPreview()
}

/* ════════════════════════════════════════════════════
   DRAG & DROP REORDER
════════════════════════════════════════════════════ */
let dragSrcIdx = null

function initDragDrop() {
  document.querySelectorAll('.section-row[draggable]').forEach(row => {
    row.addEventListener('dragstart', () => {
      dragSrcIdx = parseInt(row.dataset.idx)
      setTimeout(() => row.classList.add('dragging'), 0)
    })
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging')
      document.querySelectorAll('.section-row').forEach(r => r.classList.remove('drag-over'))
    })
    row.addEventListener('dragover', e => {
      e.preventDefault()
      document.querySelectorAll('.section-row').forEach(r => r.classList.remove('drag-over'))
      row.classList.add('drag-over')
    })
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'))
    row.addEventListener('drop', e => {
      e.preventDefault()
      const dropIdx = parseInt(row.dataset.idx)
      if (dragSrcIdx === null || dragSrcIdx === dropIdx) return
      const moved = sections.splice(dragSrcIdx, 1)[0]
      sections.splice(dropIdx, 0, moved)
      dragSrcIdx = null
      markUnsaved(true)
      if (activeSectionId) showSectionsListView()
      else renderSectionsList()
      renderPreview()
    })
  })
}

function setDevice(device, btn) {
  currentDevice = device
  document.querySelectorAll('.tb-device-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  const shell  = document.getElementById('device-shell')
  const iframe = document.getElementById('preview-iframe')
  shell.className = 'device-shell ' + device
  iframe.height   = device === 'desktop' ? 720 : device === 'tablet' ? 900 : 800
}

function previewLive() {
  const store = allStores.find(s => s._id === currentStoreId)
  const url = store?.published_url || `https://ekart.aasaitech.in/shop.html?store=${store?.slug || ''}`
  window.open(url, '_blank')
}

/* ════════════════════════════════════════════════════
   PREVIEW CLICK-TO-EDIT
════════════════════════════════════════════════════ */
function setupPreviewClicks(iframe) {
  try {
    const doc = iframe.contentDocument
    if (!doc) return
    doc.querySelectorAll('[data-section-id]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.getAttribute('data-section-id')
        selectSection(id)
      })
      el.addEventListener('mouseenter', () => {
        if (el.getAttribute('data-section-id') !== activeSectionId) {
          el.style.outline = '2px dashed rgba(91,92,246,.4)'
          el.style.outlineOffset = '-2px'
        }
      })
      el.addEventListener('mouseleave', () => {
        if (el.getAttribute('data-section-id') !== activeSectionId) {
          el.style.outline = 'none'
        }
      })
    })
  } catch(e) {}
}

function highlightSectionInPreview(id) {
  try {
    const iframe = document.getElementById('preview-iframe')
    const doc = iframe.contentDocument
    if (!doc) return
    doc.querySelectorAll('[data-section-id]').forEach(el => {
      const isTarget = el.getAttribute('data-section-id') === id
      el.style.outline = isTarget ? '2px solid rgba(91,92,246,.8)' : 'none'
      el.style.outlineOffset = '-2px'
      if (isTarget) el.scrollIntoView({ behavior:'smooth', block:'nearest' })
    })
  } catch(e) {}
}

function clearHighlight() {
  try {
    const doc = document.getElementById('preview-iframe').contentDocument
    if (!doc) return
    doc.querySelectorAll('[data-section-id]').forEach(el => { el.style.outline = 'none' })
  } catch(e) {}
}

/* ════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════ */
function isLightColor(hex) {
  const c = (hex||'').replace('#','')
  if (c.length !== 6) return true
  const r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16)
  return (r*299 + g*587 + b*114) / 1000 > 128
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
}

function toast(msg, type = 'success') {
  const el = document.createElement('div')
  el.className = `toast ${type}`
  el.innerHTML = `
    <span class="toast-icon">${type === 'success' ? '✅' : '❌'}</span>
    <span class="toast-text">${msg}</span>`
  document.getElementById('toast-container').appendChild(el)
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')))
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400) }, 3200)
}

<!DOCTYPE html>
<html lang="en" style="background:#09090f">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eKart — Website Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    ;(function(){var p=new URLSearchParams(location.search),t=p.get('token');if(t){localStorage.setItem('ekart_token',t);history.replaceState({},'','/website-builder.html');}})();
  </script>
  <script src="api.js"></script>
  <style>
    :root{
      --bg:#09090f;--surface:#0e0e17;--surface2:#13131e;--surface3:#181826;
      --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.10);--border3:rgba(255,255,255,.16);
      --accent:#5b5cf6;--accent2:#818cf8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
      --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
      --panel-w:272px;--topbar-h:52px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

    /* ── Topbar ── */
    #topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;z-index:200;position:relative}
    .tb-logo{font-family:'Outfit',sans-serif;font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.04em;text-decoration:none;display:flex;align-items:center;padding-right:12px;border-right:1px solid var(--border2);margin-right:4px;flex-shrink:0}
    .tb-logo em{color:var(--accent2);font-style:normal}
    .tb-store-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:5px 10px 5px 8px;cursor:pointer;transition:all .15s;min-width:0;flex-shrink:0}
    .tb-store-pill:hover{border-color:var(--accent)}
    .tb-store-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px rgba(34,197,94,.6)}
    .tb-store-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
    .tb-store-chevron{color:var(--text3);font-size:10px;flex-shrink:0}
    .tb-page-label{font-size:12px;font-weight:600;color:var(--text3);display:flex;align-items:center;gap:5px}
    .tb-page-label::before{content:'/';color:var(--border3)}
    .tb-spacer{flex:1}
    .tb-unsaved{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--amber);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);padding:4px 10px;border-radius:6px;opacity:0;transition:opacity .3s;white-space:nowrap}
    .tb-unsaved.show{opacity:1}
    .tb-device-group{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
    .tb-device-btn{padding:6px 10px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:14px;transition:all .15s;line-height:1}
    .tb-device-btn.active{background:var(--surface3);color:var(--accent2)}
    .tb-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0}
    .tb-btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
    .tb-btn-ghost:hover{border-color:var(--border3);color:var(--text)}
    .tb-btn-accent{background:rgba(91,92,246,.12);color:var(--accent2);border:1px solid rgba(91,92,246,.3)}
    .tb-btn-accent:hover{background:rgba(91,92,246,.2);border-color:rgba(91,92,246,.5)}
    .tb-btn-primary{background:var(--accent);color:white}
    .tb-btn-primary:hover{background:#4f4de0;box-shadow:0 4px 16px rgba(91,92,246,.4)}
    .tb-btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .store-dropdown{position:absolute;top:calc(var(--topbar-h) + 4px);left:86px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:6px;z-index:600;min-width:200px;box-shadow:0 12px 40px rgba(0,0,0,.5);display:none}
    .store-dropdown.open{display:block}
    .store-dropdown-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:background .12s;font-size:13px;font-weight:600;color:var(--text2)}
    .store-dropdown-item:hover{background:var(--surface3);color:var(--text)}
    .store-dropdown-item.active{color:var(--accent2)}
    .store-dropdown-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

    /* ── Layout ── */
    #builder-wrap{display:flex;flex:1;overflow:hidden}

    /* ── Left Panel ── */
    #left-panel{width:var(--panel-w);min-width:var(--panel-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
    .panel-tab{flex:1;padding:11px 4px;font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--text3);cursor:pointer;text-align:center;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
    .panel-tab.active{color:var(--accent2);border-bottom-color:var(--accent);background:rgba(91,92,246,.04)}
    .panel-tab:hover:not(.active){color:var(--text2)}
    .panel-body{flex:1;overflow-y:auto;overflow-x:hidden}
    .panel-body::-webkit-scrollbar{width:3px}
    .panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

    /* ── Section List ── */
    .sections-panel{padding:10px}
    .panel-group-label{font-size:9.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:10px 4px 6px;display:block}
    .section-row{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px;border:1.5px solid transparent;user-select:none}
    .section-row:hover{background:var(--surface2)}
    .section-row.active{background:rgba(91,92,246,.08);border-color:rgba(91,92,246,.25)}
    .section-row.drag-ghost{opacity:.3;pointer-events:none}
    .section-row.drag-over-top{border-top:2px solid var(--accent)!important}
    .section-row.drag-over-bottom{border-bottom:2px solid var(--accent)!important}
    .section-drag{color:var(--text3);font-size:12px;cursor:grab;padding:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
    .section-row:hover .section-drag{opacity:1}
    .section-icon-wrap{width:26px;height:26px;border-radius:6px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:background .15s}
    .section-row.active .section-icon-wrap{background:rgba(91,92,246,.18)}
    .section-row-label{font-size:12px;font-weight:600;color:var(--text2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .section-row.active .section-row-label{color:var(--text)}
    .section-actions{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
    .section-row:hover .section-actions,.section-row.active .section-actions{opacity:1}
    .section-action-btn{width:22px;height:22px;border-radius:5px;border:none;background:var(--surface3);color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s}
    .section-action-btn:hover{background:var(--border2);color:var(--text)}
    .section-action-btn.danger:hover{background:rgba(239,68,68,.15);color:var(--red)}
    .section-toggle{width:28px;height:16px;border-radius:8px;background:var(--border2);border:none;cursor:pointer;position:relative;transition:background .15s;flex-shrink:0}
    .section-toggle.on{background:var(--accent)}
    .section-toggle::after{content:'';position:absolute;width:11px;height:11px;background:white;border-radius:50%;top:2.5px;left:2.5px;transition:left .15s}
    .section-toggle.on::after{left:14.5px}
    .add-section-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1.5px dashed var(--border2);cursor:pointer;transition:all .15s;color:var(--text3);font-size:12.5px;font-weight:600;margin-top:6px}
    .add-section-row:hover{border-color:var(--accent);color:var(--accent2);background:rgba(91,92,246,.04)}

    /* ── Section Editor ── */
    .editor-panel{display:flex;flex-direction:column;height:100%}
    .editor-panel-header{padding:11px 12px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
    .editor-back-btn{width:26px;height:26px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .12s;flex-shrink:0}
    .editor-back-btn:hover{border-color:var(--border3);color:var(--text)}
    .editor-panel-title{font-size:13px;font-weight:800;color:var(--text);flex:1}
    .editor-fields{flex:1;overflow-y:auto;padding:0 0 8px}
    .editor-fields::-webkit-scrollbar{width:3px}
    .editor-fields::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .field-group{padding:12px 12px 4px;border-bottom:1px solid var(--border)}
    .field-group:last-child{border-bottom:none}
    .field-group-label{font-size:9.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:block}
    .field-row{margin-bottom:10px}
    .field-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
    .field-hint{font-size:10px;font-weight:500;color:var(--text3);font-family:'DM Mono',monospace}
    .field-input{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:7px;padding:7px 9px;font-size:12.5px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .15s;resize:vertical}
    .field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,92,246,.1)}
    .field-input::placeholder{color:var(--text3)}
    .field-textarea{min-height:62px;line-height:1.5}
    .field-color-row{display:flex;gap:7px;align-items:center}
    .field-color-swatch{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;overflow:hidden;padding:2px;background:var(--surface2)}
    .field-color-swatch input[type=color]{width:100%;height:100%;border:none;cursor:pointer;background:none;outline:none;border-radius:4px}
    .field-select{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:7px;padding:7px 9px;font-size:12.5px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;outline:none;cursor:pointer;transition:border-color .15s;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
    .field-select:focus{border-color:var(--accent)}
    .field-select option{background:var(--surface2)}
    .field-range-wrap{display:flex;align-items:center;gap:10px}
    .field-range{flex:1;accent-color:var(--accent);height:4px;cursor:pointer}
    .field-range-val{font-size:11px;font-weight:700;color:var(--text2);min-width:28px;text-align:right;font-family:'DM Mono',monospace}
    .color-palette{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
    .color-dot{width:18px;height:18px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform .12s}
    .color-dot:hover{transform:scale(1.15)}
    .color-dot.active{border-color:white;box-shadow:0 0 0 2px var(--accent)}
    .font-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
    .font-opt{padding:7px 8px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:7px;cursor:pointer;font-size:11.5px;color:var(--text2);text-align:center;transition:all .12s;font-weight:600}
    .font-opt.active,.font-opt:hover{border-color:var(--accent);color:var(--accent2);background:rgba(91,92,246,.06)}
    .editor-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
    .ef-btn{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;border:none;display:flex;align-items:center;justify-content:center;gap:5px}
    .ef-btn-ghost{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border2)}
    .ef-btn-ghost:hover{color:var(--text);border-color:var(--border3)}
    .ef-btn-primary{background:var(--accent);color:white}
    .ef-btn-primary:hover{background:#4f4de0}

    /* ── Card Style Picker ── */
    .card-style-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:4px}
    .card-style-opt{border:1.5px solid var(--border2);border-radius:8px;padding:7px 4px 6px;cursor:pointer;text-align:center;transition:all .15s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:3px}
    .card-style-opt:hover{border-color:var(--accent);background:rgba(91,92,246,.04)}
    .card-style-opt.active{border-color:var(--accent);background:rgba(91,92,246,.1)}
    .card-style-preview{width:100%;height:44px;border-radius:5px;overflow:hidden;position:relative;margin-bottom:2px;display:flex;flex-direction:column}
    .cs-label{font-size:8.5px;font-weight:700;color:var(--text3);letter-spacing:.02em}
    .card-style-opt.active .cs-label{color:var(--accent2)}
    .csp-classic{background:var(--surface3);border:1px solid var(--border2)}
    .csp-classic::before{content:'';display:block;height:26px;background:var(--border2)}
    .csp-classic::after{content:'';display:block;height:6px;width:60%;background:var(--border3);margin:5px auto 0;border-radius:2px}
    .csp-minimal{background:transparent;border:1.5px solid var(--border2)}
    .csp-minimal::before{content:'';display:block;height:26px;background:var(--surface3)}
    .csp-overlay{background:linear-gradient(180deg,var(--surface3) 60%,rgba(91,92,246,.4) 100%)}
    .csp-bold{background:var(--surface3);border-top:3px solid var(--accent)}
    .csp-bold::before{content:'';display:block;height:23px;background:var(--border2);margin-top:3px}
    .csp-list{background:var(--surface3);display:flex!important;flex-direction:row!important;align-items:center;gap:3px;padding:4px}
    .csp-list::before{content:'';display:block;width:18px;height:100%;background:var(--border2);border-radius:3px;flex-shrink:0}
    .csp-list::after{content:'';display:block;flex:1;height:6px;background:var(--border2);border-radius:2px}
    .csp-magazine{display:grid!important;grid-template-columns:2fr 1fr;gap:2px;padding:2px;background:var(--surface3)}
    .csp-magazine::before,.csp-magazine::after{content:'';background:var(--border2);border-radius:2px}
    .csp-compact{display:grid!important;grid-template-columns:1fr 1fr;gap:2px;padding:2px;background:var(--surface3)}
    .csp-compact::before,.csp-compact::after{content:'';background:var(--border2);border-radius:2px;height:100%}
    .csp-elevated{background:var(--surface3);box-shadow:0 4px 12px rgba(0,0,0,.5);border-radius:6px}
    .csp-elevated::before{content:'';display:block;height:26px;background:var(--border2)}

    /* ── Themes Panel ── */
    .themes-panel{padding:10px}
    .theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .theme-card{border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
    .theme-card:hover{border-color:rgba(91,92,246,.4);transform:translateY(-1px)}
    .theme-card.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,92,246,.15)}
    .theme-check{position:absolute;top:5px;right:5px;width:17px;height:17px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;color:white;font-weight:700;z-index:2}
    .theme-card.active .theme-check{display:flex}
    .theme-preview{height:68px;overflow:hidden}
    .theme-name{padding:5px 8px;font-size:10.5px;font-weight:700;color:var(--text2);background:var(--surface2);border-top:1px solid var(--border)}
    .themes-browse-cta{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;margin-top:10px;padding:14px;background:rgba(91,92,246,.06);border:1.5px dashed rgba(91,92,246,.3);border-radius:10px;cursor:pointer;text-align:center;transition:all .15s}
    .themes-browse-cta:hover{background:rgba(91,92,246,.1);border-color:rgba(91,92,246,.5)}
    .themes-browse-cta-title{font-size:13px;font-weight:800;color:var(--accent2)}
    .themes-browse-cta-sub{font-size:10.5px;color:var(--text3);font-weight:600}

    /* ── Settings Panel ── */
    .settings-panel{padding:12px}

    /* ── Center Preview ── */
    #center-panel{flex:1;display:flex;flex-direction:column;background:#111118;overflow:hidden}
    .preview-bar{height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
    .preview-url{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:5px 12px;max-width:460px;margin:0 auto}
    .preview-url-lock{font-size:11px;color:var(--green)}
    .preview-url-text{font-size:11.5px;font-family:'DM Mono',monospace;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .preview-refresh{background:none;border:none;color:var(--text3);font-size:12.5px;cursor:pointer;padding:3px 7px;border-radius:4px;transition:all .12s;margin-left:auto;display:flex;align-items:center;gap:4px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600}
    .preview-refresh:hover{color:var(--text);background:var(--surface2)}
    .preview-canvas{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:20px}
    .preview-canvas::-webkit-scrollbar{width:5px;height:5px}
    .preview-canvas::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    .device-shell{background:white;border-radius:4px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);transition:all .3s ease;flex-shrink:0}
    .device-shell.desktop{width:100%;max-width:1100px}
    .device-shell.tablet{width:768px;border-radius:14px;border:10px solid #1a1c2e;box-shadow:0 0 0 1px var(--border),0 30px 60px rgba(0,0,0,.7)}
    .device-shell.mobile{width:375px;border-radius:32px;border:10px solid #1a1c2e;box-shadow:0 0 0 1px var(--border),0 30px 60px rgba(0,0,0,.7)}
    .device-shell iframe{display:block;width:100%;border:none}

    /* ── Add Section Drawer ── */
    .add-section-drawer{position:fixed;bottom:0;left:var(--panel-w);right:0;background:var(--surface);border-top:1px solid var(--border2);padding:16px 24px 24px;z-index:300;transform:translateY(100%);transition:transform .25s cubic-bezier(.2,.8,.2,1);box-shadow:0 -20px 60px rgba(0,0,0,.5)}
    .add-section-drawer.open{transform:translateY(0)}
    .add-section-drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .add-section-drawer-title{font-size:14px;font-weight:800;color:var(--text)}
    .asd-close{width:26px;height:26px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s}
    .asd-close:hover{border-color:var(--border3);color:var(--text)}
    .add-section-types{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
    .add-section-type{display:flex;flex-direction:column;align-items:center;gap:6px;padding:13px 10px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:10px;cursor:pointer;transition:all .15s;text-align:center}
    .add-section-type:hover{border-color:var(--accent);background:rgba(91,92,246,.06);transform:translateY(-2px)}
    .add-section-type-icon{font-size:20px}
    .add-section-type-name{font-size:11px;font-weight:700;color:var(--text2)}

    /* ── Theme Previews ── */
    .tp-modern{background:#0f0f14;height:68px;padding:4px 6px;display:flex;flex-direction:column;gap:3px}
    .tp-m-nav{height:9px;background:#1a1a25;border-radius:2px;display:flex;align-items:center;padding:0 4px;gap:3px}
    .tp-m-logo{width:14px;height:3px;background:#6c63ff;border-radius:1px}
    .tp-m-links{margin-left:auto;display:flex;gap:2px}
    .tp-m-links span{width:11px;height:2px;background:#333;border-radius:1px}

  const COLOR_PALETTE=['#5b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#06b6d4','#8b5cf6','#f97316','#c9a84c','#111111']
  const FONTS=['Outfit','DM Serif Display','Syne','Cormorant Garamond','Nunito','Space Grotesk','Plus Jakarta Sans','Playfair Display']

  /* ═══════════════════════════════════════
     LOADING
  ═══════════════════════════════════════ */
  function setLoading(text,pct){
    const f=document.getElementById('loading-fill'),t=document.getElementById('loading-text')
    if(f)f.style.width=pct+'%';if(t)t.textContent=text
  }
  function hideLoading(){setTimeout(()=>document.getElementById('loading-overlay').classList.add('hidden'),400)}

  /* ═══════════════════════════════════════
     INIT
  ═══════════════════════════════════════ */
  window.addEventListener('DOMContentLoaded',async()=>{
    setLoading('Authenticating…',15)
    let authOk=false
    const hasToken=!!localStorage.getItem('ekart_token')
    if(hasToken){
      try{setLoading('Loading user…',30);currentUser=await apiFetch('/auth/me');authOk=true}
      catch(e){console.warn('Auth failed, demo mode:',e.message)}
    }
    if(authOk){
      try{
        setLoading('Fetching stores…',55)
        const r=await apiFetch('/stores')
        allStores=Array.isArray(r)?r:(r?.stores||[])
      }catch(e){console.warn('Stores failed:',e.message);allStores=[]}
      currentStoreId=sessionStorage.getItem('ekart_current_store')||localStorage.getItem('ekart_store_id')
      if(!currentStoreId||!allStores.find(s=>s._id===currentStoreId))currentStoreId=allStores[0]?._id||null
      if(currentStoreId){sessionStorage.setItem('ekart_current_store',currentStoreId);localStorage.setItem('ekart_store_id',currentStoreId)}
    }else{
      allStores=[{_id:'demo',name:'Demo Store',slug:'demo-store'}]
      currentStoreId='demo'
      if(!hasToken)toast('No auth token — running in preview mode','error')
    }
    setLoading('Building UI…',75)
    renderStorePill();renderStoreDropdown();renderThemesGrid();renderSettingsPanel();renderAddSectionTypes()
    setLoading('Loading theme…',90)
    if(authOk&&currentStoreId&&currentStoreId!=='demo')await loadThemeForStore(currentStoreId)
    else{sections=JSON.parse(JSON.stringify(DEFAULT_SECTIONS));renderSectionsList();renderPreview();markThemeActive('modern');markUnsaved(false)}
    try{
      const pt=JSON.parse(localStorage.getItem('ekart_pending_theme')||'null')
      if(pt){localStorage.removeItem('ekart_pending_theme');Object.assign(themeData,pt);markUnsaved(true);renderSettingsPanel();renderPreview();markThemeActive(pt.themeId||'modern');toast(`"${pt.themeId}" theme applied from Theme Store! Save to publish.`,'success')}
    }catch(e){}
    setLoading('Ready!',100);hideLoading()
  })

  /* ═══════════════════════════════════════
     STORE UI
  ═══════════════════════════════════════ */
  function renderStorePill(){
    const s=allStores.find(x=>x._id===currentStoreId)
    document.getElementById('store-name-display').textContent=s?.name||'Select Store'
    document.getElementById('preview-url-text').textContent=`ekart.aasaitech.in/${s?.slug||'your-store'}`
  }
  function renderStoreDropdown(){
    document.getElementById('store-dropdown').innerHTML=
      allStores.map(s=>`<div class="store-dropdown-item ${s._id===currentStoreId?'active':''}" onclick="switchStore('${s._id}')"><div class="store-dropdown-dot"></div>${escHtml(s.name)}</div>`).join('')+
      `<hr style="border:none;border-top:1px solid var(--border);margin:4px 0">
      <div class="store-dropdown-item" onclick="window.location='home.html'"><span>+</span> Manage Stores</div>`
  }
  function toggleStoreDropdown(){document.getElementById('store-dropdown').classList.toggle('open')}
  document.addEventListener('click',e=>{
    if(!e.target.closest('#store-pill')&&!e.target.closest('#store-dropdown'))
      document.getElementById('store-dropdown').classList.remove('open')
  })
  async function switchStore(id){
    currentStoreId=id;sessionStorage.setItem('ekart_current_store',id);localStorage.setItem('ekart_store_id',id)
    document.getElementById('store-dropdown').classList.remove('open')
    renderStorePill();renderStoreDropdown();await loadThemeForStore(id)
  }

  /* ═══════════════════════════════════════
     LOAD / SAVE
  ═══════════════════════════════════════ */
  async function loadThemeForStore(storeId){
    if(!storeId){useDefaults();return}
    try{
      const data=await apiFetch(`/stores/${storeId}/theme`)
      const doc=data.draft||data.published||null
      applyThemeFromBackend(doc)
    }catch(e){console.warn('Theme load failed, using defaults:',e.message);useDefaults()}
    renderSectionsList();renderPreview();markThemeActive(themeData.themeId||'modern');markUnsaved(false)
  }
  function useDefaults(){
    sections=JSON.parse(JSON.stringify(DEFAULT_SECTIONS))
    themeData={...THEMES[0].settings,themeId:'modern',cardStyle:'classic',announcementText:'✨ Free shipping on orders over ₹999!',footerText:'© 2025 My Store.'}
  }
  function applyThemeFromBackend(doc){
    if(!doc){useDefaults();return}
    const s=doc.settings||{}
    themeData={
      themeId:s.themeId||'modern',primaryColor:s.primary_color||'#5b5cf6',bgColor:s.secondary_color||'#09090f',
      textColor:s.accent_color||'#f1f5f9',cardBg:s.card_bg||'#13131e',navBg:s.nav_bg||'#0e0e17',
      font:s.font_heading||'Outfit',cols:String(s.cols||3),radius:s.radius||'12px',
      btnStyle:s.button_style||'rounded',cardStyle:s.card_style||'classic',
      announcementText:s.announcement_bar?.text||'✨ Free shipping on orders over ₹999!',
      footerText:s.footer_text||'© 2025 My Store.',
    }
    if(doc.sections&&doc.sections.length){
      sections=doc.sections.map(bs=>{
        const ft=resolveFrontendType(bs.type)
        const def=DEFAULT_SECTIONS.find(d=>d.type===ft)
        return{id:bs.id||`sec_${ft}_${Date.now()}`,type:ft,_bt:bs.type,enabled:bs.is_visible!==false,data:{...(def?.data||{}),...(bs.settings||{})}}
      })
      DEFAULT_SECTIONS.forEach(def=>{
        if(!sections.find(s=>s.type===def.type))
          sections.push({...JSON.parse(JSON.stringify(def)),enabled:false})
      })
    }else{sections=JSON.parse(JSON.stringify(DEFAULT_SECTIONS))}
  }
  function buildBackendPayload(){
    return{
      settings:{
        themeId:themeData.themeId,primary_color:themeData.primaryColor,secondary_color:themeData.bgColor,
        accent_color:themeData.textColor,card_bg:themeData.cardBg,nav_bg:themeData.navBg,
        font_heading:themeData.font,font_body:themeData.font,cols:parseInt(themeData.cols)||3,
        radius:themeData.radius,button_style:themeData.btnStyle,card_style:themeData.cardStyle,
        footer_text:themeData.footerText,
        announcement_bar:(()=>{
          const ann=sections.find(s=>s.type==='announcement')
          return{enabled:ann?.enabled||false,text:ann?.data?.text||themeData.announcementText,bg_color:ann?.data?.bgColor||themeData.primaryColor,text_color:ann?.data?.textColor||'#ffffff'}
        })()
      },
      sections:sections.map((s,i)=>({id:s.id,type:s._bt||s.type,order:i+1,is_visible:s.enabled,settings:s.data||{}}))
    }
  }
  async function saveAndPublish(){
    if(!currentStoreId||currentStoreId==='demo'){toast('Connect your store to save — preview mode only','error');return}
    const btn=document.getElementById('save-btn')
    btn.disabled=true;btn.innerHTML='⌛ Saving…'
    try{
      const payload=buildBackendPayload()
      await apiFetch(`/stores/${currentStoreId}/theme/settings`,{method:'PUT',body:JSON.stringify(payload.settings)})
      await apiFetch(`/stores/${currentStoreId}/theme/sections`,{method:'PUT',body:JSON.stringify({sections:payload.sections})})
      await apiFetch(`/stores/${currentStoreId}/theme/publish`,{method:'POST'})
      markUnsaved(false);toast('Saved & published! 🚀','success');renderPreview()
    }catch(e){toast('Save failed: '+e.message,'error')}
    finally{btn.disabled=false;btn.innerHTML='💾 Save &amp; Publish'}
  }
  function markUnsaved(val){
    hasUnsaved=val
    document.getElementById('unsaved-indicator').classList.toggle('show',val)
    window.onbeforeunload=val?()=>'You have unsaved changes. Leave without saving?':null
  }

  /* ═══════════════════════════════════════
     LEFT PANEL TABS
  ═══════════════════════════════════════ */
  function switchLeftTab(tab,el){
    activeLeftTab=tab
    document.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'))
    el.classList.add('active')
    document.getElementById('tab-sections').style.display=tab==='sections'?'':'none'
    document.getElementById('tab-themes').style.display=tab==='themes'?'':'none'
    document.getElementById('tab-settings').style.display=tab==='settings'?'':'none'
  }

  /* ═══════════════════════════════════════
     SECTIONS LIST
  ═══════════════════════════════════════ */
  function renderSectionsList(){
    const wrap=document.getElementById('sections-list-wrap')
    if(!wrap)return
    const enabled=sections.filter(s=>s.enabled)
    const disabled=sections.filter(s=>!s.enabled)
    let html=`<span class="panel-group-label">Active Sections</span>`
    if(!enabled.length)html+=`<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">No active sections</div>`
    enabled.forEach(s=>html+=renderSectionRow(s,sections.indexOf(s),activeSectionId===s.id,true))
    html+=`<div class="add-section-row" onclick="openAddDrawer()"><span>＋</span> Add Section</div>`
    if(disabled.length){
      html+=`<span class="panel-group-label" style="margin-top:12px">Hidden Sections</span>`
      disabled.forEach(s=>html+=renderSectionRow(s,sections.indexOf(s),false,false))
    }
    wrap.innerHTML=html
    initDragDrop()
  }

  function renderSectionRow(s,idx,isActive,isEnabled){
    const def=getSectionDef(s.type)
    return `<div class="section-row${isActive?' active':''}" id="srow_${s.id}" draggable="true" data-id="${s.id}" data-idx="${idx}" onclick="selectSection('${s.id}')">
      <span class="section-drag" title="Drag to reorder">⠿</span>
      <div class="section-icon-wrap">${def.icon}</div>
      <span class="section-row-label">${def.label}</span>
      <div class="section-actions">
        <button class="section-action-btn" onclick="event.stopPropagation();openSectionEditor('${s.id}')" title="Edit">✏️</button>
        <button class="section-action-btn danger" onclick="event.stopPropagation();removeSection('${s.id}')" title="Remove">🗑</button>
      </div>
      <button class="section-toggle${isEnabled?' on':''}" onclick="event.stopPropagation();toggleSection('${s.id}')" title="${isEnabled?'Hide':'Show'} section"></button>
    </div>`
  }

  function selectSection(id){
    activeSectionId=id
    highlightSectionInPreview(id)
    openSectionEditor(id)
    if(activeLeftTab!=='sections'){document.querySelectorAll('.panel-tab')[0].click()}
  }

  function toggleSection(id){
    const s=sections.find(x=>x.id===id);if(!s)return
    s.enabled=!s.enabled;markUnsaved(true)
    if(activeSectionId===id&&!s.enabled){activeSectionId=null;showSectionsListView()}
    else{renderSectionsList()}
    renderPreview()
  }

  function removeSection(id){
    const idx=sections.findIndex(x=>x.id===id)
    if(idx>-1){
      sections.splice(idx,1);markUnsaved(true)
      if(activeSectionId===id){activeSectionId=null;showSectionsListView()}
      else renderSectionsList()
      renderPreview();toast('Section removed','success')
    }
  }

  /* ═══════════════════════════════════════
     SECTION EDITOR
  ═══════════════════════════════════════ */
  function openSectionEditor(id){
    const s=sections.find(x=>x.id===id);if(!s)return
    activeSectionId=id
    const def=getSectionDef(s.type)
    const tabSections=document.getElementById('tab-sections')
    tabSections.style.display=''
    document.getElementById('tab-themes').style.display='none'
    document.getElementById('tab-settings').style.display='none'
    document.querySelectorAll('.panel-tab').forEach((t,i)=>t.classList.toggle('active',i===0))

    tabSections.innerHTML=`
    <div class="editor-panel">
      <div class="editor-panel-header">
        <button class="editor-back-btn" onclick="showSectionsListView()">←</button>
        <span class="editor-panel-title">${def.label}</span>
        <span style="font-size:16px">${def.icon}</span>
      </div>
      <div class="editor-fields" id="editor-fields-wrap">
        ${renderEditorFields(def,s.data)}
      </div>
      <div class="editor-footer">
        <button class="ef-btn ef-btn-ghost" onclick="resetSectionData('${id}')">↺ Reset</button>
        <button class="ef-btn ef-btn-primary" onclick="applySectionChanges('${id}')">✓ Applied</button>
      </div>
    </div>`
    highlightSectionInPreview(id)
  }

  function showSectionsListView(){
    activeSectionId=null
    const tabSections=document.getElementById('tab-sections')
    tabSections.innerHTML=`<div class="sections-panel" id="sections-list-wrap"></div>`
    renderSectionsList()
    clearHighlight()
  }

  function renderEditorFields(def,data){
    const groups=def.groups||[]
    if(!groups.length)return`<div style="padding:28px 14px;text-align:center;color:var(--text3)"><div style="font-size:28px;margin-bottom:10px">🔒</div><div style="font-size:13px;color:var(--text2);font-weight:600">No editable fields</div><div style="font-size:12px;margin-top:6px;line-height:1.6">Content is pulled from your store.</div></div>`
    return groups.map(g=>`
      <div class="field-group">
        <span class="field-group-label">${g.label}</span>
        ${g.fields.map(f=>renderField(f,data[f.key]??'')).join('')}
      </div>`).join('')
  }

  function renderField(f,value){
    const id=`field_${f.key}`
    let input=''
    const esc=escHtml(String(value))
    if(f.type==='text'||f.type==='number'){
      input=`<input type="${f.type}" class="field-input" id="${id}" value="${esc}" placeholder="${f.placeholder||''}" ${f.min!==undefined?'min="'+f.min+'"':''} ${f.max!==undefined?'max="'+f.max+'"':''} oninput="liveUpdateField('${f.key}',this.value)">`
    }else if(f.type==='textarea'){
      input=`<textarea class="field-input field-textarea" id="${id}" placeholder="${f.placeholder||''}" oninput="liveUpdateField('${f.key}',this.value)">${esc}</textarea>`
    }else if(f.type==='color'){
      const v=value||'#5b5cf6'
      input=`<div class="field-color-row">
        <div class="field-color-swatch"><input type="color" id="${id}" value="${v}" oninput="document.getElementById('${id}_h').value=this.value;liveUpdateField('${f.key}',this.value)"></div>
        <input type="text" class="field-input" id="${id}_h" style="flex:1" value="${v}" placeholder="#5b5cf6"
          oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value)){document.getElementById('${id}').value=this.value;liveUpdateField('${f.key}',this.value)}">
      </div>`
    }else if(f.type==='select'){
      input=`<select class="field-select" id="${id}" onchange="liveUpdateField('${f.key}',this.value)">
        ${(f.opts||[]).map(o=>`<option value="${o}"${value==o?' selected':''}>${o}</option>`).join('')}
      </select>`
    }else if(f.type==='range'){
      const v=parseInt(value)||0
      const sfx=f.suffix||''
      input=`<div class="field-range-wrap">
        <input type="range" class="field-range" id="${id}" min="${f.min||0}" max="${f.max||100}" step="${f.step||1}" value="${v}"
          oninput="document.getElementById('${id}_v').textContent=this.value+'${sfx}';liveUpdateField('${f.key}',this.value+'${sfx}')">
        <span class="field-range-val" id="${id}_v">${v}${sfx}</span>
      </div>`
    }else if(f.type==='card_style_picker'){
      input=`<div class="card-style-grid">
        ${CARD_STYLES.map(s=>`<div class="card-style-opt${value===s.id?' active':''}"
          onclick="liveUpdateField('${f.key}','${s.id}');document.querySelectorAll('#editor-fields-wrap .card-style-opt').forEach(e=>e.classList.remove('active'));this.classList.add('active')">
          <div class="card-style-preview ${s.icon}"></div>
          <span class="cs-label">${s.name}</span>
        </div>`).join('')}
      </div>`
    }
    return`<div class="field-row"><div class="field-label">${f.label}</div>${input}</div>`
  }

  function liveUpdateField(key,value){
    if(!activeSectionId)return
    const s=sections.find(x=>x.id===activeSectionId);if(!s)return
    s.data[key]=value;markUnsaved(true);renderPreview()
  }
  function applySectionChanges(id){toast('Section updated ✓','success');markUnsaved(true)}
  function resetSectionData(id){
    const s=sections.find(x=>x.id===id)
    const def=DEFAULT_SECTIONS.find(d=>d.type===s?.type)
    if(s&&def){s.data={...def.data};openSectionEditor(id);renderPreview();markUnsaved(true)}
  }

     THEMES
  ═══════════════════════════════════════ */
  function renderThemesGrid(){
    document.getElementById('themes-grid').innerHTML=THEMES.map(t=>`
      <div class="theme-card" id="tcard_${t.id}" onclick="applyTheme('${t.id}')">
        <div class="theme-check">✓</div>
        <div class="theme-preview">${t.previewHTML}</div>
        <div class="theme-name">${t.name}</div>
      </div>`).join('')

  function markThemeActive(id){
    document.querySelectorAll('.theme-card').forEach(c=>c.classList.remove('active'))

  }
  function applyTheme(id){

    themeData={...themeData,...t.settings,themeId:id}

     RESET COLORS MODAL
  ═══════════════════════════════════════ */
  function openResetModal(){
    selectedPaletteId=null
    const grid=document.getElementById('palette-presets-grid')
    grid.innerHTML=COLOR_PALETTES.map(p=>`
      <div class="palette-preset" id="pp_${p.id}" onclick="selectPalette('${p.id}')">

  function applySelectedPalette(){

      </div>

      <div class="field-label">Button Style</div>
      <select class="field-select" onchange="updateSetting('btnStyle',this.value)">

      </select>

  function colorField(label,key,val,withPalette=false){
    return`<div class="field-row">
      <div class="field-label">${label}</div>
      <div class="field-color-row">
        <div class="field-color-swatch">
          <input type="color" id="s_${key}" value="${val||'#000000'}"
            oninput="updateSetting('${key}',this.value);document.getElementById('s_${key}_h').value=this.value">
        </div>
        <input type="text" class="field-input" id="s_${key}_h" style="flex:1" value="${val||''}" placeholder="#000000"
          oninput="if(/^#[0-9a-fA-F]{6}$/.test(this.value)){document.getElementById('s_${key}').value=this.value;updateSetting('${key}',this.value)}">
      </div>
      ${withPalette?`<div class="color-palette">${COLOR_PALETTE.map(c=>`<div class="color-dot" style="background:${c}" onclick="updateSetting('${key}','${c}');document.getElementById('s_${key}').value='${c}';document.getElementById('s_${key}_h').value='${c}'"></div>`).join('')}</div>`:''}
    </div>`
  }

  function updateSetting(key,value){themeData[key]=value;markUnsaved(true);renderPreview()}

  /* ═══════════════════════════════════════
     ADD SECTION DRAWER
  ═══════════════════════════════════════ */
  function renderAddSectionTypes(){
    document.getElementById('add-section-types').innerHTML=
      ADD_SECTION_TYPES.map(t=>`<div class="add-section-type" onclick="addSection('${t.type}','${t.name}','${t.icon}')"><span class="add-section-type-icon">${t.icon}</span><span class="add-section-type-name">${t.name}</span></div>`).join('')
  }
  function openAddDrawer(){document.getElementById('add-section-drawer').classList.add('open')}
  function closeAddDrawer(){document.getElementById('add-section-drawer').classList.remove('open')}
  function addSection(type,name,icon){
    const existing=sections.find(s=>s.type===type&&!s.enabled)
    if(existing){existing.enabled=true;toast(`"${name}" enabled`,'success')}
    else{
      const def=DEFAULT_SECTIONS.find(d=>d.type===type)
      const ns={id:`sec_${type}_${Date.now()}`,type,enabled:true,data:def?{...def.data}:{}}
      const fi=sections.findIndex(s=>s.type==='footer')
      if(fi>-1)sections.splice(fi,0,ns);else sections.push(ns)
      toast(`"${name}" section added`,'success')
    }
    closeAddDrawer();markUnsaved(true)
    activeSectionId=null
    showSectionsListView()
    renderPreview()
  }

  /* ═══════════════════════════════════════
     DRAG & DROP
  ═══════════════════════════════════════ */
  let dragSrcId=null

  function initDragDrop(){
    document.querySelectorAll('.section-row[draggable]').forEach(row=>{
      row.addEventListener('dragstart',e=>{
        dragSrcId=row.dataset.id;e.dataTransfer.effectAllowed='move'
        setTimeout(()=>row.classList.add('drag-ghost'),0)
      })
      row.addEventListener('dragend',()=>{
        dragSrcId=null
        document.querySelectorAll('.section-row').forEach(r=>r.classList.remove('drag-ghost','drag-over-top','drag-over-bottom'))
      })
      row.addEventListener('dragover',e=>{
        e.preventDefault()
        if(!dragSrcId||row.dataset.id===dragSrcId)return
        e.dataTransfer.dropEffect='move'
        const rect=row.getBoundingClientRect()
        const midY=rect.top+rect.height/2
        document.querySelectorAll('.section-row').forEach(r=>r.classList.remove('drag-over-top','drag-over-bottom'))
        if(e.clientY<midY)row.classList.add('drag-over-top');else row.classList.add('drag-over-bottom')
      })
      row.addEventListener('dragleave',e=>{
        if(!row.contains(e.relatedTarget))row.classList.remove('drag-over-top','drag-over-bottom')
      })
      row.addEventListener('drop',e=>{
        e.preventDefault()
        if(!dragSrcId||row.dataset.id===dragSrcId)return
        const srcIdx=sections.findIndex(s=>s.id===dragSrcId)
        const tgtIdx=sections.findIndex(s=>s.id===row.dataset.id)
        if(srcIdx===-1||tgtIdx===-1)return
        const rect=row.getBoundingClientRect()
        const insertAfter=e.clientY>=rect.top+rect.height/2
        const moved=sections.splice(srcIdx,1)[0]
        const newTgtIdx=sections.findIndex(s=>s.id===row.dataset.id)
        const insertAt=insertAfter?newTgtIdx+1:newTgtIdx
        sections.splice(insertAt,0,moved)
        dragSrcId=null;markUnsaved(true)
        if(activeSectionId){showSectionsListView()}else{renderSectionsList()}
        renderPreview()
      })
    })
  }

  /* ═══════════════════════════════════════
     DEVICE
  ═══════════════════════════════════════ */
  function setDevice(device,btn){
    currentDevice=device
    document.querySelectorAll('.tb-device-btn').forEach(b=>b.classList.remove('active'))
    btn.classList.add('active')
    const shell=document.getElementById('device-shell')
    const iframe=document.getElementById('preview-iframe')
    shell.className='device-shell '+device
    iframe.height=device==='desktop'?720:device==='tablet'?900:800
    renderPreview()
  }
  function previewLive(){
    const s=allStores.find(x=>x._id===currentStoreId)
    window.open(s?.published_url||`https://ekart.aasaitech.in/${s?.slug||''}`,'_blank')
  }

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

}

.contact-input{width:100%;padding:11px 14px;border:1.5px solid rgba(${borderRgb},.1);border-radius:var(--radius);font-size:13.5px;background:var(--card-bg);color:var(--text);font-family:var(--font);outline:none}
.contact-textarea{min-height:100px;resize:vertical}

.about-section{padding:${isMobile?'32px 5%':'56px 5%'}}
.about-grid{display:grid;grid-template-columns:${isMobile?'1fr':'1fr 1fr'};gap:48px;align-items:center}
.about-img{border-radius:var(--radius);overflow:hidden;aspect-ratio:4/3;background:var(--card-bg);display:flex;align-items:center;justify-content:center;font-size:60px}
.about-img img{width:100%;height:100%;object-fit:cover}
.about-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px}
.about-stat{text-align:center;padding:14px;background:var(--card-bg);border-radius:var(--radius)}
.about-stat-num{font-size:22px;font-weight:900;color:var(--primary)}
.about-stat-label{font-size:11px;opacity:.5;font-weight:600;margin-top:4px}

.team-section{padding:${isMobile?'32px 5%':'56px 5%'}}
.team-grid{display:grid;gap:20px;margin-top:24px}
.team-card{background:var(--card-bg);border-radius:var(--radius);padding:20px;text-align:center}
.team-avatar{width:72px;height:72px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;overflow:hidden}
.team-avatar img{width:100%;height:100%;object-fit:cover}
.team-name{font-size:15px;font-weight:800;margin-bottom:4px}
.team-role{font-size:12px;opacity:.5;font-weight:600}

.richtext-section{padding:${isMobile?'32px 5%':'56px 5%'}}
.richtext-inner{margin:0 auto;line-height:1.75}
.richtext-title{font-weight:800;letter-spacing:-.02em;margin-bottom:16px}
.richtext-body{opacity:.7;font-size:${isMobile?'14px':'16px'}}

.imagetext-section{padding:${isMobile?'32px 5%':'56px 5%'}}
.imagetext-grid{display:grid;grid-template-columns:${isMobile?'1fr':'1fr 1fr'};gap:48px;align-items:center}
.imagetext-img{border-radius:var(--radius);overflow:hidden;aspect-ratio:4/3;background:var(--card-bg);display:flex;align-items:center;justify-content:center;font-size:60px}
.imagetext-img img{width:100%;height:100%;object-fit:cover}
.imagetext-bullets{display:flex;flex-direction:column;gap:8px;margin:16px 0}
.imagetext-bullet{font-size:14px;font-weight:600;opacity:.8}

.brands-section{padding:${isMobile?'24px 5%':'40px 5%'}}
.brands-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px}
.brand-item-pill{padding:10px 20px;background:var(--card-bg);border-radius:999px;font-size:13px;font-weight:700;opacity:.6;cursor:pointer;transition:opacity .15s}
.brand-item-pill:hover{opacity:1}
.brand-item-card{padding:14px 20px;background:var(--card-bg);border-radius:var(--radius);font-size:14px;font-weight:700;opacity:.6;min-width:100px;text-align:center}
.brand-item-minimal{font-size:16px;font-weight:900;opacity:.35;padding:8px 16px}

.offers-section{padding:${isMobile?'32px 5%':'56px 5%'}}
.offers-grid{display:grid;gap:16px;margin-top:24px}
.offer-card{border-radius:var(--radius);padding:${isMobile?'20px':'28px'};color:white;position:relative;overflow:hidden}
.offer-card::before{content:'';position:absolute;top:-20px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,.1);border-radius:50%}
.offer-title{font-size:${isMobile?'18px':'22px'};font-weight:900;margin-bottom:6px}
.offer-desc{font-size:13px;opacity:.8;margin-bottom:14px}
.offer-code-box{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border:1.5px dashed rgba(255,255,255,.5);padding:6px 14px;border-radius:6px;font-family:monospace;font-size:13px;font-weight:700}

[data-section-id]{cursor:pointer;transition:outline .1s}
[data-section-id]:hover{outline:2px dashed rgba(91,92,246,.4);outline-offset:-2px}
[data-section-id].sec-active{outline:2px solid rgba(91,92,246,.8)!important;outline-offset:-2px}
</style>
</head>
<body>${sectionsHTML}</body>
</html>`

    try{
      const iframe=document.getElementById('preview-iframe')
      const doc=iframe.contentDocument||iframe.contentWindow.document
      doc.open();doc.write(html);doc.close()
      setTimeout(()=>setupPreviewClicks(iframe),400)
    }catch(e){console.warn('Preview error:',e)}
  }

  /* ═══════════════════════════════════════
     BUILD SECTION HTML
  ═══════════════════════════════════════ */
  function buildSectionHTML(sec,isMobile){
    const d=sec.data||{}
    const wrap=(cls,content)=>`<div data-section-id="${sec.id}" class="${cls}">${content}</div>`

    switch(sec.type){
      case 'announcement':{
        const sz=d.textSize==='large'?'15px':d.textSize==='small'?'11px':'13px'
        const fw=d.bold==='no'?'500':'700'
        return wrap('',`<div class="announcement-bar" style="${d.bgColor?'background:'+d.bgColor+';':''}${d.textColor?'color:'+d.textColor+';':''}font-size:${sz};font-weight:${fw};">
          <span>${escHtmlInner(d.text||themeData.announcementText)}</span>
          ${d.linkText?`<span class="ann-link">${escHtmlInner(d.linkText)}</span>`:''}
          ${d.closable==='yes'?`<button class="ann-close" onclick="this.closest('.announcement-bar').parentElement.style.display='none'">✕</button>`:''}
        </div>`)
      }
      case 'navbar':{
        const logoStyle=d.logoColor?`color:${d.logoColor};`:''
        const navStyle=d.bgColor?`background:${d.bgColor};`:''
        const pos=d.sticky!=='no'?'sticky':'relative'
        const links=[d.link1Text||'Home',d.link2Text||'Products',d.link3Text||'Categories',d.link4Text||'About',d.link5Text].filter(Boolean)
        return wrap('',`<nav class="navbar" style="${navStyle}position:${pos};top:0;z-index:100;">
          <div class="nav-logo" style="${logoStyle}">${escHtmlInner(d.logoText||'My Store')}</div>
          ${!isMobile?`<div class="nav-links-center" style="${d.linkColor?'color:'+d.linkColor+';':''}">${links.map(l=>`<a>${escHtmlInner(l)}</a>`).join('')}</div>`:''}
          <div class="nav-right">
            ${d.showSearch!=='no'?`<button class="nav-search">🔍</button>`:''}
            ${d.showCart!=='no'?`<button class="nav-cart">🛒 ${escHtmlInner(d.cartText||'Cart')} (0)</button>`:''}
          </div>
        </nav>`)
      }
      case 'hero':{
        const rawH=d.heading||'Welcome to our Store'
        const heading=rawH.replace(/(store|shop)/gi,m=>`<em>${m}</em>`)
        const align=d.textAlign||'center'
        const padMap={compact:`${isMobile?'32px 5% 28px':'48px 5% 40px'}`,normal:`${isMobile?'48px 5% 40px':'80px 5% 72px'}`,tall:`${isMobile?'72px 5% 60px':'120px 5% 100px'}`,fullscreen:`${isMobile?'80px 5%':'160px 5%'}`}
        const pad=padMap[d.size||'normal']
        const bgStyle=d.bgColor&&!d.bgImage?`background:${d.bgColor};`:`background:var(--bg);`
        const overlayStyle=d.bgImage&&d.overlayColor?`background:${d.overlayColor};opacity:${(parseInt(d.overlayOpacity)||0)/100};`:'opacity:0;'
        return wrap('',`<section class="hero" style="${bgStyle}padding:${pad};text-align:${align};">
          ${d.bgImage?`<div class="hero-bg" style="background-image:url('${d.bgImage}')"></div>`:''}
          <div class="hero-overlay" style="${overlayStyle}"></div>
          <div class="hero-content" style="${d.textColor?'color:'+d.textColor+';':''}">
            ${d.badge?`<div class="hero-badge">${escHtmlInner(d.badge)}</div>`:''}
            <h1>${heading}</h1>
            <p>${escHtmlInner(d.subheading||'Discover amazing products at the best prices. Fast delivery across India.')}</p>
            <div class="hero-btns" style="justify-content:${align==='left'?'flex-start':align==='right'?'flex-end':'center'}">
              <a href="${d.ctaLink||'#products'}" class="btn-cta">${escHtmlInner(d.ctaText||'Shop Now')} →</a>
              ${d.cta2Text?`<a href="${d.cta2Link||'#'}" class="btn-cta btn-cta-ghost">${escHtmlInner(d.cta2Text)}</a>`:''}
            </div>
          </div>
        </section>`)
      }
      case 'featured':{
        const count=parseInt(d.count)||8
        const cardStyle=d.cardStyle||themeData.cardStyle||'classic'
        const fCols=cardStyle==='list'?1:(isMobile?2:(parseInt(d.columns)||parseInt(themeData.cols)||3))
        const cBg=d.cardBg||themeData.cardBg||'#13131e'
        const pColor=d.priceColor||themeData.primaryColor||'#5b5cf6'
        const btnTxt=escHtmlInner(d.btnText||'Add to Cart')
        const showOld=d.showOldPrice!=='no'
        const showRating=d.showRating==='yes'
        const showBadge=d.showBadge==='yes'
        const badge=escHtmlInner(d.badgeText||'New')
        const emojis=['👟','👗','🎧','📱','⌚','👜','🕶️','💻','🎮','🛍️','💄','🏠','🎒','🧴','🏃','⚽','🎮','🖥️','📷','🎵','🌿','✨','💎','🔥']
        const cards=emojis.slice(0,count).map((e,i)=>{
          const disc=i%3===0&&i>0?20:0
          const price=499+i*197
          const comparePrice=disc?Math.round(price/(1-disc/100)):0
          const imgArea=`<div class="tc-img">
            ${showBadge&&i<3?`<div class="tc-badge">${badge}</div>`:''}
            <button class="tc-wishlist">♡</button>
            ${e}
          </div>`
          const infoArea=cardStyle==='overlay'?`
            <div class="tc-overlay">
              ${showRating?`<div class="tc-stars">★★★★☆</div>`:''}
              <div class="tc-name">Premium Product ${i+1}</div>
              <div class="tc-price-row"><span class="tc-price" style="color:white">₹${price.toLocaleString('en-IN')}</span></div>
              <button class="tc-btn">${btnTxt}</button>
            </div>`:`
            <div class="tc-info">
              ${showRating?`<div class="tc-stars">★★★★☆ <span style="opacity:.4;font-size:10px">(${12+i*7})</span></div>`:''}
              <div class="tc-name">Premium Product ${i+1}</div>
              <div class="tc-price-row">
                <span class="tc-price" style="color:${pColor}">₹${price.toLocaleString('en-IN')}</span>
                ${showOld&&disc?`<span class="tc-compare">₹${comparePrice.toLocaleString('en-IN')}</span><span class="tc-disc">-${disc}%</span>`:''}
              </div>
              ${cardStyle!=='compact'?`<button class="tc-btn">${btnTxt}</button>`:''}
            </div>`
          return`<a class="tc" style="background:${cBg}">${imgArea}${infoArea}</a>`
        }).join('')
        return wrap('',`<section class="section" id="products">
          <div class="section-header">
            <div class="section-header-row">
              <div><h2 class="section-title">${escHtmlInner(d.title||'Featured Products')}</h2>${d.subtitle?`<p class="section-subtitle">${escHtmlInner(d.subtitle)}</p>`:''}</div>
              ${d.viewAllText?`<a href="${d.viewAllLink||'#'}" class="view-all-btn">${escHtmlInner(d.viewAllText)} →</a>`:''}
            </div>
          </div>
          <div class="themed-products-grid ${cardStyle}-grid" style="--cols:${fCols}">${cards}</div>
        </section>`)
      }
      case 'categories':{
        const cCols=isMobile?2:(parseInt(d.columns)||4)
        const style=d.style||'card'
        const cats=[['👗','Fashion','240 items'],['📱','Electronics','180 items'],['🏠','Home & Living','320 items'],['💄','Beauty','150 items'],['🎮','Gaming','90 items'],['🍕','Food','200 items'],['⌚','Watches','75 items'],['👟','Footwear','130 items']]
        return wrap('',`<section class="section">
          <div class="section-header">
            <h2 class="section-title">${escHtmlInner(d.title||'Browse by Category')}</h2>
            ${d.subtitle?`<p class="section-subtitle">${escHtmlInner(d.subtitle)}</p>`:''}
          </div>
          <div class="cats-grid" style="grid-template-columns:repeat(${cCols},1fr)">
            ${cats.slice(0,cCols*2).map(([e,n,count])=>`<div class="cat-card ${style}-style"><div class="cat-icon">${e}</div><div class="cat-name">${n}</div>${d.showCount==='yes'?`<div class="cat-count">${count}</div>`:''}</div>`).join('')}
          </div>
        </section>`)
      }
      case 'banner':{
        const bg=d.bgColor||themeData.primaryColor||'#5b5cf6'
        const tc=d.textColor||'#ffffff'
        const layout=d.layout||'center'
        const bgStyle=d.bgImage?`background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),url('${d.bgImage}') center/cover;`:`background:${bg};`
        return wrap('',`<section class="promo-banner ${layout}-layout" style="${bgStyle}color:${tc}">
          <div class="promo-content">
            ${d.badgeText?`<div class="promo-badge">${escHtmlInner(d.badgeText)}</div>`:''}
            <h2>${escHtmlInner(d.heading||'Limited Time Offer')}</h2>
            <p>${escHtmlInner(d.subtext||'Get 20% off your first order. Use code WELCOME20')}</p>
            ${d.couponCode?`<div class="promo-coupon">🎫 ${escHtmlInner(d.couponCode)} <span style="opacity:.5;font-size:11px">tap to copy</span></div>`:''}
            <button class="btn-white" style="color:${bg}">${escHtmlInner(d.ctaText||'Claim Offer')}</button>
          </div>
        </section>`)
      }
      case 'testimonials':{
        const tCols=isMobile?1:(parseInt(d.columns)||3)
        const style=d.style||'card'
        const ts=[
          [d.t1name||'Sarah M.',d.t1text||'Absolutely love this store! Fast shipping and great quality. Highly recommend!',parseInt(d.t1stars||5)],
          [d.t2name||'Rahul K.',d.t2text||'Best shopping experience. Will definitely order again!',parseInt(d.t2stars||5)],
          [d.t3name||'Anita P.',d.t3text||'Great products and excellent customer service. Five stars!',parseInt(d.t3stars||5)],
        ]
        return wrap('',`<section class="testimonials">
          <div class="section-header">
            <h2 class="section-title">${escHtmlInner(d.title||'What Customers Say')}</h2>
            ${d.subtitle?`<p class="section-subtitle">${escHtmlInner(d.subtitle)}</p>`:''}
          </div>
          <div class="testimonials-grid" style="grid-template-columns:repeat(${tCols},1fr)">
            ${ts.map(([n,t,stars])=>`<div class="testimonial ${style}-style">
              <div class="t-stars">${'★'.repeat(stars)}${'☆'.repeat(5-stars)}</div>
              <div class="t-text">"${escHtmlInner(t)}"</div>
              <div class="t-author"><div class="t-avatar">${n[0]}</div><div class="t-name">${escHtmlInner(n)}</div></div>
            </div>`).join('')}
          </div>
        </section>`)
      }
      case 'newsletter':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const tc=d.textColor?`color:${d.textColor};`:''
        const btnBg=d.btnColor||themeData.primaryColor||'#5b5cf6'
        const layout=d.layout||'center'
        return wrap('',`<section class="newsletter ${layout==='left'?'left-layout':''}" style="${bg}${tc}">
          <h2>${escHtmlInner(d.heading||'Stay in the loop')}</h2>
          <p>${escHtmlInner(d.subtext||'Get exclusive deals and offers straight to your inbox.')}</p>
          <div class="newsletter-form" style="${layout==='left'?'':''}">
            <input class="newsletter-input" type="email" placeholder="${escHtmlInner(d.inputPlaceholder||'Enter your email address')}">
            <button class="btn-cta" style="background:${btnBg};white-space:nowrap">${escHtmlInner(d.btnText||'Subscribe')} →</button>
          </div>
          ${d.privacyText?`<div class="newsletter-privacy">${escHtmlInner(d.privacyText)}</div>`:''}
        </section>`)
      }
      case 'footer':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const tc=d.textColor?`color:${d.textColor};`:''
        const col1Links=(d.col1Links||'Home,Products,Categories,About').split(',').filter(Boolean)
        const col2Links=(d.col2Links||'Shipping,Returns,FAQ,Track Order').split(',').filter(Boolean)
        return wrap('',`<footer class="footer" style="${bg}${tc}">
          <div class="footer-top">
            <div class="footer-brand">
              <div class="footer-logo">${escHtmlInner(d.logoText||(sections.find(s=>s.type==='navbar')?.data?.logoText)||'My Store')}</div>
              ${d.tagline?`<div class="footer-tagline">${escHtmlInner(d.tagline)}</div>`:''}
              <div class="footer-contact">
                ${d.email?`<div>✉️ ${escHtmlInner(d.email)}</div>`:''}
                ${d.phone?`<div>📞 ${escHtmlInner(d.phone)}</div>`:''}
              </div>
            </div>
            ${!isMobile?`
            <div>
              <div class="footer-col-title">${escHtmlInner(d.col1Title||'Quick Links')}</div>
              <div class="footer-col-links">${col1Links.map(l=>`<a>${escHtmlInner(l.trim())}</a>`).join('')}</div>
            </div>
            <div>
              <div class="footer-col-title">${escHtmlInner(d.col2Title||'Customer Care')}</div>
              <div class="footer-col-links">${col2Links.map(l=>`<a>${escHtmlInner(l.trim())}</a>`).join('')}</div>
            </div>`:''}
          </div>
          <div class="footer-bottom">
            <div class="footer-copy">${escHtmlInner(d.footerText||themeData.footerText)}</div>
            ${d.showSocial!=='no'?`<div class="footer-social">
              <div class="social-btn">📸</div>
              <div class="social-btn">📘</div>
              <div class="social-btn">🐦</div>
            </div>`:''}
          </div>
        </footer>`)
      }
      case 'video':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const tc=d.textColor?`color:${d.textColor};`:''
        return wrap('',`<section class="video-section" style="${bg}${tc}">
          <div class="section-header"><h2 class="section-title">${escHtmlInner(d.heading||'Our Story')}</h2>${d.subtext?`<p class="section-subtitle">${escHtmlInner(d.subtext)}</p>`:''}</div>
          <div class="video-box" style="${d.thumbnailUrl?`background-image:url('${d.thumbnailUrl}');background-size:cover;background-position:center;`:``}">
            ${d.videoUrl?`<iframe src="${d.videoUrl}" style="width:100%;height:100%;border:none" allowfullscreen></iframe>`:`<div class="play-circle">▶</div><div class="play-label">${escHtmlInner(d.playBtnText||'Watch Video')}</div>`}
          </div>
        </section>`)
      }
      case 'countdown':{
        const bg=d.bgColor?`background:${d.bgColor};`:'background:var(--card-bg);'
        const tc=d.textColor?`color:${d.textColor};`:''
        const ac=d.accentColor||themeData.primaryColor||'#5b5cf6'
        return wrap('',`<section class="countdown-section" style="${bg}${tc}">
          <div class="section-header">
            <h2 class="section-title">⏳ ${escHtmlInner(d.heading||'Deal Ends In')}</h2>
            ${d.subtext?`<p class="section-subtitle">${escHtmlInner(d.subtext)}</p>`:''}
          </div>
          <div class="countdown-row">
            ${[['02','Days'],['14','Hours'],['37','Mins'],['52','Secs']].map(([n,l])=>`<div class="cd-unit"><div class="cd-num" style="color:${ac}">${n}</div><div class="cd-label">${l}</div></div>`).join('')}
          </div>
          ${d.ctaText?`<div class="countdown-cta"><a href="${d.ctaLink||'#'}" class="btn-cta">${escHtmlInner(d.ctaText)}</a></div>`:''}
        </section>`)
      }
      case 'gallery':{
        const gCols=isMobile?2:(parseInt(d.columns)||4)
        const ratio=d.imgAspect==='landscape'?'16/9':d.imgAspect==='portrait'?'3/4':'1'
        const imgs=[d.img1,d.img2,d.img3,d.img4,d.img5,d.img6].filter(Boolean)
        const emojis=['🌿','✨','🎁','🛍️','💎','🌸','🔥','⚡']
        return wrap('',`<section class="gallery-section">
          <div class="section-header">
            <h2 class="section-title">${escHtmlInner(d.title||'Our Gallery')}</h2>
            ${d.subtitle?`<p class="section-subtitle">${escHtmlInner(d.subtitle)}</p>`:''}
          </div>
          <div class="gallery-grid" style="grid-template-columns:repeat(${gCols},1fr)">
            ${(isMobile?4:8) > 0 ? emojis.slice(0,isMobile?4:8).map((e,i)=>`<div class="gallery-item" style="aspect-ratio:${ratio}">${imgs[i]?`<img src="${imgs[i]}" alt="Gallery">`:e}</div>`).join('') : ''}
          </div>
        </section>`)
      }
      case 'trustbadges':{
        const bg=d.bgColor?`background:${d.bgColor};`:'background:var(--card-bg);'
        const tc=d.textColor?`color:${d.textColor};`:''
        const layout=d.layout||'row'
        const gridCols=layout==='2x2'?2:layout==='column'?1:(isMobile?2:4)
        return wrap('',`<section class="trust-section" style="${bg}${tc}">
          <div class="trust-grid" style="grid-template-columns:repeat(${gridCols},1fr)">
            ${[[d.badge1Icon||'🚚',d.badge1||'Free Shipping',d.badge1sub||'On orders above ₹499'],
               [d.badge2Icon||'🔒',d.badge2||'Secure Payment',d.badge2sub||'100% safe & encrypted'],
               [d.badge3Icon||'↩️',d.badge3||'Easy Returns',d.badge3sub||'30-day return policy'],
               [d.badge4Icon||'💬',d.badge4||'24/7 Support',d.badge4sub||'Always here to help']].map(([icon,label,sub])=>
              `<div class="trust-item"><span class="trust-icon">${escHtmlInner(icon)}</span><div><div class="trust-label">${escHtmlInner(label)}</div><div class="trust-sub">${escHtmlInner(sub)}</div></div></div>`).join('')}
          </div>
        </section>`)
      }
      case 'faq':{
        const pairs=[[d.q1,d.a1],[d.q2,d.a2],[d.q3,d.a3],[d.q4,d.a4],[d.q5,d.a5]].filter(([q])=>q)
        const defaults=pairs.length?pairs:[
          ['How long does shipping take?','Typically 3-7 business days across India. Express delivery available at checkout.'],
          ['What is your return policy?','Hassle-free 30-day returns. No questions asked, full refund guaranteed.'],
          ['Do you offer Cash on Delivery?','Yes! COD available across India on all orders.'],
          ['How do I track my order?','You will receive a tracking link via email and SMS after your order is shipped.'],
        ]
        return wrap('',`<section class="faq-section">
          <div class="section-header">
            <h2 class="section-title">${escHtmlInner(d.title||'Frequently Asked Questions')}</h2>
            ${d.subtitle?`<p class="section-subtitle">${escHtmlInner(d.subtitle)}</p>`:''}
          </div>
          ${defaults.map(([q,a])=>`<div class="faq-item"><div class="faq-q">${escHtmlInner(q)}</div><div class="faq-a">${escHtmlInner(a)}</div></div>`).join('')}
        </section>`)
      }
      case 'contact':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const tc=d.textColor?`color:${d.textColor};`:''
        const layout=d.layout||'side-by-side'
        return wrap('',`<section class="contact-section" style="${bg}${tc}">
          <div class="section-header">
            <h2 class="section-title">${escHtmlInner(d.title||'Get in Touch')}</h2>
            ${d.subtitle?`<p class="section-subtitle">${escHtmlInner(d.subtitle)}</p>`:''}
          </div>
          <div class="contact-grid" style="grid-template-columns:${layout==='form-only'?'1fr':isMobile?'1fr':'1fr 1fr'}">
            ${layout!=='form-only'?`<div>
              ${d.email?`<div class="contact-info-item"><div class="contact-info-icon">✉️</div><div><div style="font-weight:700;margin-bottom:3px">Email</div><div style="opacity:.55;font-size:13px">${escHtmlInner(d.email)}</div></div></div>`:''}
              ${d.phone?`<div class="contact-info-item"><div class="contact-info-icon">📞</div><div><div style="font-weight:700;margin-bottom:3px">Phone</div><div style="opacity:.55;font-size:13px">${escHtmlInner(d.phone)}</div></div></div>`:''}
              ${d.address?`<div class="contact-info-item"><div class="contact-info-icon">📍</div><div><div style="font-weight:700;margin-bottom:3px">Address</div><div style="opacity:.55;font-size:13px;line-height:1.5">${escHtmlInner(d.address)}</div></div></div>`:''}
            </div>`:''}
            <div class="contact-form">
              <input class="contact-input" placeholder="Your Name">
              <input class="contact-input" placeholder="Email Address">
              <textarea class="contact-input contact-textarea" placeholder="Your message..."></textarea>
              <button class="btn-cta">${escHtmlInner(d.btnText||'Send Message')}</button>
            </div>
          </div>
        </section>`)
      }
      case 'about':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const tc=d.textColor?`color:${d.textColor};`:''
        const layout=d.layout||'image-right'
        const imgEl=d.imageUrl?`<img src="${d.imageUrl}" alt="About">`:' 🏪'
        const textSide=`<div>
          <h2 style="font-size:${isMobile?'24px':'32px'};font-weight:900;letter-spacing:-.02em;margin-bottom:12px">${escHtmlInner(d.title||'Our Story')}</h2>
          ${d.subtitle?`<p style="font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px">${escHtmlInner(d.subtitle)}</p>`:''}
          ${d.body?`<p style="opacity:.65;line-height:1.75;margin-bottom:12px">${escHtmlInner(d.body)}</p>`:'<p style="opacity:.65;line-height:1.75;margin-bottom:12px">We started with a simple mission: to bring quality products to every household across India. From humble beginnings to serving thousands of happy customers, our journey has been driven by your trust.</p>'}
          ${d.body2?`<p style="opacity:.65;line-height:1.75;margin-bottom:20px">${escHtmlInner(d.body2)}</p>`:''}
          ${d.ctaText?`<a href="${d.ctaLink||'#'}" class="btn-cta">${escHtmlInner(d.ctaText)}</a>`:''}
          ${(d.stat1num||d.stat2num)?`<div class="about-stats">
            ${d.stat1num?`<div class="about-stat"><div class="about-stat-num">${escHtmlInner(d.stat1num)}</div><div class="about-stat-label">${escHtmlInner(d.stat1label||'')}</div></div>`:''}
            ${d.stat2num?`<div class="about-stat"><div class="about-stat-num">${escHtmlInner(d.stat2num)}</div><div class="about-stat-label">${escHtmlInner(d.stat2label||'')}</div></div>`:''}
            ${d.stat3num?`<div class="about-stat"><div class="about-stat-num">${escHtmlInner(d.stat3num)}</div><div class="about-stat-label">${escHtmlInner(d.stat3label||'')}</div></div>`:''}
          </div>`:''}
        </div>`
        const imgSide=layout!=='no-image'?`<div class="about-img">${imgEl}</div>`:''
        return wrap('',`<section class="about-section" style="${bg}${tc}">
          <div class="about-grid" style="grid-template-columns:${layout==='no-image'||isMobile?'1fr':'1fr 1fr'}">
            ${layout==='image-right'?textSide+imgSide:imgSide+textSide}
          </div>
        </section>`)
      }
      case 'team':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const tCols=isMobile?2:(parseInt(d.columns)||3)
        const members=[[d.m1name||'Priya Sharma',d.m1role||'Founder & CEO',d.m1img],[d.m2name||'Rahul Verma',d.m2role||'Head of Operations',d.m2img],[d.m3name||'Anita Patel',d.m3role||'Customer Success',d.m3img]].filter(([n])=>n)
        return wrap('',`<section class="team-section" style="${bg}">
          <div class="section-header">
            <h2 class="section-title">${escHtmlInner(d.title||'Meet Our Team')}</h2>
            ${d.subtitle?`<p class="section-subtitle">${escHtmlInner(d.subtitle)}</p>`:''}
          </div>
          <div class="team-grid" style="grid-template-columns:repeat(${tCols},1fr)">
            ${members.map(([n,r,img])=>`<div class="team-card">
              <div class="team-avatar">${img?`<img src="${img}" alt="${n}">`:n[0]}</div>
              <div class="team-name">${escHtmlInner(n)}</div>
              <div class="team-role">${escHtmlInner(r)}</div>
            </div>`).join('')}
          </div>
        </section>`)
      }
      case 'richtext':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const tc=d.textColor?`color:${d.textColor};`:''
        const maxWidths={narrow:'480px',normal:'680px',wide:'900px',full:'100%'}
        const mw=maxWidths[d.maxWidth||'normal']
        const titleSizes={small:'20px',medium:'28px',large:'36px',xlarge:'48px'}
        const ts=titleSizes[d.titleSize||'large']
        return wrap('',`<section class="richtext-section" style="${bg}${tc}">
          <div class="richtext-inner" style="max-width:${mw};text-align:${d.align||'left'}">
            ${d.title?`<h2 class="richtext-title" style="font-size:${ts}">${escHtmlInner(d.title)}</h2>`:''}
            ${d.body?`<div class="richtext-body">${escHtmlInner(d.body).replace(/\n/g,'<br>')}</div>`:''}
            ${d.ctaText?`<div style="margin-top:24px"><a href="${d.ctaLink||'#'}" class="btn-cta">${escHtmlInner(d.ctaText)}</a></div>`:''}
          </div>
        </section>`)
      }
      case 'imagetext':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const tc=d.textColor?`color:${d.textColor};`:''
        const layout=d.layout||'image-right'
        const bullets=[d.bullet1,d.bullet2,d.bullet3].filter(Boolean)
        const imgEl=d.imageUrl?`<img src="${d.imageUrl}" alt="">`:' 🖼️'
        const textSide=`<div>
          <h2 style="font-size:${isMobile?'22px':'30px'};font-weight:900;letter-spacing:-.02em;margin-bottom:8px">${escHtmlInner(d.title||'Why Choose Us')}</h2>
          ${d.subtitle?`<p style="font-size:15px;font-weight:700;color:var(--primary);margin-bottom:14px">${escHtmlInner(d.subtitle)}</p>`:''}
          ${d.body?`<p style="opacity:.65;line-height:1.75;margin-bottom:16px">${escHtmlInner(d.body)}</p>`:''}
          ${bullets.length?`<div class="imagetext-bullets">${bullets.map(b=>`<div class="imagetext-bullet">${escHtmlInner(b)}</div>`).join('')}</div>`:''}
          ${d.ctaText?`<a href="${d.ctaLink||'#'}" class="btn-cta">${escHtmlInner(d.ctaText)}</a>`:''}
        </div>`
        const imgSide=`<div class="imagetext-img">${imgEl}</div>`
        return wrap('',`<section class="imagetext-section" style="${bg}${tc}">
          <div class="imagetext-grid" style="grid-template-columns:${isMobile?'1fr':'1fr 1fr'}">
            ${layout==='image-right'?textSide+imgSide:imgSide+textSide}
          </div>
        </section>`)
      }
      case 'brands':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const style=d.style||'pill'
        const brands=[d.brand1||'Nike',d.brand2||'Adidas',d.brand3||'Apple',d.brand4||'Samsung',d.brand5||'Sony',d.brand6||'Boat'].filter(Boolean)
        return wrap('',`<section class="brands-section" style="${bg}">
          ${d.title?`<div class="section-header" style="text-align:center"><h2 class="section-title">${escHtmlInner(d.title)}</h2>${d.subtitle?`<p class="section-subtitle">${escHtmlInner(d.subtitle)}</p>`:''}</div>`:''}
          <div class="brands-grid">
            ${brands.map(b=>`<div class="brand-item-${style}">${escHtmlInner(b)}</div>`).join('')}
          </div>
        </section>`)
      }
      case 'offers':{
        const bg=d.bgColor?`background:${d.bgColor};`:''
        const tc=d.textColor?`color:${d.textColor};`:''
        const oCols=isMobile?1:(parseInt(d.columns)||3)
        const offers=[
          {title:d.offer1title||'Flat 30% Off',desc:d.offer1desc||'On all Electronics',code:d.offer1code||'ELEC30',bg:d.offer1bg||'#5b5cf6'},
          {title:d.offer2title||'Buy 2 Get 1 Free',desc:d.offer2desc||'On selected Fashion items',code:d.offer2code||'B2G1',bg:d.offer2bg||'#ec4899'},
          {title:d.offer3title||'Free Delivery',desc:d.offer3desc||'On orders above ₹499',code:d.offer3code||'FREEDEL',bg:d.offer3bg||'#10b981'},
        ]
        return wrap('',`<section class="offers-section" style="${bg}${tc}">
          <div class="section-header">
            <h2 class="section-title">${escHtmlInner(d.title||'Hot Deals')}</h2>
            ${d.subtitle?`<p class="section-subtitle">${escHtmlInner(d.subtitle)}</p>`:''}
          </div>
          <div class="offers-grid" style="grid-template-columns:repeat(${oCols},1fr)">
            ${offers.map(o=>`<div class="offer-card" style="background:${o.bg}">
              <div class="offer-title">${escHtmlInner(o.title)}</div>
              <div class="offer-desc">${escHtmlInner(o.desc)}</div>
              <div class="offer-code-box">🎫 ${escHtmlInner(o.code)}</div>
            </div>`).join('')}
          </div>
        </section>`)
      }
      default:return''
    }
  }

  /* ═══════════════════════════════════════
     PREVIEW CLICK-TO-EDIT
  ═══════════════════════════════════════ */
  function setupPreviewClicks(iframe){
    try{
      const doc=iframe.contentDocument;if(!doc)return
      if(activeSectionId){
        const el=doc.querySelector(`[data-section-id="${activeSectionId}"]`)
        if(el)el.classList.add('sec-active')
      }
      doc.querySelectorAll('[data-section-id]').forEach(el=>{
        el.addEventListener('click',e=>{
          e.stopPropagation()
          selectSection(el.getAttribute('data-section-id'))
        })
      })
    }catch(e){}
  }

  function highlightSectionInPreview(id){
    try{
      const doc=document.getElementById('preview-iframe').contentDocument;if(!doc)return
      doc.querySelectorAll('[data-section-id]').forEach(el=>{
        const match=el.getAttribute('data-section-id')===id
        el.classList.toggle('sec-active',match)
        if(match)el.scrollIntoView({behavior:'smooth',block:'nearest'})
      })
    }catch(e){}
  }

  function clearHighlight(){
    try{document.getElementById('preview-iframe').contentDocument?.querySelectorAll('[data-section-id]').forEach(el=>el.classList.remove('sec-active'))}catch(e){}
  }

  /* ═══════════════════════════════════════
     UTILS
  ═══════════════════════════════════════ */
  function isLightColor(hex){
    const c=(hex||'').replace('#','');if(c.length!==6)return true
    const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16)
    return(r*299+g*587+b*114)/1000>128
  }
  function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function escHtmlInner(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  function toast(msg,type='success'){
    const el=document.createElement('div')
    el.className=`toast ${type}`
    el.innerHTML=`<span class="toast-icon">${type==='success'?'✅':'❌'}</span><span class="toast-text">${msg}</span>`
    document.getElementById('toast-container').appendChild(el)
    requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')))
    setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400)},3200)
  }
  </script>
